body:
  text: 卷十婦人門上經候崩漏失血心痛經閉不行帶下淫濁淋瀝淋辨泄瀉小便血師尼寡婦寒熱子嗣胎教經曰女子手少陰脈動甚者妊子婦人以血為主故手少陰動甚為懷身之象胎稟在下反以上部動甚為胎脈之驗者蓋陽神氣旺與尺內陰搏陽別同一胎脈而有左右上下陰陽男女之辨是以內經特為昭揭二陽之病發心脾有不得隱曲女子不月其傳為風消其傳為息賁者死不治手足陽明皆曰二陽不得隱曲言情欲不遂而病發心脾也風消者發熱消瘦胃主肌肉也賁黃者喘息上奔胃氣上逆也此節雖言病發心脾而實重在胃氣心為胃之母胃為脾之府且與大腸一氣貫通焉有母傷而子獨安臟病而腑不病之理有病胸脅支滿者妨於食病至則先聞腥臊臭出清液先唾血四肢清目眩時時前後血病名血枯此得之年少時有所大脫血若醉入房中氣竭肝傷故月事衰少不來也治之以四烏鰂骨一藘茹二物併合之丸以雀卵大如小豆以五丸為後飯飲以鮑魚汁利腸中及傷肝也此段經文全重在氣竭肝傷四字為通節之綱旨胸脅肝部也支滿肝病也妨於食木邪凌土也病則先聞腥臊臭脾喜芳香今脾土為木邪凌虐病則先聞腥臊臊乃肝之旺氣也出清液脾虛不能敷化水精也先唾血脾傷不能統運營血也四肢清陽衰不能傍達四末也目眩陽不充而水上溢於經也前後血陰受傷而血內溢於絡也血枯內有乾血血不歸經而結胞門也良由年少不禁氣竭肝傷而致月事衰少或不來也治以烏鰂骨四分取其味鹹走腎性溫達肝配以藘茹一分取其辛散內風溫去惡血二物併合功專破宿生新丸以雀卵取其溫補助陽能調子臟精血以五丸為後飯者先藥後飯使藥徐行下焦力貴專攻五丸不為少也飲以鮑魚汁利腸垢和肝傷取其臭穢之味佐烏鰂骨而闢宿積之血也烏鰂血黑如墨用之書契則有賊人之害故又名烏賊入腎走血而不傷伐真元功在虻蛭之上考諸本草藘茹即是茜根功專散血不可誤認䕡茹䕡茹辛寒有毒功專外科觀本經主治可知金匱云婦人之病因虛積冷結氣為諸經水斷絶至有歷年血寒積結胞門寒傷經絡凝堅在上嘔吐涎唾久成肺癰形體損分在中盤結繞臍寒疝或兩脅疼痛與臟相連或結熱中痛在關元脈數無瘡肌若魚鱗時著男子非止女身在下未多經候不勻令陰掣痛少腹惡寒或引腰脊下根氣街氣衝急痛膝脛疼煩奄忽眩冒狀如厥癲或有憂慘悲傷多嗔此皆帶下非有鬼神久則羸瘦脈虛多寒審脈陰陽虛實緊弦行其針藥治危得安其雖同病脈各異源婦人經閉諸病無不由虛寒而成經閉雖屬虛寒則崩漏之屬虛熱從可識矣夫經水歷年斷絶則瘀積結於胞門寒氣凝於經絡蓋下焦寒積結聚則中上二焦皆不得通暢所以在上則寒沫結聚而為咳咳久熱結而為肺癰在中則寒飲結聚而為疝疝久熱結亦為內癰大抵內癰皆起於結血故申之以脈數無瘡肌若魚鱗昭揭病形然此不但婦人也男子亦有是證總由經絡鬱閉寒從火化所致至於在下則經候雖不調而不至斷絶所瘀亦為不多其證雖久但少腹氣街引急寒痛也其或膝脛疼煩者以四肢為諸陽之本寒結於內則在下之陽不能上入故膝脛反熱而痛也至如奄忽狀如厥癲或時憂慘悲嗔有若鬼神所憑此皆陽神虛寒不能統攝濁陰發為帶下之候故以久則羸瘦脈虛多寒證之然多寒言屬寒者多非絶無屬熱者假如羸瘦而脈數又為陰虛多熱矣設形盛而脈虛豈不為氣虛多寒乎形盛而脈濡寧不為濕熱固結乎斯其所以為同脈異源也寸口脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相搏此名為革婦人則半産漏下旋覆花湯主之脈弦而大按之減小而芤者為表裡失血之候以其脈弦大無力而少徐緩衝和之氣故謂之革言胃氣近於革除也蓋弦為陽氣少芤為陰血虛婦人得之主半産漏下以旋覆花湯主之本草謂旋覆花主結氣蔥白主寒熱新絳乃絲帛之染緋者主活血三味入肝理血除邪散結豈非以氣少無陽則寒血虛無陰則熱兩虛相搏以害其肝之生化歟若不明其相搏止謂之虛何以用旋覆花蔥白皆解客熱之邪者而不用溫補其虛乎婦人陷經漏下黑不解膠薑湯主之氣暢而血從則百脈流動以候天癸苟有邪以阻之則血不從其氣而自陷於血海血海者腎主之腎者寒水也其色黑是以漏下黑矣猶內經所謂結陰下血也林億云臣億等較諸本無膠薑湯方當是妊娠中膠艾湯婦人少腹滿如敦狀小便微難而不渴生後者此為水與血俱結在血室也大黃甘遂湯主之其血當下水有清濁清則入經化血濁則為溺為唾苟因氣化之亂濁者入之則不能化血而為血害也水性惟能潤下下流不通入與血居必停於脈隨其所止止於肌表者作身腫止於筋骨者作肢節腫此止於血室故作少腹如敦狀然血室雖與膀胱異道膀胱是行水之府水蓄血室氣有相感故膀胱之氣亦不化而小便微難水與血皆陰類雖有留積不能發熱故不渴若渴則為膀胱結熱而非水血矣若小便自如而少腹之如敦者亦不謂之水並當是他邪血積可知矣生後者言曾生育過之婦則有此患非指産後而言若室女則無是疾也用甘遂取其直達水停之處大黃蕩滌瘀血阿膠為血室之嚮導也婦人經水不利下抵當湯主之亦治男子膀胱滿急有瘀血者傷寒陽明證其人喜忘者必有瘀血大便色黑抵當湯主之發熱下之不解六七日不大便者有瘀血亦抵當湯主之傷寒有熱少腹滿應小便不利今反利者為有血也宜抵當丸三者有病證而後立方今止云經水不利然經水不利豈盡血蓄不通而無虛損者哉此必有蓄血形狀而出是方也婦人經水閉不利臟堅癖不止中有乾血下白物礬石丸主之子宮血積不與氣和故新血不至遂成乾血堅癖外連子戶津液不行化為白物是用緑礬消堅癖破乾血杏仁利氣開閉潤臟之燥蜜以佐之納子戶而藥氣可直達於子宮矣設乾血在衝任之海者必服藥下之納之不能去也婦人腹中諸疾痛當歸芍藥散主之此腹痛者由中氣虛脾土不能升運陰陽致二氣乖離肝木乘克而作痛故用是湯補中伐木通行陰陽也婦人腹中痛小建中湯主之小建中專主風木勝脾之腹痛而婦人善怒易動肝火木邪乘土多有腹痛經水妄行之疾故以此湯主之帶下經水不利少腹滿痛經一月再見者土瓜根散主之陰㿗腫亦主之此亦因瘀血而病者經水雖不利但一月再見之不同皆衝任脈瘀血之病土瓜根消水飲芍藥開血痹桂枝通血脈蟅蟲破血積更需以酒行之至於㿗腫非惟男子之睪丸婦人之陰戶亦有之多在産時瘀血流入作痛下墜出戶也問曰婦人年五十所病下利數十日不止暮即發熱少腹裡急腹滿手掌煩熱唇口乾燥何也師曰此病屬帶下何以故曾經半産瘀血在少腹不去何以知之其證唇口乾燥故知之當以溫經湯主之亦主婦人少腹寒久不受胎兼治崩中去血或月水來過多及至期不來問下利不止答屬帶下何也婦人年已五十經絶胞門閉塞衝任不復輸瀉之時所積血自胞門化為帶下無所從出大便屬陰故就大便為下利是即以帶下例治之王節齋曰婦人女子經脈不行有脾胃損傷而致者不可便認作經閉血死輕用通經破血之藥遇有此證便須審其脾胃何如若因飲食勞倦損傷脾胃少食惡食泄瀉疼痛或因誤服汗下攻伐藥傷其中氣以致血少而不行者只宜補養脾胃用白朮為君茯苓芍藥為臣佐以黃耆甘草陳皮肉桂川芎歸身柴胡等藥脾旺則能生血而經自行矣又有飲食積滯致損脾胃者亦宜消積補脾若脾胃無病按其少腹果有血塊凝結方宜香附蘄艾桂心桃仁行血通經等劑經云飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行故心脾和平則經候如常苟或七情內傷六淫外侵飲食失節起居失宜脾胃虛損則月經不調矣若先期而至者有因肝脾血燥有因脾經鬱滯有因肝經怒火有因血分有熱有因勞役火動其過期而至者有因脾經血虛有因肝經血少有因氣虛血弱治法因肝脾血燥者加味逍遙散脾經鬱滯者歸脾湯肝經怒火者小柴胡加生地血分有熱者四物湯加白朮茯苓柴胡丹皮勞役火動者補中益氣湯脾經血虛者十全大補湯肝經血少者六味丸氣虛血弱者八珍湯經候不調無他證而不受胎六味丸全料減澤瀉一兩加童便制香附四兩醋煮蘄艾一兩調理最妙若有別證兼見隨證制湯送下婦人勞傷氣血衝任虛損月水過多淋漓不斷或過期不來崩中下血或白帶白淋四物湯加丁香膠艾若曾傷胎瘀血停留小腹急痛五心煩熱者大溫經湯月水不調陰虛潮熱或寒熱如瘧盜汗痰嗽漸成骨蒸者血熱相搏也加味逍遙散月水準信不受孕者其故有三肥白腹不痛者閉子宮也因痰導痰湯甚則間一二日送滾痰丸二三服腹多痛者必食生冷過多且又多氣宜溫熱藥七氣湯如咳嗽形瘦色赤多火陰血虛者不宜服只以四物加陳皮香附肉桂作丸亦有血少不能攝精者十全大補湯兼寒金匱溫經湯或曰經正而子宮寒者非也若子宮寒其經必過期矣豈有準信而曰寒乎黑瘦多火人經少色深紫而不受孕者為胞血枯而精被爍也四物換生地加芩連瘦弱而不能受孕子宮無血精氣不聚故也十全大補之類經水不準必不受胎然參前受胎者有之此是血熱抑有參前落後互兼者將為寒熱並乎大抵婦人受氣則氣亂經期亦亂故調經以理氣為先歸附丸氣盛者宜抑氣以行血血盛則氣行矣經不調而血淡如水宜補氣血保元湯加芎歸肉桂香附腹痛加膠艾延胡虛加薑附經水有先期而來者多屬熱其證有二血熱者腹多不痛身多熱此火也其色必紫脈必洪數四物湯中川芎減半易生地加條芩丹皮香附虛熱者四物合保丸不應加炮薑宣連炒黑香附干嗽者逍遙散氣多血虛者腹必疼藿香正氣散加芎歸香附慎用涼藥若婦人年四十餘經水每月二三至者此少年恣意太過後必崩淋經水後期來者多屬寒其證有三血虛腹多不痛微微身熱間亦有痛者乃空痛也脈必大而無力或浮澀濡細宜調氣生血八物加香附虛則四物加參朮黃耆升麻陳皮氣滯血虛者四物加丹皮香附肥盛多痰去地黃再加橘半茯苓血寒脈必沉遲弦緊歸附丸過期色淡者痰多也二陳加柴胡香附肉桂若過期兼白帶者艾煎丸加香附若咳忌香附逍遙散加丹皮嗽而瀉者養胃湯血澀滯者胸飽腰腹痛醋煎散或七氣湯加減衝任虛損少腹有寒月水過期不能受孕者溫經湯年老無病而月水如期不斷者氣血有餘也若反多或一月兩至者氣虛不能統血欲成崩淋也既絶復來者氣病也或傷損或瘀血皆以脅腹急痛為辨並宜四烏湯用赤芍若其勢可止宜大劑八物湯能食者加芩連不能食者加炮薑止之服藥得效者十有二三虛甚者多不能效經水將來腰疼腹痛乃鬱滯有瘀血四物加紅花丹皮蓬朮延胡索香附木香實熱加黃連發熱加柴芩將來小腹先痛氣血澀滯也四烏湯加莪朮桃仁經前先腹痛脈浮弦者小建中加丹皮桃仁經候欲行身體先痛氣血不足也桂枝湯加芎歸稍用熟附二三分經後痛者雖曰虛寒當補然氣散亦能作痛須視其受補否不受補四物加炮薑艾附受補者八物加炮薑艾附瀉者先治瀉久有經行四五日腹中綿綿作痛者此經行時因氣滯而止未盡故也四烏湯加木香蓬朮砂仁每遇經行輒頭疼氣滿心下怔忡飲食減少肌膚不澤此痰濕為患也二陳加當歸炮薑肉桂經水愆期胸脅腰腹刺痛虛浮寒戰此衝任衰弱臟氣虛冷故也溫經湯加減一切氣上湊心心腹攻築脅肋刺痛月水不調者用香附三錢烏藥一錢陳皮蘇葉各六分乾薑四五分煎服經水有紫黑色腹痛者乃氣血相併也腹不痛者血熱也淡紅色者血虛也其來必皆不準腹痛者四烏湯加蓬朮川連不痛者但加川連色淡者增損四物湯色如黃漿水心胸嘈雜汪洋乃胃中有濕痰也六君子加肉桂木香蒼朮曾經下利若汗出小便利者為亡津液故經水反少補脾和胃血自生矣經行之際禁用苦寒辛散之藥飲食亦然經水不止如左尺按之空虛是氣血俱脫輕手其脈數疾舉之弦緊或澀此是陽脫陰亡或見熱證於口眼鼻或渴是名陰躁陽欲先去也急用大建中湯或十全大補送腎氣丸以補命門之下脫痰多占住血海因而下多者目必漸昏肥人多此南星蒼朮川芎香附作丸服肥人不及日數而多者痰多血虛有熱亦用前丸更加黃連白朮肥盛飲食過度而經水不調者乃是濕痰宜蒼朮半夏茯苓白朮香附澤瀉芎歸軀脂滿而經閉者以導痰湯加川連川芎不可服四物以地黃泥膈故也血枯經閉四物加參耆肉桂切禁桃仁紅花因鬱火者逍遙歸脾間服陰虛經脈不通小便澀身體疼痛以四物倍芍藥加肉桂丹皮香附甘草經行之際與産後一般將理失宜為病不淺若被驚則血氣錯亂漸止不行或逆於上而從口鼻中出或逆於身而為血分勞瘵若其時勞力太過則生虛熱亦為疼痛之根若鬱怒則氣逆氣逆則血滯於腰腿心腹背肋之間遇經行時則痛而重經過則安若怒極而傷於肝則又有目暈嘔吐之證加以血不循經遂成淋漓不止凡此之類感風則病風感冷則病冷久而不治崩漏帶下七癥八瘕皆從此而成矣薛立齋治一婦腹內一塊不時上攻或痛作聲吞酸痞悶月經不調小便不利面色青黃相兼已二年餘此肝脾氣滯以六君子加芎歸柴胡炒川連木香吳茱萸二劑次與歸脾湯下蘆薈丸月餘肝脾和而諸證退又與補中益氣加茯苓丹皮中氣健而經自調又治一中年婦素性急先因飲食難化月經不調服理氣化痰藥反肚膨脹大便泄瀉又加烏藥蓬朮肚腹愈脹小便不利加豬苓澤瀉痰喘氣急手足厥冷頭面肢體腫脹指按沉而屈脈沉細右寸為甚此脾肺之氣虛寒不能通調水道下輸膀胱滲泄之令不行生化之氣不運東垣所云水飲留積若土之在雨中則為泥矣得和風暖日水濕去而陽化自然萬物生長喜其證脈相應遂與加減腎氣丸小便即通數劑腫滿消半四肢漸溫自能轉側又與六君子加木香肉桂炮薑而愈崩漏經云陰虛陽搏謂之崩又云陰絡傷則血內溢又云脾統血肝藏血崩之為患或脾胃虛損不能攝血或肝經有火血熱妄行或怒動肝火血熱沸騰或脾經鬱結血不歸經或悲傷胞絡血崩下脫治療之法脾胃虛弱者六君子加芎歸柴胡脾胃虛陷者補中益氣加酒炒白芍肝經血熱者四物湯加柴胡山梔丹皮肝經怒火小柴胡加山梔芍藥丹皮脾經鬱火歸脾湯加山梔故先哲云凡下血證須用四君子收功斯言厥有旨哉若大脫血後毋以脈診急用獨參湯加當歸救之其發熱潮熱咳嗽脈數乃是元氣虛弱假熱之脈也尤當加用人參此等證候無不由脾胃先損而患故脈洪大察其中有胃氣受補可救誤投寒涼之藥復傷脾胃生氣使血反不歸源也暴崩下血不止者乃血不歸經陰血隨陽盛之勢妄行下漏也身熱不痛者逍遙散加熟地川芎不應此血熱沸騰也四物加芩連肉桂按東垣云經漏不止有二皆由脾胃有虧下陷於腎與相火相合濕熱下迫經漏不止其色紫黑如夏月腐肉之臭中有白帶者脈必弦細寒伏於中也有赤帶者其脈洪數病熱明矣必腰痛或臍下痛臨經欲行先寒熱往來兩脅急縮兼脾胃證見或四肢困熱煩不得眠心中急補中益氣加茯苓芍藥大補脾胃而升降氣血可一服而愈或先貴後賤先富後貧心氣不足其火大熾旺於血脈之中形質肌肉顏色似不病者此心病也經水不時而下或適來適斷暴下不止治當先説惡死之言勸論令懼死而心不動以補中益氣下安神丸補養脾胃鎮墜心火更以人參養榮補陰制陽經自止矣暴崩下血腹痛有二有瘀血有空痛瘀血者體必作寒脈必弦如空痛者不寒少腹上喜熱按脈微弱但瘀血當去空痛當補有因內傷若少腹不痛八物湯加芩連如痛者四烏湯加莪朮年高而崩者法在不治治亦無功經候不調血氣成塊崩中下漏者此是血海虛寒外乘風冷搏結不散醋煎散加麝香血虛氣損或凝積塊七癥八瘕上則氣逆嘔吐下則泄下五色金匱溫經湯加薑桂以艾煎酒溫服血崩之人有服前藥不效者火也三補丸即三黃丸去大黃用黃柏風入胞門忽時崩下鮮血者一味防風丸金匱旋覆花湯送下風熱入肝經崩下發熱手心灼熱者一味子芩丸小建中湯送下崩漏淋瀝衝任衰弱臟腑虛冷故也千金茯苓補心湯如小腹急痛兼下赤白帶者艾煎丸若下血過多血氣不足四肢倦怠乏力增損四物湯有去血雖多間有崩漏水下時有鮮血者四物加丁香膠艾香附丹皮失血血崩白淋及經事來多者四物加參耆膠艾椿根皮去血過多虛勞發熱有痰者補中益氣加苓半有熱少加芩連原缺加烏藥桂心口乾去升麻加煨葛根東垣論崩漏並不言熱其主在寒即使有熱證亦是虛熱若以寒藥治之即瘀血愈凝結經血愈不止矣四物加炮薑調理因勞者用參耆帶升補藥血崩甚而腹痛人多疑惡血未盡及見血色瘀晦愈信惡血之説不敢便止大凡血之為患欲出未出之際停在腹中即成瘀色未必盡為瘀熱又曷知瘀之不為虛冷乎若必待瘀血淨後止之恐並其人而不存矣且腹痛更有説積而腹痛血通則痛止崩而腹痛血住則痛止千金治崩淋帶下五崩熱病下血寒熱下血經行犯房室下血經來舉重傷任脈下血産後臟開經利下血外實內虛之病用小牛角䚡散若崩中去血不斷本方去禹餘糧乾薑烏鰂骨龍骨赤小豆加甘草地榆小薊根丹參乾地黃芎藭赤石脂龜甲柏子仁名角䚡鹿茸散積冷崩中去血不止腰背痛四肢沉重虛極小牛角䚡散去鹿茸阿膠烏鰂骨赤小豆加乾地黃桑耳白朮赤石脂礬石附子人參蒲黃防風名大牛角䚡散崩中去赤白或如豆汁千金伏龍肝湯膀胱虛傷不能攝血而崩下不止者單方用新絲綿燒灰為末空心酒調一錢或雞子黃蘸食數日必效崩血經年不止者用香附二兩炒黑蓮房五枚燒存性為細末空心陳酒調下二錢或用陳棕櫚燒灰存性黑糖調酒下一錢即止此劫法也崩漏過多服補瀉藥皆不效者用黃牛角䚡煅存性空心酒服二三錢虛寒血色稀淡者同鹿茸煅服尤效蓋牛屬坤土益脾角䚡走肝主血神農本經云下閉血瘀血補女人帶下血崩燔之酒服宗奭曰燒灰主婦人血崩大便下血血痢虛人獨參保元皆可送下此血脫益氣之良法也古方有用白馬蹄燒灰存性酒服方寸匙者有用桑樹上耳燒灰酒服者皆千金決也又用五靈脂生炒各半酒服者此大傷中氣雖藜藿亦難輕試崩證多用醋炒荊芥升麻醋能收斂故也血崩日久純下臭黃水或帶紫黑筋塊腥穢不堪者不治腹滿不能飲食不受參術補益者不治服大劑補中人參每日服至兩許不應反加寒熱口燥面目足脛浮腫者不治瘀汙崩脫少腹不疼後變陰戶腫突痛如刀割者死期迫矣診漏下赤白日下血數升脈急疾者死遲者生漏下赤白不止脈小虛滑者生數盛者死漏下脈弦徑者死澀澀不調按之不來者死下血脈虛者脈浮者俱不治然峻實其下亦有得生者寸口脈遲為寒在上焦則吐血衄血尺脈微遲為寒在下焦則崩血便血大抵數小為順洪大為逆大法當調補脾胃為主薛立齋治一婦久患血崩肢體消瘦飲食到口但聞腥臊口出津液強食少許腹中作脹此血枯之證用八珍湯四烏鰂骨一藘茹丸兼服兩月經行而愈一婦老年患崩諸藥罔效身熱肢痛頭暈涕出吐痰少食衆作火治轉致絶粒數日僅存呼吸診之乃脾腎虛寒用生料八味丸一劑翌早遂索粥再劑熱減痛止服八味丸愈後因勞役憂怒至夏崩復作胸飽發熱脊痛腰不可轉神氣怫鬱脈洪無倫按之微弱此無根之火內真寒而外假熱也以十全大補加附子一劑暈止崩血漸減日服八味丸而愈汪石山治一婦年逾四十形色蒼紫忽病血崩醫者或用涼血或用止澀俱罔效診之六脈皆沉澀而緩按之無力乃胃病非血病也當用甘溫之劑健脾理胃使胃氣上騰血循經絡則無復崩矣遂用補中益氣多加參耆兼服參苓白朮散而愈失血心痛婦人血崩而心痛甚名曰失血心痛心主血心脾血虛無以榮養故痛如刀刺崩甚則痛甚崩緩則痛緩若小産去血過多而心痛甚者亦然若小腹喜按而下淡色血水為陰血耗散先用烏鰂骨炒為末醋湯調下收斂之次與補中益氣湯升舉之若小腹中有塊而按之作痛血色紅紫中有結塊為瘀血不散先用失笑散後與十全大補峻補之若心脾血弱或鬱結傷血用歸脾湯調補之經閉不行經水陰血也屬衝任二脈上為乳汁下為血水其為患有因脾盛不能生血或鬱結傷脾而血損者有因冒火而血爍者有因勞傷心神而血耗者有因積怒傷肝而血閉者有因腎水不能生肝而血少者有因肺氣虛傷不能統血而經不行者治療之法損其肺者益其氣損其心者調其營衛損其脾胃者調其飲食適其寒溫損其肝者緩其中損其腎者益其精審而治之庶無誤矣室女婦人諸病以調經為先調經以理氣為要蓋氣不和則血不流效經閉然其證不一小腹疼痛血海虛寒也或潮熱頭目昏沉肢體勞倦五心須熱怔忡面赤口燥唇裂盜汗身疼者血氣虛損也並宜溫經湯腹中結塊腰腿重痛及少腹痛如錐刺者瘀血凝滿也四物加肉桂蓬朮貌本壯實飲食減少者胃氣不調也蓋胃氣不和亦令經水不調逍遙散下歸附丸經水三月不至其脈右浮大而左反弱其經當下此為居經非妊也當抑氣養血又經水絶後一朝而圊血二三日不止者不須治當自止經水常五日至者五日愈下利而經斷者利止自來蓋下利則亡津液故經絶利止津液復經當自下若脈微澀者雖二三月不行非胎當養血經自行以脈澀故知非胎也經水不通而逆行者或吐血或衄血或唾血或血腥通宜四物加韭汁童便甚則從虛勞例用巽順丸烏骨雞丸治之室女經水既來而復不通其説有三面色不黃飲食如故身不熱者名歇非病也不須藥面黃肌瘦身熱為虛勞診其肝脈弦出寸口魚際非藥所能治急與婚配自然經行而愈藥則加味逍遙散乾咳用蜜制白朮橘皮生薑又有氣血不足面黃肌瘦身熱不甚者不可用桃仁紅花通血藥宜六味丸去山茱萸加麥門冬兼進異功散調補之婦人經閉不通視其脈不足當補氣血四物湯加參耆朮草之類脈有餘而氣相併者四烏湯加肉桂橘皮之類婦人經候漸少以致不通手足骨肉煩疼日漸羸瘦而生潮熱其脈微數此陰虛血弱陽往乘之當養血益陰慎勿以毒藥攻之女人虛羸有鬼胎癥塊經候不通等證當隨證辨治丹方有服芫花下黑物而效者苟非實證未可輕試也婦人月經不利臍下氣脹上攻欲嘔不得睡加減四物湯或用當歸身一兩穿山甲炒蒲黃各五錢辰砂一錢麝香少許共為細末食前熱酒調下二錢婦女骨蒸痰嗽診其脈七八至或細而數視其肌肉消瘦之極面反嬌赤者此必死候更加泄瀉喘逆不能右臥者死期尤促若室女經水不調尤當開鬱為主室女年及笄天癸不至而色不黃飲食如故此名石女不在經閉論亦有至十七八而經自來者婦人經閉肥白者多痰去痰經自行二陳加芎歸川連南星枳實生薑竹瀝稟厚恣於酒食者平胃散加薑汁炒川連歸尾半夏薑汁黑瘦者多血枯四物加參耆香附丹皮經閉脈沉弱少腹痛屬寒結四烏湯芍藥用桂酒製烏藥用附子制寡婦尼姑經閉郁也加味逍遙散加無灰酒竹瀝娼妓本無經閉之理間或有之勞也十全大補中肉桂可用二三錢血枯一證與血隔相似皆經閉不通之候然而枯之與隔則相反有如冰炭夫枯者枯竭之謂血虛之極也隔者阻隔之謂血本不虛而或氣或寒或積有所逆也病發於暫其證或痛或實通之則血行而愈可攻者也枯者其來也漸衝任內竭其證無形必不可通者也嘗見今人之於此證聽其言則明曰血枯經閉察其治則每用四物桃仁紅花甚至硝朴稜莪之類無所不至夫血既枯矣只當補養陰氣使其血充則弗招自至奚俟通也若勉強逼之則枯之愈枯不死何待或問一婦哮喘發後必便血二三日其喘方止每歲常十餘發無不皆然經閉數年不通而不成虛勞之病何也答曰此肺移熱於大腸熱得下泄故喘嗽止經血從大便間道而出雖閉而無留結之患故不成勞診凡經閉不調與胎産之病其脈要滑實重按有力崩漏不止與産後之病其脈要虛濡小弱留連調經及安胎雖以順氣為主又須補脾為要治崩及産後雖以散血為先又當扶虛為本喻嘉言治楊季登女經閉年餘發熱少食肌削多汗而成勞怯醫見汗多誤為虛也投以參術其血愈錮診時見汗出如蒸籠氣水謂曰此證可療處全在有汗蓋經血內閉止有從皮毛間透出一路以汗即血之液也設無汗而血不流則皮毛稿而死矣宜用極苦之藥斂血入內而下通於衝脈則熱退經行而汗自止非補藥所能效也於是以龍薈丸日進三次月餘經血略至汗熱稍輕姑減前丸隻日進一次又一月經血大行淋漓五日而諸證全瘳矣帶下帶下之證起於風氣寒熱所傷入於胞宮從帶脈而下故名為帶有五色不只赤白白帶者屬氣虛甚則腰痛如虛不甚則不痛若氣鬱甚則腰痛頭疼眼花此虛證也千金內補當歸建中湯加醋製香附或萆薢分清飲量肥瘠選用赤帶多腰痛艾煎丸加續斷杜仲若肥盛蒼黑而肌肉䐃堅者為濕熱下注平胃散加薑製星半酒炒芩連赤白帶下艾煎丸隨證加氣血藥治之五色帶下十全大補湯加熟附龍骨赤石脂禹餘糧酒丸服或因六淫七情或因醉飽房勞或因膏粱厚味或服燥劑所致脾胃虧損陽氣下陷或濕痰下注蘊積而成皆當壯脾胃升陽氣為主佐以各經見證之藥陽氣下陷補中益氣湯濕熱下注加苓半蒼朮黃柏氣虛痰飲下注局方七氣湯送腎氣丸丹溪云帶下赤白屬於大腸小腸之分赤屬血白屬氣主治燥濕為先漏與帶俱是胃中痰積流下滲入膀胱無人知此只宜升提甚者必用吐以升提其氣次用二陳湯加二朮升柴丸服肥人多是濕痰越鞠丸加滑石海石蛤粉星半茯苓椿皮作丸服瘦人多是熱以大補丸加滑石海石椿皮龜版灰作丸服必須斷厚味帶下脈浮惡寒腥臭不可近者難治淫濁小便白淫白濁皆由勞傷於腎故心腎不交泰水火不升降腎主水開竅在陰陰為便溲之道胞冷腎損故有淫濁之證白淫者或一時放白水孀尼多有此疾乃鬱火也逍遙散加炒黑山梔酒炒黃柏白濁者渾濁如膿此膀胱經熱失治當生癰疽清心蓮子飲加萆薢淋瀝經水淋瀝不斷其故有三有因月戒來而行房致傷胞絡先服活血藥小腹痛者四物加香附烏藥不痛四物加膠艾黃耆氣虛下陷小腹喜溫按者四物加參朮黃耆升麻陳皮有多氣所致者甚則胸膈飽悶肚腹疼痛用正氣散若肚腹不疼者逍遙散加熟地當臍痛者尤宜飲食少者增損四物湯加焦白朮禁用芩連若勞傷氣血衝任虛損四物加丁香膠艾小腹急痛溫經湯月水至老不斷必成淋證補中益氣或八珍並加香附細辛仍須戒氣方可治療否則崩淋難治也淋辨淋證皆由腎虛膀胱積熱所致腎虛則小便數膀胱熱則小便澀適遇經行時候或澀數淋漓腹中時痛其脈沉細皆因寒熱邪氣客於胞中故衝任不調而成此證宜服歸附丸白淋者起於郁多屬虛寒小腹不疼與去血過多空痛者俱宜人參養榮湯香附不可缺或補中益氣湯下歸附丸如痛者四烏湯白淋變為黃水將成血淋八物湯加減血淋者月事三五日一至積數月不愈者是也腹痛則四烏湯加莪朮木香甚則醋煎散尚恐有瘀血未盡也去多不痛善飲食者八物湯加芩連或補中益氣加黃柏如飲食少進者芩連黃柏禁用若少腹痛而脾胃不實或痛而欲得按者八珍湯加膠艾或逍遙散加熟地膠艾如瀉者先實脾胃大抵治淋先治脾胃為上此證多腰痛雖屬血亦因氣所致也沙淋者淋下則沉積如沙一層有赤白二種白屬氣赤屬血不可依書用芩連多不克效當知婦人之疾雖有濕熱止宜調經不可與苦寒之藥以其月事時下多虛少實故養榮湯治白淋而效以有桂也艾煎丸亦然以有艾也惟赤淋不可服熱藥艾煎丸亦禁用宜八珍加芩連香附誤用溫補必致躁渴引飲加以水飲停蓄而成腫脹者加味逍遙散加芩連枳朴澤瀉橘皮先治其脹然後徐徐治本慎勿驟補驟補則氣壅腹脹也年老患血崩淋證不拘痛與不痛脾胃實與不實皆以八珍加膠艾黃耆澤瀉若遽用芩連以傷脾胃更何恃以祛病乎泄瀉經行時先泄瀉者此脾虛也脾統血而惡濕經水將動脾血先注血海然後下流為經脾血既虧不能運行其濕所以必先作瀉補中益氣加炮薑有熱兼黃連若飲食減少六君理中選用石頑治一薛姓婦每遇經行必先作瀉二三日其脈左手關尺弦細如絲右手關上小快而滑服薑桂萸附則大渴腹痛泄瀉轉劇服苓澤車前之屬則目暗如盲此肝血虛寒而脾胃有伏火也俟經將行作瀉時朝用理中加黃連作湯服五六劑暮與加減八味加紫石英作丸常服不終劑而數年之疾頓除小便血婦人尿血或因膏粱炙爆或因醉飽入房或因飲食勞役或因六淫七情以致元氣虧損不能收攝歸源若因怒動肝火者加味逍遙散調送發灰肝經風熱者送一味子芩丸久而血虛者八珍湯送發灰膏粱積熱者清胃散加槐花甘草房勞所傷者六君子加升柴風熱所傷者四君子加防風凡久而虧損元氣者補中益氣為主鬱結傷脾者歸脾湯為主師尼寡婦寒熱療師尼寡婦宜別制方藥謂獨陰無陽致血氣交爭寒熱如瘧或腰背作痛而寒熱經閉白淫痞悶咳逆面皯瘦削久則成勞其肝脈弦出寸口上魚際是其證也若室女出嫁愆期而寒熱或既嫁不得於夫者亦然蓋男子精盛則思室女子血盛以懷胎此天地自然之理也治宜開鬱理氣其經自調逍遙散加無灰酒竹瀝名酒瀝湯專主尼寡寒熱肥人用越鞠合二陳最宜若兼怒動肝火而發熱佐以小柴胡加減若兼鬱結傷脾而寒熱佐以歸脾湯此證多兼經候不調當審緩急治之婦人形瘦肉脫胸中常想著一事而百計不解者勿與醫治後必成癲凡婦人鬱怒發寒熱逍遙散加丹皮香附脾氣不運痰氣留著結為痰癖發則其塊上升氣逆喘促嘔吐酸水初起元氣未傷者四七湯加枳實黃連虛人香砂六君加柴胡白芍下佐金丸大抵郁證皆虛火用事故多骨蒸寒熱經閉不調喘咳失音等證當詳虛損例治但須兼調鬱氣亦有陰血虧損不勝香燥者惟降火滋陰為首務耳千金云凡人無子當為夫妻俱有五勞七傷虛羸百病所致故有絶嗣之患夫治之之法男服七子散女服紫石門冬丸無不有子也若丈夫陽氣不足不能施化慶雲散主之婦人立身以來全不産及斷乳後十年二十年不産此胞門不淨中有瘀積結滯也朴硝蕩胞湯主之婦人月水不利閉塞絶産者白薇丸主之子嗣子嗣一門古方悉用辛熱壯火之劑若施之於氣虛精寒之人固所宜然設概用於火旺精傷者得不愈伐其陰乎竊謂男子之艱於嗣者一如婦人經病調理然有不生不育之不同大意在於補偏救弊往往有體肥質實偏生無子者豈可一概歸於虛寒耶蓋濕勝則氣滯氣滯則精雖至而不能沖透子宮故爾不能成孕惟宜行濕耗氣助其流動之勢如二陳二妙七氣平胃之屬皆可選用甚則控涎丹先行嚮導最為要訣慎勿拘於世俗溫補壯陽之説也且人之所稟不同勇怯各異有因男子真火式微者有因濕熱傷精者有因婦人胞門濁膩者有因血海虛寒者有因子宮枯燥者至如生而不育亦自不同有金石藥毒伏於髓中者有酒客濕熱混於髓內者有欲勤精薄者有得胎後不戒房室頻泄母氣者有妊娠不慎起居而致胎病不育者有男子精髓雖沖而督脈氣衰陽氣不振但生女不生男者此豈一法所可治乎歷檢古方中惟葆真丸千金種子丹五子衍宗丸等方治男子陽道不振精氣寒薄與夫斫喪太過及年老無子者咸為得宜若精髓稀薄陽氣不固聚精丸是佳陽衰更加人參鹿茸尤妙生女不生男者當大補督脈益陽氣鹿茸四具人參一斤遠志四兩醇酒丸服其有膏粱富貴飽飫肥甘恣情房室氣竭精傷不能生子者但服煉真丹勿令斷絶雖在耄耋之年每多生育然非素享醲厚形體豐盛人服之無預也至於婦人子宮諸證當詳經帶例治俟經正無病隨其虛實寒熱調理自然生育大率婦人肥盛者多不能孕以中有脂膜閉塞子宮也雖經事不調當與越鞠二陳抑氣養胃之類有熱隨證加黃連枳實瘦弱不能孕者以子宮無血精氣不聚故也當與四君六味加蘄艾香附調之子戶虛寒不攝精者秦桂丸最當婦人多有氣鬱不調兼子臟不淨者加味香附丸男服聚精丸若因瘀積胞門子宮不淨或經閉不通或崩中不止寒熱體虛而不孕者局方皺血丸為專藥若帶下少腹不和或時作痛者千金大黃丸蕩滌之子戶虛熱雖結而不能成實者四物換生地加芩連然此皆由氣血偏沮是可以藥奏功若夫稟賦陰陽偏絶雖日用參術峻補終無回天之力也丹溪曰無子之因多起於父氣之不足豈可獨歸罪於母血之虛寒況母之血病奚止虛與寒而已哉然古方治婦人無子惟秦桂丸一方其性熱其辭確今欲得子者率皆服之無疑夫求子於陰血何至輕用熱劑耶今得此丸經血必轉紫黑漸成衰少或先或後始則飲食驟進久則口苦舌乾陰陽不平血氣不和焉能成胎縱使有成子亦多病以其能損真陰也按東垣云李和叔中年得一子至一歲身生紅絲瘤而死後三四子至三歲皆病瘤而死乃腎中伏火精氣中多有紅線以氣相傳生子故有此疾俗名胎瘤是也遂以滋腎丸數服以瀉腎中火邪補真陰不足忌酒辛熱之物其妻用六味地黃丸以養陰血受胎五月之後以黃芩白朮二味作散服後生子至三歲前證不復作矣胎教胎教之説世都未諳妊娠能遵而行之不特無産難之虞且生子鮮胎毒殤夭之患誠為廣嗣要旨姑以大概陳之婦人經後四十餘日不轉即謹房室慎起居薄滋味養性情刻刻存心與執持寶玉無異舉趾必徐行立勿仰坐不實其前陰臥不久偏一側不得耽坐嗜臥使氣血凝滯為第一義雖不可負重作勞然須時時小役四體則經絡流動胎息易於動運腰腹漸粗飲食不宜過飽茶湯更須節省大熱大涼總非所宜犬羊鱉蟹等一切有毒之物固宜切禁即椒薑常用之品亦須少嘗其豕肉醇酒濕面之類縱不能屏絶不食亦不可恣啖歸精於胎過於蕃長致母臨蓐難産而子在胞中稟質肥脆襁褓必多羸困即如沃壤之草木移植塉土枝葉得不凋委乎甫交三月即當滿裹其腹胎氣漸長僅可微松其束切勿因其氣急滿悶而頓放之在夏澡洗須避熱湯冬時寤寐勿迫爐炭其最甚者尤在不節交合淫火盡歸其子以釀痘疹疥癩之毒然須妊娠稟性安靜不假強為力遵實濟若強制以違其性則鬱火彌熾此與恣情無禁者雖截然兩途而熱歸胎息則一嘗見有切於求嗣者得孕即分處房幃而子仍歿於痘豈非強制其火彌熾之明驗乎蓋人之志欲匪一苟未能起出尋常又須曲體母情適其自然之性使子氣安和是即所謂胎教也當知胎教原非一端若懷子受驚則子多胎驚懷子抱郁則子多結核流注懷子恐懼則子多癲癇懷子常起貪妄之念則子多貪吝懷子常挾憤怒之心則子多暴狠懷子常造綺語詭行則子多詐偽非但懷子之後當檢束身心而輕淨交感慎毋恣肆以遺胎息之患若大醉後媾精精中多著酒濕則子多不育大怒後媾精精中多挾怒火即子多乖戾大勞後媾精精中不滿真氣則子多孱弱若夫熱藥助戰作意祕精精中流行毒悍則子多異疾至於風雨雷電媾精感觸震氣則子多怪類以此言之則三元五臘宜確遵禁戒誕育自是不凡宗祧重務安得視為嬉戲哉胎前脈辨驗胎養胎惡阻胎動漏胎下血驚胎僵仆胎上逼安胎半産胎不長養過期不産咳嗽子煩類中風傷風傷寒瘧痢子淋遺尿諸血吐衄諸痛子腫不語譫語子懸子癇乳泣腹啼鬼胎下私胎法斷子法經云何以知懷子之且生身有病而無邪脈也人有重身九月而喑此胞絡之脈絶也胞絡者繫於腎少陰之脈貫腎系舌本故不能言無治也當十月復婦人重身毒之何如曰有故無殞亦無殞也言有是病而用是藥藥雖峻克可無傷於胎息也金匱云師曰婦人得平脈陰脈小弱其人渴不能食無寒熱名妊娠桂枝湯主之於法六十日當有此證設有醫治逆者卻一月加吐下者則絶之平脈者言其無病之脈也惟陰脈小弱以其營氣不足耳凡感邪而營氣不足者則必惡寒發熱今無寒熱妨於食是知妊娠矣妊娠血聚氣搏經水不行至六十日始凝成胎斯時營氣並於胎元而胃氣不足津液少布故其人渴不能食宜桂枝湯和營益胃設有醫以他治反加吐下者此為惡阻則絶之謂絶止醫治候其自安不可用藥更傷其胃氣也樓全善云嘗治一婦惡阻病吐愈治愈逆因思仲景絶之之旨遂停藥月餘自安婦人宿有癥病經斷未及三月而得漏下不止胎動在臍上者為癥痼害妊娠六月動者前三月經水利時胎也下血者後斷三月衃也所以血不止者其癥不去故也當下其癥桂心茯苓丸主之宿有癥痼謂婦人行經時遇冷則余血留而為癥然癥病婦人恆有之或不礙子宮則仍行經而受孕雖得血聚成胎胎成三月而經始斷斷未三月而癥病復動遂漏下不止癥在下迫其胎故曰癥痼害胎以臍上升動不安洵為真胎無疑若是鬼胎即屬陰氣結聚斷無動於陽位之理今動在於臍上是胎已六月知前三月經水雖利而胎已成後三月經斷而血積成衃是以血下不止故用桂心茯苓丹皮桃仁以散其衃芍藥以護其營則血方止而胎得安世本作桂枝茯苓丸乃傳寫之誤詳桂枝氣味俱薄僅堪走表必取肉桂之心方有去癥之功安常所謂桂不傷胎勿疑有礙於妊觀下條子臟開用附子湯轉胞用腎氣丸俱用桂附內經所謂有故無殞是也婦人懷妊六七月脈弦發熱其胎愈脹腹痛惡寒者少腹如扇所以然者子臟開故也當以附子湯溫其臟妊娠脈弦為虛寒虛陽散外故發熱陰寒內逆故胎脹腹痛惡寒者其內無陽子臟不能司閉藏之令故陰中覺寒氣習習如扇也用附子湯以溫其臟則胎自安世人皆以附子為墮胎百藥長仲景獨用以為安胎聖藥非神而明之莫敢輕試也師曰婦人有漏下者有半産後因續下血都不絶者有妊娠下血者假令妊娠腹中痛為胞阻膠艾湯主之行經與結胎皆屬衝任衝任雖持乎陰陽交合為肝腎之用事然長養成胎皆坤土所資蓋陰陽抱負則不泄坤土堤防則不漏若宿有瘀濁客於衝任則陰自結不得與陽交合故有時漏下半産不絶也凡妊娠胎氣陽精內成陰血外養今陰血自結與胎阻隔不得相和獨陰在內作腹中痛下血皆陰陽失於抱負坤土失於堤防此方皆治之芎歸宣通其陽血芍地宣通其陰血阿膠血肉之質同類者以養之甘草緩中解急此方調經止漏安胎養血然加減又必從宜若脈遲緩陰勝於陽則加乾薑或見數大陽勝於陰則加黃芩可不言而喻矣婦人懷娠腹中㽱痛當歸芍藥散主之此與胞阻痛者不同因脾土為木邪所克穀氣不舉濕淫下流以滯陰血而痛故君以芍藥瀉肝利滯佐以芎歸補血止痛苓澤滲濕益脾則知內外六淫皆能傷胎成痛不獨濕也妊娠嘔吐不止乾薑人參半夏丸主之此即後世所謂惡阻病也先因脾胃虛弱津液留停蓄為痰飲至妊二月之後濁陰上衝中焦不勝其逆痰飲遂湧中寒乃起故用乾薑止寒人參補虛半夏生薑治痰散逆也妊娠小便難飲食如故當歸貝母苦參丸主之此小便難者膀胱熱鬱氣結成燥病在下焦所以飲食如故用當歸以和血潤燥貝母以清肺開鬱苦參以利竅逐水併入膀胱以除熱結也妊娠有水氣身重小便不利灑淅惡寒起即頭眩葵子茯苓散主之小便利則愈膀胱者內為胞室主藏津液氣化出溺外利經脈上行至頭為諸陽之表今膀胱氣不化水溺不得出外不利經脈所以身重灑淅惡寒起即頭眩但利小便則水去而經氣行表病自愈用葵子直入膀胱以利癃閉佐茯苓以滲火道也婦人妊娠宜常服當歸散主之常服即易産胎無疾苦産後百病悉主之內經曰陰搏陽別謂之有子尺脈搏擊者由子宮之氣血相搏而形於脈也故妊娠之血不可以靜靜則凝泣虧少則虛皆不能與化胎之火相合要其胎孕生化必先和其陰陽利其氣血常服養胎之藥非惟安胎易産且免胎後諸患芎歸芍藥之安胎補血白朮之補胃養胎其胎外之血因寒濕滯者皆解之黃芩化壯火而生氣故為常服之劑然當以脈證虛實加減有病則服否則不必也妊娠養胎白朮散主之但苦痛加芍藥心下毒痛倍加芎藭心煩吐痛不能食飲加細辛一兩半夏大者二十枚服之後更以醋漿水服之若嘔以醋漿水服之復不解者小麥汁服之以後渴者大麥粥服之病雖愈服之勿置本方四味本草皆謂能去惡血而養胎用之何也蓋血聚而後成胎少遇邪則所聚之血將宿而不運反類惡血必開陳然後胎可安也養胎不惟在血而胎繫於腎養之又在於胃所以補腎調胃以固精和中用白朮調胃秦椒開痹痹開則陽精至牡蠣治崩崩止則陰精固川芎下入血海運動胎血破舊生新或陰血不利肝木為害在內抑屈而痛者瀉以芍藥之酸寒以通其陰設直衝過而痛者散以芎藭之辛溫以通其陽或挾瘀惡之氣上逆於胃而胃中吐煩不能食者用細辛溫中去痰下氣半夏治心下急痛和胃進食止吐逆若嘔而不止者由肝木妄動用小麥飲養其本氣以安之大麥主消渴益氣調中故中氣不足而渴者用之問曰婦人病飲食如故煩熱不得臥而反倚息者何也師曰此名轉胞不得溺也以胞系了戾故致此病但利小便則愈宜腎氣丸主之此方在虛勞中治腰痛小腹拘急小便不利此治腎虛轉胞不得溺皆用此利小便也轉胞之病為胞居膀胱之室內因下焦氣衰水濕在中不得氣化而出遂致鼓急其胞因轉筋不止了戾其溺之系水既不出經氣遂逆上衝於肺故煩熱不得臥而倚息也用此補腎則氣化水行濕去而胞不轉胎自安矣雖然轉胞之病豈盡由下焦腎虛所致耶或中焦氣虛土濕下干害其胞與上焦肺氣壅塞不化於下焦或胎重壓其胞或忍溺入房者皆足以成此病必各求其所因以治之脈辨婦人經水二三月不來診其脈微滑而數略無間斷於其間雖身有病而無邪脈不澀不伏不弦徑即胎脈也辨男女法古人咸以左大為男右大為女然多有素稟偏大偏小者惟寸口滑實為男尺中滑實為女最為要訣如兩寸俱滑實為雙男兩尺俱滑實為二女尺右左寸俱滑實為一男一女此屢驗者若脈沉細腹重而不時微痛雖有形如抱甕狀滿腹不動但當臍下翕翕動按之冰冷又兩尺乍大乍小乍有乍無或浮或沉或動或止早暮不同者乃鬼胎也須連視三四日乃見宜補氣活血若脈來急如風雨少停復來如初者夜叉胎也亦有關部微似雀啄之形者又有大小不勻而指下弦徑不和者皆夜叉之兆也若脈來沉細腰腹痛胎伏不動或反覺上搶心悶絶按之冰冷即非好胎更察舌紋青色此胎已死也若並唇亦青連母都不可救但伏而不動者亦有好胎宜服順氣和血之藥驗胎婦人經候不行已三月欲驗有胎否生川芎二錢為末空心濃煎艾湯調下腹內微動則胎也養胎婦人受孕一月足厥陰脈養其陰陽新合名曰始胚大集經云胎成七日初不增減二七日如薄酪三七日如生酪四七日如熟酪是也二月足少陽脈養陰陽居經名曰始膏經霜五七日如生酥六七日如息肉七七日如段肉八七日其堅如壞是也三月手心主脈養初有定形名曰始胞經調九七日變五泡兩肘兩髀及頭十七日續生五泡兩手腕兩足及頸十一七日復生二十六泡十手指十足指及眼耳口鼻十二七日泡相成就是也四月手少陽脈養始受水精以成血脈而形體成經謂十三七日現腹相十四七日生五臟十五七日生大腸十六七日生小腸是也五月足太陰脈養始受火精以成其氣而肢節充經謂十七七日有脾處十八七日生三脘十九七日生手掌足趺臂節二十七日生陰臍頤乳是也六月足陽明脈養始受金精以成其筋而骨幹立經謂二十一七日有三百柔軟骨如初生瓠二十二七日如未熟瓠二十三七日堅如胡桃二十四七日生一百筋是也七月手太陰脈養始受木精以成其骨而毛髮生經謂二十五七日生七千脈尚未具成二十六七日成如藕絲二十七七日有三百六十三筋二十八七日始生肌膚是也八月手陽明脈養始受土精以成膚革而臟腑具經謂二十九七日肌膚稍厚三十七日方有皮像三十一七日皮轉厚堅三十二七日皮革轉成是也九月足少陰脈養始受石精以成皮毛而穀氣入胃石稟五氣之餘臟腑百骸俱實故謂之石經謂三十三七日耳鼻唇指膝節成三十四七日生九十九萬毛髮孔猶尚未成三十五七日毛孔具足三十六七日爪甲成就是也十月五臟俱備六腑齊通納天地之氣于丹田經謂三十七七日母腹中有風起通其七竅三十八七日隨其宿世善惡分香臭二種風以定容貌骨節貴賤右千金述徐之才養胎法與大集經吻合求其細則受胎在母腹七日一變展轉相成然多有不足月産而能長育長年者此各經榮養與七日之變皆不及期而養胎之氣仍周遍也若經脈榮養未周總屬半産非正産也惡阻經候不行兩三月精神如故喜酸惡食或嗜一物或大吐或時吐痰與清水肢體沉重頭目昏眩此名惡阻不可作病治四君子加烏藥香附橘皮咳而渴者加橘紅五味生薑若胸中憒悶四肢沉重怠惰不能轉舒惡聞食氣喜鹹酸胎動不安嘔逆不食者理中湯加茯苓木香半夏若中脘停痰二陳加枳殼若飲食停滯香砂六君子加枳殼若脾胃虛弱異功散兼氣惱加枳殼砂仁若飲食少思六君子加紫蘇桔梗頭暈體倦六君子湯若嘔吐不食倍苓半蓋半夏乃健脾氣化痰濕之主藥也今人以半夏有動胎之性鮮有用之者以胎初結慮其辛散也樓全善云余治妊娠阻病纍用半夏未嘗動胎也千金用半夏茯苓湯二劑次用茯苓丸懷妊愛酸乃肝臟之虛不能榮養其肝肝虛故愛酸物戴氏云惡阻者謂婦人有妊噁心阻其飲食也肥者有痰二陳加枳術瘦者有火異功加芩連胎動懷胎數動此胎氣熱所以逆上而作喘急也急用條芩香附白朮之類腹中滿痛叉心不得飲食千金用黃芩白朮芍藥煎服令微下水則易生月飲一劑為善因惱怒而胎動不安者沉香降氣散或四制香附一味為君加歸艾為散鹽酒煎和滓服虛者八珍去茯苓加黃芩紫蘇陳皮名安胎飲又氣虛少食四君子加紫蘇陳皮血虛多熱四物加黃芩白朮胎氣鬱滯紫蘇飲脾氣虛弱六君子鬱結傷脾歸脾湯鬱怒傷肝脾者四七湯加芎歸怒動肝火者小柴胡加朮安胎之法有二有因母病以致胎動者但治母病其胎自安八珍湯加膠艾黃耆氣滯者去茯苓加蘇橘黃芩因胎動而致母病者安胎而病自愈紫蘇飲加茯苓白朮阿膠砂仁千金治妊娠二三月至七八月胎動不安腰痛已有所見者用膠艾湯服之則安身有微熱去艾葉甘草加續斷蔥白以蔥能散客邪兼安胎也鄭虛庵曰治胎前下血不止用大劑參術以安胎芎歸熟地黃芩白芍阿膠以止血砂仁行氣以止痛不可行動但安臥養胎自愈若傷動胎氣而下血不止急用紫蘇飲若胎未損服之可安已損服之可下若純用四物湯陰藥不得陽生陰長之功非但胎不能安每致腹痛少食脾胃愈虛而愈不安矣漏胎下血妊娠經水壅之以養胎蓄之以為乳若經水時下此衝任氣虛不能約制而然千金云妊娠血下不止名曰漏胞血盡則死宜服乾薑地黃散氣虛乏力少食者宜益氣固胎切勿泛用養血之劑四君子去茯苓加膠艾芎歸黃耆砂仁若漏血腹痛者芎歸人參阿膠大棗煎服若因鬱怒發熱內熱加味逍遙散若血虛至夜發熱當歸補血湯勞動脾火加味歸脾湯若因房事下血過多作痛八珍湯加膠艾脾胃虛陷補中益氣倍升柴風熱加防風黃芩月數將滿而漏血者此必不守禁忌所致亦有瘀血凝滯不能轉運而下者氣血先傷後必難産宜服紫蘇飲或用益母草熬膏肥人砂仁湯調下虛人人參湯調下妊娠三月其經月來三五次但不多飲食精神如故此血氣有餘兒大自不來矣若作漏胎治之其胎必墮胎漏黃漿或如豆汁若肝脾濕熱用升陽除濕湯肝脾風熱加味逍遙散肝脾鬱結加味歸脾湯脾胃氣虛七味白朮散脾氣下陷補中益氣湯肝經風熱防風黃芩作丸服風入腸胃胃風湯大全方治妊娠忽然下黃汁如膏或如豆汁胎動腹痛用黃耆一兩川芎一錢糯米一合煎服暴下水者其胎必下若徐徐而下者可用補氣安胎藥主之驚胎僵仆妊娠負重跌撲凝血作痛欲服活血藥則恐傷胎不服則傷血不去治之當辨胎之死生如無別證只用黑糖熬枯入紅酒童便調服細嚼連皮胡桃肉過口死者當下生者其痛即止如余傷未盡痛未止四烏湯加延胡木香傷去而胎氣未安紫蘇飲加童便砂仁傷重者香殼散加熟地當歸以護胎勢劇者下瘀血湯加芎歸酒煎以去血血去則胎自安然須詳慎若昏睡語言如狂此血迫心包當歸活血湯如腹中重墜按之冰冷此胎氣已傷急用香桂散加酒大黃生附子下之若口中覺穢氣者急用平胃散加芒硝下逐之若因怒跌僕或手足抽搐者紫蘇飲加鉤藤鉤子去血過多八珍湯去茯苓加膠艾黃耆胎上逼妊娠胎動氣逆皆由調養失宜致胎逆上紫蘇飲為必用之藥飲食不甘兼四君子有熱加芩梔歸芍若惱怒傷肝致胎逆上加味逍遙散因鬱結傷脾胎氣不安加味歸脾湯大抵胎氣逆上皆屬火旺急用芩朮香附之類不可服大寒之藥反致他變妊娠遍身痛或衝心欲死不能飲食緣胎有水致痛也千金鯉魚湯或用白朮五錢黃芩二錢白芍四錢入活鯉魚約重半斤外一尾煮湯代水煎服妊娠胎動晝夜呼叫口噤唇搴及下重痢不息者用艾葉五兩以好酒五升同煮三升去滓更煎取一升服口閉者開口灌之藥下即瘥臨月胎上逼心嘔噦欲死急用童子小便灌之即下或烏梅肉十枚研爛入生薑三片煎湯灌之亦下取酸以降斂之兼辛以散火氣之逆也陳良甫治一婦孕七月忽然胎上衝心而痛坐臥不安醫治不效又作死胎治而用萆麻麝香研貼臍中命在垂亡陳診之兩尺脈皆絶他脈和平曰此子懸也若是胎死必面赤舌青今面不赤舌不青其子未死是胎上逼心以紫蘇飲治之十服而胎安矣安胎婦人半産多在三個月及五月七月除跌撲損傷外因內熱而虛者為多曰熱曰虛當分輕重若前次三個月而墮則下次必如期復然蓋先於此時受傷故復至期必應乘其虛也遇有半産者須多服養氣血固胎息之藥以補其虛損下次有胎先於兩個月後即用固胎藥十數服以防三月之墮其有連墮數次胎滑甚者服藥須多久則可留八珍加陳皮膠艾條芩多氣加香附砂仁肥盛有痰加半夏若瘦而多渴者禁用懷妊三四月肥盛色白氣虛者用白朮一倍人參續斷山藥香附各半倍枳實湯泛為丸朝暮砂仁湯下三錢肥盛色蒼氣實者不須服藥至七八個月但服砂仁湯或紫蘇湯足矣瘦而色白虛弱者白朮二倍人參一倍山藥續斷芎歸各半倍陳米飲和丸朝暮沸湯下三錢瘦而色蒼血熱者酒煮條芩四制香附各一倍四物各半倍蜜丸朝暮沸湯下四錢至八九月肥盛色蒼者必用枳殼蘇梗以順其氣慎不可用補氣之藥非但參術當禁厚味亦宜節省肥白氣虛者則人參白朮必當加用但補氣藥中必兼香附砂仁以流動其氣若色白怯弱者全以補養氣血為主非但枳殼蘇梗輩不可用即砂仁亦不宜也誤耗其氣必致難産若色蒼形瘦者此氣血流薄當無難産之患或久抱鬱結之氣間或有之多服逍遙散可也有誤服行胎毒藥胎動不安者古法用生甘草黑豆淡竹葉煎服若發熱用香豉然不若頻與熱童便尤良以其能解藥毒也血下不止或上溢而為吐衄者四物換生地加阿膠山梔炒黑蒲黃若胎傷不安者消息緩急虛實治之凡妊娠脈宜滑利數實大忌遲澀浮緩半産半産俗名小産蓋由衝任氣虛不能攝養或攧撲閃墜致氣血損動或因熱病溫瘧之類薛立齋云半産重於大産蓋大産如果熟自脫小産如生採破其皮殼斷其根蒂豈不重於大産但人輕忽致死者多治法宜補形氣生新血去瘀血若未足月痛而欲産八珍去茯苓熟地加膠艾耆草若胎下而血不止參耆朮草膠艾歸芍之類有熱加炮薑茯苓半産而心腹痛或發寒熱以手按之愈痛者宜散瘀血芎歸延胡桃仁香附丹皮澤蘭童便之屬若按之則痛緩是血虛八珍去芍加炮薑若痛而嘔吐作瀉是胃虛六君子加炮薑凡胎氣弱欲小産者八珍湯固之若出血過多而發熱聖愈湯汗不止急用保元湯發熱煩躁肉瞤筋惕十全大補湯大渴面赤脈洪而虛當歸補血湯身熱面赤脈沉而微四君子加薑附東垣云婦人分娩及半産漏下昏冒不省瞑目無所知覺蓋因血暴亡則心神無所養心包絡火上熾故令昏冒火勝其肺故令瞑目不省人事慎不可用寒涼瀉火之藥蓋瞑目之病悉屬於陰即如傷寒鬱冒得汗而解必當補而升舉之古法用全生活血湯其間風藥龐雜而無陽生陰長之功宜補中益氣加門冬五味或大劑獨參湯尤妥血若暴下是秋冬之令太旺今舉而升之助其陽則目張而神不昏矣石頑治一婦懷孕六月因喪子悲哭動胎醫用黃芩白朮輩安胎藥二服不應改用枳殼香附紫蘇砂仁理氣一服胎遂上逼心下脹悶喘急口鼻出血第三日午後來請石頑薄暮往診其脈急疾如狂風驟雨十餘至則不至頃之復至如前因諭之曰此孕本非好胎安之無益不若去之以存母命因思此胎必感震氣所結震屬木惟金可制令以鐵斧烈火燒紅醋淬乘熱調芒硝末一兩灌之明日復來請云夜半果下異胎下後脈息微和神思恍惚所去惡露甚多又與安神調血之劑數服而安胎不長養石頑曰胎之長養皆賴母之脾土輸氣於其子也脾為一身之津梁主周身之運化在臟為土長養萬物莫不由此故胎之生髮雖主腎肝而長養實關乎脾所以治胎氣不長必用八珍十全歸脾補中之類助其母氣其胎自長多有延至十二三月而産者觀瘠薄之土雖藝不獲得沃澤灌溉便能成實義可見矣亦有妊母氣血自旺而胎不長者此必父氣之孱弱又當大劑保元專補其氣不得雜一味血藥助母則子氣方得受益復有胎氣因妊母舉動失措致兒內失榮養不能長髮仍不隕墜者此與果實幹萎在枝無異以妊娠氣血無恙但子不得稟母氣耳非若妊娠有疾枝傷果墜之比也過期不産月數過期而不産者屬氣虛亦有因胎漏而産遲者嘗見妊娠下血胎雖不墜其氣血亦虧多致逾年不産或十四五月而産者俱是氣血不足胚胎難長故耳凡十月之後不生者當大補氣血庶分娩無憂又過期不産而脈沉細但當臍下悸動此為瘀積化水當作鬼胎治之許裕卿治邵涵貞內子孕十七月不産不敢執意憑脈問諸情況果孕非病但云孕五月以後不動心竊訝之為主丹參一味令日服七錢兩旬余胎下已死而枯其胎之死料在五月不動時經十三月在腹不腐而枯如果實在樹敗者必腐然亦有不腐者則枯胎之理可推也石頑曰余昔治馬雲生婦孕十三月不産脈來微結為處十全大補湯服至二十餘劑而下胎枯色白所治雖異而胎枯則一也咳嗽娠婦咳嗽悉以安胎為主風邪傷肺香蘇散寒邪傷肺小建中湯若肺胃氣虛異功散脾肺氣虛六君子加當歸久嗽不愈者多因脾肺氣虛腠理不密復感外邪或因肺虛陰火上炎所致有外邪者內補當歸建中湯加細辛陰火炎者六味丸加麥冬五味子煩妊娠苦煩悶頭目昏重是心肺虛熱或痰積於胸吐涎惡食千金竹瀝湯若吐甚則胎動不安煩悶口乾不得眠者加味竹葉湯氣虛者倍人參氣滯紫蘇飲痰滯二陳加白朮黃芩枳殼脅滿寒熱小柴胡脾胃虛弱六君子加紫蘇山梔類中風此證若不早治必致墮胎宜服紫蘇飲若口噤不能言用白朮三錢荊芥穗二錢黑豆三合炒淋酒煎服得汗即愈口噤者拗口灌之可服三四劑至有目昏黑而厥者胎前絶少但一有此證即是兒暈屬氣與痰故目昏黑髮厥只服紫蘇飲慎不可服蘇合香丸及烏藥順氣散等傷風妊娠傷風香蘇散去香附加蔥豉咳嗽多痰加桔梗或紫蘇飲加蔥豉安胎為妙嗽兼瀉氣口脈滑實有力中有宿食者胃苓湯去蒼朮俟脾胃實而治嗽總不如濃煎蔥頭湯為上蓋風藥皆能墮胎故嗽喘胎寒多用連須蔥湯大能安胎散氣胎始無虞或加香豉尤妙若不喘者紫蘇飲加砂仁童便傷寒冬時為寒所傷輕者淅淅惡寒翕翕發熱微嗽鼻塞數日乃止重者頭疼作痛先寒後熱久則傷胎藥多避忌不與常婦概治但服蔥白香豉湯汗出則愈千金治妊娠傷寒用蔥白十莖生薑二兩水煎熱服取汗即安治妊娠熱病用蔥白五莖香豉一升如前服法取汗若胎傷未死但用蔥一把水煮食之汗出即安若胎已死須臾自出不應加生薑蘇葉不可輕用發表藥若用發表豈但墮胎母命難保惟蔥白香豉湯香蘇散可解邪氣又可安胎妊娠溫熱時行及傷寒邪氣內犯熱毒迫胎並宜千金石膏大青湯急救庶可保全遲則不救凡胎前疫證與傷寒陽明府證內實便祕須急通大便方不損胎若大便自利者真氣下泄胎必難保惟大小便如常知里無熱則不傷胎氣瘧妊娠痁瘧無論胎息月數多少總以安胎為主而舉世安胎無過黃芩白朮原夫胎息之安與不安全在母氣之調與不調故安胎先安母氣安有母氣乖戾胎氣獨安之理當知黃芩之安胎惟治熱盛胎動不寧白朮惟主脾虛不能保胎設氣虛胎氣下墜誤用黃芩氣滯胎不轉運誤用白朮滋害何可勝言所謂先安母氣者隨其形體之肥瘦氣血之偏勝也若妊娠形盛色蒼肌肉䐃堅者必多濕多痰無論何疾必顯濕熱本病脈多滑實有力絶無虛寒脈弱之候可峻用豁痰理氣藥治其本質然後兼客邪見證而為製劑治宜二陳湯隨經加透表藥或合小柴胡用之蓋柴胡為瘧證之嚮導故多用之然有自汗過多尺中微弱或熱盛手足清者始終不用柴胡而用建中桂芍收功者或見煩渴脈實大便六七日不通陽明府實又宜涼膈去硝黃加鮮首烏調之須知稟質堅固者其氣多滯內外壅遏但有濕熱絶無虛寒之患如元氣本弱或病後得之必需理脾行氣惟六君子湯為合劑有痰食結滯則加枳實草果內有寒則加炮薑外有風即加桂枝胎動上逆不安則加子芩胎下墜則加柴胡倍人參以人參為舉胎聖藥也間有不應者又需補中益氣大劑人參以升舉之中有留滯則枳實理中加柴胡桂枝合表裡而治之若夫日作間作日晏日早晝發夜發寒多熱多及審飲食便溺動靜安危之法則與常瘧無異也大抵病邪初發元氣未耗疏風滌痰消導飲食在所必用然須大劑白朮培護中土以脾胃為一身之津粱土厚自能載物也其最可慮處尤在三四發至六七發其勢最劇若過半月雖淹纏不止邪熱漸衰可無胎隕之虞矣或有瘧久氣血虛敗而小産者此皆失於調治也若六七發後不止即當和營健脾若稟質柔脆者雖有風邪不得純用表藥以風藥性升能使胎氣上逆而為嘔逆喘脹膈塞痞滿之患雖有實滯不得過用降泄之味能引邪氣下陷致胎墜不安而為泄利不食小腹疼重之患矣若疫瘧毒盛勢劇急與涼膈承氣黃連解毒救之瘟瘧惛惛不爽煩熱大渴或壯熱無寒或先熱後寒者當與桂枝白虎人參白虎撤其在裡之熱不可與夏秋痁瘧比例而推也蓋有是證而用是藥有故無隕亦無隕也惟在速祛邪氣以救胎息之燔灼若遲疑未決下手稍軟救無及矣痢妊娠痢下有三禁五番一禁蕩滌腸胃二禁滲利膀胱三禁兜澀滯氣蓋蕩滌則陽氣下陷胎氣愈墜滲利則陰津脫亡胎失榮養兜澀則濁氣愈滯後重轉加故善治妊娠之痢者惟以調氣為先蓋調氣之法如爐冶分金已敗之積沫則隨氣而下未傷之津液則統之而安不善治痢者惟守通因通用痛無補法之説峻用苦寒蕩滌使未傷之津液溷廁敗穢之中建瓴而下而胃氣有權者尚可勝其藥力譬諸引汲灌渠一決而蕩無餘滓陳腐去而倉廩自修津氣自復也若腎氣不固之人祕藏不密五液盡隨轉利藥注下使既病之津液更加猛利峻攻不致精神離散血液告竭不已況能保其胎息乎夫調氣之藥有三善一使胃氣有常水穀輸運二使腹滿腹痛後重漸除三使濁氣開發不致侵犯胎元此治妊娠下痢之大端也所謂五審者一審飲食之進與不進夫下痢乃腸胃受病若痢勢雖甚飲食無妨者易已故痢以噤口為最劇在初起濁邪全盛之時不足為慮但要清理積滯飲食自進矣若七日以後尚不能食脈反數盛此必初時失於清理之故急需調氣理中則積沫漸下飲食漸進矣或初時能食至一旬一氣後反不能食脈息不振此必蕩滌太過胃氣受傷所致亦有過用芩連檳朴苦寒破氣而致厄逆嘔噦者胃氣大敗最危之兆惟峻與溫補庶可挽回若脈見數疾無倫或翕翕虛大或歇止不前或弦細搏指者皆胃氣告匱百不一生矣二審溲之通與不通下痢清濁不分若痢雖頻而水道順利者胎必無虞若月數將滿胎壓膀胱每多溲便頻數轉胞脹閟之患切禁利水傷津急與開提自通但須察其脈無過旺過硬之形便宜補中益氣稍加澤瀉車前以升清降濁投之無不輒應非特妊娠為然即平人久痢津液大傷而溲澀不通者亦宜上法也三審腹之痛與不痛下痢腹痛必然之理然間有濁濕下趨而無郁沸之火者則不痛也但此多見於肥白人之白痢若血痢與瘦人多火者罕見也治宜調氣運積不用清火明矣原其腹痛有寒熱之分痛有止歇痛則奔迫下墜至圊不及者火也痛自下而攻擊於上者火也痛而脹滿不勝摩按熱飲愈甚者火也實也痛無止歇常時痛而無絞刺者寒也痛自上而奔注於下者寒也痛而不滿時喜溫手摩按飲熱暫緩欲至圊而可忍須臾者虛也寒也大約初痢脹痛為熱為實久利㽱痛為虛為寒即初因火注切痛痢久氣傷亦必變為虛寒也故久痢腹痛之脈無論大小遲數但以按之漸漸小者並屬虛寒急須溫補慎勿利氣惟急痛脈實久按不衰者可稍用炮黑薑連和之四審後之重與不重下痢後重濁氣壅滯也夫開通壅滯必以調氣為本在妊娠尤為切要調氣則後重自除而胎息自安矣但初痢後重首宜開發其滯若久痢後重又當升舉其陽陽氣升則胃氣運胃氣運則周身中外之氣皆調達而無壅滯之患矣故治孕婦之後重無問胎之大小但脈見有餘則宜調氣脈見不足便與升提雖血痢亦宜陽藥一切滋膩血藥總無干預以氣有統血之功則血無妄行之慮也五審身之熱與不熱下痢為裡氣受病若見身熱表裡俱困元神將何所恃而得振祛邪之力哉惟人迎之脈浮數可先用和營透表之法分解其勢然後徐行清理若初痢不發熱數日半月後發熱脈來漸小或虛大少力者此真陰內亡虛陽發露於外在平人或可用辛溫峻補斂之以歸其源若妊娠則桂附又難輕用惟藉參朮薑萸膠艾之屬非大劑濃煎峻投難望其轉日回天之績也或痢久衛虛起居不慎而感冒虛風發熱者但當察其左手三部必顯浮緩之象又需理中湯加桂枝合表裡而治之以內氣久虛之邪不得參術助其中氣則客邪不得解散也五審既明三禁勿犯又當審察其積之稠與不稠色之鮮與不鮮則元氣之厚薄病患之寒熱可曉然無惑矣如赤白寒熱之辨昔人擬議紛紜要非正論以大略言氣分之病其色白血分之病其色赤氣血紊亂則赤白兼併蓋氣屬陽陽傷則受冷居多即有火注下迫皆陽氣鬱遏本寒標熱之證不可純歸於熱但當驗其積之稠黏如糊色白如脂方可暫與清熱治標若汁沫如水色晦如塵急須溫理其氣即有熱證皆假象無疑也血屬陰陰傷則受熱居多然多有氣傷陽不統陰之血又不得不從事於辛溫也故治血痢尤當以色之顯晦驗其虛實寒熱此義前人未發也故凡積之瘀晦不鮮清稀不稠者皆系虛寒之候即前所云陽不統陰之血急投人參薑艾庶或保全倘不審而誤餌芩連是速其斃也惟積之稠黏紫赤而光澤者合用苦燥以堅腸胃之滑脫又必佐以調氣之藥則陰邪得以解釋非若白痢之不可雜以芩連芍藥等味引領滯穢襲傷陰血也況有病後瘧後或本質虛羸之人及秋冬天令寒冷時下痢加以胎孕扼腕可與平人夏秋之痢同日而語哉豫嘗用厚朴湯去乾薑治妊娠能食腹脹後重積穢稠黏之白痢甘草乾薑湯理中湯治妊娠腹痛少食積沫清稀之白痢厚朴生薑甘草半夏人參湯治妊娠腹脹後重赤白相兼之痢黃芩芍藥湯送香連丸治妊娠能食後重積穢稠黏之血痛連理湯合千金三物膠艾湯治妊娠少腹疼重瘀晦不鮮或間有鮮血之痢駐車丸治妊娠發熱後重陰虛畏食之血痢白頭翁加甘草阿膠湯治妊娠熱毒內攻噤口不食腹脹後重膿血稠黏之痢千金膠艾榴皮湯治妊娠膿血清稀胎動不安久泄不止之痢補中益氣湯治妊娠先瘧後痢及瘧痢齊作元氣下陷胎氣下墜小便頻數或轉胞不得溺之痢以上諸方並加砂仁以調其氣烏梅以調其血未常不隨手輒效也石頑治郝失記其字媳懷孕九月患瘧三四發後即嘔惡畏食診其脈氣口澀數不調左關尺弦數微滑此中脘有冷物阻滯之候以小柴胡去黃芩加炮薑山楂四服稍安思食但性不嗜粥連食肺鴨之類遂瘧痢兼併胎氣下墜不安以補中益氣去黃耆加香砂烏梅五服而産産後瘧痢俱不復作矣其僕婦産後數日亦忽下痢膿血至夜微發寒熱小腹脹痛與千金三物膠艾湯去榴皮加炮黑山楂六服而瘳子淋妊娠小便淋者乃腎與膀胱虛熱不能制水然妊娠胞系於腎腎間虛熱移於膀胱而成斯證若小便澀少淋澀生料六味丸加麥冬五味肉桂車前若膀胱陽虛陰無以化腎氣丸肺氣虛而頻數短少生脈散加山藥澤瀉若小腸熱小便赤澀導赤散若肺虛膀胱熱而氣化不行生脈合導赤散若因肺經蘊熱黃芩清肺飲肝經濕熱加味逍遙散膏粱厚味加味清胃散苦因勞役所傷或食煎爆小便帶血此血得熱而流於脬中補中益氣加丹皮梔子若因脾胃氣虛胎壓尿脬而胎脹腹痛八珍湯倍茯苓加橘半空心服服後探吐藥出氣定又服又吐數次必安遺尿妊婦遺尿不覺胎滿故也千金白薇散薛氏云若脬中有熱加味逍遙散脾肺氣虛補中益氣湯加益智仁肝腎陰虛六味丸孕後有水從陰戶出不止者千金鯉魚湯加肉桂人參諸血妊婦尿血熱乘血分以致流滲於脬名子淋導赤散若因怒動肝火小柴胡加山梔若脾氣下陷及勞動脾火補中益氣加茯苓車前若因厚味積熱加味清胃散若因肝脾血熱加味逍遙散妊娠吐衄由七情臟腑所傷氣逆於上致血上溢不止心悶甚者多死或墮胎也若肝經怒火加味逍遙散膏粱積熱加味消胃散鬱結傷脾加味歸脾湯肺經有火黃芩清肺飲因氣鬱滯紫蘇飲氣不攝血補中益氣去升麻加煨葛根腎經虛火六味丸加麥冬五味咳嗽咯衄胎前皆不宜見面赤聲啞不治咯血吐血多致墮胎胎賴血養不宜漏溢紫蘇飲加條芩如産後吐衄咯血者皆難治漏極如同月水胞干胎死母亦難保腸風藏毒腸胃不調脹滿下血者平胃散去蒼朮加槐角防風當歸烏梅諸痛宿有偏正頭風川芎茶調散宿有冷痞痰飲結聚或新觸風寒邪正相擊上衝於心則心痛下擊於腹則腹痛痛不已則胎動不安此病多寒多食間有屬熱者並宜正氣散寒加木香炮薑食積發熱加芩連炮薑氣加砂仁香附痰加橘皮生薑若因錯雜之邪當審其因而治胎前産後心痛用川楝茴香炒各三錢鹽炒艾葉錢半水煎服之腹痛或發或止名曰痛胎屬血少四物加香附為末紫蘇湯送下氣滯者紫蘇飲胃口痛禁用指迷但宜養胃湯妊娠腹中滿痛叉心不得飲食千金芩術芍藥湯脅痛其故有三哭泣也內傷也惱怒也有胎不宜服行傷破氣藥只宜童便和酒服之或紫蘇飲去參用白芍當歸加砂仁童便雖曰傷重勿服傷藥且須安胎為要背痛氣滯也紫蘇飲腰腹背痛是因勞傷損動痛不止多動胎氣補中益氣加續斷杜仲有因淋證作痛者居多當審治之走注痛者敗血入經之證四烏湯加薄桂杜仲續斷肥盛人多濕熱腰痛重墜或下白物者二妙散加柴胡防風茯苓半夏氣血鬱滯遍身拘急不舒而痛眼生黑花夜不能臥紫蘇飲加枳殼桔梗腰痛甚者腎虛極也其胎必墮急服八珍湯加膠艾黃耆或紫蘇飲加減臍下冷痛腹脹虛疼小便頻數大便虛滑皆食生冷所致小建中加炮薑木香不應更加茴香良薑小腹痛由胞絡虛熱相搏所致紫蘇飲加生薑虛寒用膠艾湯不應寒甚也加桂附溫之內傷甚者胎下無疑若服不效須視小腹近下處若腫脹浮薄發光者孕癰也千金托裡散或薏苡仁煎汁飲若心腹急痛煩悶面青冷汗氣絶血下不止其胎上衝者不治子腫妊婦四肢浮腫或腹大者其證有二有水腫有胎氣腫然胎前水腫者少只是胎氣謂之子腫乃氣病也蓋因臟腑本虛脾土不能制水血散四肢遂腹脹手足面目皆浮甚則通身腫滿心腹急脹悉宜紫蘇飲小便不利者其胎氣兼水氣也紫蘇飲加澤瀉白朮茯苓木通若發浮氣喘腹脹服藥後腫退皮寬六君子調理若面目虛浮肢體如水氣腫脹全生白朮散不應六君子加腹皮車前下部腫甚補中益氣加茯苓或因飲食失宜嘔吐泄瀉此是脾胃虧損六君子加炮薑木香香附若足指發腫漸至腿膝喘悶不安或足指縫水出名子氣乃婦人素有風氣或衝任有血挾風水不可妄投湯藥二陳加烏藥香附木通脾胃虛弱更加參術兼進逍遙散不應紫蘇飲凡妊娠經血壅閉忽然虛腫乃胞中挾水水血相搏脾胃主肌肉而惡濕濕漬氣弱則肌肉虛水氣流溢則身腫滿或因泄瀉下痢臟腑虛滑耗損脾胃或因寒熱煩渴引飲太過濕漬脾胃皆能使手足頭面浮腫然水漬於胞兒未成形則胎多損壞及其臨産脛腳微腫乃胞藏血少水多水出於外故現微腫則易生也妊娠通身浮腫胸脅不分或心腹急脹名曰胎水千金鯉魚湯有妊娠腹脹服前湯三五劑大小便皆下惡水腫消脹去遂下死胎此證蓋因懷娠腹大終不知胎水之患也鄭虛庵曰身半以上腫者發汗身半以下腫者利小便上下俱腫汗利分消其濕若唇黑缺盆平背平臍突足底平皆不治不語不語者多為痰閉心竅亦有啞胎不須服藥岐伯曰人有重身九月而喑此胞絡之脈絶也胞絡者繫於腎少陰之脈貫腎系舌本故不能言無治也當十月復凡患此者濃煎生脈散空心服地黃丸助肺腎之氣以養胎若與通聲開發之藥誤矣譫語妊娠譫語為臟腑熱極之候急宜童便時時灌之不應用生地黃黃連散清其血中之火庶胎得安脈實者加酒大黃下之下遲則傷胎也亦有傷胎下血心神無主而譫語雖用峻補亦難得效若舌青者子死腹中急當下之若雙胎一生死者必腹中半邊冷半邊熱因母患熱證臟腑熱甚蒸其胎兒因致死但服黑神散加生蒲黃以暖其胎胎即出矣胎未死並泥塗臍以越胎氣多有保全者子懸胎氣湊泊上心忽然昏暈人事不省謂之子懸必妊娠素多鬱悶痰氣壅塞致胎不安乘其鬱火升迫心下喘脹腹痛甚則忽然仆地急宜童便灌之次以紫蘇飲加鉤藤茯苓薑汁童便將産時昏眩亦宜紫蘇飲若誤作中風治之必殆子癇妊娠體虛受風則口噤背強冒悶不識人須臾自蘇良久復作謂之風痙亦名子癇甚則角弓反張逍遙散加羌活羚羊角棗仁鉤藤豆淋酒煎服鄭守恆云子癇一證人不易識或眩暈或冷麻重至仆地不省人事驗其平日眼目昏沉或認白為黑認黑為白是其漸也乳泣腹啼未産乳汁先下此名乳泣生子多不育又有兒在腹中啼哭者因妊婦登高舉臂脫出兒口中血乳以此作聲令妊婦曲腰就地如拾物狀或令掃地仍入兒口即止亦有胎熱不安而啼者以黃連濃煎汁妊婦時時呷之鬼胎古人論鬼胎之説皆由其人陽氣不足或肝氣鬱結不能生髮致陰血不化而為患也有因經行時飲冷停經而成者有郁痰驚痰濕熱凝滯而成者有因恚怒氣食瘀積互結而成者故凡鬼胎之脈必沉細弦澀或有時虛浮有時沉緊皆陽氣不充之驗其腹雖漸大而漫起重墜終與好胎不同當臍或臍下左旁雖微動亦與真胎迥別治宜理氣行血為主如因於郁者逍遙散加莪朮烏藥香附麝香因於寒者理中加烏頭蓬朮香附因於痰者導痰加香附烏藥乾漆炒桃仁因於驚者四七湯加茯神辰砂桂心麝香因於氣食者大七氣加酒麴因於濕熱者當歸龍薈丸加蓬朮蘇木香附因血結者代抵當去芒硝大黃加焰硝硫黃五靈脂虛人只用十全大補加桂附是可緩圖收功不可峻用巴豆芫花莽草鬼臼等毒藥急追取咎也嘗見得孕經止尺脈或澀或微弱而無他病此子宮真氣不全精血雖凝而陰不能化終不成形每至産時而下血塊血胞若此必大劑溫補預調而後方能成孕也下私胎法妊娠諸病以安胎為主慎勿妄下夭傷人命造孽非小有生育多畏産而欲下者當與安胎之品惟私胎方可下之香桂散加烏頭尖一錢立效若本元虛寒者得辛溫之藥愈助其生髮之氣宜土牛膝一兩歸尾三錢川芎一錢蘇木三錢桃仁泥三錢穿山甲一錢三四服必下煎成加麝香尤速或曲四兩酒三大盞煎取一盞五分綿濾分溫三服立下又方大麴五升清酒一斗煮二沸去滓分五服隔宿勿食但再服其子如糜母無疾苦又方麥糵一升為末和水煮二升服之立下又方以附子二枚為末醇酒和塗右足去之大良然不若以牛膝粗者取五七寸候著子宮將二指夾著送進捻入三寸許以線系定用帛兜束腰中不使退出毋論月數多少一夕即下無不應者斷子法用酒麴一升無灰酒五升煮至二升半濾去滓分三服經候至前一日晚進一服次早五更一服天明二服月經即行終身無妊矣此千金下死胎法也若婦人四十餘欲其經斷以前方加牛膝紫葳各一兩經行後如前法服之即斷又木耳煅灰存性熬枯黑糖調經行後或産後月內服之即不孕孕婦服其胎即下又頭蠶子三錢煅灰存性産後三五七朝內陳酒調服則終身不孕雖虛人亦無妨礙臨蓐扶持傷胎胞干難産産變摩揣臥法催生飲食宜忌備法下死胎法胎衣不出交骨不開陰門不開子宮不收扶持妊娠九個月宜服達生散數服若肥盛氣實者用枳殼二兩香附甘草各一兩為散沸湯下二錢早暮各一服血實色蒼者枳殼二兩當歸一兩為末煉蜜丸空心酒服五十丸然元氣虛弱者惟大劑紫蘇飲鼓舞其氣生産必易若誤服前藥反耗其氣多致難産傷胎臨月胞水不破血先下者此是傷胎非産也大劑保元湯加當歸童便最為得力因臨産行動已傷其胎而發熱者多危紫蘇飲倍人參胞干臨蓐胞水惡露破盡致兒干閣艱澀達生散去朮倍人參若胞衣破久其血已涸元氣困憊急用上好人參兩許當歸二錢煎飲盡則再煎助其氣血最為得力舍此而遍用催生耗氣諸藥總無一效也難産難産者腹痛久而未産也若惡露少者雖久不妨此胞水未破俟胞水行時自産若連腰痛甚者將産也蓋腎候於腰胎繫於腎故也如胞水先破惡露行盡纍日不能下者當補養氣血慎不可用破血耗氣之藥急用佛手散加人參二三錢入熱童便調服此取純陽生氣切不可停冷冷則生氣去而無益於治也或用前藥送兔腦丸亦妙難産須擇精細穩婆最為切要惟胎氣逆上全在醫治之功如氣滯逆上頻以熱溲便灌之但得白色者即佳不必拘用童子之便也氣虛不能駕馭其胎而上逆者獨參湯加溲便服之甚至昏暈吐沫搐溺譫語者急控頂發抉開牙齒以溲便灌之稍遲則不救矣丹溪云世之難産者往往多見於鬱悶安逸之人富貴奉養之家若辛苦貧賤鮮有之也古方止有瘦胎飲一論其方為湖陽公主而作恐非至當之言余族妹苦於難産遇胎則觸而去之豫甚憫焉視其形弱而勤於女工知其氣虛久坐氣不運而愈弱兒在胞胎因母氣虛不能自運耳當補其母之氣則兒運易産令其有孕至六月來告遂以紫蘇飲加補氣藥與數十帖得男甚快因以此方隨母之性稟與時會加減服者無不應驗臨蓐時去川芎生薑加白朮黃楊腦則腹不覺痛母亦無病因名方為達生散云難産及胞衣不下急於産母右腳小指尖頭上灸三壯炷如小麥大火去即産凡難産兒下多有不哭者切勿燒其臍腸後必不育凡臍帶粗大或青色斷多鮮血者及落下過早過遲者皆不育誠驗石頑曰難産之患多緣婦人稟性執拗懷孕之日不檢束身心任意作為以致氣血乖違胎孕偏著臨産之際雖遍用催生方藥略無一驗以數月失和之胎息一時豈能克應況有坐草多日血氣大虧者惟大劑獨參湯峻補其氣方能迸力送産獨怪世之穩婆及生産家左右之人皆堅持産中禁用人參之説坐視其斃者多矣安知産中誤用人參為害者皆是力作勞勩軀體堅韌之人雖有疾病祛之則安奚俟補為設強與服之心膽先裂是不能無助火發熱凝滯惡露之患矣若夫膏粱逸豫豢養柔脆之家平時慣服服之泰然何助火滯氣之有余室人素稟孱弱而多沉鬱每産必用人參一二兩濃煎時呷以助其氣聽其自産雖二三日無恙兒媳亦患氣滯難産穩婆難阻服參至第四日子殞腹中不得已煎大劑參湯灌之産後方云未服參以前耳聵目盲惟見滿室紅光繼而漸漸紫黑及服參後開眼即能辨物神氣亦能主持腹中便有痛陳始信服參之驗近日同道王公峻室人難産竟日不下自煎人參七錢頓服便産其助力之效非他催生藥可比因詳述以破世俗之惑産變兒未生先露手臂謂之橫生蓋因産母用力太早之故當令安然仰臥使穩婆推入盡上以中指抵其肩漸扳兒耳而正之令服大補氣血藥如獨參加當歸童便之類切勿驚怖産母使氣血凝滯關竅轉閉也候兒身正門路皆順然後用力胎氣不足關鍵甚牢用力太早兒不能自順只一直下先露其足謂之倒生亦如前法用力即下矣兒方回轉未能全正卻被産母用力致兒頭偏左偏右雖近門路不能即下者謂之偏産亦如前法兒方出胞氣力不續身未轉運卻被産母用力一迸則兒臀先露謂之坐臀生亦如前法令服補氣和血之藥安臥靜養候其力完轉運然後用力兒出胞轉身時偶然臍腸盤於項上牽繫不能即下者俗名背包生亦宜推入輕輕撥去然後用力兒出胞時頭必轉向産門自然正産若無力轉運腳踏胞衣臍腸先出謂浪臍生急令穩婆理清推入稍俟氣平乘勢就其腳下不可推轉久延久則臍腸復下復難收拾矣人之二腸俱有脂膜聯絡間有生成無膜聯絡者則産時其腸隨兒而下謂之盤腸産須用漆器溫湯滌淨務令溫暖濕潤盛其所下之腸切勿稍沾塵垢及著乾物即不肯上而黏住斷絶矣全在穩婆精細為妙天氣嚴寒經血凝滯致兒不能下凡遇此際切不可就脫寒衣並不可坐臥冷處房中須宜火暖肩背須裹綿衣使血得熱則流兒易生矣若遇春秋偶寒亦如前法暑月當令産母在無風清涼處不可多人看恐人多熱氣遍襲蓋血得熱則散溢上蒸致令産母頭痛面赤不省人事謂之血暈若夏月風涼陰雨亦不可任意取涼恐生大病慎之慎之摩揣臨蓐腹痛切不可使穩婆摩揣探候雖水破痛極尤當忍之令人扶掖緩行則兒自順正豈有橫逆之患若胞水破兒未下謂之試水此産甚遲有隔二三日産者宜服八珍膠艾水止痛定至五六日産者甚多但覺腹中運動切不可容穩婆動手及産母用力蓋兒出胞時用盡其力不能即轉多有過數日方得力續轉運自然身正而下舉世之難産者雖由平日居處失宜往往皆是穩婆輕易動手摩揣所至所以田野村婦艱於産者絶罕惟富貴之家不習勤勞任意眠坐經絡凝滯恣情飲啖兒得肥甘長養倍常更多不禁房室頻泄母氣自不能如勤勞村朴之天生天化也況乎臨月一有腹痛即喚穩婆探候驚動胎氣傷其先天氣血之源多致子母俱傷亦有産後致變者皆産時臟腑受傷所致也即子之夭枉多緣先天之氣不得其全耳臥法臨蓐臥宜仰而正不可偏側坐蓐不可太早蓋男胎向內女胎向外皆首居上足居下臨産時必倒轉順出須再三緩緩扶掖走動使得其旋轉不然恐有橫逆之患催生坐蓐時用達生散去芍藥加枳殼黃楊腦童便然必待胞水破腰痛甚方與熱服不可太早早則先行惡露反致難産也凡十月未足臨産腹痛或作或止或痛不甚者名曰弄胎或腹雖痛甚而腰不甚痛者或胎高未陷者或穀道未挺迸者或水漿未破者或漿水雖出而腹不痛者皆屬氣虛並非正産之候惟宜獨參湯助之慎勿妄投藥餌致産母驚恐而妄亂用力直待子逼門戶腰重痛極眼中如火穀道挺迸時方可用力兼服催生藥如千金方用阿膠三兩滑石一兩車前子二兩為末飲服方寸匙不下少頃再服此藥臨時服之不可先服飲食宜忌臨蓐飲食宜調不可不食受飢使母無力尤不可過食太飽使兒氣不能運多致子母受傷及乎産後發熱泄瀉中脘結痛皆緣飲食所傷即湯水亦宜少用往往有膀胱破損良由引飲過多尿脬脹滿所致種種危候皆産前不慎之故尤忌飲酒每致血逆奔上急與熱童便壓之然多有不救者至於豬腎雞子之類皆難克化之物非但産後當忌臨産亦不可食備法産婦或不順理用萆麻子十四粒硃砂雄黃各五分蛇蛻一尺燒灰麝香一字為末將水和作一丸先用川椒湯洗臍中置藥於內再用紙數重覆蓋以帛系之即下下即去藥橫生逆生手足先出者以鹽擦兒手足心盤腸生而腸不收者用新汲水入酷噀面當自收上一法用萆麻子十四粒搗爛貼産母頂心其腸收上即去之一法以半夏末搐鼻中腸自上一方以萆麻油潤紙捻點燈吹滅將煙燻鼻中其腸即上下死胎法子死腹中者或熱病傷胎或顛仆高墜或驚動太早或觸犯禁忌或胎肥氣滯惡露已盡致胎乾子死身冷不能自出須驗産母面赤舌青腹中陰冷重墜是其候也然不若見紫黑血塊血縷尤為確候至若爪甲與舌俱青腹脹氣喘口中臭氣者危矣急令穩婆動手以法下之遲則不救古法雖有童便調朴硝半兩及平胃散水酒煎調朴硝虛寒用理中湯倍參煎調芒硝等法然有時輒應有時不應良由産母元氣盛衰不同能行藥力與不能行藥故耳亦有産難有兩兒一死一生者千金用蟹爪一升甘草二錢阿膠二兩以流水先煮蟹爪甘草去滓內阿膠煬化服之血凝不下加桂心三錢藥入死者即出生者即安神驗此千金法取蟹能散血而爪觸之易脫物類相感之應也又有子死腹中用黃牛屎塗母腹上立出者又有取灶心黃土為散酒服二錢匙立出者又有以夫尿煮沸服之者又有以冬葵子即向日葵子半升阿膠三兩煎服者又有用甘草筒桂蒲黃香豉煎成入雞子一枚調服者若冬月胎死堅硬腹中覺冷用香桂散加烏頭及黑神散黑龍丹皆可應用內外有邪者五積散最宜若死胎及胎衣惡血上逆搐嘔昏暈用小便乘熱灌之但得一口下咽節止若面赤舌青子死母活面青舌赤母死子活唇青吐沫或面舌俱青子母俱亡陸鬥岩治一婦有胎四月墜下逾旬腹脹發熱氣喘面赤口鼻舌青黑診之其脈洪盛曰胎未墜也面赤者心火盛而血乾也舌青口鼻黑肝氣絶而胎死矣內外皆曰胎墜久矣復診色脈如前以蛇蛻煎湯下平胃散加芒硝歸尾服之須臾腹鳴如雷腰腹陳痛復下一死胎而愈胎衣不出臍腸墜斷惡露入胞脹大不能出者二味參蘇飲童便和服壯實人失笑散以消瘀血甚則平胃散加朴硝下之胞衣不下古法用蛇蛻一條香油燈上燒研入麝香為末童便調服或加蘄艾阿膠蘇木各一錢麥芽末打糊為丸名烏金丸難産及死胎不出俱童便服之亦有單用蛇蛻酥炙為末童便下一錢匙者千金治胞衣不出胞爛喘急欲死用牛膝湯服之即下妊娠肥盛多痰阻逆氣道而致産難及子死胎干或子下而胎衣不出半夏為散尿服方寸匙連進三服並用吹鼻取嚏以激動關竅大妙常見下死胎胞衣用朴硝等法非惟不效即使得下胃氣大傷往往不能收功丹方用萆麻子肉研塗母右腳心胞下急洗去緩則腸亦出矣今人以産婦頭髮入口作嘔胎衣自出其法甚效如不出反逆上者必死交骨不開陰門不閉子宮不收三者皆元氣不足交骨不開者加味佛手散助其血氣補而開之古法用加味芎歸湯即佛手散加龜板灰血餘每見服此藥者惡血凝滯反成不救惟大劑人參童便入芎歸劑中助其血氣開闔之功立致也若見咬牙昏暈急以熱小便灌之稍遲則無濟矣若元氣不虛者只用佛手散小便服之單用小便亦得人參不必也陰門不閉者十全大補倍參桂補斂之若初産腫脹或焮痛而不閉者當用逍遙散加荊芥牡丹皮切忌寒涼子宮不收者補中益氣加酒炒白芍一錢肉桂五分補而舉之或助以外治之法如萆麻子貼頂心之類薛立齋治一婦子宮脹大二日方入損落一片如豬肝已而面黃體倦飲食無味內熱晡熱自汗盜汗用十全大補二十餘劑而愈仍復生育
