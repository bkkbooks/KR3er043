body:
  text: 卷十六祖方夫字有字母方有方祖自伊尹湯液一脈相傳與釋氏傳燈無異苟能推源於此自然心手合轍諒非時師所能測識也桂枝湯玉函治風傷衛氣脈浮緩發熱自汗營衛不和桂枝三錢白芍三錢甘草炙二錢生薑五片大棗四枚擘上五味水煎溫服啜熱稀粥一盞以助藥力覆暖取微汗效不汗少頃再服小建中湯玉函治風木乘脾寒熱腹痛桂枝湯倍芍藥加膠飴三錢黃耆建中湯金匱治虛勞感寒發熱自汗桂枝湯加黃耆錢半膠飴一合千金多人參二錢桂枝湯和營表藥倍芍藥加膠飴便能建立中氣以芍藥之酸斂護營血膠飴之甘培養中土更加黃耆以實衛氣營衛臟腑俱和而受益多矣千金於小建中方加入當歸名曰內補建中其調和中外之力可知陽旦湯千金治冬溫脈浮發熱項強頭痛桂枝湯加黃芩錢半陰旦湯千金治冬溫內寒外熱肢節疼痛中挾寒食桂枝湯加黃芩錢半乾薑五分陰霾四塞非平旦之氣無以開啟陽和桂枝湯原名陽旦開啟陽邪之藥也千金於中加入黃芩之苦寒性輕以治冬溫在表之邪熱仍以陽旦稱之若兼挾寒食再加乾薑之辛溫散結以治中土之停滯遂因之曰陰旦與經絡之陰陽風馬牛不相涉也千金獨活湯治風懿奄忽不知人咽中閉塞不能言四肢不收手足嚲曳桂枝湯桂枝易桂心去大棗加獨活栝蔞根生葛發其汗不得汗去獨活栝蔞根生薑加防己防風麻黃喑啞不語並皆治之當歸四逆湯玉函治陽邪入犯厥陰四肢厥逆桂枝湯去生薑加當歸三錢細辛通草各一錢邪犯厥陰之界有入無出雖有熱邪勢必從陰而後厥逆故厥陰篇中有厥深熱深之例以振發傳經之變端病邪至此最為緊迫醫者苟無成識於胸中臨病將何措指南陽先師乃毫不以厥逆為意仍取太陽例中桂枝湯方加入當歸協濟芍藥以護厥陰之營細辛引領桂枝以為厥陰嚮導通草通利膀胱以疏厥陰出路與桂枝平分力量為分解之捷徑雖厥陰與太陽兩經接壤邪既入陰斷無復傳陽經之理先輩六經例有不罷再傳之說大可噴飯而桂枝方中獨去生薑者恐辛辣性暴不待氣味入陰便從太陽開發轉虛其衛再有何力以振驅邪之任歟由是廣推大小青龍大小柴胡和解營衛兩歧表裡交界之邪必用薑棗為一定之法若麻黃湯則專主寒傷營證便與生薑無預逮至三陰等治從無一方泛用生薑者生薑為手頭常用之物尚爾若此之慎況有不察厥深熱深之旨一見四肢厥冷漫投薑附四逆於此能無慼慼乎內補當歸建中湯玉函治產後血虛虛羸不足腹中刺痛少腹中急或感寒發熱桂枝湯桂枝易肉桂加當歸二錢膠飴六錢崩傷內衄不止加地黃六錢阿膠二錢產後一月服四五劑令人強壯桂枝龍骨牡蠣湯玉函治虛勞夢泄惡寒發熱桂枝湯加龍骨煅牡蠣熬各錢半桂枝大黃湯玉函治太陰中風誤下引邪入內腹滿痛桂枝湯加大黃一錢桂枝湯表藥也以其誤下引邪內賊而腹滿痛渾是表邪在內不解之故故仍用桂枝湯略加大黃因勢利導病既變則藥亦不得不隨之而變也桂枝葛根湯玉函治太陽經柔痙自汗脈浮桂枝湯加葛根二錢栝蔞桂枝湯金匱治痙太陽證備身體強𠘧𠘧然脈沉遲桂枝湯加栝蔞根二錢桂枝加附子湯玉函治亡陽漏風肢體屈伸不和桂枝湯加熟附子一錢桂枝加黃耆湯金匱治黃汗發熱脛冷腰以上汗出下無汗桂枝湯加黃耆二錢耆芍桂酒湯金匱治汗如柏汁肢體腫發熱汗出而渴桂枝湯去甘草薑棗加黃耆五錢苦酒和水煎黃耆桂枝五物湯金匱治血痹身體不仁如風狀桂枝湯去甘草加黃耆等分千金桂枝易桂心加人參名黃耆湯茯苓甘草湯玉函治風邪入犯膀胱氣分小便不利桂枝湯去芍藥大棗加茯苓二錢苓桂朮甘湯玉函治心下有支飲胸腹支滿目眩桂枝湯去芍藥薑棗加茯苓二錢白朮一錢此僅用桂枝湯之半以流動中外之支滿兼四君子之半以運行在裡之痰氣也千金桂枝去芍藥加皂莢湯金匱治肺癰吐涎沫初起有表邪者桂枝湯去芍藥加皂莢一枚去皮核酥炙桂枝去芍藥加麻黃附子細辛湯金匱治氣分心下如盤桂枝湯去芍藥加麻黃附子各一錢細辛半錢病在氣分非麻桂不能分解病氣盤錯非辛附不能破結去芍藥者惡其酸收也小青龍湯玉函治溢飲喘咳自利發熱當發其汗桂枝湯去薑棗加麻黃三錢半夏二錢炮薑細辛五味子各半錢小青龍加石膏湯金匱治喘咳上氣煩躁心下有水氣小青龍湯加石膏雞子大一枚碎桂枝麻黃各半湯玉函治太陽證脈微惡寒桂枝湯加麻黃杏仁桂枝二越婢一湯玉函治營衛俱傷風多寒少而煩滿桂枝湯本方各二錢加麻黃二錢石膏三錢桂枝芍藥知母湯金匱治肢節痛腳腫如脫桂枝湯去大棗加麻黃二錢白朮半兩知母防風各四錢熟附子二錢炙甘草湯玉函治傷寒脈結代心動悸及肺痿唾多心中溫溫液液虛勞不足汗出而悶桂枝湯去芍藥倍甘草加人參二錢生地三錢麥門冬二錢麻子仁一錢阿膠二錢渾是清潤調補藥中但用桂枝一味以流動經脈之滯麻仁一味以滋潤腸胃之結而脈虛結代心虛動悸一切虛勞不足得以榮養則脈虛自復心悸自寧矣芍藥甘草湯玉函治營血受傷熱不止桂枝湯去桂枝薑棗芍藥甘草附子湯治發汗病不解反惡寒及瘡家發汗成痙桂枝湯去桂枝薑棗加附子一錢炮黃芩湯玉函一名黃芩芍藥湯治伏氣發溫太陽少陽合病自利桂枝湯去桂枝生薑加黃芩三錢黃芩加半夏湯玉函金匱黃芩加半夏生薑湯治伏氣發溫內挾痰飲痞滿咳逆桂枝湯去桂枝加黃芩三錢半夏二錢黃芩湯本治春夏溫熱熱自內發故於桂枝湯中除去桂枝生薑之辛溫易以黃芩之苦燥轉溫散為涼解大匠運斤妙用不可思議後世藉以治下利身熱亦不出此其黃芩加半夏湯治自利而嘔與夏秋下利白沫若合符節異病同治總不出南陽之繩墨也麻黃湯玉函治寒傷營氣脈浮發熱無汗而喘骨節痛麻黃去節三錢桂枝三錢甘草炙一錢杏仁二十枚泡去皮尖碎上四味水煎溫服暖覆取微汗不須啜粥以寒邪入傷營氣營氣起於中焦恐穀氣反助邪熱也麻黃加朮湯金匱治濕家身體煩疼日晡發熱黃麻湯加白朮四錢濕家身疼煩熱渾是軀殼受傷即用麻黃湯開發肌表不得白朮健運脾氣則濕熱雖從汗泄而水穀之氣依然復為痰濕流薄中外矣然術必生用若經炒焙但有健脾之能而無祛濕之力矣古今錄驗橘皮湯金匱治寒邪傷肺咳嗽吐血麻黃湯換肉桂加橘皮當歸紫菀黃芩麻杏甘石湯玉函治發汗後汗出而喘無大熱者麻黃湯去桂枝加石膏半兩此麻黃湯去桂而兼越婢之意專祛上焦濕熱痰氣與苓桂朮甘湯互發彼藉苓術專祛心下之支飲此藉石膏專祛膈上之濕熱也麻黃杏仁薏苡甘草湯玉函治風濕一身盡痛發熱日晡所劇者麻黃湯去桂枝加薏苡半兩杏子湯治風水虛脹脈浮發其汗即已麻黃湯去桂枝又易簡杏子湯用小青龍加人參杏子仁甘草麻黃湯金匱亦治里水麻黃湯去桂枝杏仁方用甘草二錢麻黃四錢葛根湯玉函治太陽陽明合病自利或發熱無汗喘滿不食麻黃湯去杏仁增桂枝一錢加葛根四錢芍藥二錢生薑三片大棗三枚此即麻黃桂枝二湯合用於中但去杏仁增葛根為陽明經證之專藥以其能輔麻黃大開肌肉也去杏仁者既開肌肉於外不當復泄肺氣於內也聖人立法一方一味各有斟酌非刻意研求焉能測識其微而為蒼生司命哉三拗湯局方治風寒傷肺而咳誤行斂肺而壅嗽喘急麻黃湯去桂枝用麻黃不去節甘草生杏仁連皮尖等分更加桔梗荊芥名加味三拗湯麻黃附子細辛湯玉函治少陰病脈沉發熱及水腫喘咳麻黃湯去桂枝杏仁甘草加附子一錢細辛半錢千金附子散治中風手臂不仁口面喎僻麻黃附子細辛湯加乾薑桂心人參防風芎藭羚羊角為散水煎加竹瀝日服一劑效倉公當歸湯治賊風口噤角弓反張成痙麻黃附子細辛湯加當歸防風獨活水酒和煎口不開者格口內湯一服當蘇二服小汗三服大汗麻黃附子甘草湯玉函金匱名麻黃附子湯治少陰病脈沉發熱二三日無里證及水腫脈沉麻黃湯去桂枝杏仁加附子一錢千金大棗湯治歷節疼痛麻黃附子甘草湯加黃耆薑棗日三服汗之發表重劑莫如麻黃溫經峻藥首推附子表裡補瀉功用天淵仲景於少陰病脈沉發熱二味合用單刀直破堅壘而建補天浴日之功在一二日間勢難叵測則用細辛以助其銳二三日無里證則用甘草以緩其治各有權度金匱於水腫治例亦用二湯喘嗽則兼細辛以開肺氣之壅脈沉則兼甘草以緩腎氣之逆與初起防變二三日無里證互發而倉公乃於麻附細辛方中加當歸防獨以療賊風口噤發痙千金復以麻附甘草湯內加黃耆薑棗以治歷節疼痛總賴麻黃附子徹外徹內迅掃其邪杲日當陽何有陰霾之患乎麻黃升麻湯玉函治冬溫誤行汗下下部脈不至咽候不利唾膿血麻黃湯去杏仁用麻黃二錢桂枝甘草各八分加升麻當歸各一錢知母黃芩葳蕤各二錢天門冬芍藥乾薑白朮茯苓石膏各八分此方專主陽熱陷於厥陰經脈為邪氣所遏故下部脈不至而證見咽喉不利唾膿血也邪遏經脈非兼麻黃桂枝之制不能開發肌表以泄外熱非取白虎越婢之法不能清潤肺胃以化裡熱更以芍藥甘草參黃芩湯寒因寒用謂之應敵甘草乾姜合腎著湯熱因熱用謂之嚮導以病氣龐雜不得不以逆順兼治也華蓋散局方治肺受風寒咳嗽聲重煩滿昏眩脈浮數麻黃湯去桂枝方用麻黃杏仁各一錢甘草五分加蘇子赤茯苓橘紅桑根皮各一錢生薑二片紅棗一枚九寶湯治經年久嗽不愈脈浮起於外感者麻黃湯加紫蘇薄荷橘紅桑白皮大腹皮等分生薑三片烏梅肉半個麻黃連軺赤小豆湯玉函治濕熱發黃麻黃湯去桂枝減麻黃一錢加連軺即連翹二錢赤小豆一合生梓白皮一兩生薑三片大棗四枚水煎分溫三服半日服盡越婢湯金匱治風水惡寒一身悉腫脈浮不渴續自汗出無大熱者麻黃湯去桂枝杏仁倍麻黃加石膏八錢生薑三片大棗五枚水煎溫分三服越婢者發越濕土之邪氣也水濕之氣因風流播中外兩相激搏勢難分解不得不藉麻黃祛之從表而越石膏清之從里而化內經開鬼門法也本方加朮以助腠理開汗大泄於加朮方中更加附子以治腳痹惡風開中寓闔信手合轍其大青龍小續命麻杏甘石湯或加桂枝以和營或加參歸以鼓氣或加杏仁以泄滿總以此方為樞局也或問表無大熱何得輕用麻黃內無煩渴何得輕用石膏蓋惡寒身腫自汗渾是濕氣鬱著非風以播之不能解散麻黃在寒傷營劑中則為正治在開痹濕門中則為導引石膏在白虎湯中則為正治在越婢青龍續命方中則為導引不可以此礙彼也越婢加朮湯金匱治內極熱則身體津脫腠理開汗大泄厲風氣下焦腳弱越婢湯加白朮四錢越婢加朮附湯金匱治腳痹惡風越婢湯加白朮四錢附子一錢越婢加半夏湯金匱治肺脹咳而上氣越婢湯加半夏半兩大青龍湯玉函治營衛俱傷脈浮緊汗不得出而煩躁越婢加杏仁十四枚去皮尖桂枝二錢文蛤湯金匱治吐後渴飲不止脈緊頭痛越婢湯麻黃減半加文蛤半兩杏仁十五枚續命湯金匱名古今錄驗續命湯治中風痱身體不能自收並治但伏不得臥咳逆上氣面目浮腫麻黃桂枝千金局方俱作桂心當歸人參石膏乾薑甘草炙各三錢芎藭一錢杏仁三十枚千金作白朮上九味水煎溫服當薄覆脊憑几坐汗出則愈不汗更服無所禁勿當風千金續命湯無人參有防風黃芩芍藥續命風引湯多防己防風獨活附子治中風癲眩不知人狂言舌腫出千金依源續命湯多白朮茯苓大棗為十二味小續命湯千金治中風外顯六經形證續命湯去石膏加芍藥防風黃芩各一錢四分防己一錢熟附子七分生薑五片大棗一枚崔氏外臺不用防己大棗無汗惡寒倍麻黃杏仁有汗惡風倍桂枝芍藥無汗身熱不惡寒去附子倍甘草加石膏知母有汗身熱不惡風倍桂枝黃芩加葛根無汗身涼脈沉細倍附子加乾薑有汗無熱畏寒脈沉倍桂枝附子甘草肢節攣痛麻木不仁脈緩加羌活連翹上易老加減法張景岳曰按歷代相傳治中風之方皆以續命等湯為主考其所自則始於金匱要略附方中有古今錄驗續命湯然此必宋時校正之所增而非仲景本方也此自隋唐以來則孫氏千金方乃有小續命大續命西州續命排風等湯故後世宗之無不以此為中風主治矣夫續命湯以麻黃為君而與薑桂並用本發散外邪之方至小續命大續命西州續命等湯則復加黃芩以兼桂附雖曰相制而水火冰炭道本不同即有神妙終非余之心服者其他無論獨怪乎河間東垣丹溪三子者既於中風門皆言此病非風矣何於本門並首列小續命湯而附以加減之法又何前後之言不相應耶千金大續命湯治中風肥盛多痰多渴肢體不遂續命湯去人參加黃芩荊瀝一作竹瀝西州續命湯千金治中風痱身體不能自收口不能言冒昧不識人拘急不能轉側大續命湯去荊瀝千金八風續命湯治卒中半身不遂手足拘急續命湯去麻黃芎藭加獨活黃芩水煎溫服覆汗不得汗倍麻黃千金排風湯治中風肢體煩疼皮膚不仁續命湯去人參石膏乾薑加防風芍藥白朮茯苓獨活白鮮皮生薑升麻湯一名升麻葛根湯治陽明經邪發熱及痘疹初起升麻一錢葛根白芍各錢半甘草炙八分上四味水煎溫服升葛為陽明經之嚮導陽明專主肌肉恐開泄太過即以白芍斂護營血甘草調和中氣所以解利本經邪熱及時行痘疹皆為專藥然在起脹後禁用秦艽升麻湯治中風口目喎斜升麻湯加秦艽人參桂枝白芷防風蔥白升陽散火湯治胃虛過食寒物抑遏陽氣於脾土中畏寒發熱火鬱則發之也升麻湯加羌活獨活人參柴胡防風用生甘草火鬱湯治火鬱不舒凜凜惡寒不止升麻湯用生甘草加柴胡防風蔥白按此即升陽散火湯去羌活獨活人參加蔥白內經所謂惡寒非寒火鬱則發之也沖和順氣湯治內傷脾氣惡寒發熱食少便溏升麻湯加人參羌活防風蒼朮白朮薑棗升陽補氣湯治胃氣不足脾氣下溜氣短無力不時發熱早飯後煩悶須要眠睡五心煩熱升麻湯去葛根加羌活獨活防風柴胡厚朴澤瀉薑棗和解湯治痘三日前後起發遲升麻湯加人參川芎羌活防風連翹升麻湯治痘發太多涼內解毒升麻湯加連翹桔梗牛蒡木通薄荷燈心竹葉小柴胡湯玉函千金名黃龍湯治少陽受邪往來寒熱脈弦脅痛而嘔柴胡三錢黃芩人參甘草炙各一錢半夏二錢生薑五片大棗四枚水煎去滓溫服治傷寒有五法曰汗曰吐曰下曰溫曰和皆一定之法而少陽例中小柴胡湯專一和解表裡少陽為陰陽交界邪傳至此已漸向里故用柴胡升發其邪使從外解即以人參擋截於中不令內犯更以半夏黃芩清解在裡之熱痰生薑大棗並祛在表之邪氣又須甘草協輔參柴共襄匡正辟邪之功真不易之法無容擬議者也其方後加減乃法中之法定而不移至於邪氣犯本膽府受病而加龍骨牡蠣丸藥誤下而加芒硝屢下不解引邪入里心下急鬱郁微煩而用大柴胡為法外之法變通無定不可思議者也獨怪世醫用小柴胡一概除去人參且必加枳桔耗氣之品此非法之法習俗相承匿於橫議者也何怪乎道藝日卑風斯日下哉柴胡加龍骨牡蠣湯玉函治少陽經邪誤下犯本胸滿驚煩小柴胡湯去黃芩甘草加桂枝茯苓龍骨牡蠣鉛丹大黃柴胡加芒硝湯玉函治少陽過經不解小柴胡湯加芒硝三錢大柴胡湯玉函治寒熱便秘小柴胡湯去人參甘草加芍藥枳實各一錢大黃二錢四逆散玉函治熱邪傳入少陰厥逆小柴胡湯去人參半夏黃芩薑棗加枳實芍藥等分為散飲服方寸匕日三服凡病各有真假真者易見假者難辨差之毫釐迥乎冰炭試以傷寒之厥逆辨之其始病便見者為直中寒厥五六日熱除而見者為傳經熱厥寒厥真而熱厥假也熱厥之治惟四逆散得之細推其邪從陽入陰必由少陽而達亦無不由太陰竟入少陰之理故首推柴胡為來路之引經亦藉以為去路之嚮導用枳實者掃除中道以修整正氣復回之路也夫陰為陽擾陽被陰埋舍和別無良法故又需芍藥以和其營甘草以和其胃胃氣和而真陽敷布假證愈而厥逆自除但方後加減紛龐寒熱互用非隨證而推逆順之機難以語此如悸加桂枝小便不利加茯苓泄利下重加薤白皆陰為陽擾隨其攸利而開泄之咳利加五味乾薑腹痛加附子是陽被陰埋急須煥發以克復之與厥陰例中當歸四逆加吳茱萸同法須知真證正治假證間取總不出此方之模範也至若二經熱邪亢極而厥自有大承氣下奪之法又非四逆散當歸四逆之和法可例治也柴胡去半夏加栝蔞湯金匱治瘧多渴小柴胡湯去半夏加栝蔞根柴胡桂枝幹薑湯玉函金匱名柴胡桂薑湯治瘧寒多微有熱小柴胡湯去人參半夏薑棗加桂枝乾薑栝蔞根牡蠣熬柴胡桂枝湯玉函治太陽少陽並病合病寒熱及瘧小柴胡湯加桂枝芍藥即小柴胡湯合桂枝湯柴胡四物湯治婦人經行感冒熱入血室小柴胡湯合四物湯柴胡枳桔湯一名枳桔柴胡湯治少陽寒熱痞滿小柴胡湯加枳殼桔梗增損柴胡湯治少陽血虛寒熱不止小柴胡湯去黃芩加川芎芍藥陳皮柴胡清肝散治怒火憎寒發熱肝膽風熱瘡瘍小柴胡湯去半夏薑棗加山梔川芎連翹桔梗人參敗毒散局方治時疫初起發熱及感冒發散後熱不止小柴胡湯去半夏黃芩大棗加茯苓羌活獨活前胡川芎枳殼桔梗問時疫初起用人參敗毒得毋助邪為虐之患乎又何以治非時寒疫汗後熱不止詳此二者一為全盛之毒一為未盡之邪胡一方可混治耶蓋時疫之發或值歲氣並臨或當水土疏豁種種不侔然必入傷中土土主百骸無分經絡毒氣流行隨虛輒陷最難叵測亟乘邪氣未陷時盡力峻攻庶克有濟其立方之妙全在人參一味力致開闔始則鼓舞羌獨柴前各走其經而與熱毒分解之門繼而調御津精血氣各守其鄉以斷邪氣復入之路與桂枝湯中芍藥護營之意不殊如桂枝人參湯小柴胡湯參蘇飲未嘗不用人參以協濟表藥成功也但其所主惟天行大頭乃為合轍加荊防牛蒡薄荷名荊防敗毒為捻頸瘟咽喉腫痛之專藥即上二證在熱毒既陷以後及北方黑骨溫等總與此方無預也至若傷寒傳變之邪伏氣鬱發之證涇渭攸分略無交涉而先哲嘗藉以治寒疫汗後餘熱往往獲效者以非時之邪混廁經中屢行疏表不應邪伏幽隱不出非藉人參之大力不能載之外泄也逮至疫痢昏熱口噤亦宜此方加陳倉米引領入胃則毒隨藥化得非人參輔佐之力歟獨怪近世醫流偏謂人參助長邪氣除去不用專行群隊攻發鼓激壯火飛騰不至竭絕真陰不已茲緣同學質問因祖述以政荊防敗毒散治大頭蝦蟆瘟證人參敗毒散加荊芥防風薄荷牛蒡子倉稟湯治疫痢發熱人參敗毒散加陳倉米一撮清脾飲治食瘧脈實溺赤便秘小柴胡湯去人參加白朮青皮厚朴草果按清脾飲清理脾家痰氣宿滯及蘊積少陽經中風熱之邪乃於小柴胡中除去人參益入青皮白朮厚朴草果一派克削之味在藜藿之人固為相宜若膏粱豢養柔脆者即有留滯亦難勝此用者審之星香湯治中風痰涎潮塞不省人事服熱不得者南星三錢木香半錢生薑十片水煎服無時省風湯局方治卒中口噤不能言口眼喎斜筋脈抽掣風痰壅盛星香湯去木香用陳膽星一錢五分加防風一錢生半夏黃芩生甘草各七分半大省風湯局方治卒中痰逆嘔泄脈沉厥冷星香湯去木香用陳膽星二錢加防風獨活生附子各一錢全蠍生甘草各五分按此即省風湯去半夏黃芩加獨活附子全蠍二湯雖分寒熱主治並用生薑十片以開發風痰不可減也三生飲局方治中風卒倒口眼喎斜半身不遂寒閉不省人事痰氣上壅星香湯本方用生南星一兩木香三錢半加生川烏生附子各五錢搗羅為散每服五錢同生姜十片煎服氣虛卒倒另加人參兩許駕馭之三生飲中風門中破的之方雖本星香而實得大省風之妙用與續命湯相為犄角奪門革鼎各有專功貴在先聲奪氣無容庸師擬議朮附湯治寒濕體痛自汗身寒白朮一兩附子半兩上二味水煎去滓放涼分三服參附湯治脾腎陽虛厥逆自汗朮附湯去朮加人參一兩耆附湯治元陽衰弱虛風自汗朮附湯去朮加黃耆一兩蜜酒炒三因治自汗用耆附朮附參附三方皆用附子五錢余俱一兩分三服服之其衛外之陽不固則用耆附脾中之陽不固則用朮附腎臟之陽不固則用參附凡屬陽虛自汗不能捨此三方而耆附可以治虛風朮附可以治寒濕參附可以壯元神三方亦相因為用只用二物不雜他味取力銳以擅專功也其外麻附桂附姜附椒附星附及大黃附子等法度森森分治九垓各具轉日回天之妙用豈尋常可擬議乎桂枝附子湯玉函治風濕身重煩疼不能轉側朮附湯去朮本方用附子一枚加桂枝一兩二錢甘草六錢生薑一兩大棗十二枚分溫三服白朮附子湯玉函即近效白朮附子湯治風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫朮附湯本方用術一兩二錢附六錢加甘草六錢生薑一兩大棗十二枚分溫三服甘草附子湯玉函治風濕大便堅小便自利朮附湯本方用朮附各六錢加桂枝一兩二錢甘草六錢分溫三服桂枝附子白朮附子甘草附子三方皆本朮附湯方而立一加桂枝甘草薑棗以治身重煩疼不能轉側其病全在軀殼無關於里故於本方除去白朮使桂附專行軀殼而振驅風遂濕之功用甘草以緩桂附之性不使其汗大泄汗大泄則風去而濕不去也風在疾祛濕在緩攻故用生薑之辛以散之大棗之甘以緩之則營衛之開闔有權風濕無復入之虞矣一加甘草薑棗以治骨節煩疼掣痛等證渾是濕流關節之患故於本方但加甘草以緩朮附之性薑棗以司開闔之機風之見證本輕故無藉於桂枝也一加桂枝甘草以治風濕大便堅小便自利以病氣駸駸內犯故於本方加桂枝助附子以杜內賊之風濕加甘草助白朮以和二便之偏滲故大便雖堅法無下奪之理附子湯玉函治少陰病始得之背惡寒脈沉身體骨節痛朮附湯加茯苓白芍各一兩人參六錢真武湯玉函千金名玄武湯治少陰下利腹痛或咳嘔小便不利朮附湯本方白朮六錢附子一枚炮加茯苓芍藥生薑各一兩咳者加五味子細辛乾薑小便利者去茯苓下利去芍藥加乾薑嘔者去附子加生薑詳附子湯與真武湯二方止差一味一治少陰病始得之便背惡寒口中和知其人真陽素虧故用人參以助附子之雄茯苓以行白朮之滯又恐生附性悍傷犯真陰故用芍藥以護持營血營血得安而真陰受蔭矣一以少陰病二三日不已至四五日腹痛自利四肢沉重或咳或嘔其人內外皆是水氣故用生薑佐茯苓朮附以利水為務水去則真陽自復當知此證皆由水氣鬱遏其陽陽氣原不大虛所以方中朮附僅用附子湯之半又恐辛燥有傷其陰因以芍藥保其營血與附子湯之立法不殊即過汗傷經振振欲擗地者亦不出是方也附子散治陰痙朮附湯本方二味各用一兩加桂心川芎獨活各半兩為散每服三四錢薑棗湯煎服四逆湯玉函治陰寒脈沉四肢厥冷嘔吐泄瀉附子生用一枚乾薑五錢甘草六錢上三味水煎分溫再服強人可服大附子一枚乾薑一兩四逆加人參湯玉函治惡寒脈微而利四逆湯加人參三錢至一兩茯苓四逆湯玉函治發汗若下之病仍不解煩躁四逆湯加人參三錢至一兩茯苓六錢通脈四逆湯玉函治少陰病下利清穀裡寒外熱四逆湯倍用乾薑通脈四逆加豬膽汁湯玉函治吐以下斷四肢拘急不解脈微欲絕者四逆湯倍乾薑加豬膽汁白通湯玉函治少陰病下利脈微四逆湯去甘草木方薑附各三錢加蔥白四莖白通加豬膽汁湯玉函治少陰病下利厥逆無脈乾嘔而煩四逆湯去甘草木方薑附各用三錢加蔥白四莖人尿五合豬膽汁一合乾薑附子湯玉函一名姜附湯治少陰病晝日煩躁四逆湯去甘草四逆湯用薑附之辛熱恢復其陽即用甘草以緩其性使之徐行以達四末專為始病便見厥逆脈沉不發熱者而設即太陰自利腹痛厥陰下利拘急總不出此以厥陰之邪無不由少陰而入也非但三陰俱可取用並太陽之頭痛發熱脈沉亦須用此先救其里然後解表方為合轍而少陰病晝日煩躁用乾薑附子湯即四逆湯中除去甘草專用二味以迅掃陰霾與白通立法無異以意逆之四逆一方太陽尚所攸賴白通二例與厥陰獨無干預耶雖厥陰經中但有通脈而無白通詳二方止互更一味通脈有甘草而無蔥白白通有蔥白而無甘草一取甘緩以徐復欲絕之脈一去甘草以急追將脫之陽皆用豬膽以除假熱白通專用蔥白以通真陽又恐蔥白性升引領薑附上僭故以人尿折而下之其通脈本方雖無蔥白方後便有面赤加蔥之例蔥白既可加用人尿獨不可加用乎況厥陰內臟風木得無面赤戴陽可用蔥白之治乎上法皆末流之挽無問直中沉寒傳經壞病病氣至此轉逆元氣至此殆盡非始病便見脈沉發熱之比縱兩感勢劇尚有麻黃附子細辛湯盡力可救與前太陽例中先後救里解表之法互相揮發辨治之微惟在頭之痛與不痛為確據也精義至此盡情剖露後世略不加察妄立兩感之方總未達長沙萬一耳回陽返木湯治陽虛躁渴面赤戴陽欲坐臥泥水中脈來無力欲絕者四逆湯加人參麥門冬五味子臘茶陳皮面赤者下虛也加蔥七莖黃連少許用泥漿水澄清煎服入白蜜五匙冷服取汗此以白通合生脈治陰極似陽最為神妙加用臘茶漿水等味當矣但陳皮一味似屬不必當知人參既合薑附其勢歘張奚藉陳皮發揚之力哉羌活附子散治胃冷呃逆四逆湯去甘草本方用附子半兩乾薑二錢加羌活茴香各半兩木香一錢為散每服二錢入鹽一字水煎微溫服木香散治虛寒滑泄不止四逆湯本方用甘草乾薑各二兩附子一兩加丁香木香肉豆蔻廣藿香訶子肉赤石脂各一兩為散每服三錢陳米湯上世本無炮姜多當歸冷香飲子治中暑內挾生冷飲食腹痛瀉利四逆湯去乾薑本方甘草附子各一錢加草果仁橘紅各一錢生薑五片浸冷服之漿水散治中暑泄瀉多汗脈弱四逆湯本方三味各用五錢加肉桂五錢良薑半夏各二錢五分二味俱醋炒漿水煎去滓冷服按漿水乃秫米和曲釀成如醋而淡今人點牛乳作餅用之或用真粉作納綠豆者尤佳茵陳四逆湯治陰黃脈沉細肢體逆冷腰以上自汗四逆湯本方用炮姜一錢五分附子甘草各一錢加茵陳蒿一錢五分茵陳附子乾薑湯治陰黃脈沉細四逆湯去甘草用熟附三錢炮姜二錢加白朮二錢豆蔻枳實半夏茯苓澤瀉橘紅各八分茵陳蒿一錢生薑五片理中湯玉函金匱名人參湯治胸痹心胸痞氣霍亂吐瀉不渴一切脾胃虛寒嘔吐清水飲食不入完穀不化乾薑炮半錢至一錢人參一錢至三錢白朮炒焦一錢至二錢甘草炙半錢至一錢上四味水煎去滓溫服腸胃虛脫完穀不化者煉白蜜丸彈子大沸湯研和滓日三夜二服名理中丸附子理中湯治下焦虛寒火不生土泄瀉嘔逆理中湯加熟附子按方中用參三錢僅可用附一錢若峻用溫補用參一兩方可加附三錢如尋常小劑用參一錢止可用附三分設不審此而附過於參下咽之後壯火食氣反招竭澤之殃製劑不可不講桂枝人參湯玉函治挾熱利不止心下痞硬理中湯加桂枝枳實理中湯治胃虛挾食及結胸本虛不能受攻者理中湯加枳實茯苓千金加半夏厚朴附子治胸中悶亦可用陳米飲或蒸餅丸服治中湯治冷食結滯理中湯加青皮陳皮連理湯治胃虛挾食痞滿發熱理中湯加黃連茯苓理苓湯治胃虛食滯喘脹浮腫小便不利理中湯合五苓散金匱乾薑人參半夏丸治妊娠胃寒嘔吐不止理中湯去白朮甘草本方乾薑人參各一兩加半夏二兩薑汁糊丸梧子大飲服十丸日三服甘草乾薑湯玉函治胃中陽虛咽乾煩躁吐逆理中湯去人參白朮金匱三物大建中湯治胸中大寒嘔吐不能食及少腹冷積作痛理中湯去白朮甘草本方乾薑用四錢人參用三錢加蜀椒半合去閉口者炒去汗水煎去滓納膠飴半杯微火再煎溫服如炊頃少飲稀粥一升後更服當一日食糜溫覆之甘姜苓朮湯金匱一作腎著湯治腰以下重著而痛理中湯去人參加茯苓腎著者腎受濕著而重痛故以燥濕為務非腎虛腰痛可渾用也滲濕湯局方治濕滯經絡腰下重著而痛理中湯去人參加蒼朮茯苓橘紅丁香薑棗大順散局方治暑熱引飲過多霍亂吐瀉理中湯去人參白朮本方甘草乾薑各半兩加肉桂杏仁去皮尖各三錢先將甘草同白砂炒次入乾薑卻下杏仁炒過篩去砂合桂為散每服三錢沸湯調服烏梅丸玉函治蛔厥理中湯去白朮甘草加烏梅黃連黃柏附子蜀椒桂枝細辛當歸以苦酒漬烏梅一宿蒸之五升米下飯熟去核搗成泥與蜜杵丸先食飲服十丸日三服稍加至二十丸禁生冷滑物臭食等千金治久痢諸藥不瘥本方去細辛附子人參黃柏桂枝換桂心半夏瀉心湯玉函治心下痞滿不痛半夏五錢泡乾薑炮甘草炙人參黃芩各三錢黃連一錢大棗四枚擘上七味