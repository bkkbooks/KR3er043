藥入烏嘴白鴨腹內男雌女雄製法如烏骨雞丸此葛可久方丸以蒸餅取緩留胃脘而和中氣之傷也蓋參苓平胃原非補益腎水之藥予嘗藉此以治飲食內傷中氣不和發熱羸瘦之證往往獲效詳方名白鳳者以鳧字下幾字加於鳥字以上也且丸以膏名取脂膏之義藏機法也厚朴湯治脾胃虛寒作脹腹中時痛時止平胃散去蒼朮加茯苓乾薑潔古加半夏枳實薑棗除濕湯治濕熱痞滿不食平胃散加半夏茯苓白朮藿香生薑大棗升陽除濕湯治脾胃虛弱不能飲食腹鳴泄瀉平胃散去厚朴加羌活防風升麻柴胡豬苓澤瀉麥芽神麯五積散局方治感冒內挾冷食脾陰受傷表裡俱病平胃散加麻黃桂枝炮薑半夏茯苓枳殼桔梗白芍當歸川芎白芷每服四五錢生薑三片蔥白三莖水煎去滓熱服溫覆取微汗調中湯治食積類傷寒及手足四肢發陰斑平胃散加枳實白朮乾薑黃連山楂神麯草果水煎去滓磨木香調服胃苓湯治飲食停積浮腫泄瀉脈證俱實者平胃散合五苓散生料煎服平胃本平胃氣之敦阜若因脾土之虛不能消運又須稍藉參苓如養胃之類然有土衰不能分利而成腫脹且氣壅不勝參術難合理中者乃合五苓以健運水土與正氣散之假蘇藿以散客邪兩不移易之定例也棗礬丸治食積發黃平胃散加皂礬麵裹燒紅煮紅棗肉丸服此消磨宿滯之第一峻利方較平胃之緩急百倍膏粱慎勿罔施服後以谷壓之否則恐其嘔吐也枳殼湯治痘疹誤服參耆腹脹喘急平胃散去蒼朮加枳殼二陳湯局方治脾胃痰濕半夏薑製二錢半茯苓錢半陳皮略去白一錢甘草炙一錢生薑三片烏梅肉半個上六味水煎空心溫服燥痰減半夏生薑加麥門冬竹瀝郁痰乾咳去半夏用蜜煎姜加川貝母火痰加黃連竹茹老痰加蛤粉海石按此方本內經半夏湯及金匱小半夏湯小半夏加茯苓湯等方而立加甘草安胃橘皮行氣烏梅收津生薑豁痰乃理脾胃治痰濕之專劑也其靈樞半夏湯見不得臥門小半夏湯金匱又名生薑半夏湯治痰積膈上咳嗽嘔噦二陳湯去陳皮甘草茯苓烏梅用半夏一兩炮去涎水生薑汁半合千金半夏湯治膽腑實熱二陳湯去陳皮甘草烏梅生薑易宿姜加黃芩生地黃秫米遠志酸棗仁以流水煎秫米去滓煎服小半夏加茯苓湯金匱治痰飲多汗小便不利二陳湯去陳皮甘草烏梅用半夏一兩生薑汁半合茯苓三錢大半夏湯治胃反嘔吐二陳湯去陳皮甘草茯苓烏梅加人參三錢以水和蜜揚之二百四十遍煮藥溫服千金有橘皮治氣滿腹脹又千金大半夏湯本方更加附子當歸桂心蜀椒厚朴枳實茯苓甘草大棗治胃中虛冷腹滿氣塞半夏乾薑湯治乾嘔吐涎沫二陳湯去茯苓陳皮甘草烏梅生薑加乾薑等分為散取方寸匕漿水煎服橘皮湯治乾嘔噦手足厥二陳湯去半夏茯苓甘草烏梅用橘皮四錢生薑一兩橘皮半夏湯治積氣痰痞飲食嘔吐不止二陳湯去茯苓甘草烏梅用半夏橘皮各半兩生薑汁半合橘皮枳實生薑湯金匱治胸痹短氣二陳湯去半夏茯苓甘草烏梅用橘皮一兩生薑半兩加枳實三錢橘皮竹茹湯金匱治胃虛噦逆二陳湯去半夏茯苓烏梅用橘皮三錢甘草一錢生薑半兩加竹茹三錢人參一錢大棗三枚半夏厚朴湯金匱即四七湯治氣結成疾狀如破絮或如梅核結在咽喉咯不出咽不下中脘痞滿氣鬱不舒噁心嘔逆一切郁證初起屬實者二陳湯去橘皮甘草烏梅加紫蘇厚朴一方有紅棗加味四七湯治心氣鬱滯四七湯加茯神遠志菖蒲甘草指迷茯苓丸治中脘留伏痰飲臂痛難舉手足不能轉移背上凜凜惡寒二陳湯去陳皮甘草烏梅本方用半夏曲二兩茯苓一兩加枳殼風化硝各半兩薑汁調神麯糊丸梧子大每服三五十丸空心淡薑湯下厚朴生薑甘草半夏人參湯玉函治胃虛嘔逆痞滿不食二陳湯去茯苓陳皮烏梅加人參厚朴二術二陳湯治脾虛痰食不運二陳湯加生白朮姜汗拌曬茅朮麻油拌炒分氣紫蘇飲治脅痛氣喘二陳湯去半夏加紫蘇桑皮大腹皮桔梗五味子食鹽寧嗽化痰湯治客邪傷肺久嗽不止二陳湯加紫蘇葛根枳殼桔梗前胡麻黃杏仁桑皮導痰湯治濕痰內外壅盛二陳湯加南星枳實加味導痰湯治濕熱痰飲眩暈痰窒導痰湯加人參白朮黃芩黃連栝蔞霜桔梗大棗竹瀝薑汁十味導痰湯治痰濕上盛頭目不清導痰湯加羌活天麻蠍尾臨服入雄黃末少許祛風導痰湯治類中風筋脈顫掉導痰湯加羌活防風白朮薑汁竹瀝滌痰湯治類中風痰迷心竅導痰湯加菖蒲人參竹茹溫膽湯千金治心膽虛怯觸事易驚多汗不寐短氣乏力皆由寒涎沃膽所致二陳湯用橘紅加枳實竹茹紅棗參胡溫膽湯治往來寒熱嘔而痞悶溫膽湯去竹茹紅棗加人參柴胡十味溫膽湯治寒涎沃膽膽寒肝熱心悸不眠短氣噁心耳鳴目眩四肢浮腫溫膽湯去竹茹加人參熟地棗仁遠志五味子膽之不溫由於胃熱不清停蓄痰涎沃於清淨之府所以陽氣不能條暢而失溫和之性故用二陳之辛溫以溫膽滌涎涎聚則脾郁故加枳實竹茹以化胃熱也若寒熱嘔逆胃氣不振也去枳實之消克紅棗之滯胃加柴胡以疏肝人參以扶胃乃六君子之變法也更加熟地棗仁遠志五味又為歸脾湯法派耳消暑丸局方治肥人傷暑眩暈嘔逆二陳湯去陳皮用醋炒半夏二倍生薑自然汁為丸酸漿水或烏梅湯淡醋湯下七八十丸千緡湯治風痰喘急脈證俱實者二陳湯去茯苓橘皮烏梅本方用半夏七枚甘草一寸生薑指大切加皂莢去皮弦子酥炙淨末半兩水煎溫服一方無甘草但用半夏一兩皂莢末半兩生薑七片同入紗袋中以手揉取清汁作三服溫中丸治黃胖面腫足脹是脾虛不前健運雖有積聚不可下之二陳湯本方橘半茯苓各一兩炙甘草五錢加黃連香附苦參針砂醋煅鏽過各五錢白朮二兩神麯一兩醋水各半泛丸梧子大每服七八十丸用白朮六錢陳皮一錢生薑三片煎湯送下虛加人參一錢病輕者服此藥六七兩小便即長病甚者服一斤小便始長積聚去淨然後六君子之類調補之四君子湯局方治胃氣虛弱飲食不思倦怠少食人參一錢至三錢白朮炒黃一錢至二錢茯苓一錢至錢半甘草炙六分至一錢上四味水煎空心溫服按四君子乃胃家氣分之專藥胃氣虛而用之功效立見即血虛用四物亦必兼此故八珍之主治不獨氣血兩虛也即血虛者亦須兼用但補氣則偏於四君補血則偏於四物若純用血藥不得陽生之力陰無由以化也方中白朮若治脾胃虛衰大便不實或嘔惡不食合用炒焦方有健運之力如肺胃虛燥咳嗽失血須用陳米飯上蒸過十餘次者則轉濁為清轉燥為潤是以異功散八珍湯及歸脾逍遙等方內並宜蒸者即陰虛乾咳咳吐白血總無妨礙更加白蜜拌蒸猶為合宜其於輕重炮製之間全在用者之活法權變舉此可以類推三隅矣異功散治肺胃氣虛稀痰喘嗽四君子湯加橘皮略去白為散每服三四錢加生薑一片水煎去滓服六君子湯治胃虛少食痰嗽嘔泄四君子湯加橘皮半夏生薑香砂六君子湯治氣虛痰食氣滯六君子湯加木香砂仁烏梅烏蠍六君子湯治小兒慢脾風內釣六君子湯加川烏蠍尾神麯糊丸服溫脾散治小兒心脾虧損弄舌及虛脹乳食不進四君子湯加黃耆藿香訶子肉橘皮桔梗木香為散每服三四錢加薑棗煎服外臺茯苓飲治胸中停痰宿水吐後虛滿不食四君子湯去甘草加枳實橘皮生薑惺惺散局方治小兒傷寒發熱咳嗽四君子湯加桔梗細辛羌活一作花粉等分為散每服一二錢加薄荷五葉水煎熱服取微汗愈不愈再作加蔥白香豉四獸飲治瘧疾胃虛中挾痰食四君子湯加半夏橘皮草果為散每服四五錢加生薑七片烏梅肉一個水煎清晨熱服八味順氣散治類中風虛脹喘逆四君子湯加青皮橘皮白芷烏藥為散每服四五錢水煎溫服參苓白朮散局方一名參朮飲治胃虛喘嗽大便不實四君子湯加山藥扁豆蓮肉桔梗薏苡砂仁為散每服四五錢加薑棗煎服七味白朮散即錢氏白朮散治胃虛津氣不行而渴四君子湯加藿香木香煨葛根為散每服三四錢水煎日三服八珍散治胃虛痰中見血及粉紅痰四君子湯加黃耆山藥粟米扁豆炒存性九味資生丸治老人食難克運四君子湯本方參術各三兩茯苓一兩半炙甘草半兩加橘紅楂肉真神麯各二兩川黃連白豆蔻各三錢半煉白蜜丸服古方止此九味後人更加桔梗藿香各半兩澤瀉三錢半扁豆蓮肉各一兩薏苡三兩山藥麥芽芡實各一兩半醉飽後細嚼彈子大一丸淡薑湯下則酒食易化健脾開胃消食止瀉調和臟腑滋養營衛飢時服之即飽飽後食之即飢藥雖繁簡不同而功效不異因兩存之八珍湯治婦人胎產崩漏氣血俱虛者四君子湯合四物湯八物湯治營衛俱虛畏寒發熱八珍湯去人參加黃耆按八珍八物功用懸殊以人參專補臟腑元氣黃耆惟司營衛開闔也世人每謂黃耆代人參恆用八物補益臟腑之氣大為噴飯人參胃風湯局方治風入胃中能食便血四君子湯去甘草加當歸白芍川芎桂枝粟米一方多木香按風入胃中何以反能食蓋風為陽邪其性善行久而化熱即內經所謂癉成為消中者是也方中但用桂枝去風而不去熱者以熱必隨風外解不必加治耳益氣養營湯治瘰癧結核流注一切鬱熱毒氣八珍湯加黃耆桔梗貝母香附橘皮生薑大防風湯局方治邪襲足三陰腿膝疼痛及痢後脛膝痛鶴膝風附骨疽證但赤熱焮腫者禁用四君子湯去茯苓加肉桂附子黃耆牛膝杜仲熟地白芍川芎羌活防風四物湯局方治營血虛熱熟地黃二錢當歸身一錢白芍藥錢半川芎藭八分上四味水煎溫服肥盛多濕痰及嘔逆少食便溏者禁用增損四物湯局方治血虛發熱食少便溏四物湯去地黃加人參甘草炮姜加減四物湯治停經血滯少腹結痛四物湯換赤芍加三稜蓬朮肉桂乾漆灰四烏湯治血中氣滯小腹急痛四物湯加烏藥香附甘草四神散治產後血虛或瘀血腹痛四物湯去地黃加炮姜為散溫酒服方寸匕金匱當歸芍藥散治腹中諸痛四物湯去地黃加白朮茯苓澤瀉為散酒服力寸匕日三當歸散治妊娠胎氣不安四物湯去地黃加黃芩白朮為散飲服方寸匕日三千金芎藭湯治產後崩漏下血不止四物湯換乾地黃加黃耆甘草乾薑吳茱萸若夏月經後有赤白不止除地黃加杜仲人參三黃補血湯治血虛至夜發熱自汗四物湯加生地黃黃耆升麻柴胡丹皮四物二連湯治重陽無陰晝夜發熱四物湯加宣黃連胡黃連按此本為重陽無陰晝夜發熱而立必其人時火亢極於陰分乃為相宜以陽邪暴虐故曰重陽陰欲消亡是即無陰非真陰補虛之謂蓋陽全陰半陽得以統陰所以晝夜皆熱若陰氣自病斷無上午陽分發熱之理每見時師用以治虛勞蒸熱及血虛發熱之疾服之未有不嘔瀉奪食者曷知方下原治發熱未嘗言蒸熱也夫熱發於外雖滯於陰實為客邪熱蒸於內陰不濟陽證屬久虛可不辨而混治乎其陰虛蒸熱自有六味地黃血虛發熱自有當歸補血亦何藉於此哉大秦艽湯治中風外無六經形證內無便溺阻隔宜此養血營筋血行風自滅矣四物湯加秦艽生地黃羌活獨活防風細辛茯苓白朮白芷黃芩石膏甘草張景岳曰大秦艽湯在機要發明俱云治中風外無六經之形證內無便溺之阻隔如是血弱不能養筋宜養血而筋自榮以大秦艽湯羌活愈風湯主之大秦艽湯雖有補血之藥而寒散之劑居其半矣夫既無六經之外邪而用散何為也既無阻隔之火邪而用寒何為也寒散既多又果可養血氣而壯筋骨乎秦艽湯且不可愈風湯則尤其不可者也吾不知用此法者果出何意獨活寄生湯千金治風痹腰腳疼重四物湯加獨活桑寄生杜仲牛膝細辛秦艽茯苓桂心防風人參甘草古今錄驗無寄生有續斷肘後無寄生人參甘草當歸有附子產後腹痛不得轉動及腰腳攣痛不得屈伸痹弱者宜服此湯十味銼散治濕痹周身疼痛四物湯加白朮附子防風茯苓黃耆肉桂此即十全大補去人參甘草之甘緩補氣而加附子防風以通達外內也玉燭散治血熱大便秘結四物湯換生地黃加生甘草酒大黃玄明粉生薑萬全方無大黃明粉易青皮枳殼膠艾湯治陷經下血孕婦胎漏不止四物湯用乾地黃加阿膠甘草艾清酒和水各半煎服一方多幹姜千金無地黃芍藥丁香膠艾湯治經漏兼白帶四物湯加丁香阿膠艾加味香附丸治倒經自汗胎漏下血四物湯本方用熟地八兩歸芍各四兩芎藭三兩加四制香附一斤澤蘭葉烏賊骨各六兩為末用浮麥面酒醋水調糊為丸如綠豆大每服百丸早暮各一服溫酒沸湯任下艾煎丸局方治婦人崩傷淋瀝帶下赤白小腹㽲痛四物湯本方歸地芍各二兩川芎一兩加人參石菖蒲炒吳茱萸用開口者醋炒各一兩為末用蘄艾四兩酒煎濃汁入糯米糊為丸梧子大每服百丸醇酒下更加肉桂熟附子各一兩香附四兩名艾附丸金匱溫經湯治經水不調崩帶及唇口乾燥並治經阻不通咳嗽便血此肺移熱於大腸也四物湯去地黃加阿膠甘草人參肉桂吳茱萸牡丹皮麥門冬半夏生薑更加白朮名大溫經湯此方本膠艾湯而立以虛火上炎唇口乾燥故用麥冬濁濕下滲不時帶下故用半夏若無二證不必拘執成方也芎歸湯及散治妊娠胎不轉運四物湯去地黃芍藥湯則煎服散則酒調服之以驗胎息若是真胎服之即動勿經火炒乃效佛手散治產婦胎不得下四物湯去地黃芍藥等分炒研為散紅酒調服加味佛手散治產婦交骨不開四物湯去地黃芍藥本方歸用三錢芎用一錢加上揀人參三五錢去血過多加至一兩臨服入童便半盞續續進之質壯氣實者但加童便人參不用可也紫蘇飲治妊娠臨月浮腫喘脹四物湯去地黃加紫蘇陳皮大腹皮人參甘草生薑蔥白感冒風寒去腹皮加香豉胎動不安加黃芩白朮胎不運動加木香砂仁肥盛氣滯加半夏厚朴虛羸少氣加白朮倍人參達生散治妊娠九個月後服數劑則易產紫蘇飲去川芎加白朮黃楊腦三枚芎歸鱉甲飲治勞瘧久不止或暫止復來四物湯去地黃加茯苓半夏橘皮鱉甲薑棗烏梅寒多加草果熱多加柴胡胃虛少食加人參白朮汗多加黃耆甘草一方多青皮續命煮散治風虛昏憒自汗手足瘛瘲四物湯加人參甘草桂心遠志防風獨活細辛葛根荊芥半夏為散每服一兩加生薑三片水煎通口服多汗去葛根加牡蠣生地黃黃連湯治失血後燥熱瘛瘲脈數盛者四物湯換生地赤芍加黃連黃芩山梔防風滋燥養營湯治血燥皮膚皴揭筋攣爪枯四物湯去川芎加生地黃秦艽防風黃連甘草大補地黃丸治精血枯槁燥熱四物湯去川芎加生地黑參黃柏知母乾山藥山茱萸枸杞肉蓯蓉蜜丸每服六七十丸空心鹽湯臨臥溫酒下劫勞散局方治肺痿咳嗽痰中有紅線盜汗發熱熱過即冷四物湯去川芎加人參黃耆甘草阿膠五味子半夏為散每服三四錢加薑棗煎空心服加味四物湯治血虛發熱四物湯加白朮茯苓柴胡丹皮解毒湯治痘瘡血氣弱乾焦黑陷四物湯換生地加人參連翹黃連甘草陳皮木通竹葉寬中散治痘疹誤用辛熱秘結四物湯去川芎換生地加枳殼赤茯苓甘草為散每服方寸匕水煎去滓服麥門冬湯治痘疹便實而渴四物湯去川芎換生地加麥門冬保元湯治營衛氣血不足黃耆蜜酒炙三錢至六錢人參三錢至一兩甘草炙一錢水煎空心服獨參湯治氣虛不能統血驟然脫血血崩不止人參三錢至一兩大虛暴脫者一兩至三兩胃虛少食加橘皮肺虛喘嗽加橘紅血脫加童便半杯薑汁三匕一方多京棗三枚歸脾湯治心脾鬱結經癸不調保元湯加白朮茯苓酸棗仁遠志肉當歸身桂圓肉木香生薑紅棗加味歸脾湯治心脾鬱結經閉發熱歸脾湯加柴胡山梔仁聖愈湯治失血過多久瘡潰膿保元湯去甘草加生地黃熟地黃川芎當歸十全大補湯局方治營衛氣血俱虛保元湯加白朮茯苓熟地當歸川芎白芍肉桂薑棗按和劑十全大補雖本保元而實四君四物黃耆建中三方合成因飲食勞倦而致煩熱肌肉消瘦者宜之若房勞傷精思慮傷神陰虛火旺咳嗽失血者誤用反致陰火上乘轉增其劇也又古方十全大補無黃耆肉桂多沉香木香此則專開脾胃之郁爾人參養榮湯局方治心脾虛寒保元湯加白朮茯苓橘皮熟地當歸芍藥肉桂遠志肉五味子按方中諸品皆心脾二經之藥而方下舊注云補肺虛謬矣夫養營正當補養心脾原無籍於肺氣也大建中湯局方治營衛俱虛上熱下寒十全大補湯加附子肉蓯蓉半夏麥門冬人參安胃散治小兒心脾虛極弄舌保元湯加黃連茯苓白芍生甘草人參實衛湯治瘧自汗不止保元湯加白朮芍藥初發加桂枝久瘧加烏梅黃耆六一湯局方治衛虛自汗晝日煩熱保元湯去參用黃耆六錢甘草一錢加棗一枚當歸補血湯治血虛至夜發熱煩渴引飲其脈洪大而虛重按全無者保元湯去人參甘草用黃耆六錢加當歸二錢玉屏風散治衛虛自汗易感風邪用此補脾實衛保元湯去人參甘草用黃耆六兩加防風二兩白朮四兩為散每服四五錢加薑棗煎服上三方並屬保元去參而黃耆六一則籍本方甘草協助黃耆以實脾氣故晝日多汗煩擾者宜之當歸補血專用當歸引領黃耆以護營血故失血至夜發熱者宜之玉屏風散則加白朮防風以祛衛濕故理疏易感風邪者宜之三方雖同以黃耆為君而主氣主血主肉各隨佐使功用迥乎不侔也益氣聰明湯治氣虛目暗生翳耳聾耳鳴保元湯加升麻葛根蔓荊芍藥酒黃柏此保元湯合升麻湯加蔓荊子以治其上黃柏以治其下也神效黃耆湯治氣虛耳目不明保元湯用黃耆二錢人參甘草各一錢加白芍一錢蔓荊子二分橘皮五分耳目之患氣虛而陰火上乘者宜益氣聰明湯無陰火者宜神效黃耆湯用者審之千金托裡散治氣血虛寒潰瘍不收保元湯加川芎當歸肉桂白芷防風桔梗白芍天冬連翹忍冬生薑參耆內托散治潰瘍感冒風邪痘疹觸穢伏陷及癰疽久不潰保元湯加川芎當歸肉桂白芷防風桔梗木香厚朴本方去木香名十宣散治痘癰托裡消毒散治癰疽痘疹毒盛不能起發保元湯加當歸芍藥茯苓白朮忍冬白芷連翹內補黃耆湯治潰瘍膿水出多虛熱不寐盜汗保元湯加白朮茯苓五味棗仁人參固肌湯治痘瘡表虛斑爛不能收靨保元湯加當歸白朮茯苓棗仁忍冬連翹補中益氣湯治內傷中氣下陷下元虛者禁用保元湯本方參耆甘草減半加白朮一錢當歸橘皮柴胡各八分升麻五分勞力感寒加羌活薑棗冬加桂枝春加香豉蔥白調中益氣湯治身體沉重百節煩疼胸滿短氣心煩耳鳴目熱如火口中沃沫飲食失味嗜臥溺赤補中益氣湯加白芍藥五味子升陽益胃湯治脾胃受傷邪熱內陷外反惡風厥冷脈沉大小便秘澀不可誤認陰寒而用熱藥又不可誤認實火而用涼藥宜此湯升舉微汗則愈補中益氣湯去升麻當歸加羌活獨活白芍防風半夏茯苓澤瀉酒煮黃連薑棗服藥後忌言語一二時戒酒面生冷薄滋味以養胃氣稍食美食以助藥力更宜小役形體使胃氣與藥轉運升發慎勿大勞以傷脾胃生髮之氣升陽順氣湯治飲食不節勞役所傷腹脅滿悶短氣遇春則口淡無味遇夏雖熱猶有畏寒飢則常如飽不喜飲食補中益氣湯去白朮加半夏草豆蔻神麯黃柏生薑瀉陰火升陽湯治火鬱發熱補中益氣湯去白朮當歸橘皮加羌活蒼朮黃芩黃連石膏早飯後大溫服服後宜禁一如升陽益胃湯如見火旺及督任沖三脈盛用酒炒黃柏知母少許不可久服恐助陰氣為害也沖和養胃湯治風虛目患空中有黑花神水變淡綠色次變淡白漸成內障補中益氣湯去橘皮加羌活防風黃連白芍五味生薑通氣防風湯治太陽氣鬱肩背不可回顧補中益氣湯去白朮當歸加防風羌活藁本黃柏白豆蔻青橘皮清暑益氣湯治暑傷無形之氣口燥頭痛發熱溺赤補中益氣湯去柴胡加麥門冬五味子蒼朮葛根澤瀉黃柏神麯青皮此以保元生脈為主而兼開腠利水消克之味清燥湯治夏秋濕熱傷氣補中益氣湯加生地黃黃連豬苓茯苓麥門冬五味子蒼朮黃柏澤瀉神麯節庵升陽散火湯治熱乘肺金氣虛不能主持循衣撮空小便利者可治不利者不可治補中益氣湯去升麻黃耆加麥冬茯神黃芩白芍薑棗有痰加薑汁炒半夏大便燥實譫語發渴加大黃泄利加升麻倍白朮托裡散治痘毒虛不能潰補中益氣湯去升麻加熟地茯苓芍藥生脈散治熱傷肺胃虛熱喘嗽脈虛無力人參三錢麥門冬二錢五味子一錢水煎不時熱服門冬清肺飲治火乘肺胃喘嗽吐血衄血生脈散加黃耆甘草紫菀白芍當歸此生脈保元合用以滋金水化源其紫菀佐黃耆而兼調營衛深得清肺之旨其餘芍藥酸收當歸辛散且走血而不走氣頗非所宜不若竟用生脈保元清肺最妥先哲有保元生脈合用氣力從足膝湧出以黃耆實胃五味斂津皆下焦之專藥耳宣明門冬飲治心移熱於肺傳為膈消生脈散加茯神甘草生地黃栝蔞根煨葛根知母竹葉易老門冬飲治老人津虧大渴生脈散加茯神甘草枸杞生薑二方並本生脈而易老差勝蓋明之重在旺氣易老專滋血氣治得其本矣天王補心丹治心腎虛耗怔忡不寧生脈散加熟地茯苓茯神遠志菖蒲黑參丹參柏子仁酸棗仁天門冬百部當歸杜仲桔梗甘草蜜丸硃砂為衣空心龍眼紅棗湯下二三錢清心蓮子飲局方治心包火旺小便赤澀梗痛生脈散加黃芩地骨皮車前茯苓黃耆蓮子此用生脈散合黃芩清肺而兼導赤之制其旨在於心包火炎上灼於肺熱傷氣化不能生水故用生脈救肺之燥以滋上源則知肺本無熱皆緣受火之淫而致熱傷氣化安可復用黃芩以伐其肺乎曷不竟用生脈合導赤全方豈不源流同清理明辭暢乎即或不然不妨削去木通仍用茯苓蓮子以存清心之意至於局方又以保元為主乃去五味加入甘草益失滋肺上源之旨矣二冬膏治肺胃燥熱痰澀咳嗽天門冬去心麥門冬去心等分上二味熬膏煉白蜜收不時噙熱咽之固本丸治老人津血俱虧咳逆便秘二冬膏加生熟地黃與本方二冬各八兩人參四兩蜜丸酒下四錢熬膏尤宜食少便滑禁用固本丸雖主扶陰抑陽然四味純陰之性僅用少許人參已覺味勝於氣矣而世本此方二冬二地各用八兩人參二兩几几乎群陰剝陽之象況復舉世醫流往往削去人參盍知陰柔之味不得陽和之力每致奪食作瀉內經所謂無陽則陰無以化安望其有補益之驗歟或問近世病家吝惜多金醫家迎合鄙性往往用參湯服丸此法可否曰此曲突徙薪之法也鄙夫但知人參珍貴以為入口便補不知配合之妙全在佐使得宜若用參湯送丸則參力先行至丸化時參力相去已遠非若膏劑之用參湯調服仍得併力奏功也集靈膏治久嗽氣血俱虛不能送痰而出固本丸中二冬二地各十兩人參六兩加枸杞六兩熬膏蜜收如血虛便難加歸身脾弱便溏加白朮以糖霜代蜜收之三才丸治氣血俱虛精神不固元陽失合者宜之二冬膏去麥門冬加人參熟地等分蜜丸服之加黃柏甘草砂仁名三才封髓丹甘露飲局方治胃中客熱煩躁口鼻咽瘡牙宣口臭二冬膏加生地黃熟地黃茵陳枳殼黃芩石斛甘草枇杷葉桔梗湯玉函治冬時伏邪發於少陰咽痛不瘥及風熱肺氣不清喘嗽喉中介介如梗狀肺痿肺癰初起並得服之桔梗甘草各三錢上二味水煎緩緩服之利金湯治肺燥澀不利而咳桔梗湯加貝母橘紅枳殼茯苓生薑白蜜枳殼煮散治咳引脅下痛桔梗湯加枳殼細辛川芎防風葛根生薑紅棗清肺湯治痘疹肺熱喘嗽吐痰桔梗湯加麥門冬款冬花杏仁貝母牛蒡子生地黃散治斑疹肺熱喘咳衄血桔梗湯加麥冬生地款冬杏仁為散煎服二錢一方無杏仁多橘皮生聖散治痘出不快溺赤咳痰桔梗湯加黃芩枳殼木通為散煎服二錢十六味桔梗湯治肺壅實熱唾穢痰桔梗湯加薏苡貝母當歸桑皮栝蔞仁百合枳殼葶藶五味地骨皮知母防己黃耆杏仁葶藶薏苡瀉肺湯治肺癰初潰吐膿血桔梗湯本方甘草用節加薏苡貝母橘紅黃耆忍冬白芨葶藶生薑初起去黃耆加防風潰後膿血去多加人參潰久不斂加合歡皮金匱排膿湯治內癰膿從嘔出桔梗湯加生薑大棗水煎日二服金匱排膿散治內癰膿從便出桔梗湯去甘草加枳實芍藥為散取雞子黃一枚以藥與雞子黃相等揉和飲和服之日一服防己黃耆湯金匱治風濕相搏客在皮膚關節疼痛腰以下疼重脈浮自汗惡風防己酒洗黃耆各錢半白朮一錢甘草炙八分生薑四片大棗二枚擘上六味水煎熱服後當如蟲行皮中腰以下如冰後坐被上又以一被繞腰下溫令微汗瘥喘加麻黃胃氣不和加芍藥氣上衝加桂枝下有陳氣加細辛陳氣久積之寒氣也防己茯苓湯金匱治皮水四肢腫皮膚聶聶動防己黃耆湯去白朮薑棗本方中防己黃耆各三錢甘草一錢加肉桂三錢茯苓六錢水煎溫分三服千金防己湯治歷節四肢痛如錐刺防己黃耆湯去黃耆大棗本方中防己白朮生薑各四錢甘草三錢加桂心茯苓各四錢烏頭一枚去皮熬人參二錢以苦酒和水煮日三夜一服當覺焦熱痹忽忽然慎勿怪也若不覺復服以覺乃止梔子豉湯玉函治汗下不解虛邪留於膈上心下結痛虛煩懊憹不得眠反覆顛倒臥起不安者梔子十四枚擘香豉四合上二味水煎分二服溫進一服得快吐止後服按仲景太陽例中用梔子豉湯有三皆主汗下後虛邪不解之證其梔子必取肥者生用一吐而膈上之邪與火俱散也若其時行疫癘頭痛發熱此湯加蔥白最捷多有服之不吐者胃氣強也加齏汁服之或以鵝翎採之或借用以清解膈上鬱結之火不欲其吐又須山梔炒黑用之便屈曲下行小便矣如衛氣素虛人感冒客邪自汗多者此方中香豉須炒熟用之至於少氣為胃氣之虛則加甘草以緩調之嘔為痰飲之逆則加生薑以開豁之下後心煩腹滿明是濁氣內陷乃於本方除去香豉表藥加枳樸以湧泄之丸藥大下後身熱不去微煩明是虛火外擾本方亦不用香豉而加乾薑以溫順之其有身黃髮熱明是濕邪郁發亦於本方去香豉而加柏皮以苦燥之下後勞復食復明是正不勝邪本方加枳實以清理其內用清漿水煮取味微酸使之下行而不上越也若有宿食則加大黃如博棋子大五六枚同一梔子豉法功用之妙神化莫測非庸俗所能擬議也梔子甘草豉湯玉函治下後少氣梔子豉湯加甘草梔子生薑豉湯玉函治下後嘔吐梔子豉湯加生薑梔子厚朴湯玉函治下後心煩腹滿梔子豉湯去豉加枳實厚朴梔子乾薑湯玉函治丸藥大下後身熱不去微煩梔子豉湯去豉加乾薑上四方服法如梔子豉湯梔子柏皮湯玉函治太陽證身黃髮熱梔子豉湯去豉加柏皮甘草水煎分溫再服枳實梔子豉湯玉函治勞復食復梔子豉湯倍香豉加枳實三枚用清漿水七升空煮取四升納枳實梔子煮取三升下豉更煮五六沸去滓分溫再服覆令微似汗有食加大黃如博棋子大五六枚梔子大黃湯治酒癉心中懊憹或熱痛梔子豉湯加枳實大黃黃芩清肺飲治渴而小便不利梔子豉湯去豉用炒黑山梔加黃芩等分熱服探吐之不應加香豉一撮此方妙用全在探吐以提其上則肺氣立清若服而不吐不特綿延不能克應縱或小瘥其苦寒之性留薄於內大傷氤氳之氣得不為之預慮乎梔子仁湯治小便不通煩悶腹脹梔子豉湯去豉加甘草茅根葵子小承氣湯玉函治少陽陽明府證大黃四錢生用厚朴六錢枳實三枚炙初服湯當更衣不爾者盡飲之若更衣勿服之經云亢則害承乃制專取大黃以制亢極之害也承氣湯證有三太陽之邪初傳陽明之府用調胃承氣藉甘草之緩款留硝黃以祛胃中方張之邪邪熱亢極於胃用大承氣之硝黃枳樸並攻全盛之邪故無庸於甘緩也邪氣駸駸欲犯少陽之界斯時熱已向衰但須枳樸助大黃以擊惰歸之邪故無取於芒硝之峻銳也其桃核承氣則又主太陽犯本之證以桃仁桂枝血藥引調胃承氣三味以破膀胱蓄血與陽明之府略無交涉調胃承氣湯玉函治太陽陽明府證小承氣湯去厚朴枳實方中大黃酒浸加芒硝三合甘草二錢大承氣湯玉函治正陽陽明府證小承氣湯本方大黃酒洗倍用厚朴半兩枳實五枚加芒硝三合桃核承氣湯玉函即桃仁承氣湯治熱結膀胱如狂小承氣湯去厚朴枳實加芒硝甘草桃仁桂枝厚朴大黃湯金匱治支飲胸滿小承氣湯倍大黃厚朴三物湯金匱治腹滿痛閉小承氣湯倍厚朴用枳實五枚厚朴七物湯金匱治腹滿發熱飲食如故小承氣湯加甘草桂枝薑棗此本小承氣合桂枝湯中間裁去白芍之酸收不致引邪入犯營血雖同用桂枝甘草與桂枝湯涇渭攸分其厚朴獨倍他藥正以泄氣之濁逆耳大黃甘遂湯金匱治婦人血結少腹如敦小承氣湯去枳實厚朴本方大黃用四錢加甘遂阿膠各二錢頓服之大黃甘草湯金匱治食已即吐小承氣去枳實厚朴用大黃一兩加甘草三錢大黃牡丹湯金匱肘後名瓜子湯治大腸癰小承氣湯去枳實厚朴加芒硝桃仁牡丹皮甜瓜子大黃附子湯金匱治脅下寒飲偏痛小承氣湯去枳實厚朴本方用大黃一兩加附子六錢細辛二錢水煎分溫三服如人行四五里進一服按此即瀉心湯去芩連之苦燥瀉里加細辛之辛溫走表以治脅下寒積兩不移易之定法也黃龍湯治失下循衣撮空虛極熱盛不下必死者小承氣湯本方用大黃三錢厚朴錢半枳實一錢加芒硝二錢甘草一錢人參較大黃減半當歸二錢生薑五片大棗一枚如腸鳴去芒硝加半夏茯苓血秘去甘草加桃仁泥生地黃汁氣秘去當歸加木香風秘去大棗加羌活年老氣虛去芒硝湯取黃龍命名專攻中央燥土土既燥竭雖三承氣萃集一方不得參歸鼓舞胃氣烏能興雲致雨或者以為因虛用參殊不知參在群行劑中則迅掃之威愈猛安望其有補益之力歟千金又以小柴胡易名黃龍湯意在培土以安風木殊非此方寓補於瀉之義三化湯治類中風外無六經形證內有便溺阻隔小承氣湯加羌活羌活導滯湯治大便風秘小承氣湯去厚朴加羌活獨活防己當歸甘草此方較三化湯藥味稍異而功用不殊與枳實導滯丸則涇渭各別彼雖亦本承氣而兼枳朮三黃因隸之傷飲食門此不復列紫草承氣湯治痘瘡乾紫便秘喘滿小承氣湯加紫草抵當湯玉函治蓄血少腹硬滿小便自利水蛭熬黑如無以鯪鯉甲生漆塗炙代之虻蟲去翅足熬各三十枚大黃酒浸一兩桃仁去皮尖三十枚上四味水煎去滓取三升溫服一升不下再服按此與承氣不同承氣用枳實厚朴以利氣此用水蛭虻蟲桃仁以破血也抵當丸玉函治蓄血小便自利服湯不應用此丸抵當湯本方用水蛭二十枚虻蟲二十五枚余同湯方杵細入蜜分為四丸以水一升煮一丸取七合服之晬時當下血若不下者更服變通抵當丸抵當丸去水蛭加䗪蟲二十個雞血拌瓦上焙乾余如本方如欲緩攻臨臥時酒服五丸至十丸瘀下止後藥下瘀血湯金匱治婦人產後腹痛有乾血著臍下抵當湯去水蛭虻蟲加䗪蟲二十枚熬去足代抵當場丸治虛人蓄血宜此緩攻抵當湯去水蛭虻蟲本方大黃用四兩酒浸桃仁用二十枚加芒硝蓬朮穿山甲歸尾生地黃各一兩肉桂三錢為末蜜丸蓄血在上部者丸如芥子黃昏去枕仰臥以津咽之令停喉以搜逐瘀積在中部食遠下部空心俱丸如梧子百勞水煎湯下之用歸地者引諸藥入血分也如血老成積攻之不動去歸地倍蓬朮肉桂涼膈散局方治溫熱時行表裡實熱及心火亢盛目赤便秘胃熱發斑大黃酒浸二兩芒硝一兩甘草炙六錢連翹一兩黃芩一兩山梔八錢薄荷七錢為散每服四五錢加竹葉十五片水煎溫日三夜二服得下熱退為度世本無竹葉有姜一片棗一枚蔥白一莖硝黃得枳樸之重著則下熱承之而順下得芩梔翹薄之輕揚則上熱抑之而下清此承氣涼膈之所攸分也用甘草者即調胃承氣之義也局方專主溫熱時行故用竹葉若治感冒之證從世本用蔥白薑棗可也清心散治溫熱時行壯熱神昏不語便溺閉澀涼膈散加黃連一兩為散每服四五錢加竹葉一把白蜜少許煎服頭痛加川芎防風石膏不應加麻黃轉舌丸治類中風舌強不語神識不清涼膈散加石菖蒲遠志肉各一兩蜜丸硃砂為衣薄荷湯化下潤燥湯治痘疹過用丁桂熱藥咽痛煩躁秘結涼膈散去硝黃加當歸白芍生地荊芥鼠黏子通聖散治西北卒中外內熱極涼膈散去竹葉加麻黃石膏滑石生白朮防風荊芥桔梗川芎當歸芍藥生薑雙解散治溫熱時行外內熱極通聖散倍滑石用生甘草備急丸金匱治心腹卒痛如錐刺宿食冷積脹滿巴豆去皮心膜用霜一錢乾薑生二錢大黃三錢上三味為末煉白蜜丸如小豆大溫水送下二三十丸妊娠禁用按備急丸治寒實結積之峻藥凡傷寒熱傳胃府舌胎黃黑刺裂唇口赤燥者誤用必死以巴豆大熱傷陰故也其白散白餅子消積神保酒癥等方皆然不可不慎其神保丸酒癥丸見傷飲食門楊氣丸下茲不復見白散玉函治寒實結胸備急丸去乾薑大黃用巴霜一錢加桔梗蘆貝母各三錢為散白飲和服半錢羸者減之雷氏千金丸治胸脹冷積作痛備急丸加焰硝桂心白餅子治小兒腹中癖積飲乳即嗽而吐痰涎備急丸去乾薑大黃用巴豆二十粒取霜加滑石輕粉半夏南星各一錢共杵為末糯米飲丸綠豆大捻作餅子每服二三餅蔥白湯下消積丸治小兒食積發熱大便酸臭備急丸去乾薑大黃用巴豆二十粒取霜加丁香九粒縮砂仁十二粒共杵為末以爛烏梅肉三枚糊丸黍米大每服三五丸溫水下伊尹三黃湯倉公名火齊湯金匱名瀉心湯治三焦實熱煩躁便秘黃連酒煮黃芩酒炒大黃酒浸等分麻沸湯二升漬之須臾絞去滓分溫再服麻沸湯者白水空煎鼎沸如麻也古方惟降火藥用之三黃丸治諸實熱不解三黃湯為末煉白蜜丸梧子大每服五十丸空心麻沸湯下金花湯治熱毒內蘊三黃湯去大黃加黃柏三味等分煎服更加梔子名桅子金花湯三補丸治陰火亢極不解金花湯為末蜜丸服黃連解毒湯治熱邪內外俱盛三黃湯去大黃加黃柏山梔等分煎服金花丸治積熱不解黃連解毒湯為末蜜丸服之大金花丸治中滿熱極淋秘溺血三黃丸加黃柏等分滴水為丸小豆大新汲水下三十丸按金花湯止芩連柏三味作丸則名三補金花丸較湯多山梔作湯名為解毒更加大黃則名大金花丸湯丸雖異功用不殊但取急攻則用湯緩祛則用丸微有區別耳大黃黃連瀉心湯玉函即黃連瀉心湯治熱邪內陷脅下痞滿三黃湯去黃芩麻沸湯漬絞服附子瀉心湯玉函治寒熱不和脅下痞結三黃湯另煎熟附子汁攪勻服之三黃梔子豉湯治熱病時疫頭痛壯熱三黃湯合梔子豉湯千金去黃芩加黃柏當歸六黃湯治營血虛熱盜汗三黃湯去大黃加黃柏黃耆生地黃熟地黃當歸汪石山去黃柏加蒲黃清心丸治心熱神昏驚悸不寧三黃湯去大黃用黃連三錢黃芩二錢加西牛黃半錢鬱金錢半豬心血為丸黍米大硃砂為衣燈心湯下三歲兒三十丸既濟解毒湯治上熱下寒大便秘三黃湯加甘草桔梗柴胡升麻連翹當歸人中黃丸治溫疫諸熱毒三黃湯本方用大黃三兩芩連各一兩加人中黃蒼朮桔梗滑石各二兩人參一兩防風五錢香附一兩五錢神麯糊丸清熱解毒湯送下二三錢清熱解毒湯方見白虎湯下此方專以伊尹三黃大解濕熱疫癘之邪其奧妙全在人中黃一味以汙穢之味同氣相求直清中上汙穢熱毒合滑石益元之制則兼清滲道用蒼朮香附者宣其六氣之郁也用桔梗者清其膈上之氣也用防風者開其肌腠之熱也十味祛邪散毒藥不得人參鼓舞其勢無以逞迅掃之力也用神麯為丸者取其留中而易化也更需清熱解毒下之即人參白虎合升麻葛根湯去粳米加羌活芩連生地總解內外之熱略取生薑之辛以行諸藥之性散諸經之毒耳三黃石膏湯治熱病時行內外大熱三黃湯去大黃加黃柏山梔石膏麻黃香豉生薑蔥白用清漿水煎服半日許不得汗再服便秘去麻黃香豉加大黃芒硝節庵槌法加芽茶一撮按此即解毒湯兼通聖散梔子豉湯之制而加麻黃石膏蔥姜以撤外內熱毒也如脈數實便秘上氣喘急舌卷囊縮則去麻豉而易硝黃又全用伊尹三黃矣普濟消毒飲治大頭捻頸瘟等證三黃湯去大黃加柴胡黑參連翹鼠黏升麻白芷甘草桔梗馬勃殭蠶板藍根半用水煎半用蜜丸噙化氣虛脈弱加人參五七分大便秘加酒大黃錢許微下之本方去升麻黑參鼠黏殭蠶板藍馬勃加荊芥防風羌活枳殼川芎射干名芩連消毒湯當歸龍薈丸治肝經積熱時發驚悸搐搦神志不寧頭目昏眩咽膈不利腸胃燥結躁擾狂越等證三黃湯加當歸龍膽蘆薈梔子青黛木香麝香蜜丸淡薑湯送二三十丸神芎丸治水腫外內俱實者三黃湯本方用大黃黃芩各二兩黃連半兩加滑石牽牛頭末各四兩川芎薄荷各半兩滴水為丸每服五七丸至十五丸臨臥溫水服濕熱腰脅腫滿加甘遂一兩遍身走注疼痛加白芥子一兩久毒熱腫腹痛加芒硝一兩關節不利加羌活一兩腸胃結滯加郁李仁一兩腰腿沉重加商陸一兩本方去黃連川芎薄荷名導水丸戴人取伊尹三黃丸變為神芎丸每令病人至夜先服百餘粒繼以浚川散投之五更當下種種病出投下少許再以和膈藥服之以利為度有五日一下者三日一下者病輕者一二服止重者五六度方愈是擒縱緩舒之妙臨病制宜非可言諭自非老年諳練有大負者焉敢效諸行事耶詳方後云每服五七丸至十五丸乃峻藥緩攻之成法此言每令病人先服百餘丸急乘元氣未漓為之迅掃各有至理不可以此礙彼也浚川散治水腫脹急大便不通大實大滿證三黃丸去芩連用大黃一兩加牽牛頭末郁李仁各一兩芒硝甘遂各半兩木香三錢為散每服二錢入生薑自然汁和如稀糊服按此乃下水積之峻藥火熱怫鬱水液不能宣通停滯而生濕熱在陽不去則化氣而為脹在陰不去則化積而成形世俗不省內經留者攻之但執補燥之劑怫鬱轉加而病愈甚也戴人曰養生與攻病本自不同今人以補藥治病宜乎不效也十棗湯玉函治懸飲內痛脅下有水氣脈弦數芫花熬甘遂大戟泡去骨等分上三味搗篩以水一升五合先煮大棗肥者十枚擘取八合去滓納藥末強人服一錢匕羸人服半錢匕平旦溫服若下少病不除者明日更服加半錢匕得快下利後糜粥自養補天石加生薑汁傷寒五法加肉桂神祐丸治陽水腫脹大小便秘十棗湯本方各一兩加大黃二兩黑牽牛頭末四兩輕粉一錢煮紅棗肉為丸初服五七丸日三服漸加快利為度按此方守真本仲景十棗湯加牽牛大黃輕粉三味較十棗倍峻然作丸緩進則威而不猛其法最良其於神祐丸中加青皮陳皮木香檳榔各半兩名舟車神祐已屬蛇足更於舟車丸中加入乳香沒藥名除濕丹風斯愈下殊不足法控涎丹治脅下痰積作病十棗湯去芫花大棗加白芥子等分為末曲糊丸服十五丸至二十丸驚疾加硃砂全蠍酒痰加雄黃全蠍驚氣成塊者加穿山甲鱉甲延胡索蓬朮臂痛加桂枝薑黃痰嗽加風化硝寒痰加丁香肉桂胡椒甘遂直達涎結之處大戟能攻胸脅之涎白芥子能破支結之飲此攻痰涎之峻劑也凡形盛色蒼氣壯脈實人有上證但服此藥數服其病如失後以六君子調補若氣虛皎白大便不實小便清利者誤服不旋踵而告變矣五苓散玉函治傷寒表裡未解渴而小便不利白朮生茯苓豬苓各二錢澤瀉三錢桂一錢上五味為散白飲和服方寸匕日三服或生料煎服溫覆取微似汗按五苓散本治太陽經邪犯本渴而小便不利飲水即吐之水逆故用二苓澤術利水生津又需桂以蒸動其津則渴者自不渴矣後人不達此義每用五苓治陰虛泉竭之證重涸其水發熱發渴勢必轉加豈方之咎歟況有去桂而用四苓者曷知此方全賴桂之辛溫則術不至壅滿用方者當須識此無愧聖賢一脈豬苓湯玉函治渴欲飲水小便不利及少陰病下利咳而嘔渴心煩不得眠五苓散去朮桂加滑石阿膠等分水煎去滓溫服日三按此太陽少陰藥也五苓散用術以導水滋干即兼桂之辛溫以蒸動其津氣此用滑石之清熱利水即兼阿膠之甘潤以保護其血液汗乃血之液故汗出多而渴者禁用豬苓散金匱治嘔吐思水五苓散去澤瀉桂為散飲服方寸匕日三服澤瀉湯金匱治支飲眩冒五苓散去豬苓茯苓桂茯苓澤瀉湯金匱治胃反吐而渴欲飲水五苓散去豬苓加甘草生薑家秘加蘆根茯苓戎鹽湯金匱治胞中精枯血滯小便不利五苓散去豬苓澤瀉桂加戎鹽即青鹽桂苓丸治腎氣上逆水泛為痰逆沖膈上及冒暑煩渴飲水過多腹脹小便不利五苓散去豬苓澤瀉白朮用桂一兩茯苓二兩蜜丸沸湯下二錢日三服作湯名桂苓飲桂苓甘露飲治溫熱病小便不通煩渴引飲五苓散加真寒水石石膏滑石四苓散治小便赤澀脹痛及溫熱時行煩渴五苓散去桂茵陳五苓散金匱治黃癉小便不利五苓散加茵陳蒿春澤湯治氣虛傷濕小便不利五苓散加人參葶藶木香散治陽水腹脹大小便秘五苓散加葶藶木香木通滑石甘草益元散一名天水散一名六一散治暑月小便不利滑石水飛六兩甘草炙六錢生四錢為散清水調服二三錢發散溫病熱病加蔥白五七莖香豉四合水煎溫服老人虛人及病後傷津小便不利禁用此方加蔥豉煎服則兼散表邪加吳茱萸則治白痢加紅曲則治血痢加炮姜則兼消飲食加神砂則兼退心火加青黛則散肝火加薄荷則清肺熱加石膏則除胃熱其入通聖雙解解毒等方隨證配合未遑枚舉辰砂六一散治暑月驚悸多汗小便澀痛益元散一料加辰砂一錢飛蒲灰散金匱治皮水小便不利而渴益元散去甘草用滑石三分加蒲灰七分為散飲服方寸匕日三服滑石白魚散金匱治消渴小便不利小腹脹痛有瘀血益元散去甘草加亂髮燒白魚炙等分為散飲服方寸匕日三服白虎湯玉函治熱病壯熱煩渴及中暍煩熱而渴石膏八錢生用碎知母三錢甘草一錢炙粳米半合水煎溫分三服一日盡飲之人參白虎湯玉函即白虎加人參湯治熱病舌乾大渴發熱背寒白虎湯加人參桂枝白虎湯治溫病感冒客邪而渴及溫瘧先熱後寒白虎湯加桂枝蒼朮白虎湯治濕溫身熱足冷白虎湯加蒼朮竹葉石膏湯玉函治大病後煩熱作渴白虎湯去知母加竹葉人參半夏麥門冬既濟湯治上熱下寒竹葉石膏湯加熟附子三五分清熱解毒湯治時疫大熱白虎湯去粳米加人參羌活升麻葛根白芍黃芩黃連生地黃生薑栝蔞葛根湯治風溫無大熱而渴白虎湯去知母粳米加人參栝蔞根葛根防風按此湯治風溫無大熱而渴夫既無大熱則不當渴矣既渴必非無大熱也緣風溫之熱邪內蘊故借白虎加人參湯裁去知母粳米加栝蔞根以清熱解渴葛根以布胃行津防風以開表散邪人參甘草佐石膏栝蔞以化熱性雖甘溫當無助長伏邪之虞大青湯治斑子熱毒白虎湯去粳米加大青黑參木通生地黃荊芥竹藥玉露散治小兒傷熱吐瀉色黃白虎湯去知母粳米加寒水石如無真者滑石代之為散每服半錢匕至一錢匕沸湯調日三服薛立齋云若飲食如常作瀉飲冷宜用此藥若食少體倦喜飲熱湯此脾氣虛陷宜六君子湯加升柴此方切禁蘭香飲子治消中能食而瘦大渴便秘白虎湯去粳米加人參生甘草蘭香俗名香草防風升麻桔梗連翹半夏白豆蔻按消中為脾胃積熱故東垣本人參白虎而立蘭香飲子內經所謂治之以蘭除陳氣也但方中防風半夏豆蔻升麻未免過於辛燥曷不去此加入麥冬五味以滋化源佐白虎以化胃熱蘭香以除陳氣與歸脾湯中用木香之意不殊或於竹葉石膏湯中加知母蘭香尤妥生津甘露飲治上焦熱渴蘭香飲子去防風半夏加當歸麥冬山梔黃連黃柏藿香木香駐車丸千金治陰虛下痢發熱膿血稠黏及休息痢阿膠三兩黃連炒黑當歸各兩半乾薑炮一兩上四味搗篩醋煮阿膠為丸梧子大每服四五十丸晝夜三服米飲下三車運精氣神分治三焦以調適陰陽此因陽熱過旺陰精受傷故用黃連以駐鹿車之驟乾薑以策牛車之疲阿膠以輓羊半車之陷當歸以和精氣神之散亂也阿膠丸治冷熱不調傷犯三陰腹痛下膿血駐車丸本方膠連各二兩歸姜各一兩加木香黃芩赤石脂醋煅水飛龍骨醋煅水飛各一兩厚朴薑製半兩米飲丸梧子大每服三十丸晝二夜一服米飲下歸連丸治陰虛下痢五色及孕婦噤口赤痢駐車丸去乾薑本方用阿膠二兩歸連各一兩加黃芩黃柏炒黑各半兩蘄艾兩半上除膠艾為細末以醋二升煮艾至一升去滓入膠烊化為丸綠豆大每服六七十丸晝夜三服米飲下阿膠梅連丸治陰虛下痢五色至夜發熱駐車丸本方用膠連各三兩當歸一兩五錢炮姜一兩加黃柏炒黑赤芍藥赤茯苓烏梅肉炒枯各一兩五錢醋煮阿膠為丸梧子大每服三五十丸晝夜三服米飲下千金黃連湯治赤白痢駐車丸本方用阿膠三錢黃連當歸各錢半炮姜一錢加黃柏炮黑甘草炙各一錢酸石榴皮錢半上除阿膠水煎去滓納膠烊化溫分三服佐金丸治肝經鬱熱吐酸綠青黃水川黃連六兩吳茱萸揀去閉口者取淨一兩同黃連煎乾為細末米飲糊丸梧子大每服四五十丸空心白朮陳皮湯或加味逍遙散作湯送下抑青丸治肝火脅下急痛佐金丸二味等分製法如前制過揀去吳茱萸取黃連焙燥一味為末滴水為丸每服四五十丸空心沸湯臨臥陳酒送下酒煮黃連丸治心火亢盛外內俱熱及伏暑發熱嘔吐佐金丸去吳茱萸用黃連一味酒煮焙燥為末滴水為丸每服四五十丸空心沸湯下香連丸局方治下痢赤白相兼白多於赤者佐金丸如前制過去吳茱萸加木香一兩醋糊丸每服五十丸米湯砂仁湯任下戌己丸局方治濕熱泄痢腹痛不止佐金丸加白芍六兩神麯糊丸空心米湯砂仁湯蘄艾湯任下大補丸治陰火亢極足脛疼熱不能久立及婦人火鬱發熱厚黃柏鹽酒拌陳米飯上蒸每蒸必拌炒黑亮如漆為度炒白蜜丸梧子大每服二錢空心醇酒下如服之不應每斤加厚肉桂一兩潛行散治濕熱足膝腫痛大補丸用薑汁拌炒數次為末每服錢半空心醇酒下大補陰丸治陰虛火旺煩熱易飢足膝疼熱大補丸四兩加知母四兩熟地黃龜版各六兩豬脊髓和蜜丸梧子大空心姜鹽湯下五十丸滋腎丸治陰虛大渴小便澀痛熱起足心大補丸十分加知母七分肉桂一分滴水為丸食前沸湯下七八十丸凡熱在足心直衝股內而入腹者謂之陰火起於湧泉之下雖熱而不發渴為熱在膀胱此方主之虎潛丸治下體痿弱大補丸三兩加龜版熟地各三兩知母牛膝各二兩白芍藥鎖陽虎脛骨當歸身各一兩五錢炮姜半兩醇酒為丸侵晨淡鹽湯下三錢痿而厥冷加熟附子半枚虎體陰性剛而好動故欲其潛使補陰藥咸隨其性潛伏不動得以振剛勁之力則下體受蔭矣其膝脛乃筋骨結聚功力最優若用掌骨各隨患之前後左右取用不必拘於左前為善也加味虎潛丸治痿濡而厥虎潛丸去知母加人參黃耆山藥枸杞各二兩五味子一兩二妙散治身半以下濕熱疼重而腫大補丸改用薑汁製數次淨加茅山蒼朮去皮切麻油拌炒淨等分為散薑汁調每日空心溫酒送二錢本方加肉桂名三妙散金液丹局方治陰極發躁厥冷脈伏爪甲唇青水腫脈伏小便不通陰結畏寒大便秘明淨硫黃五兩研細水飛入煬成罐內水調赤石脂末封口鹽泥通身固濟候乾三足釘釘於地將罐放釘上慢火燒養七晝夜再加頂火用炭十斤為度候冷取出研細每末一兩用蒸餅一兩打糊為丸梧子大每服二三十丸溫白湯送下陰極冷甚者服百丸靈砂丹局方治上盛下虛痰涎壅盛最能鎮墜虛火升降陰陽和五臟助真元水銀四兩硫黃一兩上二味新銚內炒成砂子入水火鼎煅煉為末糯米糊丸如麻子大每服三丸空心棗湯米湯井花水人參湯任下量病輕重可增至五七丸忌豬羊血綠豆粉冷滑之物又法入煬成礶內赤石脂封口鹽泥固濟三足釘釘打火盞內置水勿令乾候三炷香足為度二氣丹治伏暑傷冷二氣交錯中脘痞結或瀉或吐硝石硫黃等分右為細末銀石器內炒黃色再研細糯米糊丸梧子大每服五七丸新汲井花水下不應更服玉真丸治腎厥頭痛四肢逆冷硝石硫黃二味同制如二氣丹石膏生半夏湯泡七次等分為末薑汁和神麯丸食後薑湯下二三十丸虛寒甚者加鍾乳粉半硫丸局方治高年冷秘虛秘及痃癖冷氣硫黃醋煅柳木槌碎研半夏湯泡曬乾為末上二味等分用生薑自然汁調蒸餅糊杵數百下丸如梧子大每服十五丸至二十丸空心無灰酒或生薑湯任下婦人醋湯下養正丹局方治上盛下虛氣不升降元陽虧損氣短身羸及中風痰盛涎潮不省人事傷寒陰盛自汗唇青婦人血海久冷水銀黑錫與水銀結成砂子硫黃研硃砂水飛各一兩淨用鐵銚熔化黑錫入水銀將柳木槌攪次下硃砂攪令不見星子下少時方入硫黃末急攪成汁和勻如有焰以醋灑之候冷取出研細煮糯米糊丸綠豆大每服十五丸至三十丸鹽湯或棗湯人參湯任下或丸如芡實囫圇服一丸得睡勿驚覺來復丹局方治上盛下虛裡寒外熱及伏暑泄瀉如水硝石硫黃同硝石為末銀石器內慢火炒柳木槌攪之不可猛火以傷藥力太陰元精石水飛青皮去穰陳皮去白各一兩五靈脂酒飛去砂石澄定曬乾二兩為末古法以醋和丸米飲下因醋易黴壞今改用米飲糊丸如梧子大每服三十丸空心醋湯下黑錫丹局方治真元虧憊陽氣不固陰氣逆沖三焦不和冷氣刺痛腰背沉重男子精冷滑泄婦人白帶清冷及陰證陰毒四肢厥冷不省人事急吞百丸即使回陽大能升降陰陽墜痰定喘沉香附子炮胡蘆巴酒浸炒陽起石煅飛補骨脂舶上茴香肉豆蔻煨金鈴子酒蒸去皮核木香各一兩肉桂半兩黑錫熔去渣硫黃各二兩上用黑錫入鐵銚內熔化入硫黃如常法制結成砂子地上出火毒研令極細余藥並細末和勻自朝至暮研至黑光色為度酒麴糊丸如梧子大陰乾藏鉛罐內每服四五十丸空心鹽湯或棗湯薑湯任下婦人艾湯下急證可投百丸三和丹治一切陰寒諸藥不效者養正丹十丸來復丹二十丸黑錫丹三十丸鹽湯棗湯薑湯人參湯任下附張介賓八略總論補略一補方之制補其虛也凡氣虛者宜補其上人參黃耆之屬是也精虛者宜補其下熟地枸杞之屬是也陽虛者宜補而兼暖桂附乾薑之屬是也陰虛者宜補而兼清門冬芍地之屬是也此固陰陽之治辨也其有氣因精而虛者自當補精以化氣精因氣而虛者自當補氣以生精又有陽失陰而離者不補陰何以收散亡之氣水失火而敗者不補火何以蘇垂絕之陰此又陰陽相濟之妙用也故善補陽者必於陰中求陽則陽得陰助而生化無窮善補陰者必於陽中求陰則陰得陽升而泉源不竭余故曰以精氣分陰陽則陰陽不可離以寒熱分陰陽則陰陽不可混此又陰陽邪正之離合也故凡陽虛多寒者宜補以甘溫而清潤之品非所宜陰虛多熱者宜補以甘涼而辛燥之類不可用知宜知避則不惟用補而八方之制皆可得而貫通矣和略一和方之制和其不和者也凡病兼虛者補而和之兼滯者行而和之兼寒者溫而和之兼熱者涼而和之和之為義廣矣亦猶土兼四氣其於補瀉溫涼之用無所不及務在調平元氣不失中和之為貴也故凡陰虛於下而精血虧損者忌利小水如四苓通草湯之屬是也陰虛於上而肺熱乾咳者忌用辛燥如半夏蒼朮細辛香附芎歸白朮之屬是也陽虛於上者忌消耗如陳皮砂仁木香檳榔之屬是也陽虛於下者忌沉寒如黃柏知母梔子木通之屬是也大便溏泄者忌滑利如二冬牛膝蓯蓉當歸柴胡童便之屬是也表邪未解者忌收斂如五味棗仁地榆文蛤之屬是也氣滯者忌閉塞如黃耆白朮山藥甘草之屬是也經滯者忌寒凝如門冬生地石斛芩連之屬是也凡邪火在上者不宜升火得升而愈熾矣沉寒在下者不宜降陰被降而愈亡矣諸動者不宜再動如火動者忌溫暖血動者忌辛香汗動者忌疏散神動者忌耗傷凡性味之不靜者皆所當慎其於剛暴更甚者則又在不言可知也諸靜者不宜再靜如沉微細弱者脈之靜也神昏氣怯者陽之靜也肌體清寒者表之靜也口腹畏寒者里之靜也凡性味之陰柔者皆所當慎其於沉寒更甚者又在不言可知也夫陽主動以動濟動火上添油也不焦爛乎陰主靜以靜益靜雪上加霜也不寂滅乎凡前所論論其略耳而書不盡言言不盡意能因類而廣之則存乎其人矣不如此義又何和劑之足云攻略一攻方之制攻其實也凡攻氣者攻其聚聚可散也攻血者攻其瘀瘀可通也攻積者攻其堅在臟者可破可培在經者可針可灸也攻痰者攻其急壯實者暫宜解標多虛者只宜求本也但諸病之實有微甚用攻之法分重輕大實者攻之未及可以再加微實者攻之太過每因致害凡病在陽者不可攻陰在胸者不可攻臟若此者邪必乘虛內陷所謂引賊入寇也病在陰者勿攻其陽病在裡者勿攻其表若此者病必因誤而甚所謂自撤藩蔽也大都治宜用攻必其邪之甚者也其若實邪果甚自與攻藥相宜不必雜之補劑蓋實不嫌攻若但略加甘滯便相牽制虛不嫌補若但略加消耗偏覺相妨所以寒實者最不喜清熱實者最不喜暖然實而誤補不過增病病增者可解虛而誤攻必先脫元元脫者無治矣是皆攻法之要也其或虛中有實實中有虛此又當酌其權宜不在急宜攻急宜補者之例雖然凡用攻之法所以除凶剪暴也亦猶亂世之兵必不可無然惟必不得已乃可用之若或有疑慎勿輕試蓋攻雖去邪過則傷氣受益者四受損者六故攻之一法先哲最為詳審正恐其成之難敗之易耳倘任意不思此其人可知矣散略蓋麻黃為太陽之本藥至必不可移易哉一節石頑潤色一散方之制散表證也觀仲景太陽證用麻黃湯陽明證用葛根湯少陽證用小柴胡湯此散表之準繩也後世宗之而復不能用之在不得其意耳蓋麻黃為太陽之本藥陽明經證亦多用之觀陽明經證治例其義可見按麻黃苦溫專泄肺氣仲景藉以開發太陽經邪為解表之重劑若非冬月正傷寒原無藉此即陽明之葛根湯未嘗不用麻黃未嘗不走太陽也豈謂某經某藥必不可移易哉但用散之法當知性力緩急及氣味溫寒之辨用得其宜諸經無不應也如麻黃桂枝峻散者也防風荊芥紫蘇平散者也細辛白芷生薑溫散者也升麻川芎能舉陷上行而散者也第邪淺者忌峻利之屬氣弱者忌雄悍之屬熱多者忌溫散之屬寒多者忌清涼之屬凡渴而煩躁者喜乾葛而嘔惡忌之寒熱往來者宜柴胡而泄瀉者忌之寒邪在上者宜升麻川芎而內熱火升者忌之此性用之宜忌所當辨也至於相配之法則尤當知要凡以平兼清自宜涼散以平兼暖亦可溫經宜大溫者以熱濟熱宜大涼者以寒濟寒此其運用之權則毫釐進退自有伸縮之妙又何必膠柱刻舟以限無窮之病變哉此無他在不知仲景之意耳寒略一寒方之制為清火也為除熱也夫火有陰陽熱分上下據古方書咸謂黃連清心黃芩清肺石斛芍藥清脾龍膽清肝黃柏清腎今之用者多守此法亦是膠柱法也大凡寒涼之物皆能瀉火豈有涼此而不涼彼者但當分其輕清重濁性力微甚用得其宜則善矣夫輕清者宜以清上如黃芩石斛連翹天花粉之屬也重濁者宜於清下如梔子黃柏龍膽滑石之屬也性力之厚者能清大熱如石膏黃連蘆薈苦參山豆根之屬也性力之緩者能清微熱如地骨皮玄參貝母石斛童便之屬也以攻而用者去實郁之熱如大黃芒硝之屬也以利而用者去癃閉之熱如木通茵陳豬苓澤瀉之屬也以補而用者去陰虛枯燥之熱如生地二冬芍藥梨漿細甘草之屬也方書之分經用藥者意正在此但不能明言其意耳然火之甚者在上亦宜重濁火之微者在下亦可輕清夫宜涼之熱皆實熱也實熱在下自宜清利實熱在上不可升提蓋火本屬陽宜從陰治從陰治者宜降升則反從其陽矣經曰高者抑之義可知也外如東垣有升陽散火之法此以表邪生熱者設不得與伏火內炎者並論表邪生熱當作鬱熱外發為妥熱略一熱方之制為除寒也夫寒之為病有寒邪犯於肌表者有生冷傷於脾胃者有陰寒中於臟腑者此皆外來之寒去所從來則其治也是皆人所易知者至於本來之寒生於無形無響之間初無所感莫測其因人之病此者最多知此者最少果何謂哉觀丹溪曰氣有餘便是火余續之曰氣不足便是寒夫今人之氣有餘者能十中之幾其有或因稟受或因喪敗以致陽氣不足者多見寒從中生而陽衰之病無所不致第其由來者漸形見者微當其未覺也孰為之意及其既甚也始知難治矧庸醫多有不識每以假熱為真火因復斃於無形無響者又不知其幾許也故惟高明見道之士常以陽衰根本為憂此熱方之不可不豫也凡用熱之法如乾薑能溫中亦能散表嘔惡無汗者宜之肉桂能行血善達四肢血滯多痛者宜之吳茱萸善暖下焦腹痛泄瀉者極妙肉豆蔻可溫脾胃飧泄滑利者最奇胡椒溫胃和中其類近於蓽茇丁香止嘔行氣其暖過於豆仁補骨脂性降而善閉故能納氣定喘止帶濁泄瀉製附子性行如酒故無處不到能救急回陽至若半夏南星細辛烏藥良薑香附木香茴香仙茅巴戟之屬皆性溫之當辨者然用熱之法尚有其要以散兼溫者散寒邪也以行兼溫者行寒滯也以補兼溫者補虛寒也第多汗者忌姜姜能散也失血者忌桂桂動血也氣短氣怯者忌骨脂骨脂降氣也大凡氣香者皆不利於氣虛證味辛者多不利於見血證是用熱之概也至於附子之辨凡今之用者必待勢不可為不得已然後用之不知回陽之功當於陽氣將去之際便當漸用以望挽回若用於既去之後死灰不可復燃尚何益於事哉但附子性悍獨任為難必得大甘之品如人參熟地炙甘草之類皆足以制其剛而濟其勇以補培之無往不利矣此壺天中大將軍也可置之無用之地乎但知之真而用之善斯足稱將將之手矣固略一固方之制固其泄也如久嗽為喘而氣泄於上者宜固其肺久遺成淋而精脫於下者宜固其腎小水不禁者宜固其膀胱大便不禁者宜固其腸臟汗泄不止者宜固其皮毛血泄不止者宜固其營沖凡因寒而泄者當固之以熱因熱而泄者當固之以寒總之在上者在表者皆宜固氣氣主在肺也在下者在裡者皆宜固精精主在腎也然虛者可固實者不可固久者可固暴者不可固當固不固則滄海亦將竭不當固而固則閉門延寇也二者俱當詳酌之因略一因方之制因其可因者也凡病有相同者皆可按證而用之是謂因方如癰毒之起腫可敷也蛇蟲之患毒可解也湯火傷其肌膚熱可散也跌撲傷其筋骨斷可續也凡此之類皆因證而可藥者也然因中有不可因者又在乎證同而因不同耳蓋人之虛實寒熱各有不齊表裡陰陽治當分類故有宜乎此而不宜乎彼者有同於表而不同於里者所以病雖相類而但涉內傷者便當於血氣中酌其可否之因不可謂因方之類儘可因之而用也因之為用有因標者有因本者勿因此因字而誤認因方之義兼略石頑參補一兼方之制用間法也與師旅之間諜無異舉世但知以寒治熱以熱治寒曷知病勢之危殆錯雜難分況多假脈假證非洞達玉函金匱之奧難以語此如表證用麻黃此正治也越婢大青龍則兼石膏以化熱麻附細辛湯麻附甘草湯則兼附子以救寒此變法也陰寒用附子此正治也真武湯則兼生薑以散水氣白通通脈則兼蔥白以通陽豬膽汁以收陰此變法也腑實用大黃此正治也大黃附子湯附子瀉心湯則兼附子以破結黃龍湯則兼人參以助力足補南陽之未逮此變法也陽邪陷陰欲轉陽分用芍藥甘草護持營氣此正治也四逆散則兼柴胡以通中道當歸四逆則兼桂枝以通接壤使陰從陽化此變法中之定法也妊娠胎息不安用茯苓芍藥護持陰血此正治也附子湯則兼附子以治子臟開少腹如扇桂心茯苓丸則兼桂心以治宿有癥病胎動下血始知桂附反有固胎之用是皆病證之變端不能守尋常繩墨也然必察其生氣未艾方可特出奇兵以擊之若脈證俱殆慎勿貪功以招爍金之謗也讀景岳先生八略至末條因略略無深意而獨不及兼制之法余不自揣贅入此例以續貂之不足其因略原文不敢擅裁仍兩存之石頑老人漫述
