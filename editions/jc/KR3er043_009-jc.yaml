body:
  text: 卷九瘡瘍門癰疽腫瘍潰瘍作痛不止作嘔不止出血不止肌肉不生發熱不止大便不通小便不通作渴不止自汗不止下痢不止敷寒涼藥用刀針法癰疽一科自有專擅其術者以是手輯醫通獨略此門然有兼患內證瘍醫不能措指者因取靈素金匱明之新甫等數條列之本門諸凡治例未遑遍述庶免瘠環同類之誚云靈樞云夫血脈營衛周流不休上應星宿下應經數寒邪客於經絡之中則血泣血泣則不通不通則衛氣歸之不得復反故癰腫寒氣化為熱熱勝則肉腐肉腐則為膿膿不瀉則爛筋筋爛則傷骨骨傷則髓消不當骨空不得泄瀉血枯空虛則筋骨肌肉不相榮經脈敗漏熏於五臟臟傷則死矣癰發於嗌中名曰猛疽猛疽不治化為膿膿不瀉塞咽半日死其化為膿者瀉則合豕膏冷食三日而已發於頸名曰天疽其癰大以赤黑不急治則熱氣下入淵液前傷任脈內熏肝肺十餘日而死矣陽氣大發消腦留項名曰腦爍其色不樂項痛如刺以針煩心者死發於肩及臑名曰疵疽其狀赤黑急治之此令人汗出至足不害五臟癰發四五日逞焫之發於腋下赤堅者名曰米疽治之以砭石欲細而長疏砭之塗以豕膏六日已勿裹之其癰堅而不潰者為馬刀挾癭急治之發於胸名曰井疽其狀如大豆三四日起不早治下入腹不治七日死發於膺名曰肝疽色青其狀如谷實栝蔞常苦寒熱急治之去其寒熱半歲死死後出膿發於脅名曰敗疵敗疵者女子之病也灸之其狀大癰膿治之其中乃有生肉大如赤小豆銼䔖翹草根各一升零䔖連翹根各一升也以水一斗六升煮之竭為取三升則強厚衣坐於釜上令汗出至足已發於股脛名曰股脛疽其狀不甚變而癰膿搏骨不急治三十日死發於尻名曰銳疽其狀赤堅大急治之不治三十日死發於股陰名曰赤疽不急治六十日死在兩股內不治十日當死發於膝名曰疵癰其狀大癰色不變寒熱如堅石勿石石之者死須其柔乃石之者生諸癰疽之發於節而相應者不可治也發於陽者百日死發於陰者三十日死發於脛名曰兔齧其狀赤至骨急治之不治害人也發於內踝名曰走緩其狀癰也色不變數石其輸而止其寒熱不死發於足上下名曰四淫其狀大癰不急治百日死發於足傍者名曰癘癰其狀不大初如小指發急治之去其黑者不消輒益不治百日死發於足指名脫癰一名脫疽其狀赤黑死不治不赤黑不死不衰急斬之不則死矣營氣稽留於經脈之中則血泣而不行不行則衛氣從之而不通壅遏而不得行故熱大熱不止熱勝則肉腐肉腐則為膿然不能陷骨髓不為焦枯五臟不為傷故命曰癰熱氣深甚下陷肌膚筋骨枯內連五臟血氣竭當其癰下筋骨良肉皆無餘故命曰疽疽者上之皮夭以堅上如牛領之皮癰者其皮上薄以澤此其候也病有形而不痛者陽之類也無形而痛者陰之類也無形而痛者其陽完而陰傷之也急治其陰無攻其陽有形而不痛者其陰完而陽傷之也急治其陽無攻其陰陰陽俱動乍有形乍無形加以心煩命曰陰勝其陽此為不表不里其形不久身有五部伏兔一腓二腓者腨也背三五臟之俞四項五此五部有癰疽者死喜怒不測飲食不節陰氣不足陽氣有餘營氣不行乃發為癰陰陽不相通兩熱相持乃化為膿其白眼青黑眼小是一逆也內藥而嘔是二逆也腹痛渴甚是三逆也肩項中不便是四逆也音嘶色脫是五逆也除此五者為順矣素問云膏粱之變足生大疔受如持虛汗出見濕乃生痤痱營氣不從逆於肉理乃生癰腫氣傷痛形傷腫先痛而後腫者氣傷形也先腫而後痛者形傷氣也金匱云諸浮數脈應當發熱而反灑淅惡寒若有痛處當發其癰師曰諸癰腫欲知有膿無膿以手掩腫上熱者為有膿不熱者為無膿發熱而脈見浮數證脈相應也脈見浮數而反灑淅惡寒是火鬱不得發越若有痛處而飲食如常必發癰腫之候腫熱未甚尤可消散腫熱已劇癰膿已成後世用濕紙貼腫上候其癰腫之頭亦不出乎此意浸淫瘡從口流向四肢者可治從四肢流來入口者不可治浸淫瘡黃連粉主之方缺病機機要云瘰癧者結核是也或在耳後或在耳前或在耳下連及頤頷或在頸下連缺盆皆謂瘰癧或在胸之側或在兩脅皆謂之馬刀手足少陽主之此本膏粱丹毒火熱之變因虛勞氣鬱所致止宜補形氣調經脈其瘡當自消蓋不待汗之下之而已也其不詳脈證經絡受病之異者下之先犯病禁經禁故致失手且有兼痰兼氣兼血兼陰虛等證者病本不同治當求責瘡瘍者火之屬須分內外以治其本內之外者其脈沉實發熱煩躁外無焮赤痛深於內其邪氣深矣故疏通臟腑以絕其源外之內者其脈數焮腫在外形證外顯恐氣極而犯內故先托裡也內外之中者外無焮惡之氣內亦臟腑宣通知其在經當和營衛也用此三法之後雖未愈必無變證亦可使邪氣峻減而易愈外科精要云熱發於皮膚之間浮腫根小至大不過二三寸者為癤六腑積熱騰出於肌肉之間其發暴盛腫皮肉光軟根腳廣大為癰五臟風毒積熱攻焮肉骨風毒猛暴初生一如蓓蕾形自焦枯觸之應者乃疽也夫五善七惡者動息自寧飲食知味一善也便利調勻二善也膿稠腫消不臭三善也神采精明語聲清爽四善也體氣平和五善也煩躁時嗽腹痛渴甚或泄利無度小便如淋一惡也膿血大泄腫焮尤甚膿色敗臭痛不可近者二惡也喘粗短氣恍惚嗜臥三惡也目視不正黑睛緊小白睛青赤瞳子上視者四惡也肩背不便四肢沉重五惡也飲食不下服藥而嘔食不知味六惡也聲嘶色敗唇鼻青面目四肢浮腫七惡也五善見三則瘥七惡見四則危然則病有源同七惡者乃皮緊急而知善也病有源同五善者乃皮緩虛而知惡也是豈凡醫所知哉凡人初見發背欲結未結赤熱腫痛先以濕紙覆其上立視候之其紙先干處即是結癰頭也取大蒜切成片如三錢厚薄安於頭上用大艾炷灸之三壯即換一蒜片痛者灸至不痛不痛者灸至痛時方佳最要早覺早灸為上一日二日十灸十活三日四日六七活五六日三四活過七日則不可灸矣若有十數頭作一處生者即用大蒜研成膏作薄餅鋪頭上聚艾於蒜餅上燒之亦能活也若背上初發赤腫一片中間有一片黃粟米頭子便用獨蒜切去兩頭取中間切三錢厚正安瘡上著艾灸十四壯多至四十九壯此謂癰疽初發宜灸之也然諸瘡患久成漏者常有膿水不絕其膿不臭內無反肉尤宜用附子浸透切作大片厚三二分於瘡著艾灸之仍服內托之藥隔二三日再灸之不五七次自然肌肉長滿矣至有膿水惡物漸漬根深者郭氏用白麵硫黃大蒜三物一處搗爛看瘡大小捻作餅子厚約三分安瘡上用艾灸二十一壯一灸一易灸後四五日方用挺子紝入瘡內歹肉盡去好肉長平然後貼收斂之藥內服應病之劑調理即瘥矣蓋不止宜灸於瘡之始發也惟發於頭腦者皆不可灸頭為諸陽之會灸之反助其火毒耳腫瘍薛立齋曰腫瘍者以疳瘍未潰而言也經云形傷痛氣傷腫又云營氣不從逆於肉理乃生癰腫皆因膏粱厚味七情陰火或炙爆甘美積毒氣血不和所致當分其經絡所屬五臟相勝與元稟虧損預為審用攻補調和之劑速令散潰尤當審其勢之腫漫色之赤白與痛有微甚毒有表裡若腫高焮痛便利調和邪在表也宜表散之腫硬痛深大便秘澀邪在內也宜下之外無拘急內則便利調和者邪在經絡也宜調營衛腫焮大痛或麻木不痛邪氣凝滯也外用隔蒜灸內服活命飲或歸耆飲尤效無問何部分但赤腫者必消若煩躁飲冷赤痛發熱二便不通者火熱內熾也用四味清涼飲或活命飲加大黃尤善若微腫微痛或不痛陽氣虛弱也參耆內托散微黯微赤或不赤或惡寒而不作膿或膿熟而不潰者陽氣虛寒也並用千金托裡散如此則未成者自能消已成者自能潰尤當別其屬陰屬陽或半陰半陽而治之若泥於腫瘍禁用辛熱之說不分受證之因兼證之經概行敗毒泛擾諸經誅伐無過以致不能起發或不能潰腐收斂變證莫能枚舉癰疽論云腫瘍內外皆壅宜以托裡表散為主但見腫痛參之脈證虛弱便與兼補氣血無虧可保終吉若腫瘍之際治失其法必致潰瘍之變證此推內經之微旨而生平之徵驗者尤當觸類而長愚奚庸贅潰瘍潰瘍者以瘡瘍膿潰而言也膿潰而腫消痛止者為順若膿潰腫痛或發寒熱者氣血虛也十全大補湯膿潰欲嘔少食脾胃虛弱也六君子加炮姜手足並冷者脾氣虛寒也六君子加薑桂不應急加附子膿潰而仍痛或二便秘澀者熱毒未解也清熱消毒湯熱退而渴不退津液不足也八珍加黃耆麥冬山茱萸熱止而小便頻數腎虛也加減八味丸料若熱不止或腫痛反甚虛熱內作也保元湯加清心涼血之劑或熱退而肌肉不生者氣血俱虛也十全大補湯瘡色夭白或陷下不斂寒氣所襲也五味異功散佐以豆豉餅膿血過多煩躁不安乃亡陽也急用獨參湯尤當審其腫之軟硬飲食冷熱與膿之稠稀多少肉之赤色青黯及瘡口之收斂遲速而投托里消毒調補之劑庶無變證癰疽論云潰瘍內外皆虛宜以托裡補接為主蓋潰瘍之變證由於腫瘍之際治失其宜虧損元氣所致治者可不慎歟作痛不止瘡瘍作痛當審邪之所在證之所因如寒熱而痛邪在表也人參敗毒散便秘而痛邪在裡也清熱消毒湯加白蜜腫焮而痛血凝滯也活命飲作膿而痛者托裡消毒散排膿脹而痛者針之膿潰而痛者補之氣虛而痛四君子加歸耆血虛而痛四物湯加參耆大抵形傷痛氣傷腫不知此數者徒以乳香沒藥為止痛之方則非所以為法矣仍審五臟相勝相兼之證而治之後仿此作嘔不止丹溪云腫瘍時嘔當作毒氣攻心治之潰瘍時嘔當作陰虛補之此論其常耳如腫赤焮痛而嘔者熱毒甚也活命飲作膿而嘔者血氣虛也六君子加歸耆便秘而嘔者熱在臟也清熱消毒湯去生地金銀花加檳榔木香寒藥服多而嘔者胃氣傷也六君子加桔梗柴胡有肝氣乘脾而嘔者有胃虛停痰而嘔者有鬱結傷脾而嘔者皆由脾胃虛弱毒氣蓄聚治宜調補中氣則正氣復而邪氣去矣出血不止瘡口出血有因五臟相勝陰陽不調而血不止者有因六淫七情之氣不平而血妄行者若因肝火內動四物加山梔丹皮肝經血虛六味丸心虛不能統血四物加參朮丹皮酸棗仁脾虛不能統血四君子加山梔丹皮脾虛鬱滯歸脾湯脾肺氣虛補中益氣湯氣血俱虛十全大補湯腎氣不足而肝火內動六味丸梔子清肝散加五味大凡失血過多而見煩熱發渴等證勿論其脈不問其證急用獨參湯以補其氣經云血生於氣苟非參耆歸術甘溫之藥決不能愈若發熱脈大者多不治肌肉不生肌肉乃脾胃所生收斂皆氣血所主二者相濟以成者也若肌肉不生而色赤血熱也四物加山梔丹皮晡熱內熱血虛也四君子加歸地丹皮膿水清稀氣血虛也十全大補湯食少體倦脾氣虛也補中益氣湯煩熱作渴起居如常者胃熱也竹葉黃耆湯煩熱作渴小便頻數者腎虛也六味丸肉腐而不潰者烏金膏若肉潰而不斂者六君子湯外用珍珠散敷之臭穢脈洪大而作渴乃真氣虛而邪氣實也此為難治大凡瘡瘍久而不愈者皆元氣不足或因邪氣凝滯於患處苟能調補脾胃則元氣自足元氣既足則邪氣自消死肉自潰新肉自生而瘡自斂矣若不保其本而概敷生肌之劑是反助其邪後更潰爛耳發熱不止瘡瘍發熱初患乃毒氣所焮已成乃內焮作膿已潰乃血氣虧損不可概行敗毒以傷元氣蓋未成者當分邪之在表在裡將成者當分邪之可攻可補已成者當分膿之作與未作膿已成者當分膿之淺深高漫膿已潰者當分痛之止與不止若作痛而發熱者活命飲作膿而發熱者托裡消毒散膿出而發熱者八珍加黃耆午前發熱者陽氣虛也補中益氣湯發熱作渴小便頻數者腎氣虛弱也加減八味丸膿血多而熱者陽無所附也十全大補湯日將晡而熱者氣血虛也八珍湯若無寐而熱者內補黃耆湯煩躁者血脫也當歸補血湯自汗而熱者胃氣虛也四君子湯惡寒發熱者肺氣虛也補中益氣湯或四君子加黃耆當歸亦有五臟相勝夾食夾寒六淫七情所致者不能備述臨證詳之大便不通瘡瘍大便不通初起則審所致之因所見之證而行內疏外表之法已潰則分氣血虛實傳變之證而用托裡滋補之法不可泛用苦寒疏導之劑恐復傷真氣則腫者不能消散成膿潰者不能生肌收斂故丹溪云腫瘍內外皆壅宜托裡表散為主潰瘍內外皆虛宜托裡補接為主治者審之小便不通瘡瘍小便不通其因不一當分經絡虛實而藥之若潰而惡寒發熱氣血虛也八珍湯手足並冷陽氣虛寒也四君子加炮薑升麻手足不冷乃脾氣虛弱也四君子加升柴半夏寒熱往來氣血虛也十全大補湯大便了而不了脾氣虛而下陷也補中益氣湯切不可輕用疏導之劑復傷元氣致腫者不能復起發腐潰潰者不能生肌收斂須臨證制宜而治庶無誤矣作渴不止瘡瘍作渴當分經絡所屬及血氣虛實而治若焮痛發熱便利調和者邪在表也清熱消毒湯腫痛發熱大便秘澀者邪在裡也涼膈散焮痛熾盛邪在經絡也活命飲右關脈洪數有力胃火消爍津液也竹葉石膏湯右關脈數無力胃虛津液短少也補中益氣湯飲食失度胃氣內傷而亡津液者參苓白朮散膿血出多而氣血虛弱者八珍湯加五味稟腎不足而津液短少者加減八味丸余當臨證制宜自汗不止瘡瘍潰後多汗衛虛元氣外泄大非所宜其稟質肥盛者濕熱外泄猶無大患若形槁色枯胸中多氣血液衰少者乃火熱亢極為害彌甚故治肥盛之人潰瘍多汗則宜托裡消毒散加減氣虛形盛者則宜六君子為主酒客則加麋銜澤瀉之屬形瘦之人潰瘍多汗則宜保元湯加歸芍或生料六味加棗仁救其津液庶免火氣內燔咽燥噎塞煩擾喘咳之患大抵潰瘍多汗一切苦寒傷胃膩滑奪食辛熱耗氣之藥皆當切禁下痢不止癰疽潰久瘡口不收膿水清稀而見泄利驚溏皆為脾氣衰弱之候理中補中四柱六柱二神四神並可選用如下痢白沫此脾氣下陷補中益氣加薑桂吳萸木香之類若見膿血下滯須詳血色之鮮晦鮮者則宜連理湯之薑連並進以和其中晦者則宜理中湯稍加桂附以溫其下赤白兼下如瑪瑙色者亦宜上法倘數服不應又當補中益氣加辛溫之品兼升舉其陽若下痢清血則加茜根烏鰂骨烏梅白芍苟非夏秋濕熱下注則黃連厚朴枳殼檳榔澤瀉等藥皆為戈戟也敷寒涼藥瘡瘍敷藥當分陰陽虛實而用內治之法不可概敷寒涼之藥若腫痛熱渴脈滑數有力其證純陽宜內服解毒之劑外敷寒涼之藥則熱毒自消瘀滯自散若似腫非腫似痛非痛似赤非赤似潰非潰脈洪數無力者證屬半陰半陽宜內服助胃托裡兼行解毒外敷寒涼藥中兼辛熱藥一分則營逆自從血鬱自散若微腫微痛色黯堅硬肉色如故久而不潰脈按之沉細舉指虛浮者其證屬陰宜內服回陽之劑外敷辛熱之藥則陰毒自解陽氣自復凡陽氣虛寒不能消散腐潰或潰而腫不消口不斂者必內服溫補藥外用生附子摻瘡口則歹肉自去新肉方生若陰寒之證而用寒涼之藥則腠理閉塞氣血凝滯毒氣益深良肉反死瘡口不斂惡證蜂起不可復救矣蓋治病必求其本假如腫痛熱渴大便秘結者邪在內也疏利之腫焮作痛寒熱頭疼者邪在表也發散之焮腫痛甚者邪在經絡也和解之漫腫微痛而不潰者血氣虛弱也急補托之色黯微痛而不潰或潰而不斂者陽氣虛寒也溫補之如是則五臟自和六腑自調氣血自生瘡毒自解矣用刀針法瘡瘍用針當審經絡表裡之虛實部分肌肉之厚薄而施之夫腫高而軟者發於血脈也腫硬而堅者發於肌肉也肉色不變者發於骨也瘡未成者解散以消其毒已成者托裡以速其膿膿已成者當驗其生熟淺深而後針之以指輕按便痛者膿淺也重按方痛者膿深也按之不起者膿未成也按之即痛者膿已成也若膿初生而即針則腐潰益深而不能收斂若瘡深而針淺則內潰不出外血反傷若瘡淺而針深則其膿雖出良肉亦傷蓋瘡之證氣血已傷肌肉已壞當隨決其毒不可拘泥人神部分其膿一出諸證自退若膿出反痛或煩躁嘔逆者皆胃氣虧損急宜托裡調補凡膿已成者急刺去以紙捻蘸油紝瘡內以膏藥貼之如瘡反覆未痊多是厚味七情火動而然當審所因而調治亦有膿清不斂乃胃氣虛弱之故又當兼飲食調補之若小兒患瘡腫藥中加漏蘆令母服之乳中藥過兒瘡自愈陳毓仁曰腫瘍初起頂高根活色赤發熱焮腫疼痛日漸高腫者順已成焮腫皮薄光亮飲食如常二便調勻身溫和者順已潰膿稠色鮮不臭腐肉自脫焮腫易消身輕者順潰後膿厚稠黃新肉易生瘡口易斂食飲漸進者順初起頂平根散色黯漫腫不熱不疼身體倦怠者逆已成腫堅色紫不作膿不腐潰口乾多煩躁者逆已潰皮爛肉堅不腐腫仍不消痛仍不減心煩者逆潰後膿水清稀腐肉雖脫新肉不生瘡口如凍色敗臭穢者死治法初起毋論陰陽表裡知痛不知痛起發不起發但未成膿者俱宜灸之既灸不知痛者再灸之焮赤發熱疼痛有時脈來浮數無便秘者宜藥托之身體拘急脈緊惡寒飲食就暖者邪在表也宜汗之腫硬痛深口乾便利身熱脈實者邪在裡也宜下之焮痛勢甚煩躁飲冷舌乾口燥者火在上也宜清之腫痛堅硬背如負石噁心乾嘔邪毒在內宜解拔之腫痛日深內膿不出瘀肉窒塞瘡口者急開導之軟漫不作膿不腐潰及潰後瘡口散大不生肌肉者陽氣虛也壯脾助胃以溫補之身涼自汗手足並冷六脈虛細便泄陽脫者急溫之遲則不效西航曰凡癰腫須觀稟質氣血調治惟黴瘡結毒非專方不應但驗病人身上有塊不時掣痛者即為黴毒無疑當與三白丹疏滌之元氣虛寒者加味三白丹最妙虛甚不勝三白丹者五寶丹亦能療之腫處用精豬肉貼之若更發熱頭疼或手足顫振筋脈縮急者此復感風寒觸發經中郁毒也先與萬靈丹三服汗之次用調和血氣之劑俟胃氣稍復然後用三白五寶治之有用三白丹後餘毒未盡者此胃虛不能行其藥力也仍與調和氣血之劑俟能飲食起居更與五寶丹無不愈者此因銀粉劫劑致成結毒非仍用水銀不能拔去病根也用精豬肉貼者豬為水獸取其通達腎氣而無瘢痕之患診身重脈緩為濕勝身熱脈大心躁時熱乍來乍去當逐熱諸痛眩暈動搖脈弦宜祛風氣澀氣滯乾燥亡津液脈澀須調氣補血寒勝則浮食不得入便溺多惡寒脈緊細應於水中補火凡癰疽初起焮腫赤硬脈浮數者易澀洪大急疾者難治弦緊沉細者危膿成脈洪滑者易治虛大澀滯者難治弦小沉澀者不治已潰膿水未盡脈緩滑者易治數盛弦硬者難治澀數不調及虛大者危膿盡後脈小弱緩滑者易治遲澀虛細者難治反洪盛或弦急者不治潰久不斂有歹肉乾膿脈緩滑流利者易治弦細小弱者難治反數盛急疾或虛大澀者不治雜門汗汗出不治盜汗頭汗手足汗陰汗半身汗出經云陽氣有餘為身熱無汗陰氣有餘為多汗身寒飲食飽甚汗出於胃驚而奪精汗出於心持重遠行汗出於腎疾走恐懼汗出於肝搖體勞苦汗出於脾腎病者寢汗出憎風津脫者汗大泄汗出偏沮使人偏枯飲酒中風則為漏風入房汗出中風則為內風景岳全書曰汗出一證有自汗者有盜汗者自汗者濈濈然無時而動作則益甚盜汗者寐中通身汗出覺來漸收諸古法云自汗者屬陽虛腠理不固衛氣之所司也人以衛氣固其表衛氣不固則表虛自汗而津液為之發泄也治宜實表補陽盜汗者屬陰虛陰虛者陽必湊之故陽蒸陰分則血熱血熱則液泄而為盜汗也治宜清火補陰此其大法然自汗亦有陰虛盜汗亦多陽虛者如遇煩勞大熱之類最多自汗如飲食之火起於胃勞倦之火起於脾酒色之火起於腎皆能令人自汗若此者非陽盛陰衰而何又若人之寤寐總由衛氣之出入衛氣者陽氣也人於寐時則衛氣入於陰分此其時非陽虛於表而何然則陰陽有異何以辨之曰但察其有火無火則或陰或陽自可見矣蓋火盛而汗出者以火爍陰陰虛可知也無火而汗出者以表氣不固陽虛可知也知斯二者則汗出之要無餘義矣汗由血液本乎陰也經曰陽之汗以天地之雨名之其義可知然汗發於陰而出於陽此其根本則由陰中之營氣而其啟閉則由陽中之衛氣故凡欲疏汗而不知營衛之盛衰欲禁汗而不知橐籥之牝牡吾知其不敗不已也汗證有陰陽陽汗者熱汗也陰汗者冷汗也人但知熱能致汗而不知寒亦致汗所謂寒者非曰外寒正以陽氣內虛則寒生於中而陰中無陽陰中無陽則陰無所主而汗隨氣泄故凡大驚大恐大懼皆能令人汗出是皆陽氣頓消真元失守之兆至其甚者則如病後產後或大吐大瀉失血之後必多有汗出者是豈非氣怯而然乎故經曰陰勝則身寒汗出身常清數慄而寒寒則厥厥則腹滿死仲景曰極寒反汗出身必冷如冰是皆陰汗之謂也故凡治陰汗者但當察氣虛之微甚微虛者略扶正氣其汗自收甚虛者非甘薑桂附速救元氣不可自汗雖由衛氣不固胃中之津液外泄而實關乎臟腑蒸發使然心之陽不能衛外而為固則自汗出包絡之火鬱發也腎之陰不能退藏於密則盜汗出陰火乘虛蒸發也肺氣衰則表不能衛而自汗出必喘乏少氣胃虛水穀氣脫散者汗自出必氣虛少食陰虛者陽必湊故發熱自汗當歸六黃湯陽虛者陰必乘故發厥自汗黃耆建中湯甚者少加附子營血不足自汗黃耆建中加當歸甚者加熟地衛外之陽不固而自汗耆附湯脾中之陽衰微而自汗朮附湯腎中之陽浮游而自汗參附湯身冷自汗陰躁欲坐泥水中脈浮而數按之如無經云脈至而從按之不鼓諸陽皆然此陰盛格陽真武湯冷服肺氣虛者固其皮毛玉屏風散脾虛者壯其中氣補中益氣湯心虛者益其血脈當歸補血湯肝虛者理其疏泄逍遙散腎虛者助其封藏都氣丸火氣炎上胃中之濕亦能作汗可用涼膈散脾胃不和外挾風濕身重汗出羌活勝濕湯風濕相搏時自汗出防己黃耆湯惡風自汗桂枝湯又有漏風證一名酒風不論冬夏額上常有汗出此醉後當風所致經曰有病身熱懈惰汗出如浴惡風少氣病名酒風治之以澤瀉術各十分麋銜五分合以三指撮為後飯又曰飲酒中風則為漏風漏風之狀多汗常不可以單衣食則汗出甚則身汗喘急惡風衣常濡口乾善渴不能勞事先宜五苓散熱服取汗後與黃耆建中加白朮澤瀉汗出日久用參耆朮附等藥不效汗乾仍熱此風邪伏於經絡暫與參蘇飲病已止服此反治也汗出不止名曰亡陽以附子理中加黃耆外用溫粉撲之痰證汗自出痰消汗自止二陳加桂枝枳桔香附貝母多汗惡風食則汗出如油久不治必成消渴玉屏風散少加煅牡蠣病餘氣血俱虛而汗服諸止汗藥不應用十全大補湯半劑加熟棗仁五錢若胸膈煩悶不能勝陰藥者生脈散加黃耆二錢當歸六分熟棗仁三錢一服即驗別處無汗獨心胸一片有汗此思傷心也其病在心名曰心汗歸脾湯倍黃耆或生脈散加當歸棗仁豬心湯煎服汗出不治證汗出而喘甚者不治汗出而脈脫者不治汗出而身痛甚者不治汗出發潤至顛者不治汗出如油者不治汗出如珠者不治汗出如膠膠黏如珠之凝及淋漓如雨揩拭不逮者皆不可治盜汗金匱云男子平人脈虛弱微細者善盜汗出蓋平人脈虛弱微細是衛虛不能鼓其脈氣於外所以不能約束津液當衛氣行陰目瞑之時血氣無以固其表腠理開則汗醒則行陽之氣復散於表則汗止矣名曰盜汗亦名寢汗此屬本虛與傷寒邪在半表不同先與當歸補血湯加炒棗仁半兩數服後與都氣丸調補之酒客睡中多汗此濕熱外蒸也二妙散加白朮防風牡蠣血熱盜汗當歸六黃湯為專藥虛人多加參耆減芩連身熱加地骨皮肝虛加棗仁肝實加龍膽草煩心加竹葉辰砂麥冬脾虛去芩連加白朮芍藥傷寒陽明少陽證盜汗柴胡葛根隨證主治溫熱三陽合病目合則汗白虎湯頭汗頭為諸陽之會額上多汗而他處無者濕熱上蒸使然或蓄血結於胃口迫其津液上逆所致蓄血頭汗出劑頸而還犀角地黃湯頭汗小便不利而渴不能飲此瘀蓄膀胱也桃核承氣湯胃熱上蒸額汗發黃小水不利者五苓散加茵陳甚則茵陳蒿湯微利之傷寒脅痛耳聾寒熱口苦頭上汗出劑頸而還屬少陽小柴胡加桂枝苓術和之凡頭汗服和營衛逐濕豁痰理氣散瘀藥或發寒熱下體得汗者為營衛氣通日漸向愈之機也食滯中宮熱氣上炎亦令頭汗生料保和丸倍用薑汁炒川連病後產後悉屬陽虛誤治必死傷濕額上汗出下之微喘者死下後小便不利者亦死傷寒陰毒等證額汗見緒論手足汗脾胃濕蒸傍達於四肢則手足多汗熱者二陳湯加川連白芍冷者理中湯加烏梅弱者十全大補去芎加五味子陰汗陰間有汗屬下焦濕熱龍膽瀉肝湯加風藥一二味風能勝濕也或當歸龍薈丸及二妙散俱效陰囊濕者以爐甘石煅過撲之密陀僧末亦佳半身汗出夏月止半身出汗皆氣血不充內挾寒飲所致偏枯及夭之兆也大劑十全大補人參養榮大建中輩加行經豁痰藥治之若元氣稍充即間用小續命湯一劑以開發其表或防己黃耆湯加川烏以散其濕此證雖屬血虛慎不可用四物陰藥以其閉滯經絡故也石頑曰汗之源不一有因於衛氣疏者有因於營氣熱者有因於營衛不和者蓋風邪干衛則腠理疏營氣乘表虛而外泄則自汗治當散邪為急宜從仲景桂枝湯小建中輩遲則營氣外亡邪氣內入必變府實潮熱矣又宜三承氣湯選用此皆外感自汗也若鬱熱內蒸亦必從空竅發泄或從腸胃下奔或從皮毛外達則鬱熱得散然外泄輕於下奔蒸熱勝於乾熱以此驗營衛之枯與不枯也當從內傷虛損例治之至於邪正交加非汗不解故少陽挾熱或為盜汗或腋汗脅汗須知從陰陽交互時及陰陽交互處發泄者皆陰陽不和半表半裡證小柴胡逍遙散皆合劑也及乎挾風邪痰濕之類亦多有之至如頭汗或為濕熱上攻或為瘀血內結亦屬陰陽不和其於陰汗股汗又為肝家濕熱下滲之徵驗豈可一概施治乎診汗家腠理疏豁其脈必緩兼浮則為風兼滑則為痰兼大則為熱兼弱為衛虛兼芤為失血兼遲為氣虛兼細為陰虛經云肺脈軟而散者當病灌汗肺脈緩甚為多汗尺澀脈滑謂之多汗病風人脈緊數浮沉有力汗出不止呼吸有聲者死不然則主病氣東垣治一人二月陰雨寒濕又因勞役所傷病解之後汗出不止沾濡數日惡寒重添厚衣心胸間時煩熱頭目昏憒上壅食少此乃胃中陰火熾盛與外天雨之濕氣相合而汗出不休遂用羌活勝濕湯以風藥去其濕甘寒瀉其熱一服而愈滑伯仁治一婦暑月自汗口乾煩躁欲坐水中脈浮而數按之豁然虛散得之食生冷乘涼所致以真武湯一進汗止再進躁退三進全安飛疇治陳子厚媳八月間因產不順去血過多產後惡露稀少服益母草湯不行身熱汗出產科用發散行血更劇自用焦糖酒一碗遂周身絡脈棰楚難堪惡露大下昏沉戴眼汗出如浴但言心痛不可名狀此血去過多心失其養故痛肝主筋為藏血之地肝失其榮故絡脈棰楚不堪且汗為產後之大禁若非急用人參恐難保其朝夕也用四君合保元加白芍五味一劑汗止因其語言如祟疑為瘀血未盡更欲通利予曰聲怯無神此屬鄭聲且腹不疼痛瘀何從有此神氣散亂不收之故前方加入棗仁龍齒諸證漸平後服獨參湯至彌月而安不得臥多臥嗜臥靈樞云衛氣不得入於陰當留於陽留於陽則陽氣滿陽氣滿則陽蹺盛不得入於陰則陰氣虛故目不瞑衛氣行陽則寤行陰則寐此其常也失其常則不得靜而藏魂所以目不得瞑也壯者之氣血盛其肌肉滑氣道通營衛之行不失其常故晝精而夜瞑老者之氣血衰其肌肉枯氣道澀五臟之氣相搏其營氣衰少而衛氣內伐故晝不精夜不瞑素問云陰虛故目不暝補其不足瀉其有餘調其虛實以通其道而去其邪飲以半夏湯一劑陰陽已通其臥立至病新發者覆杯則臥汗出則已矣久者三飲而已也胃不和則臥不安也臥則喘者是水氣之客也不寐有二有病後虛弱有年高人血衰不寐有痰在膽經神不歸舍亦令人不寐虛者六君子加棗仁痰者靈樞半夏湯虛勞煩熱不得眠酸棗湯或酸棗仁一兩炒研水煎絞取汁下米二合煮糜以生地五錢搗汁入更煮過時時服之大病後虛煩不得眠竹葉石膏湯水停心下不得眠茯苓甘草湯婦人肥盛多郁不得眠者吐之從鬱結痰火治大抵膽氣宜靜濁氣痰火擾之則不眠溫膽湯用豬膽汁炒半夏曲加柴胡三錢炒棗仁一錢五分立效蓋驚悸健忘失志心風不寐皆是痰涎沃心以致心氣不足若涼心太過則心火愈微痰涎愈盛惟以理痰順氣為第一義導痰湯加石菖蒲有寐中覺魂魄飛蕩驚悸通夕不得安眠是肝虛受邪也其人易怒魂不歸肝是以飛揚獨活湯珍珠母丸次第服之喘不得臥以喘法治之蘇子橘紅甘草桔梗竹茹厥不得臥以腳氣法治之牛膝丹皮木通沉香觀桂虛勞咳嗽形脫不得臥不可治煩不得臥諸藥不效者梔子豉湯下硃砂安神丸不應用益元散加牛黃更不應虛火用事也補中益氣湯下硃砂安神丸間進六味丸恆服方效有病久餘熱不止久不得臥者六味丸滋其真陰自然熱止安臥矣脈數滑有力不眠者中有宿滯痰火此為胃不和則臥不安也心下硬悶屬宿滯半夏白朮茯苓川連枳實病後及汗下後與潰瘍不得眠屬膽虛人參茯苓炒棗仁陳皮麥冬圓眼肉為主有火脈數口乾加知母川連竹茹心煩用炒黑山梔石頑曰平人不得臥多起於勞心思慮喜怒驚恐是以舉世用補心安神藥鮮克有效曷知五志不伸往往生痰聚飲飲聚於膽則膽寒肝熱故魂不歸肝而不得臥是以內經用半夏湯滌其痰飲則陰陽自通其臥立至一少年因恐慮兩月不臥服安神補心藥無算余與溫膽湯倍半夏柴胡一劑頓臥兩晝夜竟爾霍然復有一人遺精煩擾不得臥與六味丸料加棗仁數服而安寢如常更有一人潰瘍久不收斂而不得臥瘍醫不能療令用大劑十全大補而安大抵因病不得臥當詳所因亦不專主膽病也多臥經云卒然多臥者邪氣客於上焦上焦閉而不通已食若飲湯衛氣久留於陰而不行故卒然多臥焉膽虛不眠寒也酸棗仁一兩炒為末醇酒調服膽實多臥熱也酸棗仁一兩生為末茶清調服嗜臥東垣云脈緩怠惰四肢不收或大便泄瀉此濕勝從胃苓湯食入則困倦精神昏冒而欲睡者脾虛也六君子加曲糵山楂時值秋燥怠惰嗜臥兼見肺病灑淅惡寒不嗜食者此陽氣不伸也升陽益胃湯不能食惡食飢不能食經云人之善飢而不嗜食者精氣並於脾熱氣留於胃胃熱則消穀故善飢胃氣逆上則胃脘寒故不嗜食也東垣云太陰所謂惡聞食臭胃無氣故惡食臭也胃中元氣虛則能食而不傷過時而不飢脾胃俱旺則能食而肥脾胃俱虛則不能食而瘦故不能食皆作虛論若傷食惡食自有本門不在此例病人脈緩怠惰四肢重著或大便泄瀉不食此濕勝也胃苓湯病人脈弦氣弱自汗四肢發熱或大便泄瀉不食皮毛枯槁發脫黃耆建中湯加減病人脈滑氣口盛於人迎或澀滯不調其人痞滿嘔逆不食此有宿食保和丸枳朮丸消導之病人脈虛氣弱脾胃不和或兼噁心不食六君子枳實理中選用有痰用導痰湯虛而有痰用人參四兩半夏一兩薑汁浸一宿曬為末麵糊丸食後生薑湯下許學士云有人全不進食服補脾藥皆不效授以二神丸服之頓能進食五更腎瀉尤宜此病不可全作脾氣治蓋腎氣怯弱真元衰削是以不能消化飲食譬之釜底無薪水穀不能腐化也惡食惡食有虛實之分實則心下悶痛噁心口苦二陳加黃連枳術虛則倦怠色痿黃心下軟異功散加砂仁木香有痰噁心六君子加香砂飢不能食此證有二一屬胃中虛熱六君子加薑汁炒川連一屬陰火乘胃六味丸加赤桂五味又熱病後餘熱未盡脈虛洪不實者人參白虎湯石頑曰胃主出納脾司運化故不食皆為中土受病然胃之土體陽而用陰脾之土體陰而用陽胃實則痞滿氣脹胃虛則飲食不甘胃熱則飢不能食胃寒則脹滿不食胃津不布則口淡無味胃中火盛則消渴易飢有痰則噁心嘔涎脾虛則食後反飽脾津不藏則口甘畏食脾挾肝熱則吞酸吐酸此皆中土受病也至於腎臟陽虛不能腐熟水穀又當歸重於命門火為土母故也喻嘉言治一人病後胃中隱隱作痛有時得食則已有時得食轉加大便甚難小水不暢蓋因脾中津液為邪火所爍津液未充火勢內蘊易於上燎所以得食以壓其火則安若食飲稍過則氣不能轉運其食而痛亦增是火不除則氣不復氣不復則胃中清濁混亂不肯下行而痛終不免也於是為訂降火生津下氣止痛方為常用之藥務先收攝腎氣不使外出然後濁氣之源清而膀胱得吸引上中二焦之氣以下行矣石頑治孝廉徐俟齋尊閫不得寐不能食心神恍惚四肢微寒手心熱汗至晚則喉間熱結有痰兩耳時如充塞遍服安神清火藥罔效邀石頑診之六脈縈縈如蜘蛛絲而微顯弦數之象此中氣久郁不舒虛火上炎之候也蓋緣俟齋索居澗上自鼎革三十年來繭足杜門饘粥不繼乃閫克相夫志力竭神勞所致本當用歸脾湯以補心脾之虛奈素有虛痰陰火不勝耆圓之滯木香之燥遂以五味異功略加歸芍肉桂以和其陰導其火不數服而食進寢寧諸證釋然矣不能語人有一生不能言者此肺竅窒塞腎氣不能上通於咽如管鑰之固閉其竅不能通呼吸之氣也若因病而不能語者惟中風傷寒暴病有之近有顧允祥之婦暴怒傷食喘脹嘔逆不止醫者誤認風邪而與表藥遂昏憒目瞪不語呼之不省乃求救於石頑其脈六部澀伏知為痰因氣閉所致本當因勢利導探吐以通其竅緣病家畏其吐劇遂與導痰湯加菖蒲遠志一啜便能語言更與前藥加檳榔鐵落得下而安門人問曰此病既當探吐何下之亦能取效因謂之曰治病貴乎圓活但得開通經絡管鑰自空設用橘皮濃煎亦可探吐參蘆濃煎亦可灌吐薑汁竹瀝亦可取吐在豐稔之家局方至寶丹牛黃丸蘇合香丸皆可取用奚必拘於何藥方為合劑耶消癉經云二陽結謂之消二陽者陽明也手陽明大腸主津病消則目黃口乾是津不足也足陽明胃主血熱則消穀善飢血中伏火乃血不足也結者津液不足結而不潤皆燥熱為病也癉成為消中心移熱於肺傳為鬲消鬲上煩渴飲水多而善消肺氣不化小便反少也心移寒於肺肺消肺消者飲一溲二死不治君火失政則陰火乘之故肺金雖有客熱消水而下焦真陽失守溲便反多故死不治大腸移熱於胃善食而瘦謂之食㑊食㑊謂食移易而過胃熱不生肌肉津液內爍而消見於外也若胃移熱於膽而食㑊則有煩熱口苦之患矣腎熱病者先腰痛胻酸苦渴數飲身熱有口甘者病名脾癉五味入口藏於胃脾為之行其精氣津液在脾故令人口甘也此人必數食甘美而多肥肥者令人內熱甘者令人中滿故其氣上溢轉為消渴治之以蘭除陳氣也熱中消中不可服膏粱芳草石藥石藥發癲芳草發狂芳草之氣美石藥之氣悍二者其氣急疾堅勁非緩心和人不可以服熱氣留於小腸腸中痛癉熱焦渴則堅幹不得出故痛而閉不通矣消癉脈實大病久可治脈懸小堅病久不可治金匱云男子消渴小便反多以飲一斗小便一斗腎氣丸主之腎主藏精以施化若精泄無度火動不已則肺氣傷燥而思水水入於胃不得肺氣之化不復上歸下輸腎病則氣不約束調布豈不飲一斗而出一斗乎故用腎氣丸全賴桂附之辛溫蒸發津氣以潤臟腑百骸豈云專補其腎哉脈浮小便不利微熱消渴者宜利小便發汗五苓散主之此言水氣不化之渴與渴欲飲水水入即吐名曰水逆之渴證雖稍異而水氣阻礙津液則一故並宜五苓以輸散之水散則津液灌溉而渴自已耳渴欲飲水不止者文蛤散主之文蛤治傷寒冷水潠灌意欲飲水反不渴者是治表之水寒今治裡熱而渴飲水不止者亦取其鹹寒退火有益水潤燥之功一味而兩得之若治心移熱於肺傳為鬲消者尤宜趙養葵云上消者舌上赤裂大渴引飲逆調論謂心移熱於肺傳為鬲消者是也以白虎加人參湯治之中消者善食而瘦自汗大便硬小便數癉成為消中者是也以調胃承氣湯治之下消者煩躁引飲耳輪焦乾小便如膏此腎消也六味丸治之古人治三消之法詳別如此余又有一說焉人之水火得其平氣血得其養何消之有其間調攝失宜水火偏勝津液枯槁以致龍雷之火上炎熬煎既久腸胃合消五臟乾燥令人四肢瘦削精神倦怠故治消之法無分上中下先治腎為急惟六味八味加減八味隨證而服降其心火滋其腎水則渴自止矣白虎與承氣非其所治也總之是下焦命門火不歸元遊於肺則為上消遊於胃即為中消以八味腎氣丸引火歸元使火在釜底水火既濟氣上熏蒸肺受濕潤而渴疾愈矣或人有服地黃湯而渴仍不止者何也曰心肺位近宜制小其服腎肝位遠宜制大其服如上消中消可以用前丸緩治若下消已虛大渴大燥須加減八味丸料一斤肉桂一兩水煎六七碗恣意冰冷服之熟睡而渴病如失矣處方之制存乎人之變通耳有等渴欲引飲但飲水不過一二口即厭少頃復渴飲亦不過若此但不若消渴者之飲水厭也此是中氣虛寒寒水泛上逼其浮游之火於咽喉口舌之間故上焦一段欲得水救若到中焦以水見水正其所惡也治法如面紅煩躁者理中湯送八味丸喻嘉言曰消渴之患常始於微而成於著始於胃而極於肺腎始如以水沃焦水入猶能消之既而以水投石水去而石自若至於飲一溲一飲一溲二則燥火劫其真陰操立盡之勢而成熇熇矣內經有其論無其治金匱有論有治也而集書者採傷寒論厥陰經消渴之文湊入後人不能決擇斯亦不適於用也蓋傷寒傳經熱邪至厥陰而盡熱勢入深故渴而消水及熱解則不渴且不消矣豈雜證積漸為患之比乎謹從內經擬議言之經謂治消癉僕擊偏枯痿厥氣滿發逆肥貴人則膏粱之疾也此中消之所由來也肥而不貴食弗給於鮮貴而不肥餐弗過於饕肥而且貴醇酒厚味孰為限量哉久之食飲釀成內熱津液乾涸求濟於水然水入尚能消之也愈消愈渴其膏粱愈無已而中消之病成矣夫既癉成為消中隨其或上或下火熱熾盛之區以次傳入矣上消者胃以其熱上輸於肺而子受母累心復以其熱移之於肺而金受火刑金者生水而出高源者也飲入胃中遊溢精氣而上則肺通調水道而下今火熱入之高源之水為暴虐所逼合外飲之水建瓴而下飲一溲二不但不能消外水且並素醞水精竭絕而盡輸於下較大府之暴注暴泄尤為甚矣故死不治也至於胃以其熱由關門下傳於腎腎或以石藥耗其真女勞竭其精者陽強於外陰不內守而小溲渾濁如膏飲一溲二腎消之病成矣故腎者胃之關也關門不開則水無輸泄而為腫滿關門不閉則無底止而為消渴消渴屬腎一證金匱原文未脫其曰飲一斗溲一斗者腎氣丸主之於此蒸動精水上承君火而止其下入之陽光此正通天手眼張子和輒敢詆之既詆仲景復諛河間謂其神芎丸以黃芩味苦入心牽牛大黃驅火氣而下以滑石引入腎經將離入坎真得黃庭之秘顛倒其說阿私所好識趣卑陋若此又何足以入仲景之門哉何柏齋消渴論中已辨其非吾觀戴人吐下諸按中從無有治消渴一案者然以承氣治壯火之理施之消渴又無其事矣故以下消之火水中之火也下之則愈燔中消之火竭澤之火也下之則愈傷上消之火燎原之火也水從天降可滅徙攻腸胃無益反損夫地氣上為云然後天氣下為雨是故雨出地氣地氣不上天能雨乎故亟升地氣以慰三農與亟蒸腎水以溉三焦皆事理之必然者耳內經曰心移熱於肺傳為鬲消戴人謂膈消猶未及於肺至心移寒於肺乃為肺消如此泥文害意非能讀內經者也要識心肺同居膈上肺為嬌臟移寒移熱總之易入但寒邪入而外束熱邪入而內傳均一肺消而治則有分矣腎消之病古曰強中又謂內消多因恣意色欲或餌金石腎氣既衰石氣獨在精髓失養故常發虛陽不交精出小便無度唇口乾焦加減八味丸用生脈散下千金云有人苦熱不已皆由服石所致種種服餌不能制止惟朴硝煎可以定之男子消渴飲一斗溲一斗者腎氣丸飲一溲二者難治渴家誤作火治涼藥亂投促人生命宜多服生脈散滋養之上焦蘊熱消渴小便赤澀清心蓮子飲心膈有熱久則引飲為消渴名曰鬲消胃滿煩心津液短少宣明麥門冬飲子老弱之人大渴易老門冬飲消中能食而瘦口舌乾枯大渴引飲自汗大便秘燥小便頻數蘭香飲子煩熱大渴引飲不止脈大滑實甘露飲子胃熱口臭煩渴引飲面赤唇乾氣口脈短滑者瀉黃散食已如飢胃熱消穀陽明脈盛心火上行面黃肌瘦胸滿脅脹小便赤澀七味白朮散心膈有熱消渴咽乾面赤生料固本丸加黃耆甘草石斛澤瀉枇杷葉脈浮小便不利微熱消渴或渴飲水多停蓄不散心下轆轆有聲小便不利者並宜五苓散若熱渴不止加人參三消久而小便不臭反作甜氣此脾氣下脫為病最重七味白朮散有溺桶中浮在面上如豬脂濺在桶邊或如柏油者此腎虛不能約制脾胃之膏液下流用白朮散腎氣丸可救十之一二脾消之證飲食入腹如湯沃雪隨小便而出出於溷僻溝渠皆旋結如白肌膚日消用熱藥則愈甚用涼藥則愈虛不能起止精神恍惚口舌焦乾或陽強興盛不交而泄不久當斃孫真人云消渴之人愈與未愈常須思慮有大癰何者消渴之人必於大骨間發癰疽而卒所以專慮發大癰也診石頑曰經言消癉脈實大病久可治脈懸小堅病久不可治見消證脈顯實大為證脈相符雖久可治若見懸小而堅不但脈不應病且真臟發露其可療乎設消證脈小而不至於虛懸堅勁又當從仲景腎氣丸正治矣然歷診消癉之脈無有不帶數象者但須察浮數沉數在左在右尺甚寸甚及有餘不足兼見何脈而為審治又須詳南北風土之強弱病人稟氣之厚薄合脈象而推之庶幾無虛虛之誤矣大抵北人消癉脈多沉石滑數以北方寒水司權且素食煤火腎氣多厚故用劉張寒瀉之法往往獲效然間有恃力作強以水為事乃致虛陽不守封藏不固而見右尺數大為下消者亦有真陰耗竭腎氣不升肺臟枯燥而見寸口數盛為上消者又有竭力房室服食慓悍火土太強恣意飲啖而見氣口動滑為中消者又不可限以風土急須導火壯水除陳氣等法若大江以南木氣始生之界患消癉者從無沉石之脈即有滑數按之必濡多有尺內見弦及氣口命門大數或兩寸浮滑者以東南水土孱薄虛陽屬動腎水易虧當確遵金匱東垣養葵猶恐不及況可效用劉張之法乎至若庾嶺而南消癉之脈亦絕無沉石之候多見浮大數盛外示有餘中實不足以其陽氣泄而不藏腎氣溢而不滿故其治僅可用辛涼以清其熱甘寒以滋其陰若辛熱導火苦寒瀉氣等藥總無於預也至於臨病審察又當隨左右尺寸之太過不及而為決斷太過見於寸口多為氣病不及見於尺內多為腎虛又在左偏弦為精髓受傷在右偏旺為虛陽發露然其邪皆自內發故表證表脈絕少即金匱五苓散一條亦是水氣不化津液不行而渴故顯脈浮小便不利微熱消渴之證見消癉雖有浮脈亦是客邪為患非此證之本脈故特表而出之石頑治太學趙雪訪消中善食日進膏粱數次不能敵其飢勢丙夜必進二餐食過即昏昏嗜臥或時作酸作甜或時夢交精泄或時經日不飲或時引飲不徹自言省試勞心所致詢其先前所服之藥屢用安神補心滋陰清火俱不應延至麥秋其證愈劇始求治於石頑察其聲音濁而多滯其形雖肥盛色蒼而肌肉綿軟其脈六部皆洪滑而數惟右關特甚其兩尺亦洪滑而按之少神此腎氣不充痰濕挾陰火泛溢於中之象遂與加味導痰加蘭香數服其勢大減次以六君子合佐金枳實湯泛丸服後以六味丸去地黃加鰾膠蒺藜平調兩月而康又治朔客白小樓中消善食脾約便艱察其形瘦而質堅診其脈數而有力時喜飲冷氣酒此酒之濕熱內蘊為患遂以調胃承氣三下破其蘊熱次與滋腎丸數服滌其餘火而安又治粵客李之籓上消引飲時當三伏觸熱到吳初時自汗發熱煩渴引飲漸至溲便頻數飲即氣喘飲過即渴察其脈象惟右寸浮數動滑知為熱傷肺氣之候因以小劑白虎加人參三服其勢頓減次與生脈散調理數日而痊又治薛廉夫子強中下消飲一溲二因新娶繼室真陰灼爍虛陽用事陽強不倒恣肆益甚乃至氣息不能相續精滑不能自收背曲肩隨腰胯疼軟足膝痿弱寸步艱難糜粥到口即厭惟喜膏粱方物其脈或時數大少力或時弦細數疾此陰陽離決中空不能主持而隨虛火輒內輒外也峻與八味腎氣保元獨參調補經年更與六味地黃久服而瘥又牙行邵渭賓仲夏與一婢通因客至驚恐精氣大脫即凜凜畏寒翕翕發熱畏食畏飲小便淋瀝不禁邀石頑診之六脈弦細如絲責責如循刀刃此腎中真陽大虧之兆令服生料六味稍加桂附以通陽氣其左右親戚咸謂夏暑不宜桂附另延一醫峻用人參附子月餘飲食大進猶謂參附得力恣餌不徹遂至日食豚蹄雞鴨七八餐至夜預治熟食聽其飽餐二次如此又兩月餘形體豐滿備常但苦時時嘈雜易飢常見青衣群鬼圍繞其側遍禱不靈復邀石頑診治其脈皆滑數有力而右倍於左察其形色多滯且多言多笑而語多不次此味痰壅塞於中復加辛熱助其淫火始本陰虛末傳中消之患也不急祛滌必為狂癡之病為制湧吐之劑遲疑不進未幾忽然大叫發狂妄言妄見始信余言之非謬也痰火石頑曰痰火一證方書罕及近惟郢中梁仁甫國醫宗旨專為立言然皆泛引膚辭且所用方藥專事降泄略無切於病情殊非指南之謂夫所謂痰火者精髓枯涸於下痰火憑陵於上有形之痰無形之火交固於中良由勞思傷神嗜欲傷精加以飲食不節血肉之味蘊釀為痰為火變動為咳為喘其在平居無恙之時貯積窠囊之中或時有所觸發則沖膈透膜與潮宗之氾濫無異觀其外顯之狀頗有似乎哮喘察其內發之因反有類乎消中消中由陰邪上僭攝之可以漸疼哮喘由表邪內陷溫之可以暫安此則外內合邪兩難分解溫之燥之升之攝之咸非所宜況乎觸發多端治非一律何怪時師之茫無統緒乎予由是而因病制宜特立玉竹飲子一方為是證之專藥臨證以意增減庶幾款洽病情其有兼挾客邪者又須先徹標證然後從本而施自然信手合轍如因感風寒而發則香蘇散為至當略加細辛以開肺氣香豉以通腎邪散標最捷蓋香蘇性降可無升舉濁垢之虞他如麻黃桂枝柴防升葛羌獨川芎等味能鼓動痰氣薄荷荊芥橘皮蘇子等味能耗散真氣芩連知柏赤白芍栝蔞根石膏等味能斂閉邪氣皆宜遠之因飲食而發只宜金匱枳朮湯隨所傷之物而為參用谷傷曲糵酒傷煨葛肉傷炮楂麩面傷加草果雞鴨卵傷加杏仁痰食交結則加橘半食積發熱必加黃連黃連與枳實同用善消痞滿半夏與白朮同用專運痰濕然須生用力能豁痰痰去則津液流通熱渴自解非蒼朮南星燥烈傷津之比因惱怒而發沉香降氣散和滓煎服不但理氣化痰亦可消運食滯其或兼冒微風另煎香蘇散以協濟之原其觸發之因不出風食氣三者為甚然皆人所共知惟是觸感風熱而發者世所共昧蓋寒傷形而不傷氣氣本乎肺肺氣受傷咳嗽喘滿勢所必致而寒客皮毛皮毛為肺之合邪從皮毛而入傷於肺咳嗽喘滿亦勢所必致何怪舉世醫師一見喘咳概以表散為務良由不辨內因外因之故耳曷知外因從表而傷有形之津證屬有餘故一咳其痰即應而痰沫清稀內因從肺而傷無形之氣證屬不足故屢咳而痰不得出咳劇則嘔此不但肺病而胃亦病矣是予玉竹飲子方中茯苓甘草專為胃家預立地步也至於標證散後餘火未清人參未宜遽用玉竹飲子尤為合劑病勢向衰即當滋養肺胃異功散加葳蕤取橘皮為宣通氣化之報使氣虛不能宣發其痰又需局方七氣湯借肉桂為熱因熱用之嚮導若其人形體雖肥而色白氣虛則以六君子湯加竹瀝薑汁即有半夏亦無妨礙食少便溏者竹瀝又為切禁宜用伏龍肝湯代水煎服脾氣安和津液自固可無傷耗之慮矣瘦人陰虛多火六味地黃去澤瀉合生脈散使金水相生自然火息痰降去澤瀉者以其利水傷津也若命門脈弱真火式微或不時上衝頭面哄熱又須六味地黃加肉桂五味子以攝火歸陰陰平陽秘精神乃治須知治痰先治火治火先養陰此為治痰治火之的訣然後有真氣浮散之極草根木實無濟於用又須金石以鎮固之予嘗借服食方中靈飛散取雲母以攝虛陽鍾乳以通肺竅菊花以清旺氣兼天冬地黃人參之三才以固精氣神之根本即修內丹不外乎此所謂知其要者一言而終不知其要流散無窮敢以此言質之梁子梁仁甫云病痰火者或吐血或衄血或喉疼身熱溺黃皆熱證也庸醫妄投苦寒瀉火之劑不知苦寒能瀉脾胃脾胃土也乃人身之本也今火病而瀉其土火未嘗除而土已病矣土病則胃虛因而飲食減少甚至泄瀉肌肉消瘦不可救藥矣世俗謂病痰火者服童便最好余治痰火每禁服童便蓋童便降火雖速而損胃多矣故治火病以理脾為主此真訣也診痰脈沉弦細滑大小不勻皆痰氣為病左右手關前脈浮大而實者膈上有稠痰也關上脈伏而大者清痰也丹溪云人得澀脈痰飲膠固脈道阻滯卒難得開必費調理黃癉目黃經云身痛而色微黃齒垢黃爪甲上黃黃癉也安臥小便黃赤脈小而澀者不嗜食溺黃赤安臥者曰黃癉食已如飢者曰胃癉目黃曰黃癉金匱云諸病黃家但利其小便假令脈浮當以汗解之宜桂枝加黃耆湯主之黃家一證大率從水濕得之治濕之法當利小便為第一義然脈浮者知濕不在裡而在表又當以汗解之設表濕乘虛入里而作癃閉又當利其小便也故下條云黃癉病茵陳五苓散主之活法在心可拘執乎黃癉病茵陳五苓散主之夫病酒黃癉必小便不利其候心中熱足下熱是其證也酒黃癉者或無熱靖言了了腹滿欲吐鼻燥其脈浮者先吐之沉弦者先下之酒癉心中熱欲吐者吐之愈酒黃癉心中懊憹或熱痛梔子大黃湯主之此即枳實梔子豉湯之變名也大病後勞復發熱服枳實梔子豉三味覆令微汗使餘熱從外而解若有宿食則加大黃從內而解此治酒癉之脈沉弦者用此方以下之其脈浮當先吐者則用梔子豉湯可不言而喻矣蓋酒癉傷胃發黃無形之濕熱故宜梔子豉湧之與谷癉之當用茵陳蒿者涇渭自殊即此湯亦自治酒食並傷之濕鬱故可用下觀枳實梔子豉湯之加大黃亦是因宿食而用也更有梔子柏皮湯治身黃髮熱一證又以苦燥利其滲道也合此比例而推治黃之法無餘蘊矣酒癉下之久久為黑癉目黃面黑心中如啖蒜齏狀大便正黑皮膚爪之不仁其脈浮弱雖黑微黃故知之金匱治酒癉用或吐或下之法言雖錯出義實一貫蓋酒之積熱入膀胱則氣體不行必小便不利積於上焦則心中熱積於下焦則足下熱其無心中足下熱者則靖言了了而不神昏但見腹滿欲吐鼻燥三證可知其膈上與腹中陰陽交病須分先後治之當辨脈之浮沉以定吐下之先後若但心中熱欲嘔吐則病全在上焦吐之即愈何取下為哉其酒熱內結心神昏亂而作懊憹及痛楚者則不可不下故以梔子香豉皆治其心中懊憹大黃盪滌實熱枳實破結逐去宿垢也但以此劫病之法不可久用久久下之必脾肺之陽氣盡傷不能統領其陰血其血有日趨於敗而變黑耳然酒癉之黑非女勞癉之黑也女勞癉之黑為腎氣所發酒癉之黑為敗血之色因酒之濕熱傷脾胃脾胃不和陽氣不化陰血不運若更下之久久則運化之用愈耗矣氣耗血積敗腐瘀濁色越肌面為黑味變於心咽作嘈雜心辣如啖蒜齏狀營血衰而不行痹於皮膚爪之不仁輸於大腸便如漆黑其目黃與脈浮弱皆病血也仲景於一酒癉臚列先後次第以盡其治其精而且詳如此谷癉之為病寒熱不食食即頭眩心胸不安久久發黃為谷癉茵陳蒿湯主之額上黑微汗出手足中熱薄暮即發膀胱急小便自利名曰女勞癉腹如水狀不治女勞之癉惟言額上黑不言身黃簡文也然黑為北方陰晦之色乃加於南方離明之位以女勞無度而脾中之濁陰下趨入腎水土互顯之色乃至微汗亦隨火而出於額心之液且外亡矣手足心熱內傷皆然日暮陽明用事陽明主闔收斂一身之濕熱疾趨而下膀胱其小便自利大便黑時溏又是膀胱蓄血之驗腹如水狀實非水也正指蓄血而言故為不治黃家日晡所發熱而反惡寒此為女勞得之膀胱急小腹滿身盡黃額上黑足下熱因作黑癉其腹脹如水狀大便必黑時溏此女勞之病非水也腹滿者難治硝石礬石散主之此治女勞癉之急方也夫男子精動則一身之血俱動以女勞而傾其精血必繼之故因女勞而尿血者其血尚行猶易治也因女勞而成癉者血瘀不行非急去膀胱少腹之瘀血萬無生路乃取皂礬以滌除瘀垢硝石以破積散堅二味相胥銳而不猛此方之妙用也黃癉腹滿小便不利而赤自汗出此為表和裡實當下之大黃硝石湯黃瘴最難得汗自汗則表從汗解故曰此為表和裡實方用大黃硝石解散在裡血結黃柏專祛下焦濕熱梔子輕浮能使裡熱從滲道而泄也諸黃豬膏發煎主之詳此治瘀血發黃之緩劑以諸黃雖多濕熱然經脈久病不無瘀血阻滯也肘後方以此治女勞癉身目盡黃發熱惡寒少腹滿小便難以大熱大寒女勞交接入水所致用發灰專散瘀血和豬膏煎之以潤經絡腸胃之燥較硝石礬石散雖緩急輕重懸殊散瘀之旨則一也癉而渴者其癉難治癉而不渴者其癉可治發於陰部其人必嘔陽部其人振寒而發熱也癉為濕熱固結阻其津液往來之道故以渴與不渴證津液之通與不通也嘔為腸胃受病振寒發熱為經絡受傷於此可證其表裡陰陽而治也黃癉者色如熏黃一身盡痛乃濕病也色如橘子黃身不痛乃癉病也癉分為五黃汗黃癉谷癉酒癉女勞癉黃汗者其證兩脛自冷從腰以上必汗出下無汗腰髖弛痛如有物在皮中狀劇者不能食身疼重煩躁小便不利此為黃汗宜耆芍桂酒湯晝熱加防風夜熱加當歸食少加白朮茯苓黃癉有干有濕干黃者肺燥也小便自利四肢不沉重渴而引飲梔子柏皮湯濕黃者脾濕也小便不利四肢沉重似渴不欲飲者麻黃連軺赤小豆湯身黃如橘子色小便不利腹微滿者茵陳蒿湯渴者茵陳五苓散谷癉者食畢即頭眩心中怫鬱不安遍身發黃是也小柴胡去參加白朮炮薑膽草枳實二便秘者茵陳蒿湯胃癉食已如飢胃熱消穀面黃瘦胸滿脅脹小便秘赤補中益氣加豬膽汁炒川連酒黃柏澤瀉酒癉者身目發黃腹如水狀心下懊憹而熱不能食時時欲吐足脛腫小便黃面發赤斑此因飢中飲酒大醉當風入水所致梔子大黃湯酒癉下之久久為黑癉者前方去大黃合犀角地黃不應去地黃加桂心桃仁穿山甲色癉者身黃額上微黑小便利大便黑此因房事過傷血蓄小腹而發黃故小腹連腰下痛大黃附子湯去細辛加肉桂若神思困倦頭目昏重脾氣不運大便不實者四君子湯下硝石礬石丸陰黃者厥冷脈沉或服寒涼過多變為陰黃或因過食寒物而成四肢皮膚皆冷心下痞硬眼澀不欲開自利蜷臥茵陳附子乾薑湯或茵陳四逆湯加白朮冷食不化腹中結痛去甘草加枳實白朮草豆蔻小便不利加桂苓澤瀉有瘀血發黃大便必黑腹脅有塊或脹脈沉或弦大便不利脈稍實而不甚弱者桃核承氣湯下盡黑物則退失血後崩後一切病後脾胃肺元氣大傷面色痿黃或淡白色悉屬虛從內傷治不可誤認作癉食勞疳黃俗名黃胖夫黃癉者暴病也疳黃者宿病也至有久不愈者溫中丸棗礬丸然此僅可治實人及田家力作之輩若膏粱柔脆之人未可輕試也戴氏云食積發黃量其虛實而下之其餘但利小便小便清利則黃自退喻嘉言曰夏月天氣之熱與地氣之濕交蒸人受二氣內結不散發為黃癉與盦醬無異必從外感汗吐下之法去其濕熱然夏月陽外陰內非若冬月傷寒人氣伏藏難動之比其谷癉酒癉女勞癉則純是內傷與外感無涉仲景補內經之闕曲盡其微至於陰癉一證仲景之方論已亡千古之下惟羅謙甫茵陳四逆湯一方治過用寒涼陽癉變陰之證有合往轍此外無有也今人但云陽癉色明陰癉色晦此不過氣血之分辨之不清轉足誤人如酒癉變黑女勞癉額上黑豈以其黑遂謂陰癉可用附子乾薑乎夫女勞癉者真陽為血所壅閉尚未大損瘀血一行陽氣即通矣陰癉則真陽衰微不振一任濕熱與濁氣敗血團聚不散必復其陽固結始開倘非離照當空幽隱何由畢達耶黃癉得之外感者誤用補法是謂實實得之內傷者誤用攻法是謂虛虛陰癉誤從陽治襲用苦寒者皆醫殺之也在半陰半陽之證其始必先退陰復陽陰退乃從陽治若以附子黃連合用況且有害奈何純陰無陽輒用苦寒耶石頑曰黃癉證中惟黑癉最劇良由酒後不禁酒濕流入髓藏所致土敗水崩之兆始病形神未槁者尚有濕熱可攻為祛癉之嚮導若病久肌肉消爍此真元告匱不能回榮於竭澤也中翰汪先於病癉服茵陳五苓不應八月間邀石頑診之弦大而芤腎傷挾瘀結積不散所致急乘元氣尚可攻擊時用金匱硝石礬石散兼桂苓丸之制以洗滌之遲則難為力矣汪氏有業醫者以為藥力太峻不便輕用旋值公郎鄉薦繼以公車未免縈心不及調治迨至新正二日復邀石頑相商脈轉弦勁而革真元竭盡無餘半月以來日服人參數錢如水投石延至正月下浣遣內使竊問予謂之曰捱至今日小主場事可無礙矣其後安公聯捷不及殿試而返信予言之不謬也同時有伶人黑癉投以硝石礬石散作丸晨夕各進五丸服至四日少腹攻絞小便先下瘀水大便繼下溏黑至十一日瘀盡次與桂苓歸芍之類調理半月而安或問近世治癉多用草頭單方在窮鄉絕域猶之可也城郭愚民亦多效尤仁人鑑此豈不痛歟嘗見有服商陸根苦匏酒過山龍雪裡青鹿蔥等汁吐利脫元而死者指不勝屈曾有孕婦病黃誤用瓜蒂搐鼻嘔逆喘滿致胎息上衝慘痛叫號而斃設當此際得何法以救之耶答言是皆與飛蛾觸火無異欲救之者惟廣行刊布垂誡將來勿蹈前轍庶不失仁人之用心若欲手挽既覆之車吾末如之何也目黃目黃曰黃癉亦有目黃而身不黃者經云風氣與陽明入胃循脈而上至目內眥其人肥則風氣不得外泄則為熱中而目黃煩渴引飲宣明用青龍散殊失經旨合用越婢加朮湯桂枝二越婢一湯選用病久屬虛者理苓湯倍用桂苓凡黃癉目黃不除或頭重以瓜蒂散搐鼻後用茵陳五苓散清利之診脈沉渴欲飲水小便不利者皆發黃脈洪大大便利而渴者死脈微小小便利不渴者生凡黃家候其寸口近掌無脈口鼻氣冷並不可治癉毒入腹喘滿者危凡年壯氣實脈滑便堅者易愈年衰氣弱脈虛澀而便利者難痊嘈雜噯氣䭇嘈雜與吞酸一類皆由肝氣不舒木挾相火乘其脾胃則谷之精微不行濁液攢聚為痰為飲其痰亦從木氣化酸肝木搖動中土故中土擾擾不寧而嘈雜如飢狀每求食以自救苟得少食則嘈雜少止止則復作蓋土虛不禁木所搖故治法必當補脾運痰土厚載物則風木自安不必用伐肝之劑六君子湯為專藥火盛作酸加吳茱萸川黃連若不開鬱補土務攻其痰久久而虛必變反胃泄瀉痞滿眩暈等病矣嘈雜或食後腐化酸臭心中煩雜者保和丸濕痰氣滯不喜飲食者保和丸二錢越鞠丸一錢和服脈洪大者火多二陳加薑汁炒山梔川連滑大者痰多導痰加芩連山梔脈弦細身倦怠者六君子加撫芎蒼朮薑汁炒山梔不應合佐金丸又有用消克藥過多飢不能食精神漸減四君子加白芍陳皮薑汁炒川連心懸懸如飢狀欲食之時勿與飲食常以枳朮丸三分抑青丸一分和服中脘有飲則嘈有宿食則酸故常噯宿腐氣逆咽酸水亦有每晨吐酸水數口日間無事膈常如酸熱者皆中宮不清所致越鞠丸合佐金丸服最妙婦人悒鬱多有此證逍遙散下佐金丸腎肝陰虛不能納氣歸元而作嘈雜噯氣痞滿脈必澀弱服補中二陳諸藥不效者臨臥用四神丸加川連侵晨用六味丸加沉香噯氣噯氣皆屬胃中窒塞氣不宣通上迫而出也然有飲食太過噯出如敗卵氣者則當審所傷何物而消導之亦有胃弱不能克化而然者此宜兼補兼消不可純用克伐也䭇胃中津氣枯槁則䭇若平時飲食常䭇者為反胃之漸不可不知欠嚏經云腎為欠為嚏氣鬱於胃故欠生焉胃足陽明之脈是動則病振寒善伸數欠二陽一陰發病主驚駭背痛善噫善欠胃為二陽腎為一陰以胃虛氣鬱於中則為噫腎虛經鬱於下則為欠內經雖以欠隸諸胃然必由少陰經氣下郁不能上走陽明胃氣因之不舒而頻呼數欠以泄其氣舒其經若少陰氣不下應胃氣雖虛郁上泄則但呼而不欠也人之嚏者陽氣和利滿於心出於鼻故為嚏金匱云夫中寒家善欠其人清涕出發熱色和者善嚏中寒其人下利以裡虛也欲嚏不能此人肚中寒中氣虛寒不能上溫肺氣則善呼不能下引腎氣則善欠故呼欠雖主胃氣不舒實緣腎氣鬱伏所致若中寒而加火迫津氣或風激水液皆清涕出縱由士虛不能御邪之故設兼客邪發熱而色和善嚏者此表氣尚強逼邪上走空竅也亦有裡虛不能拒邪而為下利者知其人必有陳寒無陽氣以發越其邪故欲嚏而不能也河間曰嚏者鼻中因癢而氣噴作於聲也鼻為肺竅癢為火化外風欲入而內火拒格故發為嚏有嚏則風邪隨氣而散不能入傷於經是以傷風有嚏為輕石頑曰內經金匱雖有嚏欠之因卻無方藥主治守真以傷風有嚏為輕者其人陽氣和利雖有風邪自能隨氣鼓散可無藉於湯藥也於此有人素蘊濕熱加以客邪鼻塞不聞香臭服細辛辛夷等藥百餘劑每當微風即嚏不已三嚏之後清涕如注腦戶隱隱掣痛諸治罔效因思金匱中寒家清涕善嚏之說遂取鍾乳專溫肺氣之品助以人參溫中黃耆實衛鹿茸固髓黃牛腦和丸空腹服三十丸餌及兩月數年之病隨手而愈身重解㑊經曰肝虛腎虛腳虛皆令人體重煩冤身重多屬於濕宜用健脾行濕之劑如除濕湯滲濕湯胃苓湯之類虛人補中益氣加羌防茯苓澤瀉隨其攸利仲景云風濕脈浮身重汗出惡風者防己黃耆湯夏月中風濕身重如山不能轉側消暑十全散加羌活蒼朮腎著身體重甘姜苓朮湯石頑曰身重無非濕證濕證多歸重於脾土為脾病是矣又腎為水臟腎虛則邪水用事故又主腎虛至於肝虛亦令人體重煩冤者何也蓋肝虛則不能勝土土無風氣亦必鬱熱上蒸而為病矣然肝則重於煩冤脾則重於腫重腎則重於痿弱不可不辨解㑊尺脈緩澀謂之解㑊又云腎脈太過則令人解㑊腎氣鬱熱精不運而解惰煩熱氣乏不欲言此腎經虛熱有餘也河間用利腎湯大謬宜虎潛丸清燥湯之類肥人夏月多此皆濕熱為患也脫營失精石頑曰嘗讀內經有脫營失精之病方家罕言近惟陳毓仁癰疽圖形僅見失營之名究無方論主治故粗工遇此靡不妄言作名為害不淺夫脫營者營氣內奪五志之火煎迫為患所以動輒煩冤喘促五火交煽於內經久始發於外發則堅硬如石毓仁所謂初如痰核久則漸大如石破後無膿惟流血水乃百死一生之證是以不立方論良有以也其形著也或發膺乳腋脅或發肘腕脛膝各隨陰陽偏阻而瑕聚其處久而不已五氣留連病有所並則上下連屬如流注然不可泥於毓仁之耳前後及項間方目之為失營也以始發之時不赤不痛見證甚微是以病者略不介意逮至腫大硬痛蟠根錯節已極豈待破後無膿方為百死一生之證哉原夫脫營之病靡不本之於郁若鬱於臟腑則為噎膈等證此不在臟腑病從內生與流注結核乳岩同源異沠推其主治在始萌可救之際一以和營開結為務而開結全賴胃氣有權方能運行藥力如益氣養營之制專心久服庶可望其向安設以攻堅解毒清火消痰為事必至腫破流水津復外滲至此日進參耆徒資淋瀝其破敗之狀有如榴子之裂於皮外蓮實之嵌於房中與翻花瘡形像無異非若流注結核之潰後尚可圖治亦不似失精之筋脈痿躄也詳脫營失精經雖並舉而死生輕重懸殊脫營由於嘗貴後賤雖不中邪精華日脫營既內亡瑕復外聚攻補皆為扼腕良工無以易其情志也失精由於先富後貧雖不傷邪身體日減內雖菀結外無瑕聚投劑略無妨礙醫師得以施其令澤也然二者之病總關情志每每交加而有同舟敵國兩難分解之勢故毓仁以失營二字括之惜乎但啟其端而肯綮示人之術則隱而不發何怪粗工謬言為道妄用砭石寧免五過四失之咎歟脫喻嘉言曰夫人之身陰陽相抱而不相離是以百年有常故陽欲上脫陰下吸之不能脫也陰欲下脫陽上吸之不能脫也即病因非一陰陽時有亢戰旋必兩協其平惟大醉大勞亂其常度使魂魄不能自主精神上下離決矣蓋上脫者皆是思慮傷神其人多汗面如渥丹妄見妄聞如有神靈閉目轉盼覺身非己有恍若離魂者然下脫者多緣房勞傷精其人翕翕少氣不能飲食大便滑泄無度小便清利倍常或夢寐走泄晝夜遺精或精血並脫不能自主復有上下俱脫者良由上盛下虛精華外脫其人必嗜肥甘好酒色而體肥痰盛往往有類中之虞嘗見有壯歲無病一笑而逝者此上脫也少年交合一注而傾者此下脫也顛仆遺尿喘鳴大汗者此上下俱脫也治法要在未脫之先尋其罅漏緘固之若不識病因而搏搜以冀弋獲雖日服人參徒竭重資究鮮實益總不解陰陽離決之機何臟使然若能洞鑑隔垣隨上下援救使陰平陽秘精神乃治烏有暴脫之患乎石頑曰脫之一證內經雖有精脫者耳襲氣脫者目不明難經又有脫陽者見鬼脫陰者目盲等說咸非喻子所言之暴脫也夫暴脫之患每嘗見於膏粱充飫之家藜藿艱虞之輩未之有也其於百藝之中惟鳴於醫者殫心竭力以博虛聲非他伎術但勞形而神氣無傷之比昔沈朗仲先生抱病赴高澹遊之招歸即喘汗而脫兒科趙蕙田輕舟應鳴先項公之請比及到崖舟子呼之不應脫然而逝吳羽仁先生先予而候如農姜公適予踵至時方瘀血大下氣亂脈喘難以議藥姑待平旦氣清之時診決庶無差誤握手言別切切囑予歸當謹察病機毋失氣宜訂期明晨早至共圖竭厥之治詰朝坐候吳子不至詢之姜使云是昨暮復過半塘坐脫肩輿之中因思所囑之言乃知仁人之用心直至形離神散而不自覺又安能於未脫之先尋罅漏而為緘固耶嗟予朽落一息僅存尚不能謝此煩勞因書以為前車之鑑併為同人保生之勸過飢胃竭人賴水穀以生水穀敷布則五臟安和水穀阻逆則百病叢生水穀廢絕則性命傾危以胃為水穀之海五臟之本也惟是病邪紏結於胃不能行出納之令者切勿強與以益病邪以胃中邪熱蘊隆痰食阻滯故雖一旬一氣不食不足為慮非若無病之人脾氣時時消磨不可旦晚缺食也故越人有平人不食水穀七日則死之說而最為切禁者傷寒之無汗脈緊為寒傷營證及汗不得出而煩躁之營衛俱病其胃中營氣為寒邪所傷既郁遏而為熱矣若不奪其飲食必轉助邪為虐為害不淺更有揮霍撩亂胃氣反戾之證誤進穀氣禍不旋踵至於自汗脈緩之風傷衛證雖同感客邪只傳經絡不傳胃府便無禁食之例觀仲景桂枝湯後云啜熱稀粥以助藥力於此可見不當概為禁止也非特桂枝湯用熱稀粥以助藥力也即寒傷營之尺中微弱者用小建中取膠飴之稼穡作甘引桂枝之辛溫留戀中焦以助胃祛邪即是熱稀粥之變法且釀去渣滓無質滯著則不助邪熱故寒傷營亦得用之較熱稀粥之法更進一層矣仲景為傷寒立法之祖必無誕妄之言欺誤後世之理只緣聖法久湮故近世醫流凡遇發熱頭痛有似外感之類無論病之虛實證之表裡熱之真假概以傷寒目之必先禁止飲食混與通套疏風消克之藥在質壯氣實人得之雖未中窾稍借行表之勢便可熱退身涼安知胃氣有權者感邪不深雖不服藥自能蒸發正汗所謂壯者氣行則已也苟元氣虛人胃中津液本少且復奪其飲食藥雖中病尚難作汗況堪恣行表藥重傷本虛之胃氣乎曷知脾胃之氣全賴水穀資其轉運與車輪戽水不異今以既病垂絕之胃尚欲俟其胸膈開爽始進穀氣猶埋輪旱麓待水漲而後戽之則苗之不槁也幾希矣縱僥倖不死元氣削伐殆盡少年者日漸尫羸多成虛損高年者暗損元神促其天年皆由習俗好用攻克不顧正氣所致蓋病之有發熱頭痛者未必盡為傷寒假如內傷勞倦陰虛火炎概以傷寒法治之是速其夭扎也予業擅傷寒專科六十年來目擊誤奪飲食至劇致斃者未遑枚舉嘗見餓久之人脾氣不運雖經旬累月愈不思食庸工不知以為尚有宿食猛進寬胸破氣之藥每每激其虛陽上浮外泛而致頭面不時哄熱醫者復認表邪未盡重與發散硝黃柴葛枳橘之屬恣無忌憚不死不已亦有腸胃久絕穀氣大便枯竭不行而欲妄議攻下者此胃氣虛極無論攻伐之藥不能勝任即調補藥亦難勝任但當頻與粥湯微助胃氣以俟津回庶或可救而餓久之人粥食到口雖極甘美然多有食下作嘔者或食下少頃作酸者或膈間迷迷不爽者或腹中隱隱作痛者或腸中聲響不已者此皆三脘閉約痰氣阻礙之故病家不明此理往往惑於師巫及親朋左右之言猶豫不敢進食因循日久終成不救者多矣曷知胃氣久虛之人即有不時哄熱非助以穀氣則虛火不除則有胸膈痞滿非助以穀氣則大氣不運即有大便枯約非助以穀氣則津液不回蓋新穀氣運則宿滯始能下通若能認定關頭頻與稀糜俟胃氣稍復漸以獨參保元四君異功之類調之如此而獲保全者亦頗不少但不可猛進強進及添水復熱者搪塞一時重傷衰竭之胃氣反歸咎於調治也經云漿粥入胃則虛者活所以往往令其勿藥以收十全之功耳飛疇治一婦嘔惡胸滿身熱六脈弦數無力形色倦怠渴不甚飲云自遊虎邱暈船吐後汗出發熱頭痛服發散四劑頭痛雖緩但脹暈不禁復用消導三四劑胸膈愈膨聞穀氣則嘔眩因熱不退醫禁粥食已半月惟日飲清茶三四甌今周身骨肉楚痛轉側眩暈嘔噦予曰當風嘔汗外感有之已經發散矣吐則飲食已去胃氣從逆消克則更傷脾氣脾虛故脹甚今無外感可散無飲食可消脾絕穀氣則嘔土受水克則暈即使用藥亦無胃氣行其藥力惟與米飲繼進稀糜使脾胃有主更議補益可也因確守予言竟不藥而愈藥蠱藥之治病不得已也古人以不服藥為中醫厥有旨哉嘗聞古聖垂誨靡不反覆詳慎至立方之下每雲中病即止不必盡劑其鄭重有如此者近世豐裕之家略有小病即從事於醫藥元氣堅固者無論治之中窾與否但得開通病氣元神自復若稟質素弱及病後產後亡血脫瀉之後不能即愈日以湯藥為務多致輕者重而重者劇病氣日增飲食日減以致寒熱咳嗽吐痰吐血諸證百出而猶以為藥力未逮邪熱未除日以清火消痰為務遂成藥蠱之病矣夫人之胃氣全賴水穀滋養胃氣旺則諸病不生縱有賊邪侵犯氣復自已原無急於調治也嘗見世人不得盡其天年者大都皆醫藥之誤耳今既病之胃轉為藥力所侵不至四大分崩不已末流之挽雖日事參苓耆術如以漏器承漿漫無盈滿之期況堪克任偏勝性味乎凡虛羸之疾治之不能即應當暫為休息以俟胃氣之復不特藥蠱為然也其藥蠱之患有三一者胃氣為藥所汨飲食不為肌屑而骨不支床一者藥毒流於坎陷少火不能內臟而煩蒸髓極一者脾傷不能收精臟氣固結不舒而羸瘦腹大雖有脾胃之分所重全在胃氣胃為五臟之本也此性膏粱豢養者有之在藜藿勞勩之人未之見也其治藥蠱之病當屏絕一切苦寒降泄辛熱升發氣味濃烈之藥只宜小劑參耆甘溫養胃之品庶為合宜如獨參保元之類以圖陽生陰長之功若虛火僭逆稍加秋石以引參耆之力入於陰分為止逆下氣之首藥無寒涼傷胃奪食作瀉之虞若晡熱自汗不止當歸補血六味地黃少少與之一為血虛發熱一為陰虛發熱之專劑勿以迂緩而忽諸若貪功而妄行雜治則與抱薪救焚不殊也況有中氣久為藥憊畏食泄瀉或下利膿血無論寒熱補瀉即獨參理中下咽必增煩劇即宜屏除藥石但與稀糜養其胃氣次以餚核助其氣血五穀為養五肉為助未嘗不為軒岐要旨也當知樂蠱傷胃則胃之畏藥所不待言惟使穀神敷布日漸向安經云安穀者昌安穀者過期未聞服藥得以長生也操司命之權者何不思之甚耶臭毒臭毒俗名發痧皆由中氣素虧之故蓋脾胃之所喜者香燥所惡者臭濕今脾胃真氣有虧或素多濕鬱所以不能主持故臭惡之氣得以直犯無禁發則腹痛不能飲食或上連頭額俱痛或下連腿及委中俱痛甚至有欲吐不吐欲瀉不瀉或四肢厥逆面青脈伏或遍體壯熱面紫脈堅此平昔火衰火盛之別也有痛死不知人少間復甦者有腹痛不時上攻水漿不入數日不已者欲試真否但與生黃豆嚼之覺香甜者即是臭毒覺腥者非也舉世有用水搭肩背及臂者有以苧麻水濕刮之者有以瓷碗油潤刮之者有以瓷鋒針刺委中出血者有以油紙點照視背上有紅點處皆烙之者總欲使腠理開通之意又有以冷水咽椒數十粒者有以白礬生研冷水調服二三錢者然椒性辛散誤餌無妨礬性酸澀苟非臭毒為禍不淺多有誤認食積屢攻不愈綿延十日半月而死者常見有大飲冷水而變下痢者亦有飲水停於肺中而變水腫者有誤服礬水呃逆嘔噦不止者有刺委中去血過多移時而死者亦有傷寒陰證腹痛誤刺委中及飲冷水而致不救者又有內傷冷食腹痛誤刺委中而致轉劇者誠可憫也按此腹痛乃陰邪穢氣郁遏脾胃中伏火兩邪相擊而致每苦時常舉發藥之不應古法有初得病時飲以艾湯試吐即是此證有以蠶蛻紙泡湯飲之溫覆取汗蓋蠶性豁痰祛風利竅其紙已經鹽過而順下最速也余嘗謂此證既屬中土氣衰穢氣內賊便當用利氣藥以散穢濁之氣合用一味香附童便浸曬為末停湯頓服四五錢立效或越鞠丸沉香降氣散亦佳又脾虛挾火兼犯穢氣則心腹擾痛上下不通俗謂之乾霍亂近世謂之絞腸痧以穢氣在外固結不散火邪在內攻擊不開故為證最急急以鹽置刀頭燒紅淬水中攪勻灌吐以升提鬱閉之氣然後以藿香正氣散放溫與之曾見有熱服湯藥而斃者有服玉樞丹蘇合香丸而愈者然不若鹽湯和童便為最點眼砂亦佳但凡臭惡腹痛脈或伏或細小緊澀或堅勁搏指中而帶促結皆是陰逆陽伏之象不可誤認陰寒而投熱藥致動其火為害不可勝言非但熱藥當禁即砂仁辛溫香竄生薑辛辣上升氣酒辛烈助火皆當忌之熱湯亦切勿與熱浴尤為大忌熱則上衝莫制也若見面青唇黑脈勁搏指厥逆喘促者多不可救也番痧嘗考方書從無痧證之名惟觸犯臭穢而腹痛嘔逆世俗以瓷器蘸油刮其脊上隨發紅斑者謂之曰痧甚則欲吐不吐欲瀉不瀉乾嘔絞痛者曰絞腸痧近時有感惡毒異氣而驟發黑痧俗名番痧卒然昏倒腹痛面色黑脹不呼不叫如不急治兩三時即斃有微發寒熱腹痛麻瞀嘔惡神昏者或濈濈汗出或隱隱發斑此毒邪焮發於表也亦有發即瀉利厥逆腹脹無脈者此毒邪內伏不能外發也所患最暴多有不及見斑而殂者經謂大氣入於臟腑雖不病而卒死是也初覺先將紙捻點淬頭額即以蕎麥焙燥去殼取末三錢溫湯調服重者少頃再服即安蓋蕎麥能煉腸胃滓穢降氣寬胸而治濁滯為痧毒之專藥但服過蕎麥者後患別病藥中有綠礬者切勿犯之其毒甚面黑者急於兩膝後委中穴砭出黑血以泄毒邪蓋驟發之病勿慮其虛非此急奪束手待斃以此病起於漠北流入中原故以番痧目之原夫此病與瘴癘相似瘴則觸冒山嵐瘴氣此則觸冒惡毒異氣與時行疫癘不殊但時行則沿門闔境傳染此則一人驟感死於一日半日之間不似時行之可以遷延數日也又此病與傷寒之伏氣相似伏氣發溫熱毒自里達表此則一身驟感異氣無分表裡臟腑亦不似中寒暍暑本虛不勝寒暑之暴也又此病與揮霍撩亂相似霍亂是客邪與水穀之氣相併此則正氣暴逆不能與邪相亢也又此病與關格相似關格是上下不通病純屬裡此則兼有斑痧表證也大略與臭毒相類然臭毒所觸穢氣此則觸冒惡毒較之癘疫尤劇初起昏憒不省脈多沉匿不顯或渾渾不清勿以腹痛足冷而與溫藥倘蕎麥一時難得或服之不應即宜理氣為先如香蘇散加薄荷荊芥辛涼透表次則辟邪為要梔子破湯加牛蒡生甘草解毒安中表熱勢甚清熱為急黃芩湯加連翹木通分利陰陽如見煩擾腹脹脈來數疾急投涼膈散如局方以竹葉易生薑則毒從下奪熱劇神昏雖合三黃多不可救煩渴引飲遺尿速清陽明白虎湯加蔥豉使毒從表化以上諸法在未經誤藥庶可挽回一二若病家疑信未真慎毋輕治脫或變生反掌取咎未便曾見一商初到吳會暢飲酣歌席間霎時不安索生薑湯一啜而逝又有朔客到楓覓混澡浴忽然眩暈嘔逆到舟即斃繼有醫者飯後寒熱腹痛手足逆冷不終夕而告殂更有文學鄉居到郡作吊歸即腹痛坐立不寧語言不次然見客猶能勉力作揖診之六脈模糊是夜即便捐館邇來卒患腹痛死者比比皆然雖無斑現靡不謂之番痧近有年少新婚陡然腹痛麻瞀或令飲火酒半甌而腹痛轉劇旋增顱脹身發紅點與蘆根汁得吐乃解復有鼻衄口燥胸腹略見紅斑啜童子小便稍寧醫與蔥白香豉濃煎仍入童便續續與之得大吐汗出而痊若斑點深赤毒在血分者濃煎茺蔚少投生蜜放溫恣服取效最捷以其專下惡血也或加生萊菔汁半杯總取散血之功且有誤認傷寒而與發散周身焮紫如雲而死者亦有誤認麻疹而與檉柳櫻桃核湯咽痛失音而死者況有停食感冒誤認番痧而與寒涼解毒反減去衣被不慎風寒煩熱躁擾而死者以其卒犯惡毒異氣無以脈診故辨治尤難是以近世多用火淬砭刺之法須知因感惡毒異氣而致者此屬外因火淬為當因觸臭毒穢氣而致者屬不內外因非砭刺不足以奪其勢然刺之無血不可救也嶺南瘴毒嶺南炎方瀕海地卑土薄故陽氣常泄陰氣常虧四時放花冬無霜雪一歲之間暑熱過半窮腦久晴或至搖扇人居其間氣多上壅膚多汗出腠理不密蓋陽不返本而然也陽燠既泄則使人本氣不堅陽不下降常浮而上氣浮而不堅則汗府開疏津液易泄故內寒外熱上熱下寒之證所由生也治當固陽氣實腠理為主若多用表散之藥則陽氣愈虛風邪益盛鮮有不誤者矣確係外邪為患則當蒼朮芩連湯解散之春秋時月人感山嵐瘴霧之氣發寒熱胸膈飽悶不思飲食此毒氣從鼻口入內也治當清上焦解內毒行氣降痰不宜發汗蒼朮芩連湯頭痛甚者去木通黃連加藁本蔥豉若寒溫失節汗身坦露感冒風寒之氣氣閉發熱頭痛此則傷寒類也但嶺南氣溫易汗故多類瘧南方氣升得此病者卒皆胸滿痰涎壅塞飲食不進與北方傷寒只傷表而里自和者不同治當解表清熱降氣行痰蒼朮羌活湯若內停飲食外感風寒者藿香正氣散若脾氣虛弱而寒熱作嘔平胃散加半夏木香名不換金正氣散瘴瘧寒熱往來者蒼朮柴胡湯瘧久者加人參當歸汗多者去蒼朮易白朮加白芍大凡病久而氣虛血弱者必發熱須用四君之類調補脾胃脾胃一健氣血自生若認為血虛而用四物沉陰之劑則脾土復傷諸臟皆病虛證蜂起反為難治甚至不救瘧後變成痢宜從虛治補中益氣湯有熱加芩連有食加木香砂仁若溫暑之月民病天行瘟疫熱病治宜清熱解毒之劑蒼朮白虎湯加人中黃若時氣發熱變為黃病所謂瘟黃也治宜清熱利濕茵陳五苓加人中黃連柏若中氣虛寒四肢厥冷或浮腫黑黃者用理中湯加茵陳桂苓飛疇曰粵西傍交趾一帶豬雞之屬俱煮湯潑去更煮食之其米亦然且不能多食稍過則脹悶總由瘴毒漸毓所致其日出時有氣如蘭香日中時有氣如茉莉香日沒時有氣如炊新米香如此每日三氣急掩口鼻勿語言以避之其觸之者寒熱如瘧三四日死元氣稍旺者數日死當此急服藿香正氣蒼朮羌活湯猶可救之予戚官其地不三月而只存一口乃元氣充裕者然亦病幾於危故仕任及客遊其處者切須知之否則無不蒙其害者矣中霧氣者心內煩悶少氣頭痛項急起則頭眩或身微寒戰掉不安時復憎寒心中欲吐乾嘔無物此清陽之位受濁陰之邪氣也不可耗氣傷津梔子豉湯加蔥白湧散之頭痛甚加藁本煩悶加木香藿香之類繆仲淳經疏只用藁本木香水煎服大抵蒸發之邪必中在上在表故宜湧之總無關於臟腑也蟲蟲由少陽風木濕熱鬱蒸而成觀日中有雨則禾節生蟲人患蟲積多因飢飽失宜中脘氣虛濕熱失運故生諸蟲小兒最多大人間有其候心嘈腹痛嘔吐涎沫面色痿黃眼眶鼻下有黑嗜食米紙茶葉泥炭之類沉沉默默欲眠微有寒熱治宜隨證用方如心腹中痛上下往來發作有休時喜涎出者蟲也烏梅丸胃脘咬痛發歇有時痛發則吐涎沫金匱九痛丸狐疑善惑者妙功丸噎膈嘔吐者剪紅丸肚腹常熱者化蟲丸四肢常冷者集效丸腹中蟲積萬應丸膈上痰濕蟲積遇仙丹穀道生瘡蟲蝕癢痛膠艾葙歸湯外用雄黃兌法隨證取用無不克應也千金方用豬膽一枚苦酒半升和之火煎令沸三上三下藥成放溫空腹飲三滿口蟲死便愈治蛔攻心痛神應仁齋云血入於酒則為酒鱉血凝於氣則為氣鱉敗血雜痰則為血痰掉頭掉尾上侵胃脘食人脂膜或附脅背或隱胸腹惟蕪荑炒煎服之然必兼養胃益血理中乃可殺之若徒用雷丸錫灰不能去也治蟲之藥必在夏月龍蛇起陸之時服之方易奏功若在萬類蟄藏之際雖有合劑不能取效也丹溪以上半月蟲頭向上易治當以上半日為是先以糖蜜肉汁香甜物引起後用殺蟲藥然須為散以渣滓可入蟲口也痔漏中蟲蝕下部肛盡穿腸者取蝦蟆青背者一枚入蘆薈一錢用生雄雞脛骨二莖入滿雌黃並用鹽泥固濟燒存性合和為散入腦麝硼砂各少許再研極細先以豬蹄甲三枚胡蔥七莖煎湯日洗紙捻裛干吹下部孔內令深入外以黑膏蓋之日吹一次以管盡為度如或希奇怪病除痰血外百治不效者即是蟲為患視其經絡虛實參脈證消息治之蟲在肝令人恐怖眼中赤壅在心心煩發躁在脾勞熱四肢腫急在肺咳嗽氣喘醫者不察謬指凡動屬火屬痰寒涼轉傷脾胃卒至夭枉自非垣視一方者烏能辨哉婦人陰蝕之蟲詳婦人本門石頑曰蟲之怪證多端遇之卒不能辨昔人治例有雷丸治應聲蟲之說近有女子咳逆腹痛後忽喜呼叫初時呀呷連聲漸至吚唔不已變易不常或如母雞聲或如水蛙鳴或如舟人打號每作數十聲日發十餘次忍之則胸中悶悶不安此為叫蟲即應聲蟲之類也復有一人患發熱痞滿後常兀兀欲吐吐中必有蟲數枚狀如蝦形跳躍不已諸治不應或令服銅綠湧之不過二三度遂絕不復見矣蠱毒射工溪毒諸中毒南粵蠱毒有數種曰蛇毒蜥蜴毒蝦蟆毒蜣螂草毒金蠶等毒皆是變亂元氣人有過造作之者即謂之蠱也多於飲食內行之與人禍患禍患於他則蠱主吉利所以人蓄事之中其毒者心腹絞痛如有物齧或吐下血皆如爛肉或好臥暗室不欲光明或心性反常乍嗔乍喜或四肢沉重百節痠疼或乍寒乍熱身體習習而痹胸中滿悶或頭目痛或吐逆不定或面目青黃甚者十指俱黑診其脈緩大而散皆其候也然其毒有緩有急急者倉卒或數日便死緩者延引歲月遊走腸內蝕五臟盡則死其死時皆從九孔中或於脅下肉中出所以出門須帶雄黃麝香丹砂辟惡之藥即百蠱狐貍老物精魅不敢著人彼處之人亦有灸法初中蟲毒即於心下捺定便大炷艾灸百壯又於足小指尖上灸三壯當有物出即愈欲驗之法當令病人唾水沉者是蠱不沉者非蠱也初覺中蠱急服玉樞丹或吐或利隨服便痊南方有毒蠱之鄉於他人家飲食即以犀角攪之白沫起即為有毒無沫者即無毒也凡嶺南蠱毒之鄉卒患血痢或赤或黑無問多少皆是蠱毒或偏身腫滿四肢如故小便不甚澀滯粗醫不察誤作痢治水治日復增加奄至殞歿以敗鼓皮燒作末飲服方寸匙令其解散自愈又有以蛇涎合作蠱藥飲食中使人得此瘕疾生大豆末酒漬絞汁服半斤凡初中毒在膈者歸魂散吐之以下膈者雄朱丸下之一切蠱毒心腹脹滿不得喘息或下利膿血太乙追命丹耆婆萬病丸救之吐利後惟覺後心刺痛拘急咽中如矛刺者此是取利後氣乏故也更不須再服吐利藥但用一味苦梗為散每服三錢米飲調下日三服多服自然平復使毒日漸消散不致再發丹方用蝟皮燒灰桃根皮煎湯服方寸匙蠱便出又方用苦瓠一枚苦酒二升或水煮一升服之當下蠱毒及一切蝦蟆蝌鬥之狀一月後乃盡射工溪毒孫真人曰南方有射工毒蟲一名短狐溪毒一名蜮形如甲蟲無目利耳有一長角在口前如弩以氣為矢因水勢以射人人或聞其水中鉍鉍作聲要須得水沒其口便以口中毒射人此蟲畏鵝鵝能食之其初見證有似傷寒先惡寒寒熱筋急亦如中風便口噤不能語朝蘇暮劇寒熱悶亂是其證也如得三四日急以五香散治之稍遲者七日死射著人影者不即作瘡先病寒熱自非其地之人不知其證便謂傷寒每多誤治中人頭面尤急腰以上去人心近多死腰以下稍緩不治亦死孫真人云凡山水有毒蟲人涉水之時中人似射工而無物其初得之惡寒微頭痛目眶疼心中煩懊四肢振焮腰背百節皆強兩膝痛或翕翕而熱但欲眠睡旦醒暮劇手足逆冷至肘膝二三日腹中生蟲蝕人下部肛中有瘡不痛不癢令人不覺不急治之過六七日下部出膿蟲上蝕人五臟熱盛毒煩下痢不禁八九日良醫不能治矣其毒有陰陽之異覺得之急視其下部若有瘡正赤如截肉者為陽毒最急瘡如鯉魚齒者為陰毒稍緩要皆殺人不過二十日也欲知是水毒與非者當以小蒜五升投湯中浴之是水毒身體必發赤斑急服解水毒飲子多磨生犀汁調服東南郡縣山谷溪源有水毒病亦名溪瘟亦有陰陽之辨脈洪大而數者為陽先宜發汗及浴脈沉細而遲者為陰急當攻裡凡解澗水毒生犀角磨水調雄黃末二三錢頻以麻油灌之稍久則用牽牛大黃雄黃蜈蚣蠍梢末宰生羯羊血調灌之欲審是中水毒者手足指必冷若不冷者非也諸中毒一切毒中雖各因氣味而歸諸臟腑然必胃先受之而後流及其臟也金匱云凡煮藥飲汁以解毒者雖云救急不可熱飲諸毒病得熱更甚宜冷飲之食自死六畜肉中毒燒大屎酒服力寸匕或大豆煮汁飲數升或水浸豆豉絞汁旋飲之食馬肝中毒以雄鼠屎二七粒為末水和日再服食馬肉中毒血洞下欲死以香豉杏仁為散服之或煮蘆根汁飲之食牛肉中毒狼牙燒灰取方寸匕水服之食犬肉不消堅滿腹脹大渴如狂以杏仁一升合皮研煮分溫三服利下肉片大驗食漏脯中毒搗生韭汁服之生大豆汁亦得凡肉在器中密蓋不泄氣者謂之郁肉食之傷人燒狗屎末方寸匕水調服之食毒箭射死鳥獸中毒以大豆煮汁及鹽服之食魚中毒面腫煩亂橘皮煮汁停冷服之食鱠多不消結為癥病厚朴大黃煮汁服之或馬鞭草一味搗汁飲之或姜搗汁飲之食鯸鮧中毒以蘆根煮汁服之食蟹中毒以冬瓜汁服之或紫蘇煮飲之食諸果中毒以豬骨燒灰服之食諸菌中毒及食楓樹上菌而笑不止人糞汁飲之土漿亦可或嚼生大豆吐之鉤吻與芹菜相似誤食殺人以薺苨煮汁服之又甘草煮汁飲之通除諸毒藥中石藥毒白鴨屎人乳解之中雄黃毒防己解之中砒毒者煩躁如狂心腹攪痛欲吐不吐羊血不拘多少灌之或清油糞清亦可切戒與酒火酒尤忌中巴豆毒者其人大瀉或吐煩渴急以黃連煎湯或甘草湯冷飲倉卒權飲冷水亦好忌食熱物並熱性藥物中斑蝥芫青毒者吐逆不止急煎綠豆湯或黑豆湯溫服豬膏地漿葵子汁並解之中大黃毒者泄瀉不止腹中寒痛先用薑湯熱飲次以理中湯理胃祛寒中大戟毒菖蒲解之中甘遂毒大豆煮汁服之中半夏南星毒者其人喉間麻痹急用薑汁細呷並飲甘草湯中躑躅毒梔子煮汁服之中野芋毒地漿人糞汁解之中杏仁毒藍汁解之中芫花毒防己防風甘草桂汁解之中野葛毒地漿解之中藜蘆毒蔥湯下咽便愈中射罔毒藍汁大小豆汁生羊血並解之中蜀椒毒人尿地漿冷水並解之中莨菪毒甘草藍汁解之中川烏附子毒者必煩悶唇裂血流頭重如斗急與生萊菔汁解之童便亦可次煎綠豆黑豆湯二三沸即與冷服然不若甘草湯入腹即定誤服伏火丹砂中毒則毒歸心臟其舌灰黑脹大急宜童子小便飲之次以金汁及人中黃解之或濃煮黑豆汁解之或搗生綠豆汁解之或生羊血或磨犀角水並解之服風藥多汗悶亂不醒先以醋湯灌之次煎甘草湯同薑汁頓服夏秋間誤食停宿之物中有蜈蚣蛇蟲等毒則心腹膨悶雄黃磨水細飲玉樞丹磨服亦效蜀椒閉口者有毒誤食戟人咽喉氣欲絕急以地漿水解之六畜肝藏常有毒驢馬更甚自死者尤毒用豆豉以水浸絞取汁旋飲之馬齧人及蹹人毒腫熱痛作瘡馬鞭梢鼠屎燒灰豬膏塗之馬齧人陰卯脫出急令推入桑皮線縫研生烏雞肝塗上欲小便忍之牛馬齧人及馬骨刺傷人灶灰淋汁熱漬數易汁勿令瘡爛馬血入瘡中婦人月水或人糞塗之剝死馬骨傷人毒攻欲死便取馬腸中屎塗之中河豚魚毒急取蘆根搗汁服之輕則清油多灌使毒物盡吐出亦須遇時而愈或橄欖搗自然汁甚則糞清灌之食鱉中毒乾薑山楂煮汁飲之誤食蛇穴中蟹鱉令人頭旋目眩腹痛而死急磨玉樞丹救之凡蟹重一斤外者大毒食之殺人誤吞蜈蚣胸腹絞痛先飲生雞血須臾以清油灌吐其蜈蚣滾在血中同出繼以雄黃細研水調服誤吞水蛭生雞血調黃土丸服自下或以鹽梅水灌之則化中漆毒生蟹搗汁塗之治諸食中毒磨犀角汁飲之無不治也或苦參酒煮服之解一切藥毒不問草石始覺便以蔥豉生麥門冬煮取汁服之藥對解法凡藥相對者誤服以防解救諸法附列於下鍾乳對術其治主肺上通頭胸術動鍾乳胸塞短氣鍾乳動術頭痛目疼又鍾乳雖不對海蛤海蛤能動鍾乳然鍾乳與術為患不過此也發動之始體中有異與上患相應速宜服蔥白香豉甘草吳茱萸湯解之才服便令人按摩搖動口中嚼物然後仰臥覆汗汗出去覆服湯熱歇即用冷淘飯壓之若服不解復用前湯去萸加桂若已解肺家尚有餘熱第二方加麥門冬硫黃對防風又對細辛其治主脾腎通主腰防風動硫黃煩熱腳疼腰痛或嗔忿無常或下痢不禁防風細辛能動硫黃硫黃不能動彼始覺發便宜服杜仲枳實甘草香豉梔子李核仁服如上法不解復服大麥奴甘草人參芒硝桂心麥門冬若服此已解猶有餘熱氣或冷復服人參乾薑附子甘草當歸白石英對附子其治主胃通主脾腎附子動白石英煩熱腹脹白石英動附子嘔逆不得食或口噤不開或手足疼痛始覺宜服麥門冬甘草麻黃香豉不解再服大黃香豉梔子甘草服如上法頻服湯下便止不下再服若熱勢未除而渴復服栝蔞根大麥奴甘草蔥豉若已解胃中有餘熱復服芒硝桂心通草甘草白朮大棗李核仁紫石英對人參其治主心肝通主腰腳人參動紫石英心急而痛或驚悸不得眠臥恍惚忘誤失性發狂乍寒乍熱耳聾目暗始覺宜服人參白朮甘草桂心細辛香豉服如上法若嗔盛加大黃黃芩梔子若忘誤狂發未除復服蔥白香豉麥門冬甘草人參服如上法溫覆使身稍汗便解若有餘熱更服人參防風桂心白朮生薑赤石脂對桔梗其治主心通主胸背桔梗動石脂心痛寒噤手足逆冷心中煩悶赤石脂動桔梗頭痛目赤身體壯熱始覺發便宜溫酒飲之須酒勢行則解或大麥炒令汗出勿焦搗篩細末冷水和服礬石無所偏對其治主胃發則令人心急口噤骨節強痛生瘡始覺發即服蔥白香豉甘草湯若發身體即便生瘡宜服麥門冬人參甘草桂心蔥白香豉附子對白石英亦對赤石脂附子發則嘔逆腳疼體強骨節痛面腫發則飲酒服熱面自愈與白石英同解赤石脂紫石英發宜飲酒得酒則解凡藥發或有宜飲熱酒不可一概也以上解救發對八則出千金方金太傅孫古修誤服伏火丹砂中毒懇治於石頑察其本元素虧近因虛火上炎吞下腫脹延及兩頤醫用苦寒清熱太過神思不寧藥中每服加丹砂五錢甫進一劑覺胸中有物觸有數次次早請政於醫復出丹砂視之色黑而晦丹爐中伏火砂也醫令易砂更服四劑晝夜煩躁不寧背時灑淅惡寒頭面哄熱大汗脛膝逆冷如冰忽忽氣逆欲絕醫目瞪無措乃延石頑診之六脈澀數模糊次驗唇舌俱色如汙泥而腫厚濕滑若系熱極似陰必無濕滑之理若系寒犯三陰必無反厚之理惟酒食內蘊黴醬色現有之審其二便調適胸腹柔和決無實停胃府之理證雖危疑而懇致最切以脈合證洵為陰受熱鬱今所最急者恐其喘汗欲脫不獲已以生脈六味合劑庶幾金水相生以救肺腎之垂絕進一服神思稍安自汗稍斂再一服人事稍知稀糜稍進方能略述從前所患之病出從前所用之方猶未言及伏火砂也見其舌沿稍轉微紅而氣微足冷如故於前方中益入桂心五分五味數粒服後足稍溫和氣稍接續語稍有次方詳述伏火丹砂之誤因以前方減去地黃桂心五味易入棗仁秋石人中黃專解丹砂之毒三服舌轉微紅雖未鮮潔而伏毒漸解緣兩尺弦細乃去人中黃仍用地黃以填補下元數日之間或去人中黃而用地黃或去地黃而用人中黃隨脈證而更迭出入二味不兼用者恐人中黃味甘戀膈載地黃之膩不能速達下焦也下元雖虧調補藥中寧用鹿茸河車不敢用桂附者慮其鼓舞丹砂之餘烈也急救治例自縊凡救自縊死者急須按定其心勿截繩抱起徐徐解之心下尚溫者令人以口接氣入其腹內無令氣泄再令兩人吹其兩耳半日許縊者噫噫即勿吹也熱暍取道上熱土壅心中少冷即易氣通止切勿與水得冷即死余見暑門溺水以灶灰布地令厚半尺許以甑或木凳將溺死人伏臥其上使頭小垂下炒鹽二方寸匙納竹管中吹下孔中當吐水水下去甑下溺死者著暖灰壅身使出鼻口即活如灰濕暖灰易之又法但埋溺死者於暖灰中頭足俱掩惟開七孔又法屈兩腳著生人肩上以背向背負持走行吐出水便活又冬月溺水凍死以暖灰囊薄心上冷即易之心暖氣通目轉口開可與溫飲稍稍吞之若不先溫其心便持火烘冷氣與火爭即死凍死令人以熱體偎臥暖被覆之勿著火烘即死卒中寒肢體厥冷四逆理中救之火燒凡火燒損慎勿以冷水洗之得冷火毒更深入骨初被火傷急向火更灸雖大痛忍之須臾乃止火燒悶絕不識人以尿乘熱飲之和蜜亦佳口噤挖開與之後用梔子白芨黃芩各五兩以水五升油一合煎去滓待微溫令漬傷處去火毒則肌得寬或急以火酒浸之其痛立止醇酒亦佳一切火燒湯潑用鱉甲燒灰研極細羅淨香油調敷其痛亦止或用水中溺死鼠一枚以臘月豬膏煎令消盡敷之干即再敷與油浸小鼠無異或柏白皮細切以豬膏煎四五沸色變去滓敷之若已成爛瘡者末楊梅皮糝之即瘥湯火所損晝夜啼呼不止用松脂細研和蠟溶化再加豬膏羊脂塗之金瘡箭頭在肉中用白蘞生半夏為散酒下方寸匙日三服瘡淺十日出瘡深二十日出外以蜣螂生搗塗患上如無蜣螂以栝蔞搗塗箭簇上即出不出搗鼠肝塗之中射罔箭毒昏迷腫疼取藍子五合升麻王不留行甘草各三兩為散水服三方寸匙日三夜二服又以水和塗瘡干即易之針折肉中以吸鐵石生搗細末厚著針處即出或刮象牙屑為細末水和塗折針上亦出漆瘡以柳葉搗爛煮汁適寒溫洗之蛇蟲毒乘涼睡熟蛇入人口並七孔者割豬尾血以器盛血傍蛇瀉入口中出之卒為蛇繞不解以熱湯淋之急迫無湯令人以尿溺之蛇蠍螫痛小蒜搗爛絞汁服之以滓薄傷處又方以雄黃為末敷上日一易之又方搗生豆葉絞汁服之以滓塗之良入山闢眾蛇乾薑麝香雄黃為末以小絳囊盛帶之蛇螫以蜜和塗傷處又常燒羖羊角使煙出即去虎狼皆去如無羖羊角燒水羊角亦可蠼螋蟲尿著人便起㾦㿔作聚四邊中央有白膿如黍粟初得之磨犀角水塗之或羊須燒灰臘月豬脂和封之或酥和胡粉塗之猘犬傷凡猘犬咬人七日輒應一發三七日不發腹中不作小犬吠聲則無害要過百日乃得免終身禁食犬肉蠶蛹食此則發瘡未愈時禁食生魚及諸肥膩冷食又不宜飲酒禁一年乃佳治法先以熱童便洗去惡血牙垢便解被傷發看有紅者拔去之即以發灰蝟皮灰水和服之並以韭搗絞汁飲一升日三瘡愈止外以杏仁五合熬令黑研爛成膏敷之
