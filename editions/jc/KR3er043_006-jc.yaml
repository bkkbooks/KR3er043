body:
  text: 卷六痿痹門痹經云風寒濕三氣雜至合而為痹風氣勝者為行痹寒氣勝者為痛痹濕氣勝者為著痹以冬遇此者為骨痹以春遇此者為筋痹以夏遇此者為脈痹以至陰遇此者為肌痹以秋遇此者為皮痹行痹者病處行而不定走注歷節疼痛之類當散風為主禦寒利氣仍不可廢更須參以補血之劑蓋治風先治血血行風自滅也痛痹者寒氣凝結陽氣不行故痛有定處俗名痛風是也治當散寒為主疏風燥濕仍不可缺更須參以補火之劑非大辛大溫不能釋其凝寒之害也著痹者肢體重著不移疼痛麻木是也蓋氣虛則麻血虛則木治當利濕為主祛風解寒亦不可缺更須參以理脾補氣之劑蓋土強自能勝濕而氣旺自無頑麻也骨痹者即寒痹痛痹也其證痛苦攻心四肢攣急關節浮腫筋痹者即風痹行痹也其證遊行不定與血氣相搏聚於關節筋脈弛縱或赤或腫脈痹者即熱痹也臟腑移熱復遇外邪客搏經絡留而不行其證肌肉熱極皮膚如鼠走唇口反裂皮膚色變肌痹者即著痹濕痹也留而不移汗出四肢痿弱皮膚麻木不仁精神昏塞皮痹者即寒痹也邪在皮毛癮疹風瘡搔之不痛初起皮中如蟲行狀以上諸證又以所遇之時而命名非行痹痛痹著痹外又有皮脈筋肌骨之痹也故骨痹不已復感於邪內舍於腎筋痹不已復感於邪內舍於肝脈痹不已復感於邪內舍於心肌痹不已復感於邪內舍於脾皮痹不已復感於邪內舍於肺所謂痹者各以其時重感於風寒濕之氣也肺痹者煩滿喘而嘔心痹者脈不通煩則心下鼓暴上氣而喘嗌乾善噫厥氣上則恐肝痹者夜臥則驚多飲數小便上為引如懷腎痹者善脹尻以代踵脊以代頭脾痹者四肢懈惰發咳嘔汁上為大塞肺痹則肺氣不清胃熱上逆故煩喘而嘔心痹則脈道不通心火內衰濕氣凌心故恐肝痹則血液阻滯水飲客之故上為引急如有所懷也腎痹則胃之關門不利故善脹濁陰濕邪傷其陽氣所以腳攣不能伸身僂不能直也脾痹則陽氣不運故四肢懈惰上焦痞塞也腸痹者數飲而出不得中氣喘爭時發飧泄腸者兼大小腸而言腸間病痹則下焦之氣不化故雖數飲而小便不得出則本末受病故與中氣喘爭蓋其清濁不分故時發飧泄也胞痹者少腹膀胱按之內痛若沃以湯澀於小便上為清涕胞者膀胱之脬也膀胱氣閉則水道不行故按之內痛若以熱湯沃之小便得外熱之助方得稍通而猶滯澀不利則治宜溫助氣化可知膀胱之脈從巔入絡腦故上為清涕以太陽經氣不固而精氣上脫又須溫補無疑蓋緣精泄之後寒氣乘虛入於膀胱之內而致小便淋瀝不通莖中痛引穀道甚則臍腹脹痛此屬津液枯竭之故誤與利水藥必致喘逆脹急而死老人陰虛泉竭多有此證曾見膀胱脹破淋瀝無度時雖暫寬不久即斃諸痹不已亦益內也其風氣勝者其人易已也其入臟者死其留連筋骨間者疼久其留皮膚間者易已凡痹之類逢寒則蟲逢熱則縱寒從中生者是人多痹氣也陽氣少陰氣多故身寒如從水中出人有身寒湯火不能熱厚衣不能溫然不能凍慄是人素腎氣勝以水為事太陽氣衰腎脂枯不長一水不能勝兩火腎者水也而生於骨腎不生則髓不能滿故寒甚至骨也所以不能凍慄者肝一陽也心二陽也腎孤臟也一水不能勝二火故不能凍慄病名骨痹是人當攣節也素腎氣勝言稟氣本充也以水為事言嗜欲無節傷其真陽無陽則陰無以生故腎脂枯不長無陰則陽無以化故寒甚至骨也病在陽者命曰風病在陰者命曰痹陰陽俱病命曰風痹陽受風氣故在陽者命曰風陰受濕氣故入陰則命曰痹風痹淫濼病不可已者足如履冰時如入湯中股脛淫濼煩心頭痛時嘔時悗悶同眩已汗出久則目眩悲以喜恐短氣不樂不出三年死也寒痹之為病也留而不去時痛而皮膚不仁剌布衣者以火淬之刺大人者以藥熨之以醇灑二十斤蜀椒一升乾薑一斤桂心一斤凡四種皆㕮咀漬酒中用綿絮一斤細布四丈並納酒中置酒馬矢熅中蓋封塗勿使泄五日五夜出布綿絮曝乾之干復漬以盡其汁每漬必晬其日乃出干干並用滓與綿絮復布為復巾長六七尺為六七巾則用之生桑炭炙巾以熨寒痹所刺之處令熱入至於病所寒復炙巾以熨之三十遍而止汗出以巾拭身亦三十遍止起步內中無見風每刺必熨如此病已矣此所謂內熱也內納同謂溫其經使熱氣內入血脈流通也布衣血氣澀濁故當以火淬之即近世針挑艾熨之類周痹者在於血脈之中隨脈以上隨脈以下不能左右各當其所風寒濕氣客於分肉之間迫切而為沫沫得寒則聚聚則排分肉而分裂也分裂則痛痛則神歸之神歸之則熱熱則痛解痛解則厥厥則他痹發發則如是此內不在藏而外未發於皮獨居分肉之間真氣不能周故命曰周痹金匱云問曰血痹病從何得之師曰夫尊榮人骨弱肌膚盛重因疲勞汗出臥不時動搖加被微風遂得之但以脈自微澀在寸口關上小緊宜針引陽氣今脈和緊去則愈血痹陰陽俱微寸口關上微尺中小緊外證身體不仁如風痹狀黃耆桂枝五物湯主之血痹者寒濕之邪痹著於血分也辛苦勞勩之人皮腠緻密筋骨堅強雖有風寒濕邪莫之能客惟尊榮奉養之人肌肉豐滿筋骨柔脆素常不勝疲勞行臥動搖或遇微風則能痹著為患不必風寒濕之氣雜至而為病也上條言脈自微澀而關寸小緊為濕痹血分所以陽氣不能外行故宜針引陽氣以和陰血下條言陰陽俱微而尺中小緊為營衛俱虛所以身體不仁故宜藥通營衛行散其痹則緊去人安而愈矣夫血痹者即內經所謂在脈則血凝不流仲景直髮其所以不流之故言血既痹脈自微澀然或寸或關或尺其脈見小急之處即風入之處也故其針藥所施皆引風外出之法也腎著之病其人身體重腰中冷如坐水中形如水狀反不渴小便自利飲食如故病屬下焦身勞汗出衣里冷濕久久得之腰以下冷痛腹重如帶五千錢甘姜苓朮湯主之此證乃濕邪中腎之外廓與腎臟無預也雖腰中冷如坐水中實非腎臟之真氣冷也今邪著下焦飲食如故不渴小便自利且與腸胃之府無預況腎臟乎此不過身勞汗出衣里冷濕久久得之但用甘草乾薑茯苓白朮甘溫淡滲行濕足矣又何取暖腎壯陽哉諸肢節疼痛身體尫羸腳腫如脫頭眩短氣溫溫欲吐桂枝芍藥知母湯主之此即總治三焦痹之法頭眩短氣上焦痹也溫溫欲吐中焦痹也腳腫如脫下焦痹也肢節疼痛身體尫羸筋骨痹也由是觀之當是風寒濕痹其營衛筋骨三焦之病然濕多則腫寒多則痛風多則動用桂枝治風麻黃治寒白朮治濕防風佐桂枝附子佐麻黃白朮其芍藥生薑甘草亦如桂枝湯之和其營衛也知母治腳腫引諸藥下行附子以行藥勢開痹之大劑也戴人云痹病以濕熱為源風寒為兼三氣合而為痹其脈沉澀奈何治此者不問經絡不分臟腑不分表裡便作寒濕腳氣烏之附之乳之沒之種種燥熱攻之中脘灸之臍下燒之三里火之蒸之熨之湯之炕之以致便溺澀滯前後俱閉虛躁轉甚肌膚日削飲食不下雖遇扁華亦難措手若此者何哉胸膈間有寒痰故也痹病本不死死於醫之誤也景岳全書云觀痹論曰風寒濕三氣雜至合而為痹而壽夭剛柔論又曰在陽者命曰風在陰者命曰痹何也蓋三氣之合乃專言痹證之所因也曰在陽為風在陰為痹又分言表裡之有殊也如風之與痹本皆由感邪所致但外有表證之見而見發熱頭疼等證或得汗即解者是皆有形之謂此以陽邪在陽分是即傷寒中風之屬也故病在陽者命曰風若既受寒邪而初無發熱頭疼又無變證或有汗或無汗而筋骨之痛如故及延綿久不能愈而外無表證之見者是皆無形之謂此以陰邪直走陰分即諸痹之屬也故病在陰者命曰痹其或既有表證而疼痛又不能愈此即半表半裡陰陽俱病之證故陰陽俱病者命曰風痹此所以風病在陽而痹病在陰也然則諸痹者皆在陰分亦總由真陰衰弱精血虧損故三氣得以乘之而為此諸證經曰邪入於陰則痹正謂此也是以治痹之法最宜峻補真陰使血氣流行則寒邪隨去若過用風濕痰滯等藥而再傷陰氣必反增其病矣行痹者走注無定風之用也經言病在陽者命曰風在陰者命曰痹陰陽俱病命曰風痹越婢加朮附湯輕則羌防歸艽葛桂赤茯甘草威靈仙蒼朮黃柏若病久大虛非大補氣血不可如日從事乎散風清火則脾肺必敗終致不起痛痹者痛有定處乃濕氣傷腎腎不生肝肝風挾濕流走四肢肩髃疼痛拘急浮腫金匱烏頭湯加羌活官桂服後啜熱稀粥助其作汗乃解身體痛如欲折肉如錐刺刀割千金附子湯著痹者痹著不仁經曰營氣虛則不仁衛氣虛則不用營衛俱虛則不仁且不用靈樞云衛氣不行則為麻木東垣治麻痹必補衛氣而行之渾身麻木不仁或左或右半身麻木或面或頭或手臂或腳腿麻木不仁並宜神效黃耆湯皮膚間麻木此肺氣不行也本方去蔓荊倍黃耆加防風如肌肉麻營氣不行也去蔓荊加桂枝羌防手足麻痹臂痛不能舉多眠昏冒者支飲也氣口脈滑指迷茯苓丸脈浮者二陳湯加桂枝枳桔若手麻乃是氣虛十指麻乃是濕痰死血手指麻木是氣不行有頑痰死血也導痰湯加烏藥蒼朮風吹手足痠疼而腫是寒濕桂枝附子湯因於風者百節走痛烏藥順氣散加羌活南星蒼朮因於濕者天陰即發身體沉重痠疼除濕蠲痛湯在上痛者加桂枝桔梗在下痛者加防己木通多汗加黃耆防風自汗身重防己黃耆湯寒濕不可屈伸者烏頭湯活絡丹選用並外用摩風膏因火者五苓散加酒芩黃柏竹瀝薑汁因濕熱者肢節疼痛肩背沉重胸膈不利下注足脛痛腫當歸拈痛湯熱毒流入肢節疼痛患處必熱千金犀角散血瘀者芎歸桃仁紅花威靈仙煎成入麝少許血痹者邪入於陰也經云人臥則血歸於肝汗出而風吹之血凝於膚者為痹是也黃耆桂枝五物湯晝輕夜重加當歸痹而身寒如從水中出者屬寒濕附子丸血氣凝滯手足拘攣疼重風寒濕三氣雜至者改定三痹湯周痹者真氣不能周於身故周身痹痛用蠲痹湯行痹上半身甚用烏藥順氣散下半身甚用虎骨散痛痹用烏頭湯著痹用除濕蠲痛湯不應用補中益氣加熟附子羌活蒼朮黃柏有痹遍身走痛無定二陳湯加羌活風化硝薑汁糊丸服痹在骨安腎丸痹在筋羚羊角散痹在脈人參丸痹在肌肉神效黃耆湯痹在皮越婢湯加羌活細辛白蒺藜痹在腸吳茱萸散痹在胞腎瀝湯虛寒茯苓丸虛寒甚者巴戟丸熱痹千金犀角散冷痹巴戟天湯寒痹宜以蜀椒乾薑桂心各四兩醇酒五斤絮四兩布五尺馬矢火煨一伏時將絮布曝乾收盡炙熱熨之著痹不移䐃肉破身熱脈澀者不治凡治痹證不明其理以風門諸通套藥施之者醫之過也夫痹證非不有風然風入在陰分與寒濕互結擾亂其血脈致身中之陽不通於陰故致痹也古方多有用麻黃白芷者以麻黃能通陽氣白芷能行營衛然已入在四物四君子等藥之內非顓發表明矣至於攻裡之法則從無有用之者以攻裡之藥皆屬苦寒用之則陽愈不通其痹轉入諸府而成死證多矣可無明辨而深戒歟診脈大而澀為痹脈急亦為痹肺脈微為肺痹心脈微為心痹右寸沉而遲澀為皮痹左寸結而不流利為血痹右關脈舉按皆無力而澀為肉痹左關弦緊而浮沉有力為筋痹痛風歷節靈樞云賊風邪氣之傷人也令人病焉今有不離屏蔽不出室穴之中卒然病者不離賊風邪氣其故何也曰此皆嘗有所傷於濕氣藏於血脈之中分肉之間久留而不去若有所墮墜惡血在內而不去卒然喜怒不節飲食不適寒溫不時腠理閉而不通其開而遇風寒則血氣凝結與故邪相襲則為寒痹其有熱則汗出汗出則受風雖不遇賊風邪氣必有因加而發焉其毋所遇邪氣又毋怵惕之所志卒然而病者其故何也惟有因鬼神之事乎曰此亦有故邪留而未發因而志有所惡及有所慕血氣內亂兩氣相搏其所從來者微視之不見聽而不聞故似鬼神金匱云寸口脈沉而弱沉即主骨弱即主筋沉即為腎弱即為肝汗出入水中如水傷心歷節黃汗出故曰歷節盛人脈澀小短氣自汗出歷節疼不可屈伸此皆飲酒汗出當風所致病歷節不可屈伸疼痛烏頭湯主之並治腳氣疼痛不可屈伸烏頭湯治歷節不可屈伸疼痛復治腳氣疼痛不可屈伸二者之病皆是風寒傷於筋麻黃開汗孔通腠理散寒邪解風痹芍藥以理血痹甘草通經脈以和藥黃耆益衛氣氣壯則邪退烏頭善走入肝逐風寒故筋脈之急者必以烏頭治之然以蜜煎取緩其性使之留連筋骨以利其屈伸且蜜之潤又可益血養筋兼制烏頭燥熱之毒丹溪云痛風者大率因血受熱已自沸騰其後或涉冷水或立濕地或扇取涼或臥當風寒外搏熱血得風寒汗濁凝澀所以作痛夜則痛甚行於陰也治法以辛熱之劑疏散寒濕開發腠理其血得行與氣相和其病自安然有數種治法稍異痛風而痛有常處其痛上赤腫灼熱或渾身壯熱此欲成風毒宜敗毒散如肢節痛須用羌活去風濕亦宜用之肥人肢節痛多是風濕痰飲流注宜導痰湯瘦人股節痛是血枯宜四物加羌防老人性急作勞患兩腿痛動則痛甚或血痢用澀藥惡血流入經絡隧道而變痛風並宜四物加桃仁陳皮牛膝生甘草煎入生薑研潛行散有瘀積者加酒熱服並刺委中出血然非二三十帖不效壯年人性躁兼嗜厚味患痛風攣縮此挾痰與氣證導痰湯加牛膝枳殼通草桃仁煎入生薑研潛行散熱服亦須多服乃效按濕熱痰火死血鬱於經絡四肢麻痹或痛或癢輕而新者可以緩治久而重者必加烏附驅逐痰濕壯氣行經大便阻滯必用大黃昧者畏其峻攻多致狐疑不知邪毒流滿經絡非烏附豈能散結燥熱結滯腸胃非硝黃豈能潤燥要在合宜耳歷節景岳全書曰歷節風痛以其痛無定所即行痹之屬也病源云歷節風痛是氣血本虛或因飲酒腠理開汗出當風所致或因勞倦調護不謹以致三氣之邪遍歷關節與氣血相搏而疼痛非常或如虎之咬故又有白虎歷節之名中藏經曰歷節疼痛者因醉犯房而得之此其概也大都痛痹之證多有晝輕而夜重者正陰邪之在陰分也其有遇風雨陰晦而甚者此正陰邪侮陽之證也或得暖遇熱而甚者此濕熱傷陰之火證也有火者宜從清涼有寒者宜從溫熱若筋脈拘滯伸縮不利者此血虛血燥證也非養血養氣不可遍身骨節疼痛肢節如槌晝靜夜劇如虎齧之狀乃痛風之甚者也必飲酒當風汗出入水遂成斯疾寒則倉公當歸湯千金大棗湯防己湯選用熱則千金犀角湯當歸拈痛湯加薑汁炒黃柏掣者為寒腫者為濕汗者為風三氣雜至傷於血脈之中營衛澀滯不行故痛用虎骨犀角沉香青木香當歸羌活桂枝秦艽牛膝骨碎補桃仁甘草水煎入麝少許歷節風毒攻注骨節疼痛發作不定烏藥順氣散不應五積散四肢歷節疼其人短氣脈沉為留飲導痰湯加減身體腫痛一味木通用二兩煎服身必發出紅丹汗出至足頃時即愈外治之法以蘄艾斤許先以一半焙乾攤痛處外鋪燈心草一層以指甲在痛傍不時攢之冷則更遞焙用三次少歇又頃如前再用自四五度效不可撫摩撫摩則七竅閉郁也又法好陳醋五大碗煎沸入蔥白一斤將蔥裹痛處熨之著即麻木也石頑曰按痛風一證靈樞謂之賊風素問謂之痹金匱名曰歷節後世更名白虎歷節多由風寒濕氣乘虛襲於經絡氣血凝滯所致近世邪說盛行而名之曰箭風風毒腫潰乃謂之曰箭袋禁絕一切湯藥恣行艾熨針挑此雖靈樞刺布衣之法而藥熨之方世絕不聞使既病之肌肉復受無辜之痛楚奈何懵懂無知甘受其惑良可慨夫麻木與痹證參看營衛滯而不行則麻木如坐久倚著壓住一處麻不能舉理可見矣麻則屬痰屬虛木則全屬濕痰死血一塊不知痛癢若木然是也脈沉滑體厚人屬痰與濕二朮二陳先少佐羌獨桂枝等風藥一二味次兼參耆補氣脈微弱或弦大無力病久體羸者屬氣虛補中益氣加熟附子一片夏月對生脈散或清燥湯一塊不知痛癢陰寒益甚或日輕夜重脈澀而芤或弦屬痰挾死血宜活血行氣二陳加芎歸桃仁泥紅花牛膝韭汁之類大便見黑而不作瀉者小劑桃核承氣湯微利之十指麻木屬胃中濕痰死血二陳加二朮桃仁紅花少加附子行經濕熱下流兩腳麻木或如火燎者二妙加牛膝作丸不應少加肉桂東垣治閉眼則渾身麻木開眼則漸退久而方止晝減夜甚為陽氣衰而濕伏陰分也三痹湯去烏頭加蒼朮黃柏又閤眼則麻開眼即不麻近火則頭旋眩暈者風氣下陷於血分不得升越而作也三痹湯去烏頭加羌活麻黃凡婦人素有鬱悒者當舒郁逍遙散加補氣行濕藥薛立齋治劉孟春有痰兩臂作麻兩目流淚服祛風化痰藥痰愈甚臂反痛不能伸手指俱攣薛曰麻屬氣虛因前藥而復傷肝火盛而筋攣耳況風自火出當補脾肺滋水則風自退痰自清遂用六味丸補中益氣湯三月而愈石頑治洋客巴慈明婦產後眩暈心悸神魂離散若失臟腑之狀開眼則遍體麻木如在雲霧之中必緊閉其目似覺稍可晝日煩躁夜則安靜專事女科者用四物等血藥則嘔逆不食更一醫用薑附等熱藥則躁擾不寧其脈虛大而數按之則散舉之應指此心火浮散之象因艱產受驚痰飲乘虛襲入心包絡中留伏膈上有入無出所以綿延不已蓋目開則諸竅皆開痰火堵塞心竅所以神識無主目閉則諸竅俱閉痰火潛伏不行故得稍安與東垣所言閤眼則陽氣不行之麻木迥殊況晝甚夜輕明是上焦陽位之病與理痰清火之劑諸證漸寧然或因驚恚或因飲食不時舉發此伏匿膈上之痰無從搜滌也乘發時用獨參湯下紫雪開通膈膜仍與前藥調補半載而康痿痿厥素問云肺熱葉焦則皮毛虛弱急薄著則生痿躄也心氣熱則下脈厥而上上則下脈虛虛則生脈痿樞折挈脛縱而不任地也肝氣熱則膽泄口苦筋膜乾筋膜乾則筋急而攣發為筋痿脾氣熱則胃干而渴肌肉不仁發為肉痿腎氣熱則腰脊不舉骨枯而髓減發為骨痿戴人云痿之為狀兩足痿弱不能行皆由腎水不能勝心火心火上爍肺金肺受火制六葉皆焦皮毛虛弱急而薄者則生痿躄躄者足不能伸而行步尫然也腎乃肺金之子今腎水衰少隨火上炎腎水既衰則骨髓衰竭由使內太過所致直斷曰痿病無寒故痿之作也五六七月皆其時也故病痿之人其脈浮軟今之行藥者凡見腳膝痿弱難於行步或一足不伸便作寒濕腳氣治之驟用烏附乳沒威靈仙之類燔針艾火湯蒸袋蒸痿弱轉加如此而死豈非夭乎夫治痿與治痹頗異風寒濕痹猶可蒸湯灸燔時或一效惟痿用之轉甚者何也蓋痿以肺熱葉焦而成以此傳於五臟豈有寒者歟若痿作寒治是殺之也夫痿病不死死者皆藥之誤也石頑曰痿證臟腑病因雖曰不一大都起於陽明濕熱內蘊不清則肺受熱乘而日槁脾受濕淫而日溢遂成上枯下濕之候舉世靡不以腎虛為事陽明濕熱從無齒及之者或云痿病既屬濕熱何古方多用附子辛熱而愈者殊不知濕熱沉滯既久非借辛熱之力不能開通經隧原非為腎臟虛寒而設若真陽未衰概行溫補而不知清熱滲濕寧無反助濕熱之患耶凡人自覺兩足熱如火炙自足踝下上衝膝腿且痿弱軟痛能行而不能久立脈濡而數乃陰虛而挾濕熱也虎潛丸不應少加附子骨痿不能起於床者金剛丸經言骨痿者生於大熱也有所遠行勞倦逢大熱而渴渴則陽氣內伐內伐則熱舍於腎腎者水臟也今水不勝火則骨枯而水虛足不任身發為骨痿此濕熱成痿多發於夏令人骨乏無力故治痿獨取陽明東垣獨得其秘而用清燥之劑主以清暑益氣湯屬濕痰者手足軟弱脈沉滑兼腰膝麻木或腫二陳湯加二朮羌活黃柏竹瀝薑汁黑瘦人脈澀弱或左脈大而無力行步艱難或兼盜汗陰虛等證者是血虛有火四物加牛膝肉桂黃柏蒼朮陰血衰弱不能養筋筋緩不能自收持故痿弱無力補血榮筋丸氣虛痿弱無力四君子加蒼朮黃柏肉桂黃耆肥白人脈沉緩或滑噁心胸膈不利屬氣虛有痰六君子加蒼朮黃柏竹瀝薑汁兼食積即氣口弦滑腹脹惡食是食積妨礙脾氣不得運於四肢導痰湯加楂曲木瓜防己挾死血者脈沉澀或弦而按之則芤為惡血流於腰膝或因產後或跌撲傷損而得者不可作虛治痿厥足痿弱不收為痿厥有二一屬腎與膀胱經云恐懼不解則傷精精傷則骨酸痿厥精時自下是腎傷精脫也都氣丸審系陽虛用八味丸又云三陽為病發寒熱下為癰腫及為痿厥腨㾓是膀胱在下發病也五苓散一屬脾濕傷腎經云凡治痿厥發逆肥貴人膏粱之疾也腎著湯加萆薢又云秋傷於濕上逆而咳發為痿厥小青龍湯去麻黃加羌浩腎虛之人六七月之間濕令大行濕熱相合痿厥之病大作脈沉濡而數小水赤澀或作腫痛腰以下痿軟不能動行走不正兩足欹側清燥湯伸不能屈屈不能伸腰膝腿腳腫痛行步艱難安腎丸目中流火視物昏花耳鳴耳聾困倦乏力寢汗憎風行步不正兩腳欹側臥而多驚腰膝無力腰以下消瘦加味虎潛丸凡老人痿厥累用虎潛丸不愈即於本方加附子立愈蓋附子有反佐之力也又有腳膝痿弱下尻臀皆冷陰汗臊臭精滑不固脈沉數有力此為膏粱厚味所致火鬱於內逼陽向外即陽盛拒陰滋腎丸苦寒下之肥盛蒼黑人足膝痿耎皆屬濕熱潛行散二妙散誤用溫補必殆子和云風痹痿厥四證本自不同而近世不能為辨一概作風冷治之下虛補之此所以曠日彌年而不愈者也夫四末之疾動而或勁者為風不仁或痛者為痹弱而不用者為痿逆而寒熱者為厥其狀未嘗同也故其本源又復大異風者必風熱相兼痹者必風寒濕相合痿者必火乘金厥者或寒或熱皆從下起今治之者不察其源見於手足嚲曳便謂之風左傳雖謂風淫末疾不知風暑燥濕火寒六氣皆能為四末之疾也祝仲寧治一人病腰膝痹痛皆以為寒率用烏附蛇酒藥盛暑猶著綿如是者三載祝診之曰此濕熱相搏而成經所謂諸痿生於肺熱也即令褫其綿與清燥湯飲之曰疾已深又為熱藥所誤非百帖不效服三月餘而痊李士材治兵尊高玄圃患兩足痠軟神氣不足向服安神壯骨之藥不效改服滋腎牛膝薏苡二妙散之屬又不效純用血藥脾胃不實診之脈皆沖和按之亦不甚虛惟脾部重取之澀而無力此土虛下陷不能制水則濕氣墜於下焦故膝脛為患耳進補中益氣倍用升柴數日即愈夫脾虛下陷之證若誤用牛膝等下行之劑則愈陷此前藥之所以無功也百合金匱云論曰百合病者百脈一宗悉致其病也意欲食復不能食常默默欲臥不能臥欲行不能行飲食或有美時或有不欲聞食臭時如寒無寒如熱無熱口苦小便赤諸藥不能治得藥則劇吐利如有神靈者身形如和其脈微數每溺時頭痛者六十日乃愈若溺時頭不痛淅淅然者四十日愈若溺時快然但頭眩者二十日愈其證或未病而預見或病四五日而出或病二十日或一月微見者各隨證治之百合病發汗後者百合知母湯主之百合病下之後者滑石代赭湯主之百合病吐之後者百合雞子湯主之百合病不經吐下發汗病形如初者百合地黃湯主之百合病一月不解變成渴者百合洗方主之百合病渴不瘥者栝蔞牡蠣散主之百合病變發熱者百合滑石散主之百合病見於陰者以陽法救之見於陽者以陰法救之見陽攻陰復發其汗此為逆見陰攻陽乃復下之此亦為逆所謂百脈一宗言周身之血盡歸於心主也心主血脈又主火若火淫則熱蓄不散流於血脈故百脈一宗悉致其病也人身氣陽而血陰若氣盛則熱氣衰則寒今病在血不幹於氣所以如寒無寒如熱無熱欲食不食欲臥不臥欲行不行皆陽火爍陰無可奈何之狀也又上熱則為口苦下熱則為便赤亦陽火爍陰之患也藥雖治病然必藉胃氣以行之若毒血在脾胃經脈閉塞藥雖入而胃弱不能行故得藥轉劇而吐利也病不在皮肉筋骨則身形如和惟熱在血故脈微數也脈數血熱則心火上炎不下交於腎而膀胱之經亦不得引精於上上虛則溺時淅然頭眩甚則為頭痛以此微甚可卜其愈日之遠近也其治法咸用百合為君以安心補神能去血中之熱利大小便導滌瘀積然必鮮者始克有濟若汗之而失者佐知母以調其上焦之津液下之而失者佐滑石代赭以理其下焦之痹結吐之而失者佐雞子黃以補其中焦之榮血若不經吐下發汗但佐生地黃汁以涼血血涼則熱毒解而蘊積自行故大便出如黑漆矣其一月不解百脈壅塞津液不化而成渴者故用百合洗之則一身之脈皆得通暢而津液行渴自止勿食鹽豉者以味鹹而凝血也若洗後渴不瘥是中無津液則以栝蔞牡蠣主之若變發熱乃脈鬱而成熱佐滑石以通利之百合病皆持兩端不表不里為其熱行血脈之中非如傷寒可行汗下等法所以每多誤治之失往往有綿延經歲不已者愈期不復可拘也至於誤行汗下變證救治大略不逾上法但當隨所稟虛實偏勝而調之切勿誤認下元虛弱而用溫補之法也按百合病即痿證之暴者傷寒後得此為百合肺病日久而得者為痿石頑治內翰孟端士尊堂太夫人因端士職任蘭臺久疏定省兼聞稍有違和虛火不時上升自汗不止心神恍惚飲食不能食欲臥不能臥口苦小便難溺則灑淅頭暈自去歲迄今歷更諸醫每用一藥輒增一病用白朮則窒塞脹滿用橘皮則喘息怔忡用遠志則煩擾哄熱用木香則腹熱咽乾用黃耆則迷悶不食用枳殼則喘咳氣乏用門冬則小便不禁用肉桂則顱脹咳逆用補骨脂則後重燥結用知柏則小腹枯癟用芩梔則臍下引急用香薷則耳鳴目眩時時欲人扶掖而走用大黃則臍下築築少腹愈覺收引遂致畏藥如蠍惟日用人參錢許入粥飲和服聊藉支撐交春虛火倍劇火氣一升則周身大汗神氣駸駸欲脫惟倦極少寐則汗不出而神思稍寧覺後少頃火氣復升汗亦隨至較之盜汗迥殊直至仲春中浣邀石頑診之其脈微數而左尺與左寸倍於他部氣口按之似有似無診後款述從前所患並用藥轉劇之由曾遍詢吳下諸名醫無一能識其為何病者石頑曰此本平時思慮傷脾脾陰受困而厥陽之火盡歸於心擾其百脈致病病名百合此證惟仲景金匱要略言之甚詳本文原云諸藥不能治所以每服一藥輒增一病惟百合地黃湯為之專藥奈病久中氣虧乏殆盡復經藥誤而成壞病姑先用生脈散加百合茯神龍齒以安其神稍兼萸連以折其勢數劑稍安即令勿藥以養胃氣但令日用鮮百合煮湯服之交秋天氣下降火氣漸伏可保無虞迨後仲秋端士請假歸省欣然勿藥而康後因勞心思慮其火復有升動之意或令服佐金丸而安嗣後稍覺火炎即服前丸第苦燥之性苦先入心兼之辛臊入肝久服不無反從火化之虞平治權衡之要可不預為顧慮乎腳氣千金論云何以得之於腳問曰風毒中人隨處皆得作病何偏著於腳也答曰夫人有五臟心肺二臟經絡所起在手十指肝腎與脾三臟經絡所起在足十趾夫風毒之氣皆起於地地之寒暑風濕皆作蒸氣足常履之所以風毒之中人也必先中腳久而不瘥遍及四肢腹背頭項也微時不覺痼滯乃知經云次傳間傳是也論得已便令人覺否凡腳氣病皆由感風毒所致得此病多不令人即覺會因他病一度乃始發動或奄然大悶經三兩日不起方乃覺之諸小庸醫皆不識此疾漫作余病治之莫不盡斃故此病多不令人識也始起甚微食飲嬉戲氣力如故惟卒起腳屈弱不能動有此為異耳黃帝云緩風濕痹是也論風毒相貌夫有腳未覺異而頭項臂膊已有所苦有諸處皆悉未知而心腹五內已有所困又風毒之中人也或見食嘔吐憎聞食臭或腹痛下痢或大小便秘澀不通或胸中衝悸不欲見光明或精神昏憒或喜迷妄語言錯亂或壯熱頭痛或身體酷冷疼煩或覺轉筋或腫不腫或䏶腿頑痹或時緩縱不隨或復百節攣急或小腹不仁此皆腳氣狀貌也亦云風毒腳氣之候也其候難知當須細意察之不爾必失其機要一朝病成難可以理婦人亦爾又有婦人產後春夏取涼多中此毒深宜慎之其熱悶掣瘲驚悸心煩嘔吐氣上皆其候也又但覺臍下冷痞愊愊然不快兼小便淋瀝不同生平即是腳氣之候頑弱名緩風疼痛為濕痹論得之所由凡四時之中皆不得久立久坐濕冷之地亦不得因酒醉汗出脫衣靴襪當風取涼皆令腳氣若暑月久坐久立濕地者則熱濕之氣蒸入經絡病發必熱四肢痠疼煩悶若寒月久坐久立濕冷地者即冷濕之氣上入經絡病發則四體酷冷轉筋若當風取涼得之者病發則皮肉頑痹諸處瞤動漸漸向頭凡常之日忽然暴熱人皆不能忍得者當於此時必得頓取於寒以快意也卒有暴寒復不得受之皆生病也世有勤功力學之士一心注意於事久坐行立於濕地不時動轉冷風來擊入於經絡不覺成病故風毒中人或先中手足十指因汗毛孔開腠理疏通風如急箭或先中足心或先中足趺或先中膝以下腨脛表裡者若人初覺即灸所患處二三十壯即愈不復發也黃帝云當風取涼醉已入房能成此疾論冷熱不同問曰何故得者有冷有熱答曰足有三陰三陽寒中三陽所患必冷暑中三陰所患必熱故有表裡冷熱不同熱者治以冷藥冷者療以熱藥以意消息之脾受陽毒即熱頑腎受陰濕即寒痹論須療緩急凡小覺病候有異即須大怖畏決意急治之勿緩氣上入腹或腫或不腫胸脅逆滿氣上肩息急者死不旋踵寬者數日必死不可不急療也但看心下急氣喘不停或自汗數出或乍寒乍熱其脈促短而數嘔吐不止者皆死論虛實可服藥不可服藥凡腳氣之疾皆由氣實而死終無一人以服藥致虛而殂故腳氣之人皆不得大補亦不可大瀉終不得畏虛故預止湯不服也如此者皆死不治論脈候法凡腳氣雖殊診候不異而三部之脈要須不違四時者為吉其逆四時者勿治余如脈經所說此中不復具載其人本黑瘦者易治肥大肉厚赤白者難愈黑人耐風濕赤白不耐風冷瘦人肉硬肥人肉軟肉軟則受疾至深難愈也論腫不腫凡人久患腳氣不自知別於後因有他疾發動治之得瘥後直患嘔吐而復腳弱余為診之乃告為腳氣病者曰某平生不患腳腫何因名為腳氣不肯服湯余醫以為石發孤疑之間不過一旬而死故腳氣不得一向以腫為候亦有腫者有不腫者其以小腹頑痹不仁者腳多不腫小腹頑後不過三五日即令人嘔吐者名腳氣入心如此者死在旦夕凡患腳氣到心難治以其腎水克心火故也論須慎不慎凡腳氣之病極須慎房室羊肉牛肉魚蒜蕺菜菘菜蔓青瓠子酒面酥油乳麋豬雞鵝鴨有方用鯉魚頭此等並切禁不得犯之並忌大怒惟得食粳粱粟米醬豉蔥韭薤椒姜橘皮又不得食諸生果子酸酢之食犯者皆不可瘥又大宜生牛乳生栗子論灸法凡腳氣初得腳弱便速灸之並服竹瀝湯灸訖可服八風散無不瘥者惟急速治之若人但灸而不能服散服散而不灸如此者半瘥半死雖得瘥者或至一二年復更發動覺得便依此須速灸之及服散者治十十愈此病輕者雖不即死治之不當根源不除久久期於殺人不可不精以為意初風市穴灸百壯重者五六百壯勿令頓灸三報之次伏兔穴灸百壯亦可五十壯次犢鼻穴灸五十壯至百壯次膝眼穴灸百壯次三里穴灸百壯次上廉穴灸百壯次下廉穴灸百壯次絕骨穴灸百壯凡此諸穴灸不必一頓灸盡壯數可日日報灸之三日之中灸令盡壯數為佳凡病一腳則灸一腳病兩腳則灸兩腳凡腳弱病皆多兩腳又一方云如覺腳惡便灸三里及絕骨各一處兩腳惡者合四處灸之多少隨病輕重大要雖輕不可減百壯不瘥速以次灸之論服湯藥色目風毒之氣入人體中脈有三品內外證候相似但脈有異耳若脈浮大而緩宜服續命湯兩劑應瘥若風盛宜作越婢湯加白朮四兩胡洽云若惡風者更加附子一枚若脈浮大緊轉快宜作竹瀝湯若病人脈微而弱宜服風引湯此脈多是因虛而得之若大虛短氣力乏其間可作補湯隨病冷熱而用之若未愈更服竹瀝湯若病人脈浮大而緊快此是三品之中最惡脈也或沉細而快者此脈正與浮大而緊者同是惡脈浮大者病在外沉細者病在內治當消息以意逆之雖其形尚可而手腳未至弱極數日之中氣上即便命終如此之脈往往有人得之無一存者急服竹瀝湯日服一劑切要湯勢常令相及勿令半日之中空無湯也此湯竹汁多服之若不極熱輒停在胸心更為人患每服當使極熱若服竹瀝湯得下者必佳也續命湯治風毒病初得似時行毒病而脈浮緩終不變快此不治或數日而死或十日而死或得便不識人或發黃或發斑或目赤或下部穿爛者此最急得之即先服續命湯一劑須服葛根麻黃湯下之若此不折更與續命湯兩三劑必瘥夫腳氣之病先起嶺南稍來江東得之無漸或微覺疼痹或兩脛腫滿或行起澀弱或上入腹不仁或時冷熱小便秘澀喘息氣衝喉氣急欲死食嘔不下氣上逆者皆其候也若覺此證先與犀角旋覆花湯宜久服之以氣下小便利為度按東垣云腳氣實由水濕然有二焉南方卑濕清濕襲虛則病起於下此是外感北方常食膻乳又飲酒太過脾胃有傷不能運化水濕下流此因內而至外者也腳氣兩脛腫是為壅疾皆當疏下然太過則損脾不及則病不去南方多見兩足粗大與疾偕老者初起治宜檳榔湯或四七湯香蘇散並加檳榔橘皮以宣通其氣不使其壅壅既成者砭去惡血然後服藥經云蓄則腫熱砭石之也腳氣之病初起甚微飲食如故人多不覺惟卒然腳膝屈弱或腫或不腫或頑痹或緩縱或攣急皆是濕邪為患其腫者為濕腳氣不腫者為乾腳氣腳氣之發必身痛發熱大類傷寒不可妄用傷寒等藥若卒起腳弱或少腹不仁或轉筋嘔逆或腹痛下利或二便秘澀或驚悸妄錯但兩脛腫赤便作腳氣治風勝者自汗走注脈浮弦越婢加朮湯寒勝者無汗攣急掣痛脈遲澀酒浸牛膝丸濕勝者腫痛重著脈遲細除濕湯冷痹惡風者非朮附麻黃並用必不能開越婢加朮附湯汗之或麻黃附子細辛湯加桂枝白朮亦妙腳痹冷痛或時哄熱不可屈伸者千金獨活湯風冷腳痹疼痛攣弱不可屈伸千金烏頭湯暑勝者煩渴身熱或成水泡瘡脈洪清燥湯腳氣頭疼身熱肢節疼痛或一腳偏患軟弱嚲曳狀如偏風者小續命加木瓜三陽經受熱毒氣流腳踝上焮赤腫痛寒熱如瘧自汗惡風或無汗惡寒敗毒散加蒼朮三陰受寒濕著於腳膝上枯瘦色淡少腹不仁腹急疼痛上氣喘急八味丸加沉香腳氣上入腹腹急上衝胸氣欲絕千金半夏湯腳氣衝心疼痛腫滿大小便秘沉香導氣湯腳氣遍身腫痛喘促煩悶者木通散因腳氣而服補劑太過小便不通者薑汁炒黑山梔木通赤芍赤茯苓當歸生甘草梢不時煎服腳氣初發一身盡疼或肢節腫便溺阻隔此屬濕熱先以羌活導滯湯導之後以當歸拈痛湯除之腳氣上入少腹不仁崔氏八味丸腳氣入腹喘急腹脹蘇子降氣湯佐以養正丹下氣甚捷腳氣迫肺令人喘嗽小青龍湯加檳榔腳氣嘔逆噁心畏食生料平胃散加木香大便秘加煨大黃腳氣風毒生瘡腫痛心神煩熱犀角散腳氣衝心火氣逆上也金鈴子散加茴香酒黃柏另以附子末津調敷湧泉穴腳氣初發從足起至膝脛骨腫疼者千金蓖麻葉裹法腳氣注踝成孔至下半日疼甚者此腳氣流成漏也以人中白火炙敷瘡口良腳氣衝心礬石一兩酸漿水一斗五升煎三五沸浸腳良活人書云凡腳氣服補藥及用湯藥渫洗逼邪入於經絡皆醫之大禁也大抵腳氣腫痛並屬濕熱或兼風兼暑當詳春夏病因六淫治之至於枯瘦而熱者屬陰虛瘦弱而寒者屬陽虛當作本證治之診脈浮弦起於風濡弱起於濕洪數起於熱遲澀起於寒沉而伏毒在筋骨也指下澀澀不調毒在血分也夏暑腳膝冷痛其脈陽濡陰弱濕溫也腳氣多從暑濕得之石頑治文學褚廷嘉精脫氣傷喘汗蒸熱如淋六脈浮芤按之乏力勢不得不從事溫補遂猛進黃耆建中易桂心加人參數帖而安因有腳氣痼疾恆服腎氣丸不徹六七年來宿患未除堅懇石頑鏟絕病根乃匯取朮附桂附耆附參附等法兼採八風散中菊花鱉甲湯中鱉甲貝齒羚羊犀角風引湯中獨活防己竹瀝湯中薑汁竹瀝為丸共襄祛風逐濕之功服後必蒸蒸汗出不終劑而數年之疾頓愈非深達法存千金妙義烏能及此鶴膝風鶴膝風者脛細而膝腫是也經云膝者筋之府屈伸不能行則僂俯筋將憊矣治宜祛風順氣活血壯筋十全大補加杜仲牛膝羌活或五積散加松節血少虛寒而痛者四物加荊芥牛膝送活絡丹氣血流動更服八味丸加鹿茸牛膝調理正氣旺而患自除矣兼風濕者換骨丹下利後膝腫痛風邪乘虛入三陰經也大防風湯服藥不能應手者外用雷火針法每日淬之不必著傷肌肉也方用蘄艾五錢丁香五分麝香三分合研勻入紙筒中痛處襯粗紙三五層點火淬之以筋脈活動為度數日自效又鶴膝風初起漫腫不紅屈伸不便者乘未潰時用陳年芥菜子研細以薑汁蔥涕和白蜜調塗一伏時患處起疱疱干脫皮自愈上二法若膿成者不可用也婦人鶴膝風證因胎產經行失調或鬱怒虧損肝脾而為外感所傷或先肢體筋攣繼而膝漸大腿漸細如鶴膝之狀若腫高赤痛者易治漫腫不赤痛者難治二三月潰而膿稠者易治半載後潰而膿清者難治誤用攻伐復傷元氣尤為難治也大要當固元氣為主若食少體倦者六君子湯晡熱內熱寒熱往來者逍遙散發熱惡寒者十全大補湯少寐驚悸者歸脾湯月經過期者補中益氣湯月經先期者加味逍遙散腎水虛弱者六味地黃丸腎虛風襲者安腎丸腎氣丸參用凡潰後當大補脾胃若膿出反痛或寒熱煩渴等證皆屬氣血虧損一於培補庶保終吉喻嘉言曰鶴膝風者即風寒濕之痹於膝者也如膝骨日大上下肌肉日枯且未可治其膝先養血氣使肌肉漸榮後治其膝可也此與治偏枯之證大同小異急溉其未枯者使氣血流行而復榮倘不知此但用麻黃防風等散風之藥鮮有不全枯者故治鶴膝風而急攻其痹必並其足痿而不用矣古方治小兒鶴膝風用六味地黃丸加鹿茸牛膝不治其風其義是善蓋小兒非必為風寒濕所痹多因先天所稟腎氣衰薄陰寒凝聚於腰膝故以六味丸補腎中之水以鹿茸補腎中之火以牛膝引至骨節而壯其裹擷之筋此治本不治標之良法也諸風門癘風經云癘者營氣熱胕其氣不清故使鼻柱壞而色敗皮膚瘍潰風寒客於脈而不去名曰癘風風氣與太陽俱入行諸脈俞散於分肉之間與衛相干其道不利故使肌肉膹䐜而有瘍衛氣有所礙而不行故其肉有不仁也病骨節重鬚眉落名曰大風脈風成為癘癘風者數刺其腫上已刺以銳針針其處按出其惡氣腫盡乃止常食方食毋食他食觀內經之論當分營衛為治古方雖多但混瀉其風熱於營衛又無先後之分至東垣丹溪始分之活法機要云先樺皮散從少至多服五七日灸承漿穴七壯灸瘡愈再灸三灸之後服再造散祛血分之風熱戒房室三年病愈此先治其衛後治其營也丹溪云癘風須分在上在下看其疙瘩先見在上體多者氣受之也以醉仙散取臭毒惡血於齒縫中也先見在下體多者血受之也以再造散取惡物蟲積於穀道中出所以雖有上下道路之異然皆不外於陽明一經而已若上下同得者氣血俱受也用必勝散上下兼取陽明主胃與大腸無物不受故也夫氣為陽為衛血為陰為營身半以上陽先受之身半以下陰先受之故再造散治其病在陰者用皂角刺出風毒於營血中肝主血惡血留止其屬肝也蟲亦生於厥陰風木所化必用是法治其臟氣殺蟲為主以赤檳榔出營分毒邪白牽牛出衛分毒邪大黃引入腸胃利出瘀血惡物醉仙散治病在陽者用鼠黏子出風毒遍身惡瘡亞麻逐風滋肺潤皮膚蒺藜主惡血身體風癢通鼻氣防風為諸風之引導栝蔞根治瘀血消熱胕腫枸杞和血消風熱散瘡毒蔓荊子主賊風苦參治熱毒風皮膚肌肉煩躁生瘡赤癩眉脫八味藥治功固至然必銀粉為使銀粉乃下膈通大腸之要劑用以驅諸藥入陽明經開其風熱怫鬱逐出惡風臭穢之毒殺所生之蟲循經上行至牙齒軟薄之分而出其臭毒之涎水服此藥若有傷於齒則以黃連末揩之丹溪取二方為破敵之先鋒必勝散則兼二方之妙用但須慎口味戒房室服之必效治癘風五法一出汗用麻黃荊防羌獨皂角苦參全蠍之類熱服覆汗二熏浴先用黃柏黃連薄荷為末水調塗眼四圍次用荊芥苦參風藤枳殼蒼耳羌活桑槐桃柳枝連根蔥煎湯熏浴浴起用木通石菖蒲大黃為末加麝少許擦患上三敷擦用白礬川槿皮五倍子全蠍為末加斑螫少許香油調敷狼油尤妙燥癢用大楓肉番木鱉烏柏仁黑芝麻黑豆杏仁木棉子共搗一處入煬成罐內以鐵盞蓋上鐵線扎定鐵釘旋緊糠火中煨一夜取其藥油調後藥預用胡椒川椒各二兩枯礬輕粉各六錢為細末入前藥油調勻擦患處數日如蛇蛻脫下再擦二次效肥人用川烏草烏細辛杏仁白附子雄黃白芥子為末加麝少許生薑蘸擦頑厚者加斑螫白砒不時擦之擦時須覓空房用紙糊好勿見風七日後又換別靜房居之以前房便溺臭穢不堪也七日後日擦一次至病痊為度如有一處不知痛癢即是病根如前但擦其處日三五次四湯液用涼膈雙解消風散之類五丸散用九龍丸漆黃丸豨薟丸白花蛇丸鵝翎散蜈蚣散選用癘風諸藥不效千金耆婆萬病丸極有神驗癘風面目蠕動升麻胃風湯並用桃柳槐桑枝煎湯熏洗面腫服消風涼膈之類外用硫黃雄黃乳香沒藥血竭輕粉枯礬麝香烏賊骨為散香油調敷腫處七日不得洗面效癘風腳底穿用番木鱉酥炙三錢苧麻一斤燒灰存性為散空心酒下一錢重者不過一月效如過服惡寒作嘔者胡椒湯服之即止癘風眉毛脫落用鹿角銼炒存性六錢皂角煅灰存性一兩姜蘸擦眉上日三五次又方用骨碎補去毛炙乾生半夏為末等分生薑蘸擦日五七次內服一味皂角刺炒脆為末食後白酒釀或茶清服二錢白瘢風者血虛不能濡潤經絡毒邪傷犯肺經氣分也聖惠方用桑枝十斤茺蔚草穗三斤煎膏溫酒調服外用雄黃硫黃黃丹南星枯礬密陀僧等分姜蘸擦之擦後漸黑再擦則愈一方無黃丹南星用白茄子切去一頭蘸擦紫雲風氣滯不能統運血脈毒邪蘊結肝經血分也服用豨薟葉一斤漆葉半斤俱蜜潤九制丸如彈子大白湯調服又方用苦參何首烏大胡麻白蒺藜菖蒲赤莖豨薟薄荷漆葉煎服外用硫黃官粉雞子清調搽鵝掌風用核桃殼鴿糞煎湯頻洗效又方用生桐油塗指上以蘄艾燒煙燻之七日不可下水效癘瘍砭刺一法子和謂一汗抵千針蓋以砭血不如發汗之周遍也然奪汗者無血奪血者無汗二者一律若惡血凝滯肌表經絡者宜刺宜汗汗用一味浮萍曝乾為末每服三錢以黑豆淋酒食遠臨臥調服溫覆取汗禁食動風發毒之物強者連日服之元氣稍弱者須服一日間二三日與地黃丸間服以病退七八為度癘風初起麻木不仁用萬靈丹汗之以散凝滯風毒此與豆淋酒下浮萍之意不殊也惡血蘊結於臟非盪滌其內則不能瘥若毒在外者非砭刺遍身患處及兩臂腰尻兩手足指縫及委中各出血其毒必不能散若表裡俱受毒者非外砭內泄其毒決不能退如有寒熱頭疼等證當須大補氣血服輕粉之劑若腹痛去後兼有膿穢之物不可用藥止之若口舌腫痛穢水時流作渴發熱喜冷此為上焦熱毒瀉黃散若寒熱往來小柴胡加知母若口縫出血發熱而大便秘結此為熱毒內淫黃連解毒湯加犀角連翹若大便調和犀角地黃湯若癘風氣下焦腳弱或腠理開汗大泄者越婢加朮湯若穢水雖盡口舌不愈或發熱大渴而不能飲冷此為虛熱也七味白朮散丹方治癘風赤腫屬血病者以鯪鯉甲隨患先起處取甲塗生漆於裡面砂內炙脆為末清晨陳酒調服七八分三服效七日愈隨處取甲治之薛立齋曰癘風多由勞傷氣血腠理不密或醉後房勞沐浴或登山涉水外邪所乘衛氣相搏濕熱相併血隨火化而致眉毛先落者毒在肺面發紫泡者毒在肝腳底先痛或穿者毒在腎遍身如癬者毒在脾目先損者毒在心此五臟受病之重者也一曰皮死麻木不仁二曰肉死針刺不痛三曰血死爛潰四曰筋死指脫五曰骨死鼻柱壞此五臟受傷不可治也大抵風自頭面起者為順自足心起者為逆若聲啞目盲尤為難治治當辨本證兼證變證類證陰陽虛實而斟酌焉若妄投燥熱之劑膿水淋漓而肝血愈燥風熱愈熾腎水愈枯相火愈旺反為壞證矣口喎目斜若手足牽搐或眉稜癢動或面發紫泡或成塊屬肝經血虛風熱用加味逍遙散六味地黃丸以生肝血滋腎水若寒熱往來或耳聾脅痛屬肝木熾盛用柴胡四物湯以清肝火生肝血若筋攣骨痛不能動履用六味丸補中益氣以滋化源身上虛癢此血不營於腠理所以癢也四物加酒芩煎服調紫背浮萍末癢甚加荊芥蟬蛻夏秋濕熱行令若飲食不甘頭目眩暈遍體痠軟而兩腿麻木口乾自汗氣促身熱小便黃數大便稀溏濕熱傷元氣也清燥湯身起疙瘩搔破膿水淋漓若寒熱往來者肝經氣血虛而有火也加味逍遙散若肌腠搔如帛隔者氣血不能外營也人參養胃湯若面部搔之麻癢者氣血不能上營也補中益氣湯口舌生瘡或咽喉作痛或飲食喜冷大便秘結者實熱也四順清涼飲肌熱惡熱煩渴引飲者血虛也當歸補血湯牙齒作痛或牙齦潰爛若喜寒惡熱屬胃火清胃散為主舌赤裂作渴引飲或小便頻數不時發熱或熱無定處或足心熱起者乃腎水乾枯心火亢盛用加減八味丸若誤用寒涼必變虛寒而死診脈兩寸浮而緊浮而洪陽脈浮弦陰脈實大浮緩者易治洪大而數或沉實者難愈脈沉而病在上脈浮而病在下及無汗者皆為不治之證也胃風經云胃風之狀頸多汗惡風食飲不下鬲塞不通腹善滿失衣則䐜脹食寒則泄診形瘦而腹大胃風者頭面腫起右關脈弦緩帶浮多因飲食後乘涼所致喻嘉言曰胃風變證有五一曰風成為寒熱以風入於胃必左投肝木而從其類風氣通於肝也肝木盛則侮脾土故生寒熱庸醫認為外感者此也宜小柴胡湯一曰癉成為消中癉者熱也熱積胃中善食而易飢火之害也宜白虎加人參一曰厥成為巔疾厥者逆也謂胃氣逆而上行成巔頂之疾如眩暈之類是也宜芎辛湯一曰久風為飧泄言胃中風熾飧已即泄不留停也若風氣入血分則下鮮血挾濕熱則下如豆汁人參胃風湯有血加防風一曰脈風成為癘言胃中之風醞釀既久則營氣熱胕其氣不清故使其鼻柱壞而色敗肌肉之間漸至潰爛輕則肌體麻木目蠕動牙關緊面腫能食升麻胃風湯此五者總為胃風之病也破傷風破傷風證因擊破皮肉風邪襲入而發熱腫脹治法與感冒不異又諸瘡潰後風邪乘虛內襲其候最急往往視為尋常致變種種多有不可救療者亦有瘡熱鬱結多著白痂瘡口閉塞氣難宣通而熱甚生風者或有用湯淋洗濕氣從瘡口中入其人昏迷沉重者或有用艾灸火烘火氣逼入而煩躁發熱者但須辨瘡口平無汁者破傷風也瘡口邊出黃水者破傷濕也瘡口焮腫赤色破傷火也其湯火之毒亦與破傷風無異其為證也皆能傳播經絡燔爍真氣是以寒熱間作甚則口噤目斜身體強直如角弓反張之狀死在旦夕當同傷寒處治有在表在裡半表半裡之不同河間曰太陽在表者汗之陽明在裡者下之少陽在表裡之半者和解之但患處復加腫赤神昏少食不分經絡者穿山甲一錢匙蜈蚣末半錢匙麝香一字濃煎蔥白香豉湯服之患上用蔥涕調炒飛面塗之其但言三陽而不及三陰者意謂風邪在三陽之經便宜按法早治而愈若待傳入三陰其證已危惟天靈蓋煅一錢匙穿山甲半錢匙麝香一字為散濃煎蔥白香豉湯服之或腹滿自利或口燥咽乾舌卷囊縮額上汗珠不流身上汗出如油眼小目瞪肢體痛劇而不在傷處者皆死證也破傷風邪在表者九味羌活湯半表半裡者小柴胡湯大汗不止筋攣搐搦升麻湯加黃耆若服蜈蚣等風藥過多有自汗者白朮黃耆防風生甘草作湯溫服大便秘結小便赤澀或用熱藥自汗不休宜速下之先用芎黃湯二三服後以大芎黃湯下之若不愈反作痙狀用羌獨活防風杏仁地榆水煎頻服名蠲痙湯大便閉者用膽導蜜導法病久衰弱當養血以四物加藁本防風細辛白芷瘡瘍破傷風邪身體疼痛風邪攻注攣急皮膚搔癢麻木不仁頭昏牙緊以防風藁本羌活地骨皮荊芥穗為末酒調服瘡痂壅塞內熱生風者九味羌活湯傷濕而瘡口常有稀膿者先服除濕湯二三劑後用一味白朮膏或浸酒亦可傷火焮腫赤色時頭病發熱甚則煩躁者芎黃湯加薄荷荊防不應加酒黃連四五分黑山梔二錢兼小便不利合導赤散牙關緊急不開用蜈蚣一條焙乾研細末擦牙吐涎立蘇或服左龍丸亦得破傷焮腫不能透膿用硃砂南星獨活穿山甲人指甲炒研為末酒調服二三次外用南星防風為末薑汁調敷患處石頑曰破傷一證金瘡跌撲與潰瘍迥殊金瘡跌撲受傷則寒熱頭痛面目浮腫胸膈痞悶六脈浮弦或模糊不清其傳經與傷寒不異其勢較傷寒更劇故可用疏表之法然亦不可峻用風藥以其經中之血先以受傷所謂奪血者無汗是也若潰瘍破傷則患處忽復腫脹按之不知疼痛周身肌肉不仁緩急引痛胸膈痞滿神思不清六脈弦細或虛大模糊雖風引毒氣攻注周身切不可用攻表藥汗之必肉瞤筋惕甚則發痙所謂瘡家不可發汗發汗必致痙也輕者蔥白香豉湯加鯪鯉甲白芷蜈蚣之屬重則蔥白香豉湯加黃耆肉桂遠志防風鯪鯉甲犀角之類甚則萬靈丹蔥豉煎湯調服嘔逆不食者此風引邪毒攻心也急與護心散外用蔥熨法分解其邪如大便不通者切不可用芎黃湯惟宜蜜煎導之其勢稍退便當用保元仍加遠志肉桂犀角鯪鯉甲等解散餘毒兼使參耆無壅滯之患其間瀉補各隨其人所稟之偏以為權衡貴在臨證之活法耳診脈浮而無力太陽也脈長有力陽明也浮而弦者少陽也洪數者傷火也沉細者傷濕也虛細脈澀皆不治虞恆德治一人因勸鬥毆眉稜骨被打破得破傷風頭面大腫發熱以九味羌活湯取汗外用杏仁研爛入白麵少許新汲水調敷瘡上腫消熱退而愈後屢試屢驗跌撲經云人有墮墜惡血留內腹中脹滿不得前後先飲利藥金匱治馬墜及一切筋骨損方大黃一兩另用酒一大盞浸及桃仁蒲黃甘草發灰以童子小便煎成納大黃去滓分溫三服先以敗蒲席煎湯浴之浴後服藥以衣被蓋覆斯須通利數行痛楚立瘥傷損氣血凝滯則腫或紫或青痛不可忍宜活血行氣最忌惡血攻心與破傷二證凡血上逆者即以逐瘀為急口噤牙關緊即是胃風依破傷治之傷損著寒痛不可忍用蔥杵爛炒熱罨上其痛立止冷則溫之惡血上攻韭汁和童便飲半杯即下從高墮下腹中瘀血滿痛不得出短氣二便不通千金桃仁湯挫閃氣血不順腰脅疼痛或發寒熱香殼散加桃仁蘇木脅痛加柴胡川芎跌撲閃挫瘀結腹脅大便不通調營活絡飲跌撲損傷瘀蓄大便不通紅腫青紫疼痛昏悶內壅欲死者當歸導氣散跌撲閃挫腰脅氣滯牽引掣痛復元通氣散從高墜下惡血流於脅中痛不可忍復元活血湯被打傷破內有瘀血腹脹蒲黃生者篩取一升當歸肉桂各二兩酒服方寸匙日三服丹方治折臂斷筋損骨生地大黃搗汁和酒服一月即接連仍以滓炒熱貼之䗪蟲擂酒服亦可焙乾為末每服一錢入麝少許溫酒調服接骨神效跌折或金刃傷骨用老鴉眼睛藤和根葉細搗封貼傷處令患者痛飲至醉此續骨法也若筋斷取筋相對用旋花根即纏枝牡丹杵汁滴傷處將渣封瘡上半月筋自續此續筋法也又方治筋絕取生蟹肉及黃搗塗傷處筋即續亦治骨斷以蟹生搗和酒痛飲並以滓罯干即再塗骨連筋續乃止諸傷損瘀血凝聚痛不可忍以大黃一兩切杏仁三十粒研細酒煎服瘀血即下若恐氣絕取藥不及先以熱小便灌之外用大黃末薑汁調塗一夜青紫即變瘀積日久青黑痛極以附子一枚㕮咀豬脂煎數沸去滓取脂和醋塗之墮墜重傷危在旦夕用烏雞連毛搗爛和醋烘熱隔布熨之甚則破牛馬腹納入浸熱血中救之金傷腸出以豬脂抹手推入急用桑皮線縫合即以熱雞血塗之次入燒人屎拌塗尤妙從高墜下或行車走馬跌折筋骨骨傷自然銅散筋傷乳香定痛散金刃出血不止者紫金丹敷之跌撲致衄或吐血不止濃煎蘇木湯去滓煎小烏神湯下黑神散促筋脫骱用槿樹皮搗爛拌臘糟焙熱塗扎損傷一證專從血論但須分有瘀血停積與亡血過多之證蓋打撲墮墜皮不破而內損者必有瘀血若金刃傷皮出血或致亡血過多二者不可同法而治有瘀血者宜攻利之若亡血者兼補調之須察其所傷上下輕重淺深之異經絡氣血多少之殊惟宜先逐瘀血通經絡和血止痛然後調氣養血補益胃氣無不效也診金瘡出血太多其脈虛細小者生數實而浮大者死砍瘡血不止脈來或大或止者死細滑者生從高顛仆內有血腹脹滿脈堅強者生小弱者死痙與纘結二論痙例參看經云諸痙項強皆屬於濕肺移熱於腎傳為柔痙金匱云太陽之病發熱無汗反惡寒者名曰剛痙太陽病發熱汗出而不惡寒者名曰柔痙太陽病發熱脈沉而細者名曰痙為難治太陽病發汗太多因致痙風病下之則痙復發汗必拘急瘡家雖身疼痛不可發汗汗出則痙病者身熱足寒頸項強急惡寒時頭熱面赤目赤獨頭動搖卒口噤背反張者痙病也若發其汗者寒濕相搏其表益虛即惡寒甚發其汗已其脈如蛇暴腹脹大者為欲解脈如故反復弦者痙夫痙脈按之緊如弦直上下行脈經云痙家脈伏直上下行痙家有灸瘡者難治太陽病其證備身體強𠘧𠘧音殊然脈反沉遲此為痙栝蔞桂枝湯主之太陽病無汗而小便反少氣上衝胸口噤不得語欲作剛痙葛根湯主之痙為病胸滿口噤臥不著席腳攣急必齘齒可與大承氣湯合上十一條推之則痙病之屬表者宜用桂枝葛根屬裡者可用承氣是為邪實者設也若首二條之葛根桂枝所不待言第三條無汗麻黃附子細辛湯有汗桂枝附子湯四條真武湯五條附子湯六條芍藥甘草附子湯七條未發汗前桂枝加附子湯發其汗已其脈如蛇甘草附子湯八條乾薑附子湯九條是統言痙病之脈無證可驗不得擬方第十條言痙病之不宜用灸灸則艾火助虐一切辛烈概不可施所以難治惟腹脹便秘者庶可行下奪一法虛者可用炙甘草湯其脈經云一條與第九條不異演文無疑按痙病與金匱開卷第一證治論證最詳而方治最略以其證最危逆難於造次也觀其論中惟出太陽陽明邪實三方不及三陰虛證之治者以痙病之脈皆弦勁伏匿證多反張厥逆是難議攻發易於溫散也若不通篇體會烏知先聖立言之旨陳無擇曰夫人之筋各隨經絡結束於身血氣內虛外為風寒濕熱之所中則痙蓋風散氣故有汗而不惡寒曰柔痙寒泣血故無汗而惡寒曰剛痙原其所因多由亡血筋無所營故邪得以襲之所以傷寒汗下過多與夫病瘡人及產後致斯疾者概可見矣診其脈皆沉伏弦緊但陽緩陰急則久久拘攣陰緩陽急則反張強直二證各異不可不別張景岳曰痙之為病強直反張病也其病在筋脈筋脈拘急所以反張其病在血液血液枯燥所以筋攣觀仲景曰太陽病發汗太多因致痙風病下之則成痙瘡家不可發汗汗之亦成痙只此數言可見病痙者多由誤治之壞證其虛其實可瞭然矣自仲景之後惟陳無擇能知所因曰多由亡血筋無所營因而成痙則盡之矣但惜其言之既善而復未有善者曰氣血內虛外為風寒濕熱所中則痙斯言不無有誤若其所云則仍是風濕為邪而虛反次之不知風隨汗散而既汗之後何復言風濕隨下行而既下之後何反致濕蓋誤汗者必傷血液誤下者必傷真陰陰血受傷則血燥血燥則筋失所滋筋失所滋則為拘為攣而反張強直之病勢所必至又何待風寒濕熱之相襲而後為痙耶且仲景所言言不當汗而汗也不當下而下也汗下既誤即因誤治而成痙矣豈誤治之外必再受邪而後成痙無邪則無痙哉此陳氏之言不惟失仲景之意而反致後人疑惑用持兩端故凡今人之治此者未有不以散風去濕為事亦焉知血燥陰虛之證尚能堪此散削否此千古不明之疑竇不可不為辨察故列陳子之論於前以資後學之印證痙證甚多而人多不識者在不明其故而鮮有察之者耳蓋凡以暴病而見反張戴眼口噤拘急之類皆痙病也觀仲景以汗下為言謂其誤治亡陰所以然也予因類推則常見有不因誤治而凡屬陰虛血少之輩不能營養筋脈以致搐攣僵仆者皆是此證如中風之有此者必以年力衰殘陰之敗也產婦之有此者必以去血過多衝任竭也瘡家之有此者必以血隨膿出營氣涸也小兒之有此者或以風熱傷陰遂為急驚或以汗瀉亡陰遂為慢驚凡此之類總屬陰虛之證蓋精血不虧則雖有邪干亦斷無筋脈拘急之病而病至堅強其枯可知故治此者必當先以氣血為主而邪甚者或兼治邪若邪微者通不必治邪蓋此證之所急者在元氣無氣復而血脈行則微邪自不能留何足慮哉奈何今人但見此證必各分門類而悉從風治不知外感之風客邪證也治宜解散內生之風血燥證也止宜滋補矧此數者總由內證本無外邪既以傷精敗血枯燥而成而再治風痰難乎免矣故予詳筆於此以明痙證之要仲景云痙止屬太陽而不及他經者何也蓋痙必反張其病在背背之經絡惟太陽督脈耳言太陽則督在其中矣此其義也然仲景止言其表而未詳其里考內經之經脈篇曰足少陰之脈貫脊屬腎其直者從腎上貫肝膈經筋篇曰足少陰之筋從脊內挾膂上至項結於枕骨與足太陽之筋合又曰足太陽之筋病脊反折項筋急足少陰之筋病主癇瘛及痙陽病者腰反折不能俯陰病者不能仰由此觀之則痙之為病乃太陽少陰之病也蓋腎與膀胱為表裡膀胱為津液之腑而腎為藏精之臟病在二經水虧可知故治此者最常以真陰為主薛立齋曰痙以有汗無汗辨剛柔又以厥逆不厥逆辨陰陽仲景雖曰痙皆身熱足寒然陽證不厥逆其厥逆者皆陰也剛痙無汗惡寒項背強腳攣急手足搐搦口噤咬牙仰面開眼甚則角弓反張臥不著席脈來弦長勁急葛根湯柔痙自汗惡風四肢不收閉眼合面或時搐搦脈來遲濡弦細桂枝湯加栝蔞血虛之人發痙或反張或隻手足搐搦或但左手足動搖十全大補湯加鉤藤蠍尾風熱痰壅發痙不省或隻手足搐搦或只右手足動搖宜祛風導痰湯痙病胸滿口噤咬牙腳攣急臥不著席大便硬者可與大承氣湯若一邊牽搐一眼喎斜者屬少陽及汗後不解乍靜乍亂直視口噤往來寒熱小柴胡加桂枝白芍足三陰痙俱手足厥冷筋脈拘急汗出不止項強脈沉厥陰則頭搖口噤耆附湯加當歸肉桂太陰則四肢不收朮附湯加甘草生薑少陰則閉目合面參附湯加甘草乾薑古法用附子散通治三陰諸痙多汗去川芎獨活加黃耆當歸賊風口噤角弓反張成痙倉公當歸湯產後發痙詳婦人本門診太陽病發熱脈沉而細者名曰痙為難治痙脈伏按之緊如弦直上下行痙病發其汗已其脈如蛇暴腹脹大者為欲解脈如故反伏弦者痙瘛瘲瘛者筋脈拘急也瘲者筋脈弛縱也俗謂之搐小兒吐瀉之後脾胃虧損津液耗散故筋急而搐為慢驚也俗不知風乃虛象因名誤實反投牛黃抱龍等祛風藥致夭枉者不知其幾大抵發汗後失血後產後癰疽潰後氣血津液過傷不能養筋而然與筋惕肉瞤顫振相類分氣血緩急兼補養為治庶有生理若妄加灼艾或飲以發表之劑死不旋踵矣瘛瘲之證多屬心脾肝三經若自汗少氣脈急按之則減小者此心氣之虛也辰砂妙香散若氣盛神昏筋攣脈滿大此心火之旺也導赤散加芩連山梔茯神犀角若體倦神昏不語脈遲緩四肢欠溫者脾虛生風也歸脾湯加鉤藤羌活若寒熱往來目上視搖頭脈弦急者肝熱生風也加味逍遙散加桂枝熱傷元氣四肢困倦手指麻木時時瘛瘲補中益氣湯去白朮加白芍五味暑風搐搦如小兒驚風狀緣先傷於暑毛孔開而風乘之局方香薷飲加羌防耆芍風虛昏憒不自知覓手足瘛瘲口眼瞤動或渴或自汗續命煮散癰疽膿水過多金瘡出血過多及嘔血衄血下血後或虛弱人誤汗誤下氣血津液受虧而致此者大劑保元湯加芎歸鉤藤兼生陰血則陽火自退不應六君子加芎歸鉤藤以補脾土故小兒吐瀉之後脾胃虧損亦多患之乃虛象也無風可逐無痰可消當大補脾土為急若陽氣脫陷者補中益氣加薑桂陽氣虛敗者十全大補湯加薑附亦有得生者然筋搐顫掉肢體惡寒脈微細人皆知為虛也是為真象至於脈大無力發熱煩渴是為假象惟當固本為善若無力抽搐戴眼反折汗出如珠俱不治產後陰血去多多有瘛瘲詳婦人本門診瘛瘲之脈虛微緩弱者可治弦緊急疾者難愈在暴病得之為風痰及肝火襲於經脈之象即久病見之亦屬痰火乘虛肆虐之兆凡新病得之脈滿大數實者搜滌風痰最為要著久病得之補中寓搜在所必需設久病而脈實滿暴病而脈虛微法無可療之機也顫振經云寒氣客於皮膚陰氣盛陽氣虛故為振寒寒慄深師曰振乃陰氣爭勝故為戰慄則陽氣不復故為顫骨者髓之府不能久立行則振掉骨將憊矣顫振與瘛瘲相類瘛瘲則手足牽引而或伸或屈顫振則但振動而不屈也亦有頭動而手不動者蓋木盛則生風生火上衝於頭故頭為顫振若散於四末則手足動而頭不動也經曰諸風掉眩皆屬於肝若肝木實熱瀉青丸肝木虛熱六味丸肝木虛弱逍遙散加參朮鉤藤挾痰導痰湯加竹瀝脾胃虛弱六君子湯加芎歸鉤藤衛虛多汗惡寒加黃耆二錢附子五分脾虛補中益氣加鉤藤心血虛少而振平補正心丹心氣虛熱而振本方去肉桂山藥麥冬五味加琥珀牛黃黃連名琥珀養心丹心虛挾痰而振本方去龍齒肉桂山藥麥冬五味加琥珀川芎膽星麝香甘草為秘方補心丹心虛挾血而振龍齒清魂散腎虛而行步振掉者八味丸十補丸選用實熱積滯可用汗吐下法戴人治馬叟手足振掉若線提傀儡用湧法出痰數升而愈此必痰證痰脈而壯盛氣實者不可不知診顫振之脈小弱緩滑者可治虛大急疾者不治間有沉伏澀難者必痰濕結滯於中之象凡久病脈虛宜於溫補暴病脈實宜於峻攻若久病而脈反實大暴病而脈反虛弱決無收功之理也攣內經言攣皆屬肝肝主筋故也有熱有寒有虛有實熱攣者經所謂肝氣熱則筋膜乾筋膜乾則筋急而攣六味丸加牛膝當歸之類因於濕首如裹濕熱不攘大筋緛短小筋弛長緛短為拘弛長為痿先搐瓜蒂散次與羌活勝濕湯虛邪搏筋則筋急五積散血虛則筋急增損四物湯劇勞筋脈拘急疼痛少眠者黃耆丸更於暖室中近火按摩為佳虛風襲於經脈手足拘攣屈伸短縮腹痛爪甲唇俱青轉筋不思飲食甚則舌卷囊縮木瓜散拘攣癱瘓口目喎斜骨節疼酸行步不正者舒筋三聖散痹濕筋攣骨痛者續斷丸誤汗漏風筋攣縮急或方士用木鱉發汗見風筋脈拘攣者並宜桂枝湯倍桂加歸附病初起者分表裡治如戴人用甘遂末三錢獖豬腎一枚細批破少用鹽椒淹透摻藥末在內荷葉包裹煨熟溫酒細嚼則上吐下瀉而愈石頑曰攣證人悉知為寒不知亦有屬血枯而熱者蓋寒則脛逆而痛熱則脛熱而枯至於濕熱下流又為實證則疼腫便秘以此辨之虛實寒熱可判然胸臆矣診攣者拘攣浮緩屬風沉細為濕洪緩濕熱澀細寒濕虛大氣衰小弱血虛尺中弦弱腎虛精竭若久病而脈反實強乍病而見虛澀雖有合劑難於圖治也石頑治包山勞俊卿年高攣廢山中諸醫用木瓜獨活防己豨薟威靈仙之類將半年餘乃致跬步不能動移或令服八味丸亦不應診其脈尺中微浮而細時當九夏自膝至足皆寒冷如從水中出知為腎虛風雨所犯而成是疾遂授安腎丸方終劑而能步履連服二料終無痿弱之狀矣眩暈經曰因於風欲如運樞起居如驚神氣乃浮內經論眩皆屬於木屬上虛仲景論眩以痰飲為先丹溪論眩兼於補虛治痰降火戴復庵云有頭風證耳內常鳴頭上如有鳥雀啾啾之聲切不可全謂耳鳴為虛此頭腦挾風所致有眩暈之甚抬頭則屋轉眼常黑花觀見常如有物飛動或見物為兩宜三五七散或秘旨正元散加鹿茸兼進養正丹不效一味鹿茸每服半兩酒煎去滓入麝少許緣鹿茸生於頭頭暈而主以鹿茸蓋以類相從也曾有服頭痛藥不愈服茸朱丹而效此為虛寒也若實者用之殆矣故丹溪曰眩暈不可當者大黃三次酒炒乾為末茶調下每服一錢至二錢劉宗厚曰眩暈乃上實下虛所致所謂虛者血與氣也所謂實者痰涎風火也經云上虛則眩又云徇蒙招尤目瞑耳聾下實上虛則與劉氏所稱無乃冰炭乎蓋邪之所湊其氣必虛留而不去其病為實亦何冰炭之有然當以脈法辨之寸口大而按之即散者為上虛以鹿茸法治之寸口滑而按之益堅者為上實以酒大黃法治之外感六淫內傷七情皆能眩暈然無不因痰火而作諺云無火不動痰無痰不作暈須以清火豁痰為主而兼治六淫之邪無不愈者風寒在腦或感邪濕頭眩重痛欲倒嘔逆不定三因芎辛湯冒雨或中濕眩暈嘔逆頭重不食本方去細辛芽茶加半夏茯苓惡風眩暈頭旋眼黑噁心見風即復作者半夏蒼朮湯風虛眩暈多痰導痰湯加天麻腎氣素虛而逆者沉香降氣下養正丹不應八味丸風熱眩暈眼掉川芎茶調散痰厥眩暈半夏白朮天麻湯痰火眩暈者二陳湯加白朮川芎天麻有熱更加山梔黃芩七情鬱而生痰亦令頭眩但見於鬱悒之人及婦女輩二陳加木香丁香白朮砂仁早起眩暈須臾自定乃胃中老痰使然古方用黑錫丹劫之不若青礞石丸鎮墜後用理中丸調理痰結胸中眩暈噁心牙皂末和鹽湯探吐吐定服導痰湯勞役過度眩暈發熱者補中益氣湯加天麻兼嘔逆六君子湯氣虛而喘加黃耆陰虛火炎痰盛少加熟附子煎成加薑汁竹瀝因虛致眩雖定後而常欲向火欲得暖手按者陽氣不足故也附子理中湯淫欲過度腎與督脈皆虛不能納氣歸源使諸逆奔上而眩暈六味丸加沉香鹿茸名香茸八味丸肥白人眩暈清火降痰為先而兼補氣藥黑瘦人眩暈滋陰降火為要而帶抑肝之劑胸中有死血作痛而眩飲韭汁酒良產後血暈見婦人本門診左手脈數熱多脈澀有死血浮弦為肝風右手滑實痰積脈大是久病虛大是氣虛石預治司業董方南夫人體雖不盛而恆有眩暈之疾診其六脈皆帶微弦而氣口尤甚蓋緣性多鬱怒怒則飲食不思恆服消導之味則中土愈困飲食皆化為痰痰從火化而為眩暈矣豈平常肥盛多濕之痰可比例乎為疏六君子方水泛為丸服之以培中土中土健運當無數化不及留結為痰而成眩暈之慮所謂治病必求其本也朔客梁姓者初至吳會相邀石頑往診時當夏月裸坐盤餐倍於常人而形偉氣壯熱汗淋漓於頭項間診時不言所以切其六脈沉實不似有病之脈惟兩寸略顯微數之象但切其左則以右掌抵額切其右則易左掌抵額知其肥盛多濕而夏暑久在舟中時火鼓激其痰而為眩暈也詢之果然因與導痰湯加黃柏澤瀉茅朮厚朴二服而安又治松陵貢士吳友良年逾古稀頭目眩暈乃弟周維素擅岐黃與補中益氣數服始用人參一錢加至三錢遂痞滿不食坐不得臥三晝夜喃喃不休仲君孝廉謙六相延石頑往候見其面赤進退不常左頰聶聶瞤動診其六脈皆促或七八至一歇或三四至一歇詢其平昔起居云是知命之年便絕欲自保飲啖自強此壯火爍陰而兼肝風上擾之兆與生料六味除去茱萸易入鉤藤大劑煎服是夜即得酣寢其後或加鱉甲或加龍齒或加棗仁有時妄動怒火達旦不寧連宵不已則以秋石湯送靈砂丹應如桴鼓盛夏酷暑則以小劑生脈散代茶後與六味全料調理至秋而安神志門癲經曰人生而病癲疾者名為胎病此得之在母腹中時其母有所驚氣上而不下精氣並居故令子發為癲疾也病初發歲一發不治月一發不治月四五發名曰癲癲疾脈搏大滑久自已脈小堅急死不治癲疾之脈虛則可治實則死搏陰則為癲疾癲雖為陰若得搏大滑脈故自已若得小堅急為陰脈之極也故不治虛則邪氣未盛故可治實則純乎邪矣故死難經曰重陰者癲癲病始發意不樂直視僵仆其脈三部陰陽俱盛是也脈經曰陰附陽則狂陽附陰則癲陽附陰者腰以下至足熱腰上寒也陰附陽者腰以上至頭熱腰下寒也癲之為證多因鬱抑不遂侘傺無聊所致精神恍惚語言錯亂或歌或笑或悲或泣如醉如狂言語有頭無尾穢潔不知經年不愈皆由郁痰鼓塞心包神不守舍俗名痰迷心竅安神豁痰為主先以控涎丹湧出痰涎後用安神之劑怒動肝火風痰上盛而發癲狂導痰湯加芩連菖遠煎成入硃砂沉香磨汁調服言語失倫常常戲笑不發狂者心虛也定志湯加薑汁竹瀝膈間微痛者兼有瘀血加琥珀鬱金如無鬱金蓬朮代之因思慮而得者先與稀涎散後用歸脾湯加辰砂末調補之心經蓄熱或時發躁眼鼻覺熱者定志丸加芩連麥冬牛黃實者涼膈散加川連麥冬菖蒲癲病語言錯亂神氣昏惑者千金防己地黃湯因思慮妄想不遂致神不守舍而妄言妄見若神祟所憑初起用半夏茯神散數服自愈若日久為湯藥所汨神出舍空非大劑獨參加薑汁竹瀝填補其神不能克應有病癲人專服四七湯而愈蓋氣結為痰痰飲鬱閉其神識也癲疾既久動轍生疑面色痿黃或時吐沫默默欲眠此蟲積為患妙功丸若癲哭呻吟為邪所憑非狂也燒蠶紙酒水下方寸匙李士材治張少椿女以喪子悲傷忽當雷雨交作大恐苦無所避旦日或泣或笑或自語或罵詈如中鬼祟診其心脈浮滑余皆沉細此氣血兩虧憂恐傷心心傷則熱熱積生風也以滾痰丸用桔梗延胡索陳皮杏仁煎湯送下出痰積甚多而愈狂經云狂始生先自悲也喜忘苦怒善恐者得之憂飢狂始發少臥不飢自高賢也自辯智也自尊貴也善罵詈日夜不休狂言驚善笑好歌樂妄行不休者得之大恐狂目妄見耳妄聞善呼者少氣之所生也狂者多食善見鬼神善笑而不發於外者得之有所大喜足陽明之脈病惡人與火聞木音則惕然而驚病甚則棄衣而走登高而歌甚至不食數日逾垣上屋四肢者諸陽之本也陽盛則四肢實實則能登高也熱盛於身故棄衣欲走也陽盛則妄言罵詈不避親疏而不欲食不欲食故妄走也有怒狂者生於陽也陽者因暴折而難決故善怒也病名陽厥陽明者常動巨陽少陽不動不動而動大疾此其候也奪其食則已夫食入於陰長氣於陽故奪其食則已使之服以生鐵洛為飲夫生鐵洛者下氣疾也此陽氣怫鬱不得疏越少陽膽木挾三焦相火太陽陰火上逆故使人易怒如狂奪其食者不使火助邪也飲以生鐵洛者金以制木木平則火降故曰下氣疾也狂之為病皆由阻物過極故猖狂剛暴若有邪附妄為不避水火罵詈不避親疏或言未嘗見之事非力所能病反能也上焦實者從高抑之生鐵洛飲陽明實則脈伏大承氣湯去厚朴加當歸鐵洛飲以大利為度在上者因而越之來蘇膏或戴人三聖散湧吐其病立安後用洗心散涼膈散調之形證脈氣俱實當湧吐兼利勝金丹一服神效雖數年狂癡無不克應但不可誤施於癲癇之證經云悲哀動中則傷魂魂傷則狂妄不精不精則不正當以喜勝之以溫藥補魂之陽龍齒清魂散經云喜樂無極則傷魄魄傷則狂狂者意不存當以恐勝之以涼藥補魄之陰清神湯肺虛喘乏加沙參胃虛少食加人參肝虛驚恐加羚羊角熱入血室發狂不識人小柴胡加犀角生地黃挾血如見祟狀當歸活血湯加酒大黃微下之肝盛多怒狂妄者針大敦在足大指上屢驗一婦人狂言叫罵歌笑非常似祟憑依一邊眼與口角吊起或作癇治或作心風治皆不效乃是舊有頭風之疾風痰作之使然用芎辛湯加防風數服頓愈婦科鄭青山因治病不順沉思輒夜兼受他醫諷言心甚懷憤天明病者霍然憤喜交集病家設酌酬之而諷者已遁憤無從泄忽然大叫發狂同道諸名家治之罔效一日目科王道來往候索已服未服等方視之一併譭棄曰此神不守舍之虛證豈豁痰理氣清火藥所能克效哉遂令覓上好人參二兩一味煎湯服之頓安三啜而病如失更與歸脾湯調理而康癇脈經云前部左右彈者陽蹺也動則苦腰痛癲癇惡風偏枯僵仆羊鳴身強皮痹從少陽斜至太陽者陽維也動則苦癲癇僵仆羊鳴手足相引甚者失音不能言從少陰斜至厥陰者陰維也動則苦癲癇尺寸俱浮直上直下此為督脈腰背強痛不得俯仰大人癲病小兒風癇脈來中央浮直上直下者督脈也動則苦腰背膝寒夫癲小兒癇也巢氏妄立五癇之說曰陽癇曰陰癇曰風癇曰濕癇曰馬癇證治雜出殊不知癲癇之發皆由肝腎龍雷上衝所致也癇病與卒中痙病相似但癇病發時昏不知人卒然眩仆倒地甚則瘛瘲抽搐目上視或口眼喎斜或口作六畜聲將醒時吐涎沫醒後又復發有連日發者有一日三五次發者若中風中寒中暑中熱則僕時無聲醒時無涎沫醒後不復發也剛痙柔痙亦屢發然身體強直角弓反張不似癇之身軟或為六畜聲也癇證之發由腎中龍火上升而肝家雷火相從挾助也惟有肝風故作搐搦搐搦則通身之脂液逼迫而上隨逆氣而吐出於口也陰氣虛不能寧謐於內則附陽而上升故上熱而下寒陽氣虛不能周衛於身則隨陰而下陷故下熱而上寒丹溪主痰與熱以星半芩連為主熱多者涼膈散加川連麥冬以泄之痰多者戴人三聖散以吐之如驚者東垣安神丸以平之可下以承氣湯下之然後用安神平肝之劑歸地牛黃硃砂青黛柴胡川芎之類心熱痰迷心竅者清神湯病久而成窠囊窠囊日久必至生蟲妙功丸神效既與行痰滌熱癇證已愈然須防其再發宜十全大補加棗仁遠志麥冬稟氣素虛者鹿角膠經年常服六味丸加遠志沉香亦不可缺風癇驟發項強直視不省人事此肝經有熱也或有咬牙者瀉青丸合導赤散治之如病發者可用輕粉白礬代赭石發過米飲調下重劑以鎮之也若起於郁者四七湯加木香南星發時用前藥下靈砂丹不得臥用養正丹多嘔下黑錫丹痰多者導痰湯加木香竹瀝癇病晝發灸陽蹺宜補中益氣加益智夜發灸陰蹺宜六味丸加鹿角膠丹礬丸治五癇諸證方用黃丹一兩白礬二兩銀罐中煅通紅為末入臘茶一兩不落水豬心血為丸綠豆大硃砂為衣每服三十丸茶清送下久服其涎自便出服一月後更以安神藥調之久患氣虛痰氣壅塞須防卒變不可妄許以治也凡見目瞪如愚者不治治之亦必無功石頑曰癇證往往生於鬱悶之人多緣病後本虛或復感六淫氣虛痰積之故蓋以腎水本虛不能制火火氣上乘痰壅臟腑經脈閉遏故卒然倒僕手足搐捻口目牽掣乃是熱盛生風之候斯時陰陽相薄氣不得越故迸作諸聲證狀非一古人雖分五癇治法要以補腎為本豁痰為標隨經見證用藥但其脈急實及虛散者不治細緩者雖久劇可治診脈浮滑洪數為風癇細弦微緩為虛癇浮為陽癇沉為陰癇虛弦為驚沉數為實熱沉實弦急者不治煩躁與緒論參看經云氣亂於心則煩蓋熱客於肺則煩入於腎則躁大抵心火旺則水虧金爍惟火獨熾故肺腎合而為煩躁也煩躁俱作有屬熱者有屬寒者先哲治獨煩不躁者多屬熱惟悸而煩者為虛寒治獨躁不煩者多屬寒惟火旺脈實者為熱蓋煩者胸中煩為內熱也躁者身體手足躁擾或裸體不欲近衣或欲投井中為無根之外熱急以附子理中四逆姜附輩熱藥治之若誤認為熱投以涼藥則周身之火得水則升走頃刻喘汗外脫而死也凡表證不得汗內外皆熱而躁亂不寧取汗則定裡實熱鬱大便不通無論傷寒雜證心神不安脈數實有力者下之則定火客心包或酒客膏粱上焦不清令人煩躁宜芩連山梔等涼藥為君稍用炮姜為使甚則涼膈散下之汗下後熱不止而發狂煩躁面赤咽痛者此熱乘少陰之經也葶藶苦酒湯探吐之虛煩與緒論參看經云夏脈者心也其不及者令人煩心肝虛腎虛脾虛皆令人體重煩冤是知煩多生於虛也大法津液去多五內枯燥而煩者八珍湯加竹葉棗仁麥冬營血不足陽盛陰微而煩者當歸補血湯下硃砂安神丸或生脈散加歸地棗仁竹茹之屬腎水下竭心火上炎而煩者大劑生料六味丸少用肉桂為引導肥人虛煩不眠不飲溫膽湯大病後有餘熱嘔吐咳逆虛煩不安竹葉石膏湯五心煩熱口乾唇燥胸中熱悶千金竹葉湯虛煩懊憹顛倒不安梔子豉湯不應加犀角黑參久病餘熱不止虛煩不安臥寐不寧六味丸加棗仁煩而小便不利五苓散加辰砂滑石煩而嘔不喜食金匱橘皮竹茹湯胎前產後諸煩見婦人本門讝妄譫多言也言為心聲由火燔而鳴故心熱則多言猶醉而心熱故多言也或寐而多言者俗云睡語熱之徵也若熱甚雖寤而神昏不清則譫語也妄虛妄也火為陽故外清明而內濁昧其主動亂故神志失常如見鬼神也夫血氣者身之神也神既衰乏痰客中焦妨礙升降不得運用以致十二官各失其職視聽言動皆有虛妄蓋虛病痰病有似鬼祟宜清神湯或平補鎮心丹去肉桂山藥五味加琥珀膽星麝香大便不通心腹脹滿刺痛口噤氣急者此為實涼膈承氣選用若作邪祟治之以金石必死產後譫妄見婦人本門石頑治文學黃稚潔諱振藻譫妄顛仆數月以來或六七日一發或二三日一發或一日二三發發則大吐涎水血沫或一日半日而蘇或二三時而蘇醫禱不靈近於邪祟晝夜恆見亡婢僕婦或時昏憒不省或時妄言妄見精氣不時下脫不能收攝服二冬二地連柏金櫻石蓮之屬無算反加作瀉不食後延石頑診之脈來寸盛尺微前大後小按之忽無舉之忽有知為神氣浮散之候因與六君子加龍齒菖蒲遠志送養正丹間續而進前後共六七服自後譫妄顛仆絕不復發邪祟亦不復見惟夢泄為平時固疾不能霍然更與平補鎮心丹兩月而安其尊人及昆弟親戚咸謂金石之藥能鎮鬼神曷知從前譫妄皆神氣浮散之故得養正鎮攝之功當無神魂飛越之患矣因識此以破杯影弓蛇之惑循衣摸床循衣撮空摸床多是大虛之候不問雜病傷寒以大補之劑投之多有得生者許學士謂肝熱風淫末疾故手為之循衣撮空其人必譫語妄言經謂肺入火為譫妄是也海藏云婦人血風證因大脫血崩漏或前後失血因而枯燥其熱不除循衣撮空摸床閉目不醒揚手擲足搖動不寧錯語失神脈弦浮而虛內躁之極也生地黃黃連湯主之熱極神昏十餘日不大便腹脹喘滿氣粗鼻乾不潤上下通燥脈沉實而滑此地道阻塞不通之故急宜涼膈承氣下之若熱乘肺金氣虛不能主持叉手冒心循衣撮空譫語昏沉不省人事節庵升陽散火湯小便利者可治不利者不治按涼膈承氣氣藥也自外而入內者用之生地黃黃連湯血藥也自內而至外者用之升陽散火湯氣虛火乘藥也內外合邪者用之三方俱治不大便者病人手循衣縫譫語者不可治病人陰陽俱絕掣衣摸空妄言者死撮空服承氣下之後脈弦者生澀者死喜笑不休經云神有餘則笑不休精氣並於心則喜心主手厥陰之脈是動則病目黃喜笑不休河間云喜笑者皆心火之盛也五行之中惟火有笑昔治人笑不休口流涎用黃連解毒湯加半夏薑汁竹瀝而笑止戴人治一婦病喜笑不休已半年矣以鹽塊二兩燒令通赤放冷研細河水煎服探吐出熱痰五升次服降火之劑不數日而笑定內經曰神有餘則笑不休此所謂神者火是也火得風而成焰笑之象也倪惟德治一婦病氣厥笑哭不常人以為鬼祟所憑診之六脈俱沉胃脘必有積遂以二陳湯導之吐痰升許而愈此積痰類祟也怒經云暴怒傷陰怒則氣逆陰出之陽則怒血並於上氣並於下心煩冤善怒怒屬肝膽經云在藏為肝在志為怒又云肝藏血血有餘則怒是也生鐵洛飲大小柴胡柴胡疏肝四七四磨越鞠七氣沉香降氣等皆治善怒致病之藥丹溪治怒方香附末六兩甘草末一兩和勻白湯調下二錢日再服悲經云精氣並於肺則悲在藏為肺在志為悲悲肺之志也金本燥能令燥者火也心火主於熱善痛故悲痛苦惱者心神煩熱躁亂而非清淨也所以悲哭而五液俱出者火熱亢極而反兼水化制之也金匱云婦人臟燥善悲傷欲哭有如神靈所作數欠伸甘麥大棗湯主之臟燥者火盛爍津肺失其潤心系了戾而然故用甘草緩心系之急而潤肺燥大棗行脾胃之津小麥降肝火之逆火降則肺不燥而悲自已也戴人云少陽相火凌爍肺金金受屈制無所投告肺主悲故但欲痛哭為快耳石頑石凡肺燥悲愁欲哭宜潤肺氣降心火為主余嘗用生脈散二冬膏並加薑棗治之未嘗不隨手而效若作顛疾用金石藥則誤矣驚經云東方青色入通於肝開竅於目其病發驚駭諸病胕腫疼酸驚駭皆屬於火足陽明之脈病惡人與火聞木音則惕然而驚驚則心無所歸慮無所定故氣亂矣身體日減氣虛無精病虛無氣洒洒然如驚驚者平之夫驚雖主於心而肝膽脾胃皆有之驚是火熱爍動其心心動而神亂也若因內氣先虛故觸事易驚或卒然聞響大聲目擊異物遇險臨危皆使人有惕惕之狀也驚則氣亂鬱而生火生涎涎與氣搏變生諸證或短氣或自汗或眠多異夢隨即驚覺並宜溫膽湯加熟棗仁如遠志丸妙香散平補正心丹龍齒清魂散皆可選用臥多驚魘口中有聲溫膽湯下遠志丸臥多驚魘遺溲者補膽防風湯加羌活桂枝此下焦風寒宜風藥行經也若氣鬱生痰而驚悸不眠者四七湯加茯神遠志石菖蒲大抵驚則神出於舍舍空則痰飲乘虛襲入其神不得歸焉亦有肝虛風襲之者本事方治臥則魂夢飛揚驚悸多魘通夕不寐先用獨活湯數劑後用珍珠母丸神效蓋因肝臟本虛虛風內襲所以魂遊無定肝藏魂者也風氣水飲乘虛襲入於肝是以魂不寧而飛揚若離體狀若作心血虛治必殆此證最易慍怒小怒則驚悸轉劇虛火不時上升豈非肝臟受困之驗歟二方非深明木盛生風木槁生火之理不能識其奧妙不能用以建功也診寸口脈動為驚驚者其脈止而復來其人目睛不轉不能呼氣石頑治河南督學汪緘庵媳產後病虛無氣洒洒然如驚常時咳青黑結痰欲咳則心中憺憺大動咳則渾身麻木心神不知所之偶聞一聲響則頭面哄熱微汗神魂如飛越狀專事婦科者屢用補養心血之劑罔效虛羸轉劇邀石頑診之脈浮微弦而芤獨左寸厥厥動搖此必胎前先傷風熱坐草時迸力過甚痰血隨氣上逆衝過膈膜而流入心包也朝用異功散加童便煅淬蛤粉以清理痰氣夕用大劑獨參湯下來復丹以搜滌瘀積蓋痰在膈膜之上非焰硝無以透之血在膈膜之上非五靈無以浚之然非藉人參相反之性不能激之使出也服數日神識漸寧形神漸旺改用歸脾湯加龍齒沉香調理而康又治吳昭如室年壯體豐而素有嘔血腹脹脾約便難之恙兩遭回祿憂恚頻承近於失血之後忽然神氣憒亂口噤目瞠乃尊周渭文秉燭相邀診其氣口數盛而促人迎弦大而芤形神不能自主似有撮空之狀渭老以為證犯條款不出五日當斃予謂不然若是撮空必然手勢散漫今拈著衣被盡力扯摘定為挾驚挾怒無疑爪者筋之餘非驚怒而何況脈來見促當是痰氣中結殊非代脈之比詢其病因驚怒俱有遂勒一方用鉤藤鉤一兩煎成入竹瀝半盞薑汁五匕連夜制服明日復延往候云服藥後即得安寐六脈亦已稍平但促未退仍用前方減半調牛黃末一分其夕大解三度共去結糞五六十枚腹脹頓減脈靜人安稀糜漸進數日之間平復如常悸金匱云寸口脈動而弱動則為驚弱則為悸驚自外邪觸入而動故屬陽陽變則脈動悸自內恐而生故屬陰陰耗則脈弱心下悸者半夏麻黃丸主之此形寒飲冷經脈不利水停心下而致動悸故用麻黃以散營中寒半夏以散心下水與傷寒水停心下用小青龍湯無異首論以脈弱為悸而此湯用麻黃半夏散寒治水知其脈必不弱非弦即緊蓋脈弱為心氣不足豈此藥所宜用乎用丸不用湯者取緩散水不取急汗也卒嘔吐心下痞膈間有水眩悸者半夏茯苓湯主之嘔逆痰飲為胸中陽氣不得宣散眩亦上焦陽氣不能升發所致故半夏生薑並治之悸則心受水凌非半夏可獨治必加茯苓以去水水去則神安而悸愈矣假令瘦人臍下有悸吐涎沫而顛眩此水也五苓散主之瘦人火水之盛為水邪抑鬱在陰分不得升發故於臍下作悸及至郁發轉入於陽與正氣相擊在頭為眩在頂為顛腎液上逆為吐涎沫故用五苓以伐腎邪利水道水去火自安矣悸即怔忡之謂心下惕惕然跳築築然動怔怔忡忡本無所驚自心動而不寧即所謂悸也心虛而停水則胸中滲漉水既上乘心火惡之心不自安使人有怏怏之狀常築築然動是則為悸蓋水衰火動則為煩水乘火位則為悸原病式曰水衰火旺必煩渴引飲水停心下而為悸也心下悸有氣虛血虛屬飲屬火之殊夫氣虛者由陽氣內微心下空虛內動為悸心氣不定五臟不足甚者憂愁悲傷不樂忽忽喜忘驚悸狂眩千金定志丸千金茯神湯或六君子加菖蒲遠志血虛者由陰氣內虛虛火妄動歸脾湯加丹參麥冬停飲者水停心下侮其所勝心主畏水不能自安故惕惕而動半夏茯苓湯茯苓甘草湯或二陳湯加白朮豬苓澤瀉有表邪挾飲半夏麻黃丸小青龍湯選用火旺者因水不能制火故時悸時煩跳動不寧天王補心丹不應六味丸加五味麥冬遠志有邪氣攻擊而悸者宜審其何邪而後治之有營衛涸流脈來結代者必補氣益血生精炙甘草湯因痰飲而悸導痰湯加棗仁有時作時止者痰因火動也溫膽湯加川連其臍下悸動腎氣上凌也五苓散加辰砂有所求不遂或過誤自悔憹懊嗟吁獨語書空若有所失溫膽湯加人參柏子仁胸中痞塞不能飲食心中常有歉愛居暗處或倚門後見人則驚避無地此卑惵之病藿香正氣散虛者人參養榮湯有真心跳乃血少非驚悸也又或夢中如墮岩崖或睡中忽自身體跳動此心氣不足也歸脾湯下硃砂安神丸肥人多屬痰飲瘦人多屬血虛與陰火上衝夫悸之證狀不齊總不外於心傷而火動火鬱而生涎也若夫虛實之分氣血之辨痰與飲寒與熱外感六淫內傷七情在臨證辨之診沉細屬飲結代者虛而有飲虛弱者屬氣虛沉數者為血熱尺中弦緊為腎氣凌心寸口脈動而弱動則為驚弱則為悸石頑治老僧悟庵心悸善恐遍服補養心血之藥不應天王補心丹服過數斤悸恐轉增面目四肢微有浮腫之狀乃求治於石頑察其形肥白不堅診其脈濡弱而滑此氣虛痰飲侵漬於膈上也遂以導痰湯稍加參桂通其陽氣數服而悸恐悉除更以六君子加桂水泛作丸調補中氣而安恐經曰心怵惕思慮則傷神神傷則恐懼自失神傷則心怯火傷則畏水膽病者驚惕心下憺憺恐人將捕之肝病者如人將捕之腎病善怒心惕惕如人將捕之心胞絡是動心中憺憺大動精氣並於腎則恐胃為恐土邪傷水故也恐則精卻卻則上焦閉閉則氣還還則下焦脹故氣不行矣恐則熱傷其腎故精虛志不足也恐者似驚悸而實非忽然心中恐懼如人將捕之狀屬腎本臟而傍及於他臟治法則有別焉治腎傷者宜補精髓六味丸加枸杞遠志治肝虛者宜養陰血六味丸加棗仁龍齒治陽明者壯其氣四君子加木香治心包者鎮其神遠志丸加硃砂琥珀犀角頭眩而恐脈弦無力屬膽虛六君子加柴胡防風當歸兼進加減八味丸膽虛目暗喉痛數唾眩冒五色所障夢見爭訟恐懼面色變者補膽防風湯勞心思慮傷魂者羸瘦善恐夢寐不寧一味鹿角膠酒溶多服效腎臟陽虛善恐八味丸健忘經云上氣不足下氣有餘腸胃實而心肺虛虛則營衛留於下久之不以時上故善忘也按內經之原健忘者俱責之心腎不交心不下交於腎濁火亂其神明腎不上交於心精氣伏而不靈火居上則因而為痰水居下則因而生躁躁擾不寧是以健忘也治法心氣不足妄有見聞心悸跳動恍惚不定千金茯神湯思慮過度病在心脾者歸脾湯挾虛痰者加薑汁竹瀝精神短少人參養榮湯送遠志丸痰迷心竅者導痰湯加木香上虛下熱天王補心丹心火不降腎水不升神明不定而健忘六味丸加五味遠志心氣不定恍惚多忘四君子去白朮加菖蒲遠志硃砂等分蜜丸服心氣不足精神恍惚少睡夜多盜汗怔忡健忘辰砂妙香散瘀積於內而善忘如狂代抵當丸石頑曰因病而健忘者精血虧少或為痰飲瘀血所致是可以藥治之若生平健忘乃心大竅疏之故豈藥石所能療乎故凡開鑿混沌之方悉行裁汰入魔走火人天境內三教同源入聖超凡趨舍各異醫司蒼生之命體法王之心凡三教九流疾厄之苦如萃一身皆當貫徹其旨庶無自欺之弊嘗聞師尼寡婦之治與常人有別豈衲子參堂打七之入魔煉士坐功運氣之走火與常人無異耶余雖不敏業嘗究心斯道遍考方書從無及此每見呆修行人見性不真往往入於魔境或喪志如木偶或笑啼癲妄若神祟所憑良由役心太甚神心舍空痰火乘凌所致詳推治例與不得志人鬱悒侘傺之候不甚相遠但其間多挾五志之火雖有虛證虛脈一切溫補助陽澀精藥概不可施多有滌痰安神不應服大劑獨參湯而愈者有安神補氣不應服六味地黃兼滋腎丸而愈者有滌痰降火不應後服天王補心丹經歲不輟而愈者然此皆下根人執迷不省隨其所著而流入識神矣更有業種魔根詭遇名師為藏身悔過之地始焉非不勇猛善知識見其略有見地稍加策厲安知其進銳者其退速未幾本性熾然恣行貪著集成異端嗔癡暴戾淫殺盜妄靡所不至此宿世定業雖諸佛不能化導豈藥石能治乎至於修真煉氣之士不求自然之旨刻以吐納為務乃至氣亂於中火熾於外而為怔忡痞逆躁擾不寧等患慎不可妄行耗氣散表之藥為害莫測況有不能秘精嗇神真氣不能外廓內充為風寒所侵水穀所犯惟黃耆建中枳實理中為正治其餘七情六氣以意逆之或有過劑傷中虛火為患者大劑獨參湯以斂之即有得其術者真氣初調之時一身陰氣趕散腹痛腸鳴不已蟲垢悉從魄門而出自後真氣方得內守可以結胎可以辟穀當此切勿誤認為病而餌湯藥以耗真氣不特前功盡廢且有性命之慮亦有居處失宜不能調製其火胎息不安者獨參湯送養正丹取丹砂鉛汞之同氣相求自然胎息安和醫師不諳見其灼熱燔蒸誤認客邪散表勢必昆崙飛焰玉石俱焚矣不特發表當禁一切辛散走氣苦寒傷陽沉降助陰藥咸宜遠之大抵煉氣之道以陽為寶純陽為仙純陰則鬼此理之最顯者用藥不可不知近世醫術淺陋藥石無功多有沿襲坐功卻病之法不過欲斷除妄念勘破關頭昧者不能果決每致壯火飛騰頭面赤熱膈塞心忡喘逆蒸汗而成上脫之候亦有陰氣消亡強陽不制精髓不固二便引急而成下脫之候急乘欲脫未脫時峻投保元湯下靈砂丹以救上脫數進生料六味下黑錫丹以固下脫屢奏奇功於反掌間當知精津血液總藉神氣之統攝也曷觀世俗三教所習趨舍雖異而致病之由皆不離於色相苟能靜究其理妄希圖治而曰無賊於人吾未敢信以為然養性論養性之道從古醫林未之及也惟孫真人千金方後述之頗詳近予衍釋其義三複讀之要非予心所謂養性之旨也夫所謂養性者務竭己靈以開天下後世學道人之心眼則吾性常留宇宙間庶得養之之道若從事乎煉形食氣徒資一己之私烏得謂之道耶嗟予素稟矇昧不逢名師之點勘賴有先哲遺言得以煥發性靈以資利濟之用因於千金方中檢得二方一為耆婆大士萬病丸一為西嶽真人靈飛散迥出意表其萬病丸方業經收入局方雖有癲疰蠱毒黃腫水病𤸷痹瘧痢種種諸治詳其方下首治七種痞塊因以隸諸積聚門中予嘗以療歷年不愈諸治不效蔭入骨髓諸病靡不隨手取應不特方下諸治也至靈飛散方僅見云笈七箋方書曾未採錄方中雲母功專扶陽力能闢除三尸蕩練五臟佐以鍾乳之補真陽人參之安五臟茯苓之守正氣桂心之利關節柏仁之益聰明菊花之清神氣續斷之續筋骨地黃之填骨髓天門冬之滋津液與雲母同為殺三蟲伏屍之專藥考諸本經一皆輕身延年之仙品洵為修身養性靜功服食之首推孫子餌之尸解良由雲母性善靈飛使然較之彭祖麋角丸專取血肉之味培理血肉之軀宗旨懸殊趨舍各別第以石藥性悍服之恐有未安不無遺誤將來之慮於是力行修制親為嘗試但初服兩三月間或時稍有頭旋眼黑服及半載漸覺步履輕捷足膝不能自主此藥力僭上無以統攝其下也服至年餘視聽斯聰應酬無倦即有六淫外侵五味內泊得此溫養之力力能自散無取他藥攻發也予初服此見者莫不以之為誕迄今三易星霜而筋力猶然與往昔無異是以親屬交知互相效尤間有服食之初鼻中微衄二三次而止者亦有腹中微痛圊下蟲血而安者此靈藥攻逐三尸積蔭之故積蔭蠲除真陽日長色力日增靈根日固觸境遇緣無非至道道在日用常行又何必離隔陰陽煉形食氣方為至道哉
