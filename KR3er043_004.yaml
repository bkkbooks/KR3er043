body:
  text: 卷四諸氣門下痰飲唾金匱云問曰夫飲有四何謂也師曰有痰飲有懸飲有溢飲有支飲問曰四飲何以為異師曰其人素盛今瘦水走腸間瀝瀝有聲謂之痰飲飲後水流在脅下咳唾引痛謂之懸飲飲水流行歸於四肢當汗出而不汗出身體疼重謂之溢飲咳逆倚息短氣不得臥其形如腫調之支飲痰飲為患十人居其七八金匱論之甚詳分別而各立其名後世以其名之多也徒徇其未而忘其本曾不思聖人立法皆從一源而出無多歧也蓋胃為水穀之海五臟六腑之大源飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行以為常人金匱即從水精不四布五經不並行之處以言其患隨證分別淺深誨人因名以求其義淺者在於軀殼之內臟腑之外其飲有四一由胃而下流於腸一由胃而傍流於脅一由胃而外出於四肢一由胃而上入於胸膈始先不覺日積月纍水之精華轉為混濁於是遂成痰飲必先團聚於呼吸大氣難到之處故由腸而脅而四肢至漸漬於胸膈其勢愈逆則痰飲之患未有不從胃起見者矣夫五臟藏神之地也積水泛為痰飲包裹其外詎非人身之大患乎凡水飲蓄而不散者皆名留飲留者留而不去也留飲去而不盡者皆名伏飲伏者伏而不出也隨其痰飲之或留或伏而用法以治之始為精義今試言之由胃而上胸脅心肺之分者驅其還胃或下從腸出或上從嘔出而不至於伏匿若由胸膈而外出肌膚其清者或從汗出其濁者無可出矣必有伏匿肌膚而不勝驅者若由胸膈而深藏於背背為胸之府更無出路豈但驅之不勝驅且有挾背間之狂陽壯火發為癰毒者伏飲之艱於下出易於釀禍其誰能辨之誰能出之耶水在心心下堅築短氣惡水不欲飲水在肺吐涎沫欲飲水水在脾少氣身重水在肝脅下支滿嚏而痛水在腎心下悸夫心下有留飲其人背惡寒冷如掌大留飲者脅下痛引缺盆咳嗽則輒已一作轉甚胸中有留飲其人短氣而渴四肢歷節痛脈沉者有留飲膈上病痰滿喘咳吐發則寒熱背痛腰疼目泣自出其人振振身瞤而劇必有伏飲夫病人飲水多必暴喘滿凡食少飲多水停心下甚者則悸微者短氣脈雙弦者寒也皆大下後善虛脈偏弦者飲也肺飲不弦但苦喘短氣支飲亦喘而不能臥加短氣其脈平也病痰飲者當以溫藥和之心下有痰飲胸脅支滿目眩苓桂朮甘湯主之小便則利靈樞曰包絡是動則病胸脅支滿痰飲積其處而為病也心下有痰水精不上注於目故眩茯苓治痰水伐腎邪桂枝通陽氣開經絡白朮治痰水除脹滿然中滿勿食甘反用甘草何也蓋桂枝之辛得甘則佐其發散和其熱而使不僭上甘草有茯苓則不支滿而反滲泄甘能下氣除滿也夫短氣有微飲當從小便去之苓桂朮甘湯主之腎氣丸亦主之微飲而短氣由腎虛水邪停蓄致三焦之氣升降呼吸不前也二方各有所主苓桂朮甘湯主飲在陽呼氣之短腎氣丸主飲在陰吸氣之短蓋呼者出心肺吸者入腎肝茯苓入手太陰桂枝入手少陰皆輕清之劑治其陽也地黃入足少陰山萸入足厥陰皆重濁之劑治其陰也必視其人形體之偏陰偏陽而為施治一證二方豈無故哉病者脈伏其人欲自利利反快雖利心下續堅滿此為留飲欲去故也甘遂半夏湯主之留飲堵塞竅隧胃氣不得轉輸故脈伏不顯若留飲既下胃氣受傷必欲自利自利而反快者中焦所塞暫通也通而復積故續堅滿必更用藥盡逐之然欲直達其積飲莫若甘遂快利用之為君欲和脾胃除心下堅又必以半夏佐之然芍藥停濕何留飲用之甘草與甘遂相反何一方並用蓋甘草緩甘遂之性使不急速徘徊逐其所留芍藥治木鬱土中而成堅滿又佐半夏以和胃消堅也脈沉而弦者懸飲內痛病懸飲者十棗湯主之懸飲結內作痛故脈見沉弦用芫花之辛以散飲甘遂大戟之苦以泄水大棗之甘入脾而勝水也病溢飲者當發其汗大青龍湯主之取微似汗汗多者溫粉粉之小青龍湯亦主之水飲溢出於表營衛盡為不利猶傷寒之營衛兩傷故必發汗以散水而後營衛經脈始行四肢之水亦得消矣表郁實熱者用大青龍以發之內蓄寒飲者用小青龍以發之雖皆表散之法而微有不同不可不辨膈間支飲其人喘滿心下痞堅面色黧黑其脈沉緊得之數十日醫吐下之不愈木防己湯主之虛者即愈實者三日復發復與不愈者木防己湯去石膏加茯苓芒硝湯主之微利則愈支飲在膈間氣血皆不通利氣不利則與水同逆於肺而發喘滿血不利則與水雜揉結於心下而為痞堅腎氣上應水飲腎水之色黑血凝之色亦黑故黧黑之色而見於面也脈沉為水緊為寒非別有寒邪即水氣之寒也醫雖以吐下之法治然藥不切於病故不愈用木防己以散留飲結氣石膏主心肺逆氣人參以助胃祛水桂枝以和營開結且支飲得溫則行若邪客之淺在氣分多而虛者服之即愈若邪客之深在血分多而實者則愈後必再發以石膏為氣分藥故去之芒硝為血分藥能治痰軟堅茯苓伐腎利水而為芒硝之佐故加之心下有支飲其人苦冒眩澤瀉湯主之支飲阻其陽之升降郁久化火火動風生而冒眩也故用澤瀉開關利水以泄支飲白朮和中燥濕則陽自升而火自息矣支飲胸滿者厚朴大黃湯主之此即小承氣以大黃多遂名厚朴大黃湯若厚朴多則名厚朴三物湯此支飲胸滿者必緣其人素多濕熱濁飲上逆所致故用蕩滌中焦藥治之支飲不得息葶藶大棗瀉肺湯主之支飲留結氣塞胸中故不得息葶藶破結和飲大棗通肺和中以其氣壅則液聚液聚則熱結所以與肺癰同治也嘔家本渴渴者為欲解今反不渴心下有支飲故也小半夏湯主之卒嘔吐心下痞膈間有水眩悸者小半夏加茯苓湯主之嘔本有痰嘔盡痰去而渴者為欲解與傷寒服小青龍湯已渴者寒去欲解同義今反不渴是積飲尚留去之未盡故用半夏散結勝濕生薑散氣止嘔千金方更加茯苓佐之即與治卒嘔吐心下痞膈間有水眩悸者同法也腹滿口舌乾燥此腸胃間有水氣己椒藶黃丸主之口中有津液渴者加芒硝半兩水積腸間則肺氣不宣膹郁成熱而為腹滿津液遂不上行而口舌乾燥用防己椒目葶藶利水散結氣而葶藶尤能利腸然腸胃受水穀之氣者邪實腹滿非輕劑所能治必加大黃以瀉之若口中有津液而仍作渴者此痰飲聚於血分必加芒硝以祛逐之先渴後嘔為水停心下此屬飲家小半夏茯苓湯主之先渴者因痰飲占據中宮津液不得灌注於上肺失其潤而然後嘔者胃中所積之飲隨氣逆而上泛也故用薑半以滌飲茯苓以滲濕濕去則嘔止津通而渴自已此與傷寒心下有水氣咳而微喘發熱不渴服小青龍湯已而渴之義懸殊彼以津液耗損而渴此以痰氣積阻而渴渴之先後變見可以推飲之盛衰也世以半夏性燥渴家禁用曷知其有主渴之妙用哉假令瘦人臍下有悸吐涎沫而巔眩此水也五苓散主之瘦人本無痰濕今巔眩吐涎明是水積臍下而悸故用五苓藉桂之辛溫以散之久咳數歲其脈弱者可治實大數者死其脈虛者必苦冒其人本有支飲在胸中故也治屬飲家下半條專補心下支飲冒眩之脈法冒屬風虛必無脈實之理治屬飲家不特澤瀉湯一方也丹溪曰痰之源不一有因痰而生熱者有因熱而生痰者有因氣而生者有因風而生者有因驚而生者有積飲而生者有多食而成者有因暑而生者有傷冷物而成者有脾虛而成者有嗜酒而成者其為病也驚痰則成心包痛顛疾熱痰則成煩躁驚悸風痰成癱瘓大風眩暈飲痰成嘔吐脅痛四肢不舉食痰成瘧痢口臭痞塊滿悶暑痰成嘔逆眩冒冷痰成骨痹氣刺痛四肢不舉酒痰多成脅痛臂痛飲酒不消但得酒次日又吐脾虛生痰食不美反胃嘔吐濕痰多倦怠軟弱氣痰攻注走刺不定婦人於驚痰最多結成塊者為驚痰必有一塊在腹發則如身孕轉動跳躍痛不可忍又有老痰凝結膠固非借溫藥引導必有拒格之患龐安常有言人身無倒上之痰天下無逆流之水故善治痰者不治痰而治氣氣順則一身之津液亦隨氣而順矣痰屬濕熱乃津液所化因風寒濕熱之感或七情飲食所傷以致氣逆液濁變為痰飲或吐咯上出或凝滯胸膈或留聚腸胃或客於經絡四肢隨氣升降遍身上下無處不到其為病也為喘為咳為噁心嘔吐為痞膈壅塞關格異病為泄為眩暈為嘈雜怔忡驚悸為顛狂為寒熱為痛腫或胸間漉漉有聲或背心一點常如冰冷或四肢麻痹不仁皆痰所致百病中皆有兼痰者世所不知也痰有新久輕重之殊新而輕者形色清白氣味亦淡久而重者黃濁稠黏咳之難出漸來惡味酸辣腥臊鹹苦甚至帶血而出治法痰生於脾胃宜實脾燥濕又隨氣而升宜順氣為先分導次之又氣升屬火順氣在於降火熱痰則清之濕痰則燥之風痰則散之郁痰則開之頑痰則軟之食痰則消之在上者吐之在下者下之又中氣虛者宜固中氣以運痰若攻之太重則胃氣虛而痰愈甚矣喻嘉言曰內經云諸氣膹郁皆屬於肺蓋肺鬱則成熱熱盛則生痰痰挾瘀血遂成窠囊膈間脹滿痞悶雖夏月痰飲積處無汗而冷痰清飲積滿窠囊必大嘔逆此盈科而進也多由厚味積熱腸胃枯涸又加怫鬱胃脘之血為痰濁所滯日積月纍漸成噎膈反胃之次第若用燥劑其結轉甚惟竹瀝薑汁韭汁可以治之日飲三五杯必胸中煩躁不寧乃妙後用養血健脾潤燥藥治痰之法曰驅曰導曰滌曰化曰湧曰理脾曰降火曰行氣前人之法不為不詳至於窠囊之痰如蜂子之穴於房中如蓮實之嵌於蓬內生長則易剝落則難其外窄中寬任行驅導滌湧之藥徒傷他藥此實閉拒而不納耳夫人身之氣經盛則注於絡絡盛則注於經窠囊之來始於痰聚胃口嘔時數動胃氣胃氣動則半從上出於喉半從內入於絡胃之絡貫膈者也其氣奔入之急則沖透膈膜而痰得以居之痰入既久則阻礙氣道而氣之奔入者復結一囊也然痰飲結聚於膈膜而成窠囊清氣入之渾然不覺每隨濁氣而動乃至寒之亦發熱之亦發傷酒傷食亦發動怒動欲亦發總由動其濁氣濁氣隨火而升轉使清氣逼處不安也故治窠囊之痰甚難必先凝神入氣以靜自調薄滋味以去胃中之痰使胃經之氣不急奔於絡轉虛其胃以聽絡中之氣返還於胃逐漸以藥開導其囊而滌去其痰則自愈矣後世治痰飲有四法曰實脾燥濕降火行氣實脾燥濕二陳湯加蒼白二術最為相宜若陰虛則反忌之矣降火之法須分虛實實用苦寒虛用甘寒庶乎可也若夫行氣之藥諸方漫然全無著落謹再明之風寒之邪從外入內裹其痰飲惟宜小青龍湯分其邪從外出而痰飲從下出也濁陰之氣從下入上裹其痰飲金匱半夏厚朴湯即四七湯分其濁氣下出而痰飲從上出也若多欲之人則腎氣上逆直透膜原結壘萬千䐜脹重墜不可以仰用桂苓丸引氣下趨痰飲始豁也又虛寒痰飲少壯者十中間見一二老人小兒十中常見四五若果脾胃虛寒飲食不思陰氣痞塞嘔吐涎沫者宜溫其中真陽虛者更補其下清上諸藥不可用也再按痰飲總為一證而因則有二痰因於火有熱無寒飲因於濕有熱有寒即有溫泉無寒火之理也痰飲膠結於胸中為飽為悶為頻咳而痰不應總為脾失其健不為胃行其津液而飲食即以生痰漸漬充滿肺竅咳不易出雖以治痰為急然治痰之藥大率耗氣動虛恐痰未出而風先入也惟是確以甘寒之藥杜風消熱潤燥補虛豁痰乃為合法驚痰堵塞竅隧肝肺心胞絡間無處不有三部脈虛軟無力邪盛正衰不易開散欲用湧劑正如兵家劫營之法安危反掌欲導之下行竅隧之痰萬不能導徒傷脾氣計惟理脾為先脾氣者人身健運之陽氣如天之有日陰凝四塞者日失其所痰迷不醒者脾失其權理脾則如烈日當空片云纖翳能掩之乎其理脾之法須藥餌與飲食相參不但滑膩雜食當禁即飯食粥飲亦須少減則脾氣不用以消穀轉用之消痰較藥力萬萬耳膏粱過厚之人每多味痰尤宜清理脾胃為主夫五味入口而藏於胃胃為水穀之海五臟六腑之總司人之食飲太過而結為痰涎者每隨脾氣之健運而滲灌於經隧其間往返之機如海潮然脾氣行則潮去脾氣止則潮回所以治沉錮之法但取辛熱微動寒凝以後止而不用恐痰得熱而妄行為害不淺也不但痰得熱而妄行即脾得熱亦過動不息如潮之有去無回其痰病之決裂可勝道哉從來服峻利之藥者深夜亦欲飲食人皆不知其故反以能食為慶曾不思愛惜脾氣令其晝運夜息乃可有常況人身之痰既由胃以流於經隧則經隧之痰亦必返之於胃然後可從口而上越從腸而下達此惟脾氣靜息之時其痰可返故凡有痰證者早食午食而外但宜休養脾氣不動使經隧之痰得以返之於胃而從胃氣之上下不從脾氣之四迄乃為善也試觀痰病輕者夜間安臥次早即能嘔出泄出痰病重者昏迷復醒反能嘔出泄出者豈非未嘗得食脾氣靜息而與痰以出路耶世之喜用熱藥峻攻者能知此乎噫天下之服辛熱而轉能夜食者多矣能因此而三復否李士材云先哲論脾為生痰之源肺為貯痰之器又曰治痰不理脾胃非其治也以脾土虛則清者難升濁者難降留中滯膈淤而成痰故治痰先補脾脾復健運之常而痰自化矣析而言之痰有五飲亦有五治法因之而變在脾經者名曰濕痰脈緩面黃肢體沉重嗜臥不收腹脹食滯其痰滑而易出二陳加枳術挾虛者六君子湯酒傷者加白豆蔻乾葛在肺經者名曰燥痰又名氣痰脈澀面白氣上喘促灑淅寒熱悲愁不樂其痰澀而難出利金湯去枳殼加葳蕤薑用蜜煎在肝經者名曰風痰脈弦面青肢脅滿悶便溺祕澀時有躁怒其痰清而多泡十味導痰湯用漿水煎服甚則千緡湯加川芎大黃在心經者名曰熱痰脈洪面赤煩熱心痛口乾唇燥時多喜笑其痰堅而成塊涼膈散加苓半下之在腎經者名曰寒痰脈沉面黑小便急痛足寒而逆心多恐怖其痰有黑點而多稀桂苓丸加澤瀉車前腎虛水泛為痰八味丸其人素盛今瘦水走腸間漉漉有聲名曰痰飲心下冷極苓桂朮甘湯和之飲後水流在脅下咳唾引痛名曰懸飲十棗湯下之飲水流於四肢當汗不汗身體疼重名曰溢飲內經所謂溢飲者渴暴多飲而溢入肌皮腸胃之外也小青龍湯汗之咳逆倚息短氣不得臥其形如腫名曰支飲五苓散澤瀉湯利之膈滿嘔吐喘咳寒熱腰背痛目淚出其人振振惡寒身瞤惕者名曰伏飲倍術丸加茯苓半夏更有一種非痰非飲時吐白沫不甚稠黏者此脾虛不能約束津液故涎沫自出宜用六君子湯加炮薑益智仁以攝之嗟乎五痰五飲證各不同治法迥別至於脾肺二家之痰尤不可混脾為濕土喜溫燥而惡寒潤故白朮半夏茯苓為要藥肺為燥金喜涼潤而惡溫燥故門冬貝母桔梗為要藥二者誤治鮮不危困每見世俗畏半夏之燥喜貝母之潤一見有痰便以貝母投之若是脾痰則土氣益傷飲食漸減矣即使肺痰毋過於涼潤以傷中州稍用脾藥以生肺金方為善治故曰治痰不理脾胃非其治也信夫凡人身中有塊不癢不痛或作麻木名敗痰失道宜隨處用藥消之如忽患手足胸背頭項腰膝疼痛不可忍及連筋骨牽引吊痛坐臥不安走易不定頭疼困倦手足重墜痹冷脈伏此乃涎飲頑痰伏在心胸上下發為此疾非風非毒導痰湯加羌防白芷薑汁竹瀝痰火相煽於膈上胸中時覺痞滿眩暈或目齒疼飲食後稍覺快爽少間復加迷悶大便或結或瀉小便或赤或清此皆痰飲或開或聚之故治宜健脾以運痰清肺以潤燥六君子加蘇子栝蔞薑汁竹瀝之類老痰積於胸膈作痞或流滯於經絡四肢者青礞石丸壯實體厚之人可用薑汁竹瀝下滾痰丸然後用理脾行氣藥調理濕痰積於脅下隱隱作痛天陰疼軟更甚輕則二陳湯加白芥子重則控涎丹緩攻之痰挾死血隨氣攻注流走刺痛有時得熱則止有時得熱轉劇此本寒痰阻塞故得熱則止若痛久火邪傷血則得熱轉劇控涎丹加胡椒蠍尾木香鯪鯉甲痛定時局方七氣湯與六君子並加竹瀝相間服之痰在脅下非白芥子不能達痰在四肢及在皮裡膜外非竹瀝薑汁不行二味治陰虛有痰大有奇驗但食少脾胃不實者不可輕用以其寒滑能走大便也枳實治痰能沖牆倒壁黃芩花粉大降膈上熱痰然能郁遏火邪傷損中氣脾胃虛寒及有外感者切忌痰在膈間使人顛狂健忘四肢偏枯及類中風痰俱用竹瀝痰在腸胃可下而愈枳實大黃芒硝之類膈上痰熱痞悶小陷胸湯加枳實茯苓薑汁竹瀝中脘留伏痰飲臂痛難舉手足不能轉移背上凜凜畏寒者指迷茯苓丸痰飲流入四肢令人肩背痠痛兩手軟痹若誤以為風則非其治導痰湯加薑黃木香不應加桂枝以和營氣眼黑而行步呻吟舉動艱難者痰入骨也非用萆薢苦參不除其病遍體骨節疼痛審氣血加化痰藥濕痰痞塞胸中不快氣不宣通及痰火吐痰不見血者沉香化痰丸肥盛多濕熱人痰濕膠固於中外動則喘滿眩暈者運痰丸老痰不化喉中常覺哽塞咯之不出者消痰餅子喉中有物咯不出咽不下或作刺痛此是郁痰四七湯脈澀者卒難得開必費調理多思慮人胃中虛寒飲聚食減者局方七氣湯深師消飲丸選用心胸中有寒痰宿水自吐出水後心胸間虛氣滿不能食外臺茯苓飲寒涎沃膽時吐痰水不得眠或時眩暈溫膽湯多驚加蠍尾痰火盛於上焦氣盛喘促有時能食有時不能食或周身走痛飽悶痞脹者用滾痰丸西北人倒倉法最妙病人久虛內有宿積痰飲用參術補之久乃吐出臭痰或緑色痰者難治蓋積之既久而脾胃虛熱不運且有積熱故郁臭耳急用二陳加枳朮黃連竹瀝庶可十全一二若肺癰吐臭痰膿血不在此例脾肺氣虛不能運化而有痰者六君子加木香肺胃氣虛不能清化而有痰者六君子加桔梗脾氣虛不能運化而生痰者理中丸加半夏茯苓脾中氣滯而痰中有血者加味歸脾湯去木香遠志加牡丹皮砂仁肝經血熱而痰中有血者加味逍遙散去柴胡煨薑加童便藕汁肝腎陰虛而痰中有血者六味丸加烏鰂骨茜根若過服寒涼唾痰有血者異功散加炮薑痰飲結聚腹脅之間有類積聚但按之不甚堅而時時口吐涎沫者六君子合五苓加枳實平居無事但有痰數口或清或堅宜小半夏茯苓湯不應加人參以健胃氣則痰自不生矣陰血不足相火上炎肺受火乘不得下行化令由是津液凝滯生痰不生血當用潤劑如二冬膏六味丸之類滋其陰使上逆之火得返其宅而息則疾自消投以二陳等湯立見其殆瘦人多此腎虛不能納氣歸源出而不納則為積滯積滯不散則痰生八味丸肥人多此老人腎虛水泛為痰上湧者八味丸以攝之不應用真武湯凡尺脈浮大按之則澀氣短有痰小便赤澀足跟作痛皆腎虛不能行濁氣凝聚而為痰也腎氣丸脈來細滑或緩痰涎清薄身體倦怠手足痠軟此脾虛挾濕六君子加炮薑或補中益氣加半夏茯苓然痰病須辨有火無火無火者純是清水有火者中有重濁白沫耳內傷中氣虛而有痰必用參術佐以薑汁傳送甚者加竹瀝脾氣虛宜清中氣以運痰使之下行六君加枳術兼用升柴以提清氣脈濡緩身體倦怠體厚人屬濕痰二陳加生朮羌活氣虛佐參術脈沉滯或滑證兼噁心心下飽悶屬郁痰宜開鬱行氣脈滑見於右關時常噁心吐清水痞塞就吐中以鵝翎探之蓋熱痰在膈上瀉亦不去必用吐膠固稠濁非吐不開浮滑宜吐脈澀年高虛人不可吐痰在經絡中非吐不可吐中猶有發散之意須先升提其氣乃吐如瓜蒂防風川芎桔梗芽茶齏汁之類晴明時於不通風處以布緊勒其肚乃吐腎虛水泛為痰有用腎氣丸屢未得效因思痰本陰類復用地黃助陰良非所宜當於方中減熟地黃山茱萸加菖蒲沉香開通其氣自效大抵陰虛痰燥切忌二陳六君輩香燥益氣藥陽虛飲泛切戒四物六味滋陰膩膈藥此歧路攸分不可不辨大凡痰飲變生諸證不當為諸證牽掣作名且以治飲為先飲消諸證自愈如頭風眉稜骨痛纍用風藥不效投以痰劑收功如患眼赤羞明而痛與涼藥弗瘳畀以痰劑獲效凡此之類不一而足散在各門不復繁引診脈沉者有留飲雙弦者寒也偏弦者飲也肺飲不弦但苦喘滿短氣支飲亦喘不得臥短氣其脈平也病人一臂不遂時復移在一臂其脈沉細非風也必有飲在上焦痰得澀脈難愈陳無擇云飲脈皆弦細沉滑左右關脈浮大而實者膈上有稠痰也宜吐之病人百藥不效關上脈伏而滑者痰也眼胞上下如煤黑者亦痰也唾唾者坐處不時多唾此胃中寒也以胃氣虛寒不運故病後多有是證理中湯或六君子湯加益智仁攝之虞恆德治一婦因多食青梅得痰病日間胸膈痛如刀錐至晚胸中痛止而膝髂大痛此痰飲隨氣升降故也服丁沉薑桂烏附諸藥皆不效乃以萊蔔子研汁與半碗吐痰半升至夜痛尤甚而厥此引動其猖狂之勢耳次日用參蘆一兩逆流水煎服不吐又次日苦參煎湯服亦不吐又與附子尖桔梗蘆皆不吐後一日清晨用藜蘆末一錢麝香少許酸漿水調服始得大吐稠痰升許其痛如失調理脾胃而安錢仲立治一人素患痰火外貌雖癯稟氣則實醫者誤認虛火而用補中益氣氣喘上升幾殆遂用二陳探吐出痰碗許始得安寢仍用二陳去半夏加硝黃下結糞無數其熱始退調理脾胃而安王中陽治江東富商自奉頗厚忽患心驚如畏人捕聞脂粉氣即便遺泄坐臥欲人擁護逼身紅暈紫斑兩腿連足淫濕損爛膿下不絶飲食倍常酬應不倦屢以驚悸虛脫風瘡治皆不效王診得六脈俱長三部有力此係太過之脈心腎不交而上悸下脫皆痰飲留積所致風瘡亦是痰飲流入經隧內濕招風之故先以滾痰丸逐去痰毒三日一次然後用豁痰藥加減調理而安薛立齋治一人背腫一塊按之則軟肉色如故飲食如常勞則吐痰此脾虛而痰滯用補中益氣加茯苓半夏羌活外以香附末薑汁調餅灸之而散後因勞役頭眩作嘔仍以前藥減羌活加蔓荊子而愈李士材治秦景明素有痰飲每歲必四五發發即嘔吐不能食此病久結成窠囊非大涌之弗愈也須先進補中益氣十日後以瓜蒂散頻投湧如赤豆沙者數升已而復得水晶色者升許如是者七補之七湧之百日而窠囊始盡專服六君子八味丸經年不輟又治朱文哉遍體如蟲螫口舌糜爛寅卯必見異物其脈兩關弦滑且大定為痰飲之疴投滾痰丸一服微有所下更以控涎丹下痰及積身痛減半更以參術煎湯送控涎丹復下數行而愈石頑治周又韜張使本燕人體肥痰盛善肉善飯而患痰鳴喘嗽數年食傷恆發則六脈遲滑時見歇止聲如拽鋸遍地皆痰每歲或一二發或三五發深秋初冬尤甚遂用倒倉法自言肢體皆輕前證遂不復作二年後因不禁牛肉復發然其勢較前不過十一是亦不慎口腹所致耳咳嗽素問云肺之令人咳何也五臟六腑皆令人咳非獨肺也皮毛者肺之合也皮毛先受邪氣邪氣以從其合也其寒飲食入胃從肺脈上至於肺則肺寒肺寒則外內合邪因而客之則為肺咳肺咳之狀咳則喘息有音甚則唾血心咳之狀咳則心痛喉中介介如梗狀甚則咽腫喉痹肝咳之狀咳則兩脅下痛甚則不可以轉轉則兩胠下滿脾咳之狀咳則右脅下痛陰陰引肩背甚則不可以動動則咳劇腎咳之狀咳則腰背相引而痛甚則咳涎五臟之久咳乃移於六腑脾咳不已則胃受之胃咳之狀咳而嘔嘔甚則長蟲出肝咳不已則膽受之膽咳之狀咳嘔膽汁肺咳不已則大腸受之大腸咳狀咳而遺矢心咳不已則小腸受之小腸咳狀咳而失氣氣與咳俱失腎咳不已則膀胱受之膀胱咳狀咳而遺溺久咳不已則三焦受之三焦咳狀咳而腹滿不欲食飲此皆聚於胃關於肺使人多涕唾而面浮腫氣逆也岐伯雖言五臟六腑皆令人咳其所重全在肺胃而尤重在外內合邪四字人身有外邪有內邪有外內合邪此云五臟之久咳乃移於六腑是指內邪郁發而言若外邪入傷肺合而咳原無臟腑相移之例也金匱云咳逆倚息不得臥小青龍湯主之青龍湯下已多唾口燥寸脈沉尺脈微手足厥逆氣從小腹上衝胸咽手足痹其面翕熱如醉狀因復下流陰股小便難時覆冒者與桂苓五味甘草湯治其沖氣沖氣即低而反更咳胸滿者用桂苓五味甘草湯去桂加乾薑細辛以治其咳滿咳滿即止而更復渴沖氣復發者以細辛乾薑為熱藥也服之當遂渴而渴反止者為支飲也支飲者法當冒冒者必嘔嘔者復內半夏以去其水水去嘔止其人形腫者加杏仁主之其證應內麻黃以其人遂痹故不內之若逆而內之者必厥所以然者以其人血虛麻黃髮其陽故也若面熱如醉此為胃熱上衝熏其面加大黃以利之按金匱治咳敘之痰飲之下以咳必因之痰飲而五飲之中獨膈上支飲最為咳嗽根底外邪入而合之因嗽即無外邪而支飲漬入肺中自足令人咳嗽不已況支飲久蓄膈上其下焦之氣逆沖而上尤易上下合邪也夫以支飲之故而令外邪可內下邪可上不去支飲則咳終無寧宇矣其曰咳逆倚息不得臥小青龍湯主之明外內合邪之證惟小青龍湯為的對耳然用小青龍湯其中頗有精義須防沖氣自下而上重增濁亂其咳不能堪矣傷寒用小青龍湯無少陰證者可服雜證用小青龍湯亦恐少陰腎氣素虛衝任之火易於逆上衝任火上無咳且增煩咳況久咳不已顧可動其沖氣耶蓋衝任二脈與腎絡同出胞中腎虛不能固守於下則二脈相挾從少腹逆沖而上也蓋腎氣本虛之人即素無痰飲才感外邪則衝任之火便乘勢上凌膈上迫拹津液而為痰飲支塞清道必至咳逆倚息不得臥也倚息者倚伏而喘息陰火內應外邪為證最急不得不以小青龍為務也只緣真元素虧縱有合劑不能逞迅掃之力所以餘邪得以久持致有如下變證也多唾飲上溢也口燥津液傷也寸脈沉尺脈微手足逆冷衛中陽氣耗也氣從少腹上衝胸咽陰火逆也手足痹營血虛也其面翕熱如醉狀陽明胃熱也因復下流陰股小便難陰火下流膀胱也時覆冒太陽餘邪未散也然證雖屢變皆為沖氣逆上之故且有時復昏冒一證即定太陽表證確守冒家汗出自愈之例故反覆出入不離小青龍加減所以用桂苓五味甘草湯先治沖氣沖氣即低而反更咳胸滿因水在膈間不散再變前方去桂加乾薑細辛以治其咳滿咳滿即止第三變而更復渴沖氣復發者以細辛乾薑為熱藥也服之當遂渴而渴反止者為支飲也支飲者法當冒冒者必嘔嘔者復納半夏以去其水水去嘔止第四變其人形腫者以水尚在表也加杏仁主之其證應納麻黃以其人遂痹故不納之若逆而納之必厥所以然者以其人血虛麻黃髮其陽故也第五變若面熱如醉此為胃熱上衝熏其面加大黃以利之前四變隨證加減施治猶未離本來繩墨至第五變其證頗似戴陽而能獨斷陽明胃熱乃加大黃以利之按陽明病面合赤色不可攻之為其腎虛陽氣不藏故以攻下為戒而此平昔陰虧血虛反用大黃利之者以其證變疊見雖有面熱如醉脈見寸沉尺微洵非表邪怫鬱而為胃中熱蘊無疑竟行滌飲攻熱恬不以陰虛為慮而致扼腕也嗟夫仲景治咳全不從咳起見治其支飲下其逆氣衝氣法中之法遊刃有餘矣咳而上氣喉中水雞聲射干麻黃湯主之咳而脈浮者厚朴麻黃湯主之咳而脈沉者澤漆湯主之上氣而作水雞聲乃是痰礙其氣氣觸其痰風寒入肺之一驗耳發表下氣潤燥開痰四法萃於一方用以分解其邪若咳而脈浮則外邪居多全以散邪為主用法即於小青龍湯中除去桂枝芍藥甘草加厚朴石膏小麥仍從肺病起見以桂枝之熱芍藥之收甘草之緩概示不用而加厚朴以下氣石膏以清熱小麥以引入胃中助其升發之氣也若咳而脈沉為邪在營分即肺之裡也熱過於營吸而不出其血必結血結則痰氣必外裹故用澤漆之破血為君加入開痰下氣清熱和營諸藥俾壘一空元氣不損制方之妙若此火逆上氣咽喉不利者止逆下氣麥門冬湯主之此胃中津液乾枯虛火上炎之證凡肺病有胃氣則生無胃氣則死胃氣者肺之母氣也故於竹葉石膏湯中偏除方名二味而用麥冬數倍為君兼參草粳米以滋肺母使水殼之精微皆得上注於肺自然沃澤無虞當知火逆上氣皆是胃中痰氣不清上溢肺隧占據津液流行之道而然是以倍用半夏更加大棗通津滌飲為先奧義全在乎此若濁飲不除津液不致雖日用潤肺生津之劑烏能建止逆下氣之績哉俗以半夏性燥不用殊失仲景立方之旨戴人云肺為諸咳之門戶每為六氣所乘如風乘肺者日夜無度汗出頭痛痰涎不利熱乘肺者喘急而嗽面赤潮熱甚者熱甚於中手足反寒熱移於下便泄無度火乘肺者咳喘上壅出血甚者七竅血溢燥乘肺者氣壅不利百節內痛頭面汗出寒熱往來皮膚乾枯燥癢大便祕痰膠血腥寒乘肺者嗽急而喘惡寒無汗鼻塞身疼發熱煩躁濕乘肺者痰涎不利面腫喘急至於濕痰內動為咳又必因風因火因熱因寒所挾各不相同至於乘肺則一也咳嗽外感六氣鬱而成火必六淫相合內傷五臟相勝必五邪相併有此不同而中間又有斂散二法斂者謂收斂肺氣也散者謂解散寒邪也宜散而斂則肺受寒邪一時斂住為害非輕宜斂而散則肺氣怯弱一時發散而走泄正氣害亦非小且如感風咳嗽已經散後其表虛復感寒邪虛邪相乘又為喘嗽若欲散風則愈虛其肺收斂則愈滯其邪當先輕解漸收斂之肺不致虛邪不致滯咳嗽自止矣經言臟腑皆有咳嗽嗽屬肺何為臟腑皆有之蓋咳嗽為病有自外而入者有自內而發者風寒暑濕先自皮毛而入皮毛者肺之合故雖外邪欲傳臟亦必先從其合而為嗽此自外而入者也七情鬱結五臟不和則邪火逆上肺為氣出入之道故五臟之邪上蒸於肺而為咳此自內而發者也然風寒暑濕有不為嗽者蓋所感者重竟傷臟腑不留於皮毛七情亦有不為嗽者蓋病尚淺止在本臟未即上攻所以傷寒以有嗽為輕而七情鬱結之嗽久而後見治法當審脈證三因若外因邪氣止當發散又須原其虛實冷熱若內因七情與氣口脈相應當以順氣為先下痰次之戴復庵云咳嗽因風寒者鼻塞聲重惡寒者是也火者有聲痰少面赤者是也勞者盜汗出兼痰者多作寒熱肺脹者動則喘滿氣急息重痰者嗽動便有痰聲痰出嗽止五者大概耳亦當明其是否也趙養葵曰咳謂無痰而有聲肺受火爍也嗽是有聲而有痰脾受濕傷也雖分五臟六腑之殊而其要皆主於肺蓋肺為清虛之腑一物不容毫毛必咳又肺為嬌臟畏熱畏寒火刑金爍故嗽水冷金寒亦嗽故咳嗽者必責之肺而治法不在於肺而在於脾不專在脾而反歸重於腎蓋脾者肺之母腎者金之子故虛則補其母虛則補其子也勞嗽見血有勞傷元氣內火妄動而傷肺者亦有勞傷腎水陰火上炎而傷肺者有因過服天冬生地黃等寒藥損傷脾胃不能生肺氣而不愈者有因誤服知柏之類損傷陽氣不能生陰精而不愈者凡此皆脾肺虧損而腎水不足以致虛火上炎真臟為患也須用異功散加門冬五味補脾土而生肺金用六味丸滋腎水而生陰精否則不救凡陰虛火盛乾咳少痰及痰咯難出之嗽妄用二陳湯轉劫其陰而生大患矣張介賓云大法咳嗽治表邪者藥不宜靜靜則留連不解變生他病故忌寒涼收斂經所謂肺欲辛者是也治里證者藥不宜動動則虛火不寧燥癢愈甚故忌辛香燥熱所謂辛走氣氣病無多食辛是也然治表者雖宜動以散邪若形病俱虛者又當補中氣而佐以和解倘專於發散則肺氣益弱腠理益疏邪乘虛入病反增劇也治內者雖當靜以養陰若命門火衰不能歸元則參薑桂附在所必用否則氣不化水終無濟於陰也至若因於火者宜清因於濕者宜利因痰者降其痰因氣者理其氣隨其所見之證而兼以調之大抵風邪胃火此實熱為患易治惟肺腎虧損此真臟為患最難治在老人虛人皆宜溫養脾肺稍兼治標為當石頑曰經云勞風法在肺下其為病也使人強上冥視唾出若涕惡風而振寒此為勞風之病治之以救俯仰巨陽引句精者三日中年者五日不精者七日咳出青黃涕其狀如膿大如彈丸從口中若鼻中出不出則傷肺傷肺則死也此段奧義從無正釋今特明之夫人勞力則肺氣脹滿俞穴大開而汗泄斯時感冒風邪乘其俞穴之開直入肺下少頃俞穴仍閉其邪有入無出鬱閉不通而生痰聚飲流入膺胸肩背經絡竅隧之中故使人強上冥視強上者身半以上為風所中而胸背強戾但可仰臥而不能俯非若腎風之不能正偃也冥視者邪害空竅所以目睛反戾半開不動不能視物也唾出若涕者痰飲上溢之徵也惡風振寒者肺氣受困木邪反肆為虐也風寒之邪必由巨陽而尋出路今邪在肺下逼近胃口既不能從表而解又非實熱燥結可攻下而除勢必藉資膀胱陽氣上吸胸中使陰曀鬱閉之邪庶得從上解散本乎天者親上故涕從口鼻而出其色青黃其狀如膿者風邪挾肝膽而乘脾胃之候也大如彈丸者乃久已支塞肺竅之結痰見邪蓄之盛也設不急治則傷肺而死矣故治此證者當急使巨陽之上引則肺氣清肅下行而風邪痰涕方得上出胸中既空洞無餘自然俯仰無礙矣又須知此證邪氣入深即使治得其當雖精壯之人亦必服藥三日始得見效若治中年者及不精壯者更須五日七日為期設遇羸老困憊之人胃氣浸衰不能行其藥力何能計日取效哉治此者惟金匱桂苓五味甘草湯加薑汁竹瀝瘥堪對證蓋桂枝上散肺下邪風下通膀胱陽氣茯苓先升後降專祛肺下濁飲五味約束桂枝辛散使津液不隨氣外泄而為巨陽之嚮導甘草之甘緩使三味緩留膈上共成匡濟之功若痰逆勢甚者又當用桂枝二越婢一湯小青龍加石膏湯稟氣素虛者炙甘草湯皆為合劑奈何守真宣明論特舉芎枳丸專治此證未審何所見而云然是豫不敢附會也凡咳嗽飲水一二口而暫止者熱嗽也呷熱湯而暫停者冷嗽也治熱嗽以小柴胡加桔梗冷嗽理中湯加五味感風者鼻塞聲重傷冷者悽清怯寒挾熱為焦煩受濕為纏綿瘀血則膈間腥悶停水則心下怔忡或實或虛痰之黃白唾之稠黏從可知也感風而嗽者脈浮惡風自汗或身體發熱鼻塞或鼻流清涕欲語未竟而咳宜桂枝湯加香豉細辛然火嗽亦有鼻流清涕語未竟而咳者但風則一嗽便多稠痰火則頓咳無痰為明辨耳感寒而嗽者脈緊惡寒發熱無汗鼻塞遇寒則咳內有鬱熱痰結也華蓋散兼喘九寶湯暴感風寒二氣相兼而咳嗽鼻塞聲重者芎蘇飲肺感風寒咳嗽倚息不得臥背寒則嗽甚小青龍湯桂苓五味甘草湯各隨方下變證加減客邪傷肺久嗽不止寧嗽化痰湯形寒飲冷咳嗽兼腹痛脈弦者小建中湯加桔梗以提肺氣之陷寒熱自汗加黃耆冬月嗽而發寒熱謂之寒嗽小青龍湯加杏仁冷熱嗽因增減衣裳寒熱俱感遇乍寒乍熱亦嗽飲熱飲冷亦嗽脈浮風重金沸草散脈數或澀熱重葳蕤湯去川芎加香豉三錢入房汗出中風嗽而面赤內經謂之內風脈浮緊小青龍脈沉緊真武湯飲酒中風多汗而嗽謂之漏風桂枝湯加澤瀉朮麻黃根水腫脈浮自汗喘嗽便祕小青龍加葶藶木香喘嗽脈沉畏寒生料濟生腎氣丸煎服有先傷風咳嗽未除更傷於熱而咳嗽聲嘶者為熱包寒葳蕤湯加減有素咳嗽人更感於寒而咳嗽聲啞者為寒包熱金沸草散去芍藥加石膏不應用越婢湯熱嗽失音多服寒劑聲愈不出者古今録驗續命湯發之輕則消風散去殭蠶蟬蛻加桔梗薄荷以生薑汁調服冷熱嗽失音尤宜夏月嗽而發熱者小柴胡加石膏知母但手足心熱而不發熱者瀉白散加橘紅桔梗不應涼膈散去硝黃加葳蕤蜂蜜傷熱而嗽者脈數煩渴引飲咽喉干痛鼻出熱氣喉聲不清咳唾稠黏其痰屢咳而難出色黃且濃或帶血縷或出血腥臭或堅如蜆肉不若風寒之嗽痰清而白也葳蕤湯風熱相兼加減蔥白香豉湯凡咳嗽面赤胸腹脅常熱惟手足乍有涼時其脈洪者熱痰在膈上也小陷胸湯感濕嗽者脈細而緩身體重著骨節煩疼或自汗或小便不利麻黃加朮湯有一嗽痰即出者胛濕勝而痰滑也有連嗽十數聲痰不即出者肺燥勝而痰澀也咳而無痰者以甘寒潤其肺痰多致嗽者以辛平燥其脾形盛自汗脈緩體重嗜臥之人咳者脾濕勝也二陳加防己黃耆白朮之類兼食積痰垢壅塞不利者千緡湯蕩滌之兼食積痰氣蘊釀火邪者二陳加枳朮黃連消導之秋深傷熱咳嗽而灑淅惡寒發熱者千金麥門冬湯但嗽無寒熱痰不得出極力咯之乃得一絲黏痰者千金五味子湯咳而無聲者肺氣傷而不清乃痰鬱火邪在中不能上出此肺燥也桔梗湯加貝母葳蕤蜜炙枇杷葉潔古云咳而無痰者以辛甘潤其肺蜜煎薑橘蜜燒連皮胡桃虛人當用人參同蜜燒胡桃不時細嚼或二味煎服最妙即觀音應夢散久嗽聲颯者古法用酥蜜膏今改用生地黃煎取辛以潤之咳嗽聲啞氣促滿悶語聲不出者心包火盛而肺氣受傷也古法用通聲膏今改用千金地黃煎取潤以泄之蓋聲颯雖云金實不鳴久嗽多緣肺氣枯稿是當清潤為主實則二陳桔薄葳蕤蜜煎薑橘之類枯則生脈二冬款冬竹茹亦加蜜煎薑橘又當詳形氣之肥瘠時令之寒喧而為施治聲啞須分暴久暴多寒鬱熱邪而肺絡壅塞久多熱傷肺痿而真氣受傷壅則麻杏甘石苓半薑橘等隨微甚以搜滌之傷則異功生脈保元參脈證以培養之若風熱心煩咳喘便祕脾胃熱壅食不下者千金地黃煎主之不可拘於成則而廢活法也若喘咳失血聲颯音啞食少便泄之金破不鳴岐彭不能圖治也其生薑治咳嗽聲啞惟暴嗽寒鬱肺氣不通者為宜若久嗽熱傷肺氣而喑者雖二冬二母二地黃芩花粉等寒涼斂肺為之禁劑而麻杏辛桂辛散耗氣亦為戈戟其訶子五味酸澀固氣尤須慎詳壅嗽聲重痰稠或咳有血以薄荷生胡麻各一撮細嚼煎蘇子降氣湯送下七情飢飽嗽動傳臟腑正氣致邪上逆結成痰涎肺道不利四七湯加杏仁五味人參阿膠麥冬勞心思慮心血耗散人每有思慮則心火上乘必發乾咳此為神傷雖服藥亦難取效以歸脾湯加麥冬五味作膏蜜收其木香或減半或換砂仁另為細末離火加入不時滋養方妙大抵乾咳乃燥氣乘肺屬火鬱證乃痰鬱火邪在肺先用逍遙散加苦桔以開之後用六味丸加五味以補之不已則成勞此證不得志者有之咳嗽痛引肩背雖久不已不可誤認為虛此屬三焦鬱火加味逍遙散濁痰加味導痰湯如咳而脅痛宜疏肝氣枳殼煮散或去川芎加青皮柴胡香附薑汁之屬肥盛氣實者二陳湯加白芥子火熱咳嗽喉啞痰濃或大便祕結者涼膈散加桔梗凡內傷氣虛不能上輸於肺而時嗽時止其人黃白少神脈亦虛微少力補中益氣去升麻加煨葛根麥冬五味或兼腎水不足前湯送下都氣丸咳嗽痰中見血而脈細者此火邪傷血分也歸脾湯若痰中微有少血或血絲此肝血傷也補中益氣去升麻加白芍丹皮前後心脹喉中有血腥氣氣口脈澀此膈間有蓄血也試法呷熱薑湯作厄者瘀血也犀角地黃湯加童便桃仁大黃攻散之或平胃合越鞠加韭汁童便消伐之氣竭肝傷而咳嗽血腥者四烏鰂骨一蘆茹丸內傷瘀積在胃不時吐血者其人面色稿而滯脈多弦澀當先與百勞丸去瘀後用異功六君調補有兼停飲食而咳須用消化之方不可用烏梅粟殼酸澀藥其寒邪未除宜用發散之劑不可便用補藥咳嗽而面白悲嚏或咳白痰白沫屬肺胃虛寒若胸脅逆滿牽引背痛心腹冷痛飲食即吐者溫肺湯口甘涎沫流脈沉弦細遲屬中寒口出清水心下汪洋作嘈雜胸脅脹痛不食屬冷飲停於胃中攻肺則咳半夏溫肺湯兼蘆吸散亦妙嗽而聲喑氣乏寒從背起口中如含冰雪甚則吐血此肺氣不足胃氣虛寒也千金補肺湯嗽而聲啞脈細者屬寒宜半夏生薑細辛以辛散之如飲冷熱酒傷肺致嗽謂之湊肺或兼煎爆傷胃咳嗽咽癢痰多唾血喘急脅痛不得安臥改定紫菀茸湯咳嗽嘔吐並作為肺胃俱病先安胃氣二陳加蘆根薑汁薑製枇杷葉虛者六君子加桔梗有咳嗽吐痰與食俱出者此飲食失節脾氣不利清濁相干二陳加枳朮杏仁細辛有食積痰嗽發熱其人面青白黃色不常面上有黃白紋痕者二陳加香附枳殼曲糵食積發熱加薑汁炒川連停寒食作嗽加炮薑嗽而得食即緩者脾虛也異功散有痰六君子外感咳嗽與陰虛咳嗽尤宜辨晰外感咳嗽則聲盛而濁先緩後急日夜無度痰涎稠黏而喘急陰虛勞嗽則聲怯而稿先急後緩或早甚或暮甚清痰少氣而喘乏也陰虛脈弦而數或細數或澀證兼盜汗下午作寒熱面色純白兩頰赤多清痰乾咳者勞也屬陰虛火盛夜服六味丸晨服異功散久嗽之人發散清肺俱不應胸膈不利咳唾膿血坐臥不寧語言不出者將成肺痿之候也紫菀散肺熱頓嗽肌膚灼熱面赤如醉者紫菀膏微利之治嗽須分新久虛實如久嗽脈弱或雖洪大按之不鼓屬肺虛宜門冬五味子款冬紫菀之類斂而補之酒色過度虛勞少血津液內耗心火自炎致令燥熱乘肺咯唾膿血上氣涎潮其嗽連續不已加以邪客皮毛入傷於肺而自背得之尤速當與炙甘草湯或黃耆建中加丹皮蓋丹皮辛香調和營氣治無汗骨蒸故陰虛人解表以丹皮為嚮導好色之人元氣素弱咳嗽不愈喉中血腥腸中隱痛瓊玉膏不應加減八味丸久服乃效有暴嗽諸藥不效服生料鹿茸丸即愈此乃腎虛所致不可以暴嗽而疑遽補之非有便溺如常飲食不妨而咳嗽不安或兼血腥年久不愈者此肺胃虛熱也異功散加丹皮山藥有肺胃虛弱咳嗽喘促或時吐血衄血自汗盜汗者門冬清肺飲勞嗽即火鬱嗽因火傷迫遂成郁遏脹滿一邊不得眠者難治咳嗽吐粉紅痰謂之吐白血僅可綿延歲月若血色正赤如朱濃厚如漆為守藏血不治有經年纍月久嗽服藥不瘥余無他證此是風寒客邪久伏肺胃也與勞嗽不同三拗湯佐以千緡湯瘦人多火禁用若飢時胸中大痛唇面上有白點如粞咽喉或癢或痛而咳不可忍脈極數或忽大忽小此必肺中有寸白蟲飢則蟲上求食痛嗽不寧也一味百部熬膏略加檳榔烏梅上半日嗽多屬胃中有火竹葉石膏湯降泄之胃氣虛者補中益氣或五味異功並加山梔午後嗽多屬陰虛六味丸加麥冬五味以斂之黃昏嗽者火浮於肺不宜用涼藥都氣丸斂而降之五更嗽甚者胃中有食積也二陳湯加枳實川連以消導之虛者六君子加薑汁炒川連增補素問五臟六腑咳治例肺咳千金五味子湯去續斷地黃赤小豆加麥門冬葳蕤細辛心咳涼膈散去硝黃加黃連竹葉肝咳枳殼煮散去芎防加肉桂橘紅蘇子脾咳六君子湯加枳殼桔梗腎咳都氣丸加麥門冬人參胃咳異功散加蜀椒黃連烏梅膽咳小柴胡湯加蘆根汁大腸咳補中益氣湯去升麻加桔硬小腸咳桔梗湯加人參茯苓橘紅五味膀胱咳五苓散加人參三焦咳局方七氣湯加黃連枳實久嗽服藥不應可用熏法款冬花將蜜拌潤焙乾入有嘴壺中燒吸煙咽之若胸中悶舉起頭以指掩定煙稍間再吸杏仁散肺中風熱然肺實有火因風寒者為宜桑皮瀉肺氣然性不純良虛寒者當戒補肺多用生薑以其辛能發散也栝蔞仁甘能潤肺寒能降火治熱嗽之要藥陰虛血虛者勿用以其能作嘔作瀉也咳而吐痰膺乳痛當看痰色如何若濃濁如膿或帶血絲而臭當從肺癰例治之診咳嗽之脈浮為風緊為寒洪數為熱濡細為濕寸關澀難而尺內弦緊為房勞陰虛右關濡大為飲食傷脾左關弦數為疲極肝傷右寸浮短為傷肺遲澀肺寒咳嗽洪滑為多痰弦澀為少血肺脈微急咳而唾血脈或沉或浮聲不損者易治脈來洪數形瘦面赤腎臟氣衰不能上循於喉而聲啞者難療亦有肺絡支塞而聲啞者不在此例暴病咳嗽睡臥不下為肺脹可治久病喘嗽左側不能臥者為肝傷若精力未衰者可治右邊不能臥者為肺損無問新久皆不可治久嗽脈弱者生實大數者死咳而脫形身熱脈小堅急以疾為逆不出十五日死咳脫形身熱脈疾不過五日死咳溲血形肉脫脈搏者死咳嘔腹脹且飧泄其脈絶不及一時而死咳嗽形羸脈形堅大者死沉緊及伏匿者死浮直者可治浮軟者易治咳而嘔腹滿泄瀉脈弦急欲絶者死久嗽數歲其脈弱者可治實大數者死其脈虛者必苦冒其人本有支飲在胸中故也治屬飲家石頑療吳江邑侯華野郭公仲秋喘嗽氣逆診之兩尺左關弦數兩寸右關澀數弦者腎之虛澀者肺之燥夏暑內伏肺絡遇秋燥收之令而發為咳嗽也診後公詳述病情言每歲交秋則咳連發四載屢咳痰不得出則喘至夜坐不得臥咳劇則大便枯燥有血先曾服令高徒施元倩越婢湯嗽即稍可數日間堂事勞心復咳如前時元倩歸苕松陵諸醫治之罔效因求洞垣之鑑起我沉疴答曰公本東魯腎氣素強因水虧火旺陰火上爍肺金金燥不能生水所以至秋則咳咳劇則便燥有血肺移熱於大腸之明驗也合用千金麥門冬湯除去半夏生薑之辛燥易以葳蕤白蜜之甘潤藉麻黃以鼓舞麥冬生地之力與越婢湯中麻黃石膏分解互結之燥熱同一義也郭公曰松陵諸醫咸詆麻黃為發汗之重劑不可輕試僅用杏仁蘇子甘桔前胡等藥服之其咳轉甚何也答言麻黃雖云主表今在麥門冬湯中不過藉以開發肺氣原非發汗之謂麻黃在大青龍湯麻黃湯麻杏甘石湯方其力便峻以其中皆有杏仁也杏仁雖舉世視為治嗽之通藥不問虛實渾用然辛溫走肺最不純良耗氣動血莫此為甚熬黑入大陷胸丸佐甘遂等搜逐結垢性味可知公首肯以為然連進二劑是夜便得安寢次早復診其脈之弦雖未退而按之稍耎氣口則虛濡乏力因與六味生脈加葳蕤白蜜作湯四服其嗽頓減郭公復云向聞元倩有言六味八味丸中不可雜用參術而先生居之不疑用之輒應其義云何答曰六味為填補真陰藥與人參同用原非正理此兼麥冬五味緣合肺腎金水相生當無留中戀膈之慮善後之策即以此方制丸三時恆服不徹至秋庶無復嗽之虞先是公子柔痙豫用桂枝湯及六味作湯咸加蠍尾服之而瘥其後夫人素有敗痰失道左右兩脅俱有結塊大如覆杯發則咳嗽喘逆腹脅掣痛六脈止促而按之少力余用六君子加膽星枳實香附沉香二劑服之大吐稠痰結垢一二升因嘔勢太甚甲夜渡湖速往黎明至暑候之嘔止嗽寧脈息調勻不必更進他藥矣江右督學何涵齋媳內翰範秋濤女素常咳嗽不已痰中間有血點恆服童真丸不徹秋濤歿後哀痛迫切咳逆倍常而痰中雜見鮮血因與瑞金丹四服仍以童真丸烏骨雞丸調補而安又治通政勞書紳太夫人年五十餘素稟氣虛多痰數日來患風熱咳逆咳甚則厄厄欲吐且宿有崩淋近幸向安法當先治其咳因以桔梗湯加葳蕤白薇丹皮橘皮蜜煎生薑四劑撤其標證次與六君子加葳蕤以安其胃氣繼進烏骨雞丸方療其固疾而夫人以久不茹腥不忍傷殘物命改用大溫經湯加麋茸角䚡作丸藥雖異而功則一也肺痿肺脹金匱云問曰熱在上焦者因咳為肺痿肺痿之病從何得之師曰或從汗出或從嘔吐或從消渴小便利數或從便難又被快藥下利重亡津液故得之曰寸口脈數其人咳口中反有濁唾涎沫者何師曰為肺痿之病若口中辟辟燥咳即胸中隱隱痛脈反滑數此為肺癰咳唾膿血脈數虛者為肺痿數實者為肺癰兩手寸口原為手太陰肺脈此云寸口脈數云滑數云數虛云數實皆左右三部統言也其人咳口中反有濁唾涎沫頃之遍地者為肺痿言咳者口中不幹燥也若咳而口中辟辟燥則是肺已結癰火熱之毒出見於口咳聲上下觸動其癰胸中即隱隱而痛其脈必見滑數有力邪氣方盛之徵也數虛數實之脈以之分別肺痿肺癰是則肺痿當補肺癰當瀉隱然言表肺痿吐涎沫而不咳者其人不渴必遺尿小便數所以然者以上虛不能制下故也此為肺中冷必眩多涎唾甘草乾薑湯以溫之若服湯已渴者屬消渴肺熱則膀胱之氣亦熱小便必赤澀而不能多若但吐涎沫而不咳復不渴反遺尿而小便數者明非熱在上焦之肺痿亦非重亡津液之所致必繫上焦虛冷不能制下以故小便無所收攝耳此為肺中冷陰氣上逆侮其陽氣故必眩陰寒之氣凝滯津液故多涎唾宜與甘草乾薑湯之甘辛以溫其脾肺也若始先不渴服溫藥即轉渴者明是消渴飲一溲二之證消渴又與癰疽同類更當消息之矣喻嘉言曰肺痿其積漸已非一日其熱不止一端總由胃中津液不輸於肺肺失所養轉枯轉燥然後成之於是肺火日熾肺熱日深肺中小管日窒咳聲以漸不揚胸中脂膜日乾咳痰艱於上出行動數武氣即喘鳴衝擊連聲痰始一應金匱治法非不彰明但混在肺癰一門況難解其精意大要緩而圖之生胃津潤肺燥下逆氣開積痰止濁唾補真氣以通肺之小管散火熱以復肺之清肅如半身痿廢及手足痿軟治之得法亦能復起雖云肺病近在胸中呼吸所關可不置力乎然肺癰屬在有形之血血結宜驟攻肺痿屬在無形之氣氣傷宜徐理兼潤肺燥然肺雖燥而多不渴勿以其不渴而用燥熱之藥此辨證用藥之大法也肺痿涎唾多心中溫溫液液者炙甘草湯主之此外臺法也肺痿虛寒羸瘦緩弱戰掉噓吸胸滿千金生薑溫中湯肺痿咳唾涎沫不止咽燥而渴千金生薑甘草湯肺痿咳嗽有痰午後熱並聲嘶者古法用人參養肺湯今改用紫菀散加丹皮薑棗心火克肺傳為肺痿咳嗽喘嘔痰涎壅盛胸膈痞滿咽喉不利者古法用人參平肺湯今改用紫菀散加葳蕤橘紅薑棗肺痿咳嗽不已往來寒熱自汗煩渴者古法用知母茯苓湯今改用紫菀散加知母銀州柴胡薑棗蓋咳嗽聲嘶咽喉不利皆是火鬱痰滯必用生薑之辛以散之然須蜜制藉甘以潤之此標本兼該之義也劉默生言痿本虛燥總不離壯水清金滋補氣血津液消痰止嗽宜天冬麥冬生地熟地知母人參葳蕤紫菀為主痞結去天冬生地加橘紅蘇子泄瀉去天冬生地知母加山藥茯苓並用固本丸不時噙化肺痿咳嗽痰中有紅絲盜汗發熱熱過即冷飲食減少者劫勞散虛勞肺痿失音咳唾腥血稀痰或面上生瘡人參蛤蚧散丹方治肺痿每日用人參細末一錢入豬肺管內砂鍋中煮爛加蔥酒服效肺痿咳唾咽燥欲飲水者自愈張口短氣者危咳而口中自有津液舌白苔滑此為肺寒甘草乾薑湯肺痿屬熱如咳久肺癟喉啞聲嘶咯血此屬陰虛多不可治肺痿六脈沉澀而急或細數無神脈口皮膚枯乾而氣高息粗者死金匱云上氣喘而躁者屬肺脹欲作風水發汗則愈肺脹而發其汗者即內經開鬼門之法一汗而令風邪外泄於肌表水無風戰白順趨而從下出也咳而上氣此為肺脹其人喘目如脫狀脈浮大者越婢加半夏湯主之肺脹咳而上氣煩躁而喘脈浮者心下有水氣小青龍加石膏湯主之接二方分治肺脹皆以其脈浮當從汗解之例越婢方中有石膏無半夏小青龍方中有半夏無石膏觀二方所加之意全重在半夏石膏二味協力建功石膏清熱藉辛溫亦能豁痰半夏豁痰藉辛涼亦能清熱也觀麥門冬湯方中下氣止逆全藉半夏入生津藥中此二方又藉半夏入清熱藥中仲景加減成方無非生心化裁後學所當神往矣上氣面浮腫肩息其脈浮大不治又加利尤甚上氣之候而至面目浮腫喘息動肩是肺氣壅逼上而不下加以脈浮大氣方外出無法可令內還而下趨故云不治也加利則上下交爭更何以堪肺脹而咳左右不得臥此痰挾瘀血礙氣而脹當歸丹皮赤芍桃仁枳殼桔梗半夏甘草竹瀝薑汁如外邪去後宜半夏海石香附栝蔞甘草為末薑汁蜜調噙之喻嘉言治施眉蒼肺痿喘嗽吐清痰肢體痿軟不能舉動脈來虛數以蛤蚧二十枚酒浸酥炙人參黑參各十兩蜜丸時噙化不終劑而痊石頑治陸去非肺痿聲颯吐痰午後發熱自汗左脈細數右脈虛濡平昔勞心耽色所致先與生脈散合保元湯次與異功散加黃耆並加薑棗與都氣丸晨夕兼進調補半月而熱除痰止月餘方得聲清又治孫起柏肺脹服耗氣藥過多脈浮大而重按豁然飲食不入幸得溺清便堅與局方七氣每劑用人參三錢肉桂半夏曲炙甘草各一錢生薑四片四劑霍然蓋肺脹實證居多此脈虛大不當以尋常論也又治一尼肺脹喘鳴肩息服下氣止嗽藥不應漸至胸腹脹滿脈得氣口弦細而澀此必勞力氣上誤飲冷水傷肺肺氣不能收斂所致也遂與越婢湯減麻黃加細辛葶藶大瀉肺氣而安又治一酒客嚴冬醉臥渴飲冷茶肺脹喘嗽脈得氣口沉緊搏指與小青龍去芍藥加葶藶半夏一劑而痊則知肺脹喘滿當以葶藶為嚮導也肺癰金匱云問曰病咳逆脈之何以知為肺癰當有膿血吐之則死其脈何類師曰寸口脈微而數微則為風數則為熱微則汗出數則惡寒風中於衛呼氣不入熱過於營吸而不出風傷皮毛熱傷血脈風舍於肺其人則咳口乾喘滿咽燥不渴多唾濁沫時時振寒熱之所過血為之凝滯蓄結癰膿吐如米粥始萌可救膿成則死肺癰之脈既云滑數此復云微數者非脈之有不同也滑數者已成之脈微數者初起之因也初起以左右三部脈微知衛中於風而自汗左右三部脈數為營吸其熱而畏寒然風入衛尚隨呼氣而出不能深入所傷者不過在於皮毛以漸舍肺俞而咳唾振寒茲時從外入者從外出之易易也若夫熱過於營即隨吸氣深入不出而傷其血脈矣衛中於風得營中之熱留戀固結於肺葉之間乃致血為凝滯以漸結為癰膿是則有形之敗濁必從瀉肺之法而下驅之安在始萌不救聽其膿成而致肺葉腐敗耶咳逆上氣時時唾濁坐不得眠皂莢丸主之火熱之毒結聚於肺表之裡之清之溫之曾不少應堅而不可攻惟此無堅不入聿成蕩滌之功不可以藥之微賤而忽諸若因外感所觸而成當取用千金桂枝去芍藥加皂莢湯最佳足可補仲景之未逮也咳而胸滿振寒脈數咽乾不渴時吐濁唾腥臭久久吐膿如米粥者為肺癰桔梗湯主之此上提之法也癰結肺中所以濁唾腥臭乘其新造未固提而出之如其勢已入里又當引之從胃入腸此法殊不中用矣所以宋人附以十六味桔梗湯兼合葶藶瀉肺之意外內合邪之治也肺癰喘不得臥葶藶大棗瀉肺湯主之此治肺癰吃緊之方也肺中生癰不瀉其肺更欲何待然日久癰膿已成瀉之無益日久肺氣已索瀉之轉傷惟血結而膿未成當亟以瀉肺之法奪之若一身面目浮腫鼻塞清涕出為表證未罷當先與小青龍湯一劑後乃服之石頑曰肺癰危證乘初起時極力攻之庶可救療金匱特立二方各有主見如患人平昔善飲嗜啖痰濕漸漬於肺宜皂莢丸肥盛喘滿多痰宜葶藶大棗瀉肺湯千金補所不足復立桂枝去芍藥加皂莢湯以治風寒客邪感觸發熱之證葦莖湯以治心脾過勞肺氣不化水道不利之疾功效最速宋人又有十六味桔梗湯雖未盡善亦可以備諸治之採用若畏其峻而守王道之方真養癰以待斃耳明眼者辨治宜早也凡咳嗽吐臭稠痰胸中隱痛鼻息不聞香臭項強不能轉側咳則遺尿自汗喘急呼吸不利飲食減少脈數盛而芤惡風毛聳便是肺癰之候蓋由感受風寒未經發越停留肺中蘊發為熱或挾濕熱痰涎垢膩蒸淫肺竅皆能致此慎不可用溫補保肺藥尤忌發汗傷其肺氣往往不救金匱皂莢丸葶藶大棗瀉肺湯千金桂枝去芍藥加皂莢湯葦莖湯宋人十六味桔梗湯俱肺癰專藥初起用葦莖湯此方大疏肺氣服之使濕瘀悉趨溺孔而去一二服即應脈浮表熱加蔥白香豉氣口脈盛加犀角竹茹痰多加貝母蔞仁蛤粉引痛加紫菀白蜜初起咳逆不利二味桔梗湯加貝母紫菀多汗加防己黃耆潰後唾膿血不止葶藶薏苡瀉肺湯隨證加減咳有微熱煩滿胸中塊壘甲錯者千金用合歡皮一味日取掌大一塊煎湯服平昔勞心思慮多鬱火人唾臭痰鮮血此屬陰火但與生料六味丸加麥冬紫菀之類若誤投參耆補氣補火臭痰轉甚者急宜上法加童便服之自清初起疑似未真生大豆絞漿飲之不覺腥氣便為真候大抵聲音清朗膿痰稀澤或間有鮮血飲食知味胸脅不疼或咳則微痛痛在右畔肺之長葉而坐臥得寧形色如常便溺自調者可治若潰後大熱不止時時惡寒胸中隱痛痛在左畔肺之短葉此金氣淺薄潰後最難平復而喘汗面赤坐臥不安飲食無味膿痰腥穢不已者難治若喘鳴不休唇反咯吐膿血色如敗滷滃臭異常正氣大敗而不知痛坐不得臥飲食難進爪甲紫而帶彎手掌如枯樹皮面豔顴紅聲啞鼻煽者不治肺癰初起脈不宜數大潰後最忌短澀脈緩滑面白者生脈弦急面赤者死肺癰已破入風者不治即濃煎蔥白香豉湯頻服之然多不救肺癰丹方初起唾臭痰沫用陳年芥齏汁溫服灌吐最妙一方用荷葉濃煎稍入白蜜不時服之不問已潰未潰皆效又方以豬肺去心竹刀剖去垢沫取接骨木二兩缶器中煮熟淡食日服無間五七日當效潰後排膿用金鯉湯以小活鯉魚去腸垢入貝母末三錢隔水童便煮和汁食之日服一枚皆屢驗然不若薏苡根搗汁燉熱服之其效最捷下咽其臭即解有蟲者蟲即死出薏苡為肺癰專藥然性燥氣滯服之未免上壅不及根汁之立能下奪已潰未潰皆可挽回諸方皆不及也肺癰潰後膿痰漸稀氣息漸減忽然臭痰復甚此餘毒未盡內氣復發必然之理不可歸咎於調理服食失宜也但雖屢發而勢漸輕可可許收功若屢發而痰穢轉甚脈形轉疾者終成不起也喑經云邪入於陰則喑人卒然無音者寒氣客於厭則厭不能發發不能下至其開闔不致故無音失音大都不越於肺然須以暴病得之為邪鬱氣逆久病得之為津枯血稿蓋暴喑總是寒包熱邪或本內熱而後受寒或先外感而食寒物並宜辛涼和解稍兼辛溫散之消風散用薑汁調服緩緩進之或只一味生薑汁亦可冷熱嗽後失音尤宜若咽破聲嘶而痛是火邪遏閉傷肺昔人所謂金實不鳴金破亦不鳴也古法用清咽寧肺湯今改用生脈散合六味丸作湯所謂壯水之主以制陽光也肥人痰濕壅滯氣道不通而聲喑者二陳導痰開滌之一切滋補皆為禁劑至若久病失音必是氣虛挾痰之故宜滋肺腎之化源非生脈散下都氣丸不可凡咽乾聲稿者潤肺為主生脈散合異功散若膈內作痛破瘀為先代抵當丸最妥更有舌喑不能言者亦當分別新久新病舌喑不能言必是風痰為患類中風例治之若肥人舌短不能言或舌根強硬導痰湯為主若久病後或大失血後舌萎不能言大虛挾寒例治之要在臨證審察病因無誤然中風暴病失音多緣少陰真氣久虛而得更兼遺尿五絶證見不可治矣若冬月咳嗽寒痰結於咽喉語聲不出者此寒氣客於會厭故卒然而喑也麻杏甘石湯或古今録驗續命湯選用若失音不語已經發散潤肺而不應者生脈散並童真丸噙化之若咳喘氣促而胸中滿悶聲喑不出者肺胃氣燥不能祛散餘邪也紫菀散主之亦有叫罵聲嘶而喉破失音者十全大補湯若肺氣虛寒為厲風所傷喘咳聲嘶或先傷熱而寒鬱熱邪聲喑不出者千金酥蜜膏又咽痛起於四五日間或因咳劇而得或多稠痰結痰而咽喉上齶腫痛其聲雖啞而尚有音破濁脈大緩而右寸尤甚此熱結於肺也宜用辛涼之劑如桔梗湯加蔥白香豉荊芥薄荷兼有風寒客邪更須桂枝芍藥薑棗膠飴之類並以薑蜜制黃柏噙之慎不可驟用斂降之藥若暴啞聲不出咽痛異常卒然而起或欲咳而不能咳或無痰或清痰上溢脈多弦緊或數疾無倫此大寒犯腎也麻黃附子細辛湯溫之並以蜜製附子噙之慎不可輕用寒涼之劑二證寒熱天淵不可不辨也胎前産後失音另詳本門石頑治西客王如嵩觸寒來蘇忽然喘逆聲喑咽喉疼腫察其形體豐盛而飲啖如常切其脈象浮軟而按之益徑此必寒包熱邪傷犯肺絡也遂以麻杏甘石湯加半夏細辛大劑葳蕤二服喘止聲出但呼吸尚有微疼更與二陳枳桔葳蕤之類調理而安王惟一數年前雖有血證而年壯力強四月間忽患咳嗽服發散藥後痰中見血數口繼服滋陰藥過多遂聲颯而啞時覺胸中氣塞遷延月餘乃兄勤中鼎中邀余往診脈雖沉澀而按之益力舉之應指且體豐色澤絶非陰虛之候因論之曰臺翁之聲啞是金實不鳴良非金破不鳴之比因疏導痰湯加人中黃澤瀉方專一滌痰為務四劑後痰中見紫黑血數塊其聲漸出而颯未除更以秋石兼人中黃棗肉丸服經月而聲音清朗始終未嘗用清理肺氣調養營血藥也飛疇治郭代工午日少食角黍倦怠作瀉曾用消克不效因圊時跌僕即昏迷不省數日後邀豫診視六脈虛微欲脫右臂不能轉動聲喑無聞時有用大黃消克之劑者豫急止之此脾肺虛憊安能任此今縱有合劑恐胃氣告匱烏能行其藥力惟粥飲參湯庶為合宜所謂漿粥入胃則虛者活遂確遵豫言以調之瀉止神寧聲音漸出而蘇能食後亦惟獨參湯調養不藥而愈喘短氣少氣逆氣哮經曰諸病喘滿皆屬於熱寒則息遲氣微熱則息數氣粗咳嗽上氣厥在胸中過在手陽明太陰氣有餘則喘咳上氣不足則息利少氣肺氣虛則鼻塞不利少氣實則喘喝胸盈仰息秋脈不及則令人喘呼吸少氣勞則喘息汗出邪入六腑則身熱不得臥上為喘呼夜行則喘出於腎淫氣病肺有所墮恐喘出於肝淫氣害脾有所驚恐喘出於肺淫氣傷心渡水跌僕喘出於腎與骨肝脈若搏因血在脅下令人喘逆喘咳者是水氣並陽明也不得臥臥則喘者是水氣之客也起居如故而息有音者此肺之絡脈逆也二陽之病發心脾其傳為息賁者死不治二陽陽明也土不能生金而心火復刑之則肺傷故息上奔而喘乳子中風熱喘鳴肩息者脈實大而緩則生急則死乳子言産後以乳哺子時非嬰兒也戴復庵云有痰喘有氣急喘有胃氣虛喘有火炎上喘痰喘者凡喘便有痰聲氣急喘者呼吸急促而無痰聲胃氣虛喘者抬肩擷項喘而不休火炎上喘者乍進乍退得食則減食已則喘大概胃中有實火膈上有稠痰得食入咽墜下稠痰喘即暫止稍久食已入胃助其濕火痰再升上喘反大作俗不知此作胃虛治治以燥熱之藥者是以火濟火也趙養葵曰喘與短氣分則短氣是虛喘是實然喘多有不足者短氣間有有餘者新病亦有本虛者不可執論也如實喘者氣實脈盛呼吸不利肺竅壅塞右寸沉實宜瀉肺虛喘者先覺呼吸氣短兩脅脹滿右尺大而虛宜補腎此腎虛證非新病虛者乎邪喘者由寒邪伏於肺中關竅不通呼吸不利若寸沉而緊此外感也亦有六部俱伏者宜發散則身熱退而喘定脈出此郁證人所難知非短氣中之有餘者乎又一等似火非火似喘非喘者諸陽氣浮無所依歸故上氣而喘也其人平日若無病但覺氣喘非氣喘也乃氣不歸源也不知者以其有火也誤以涼藥清之以其喘急難禁也又用四磨之類寬之下咽之後似覺稍寬少頃依然豈知寬一分更耗一分矣惟大劑參耆補劑加補骨脂阿膠等以鎮於下後以八味丸加五味鹿茸不時服之又一等火鬱之證六脈俱澀甚至沉伏四肢悉寒甚至厥逆拂拂氣促而喘卻似有餘而脈不緊數欲作陰虛而按尺鼓指此為蓄郁已久陽氣拂遏不能營運於表以致身冷脈微而悶亂喘急當此之時不可以寒藥下之又不可以熱藥投之惟逍遙散合佐金丸之類宣通蓄熱得汗而愈後仍以六味丸養陰和陽可也喻嘉言曰喘病無不本於肺惟兼三陰者為最劇而三陰又以腎為最劇有此證者首重在節欲收攝腎氣不使上攻可也故喘病兼少陰腎者為最劇腎火動則水氣升其次則太陰脾脾火動則濕氣升又次則厥陰肝肝火動則風氣升是故治喘以治火為先也然濁氣既隨火而升火降而氣不降者何耶以濁氣雖居於下而肺之窠囊可以僑寓其中轉使清氣逼處不安是雖以治火為先然治火而不治痰無益也治痰而不治窠囊之痰雖治與不治等也惟薑汁竹瀝可以透窠囊耳李士材曰內經論喘其因衆多究不越於火逆上而氣不降也雖然火則一而虛實攸分每見世俗一遇喘家純行破氣於太過者當矣於不及者可乎余嘗論證因虛而死者十九因實而死者十一治實者攻之即效無所難也治虛者補之未必即效須悠久成功其間轉折進退良非易也故辨證不可不急而辨喘證尤為急也巢氏嚴氏止言實喘獨王海藏云肺氣果盛則清肅下行豈復為喘皆以火爍真氣氣衰則喘所謂盛者非肺氣也肺中之火也斯言高出前古惜乎但舉其端未能縷悉請得其詳而言之氣虛而火入於肺者補氣為先生脈散有痰六君子湯陰虛而火乘金不得臥者壯水為急六味丸虛則合生脈散風寒者解其邪華蓋散濕氣勝者利其水滲濕湯暑邪者滌其煩白虎湯痰壅者消其痰二陳湯氣鬱者疏其鬱四七湯肺脹者散其邪脈浮大者越婢加半夏湯脈浮者小青龍加石膏湯腎虛火不歸源八味丸腎虛水邪泛濫濟生腎氣丸此治喘之大法也喘嗽氣從臍下衝上而尺脈洪盛或數兼見盜汗潮熱屬陰虛六味丸作湯加補骨脂五味子送下靈砂丹誤用四磨必死若作痰治亦危有因氣而喘者遇惱便發脈必沉弦此氣滯其痰也蘇子降氣湯若但喘不嗽不分遠近前湯吞靈砂丹秋冬感寒每夜連嗽不絶大喘至天明方緩脅動痞悶者麻黃蒼朮湯肺虛受寒而喘參蘇溫肺湯寒鬱熱邪而喘中有積痰遇冷即發麻黃定喘湯遠年咳逆上氣胸滿痞塞聲不出者人參定喘湯虛冷上氣勞嗽喘乏千金用半夏一升人參生薑桂心甘草各一兩水煎分三次服喘咳上氣不得臥生薑橘紅人參紫蘇各一錢五味數粒煎服腎與肺胃俱虛喘嗽乏力人參一錢核桃肉三枚連皮蜜炙煎服神驗腎氣上逆而喘用連皮核桃肉三枚生薑三片臨臥細嚼即安七情鬱結上氣喘急四磨湯四七湯選用肥盛多痰喘不得休不能臥人扶而坐數日者千緡湯一服即安或千緡湯合導痰湯尤妙然惟元氣未衰者宜之虛人未可輕試也喘而諸藥不效腹堅脈實者神保丸大便溏者勿用氣實人誤服參耆而喘者三拗湯瀉之但伏不得臥咳逆上氣面目浮腫者古今録驗續命湯氣盛有餘脈來滑實者勿用經年喘嗽遇寒更甚者九寶湯寧嗽化痰湯選用一切喘證屬有餘者治之即愈若屬虛證誤與泄氣禍不旋踵即暴喘腹脹大便實者方可用藥加以溏泄必死勿治此陰火暴逆於手足太陰所以喘脹腎氣失守所以便溏其人雖強不久當嘔血而死診脈宜浮遲不宜急疾喘逆上氣脈數有熱不得臥者難治上氣面浮腫肩息脈浮大者危上氣喘息低昂脈滑手足溫者生脈澀手足寒者死右寸沉實而緊為肺感邪亦有六部俱伏者宜發散大抵喘屬肺中火盛脈浮滑者可治若沉滑為腎虛陰火上逆難治短氣短氣者一屬支飲脈必弦滑平人無寒熱冒眩短氣不足出息者實也金匱云短氣有微飲當從小便去之苓桂朮甘湯主之腎氣丸亦主之仲景並出二方分呼吸之短而治妙義益彰呼氣之短用苓桂朮甘湯以通其陽陽氣化則小便能出矣吸氣之短用腎氣丸以通其陰腎氣通則小便之關門利矣又云咳逆倚息不得臥小青龍湯脹滿者厚朴大黃湯即小承氣湯一屬氣虛東垣云短氣者肺主諸氣五臟之氣皆不足而陽道不行也氣短小便利者四君子去茯苓加黃耆如腹中氣不轉者倍甘草肺氣短促或不足者倍參加白芍使肝膽之邪不敢犯之若失血後陰火上乘而短氣不足以息或腎虛發熱唾痰者生脈散加歸耆生地病後産後一切瘡疽潰後氣虛不能接續及年高病久正氣耗散之人雖有痰火不可作有餘治誤用耗氣之藥禍不旋踵須大劑生脈散為君少佐陳皮扶接元氣為主少氣少氣者氣少不足以言也經曰怯然少氣者是水道不行形氣消索也又云言而微終日乃復言者此奪氣也又云氣虛者言無常也又云脾脈搏堅而長其色黃當病少氣其治法不離獨參湯生脈散保元湯異功散之類逆氣經曰人有逆氣不得臥而息有音者是陽明之逆也足三陽下行今逆而上行故息有音也陽明者胃脈也胃者六腑之海其氣亦下行陽明逆不得從其道故不得臥而息有音也夫起居如故而息有音者是肺之絡脈逆也絡脈不得隨經上下故留經而不行絡脈之病人也微故起居如故而息有音也夫不得臥臥則喘者是水氣之客也夫水者循津液而流也腎者水臟主津液主臥與喘也若四磨湯七氣湯皆治陽明之氣逆杏子湯小青龍湯越婢湯蘇子降氣湯皆治肺絡之氣逆麻黃附子細辛湯腎氣丸靈砂丹皆治腎氣之逆哮哮證多屬寒包熱邪所以遇寒即發喉中水雞聲有積痰在肺絡中必用吐法以提散之不可純用寒涼常須兼帶辛散小青龍湯探吐最妙年高氣弱人忌吐凡喘未發時以扶正氣為主既發時以散邪為主哮喘遇冷則發其法有二一屬中外皆寒溫肺湯鍾乳丸冷哮丸選用並以三建膏護肺俞穴最妙一屬寒包熱越婢加半夏湯麻黃定喘湯表散其邪平時用蘆吸散亦妙古人治寒包熱邪預於八九月未寒之時用滾痰丸下其熱痰後至冬無熱可包則不發矣丹方治冷哮痰喘用胡椒四十九粒入活蝦蟆腹中鹽泥煅存性臥時分三次醇酒服之羸者涼分五七服用之輒效若有伏熱者誤用喘逆倍劇不可不辨冷哮灸肺俞膏肓天突有應有不應夏月三伏中用白芥子塗法往往獲效方用白芥子淨末一兩延胡索一兩甘遂細辛各半兩共為細末入麝香半錢杵勻薑汁調塗肺俞膏肓百勞等穴塗後麻瞀疼痛切勿便去候三炷香足方可去之十日後塗一次如此三次病根去矣遇厚味則發者用萊蔔子炒研一兩豬牙皂莢燒存性三錢共為細末薑汁調蒸餅為丸緑豆大每服五十丸沸湯或枳實湯下名清金丹消其食積則肺胃自清仍當薄滋味以清肺胃之氣傷鹹冷飲食而喘者用白麵二錢砂糖二錢飴糖餅化汁捻作餅子爐內炸熟劃出加輕粉四錢令患人食盡吐出病根即愈年幼體虛者分三四次服之蓋咸哮肺胃受傷白麵砂糖膠飴甘溫戀膈使之留連病所引領輕粉搜滌淤積之痰上湧三湧三補屢建奇功補用五味異功稍加細辛服之醋嗆而嗽甘草二兩中半劈開用豬膽汁五枚浸五日火炙為末蜜丸茶清吞二錢臨臥服之凡哮證見胸凸背駝者此肺絡敗為痼疾不治飛疇治韓順溪內子患喘證月餘服破氣寬胸豁痰清火等藥不效發表利水亦不應其疾轉急稍動則喘難休息診之六脈細數而面赤戴陽用大劑六味地黃作湯加青鉛兩許一服而緩二服而止諸嘔逆門噎膈靈樞云氣為上膈者食飲入而還出蟲為下膈下膈者食晬時乃出食飲入而還出氣壅膈上謂之上膈然有虛實之分若實而氣壅則食無所容虛而氣塞則食不得化皆令人食入即出也至若食晬時乃出蟲寒積聚而謂下膈不過言膈證中有此一證耳然有命門火衰不能生土脾胃虛寒多致食晬時乃出者豈非下膈之證乎讀者不可專以蟲為下膈而膠執也素問云三陽結謂之膈三陽結者大腸小腸膀胱結熱也小腸結熱則血脈燥大腸結熱則後不圊膀胱結熱則津液涸三陽俱結前後祕澀下既不通必反上逆此所以噎食不下從下而逆於上也飲食不下膈塞不通邪在胃脘不通者濁氣在上腎肝吸入之陰氣不得下而反在上也病在於胃故飲食不下膈塞閉絶上下不通則暴憂之病也此言噎膈皆起於鬱結不舒胃氣不能敷布所致張雞峰所謂神思間病是也薛立齋曰內膈嘔逆食不得入是有火也病久而吐食入反出是無火也若脾胃氣虛而胸膈不利者六君子加丁沉二香壯脾土以生元氣若用辛熱之劑而嘔吐噎膈者異功散加當歸川斛益土以抑陰火胃火內膈而飲食不入者四君子加酒炒芩連清火養胃若脾胃虛寒飲食不入或食入反出者六君子加木香炮薑溫中補脾如過服潤劑養血有傷於中州者治法亦無越此若內有實積指迷七氣湯汙血在胃者局方七氣湯加桃仁與乾漆同炒去漆用之若誤服耗氣之藥血無所生噎膈而大便燥結者四君子加當歸芍藥補脾生血若火逆衝上食不得入者四君子加山梔川連清火養血若痰飲阻滯而食不得入者六君子加木香山梔補脾化痰若不慎房勞不節厚味不戒氣怒者不治年高無血亦不治噎而白沫大出糞如羊矢不治胸腹嘈痛如刀割者死期迫矣李士材云噎膈反胃總是血液枯稿二證皆名為膈內經總有三陽結謂之膈一語潔古分吐證為三端上焦吐者皆從於氣食則暴吐中焦吐者皆從於積或先吐而痛或先痛而吐下焦吐者皆從於寒朝食暮吐暮食朝吐大抵氣血虧損復因憂思悲恚則脾胃受傷血液漸耗鬱氣生痰痰則塞而不通氣則上而不下如礙道路飲食難進噎塞所由成也脾胃虛傷運行失職不能熟腐五穀變化精微食雖可入良久復出反胃所由成也二者皆膈間受病故通名為膈也噎塞之吐即潔古之上焦吐反胃之吐即下焦吐也王太僕云食不得入是有火也食入反出是無火也噎膈大都屬熱反胃大都屬寒然亦不可拘也脈大有力嘔吐酸臭當作熱治脈小無力嘔吐清水當作寒醫色之黃白而枯者為虛寒紅赤而澤者為實熱能合色脈庶乎無誤此證之所以疑難者方欲健脾理痰恐燥劑有妨於津液方欲養血生津恐潤劑有礙於中州審其陰傷火旺者當以養血為先脾傷氣虛者當以溫補為主此皆虛實陰陽之辨臨證之權衡也冬三月陰氣在外陽氣內藏外助陽氣不得發汗內消陽火勿令瀉泄此固閉密之大要也夏三月陽氣在外陰氣在內噎病值此時天助正氣而銼其邪氣不治自愈或不愈者陰氣熱盛正氣不升耳四君子湯送開關利膈丸每飲食入胃便吐涎沫如雞子白蓋脾為涎脾虛不能約束津液故涎沫自出非人參白朮訶子益智仁不能攝也古人指噎膈為津液乾枯故水液可行乾物梗塞為稿在上焦愚竊疑之若果津枯何以食才下咽涎隨上湧乎故知膈咽之間交通之氣不得降者皆衝脈上行逆氣所作也惟氣逆故水液不能居潤下之常隨氣逆從耳若以津枯而用潤下之劑豈不反益其邪乎宜六君子加減挾寒脈遲細者加肉桂附子挾熱脈滑數者加枳實黃連若噎而聲不出者加五味子竹茹喉中有一塊食物不下者痰氣也加海石訶子膈間作痛多是瘀血歸尾桃仁韭汁童便甚者加大黃微利之千金方治胸中久寒嘔逆氣上飲食不下結氣不消用五噎丸若飲食不得下手足冷上氣咳逆用五膈丸血稿者地黃麥冬煎膏入藕汁人乳童便蘆根汁桃仁泥和勻細細呷之因火逆而噎梨汁藕汁等分熬膏蜜收不時噙熱咽之有痰加竹瀝因七氣致病而中挾冷熱食積胃氣不和而噎膈者諸七氣湯選用食物下咽屈曲自膈而下梗塞作微痛此汙血在胃口也用四物加韭汁薑汁竹瀝童便驢尿牛羊乳蜂蜜煎膏潤利之後以代抵當丸下之若火盛作嘈痛者忌薑汁胃虛欲嘔吐者忌韭汁犯之必轉劇有冷積結滯者用理中加川烏頭蜀椒川連巴豆霜皂莢末蜜丸涼水送下十五丸暫服五七服後以四君子加黃耆橘紅砂仁調理如大便燥結不時進開關利膈丸二三十丸以微導之丹方治噎膈吐逆不食用啄木鳥去毛熬膏和骨搗爛入麝香一錢蜜收瓷罐盛好晝夜不時嗅之嗅過即蓋勿令散氣以其性善入木專泄肝鬱然在初起時用之輒應若病久元氣稿竭雖服峻補尚難為力況外治乎診脈緊而芤緊則為寒芤則為虛虛寒相搏脈為陰結而遲其人則噎然多有至死脈不變者以胃中痰飲濕熱膠固脈常和軟然細察之必兼弦象也易思蘭治一人膈滿其證胸脅胃脘飽悶臍下空虛如飢不可忍腰腿痠疼坐立戰搖大便燥結每日進清粥一二鍾食下即嘔酸吐水服藥二年不效診之左右寸關俱沉大有力兩尺自浮至沉三候俱緊按之搖擺之狀此氣膈病也須開導其上滋補其下兼而行之遂與越鞠去山梔加連翹桔梗木香侵晨令服八味丸百粒服至半月動履如常喻嘉言治一婦病膈二十餘日飲粒全不入口尺脈已絶不至詢其二便自病起至今從未一通一味痰沫上湧懨懨待盡診得上部有脈下部無脈是吐則未必死也但得天氣下降則地道自通然婦人尺脈全無莫可驗其受孕萬一傷之呼吸立斷用六君子加旋覆花煎調赤石脂末服下嘔即稍定三日後漸漸不嘔又三日後粥飲漸加舉家欣快但病者全不大便刻刻以通利為囑曰臟氣久結食飲入胃不多積之既久自然通透若以歸地潤腸恐滯膈而作嘔硝黃通腸恐傷胎而殞命姑弗其請堅持三五日氣下腸通腹中之孕果漸形著而病全瘳矣又治一人患膈氣粒米不入始吐清水次吐緑水次吐黑水次吐臭水呼吸將絶一晝夜先服理中湯六劑不令其絶來早轉方一劑而安金匱有云噫氣不除者旋覆代赭石湯主之吾於此病分別用之者有二道一者以黑水為胃底之水此水且出則胃中之津久已不存不敢用半夏以燥其胃也一者以將絶之氣止存一系以代赭墜之恐其立斷必先以理中分理陰陽使氣易於降下然後代赭得以建奇奏績乃用旋覆花一味煎湯調代赭石末二匙與之才入口即覺其轉入丹田矣但困倦之極服補藥二十劑將息二月而愈李士材治張孟端夫人憂憤交乘食下輒噎胸中隱隱痛陽脈滑而陰脈搏痰血互凝之象以二陳湯加歸尾桃仁鬱金五靈脂四劑未效因思人參與五靈脂同用善於浚血即以前劑入人參三錢倍用五靈脂再劑血從大便而出十劑噎止彌月而愈又治金元之之內患噎胸腹奇痛經阻醫認瘀血察其脈細為氣衰沉為寒痼況自下及上處處皆痛明非血矣用參耆白朮木香薑桂煎成和醇酒進之甫入口便快服理中湯半月而痛止石頑治朱彥真酒膈嘔逆不食每日惟痛飲熱酒一二觥少頃即作酸嘔出膈間大痛雜治經年不效良由平昔好飲熱酒所致此即丹溪所謂好飲熱酒死血留胃口之候授以人參散方用人參一兩煎成加麝香半分冰片三釐三劑便能進食蓋麝片善散胃口之痰與瘀血耳十劑後改服柏子仁湯半月而安二方出自云岐人多未知每以豫為尚異何可為之辨耶又治沈鍚蕃平昔大便燥結近患噎膈不能安穀者月餘雖素稟豐腴近來面色皎白大非往昔時方穀雨正此證危殆之際始求治於石頑診得六脈沉澀按久則衰幸舉指即應為疏六君子湯下一味狗寶作散調服甫十劑而嘔止食進再十劑而穀肉漸安更十劑起居如故惟是大便尚覺艱難乃以六味丸去澤瀉加歸芍首烏作湯服至月餘便溺自如秋深更服八味丸三月而康大抵噎膈之人體肥痰逆者可治枯癯津衰者多不可治同時有同道王公峻患此稟氣病氣與沈相類誤信方士專力委之而致不起顧人月亦患此證自謂脈急不當用參日服仙人對坐草而斃郭孝聞八月間噎食艱進六脈弦徑搏指延至來春三月告殂然瘦人間有可療者昔秦伯源噎膈嘔逆而形神枯稿神志鬱抑且不能勝湯藥之費豫門人鄒恆友令其用啄木鳥入麝熬膏時嗅其氣以通其結內服逍遙散加香砂以散其鬱不數劑所患頓除厥後海貨行陳君用噎膈亦用此法而愈兩君至今色力尚強又一農人噎膈不食時嘔清涎如赤豆沙水此屬血淤於內可知庸師不審誤用消克破氣藥而致絶粒不食殆所必至其鄰叟憐其貧寠乃述其病苦求救於豫遙擬一方用桂苓飲加當歸桃仁丹皮牛膝用熬枯黑糖和蟅蟲漿調服下溏黑如汙泥者甚多當知農人戮力受傷血鬱於內而致嘔逆但當攻其積血嘔逆自已孰謂治病不求其本而可輕議其藥哉反胃金匱云問曰病人脈數數為熱當消穀引食而反吐者何也師曰以發其汗令陽微膈氣虛脈乃數數為客熱不能消穀胃中虛冷故也脈弦者虛也胃氣無餘朝食暮吐變為胃反寒在於上醫反下之今脈反弦故名曰虛凡脈陽盛則數陰盛則遲其人陽氣既微何得脈反數脈既數何得胃反冷此不可不求其故也蓋脈之數由於誤用辛溫發散而遺客熱胃之冷由於陽氣不足而生內寒醫不達權通變見其脈數反以寒劑瀉其無辜致上下之陽俱損其脈遂從陰而變為弦也上之陽不足日中以前所食亦不消化下之陽不足日暮以後陽亦不入於陰而糟粕不輸於大小腸從口入者惟有從口出而已故曰胃氣無餘言胃中之陽氣所存無幾所以反胃而朝食暮吐也寸口脈微而數微則無氣無氣則營虛營虛則血不足血不足則胸中冷上條以汗下之故而致病脈若此此條以上焦營衛不逮亦致反胃之證故不復敘唯言脈之陰陽本象今微而數微乃失陽之象數乃失陰之體奚止客熱而已胸中者營衛之海營衛虛不統於胸中故胸中冷矣夫營衛之氣出入臟腑健運周身本生於穀復消磨其谷營衛非谷不充谷非營衛不化所以胸中冷者亦必致胃不納穀也雖然當以正氣不足論之若以熱治寒不惟反助客熱且復耗其氣損其陰矣世人治是病非丁附則薑桂孰知正氣為何如哉趺陽脈浮而澀浮則為虛澀則傷脾脾傷則不磨朝食暮吐暮食朝吐宿穀不化名曰胃反脈緊而澀其病難治脾氣運動則脈不澀胃氣堅固則脈不浮今脈浮是胃氣虛不能腐熟水穀脈澀是脾血傷不能消磨水穀所以陽時食入陰時反出陰時食入陽時反出蓋兩虛不相參合故莫由轉輸下入大小腸也河間謂趺陽脈緊內燥盛而中氣衰故為難治可見浮脈病成必變緊脈也況緊而見澀明是亡血之象上脘亡血膈間乾澀食不得入下脘亡血必並大小腸皆枯食不得下故難治也嘔而脈弱小便復利身有微熱見厥者難治四逆湯主之谷入於胃長氣於陽脈道乃行今胃不安於谷而成嘔嘔則陰氣不資於脈故脈弱弱則陽氣虛不能充於內外下焦虛則小便自利上焦虛則濁氣上升逼迫其浮陽於外外雖假熱內實真寒證成厥逆頃刻決離而不返矣治之誠難非四逆湯不能挽回也諸嘔吐谷不得下者小半夏湯主之諸嘔吐谷不得下指暴病嘔吐而言故以半夏生薑滌除胃中痰飲水穀自無阻礙矣胃反嘔吐者大半夏湯主之胃反嘔吐為脾胃氣虛而飲積故用半夏之燥濕即兼人參以補胃氣也蜜者性滯滋濕用之何哉以胃之上脘燥故食難入雖食亦不得下中脘用之以潤胃燥揚之水者佐蜜以潤上脘之燥也胃反吐而渴欲欲水者茯苓澤瀉湯主之胃反吐津液竭而渴也欲飲水以潤之無小便不利而用澤瀉何哉觀外臺以此治消渴脈絶胃反嘔食則知水雖入而不散於脈脈之陰體絶矣澤瀉者不惟利膀胱之溺亦能引桂薑之辛入膀胱行布水精於五經故凡渴欲飲水者多用行水之劑豈獨防其水停而已哉正欲行水布散經脈滋潤表裡解其熱鬱耳茯苓之淡行其上澤瀉之咸行其下白朮甘草之甘布其中桂薑之辛開其道通其氣導其水以令四布而和營衛也反胃系真火式微胃寒脾弱不能消穀朝食暮吐暮食朝吐或一兩時而吐或積至一日一夜腹中脹悶不可忍而復吐雖曰脾胃虛寒然致病之由必有積滯於內千金治反胃初起用金匱茯苓澤瀉湯去白朮換乾薑加人參橘皮大黃青竹茹得利去大黃為胃虛反食下喉便吐之主方若吐出原物酸臭不化此飲食入胃既抵胃之下脘復返而出也宜理中湯為主甚則加丁附川連若脈數而邪熱不殺穀乃火性上炎多升少降應與異功散加沉香川連歸芍生地食物之後冷涎不已隨即反出或心腹覺疼藿香安胃散或六君子加丁者藿香咽喉阻塞胸膈滿悶暫用香砂枳朴以開其結滯然破氣藥過多中氣因而不運異功散加香砂使氣旺自能運化氣滯痞塞實痛平胃散加藿香砂仁胃虛中氣不運而噎塞者四君子加黃耆橘紅砂仁反胃而渴欲飲水金匱茯苓澤瀉湯千金去白朮生薑加半夏小便不利桂苓丸加半夏澤瀉甘草生薑作湯服虛人反胃多渴七味白朮散反胃食入一日半日吐出如故乃胃氣虛弱而有痰不能消化隨氣逆上也二陳加丁香藿香雞內金虛加白朮炮薑大便燥結久閉不通似屬血熱不可頓攻止可清熱潤燥小制湯丸漸次加之關扃自透開關利膈丸然服通利之劑過多血液耗竭轉加閉結者宜用人參固本丸料煎膏時時服之胃反上氣食即吐出屬熱者千金用蘆根茆根等分煎服不應加竹茹生薑反胃倦怠無力垂死者以人參一二兩濃煎加薑汁頓服屬寒者加桂附少許下焦虛寒不能生土食久反出用附子一枚切去尖上一片鏤成一孔入丁香四十九粒仍將切下者掩上扎定搗取生薑自然汁煮熟焙乾為末每用一匙置舌上徐徐以津唾送下若煩渴則頻與糜粥忌油膩生冷此孫兆祕傳纍效虛甚者加人參一兩駕馭之鬱悒失意人或孤寡初起自當舒郁逍遙散久之必兼補養歸脾湯命門火衰不能生土食久反出其脈沉遲八味丸加丁沉間進黑錫丹精衰不能蒸騰於上咽喉閉塞水穀艱進強食則吐者六味丸加肉桂五味不應加沉香砂仁有陽虛不能統運嘔逆便祕用人參大黃附子攻之即通然真氣竭者終不可救瘀血在膈阻滯氣道而成者代抵當丸作芥子大服二錢去枕仰臥細細咽之但飲熱湯及椒薑輒厄者即瘀血也反胃而胸中嘈雜不寧或作或止其人懊憹面上有白點者作蟲積治之丹方治噎膈反胃用虎䐗酥炙為末每服二錢獨參湯送下或貓胞一具炙脆為末稍加腦麝陳酒服之虎啖生人貓食生鼠其性則一故可代用若胃中寒痰不能納食者狗寶為末每服五七分至一錢陳酒服之以上三方輕者一服重者三服劇者不過七服後以理中四君八味等調之又方用陳香櫞一枚去瓤入生薑汁拌生附子末一兩外以薑滓濕紙裹煨耎透焙燥為末每服五七分至一錢濃煎獨參湯服之此孫兆變法也反胃初愈切不可與粥飲每日與獨參湯少加炒陳米不時煎服旬日後方可小試稀糜往往即食飯者多致復病而危凡反胃而致大吐白沫如雞子清者是肺胃俱虛矢如羊糞則大腸血稿即大補氣血終亦必亡而已診胃反脈數無力為血虛脈緩無力為氣虛數而有力為有熱數而滑疾為有痰緊而滑者寒飲上逆小弱而澀血虛胃反寸緊尺澀其人胸滿不能食而吐吐止者為下之故不能食設言未止者此為胃反故脈微澀滑伯仁治一婦反胃每隔夜食至明晚皆吐出不消其脈沉而弱他醫以暖胃藥罔效滑遲疑未決一日讀東垣書謂反胃有三氣積寒也上焦吐者從於氣中焦吐者從於積下焦吐者從於寒脈沉而遲朝食暮吐暮食朝吐小溲利大便祕為下焦吐也法當通其祕溫其寒復以中焦藥和之滑得此説遂以萸茴丁桂半夏二十餘劑而安所謂寒淫所勝平以辛熱也石頑治湯伯乾子年及三旬患嘔吐經年每食後半日許吐出原物全不穢腐大便二三日一行仍不燥結渴不喜飲小便時白時黃屢用六君子附子理中六味丸皆罔效日濱於危逮後延余診之其兩關尺弦細而沉兩寸皆澀而大此腎臟真陽大虧不能溫養脾土之故遂以崔氏八味丸與之或謂附子已經服過二枚六味亦曾服過恐八味亦未能克效也余曰不然此證本屬腎虛反以薑附白朮伐其腎水轉耗真陰至於六味雖曰補腎而陰藥性滯無陽則陰無以生必於水中補火斯為合法服之不終劑而愈嘔吐噦乾嘔漏氣走哺嘔苦中酸吐酸嘔水吐沫吐蛔經云諸逆衝上皆屬於火諸嘔吐酸皆屬於熱胃熱則嘔寒氣客於腸胃厥逆上出故痛而嘔也人之噦者谷入於胃胃氣上注於肺今有故寒氣與新穀氣俱還入於胃新故相亂真邪相攻氣並相逆復出於胃故為噦病深者其聲噦金匱云病人欲吐者不可下之欲吐者陰邪在上也若下之不惟逆其陽氣反傷無故之陰變害莫測豈獨反胃而已嘔而胸滿者吳茱萸湯主之傷寒論用是方治食谷欲嘔之陽明證以中焦有寒也茱萸能治內寒降逆氣人參補中益陽大棗緩脾生薑發胃氣且散逆止嘔逆氣降胃之陽行則胸滿消矣此脾藏陰盛逆胃與夫肝腎下焦之寒上逆於中焦而致者即用以治之故乾嘔吐涎沫頭痛亦不出是方也嘔而腸鳴心下痞者半夏瀉心湯主之是證由陰陽不分塞而不通留結心下為痞於是胃中空虛客氣上逆為嘔下走為腸鳴故用是湯分解陰陽水升火降則留者散虛者實也嘔吐而病在膈上後思水者解急與之思水者豬苓散主之嘔而思水者水飲逆於胸中也故用豬苓之味淡從膈上滲其所積之飲更以白朮利水生津使水精四布而嘔自除矣嘔而發熱者小柴胡湯主之嘔而發熱邪在半表半裡逆攻而上也雖非傷寒之邪而病勢則一故即以小柴胡湯和之食已即吐者大黃甘草湯主之胃素有熱食復入之兩熱相沖不得停留用大黃下熱甘草和胃按仲景既云欲吐者不可下又用大黃甘草湯治食已即吐何也曰欲吐者病在上因而越之可也逆之使下則必憒亂而益甚既吐矣吐而不已有升無降當逆折之使其下行故用大黃丹溪云凡病吐者切不可下近於困矣吐後渴欲得水而貪飲者文蛤湯主之汗出即愈兼主微風脈緊頭痛是方即大青龍湯無桂枝有文蛤大青龍主發散風寒兩感今是證初不言外邪而用取汗何哉蓋因陽明經中有實熱所以貪飲故用麻黃杏仁開發腠理甘草薑棗調和營衛石膏解利鬱熱文蛤直入少陰散水止渴為太陽少陰二經散邪滌飲之聖藥故又主微風脈緊頭痛之疾乾嘔噦若手足厥者橘皮湯主之乾嘔而噦手足厥逆乃胃中陽氣為痰飲阻塞不得流布四末故用橘皮生薑之辛以開痰利氣也噦逆者橘皮竹茹湯主之中焦氣虛則下焦之風木得以上乘穀氣因之不宣變為噦逆用橘皮升降中氣人參甘草補益中焦生薑大棗宣散逆氣竹茹以降膽木之風熱耳乾嘔吐逆吐涎沫半夏乾薑湯主之乾嘔吐逆吐涎沫者由客邪逆於肝脾寒主收引津液不化遂聚為涎沫用半夏乾薑之辛溫中燥濕漿水之酸收而行之以下其逆也蛔蟲之為病令人吐涎心痛發作有時毒藥不止甘草粉蜜湯主之徐忠可云此論蛔病之不因寒者也故其證獨心痛吐涎而不吐蛔然其痛發作有時謂不恆吐也則與虛寒之綿綿而痛者遠矣毒藥不止則必治氣治血攻寒逐積之藥俱不應矣故以甘草粉蜜主之白粉殺蟲蜜與甘草既以和胃又以誘蟲也嘔吐噦皆屬於胃但有氣血多少之異嘔屬陽明多血多氣故有聲有物氣血俱病也氣逆者散之所以生薑為主吐屬太陽多血少氣故有物無聲乃血病也以橘紅主之噦屬少陽多氣少血故有聲無物乃氣病也以半夏主之三者皆因脾虛或寒氣客胃飲食所傷致上逆而食不得下也治嘔吐以二陳湯為主如氣滯者加白豆蔻砂仁熱吐加黃連冷涎吐加丁香氣升嘔加沉香氣不和加木香入薑汁少許食頃即吐者半夏生薑煎服食入即嘔橘皮生薑煎服食已則吐橘皮半夏生薑煎服食久而吐為反胃脈沉無力理中湯或三物大建中湯去乾薑加白朮桂心橘皮脈滑而實旦食暮吐暮食朝吐此下焦實半夏大黃等分為末薑汁和丸微利之嘔吐谷不得下小半夏湯逆氣心中煩悶氣滿嘔吐千金半夏湯即金匱小半夏湯加桂心少氣加甘草夫半夏生薑之辛但治上焦氣壅表實若胃虛者惟宜益胃推揚穀氣而已忌用辛瀉故服小半夏湯不愈者服大半夏湯立愈久寒胸膈逆滿不能食吳茱萸湯加桂心半夏甘草小麥酒煎服寒吐者喜熱惡寒肢冷脈細而滑用理中湯加枳實或二陳加丁香炮薑並須微溫與服熱吐者喜冷惡熱煩渴小便赤澀脈洪而數二陳加梔連竹茹枇杷葉葛根薑汁蘆根汁怒中飲食嘔吐胸滿膈脹關格不通二陳加青皮木香未效丁沉木香砂仁厚朴神麯更不效有瘀血也當從蓄血例治中脘素有痰積遇寒即發俗名冷涎泛宜丁香豆蔻砂仁乾薑陳皮半夏生薑白芥子嘔痰而致厥者乃寒痰逆悶謂之痰厥薑附湯加朮半細辛痰滿胸喉粥藥到口即吐先用生薑湯下黑錫丹以鎮墜之候藥可進則以二陳加枳朮砂仁厚朴薑汁虛加人參有一等肝火逆證亦嘔而不食但所嘔者或酸水或苦水或青藍水惟大小便不祕亦能作心痛此是火鬱木鬱之候木鬱達之火鬱發之須用萸連濃煎細細呷之再服逍遙散脾胃本虛機關不利不能運化而水到咽管輒便嘔出者六君子加砂仁炮薑使中央之樞軸轉機關利自不嘔矣丹溪云凡嘔家禁服栝蔞實桃仁萊蔔子山梔一切有油之物皆犯胃作吐凡藥中帶香藥行散方效噦者胃中虛冷或停水飲之故胃虛宜溫胃理中為主停水宜橘皮半夏湯小便不利加桂心茯苓胃虛不食加人參肺胃有水喘咳上氣小青龍加減亦有失於攻下胃中實熱而噦者證必腹滿仲景云噦而腹滿視其前後知何部不利利之則愈承氣湯豬苓湯是也噦逆屬虛熱橘皮竹茹湯噦而虛寒橘皮乾薑湯寒甚去通草加丁香附子寒熱錯雜者去甘草加丁香柿蒂傷寒後胃熱嘔噦千金通草橘皮湯傷寒後嘔噦反胃乾嘔食不下千金蘆根飲子春夏時行傷寒寒傷於胃胃冷變啘者千金用橘皮桂心葛根各二兩白茅根一升水煎服有熱去桂心噦聲頻密相連為實攻熱為主若半時噦一聲者為虛溫補為主如腹滿不尿脈散頭汗目瞪而噦者死在旦夕千金云凡服湯嘔逆不入腹者先以甘草一兩水煎服之得吐消息定然後服余湯便不吐也凡嘔者多食生薑此是嘔家聖藥診上部有脈下部無脈其人當吐不吐者死脈陽緊陰數為吐陽浮而數亦吐寸緊尺澀胸滿而吐寸口脈數者吐緊而澀者難治緊而滑者吐逆脈弱而嘔小便復利身有微熱見厥者難治病人欲嘔吐者不可下之嘔吐大痛吐出色如青菜色者危乾嘔乾嘔者有聲無痰然不似噦聲之濁惡而長也宜橘紅煎湯入薑汁白蜜少許細細呷之胃虛加人參胃寒加炮薑胃虛濁氣上逆吳茱萸湯乾嘔發熱者黃芩湯乾嘔而利者黃芩加半夏生薑湯漏氣身背熱肘臂牽痛其氣不續膈間厭悶食入則先嘔而後瀉名曰漏氣此風熱閉其腠理上焦之氣慓悍滑疾遇開即出經氣失道邪氣內著故有此證千金麥冬理中湯主之肥盛多痰者澤瀉湯主之走哺下焦實熱其氣內結不下泌糟粕而淤濁反蒸於胃故二便不通氣逆不續嘔逆不禁名曰走哺人參湯主之食已暴吐脈浮而洪此上焦火逆也宜橘半枳桔厚朴檳榔茯苓白朮氣降則火自清吐漸止乃以人參芍藥補之下閉上嘔亦因火在上焦宜枳桔陳皮厚朴檳榔大黃木香微利之嘔苦邪在膽經木善上乘於胃吐則逆而膽汁上溢所以嘔苦也宜吳茱萸黃連茯苓澤瀉生薑邪在膽逆在胃膽液泄則口苦小柴胡湯胃氣逆則嘔苦吳茱萸湯中酸濕熱鬱積於肝肝火逆上伏於肺胃之間飲食入胃被濕鬱遏不得傳化故作中酸所謂曲直作酸是也佐金丸薛立齋云吞酸噯腐多屬脾虛木旺證多面色痿黃胸膈不利舉世好用清氣化痰之藥多致大便不實食少體倦而危當用六君子加炮薑木香吳茱萸脾腎俱虛六君子加肉豆蔻補骨脂中氣虛弱者理中湯加吳茱萸鬱火連理湯不應補中益氣加木香炮薑送佐金丸中氣虛寒必加附子或附子理中湯無有不愈凡中酸不宜食黏滑油膩者謂氣不通暢也宜食疏淡諸物使氣通利吐酸內經以諸嘔吐酸皆屬於熱東垣又以為寒者何也若胃中濕氣鬱而成積則濕中生熱從木化而為吐酸久而不化肝木日肆胃土日衰當平肝扶胃逍遙散服佐金丸若宿食滯於中脘平胃散加白豆蔻藿香砂仁神麯嘔水渴欲飲水水入即吐者名曰水逆五苓散氣虛四君子去甘草加枳橘生薑不應六君子換赤茯苓用伏龍肝煮湯澄清代水煎藥吐沫胃中虛寒不能約束津液故吐涎沫宜六君子加益智生薑或理中湯加益智以收攝之吐蛔音回吐蛔有寒有熱有寒熱交錯寒則手足厥逆吐出之蛔色淡白者理中湯加烏梅黃連蜀椒甚則蛔死而形扁者危矣熱則蛔色赤而多且跳動不已安蛔丸主之寒熱交錯則病者靜而復時煩得食而嘔蛔聞食臭出其人當自吐蛔烏梅丸主之大抵吐蛔寒熱交錯者多方中都用川椒黃連烏梅之類蓋蛔聞酸則靜得苦則安遇辣則伏而不動也若誤服消克及攻蟲諸藥不應甘草粉蜜湯主之石頑曰夫病有不見經論之異證則其治亦必有不由繩墨之異法如王御九仲君因驚恐受病時方晚膳即兀兀欲吐而不得出遂絶粒不食而起居自如半月以來醫禱不靈舉家無措向後醇酒膏粱略無陰礙惟是穀氣毫不可犯犯之輒嘔吳中名師從未有一識其為何病者然各逞臆見補瀉雜陳丹方迭進牛黃狗寶虎䐗貓胞總無交涉兩三月來濕面亦得相安但完穀一試雖極糜爛立時返出延及八月莫可誰何偶遇一人謂言此病非藥可除合用生鵝血乘熱飲之一服便安此雖未見於方書揆之於理諒無妨礙一陽之夜遂宰一鵝取血熱飲下咽汩汩有聲忍之再三少頃嘔出瘀血升許中有血塊數枚是夜小試稀糜竟不吐出其後漸能用飯從少至多無藉湯藥而安常思此病之不可解者胃既不安稼澀何反勝任血肉之味今飲鵝血嘔出宿瘀頓愈因考本草言鵝性涼利五臟千金方云射工毒蟲鵝能食之可知其有祛風殺蟲解毒散血之功也今用其血以開其結確有至理逆推受病之源原因驚恐所致驚則氣亂載血上逆而兀兀欲吐若彼時吐出卻無菀積於中胃氣阻逆之患矣胃氣阻逆穀神得不困憊乎其血肉可啖者正賴脂膏以攸利臟腑之氣也然臟腑之氣非谷不安而安穀全賴乎血血者神氣也故取善消穀氣之血乘其生氣未離是可直透關鑰引領宿積之瘀一湧而胸次蕩然雖屬尋常食品而涼利五臟之功洵不尋常先是有人患此絶粒三載得此頓愈其後中翰金淳還公郎太史韓慕廬東坦咸賴此霍然遠近相傳凡噎膈嘔逆用之輒效當知噎膈嘔逆雖屬胃中血枯若中無瘀結何致捍格不入故取同氣相感之力一湧而蕩散無餘真補中寓瀉之良法詳鵝血可以激發胃中宿滯則生鴨血未為不可生黃牛血亦未為不可總取以血攻血而無峻攻傷胃之虞昔喬三餘治一總戎患噎膈百藥不應喬以法激之嘔出瘀積數升而安喻嘉言治一血蟲用法激之上湧然後用藥法皆祕而不宣由是類推可以默識其旨此與勞傷吐血之日宰鴨血沖熱酒服同源異泒深得肘後經奧旨足補夏子益奇方之未逮虞恆德治一中年婦産後傷食致脾虛不納穀四十餘日聞穀氣則噁心聞藥氣則嘔逆用異功散加藿香砂仁神麯陳倉米先以順流水煎沸調伏龍肝攪渾澄清取二盞加薑棗煎服遂不吐別以陳倉米煎湯時時咽之服前藥二三劑漸安薛立齋治一婦年三十餘忽不進飲食日飲清茶三五碗少用水果經三年矣經水過期而少此思虛傷脾脾氣鬱結所致用歸脾湯加吳茱萸不數劑而飲食如故又治一婦因肝脾鬱滯而不飲食二年面部微黃浮腫仍能步履但肢體倦怠肝脾二脈浮弦按之微而結滯用六君子加吳茱萸下痰積甚多飲食頓進形體始瘦臥床月餘仍以六君子加減調理而安周慎齋治一人飲食如常每遇子時即吐大便祕詢其人必有苦慮憂思脾氣鬱結故幽門不通宜扶脾開竅為主用人參白朮以蒼朮拌炒茯苓各一錢炙甘草五分附子煮烏藥三分水煎服愈石頑療吳江署篆張公年壯體豐恆有嘔逆痰涎之恙六脈每帶濡滑惟二陳加枳朮石斛輩服之應手良由政務繁冗心力俱勞所致耳霍亂乾霍亂吐利經云清氣在陰濁氣在陽營氣順行衛氣逆行清濁相干亂於腸胃則為霍亂厥氣上逆則霍亂傷寒吐利由邪氣所傷霍亂吐利由飲食所傷其有兼傷寒之邪內外不和加之頭痛發熱而吐利者是傷寒霍亂也原仲景之意豈非在飲食如為是病彼以寒邪傳入下焦胃氣因之不和陰陽痞膈者安得不有以致之乎不然何以用理中四逆治之耶此病多發於夏秋之交在寒月亦間有之昔人云多由伏暑所致然亦未必皆爾大抵濕土為風木所克則為是證故嘔吐瀉泄者濕土之變也轉筋者風木之變也合諸論而求之始為活法然多有鬱結傷脾飲食停滯一時停塞氣不升降而然夏月霍亂吐瀉作渴胃苓湯加半夏藿香面赤口乾加炒川連春夏秋三時飲食後觸冒暴寒成此證者藿香正氣散若吐利轉筋為風木行脾平胃散加木瓜夏秋感冒吐瀉霍亂六和湯為要藥身熱煩渴氣粗喘悶或吐瀉厥逆躁擾者此傷暑霍亂宜香薷飲沉冷服甚則手足厥逆少氣唇面爪甲皆青六脈俱伏而吐出酸穢瀉下臭惡便溺黃赤者此火伏於厥陰也為熱極似陰之候急作地漿煎竹葉石膏湯誤作寒治必死夏秋霍亂多食冷水瓜果所致宜木香藿香陳皮厚朴蘇葉生薑四肢重著骨節煩疼此兼濕也二朮二苓厚朴陳皮澤瀉七情鬱結宜烏藥香附木香厚朴枳殼陳皮紫蘇夏秋之交傷暑霍亂大忌朮附薑桂種種燥熱之藥誤服必死凡夏秋霍亂有一毫口渴即是伏熱不可用溫理脾胃藥如燥渴小便不利五苓散為主本方中肉桂亦宜酌用惟泄瀉不渴二便清利不甚臭穢者方可用理中溫之吐瀉不止元氣耗散病勢危篤或水粒不入或口渴喜冷或惡寒戰栗手足逆冷或發熱煩躁揭去衣被此內虛陰盛不可以其喜冷去被為熱宜理中湯甚則四逆湯加食鹽少許若暴瀉如水周身汗出盡冷脈弱不能言語急投漿水散並須冷服若冒暑伏熱腹痛作瀉或利或嘔者木瓜吳茱萸食鹽同炒煎湯溫服胎前産後霍亂另詳本門凡霍亂新定周時內慎勿便與穀氣多致殺人以胃氣反逆不能平復也如吐瀉已多元氣耗極審無邪者方與米飲補養舉世治霍亂吐利不問虛實寒熱概用藿香正氣不知此方專主胃氣不和陰陽錯亂或夏秋寒熱交加飲食冷熱並進及水土不伏之吐利霍亂固為合劑如見厥逆冷汗虛煩喘噦面赤戴陽脈來虛微弦細無力此脾腎俱虛火衰不能生土虛陽失守之候在嚴冬見之尤為最劇猛進理中四逆尚恐不救況堪從事藿香正氣等耗氣之劑乎診脈伏或微澀者霍亂脈長為陽明本病霍亂脈洪大吉虛微遲細兼喘者凶氣口脈滑乃膈間有宿食雖吐猶當以鹽湯探吐之吐盡用和中藥凡吐瀉脈見結促代伏皆不可便斷為死霍亂之後陽氣已脫或遺尿不知或氣怯不語或膏汗如珠如躁欲入水或四肢不收舌卷囊縮皆為死候乾霍亂心腹脹痛欲吐不吐欲瀉不瀉煩躁悶亂俗名攪腸痧此土鬱不能發泄火熱內熾陰陽不交之故或問方論皆言宿食與寒氣相搏何以獨指為火耶曰昏亂躁悶非諸躁狂越之屬火者乎每致急死非暴病暴死之屬火者乎但攻之太過則脾愈虛溫之太過則火愈熾寒之太過則反捍格須反佐以治然後火可散耳古法有鹽煎童便非但用之降火且兼取其行血不可廢也一法以鹽湯探吐並用鹽填臍中以艾灸二七壯屢效吐利吐利者言嘔吐而利是也上吐下利煩擾躁亂乃謂之霍亂與但稱吐利者有異蓋暴於旦夕者為霍亂可延至數日者為吐利耳有吐瀉及痢疾進湯藥太驟以致嘔逆二陳加豆蔻砂仁甚則加沉香有熱加薑汁炒川連乾嘔而利者黃芩加半夏生薑湯上吐下瀉不止當渴而反不渴脈微細而弱者理中湯或渴不能飲脈細數連理湯夏月泄瀉或嘔吐生薑汁調天水散有痰積泄利不止甚則嘔而欲吐利下不能飲食由風痰羈絆脾胃之間導痰湯加羌防瀉屬脾宜升胃補中益氣湯吐屬胃宜醒脾六君子加香砂吐瀉並作宜升胃醒脾二湯各半和服關格靈樞云陰氣太盛則陽氣不能營也故曰關陽氣太盛則陰氣弗能營也故曰格陰陽俱盛不得相營故曰關格關格者不得盡期而死也陰陽易位病名關格多不可治若邪氣留著而致者猶可治之舌上苔白而水漿不下曰格格則吐逆熱在丹田小便不過曰關關則不得小便必用吐以提其氣之捍格不必在出痰也鹽湯探吐並以牙皂湯浴其小腹及陰或以鹽尉臍中俱妙有痰宜吐者二陳湯探吐之吐中便有升降有中氣虛不運者補氣藥中升降先以四君子換參蘆探吐後用人參散柏子仁湯調理脈沉細手足厥冷者既濟丸勞役後氣虛不運者補中益氣湯加木香檳榔心脾疼後小便不通皆是痰隔於中焦氣滯於下焦二陳加木通枳殼服後探吐之寒在上熱在下黃連湯桂枝易肉桂熱在上寒在下生料八味丸加牛膝車前關格不通不得尿頭無汗者可治有汗者死石頑曰按內經所言人迎與寸口俱盛四倍以上為關格是以陽經取決於人迎陰經取決於寸口也越人云遂上魚為溢為外關內格遂入尺為覆為內關外格仲景亦謂在尺為關在寸為格關則不得小便格則吐逆皆以陽分取決於寸口陰分取決於尺內也所以難經又言上部有脈下部無脈其人當吐不吐者死仲景又有趺陽脈伏而澀伏則吐逆水穀不化澀則食不得入名曰關格則知關格之脈證不一也而馬仲化釋內經謂關格之義非隔食癃閉之證而張介賓類經直將越人仲景之言一概非之獨執人迎在頸為陽明之表脈遂詆東垣丹溪皆仍叔和脈經左為人迎右為氣口之謬嗚呼內經固為聖經確宜遵從而越人仲景之書未常不為聖經也蓋人迎氣口所以分表裡之陰陽寸口尺內所以分上下之陰陽也人一身表裡上下之氣化皆肺所司血脈皆心所主故凡氣血之盛衰靡不變見於氣口氣口實為肺經之一脈不過分其部位以候他臟之氣耳即如仲景所指趺陽少陰雖主於足然未嘗不於關尺推之則內經所言人迎氣口候之左右亦無不可也醫道貴乎圓通若執中無權猶執一也故釋內經之關格但當言是表裡陰陽否絶之候不當與上吐下閉之關格混同立論則可若言上吐下閉當稱隔食癃閉不得名為關格則不可或言關格之證其脈未必皆然則可若言關格之脈必無在尺在寸之分則不可試觀仲景趺陽脈伏而澀亦主關格又有上微頭小者則汗出下微本大者則為關格不通等例其義自明厄逆噫氣諸逆衝上劉宗厚曰厄逆有虛有實有火有痰有水氣不可專作寒論蓋傷寒發汗吐下後與瀉利日久及大病後婦人産後有此證皆屬脾胃大虛若因痰水停積心下或因暴怒氣逆痰厥或傷寒熱病失下則皆屬熱也夫水性潤下火性炎上今其氣自下衝上非火而何大抵治法虛則補之虛中須分寒熱如因汗吐下後誤服寒涼過多當溫補之如脾胃陰虛火逆上衝當平補之挾熱者當涼補之若實者如傷寒失下地道不通因而厄逆當寒下之如痰飲停蓄或暴怒氣逆痰厥此等必形氣俱實別無惡候隨其邪之所在湧之泄之清之利之胃虛木挾相火直衝清道而上者異功散加肉桂甚則加黃柏附子送六味丸吐利後胃氣虛寒者理中湯加附子丁香柿蒂吐利後胃虛熱者橘皮竹茹湯厄逆嘔吐多者屬胃虛有痰半夏茯苓生薑兼食結痰積則膈間飽悶枳朮半夏生薑平人飲熱湯及食椒薑即厄者此胃中有寒痰死血也死血用韭汁童便下越曲丸虛人用理中湯加蓬朮桃仁痰加茯苓半夏蓋厄逆皆是寒熱錯亂二氣相搏使然故治亦多用寒熱相兼之劑如丁香柿蒂並投之類試觀平人冷厄令其思想則止思則脾火氣乘而胃氣和矣厄逆雖多有屬火者然病後久虛發厄皆屬於寒宜用半夏一兩生薑一兩水煎熱服或用丁香數十粒柿蒂十枚滾水泡服或理中湯加枳殼茯苓半夏不應加箬蒂丁香若胃中寒甚厄逆不已或復嘔吐丁香煮散或附子粳米湯加炒川椒丁香暴怒厄逆神昏吐涎此肝火逆上防有血積膈間若按之痛者藕汁麻油服少頃即探吐之不痛者陳皮二兩煎湯探吐之産後厄逆最為惡候急灸期門左穴艾炷如小豆大宜服四逆加人參湯羌活附子散或桂心五錢薑汁三合和水煎服石頑曰厄逆在辨寒熱寒熱不辨用藥立斃凡聲之有力而連續者雖有手足厥逆大便必堅定屬火熱下之則愈萬舉萬全若胃中無實火何以激搏其聲逆上而沖乎其聲低怯而不能上達於咽喉或時鄭聲雖無厥逆定屬虛寒苟非丁附必無生理若胃中稍有陽氣何致音聲餒怯不前也蓋胃中有火則有聲無火則無聲誤以柿蒂蘆根輩治之倉扁不能復圖矣又有始熱終寒者始本熱邪因過用苦寒寒鬱其熱遂至厄逆急宜連理湯加薑半主之五六日大便不通者削陳醬薑導之若真陽素虛人誤用苦寒通其大便必致熱去寒起多成不救復有飲熱飲冷而厄背微惡寒目睛微黃手足微冷大便溏黑者屬瘀血若飲熱則安飲冷則厄雖有背惡寒手足冷大便溏等證此屬濕痰肥人多此須推瘀血痰飲例治之噫氣靈樞云寒氣客於胃厥逆從下上散復出於胃故為噫保命集云噫者胸中氣不交也仲景云噫氣不除者旋覆代赭石湯主之則知噫氣為中氣不治土不制水水飲上泛故用旋覆半夏以散痰飲人參甘草薑棗以溫胃氣代赭以鎮墜逆氣而引參力下行也若老人噫氣乃胃中虛寒痰逆而然止宜理中丸溫助胃氣為主或加枳實香附砂仁之類助其消化雖然真氣已衰即使調理得宜終不能過五年矣諸逆衝上氣逆衝上火氣炎上故也經云逆氣象陽凡氣逆必證象陽盛面赤脈洪當以法降其逆乃愈若以氣象陽盛而用寒藥攻之則不救矣氣上衝咽不得息喘息有聲不得臥調中益氣湯加吳茱萸觀厥氣多少用之如夏月有此證為大熱也宜以酒炒川連知柏少加肉桂為末酒丸服二錢仍多飲湯少時以美膳壓之使直至下焦以瀉衝脈之逆也蓋逆者寒熱之氣逆而不順也當隨四時寒熱溫涼以制之厥陰氣上衝心咽不得息治法見傷寒厥陰病條戴復庵云虛炎之證陰陽不升降下虛上盛氣促喘急宜蘇子降氣湯下黑錫丹胃脘癰內經病能論云人病胃脘癰當候胃脈其脈當沉細沉細者氣逆逆者人迎甚盛甚盛則熱人迎者胃脈也逆而盛則熱聚於胃口而不行故胃脘為癰也馬仲化云胃為水穀之海其經多氣多血脈見右關本宜洪盛今反沉細則是胃氣已逆人迎者胃經穴名在結喉兩傍動脈應手其脈見於左手今右關脈沉細人迎甚盛則是熱聚胃口而不行耳靈樞經脈篇謂人迎大三倍於寸口則胃經為實即此驗之而知胃脘癰之脈也仲景云嘔家有癰膿者不可治嘔膿儘自愈此不言癰之所在而言嘔膿者以其但嘔而不咳知非肺癰而為胃脘癰明矣內經曰熱聚於胃口而不行胃脘為癰胃脘屬陽明陽明氣逆故膿不自咳出而從嘔出膿亦不似肺癰之如米粥者此出自胃脘從濕化而聚結成膿有結痰如蜆肉也謂不可治嘔言不得用辛香溫胃止嘔之劑以膿之瘀濁熏蒸穀氣故嘔若膿出則嘔自愈夫癰之在胃脘之上者則然若過乎中在膈之下則膿從大便而出輕則金匱排膿湯重則大黃牡丹湯涼膈散選用若膿自上而吐輕則金匱排膿散重則射干湯或犀角地黃湯加忍冬連翹皆因勢利導之法也膿稀嘔止後用太乙膏作丸服虛人宜八珍加黃耆忍冬連翹之類調補之凡舌苔經久不退色黑垢膩口中作甜其氣穢濁即是胃脘發癰之候明眼辨之毋俟癰成而致莫救也石頑治談仲安體肥善飲初夏患壯熱嘔逆胸膈左畔隱痛手不可拊便溺澀數舌上苔滑食後痛嘔稠痰漸見血水脈來澀澀不調與涼膈散加石斛連翹下稠膩頗多先是瘍醫作肺癰治不效豫曰肺癰必咳嗽吐腥穢痰此但嘔不嗽洵為胃病無疑下後四五日復嘔如前再以小劑調之三下而勢甫平後以保元苓橘平調二十日而痊先時有李姓者患此專以清熱豁痰解毒為務直至膈畔潰腐膿水淋漓纏綿匝月而斃良因見機不早直至敗壞悔無及矣
