body:
  text: 卷三寒熱門發熱東垣云仲景論內外不足發熱自汗之證大禁發汗若飲食勞倦雜病發熱自汗表虛之證認作有餘誤用表藥發之汗大出而表益虛也身盡熱先太陽也從外而之內者為外傷手足不和兩脅俱熱如火先少陽也從內而之外者為內傷傷食令人頭痛脈數發熱但左手脈平和身不疼痛是也人迎氣口俱緊盛或舉按皆實大發熱而惡寒腹不和而口液此內外俱傷也夏月火乘土位濕熱相合病多煩躁悶亂四肢發熱或身體沉重走注疼痛皆濕熱相搏鬱而不伸故致熱也發熱身疼而身如熏黃者濕熱也一身盡痛發熱日晡所劇者風濕也汗出而身熱者風熱也身熱脈弦數戰栗而不惡寒者疸瘧也中脘有痰令人憎寒發熱惡風自汗寸口脈浮胸膈痞滿有類傷寒但頭不疼項不強為異虛煩與傷寒相似身熱脈不浮緊不惡寒但熱而煩頭不痛腳氣為病大便堅腳膝兩脛腫痛或枯細者當其發時亦發熱憎寒嘔惡有似傷寒也春夏之交發熱而渴或微惡寒右手脈來數盛者溫病也身熱頭疼自汗多眠陽脈浮滑陰脈濡弱者風溫也夏月大熱而渴脈盛躁者熱病也夏月脈虛身熱而喘乏者傷暑也四肢發熱口舌咽乾煩躁悶亂者心與小腸之火乘脾土之位脾主四肢為諸陽之本脾熱故四肢發熱每日晡時憎寒壯熱脈數盛而有痛處者癰毒之將發也李士材治夏彝仲太夫人年屆八十因彝仲遠仕閩中憂思成疾忽發熱頭疼醫以傷寒發散禁食一劑而汗如浴喘促神昏其脈大無力即令進食而投參耆白朮橘紅甘草煨薑一劑而喘汗差減倍用參術至一兩證愈七八惟食未強此火衰不能生土加熟附乾薑服二月而痊熱經云熱至則身熱吐下霍亂癰疽瘡瘍瞀郁注下瞤瘛腫脹嘔鼽衄頭痛骨節變肉痛血溢血泄淋閉之病生矣病機云諸風掉眩皆屬於肝諸寒收引皆屬於腎諸氣膹郁皆屬於肺諸濕腫滿皆屬於脾諸痛癢瘡皆屬於心五條分屬五臟證諸厥固泄皆屬於下謂下焦肝腎之病諸痿喘嘔皆屬於上謂上焦心肺之病諸熱瞀瘛皆屬於火手少陽三焦經諸禁鼓栗如喪神守皆屬於火手少陰心經諸痙項強皆屬於濕足太陽膀胱經諸逆衝上皆屬於火手厥陰心胞絡經諸脹腹大皆屬於熱足太陰脾經諸躁狂越皆屬於心足陽明胃經諸暴強直皆屬於風足厥陰肝經諸病有聲鼓之如鼓皆屬於熱手太陰肺經諸病胕腫疼酸驚駭皆屬於火手陽明大腸經諸轉反戾水液渾濁皆屬於熱手太陽小腸經諸病水液澄徹清冷皆屬於寒足少陰腎經諸嘔吐酸暴注下迫皆屬於熱足少陽膽經按病機十九條邵元偉分屬經臟前五條各屬五臟之病次二條兼該上下之病後十二條分隸十二經證而河間原病式從未論及皆偏言盛氣實邪立言若此虛者何堪故樓氏指其治法之偏誠非過也觀十九條中除五臟上下外其間屬火者五屬熱者四其外惟風寒濕三氣而已況五臟中之心臟豈非亦屬火乎今以全節類諸熱門使學者比例而觀庶寒熱熱盛之機可瞭然無惑矣盛啓東云治熱須辨真假夫真熱則發熱惡寒脈數有力按之更實煩躁口渴大便燥小便赤澀或利臭積發言壯厲不欲近衣者是也親乎表者宜發散親乎里者宜通泄假熱亦發熱惡寒而足必不熱脈大而虛按之微弱身雖熾熱而不躁不渴或見虛狂躁渴而不能引飲發過頃之即止終不及聲高詈罵者也經曰寒熱有真假治法有逆從此之謂也雜病發熱陰虛於下也經云陰虛則發熱夫陽在外為陰之衛陰在內為陽之守精神外馳嗜欲無節陰氣耗散陽無所附遂致浮散於肌表間而發熱也實非有熱當作陰虛治而用補養之法可也丹溪論晝夜發熱晝重夜輕口中無味為陽虛午後發熱夜半則止口中知味為陰虛陽全陰半陽得以兼陰陰不得以兼陽也至於或晝或夜或作或止不時而發者此脾胃氣血俱虛火氣不寧之證不可拘於晝夜之候也陽虛責在胃陰虛責在腎蓋飢飽傷胃勞役則兼傷脾陽氣虛矣房勞傷腎竭力則傷肝陰血虧矣腎虛火不歸源遊行於外而發熱者煩渴引飲面目俱赤遍舌生刺兩唇黑裂喉間如煙火上衝兩足心似烙痰涎壅盛喘急氣促脈洪大而數疾無倫按之微弱者是也法當導火歸源誤用寒涼必殆即或知其本虛而用補益不辨陰虛陽虛漫投參術則陽愈盛而陰愈虛壯熱轉增八味桂附之屬愈不敢施不得已用知枯芩連折之必至燥渴咽痛腹痛泄瀉而死凡暴熱不止脈滑數或洪盛皆為實熱宜隨表裡孰輕孰重而清理之或脈雖沉而按之實堅者為裡實必用苦寒下奪之若熱久不止脈來虛數無力服調補藥不應飲食無味或至夜煩渴或反加乾咳者此必陰血受傷當以血藥調補其陰則陽熱自化陰陽虛盛之機不可不審而急為轉關也診脈數為熱浮數表熱沉數里熱無力虛熱有力實熱滑數心下結熱緩而滑為熱中牢為脾胃盛熱若發熱而脈反沉細或數疾無力者病脈相反也死病熱有火者生心脈洪是也浮而澀澀而身有熱者死熱而脈靜者難治脈盛汗出不解者死脈虛熱不止者死脈弱四肢厥不欲見人食不入利下不止者死潮熱潮熱有作有止若潮水之來不失其時一日一發若日三五發者即是發熱非潮熱也有虛有實惟傷寒日晡發熱乃胃實別無虛證其餘有潮熱者當審其虛實若大便堅澀喜冷畏熱心下愊然睡臥不著此皆氣盛所謂實而潮熱也涼膈散大柴胡輩下之若胃氣消乏精神憔悴飲食減少日漸尫羸病雖暫去而五心常有餘熱此屬虛證宜逍遙散小柴胡等加減有每遇夜身發微熱病人不覺早起動作無事飲食如常既無別證可疑只是血虛陰不濟陽朝用加味逍遙散暮用六味丸不應用當歸補血湯加減八味丸有潮熱似瘧胸膈痞塞背心疼痛氣弱脈弦服補藥不效者此屬飲證隨氣而潮故熱亦隨飲而潮於痰飲門求之氣口脈滑內有宿食常暮發熱明日復止者於傷飲食門求之惡寒背惡寒經云陽虛則外寒奈何曰陽受氣於上焦以溫皮膚分肉之間今寒氣在外則上焦不通而寒氣獨留於外故寒栗惡寒者雖當夏月若遇風霜欲得重綿時覺凜凜戰栗如喪神守此熱伏於裡而反覺自冷實非寒也或曰往往見有服熱藥而愈者何也曰病熱之人其氣炎上郁為痰飲抑遏清道陰氣不升病熱尤甚積痰得熱亦為暫退熱勢助邪其病益深或曰寒勢如此誰敢以寒涼藥與之非殺而何曰古人遇戰栗之證有以大承氣湯下燥屎而愈者惡寒戰栗明是熱證但有虛實之分耳有衛氣虛衰不能實表分肉而惡寒者有上焦之邪隔絶營衛不能升發出表而惡寒者有酒熱內郁不得泄而惡寒者背惡寒是痰飲仲景云心下有留飲其人背惡寒冷如冰指迷茯苓丸身前寒屬胃經云胃足陽明之脈氣虛則身以前皆寒栗掌中寒者腹中寒魚上白肉有青血脈者胃中有寒理中丸表虛惡賊風上焦不通陽氣抑遏而皮膚分肉無以溫之故寒栗升陽益胃湯開發上焦以升陽明出外溫之也外感內傷傷食濕痰火鬱皆有惡寒非獨陽虛也若脈浮緊頭痛拘急身疼微惡寒熱起是外感審時令輕重發散之脈緩弱或氣口虛大按之無力兼見倦怠手心熱是內傷元氣證補中益氣湯加桂附二三分以行參耆之力且益陽氣也脈弦滑噁心頭痛飽悶溢酸是內傷宿食從傷食治或脈來澀伏腹滿煩熱喘促者是冷食結滯於內也當與溫消枳實理中湯審系肉食加炮黑山楂一二錢脈滑或沉周身疼痛而惡寒者屬濕痰乃痰在上焦遏絶陽氣而然肥人多此宜二陳加二朮羌防少佐桂枝甚者先吐之惡寒非寒不戰而栗從火鬱治火鬱湯若郁遏陽氣於脾土令人惡寒者東垣升陽散火湯內虛里急惡寒少氣手足厥冷少腹攣急足脛疼酸此陽不足也大建中湯背惡寒脈浮大而無力者為氣虛脈弦緊寒熱兼作乃瘡腫之候須問身中有無腫處大抵惡寒證除陽虛外屬表證者多乃表中陽氣不得發越而然須辛散之惡寒家不可過覆近火寒熱相搏脈道沉伏愈令病人寒不可遏但去被撤火兼以和營之藥自然不惡寒矣婦人惡寒尤不可近火寒氣入腹血室結聚針藥所不能治矣祝仲寧治一貴婦病惡寒日夜以重裘覆其首起躍入沸湯中不覺醫以為寒祝持之曰此痰火上騰所謂陽極似陰也非大下之則火不殺下經宿而撤裘呼水飲之旬日氣平乃愈李士材治吳文邃眩暈三載雖戰栗惡寒而不喜飲熱湯五月向火數妾擁居帷幔屢服薑桂不效脈浮之細小沉之搏堅是鬱火內伏不得宣越也用金花湯加柴胡甘草生薑乘熱飲之移時而惡寒減再劑而撤火爐逾月而起更以人參湯進六味丸兩月全安石頑曰凡病但惡寒而不發熱者多屬火鬱之證舉世一以陽虛為治誤人多矣如墅關謝君宣之病七月間寒熱如瘧因服芩知石膏輩稍間數日後因小便精大泄遂腦痛如破惡寒振振欲劈地醫用八味六君三倍參附而寒不除繼用大建中每服人參五錢熟附二錢其寒益甚春旺人日始延治於余診之脈僅三至弦小而兩寸俱伏但舉指忽覺流利審其證雖五襲重裘大畏隙風如箭而不喜近火惡寒雖劇而忽重忽輕口鼻氣息全冷而胸中時覺上衝小腹堅滿而塊壘如石大便堅硬而欲了不了小便短數而時白時黃陽道雖痿而緩縱不收氣色雖憔悴而不晦暗此證起先本屬陽虛因加用參附陽藥過多壯火不能化陰遂鬱伏土中反致真陰耗竭是以二便艱澀所謂陰虛自致泉竭也法當升發其陽先與火鬱湯六服繼進升陽散火補中益氣而惡寒微除重裘漸解肢體微汗口鼻氣溫脈復五至二便調適小便微和陽亦漸舉嗣後令服六味丸生脈散異功散調理而康背惡寒背為陽位背上惡寒陽受病而陰邪亢逆也其病有七一者暴中陰寒四肢厥冷而背惡寒脈必沉細附子湯溫散之一者素稟陽衰而背上常微畏寒脈來微弱八味丸溫補之一者熱邪內伏煩渴引飲而背惡寒脈多沉滑或伏匿此火鬱於內也熱病初發多此白虎湯解散之一者中暑暍熱亦多有背惡寒人參白虎清暑益氣按證清解之一者濕痰內郁肢體疼重而痞悶頭汗其人必肥盛其脈或緩滑或澀滯滑則指迷茯苓加膽星澀則苓桂術甘加半夏廣皮分解之一者瘀血內滯而頭汗目黃小便清利大便溏黑小腹偏左或左脅中脘有疼處脈必關尺弦緊或帶芤狀桃核承氣犀角地黃隨上下虛實清理之一者無故脈數而背惡寒疼重寒熱者為發癰疽之兆膏粱多此不可疑似而遲延難療也振寒經言虛邪之中人也灑灑動形正邪之中人也微見於色不知其身又曰陽明所謂灑灑振寒陽明者午也五月盛陽之陰也陽盛而陰氣加之故灑灑振寒當瀉陽者也又云陽氣客於皮膚陰氣盛陽氣虛故振振寒栗當補陽者也如六脈弦細而澀按之空虛此大寒證亦傷精氣當溫補者也瀉陽白虎加人參湯竹葉石膏湯補陽黃耆建中湯若夫真陽虛證但寒栗耳不作振也或兼風寒則振桂枝加附子湯戰栗經云腎之變動為栗原病式曰戰栗動搖火之象也陽動陰靜而水火相反故厥逆禁固屈伸不便為病寒也栗者寒冷也或言寒戰為脾寒者未明變化之道也此由心火熱甚亢極而戰反兼水化制之故寒栗也寒栗由火盛似水實非兼有寒氣也以大承氣下之多有燥屎下後熱退則寒栗愈矣若陽虛則但畏寒陽鬱則振寒戰栗有火無火之分也亦有暴感寒邪惡寒脈伏而戰栗者麻黃湯發散之寒熱經云因於露風乃生寒熱陽勝則熱陰勝則寒重寒則熱重熱則寒風氣客於皮膚之間內不得通外不得泄風者善行而數變腠理開則灑然寒閉則熱而悶其寒也則衰飲食其熱也則消肌肉故使人怢栗而不能食名曰寒熱寒熱如瘧表裡不和者小柴胡為主藥至夜轉甚者加丹皮山梔日久虛勞寒熱不除者柴胡四物湯加味逍遙散脾病則血氣俱不寧寒熱往來無有休息故脾病如瘧狀也元氣虛人遇勞即發寒熱此元氣下陷之故或勞力而發寒熱腿縫中結核作痛謂之勞發俱宜補中益氣湯病寒熱間作腕後有斑三五點鼻中微血兩脈沉澀胸膈四肢按之殊無大熱此脾胃氣虛而挾微邪理中湯去人參加茯苓煨葛根鬱怒而發寒熱逍遙散內傷瘧疾寒熱各具本門傷寒寒熱不在此例外熱內寒外寒內熱皮寒而燥者陽不足皮熱而燥者陰不足皮寒而寒者陰盛也皮熱而熱者陽盛也仲景云病人身大熱反欲得近衣者熱在皮膚寒在骨髓也黃耆建中湯汗之病人身大寒反不欲近衣者寒在皮膚熱在骨髓也越婢湯發之若雜證外熱內寒者理中湯斂之外寒內熱者火鬱湯散之上熱下寒上寒下熱熱發於上陽中之陽邪也熱發於下陰中之陽邪也寒起於上陽中之陰邪也寒起於下陰中之陰邪也脈經云陽乘陰者腰以下至足熱腰以上寒梔子豉湯吐以升之陰氣上爭心腹滿者死陰乘陽者腰以上至頭熱腰以下寒桂苓丸利以導之陽氣上爭得汗者生若雜證上熱下寒既濟湯兼大便祕既濟解毒湯火不歸源八味丸上寒下熱五苓散送滋腎丸虛陽下陷者加減八味丸瘧經云瘧先寒而後熱者夏傷於大暑其汗大出腠理開發因遇夏氣淒滄之水寒藏於腠理皮膚之中秋傷於風則病成矣夫寒者陰氣也風者陽氣也先傷於寒而後傷於風故先寒而後熱也病以時作名曰寒瘧先熱而後寒者此先傷於風而後傷於寒故先熱而後寒也亦以時作名曰溫瘧其但熱而不寒者陰氣先絶陽氣獨發則少氣煩冤手足熱而欲嘔名曰疸瘧溫瘧者得之冬中於風寒氣藏於骨髓之中至春則陽氣大發邪氣不能自出因遇大暑腦髓爍肌肉消腠理發泄或有所用力邪氣與汗皆出此病藏於腎其氣先從內出之於外也如是者陰虛而陽盛陽盛則熱矣衰則氣復反入入則陽虛陽虛則寒矣故先熱而後寒名曰溫瘧疸瘧者肺素有熱氣盛於身厥逆上衝中氣實而不外泄因有所用力腠理開風寒舍於皮膚之內分肉之間而發發則陽氣盛陽氣盛而不衰則病矣其氣不及於陰故但熱而不寒氣內藏於心而外舍於分肉之間令人消爍肌肉故命曰疸瘧足太陽之瘧令人腰痛頭重寒從背起先寒後熱熇熇暍暍然熱止汗出足少陽之瘧令人身體解㑊寒不甚熱不甚惡見人見人心惕惕然熱多汗出甚足陽明之瘧令人先寒灑淅灑淅寒甚久乃熱熱去汗出喜見日月光火氣乃快然足太陰之瘧令人不樂好太息不嗜食多寒熱汗出病至則善嘔嘔已乃衰足少陰之瘧令人嘔吐甚多寒熱熱多寒少欲閉戶牖而處其病難已足厥陰之瘧令人腰痛少腹滿小便不利如癃狀非癃也數便意恐懼氣不足腹中悒悒凡治瘧先發時食頃乃可以治過之則失時也金匱云師曰陰氣孤絶陽氣獨發則熱而少氣煩冤手足熱而欲嘔名曰疸瘧若但熱不寒者邪氣內藏於心外舍分肉之間令人消爍肌肉瘧之寒熱更作因陰陽之氣互為爭並若陰衰離絶其陽而陽亦不並之陰故陽獨發但熱而已其少氣煩冤者肺主氣肺受火抑故也手足熱者陽主四肢陽盛則四肢熱也欲嘔者火邪上衝胃氣逆也內藏於心者陽盛則火氣內藏而外舍分肉之間也消爍肌肉者火盛則肌肉爍也此條合後條溫瘧觀之亦可以白虎湯治疸瘧也白虎專於退熱其分肉四肢內屬脾胃非切於所舍者乎又瀉肺火非救其少氣煩冤者乎設其別有兼證豈不可推加桂之例而加別藥乎溫瘧者其脈如平身無寒但熱骨節煩疼時嘔白虎加桂枝湯主之內經言溫瘧先熱後寒仲景言溫瘧則但熱不寒有似疸瘧而實不同也疸瘧兩陽合邪上熏心肺所以少氣煩冤消爍肌肉溫瘧脈如平人則邪未合而津未傷陽受病而陰不病以其人素有痹氣營衛不通故瘧發於陽不入於陰所以骨節煩疼時嘔邪氣插格之狀有如此者惟用白虎湯以治陽邪而加桂枝以通營衛斯陰陽和血脈通得汗而愈矣至於傷寒前熱未除而復感風寒脈陰陽俱盛之溫瘧與其脈如平者迥乎不同也瘧多寒者名曰牝瘧蜀漆散主之邪氣內藏於心則但熱而不寒是為疸瘧邪氣伏藏於腎故多寒而少熱則為牝瘧以邪氣伏結則陽氣不行於外故外寒積聚津液以成痰是以多寒與素問少陰經證之多熱少寒不同方用蜀漆和漿水吐之以發越陽氣龍骨以固斂陰津雲母從至下而舉其陽取山川雲霧開霽之意蓋雲母即陽起石之根性溫而升最能祛濕運痰稍加蜀漆則可以治太陰之濕瘧方後有云濕瘧加蜀漆半分而坊本誤作溫瘧大謬此條本以邪伏髓海謂之牝瘧趙以德不辨亥豕注為邪在心而為牡喻嘉言亦仍其誤而述之非智者之一失歟瘧病發渴者柴胡去半夏加栝蔞湯亦治勞瘧渴者陽明津竭而所以致陽明津竭者本少陽木火之勢劫奪胃津而然故瘧邪進退於少陽則以小柴胡進退而施治也至於勞瘧之由亦木火盛而津衰致渴故亦不外是方也瘧寒多微有熱或但寒不熱柴胡桂薑湯服一劑如神是證雖與牝瘧相類以方藥論之則殊牝瘧邪伏少陰氣分而此邪伏少陽營血之分夫邪氣入營既無外出之勢而營中之邪亦不出與陽爭所以多寒少熱或但寒無熱也小柴胡湯本陰陽兩停之方可隨瘧之進退加桂枝乾薑則進而從陽若加栝蔞石膏則退而從陰可類推矣丹溪治六經瘧悉以二陳為主各加引經藥可見無痰不成瘧也大法先熱後寒者柴胡桂枝湯先寒後熱者小柴胡湯多熱但熱者白虎加桂枝湯多寒但寒者柴胡桂薑湯雖多寒但寒脈洪實者當作實治不得便用桂薑雖多熱但熱脈虛軟者當作虛治不得便用白虎寒多熱少或少食易飢噁心吐痰人參養胃湯熱多寒少口苦咽乾小便赤澀或傷食成瘧清脾飲勞役所傷飲食失節成瘧則虛弱自汗補中益氣加半夏瘧疾自汗日甚不能止此表虛不能衛護也人參實衛加桂枝風瘧自感風而得惡風自汗煩躁頭痛風陽邪也故先熱後寒宜半夏柴胡羌活紫蘇細辛生薑寒瘧暑月乘涼沐浴自感寒而得無汗惡寒攣痛面慘寒陰邪也故先寒後熱宜羌活紫蘇桂枝柴胡草果厚朴暑瘧亦名疸瘧但熱不寒裡實不泄煩渴而嘔肌肉消爍小柴胡加香薷黃連竹葉盛暑發者白虎湯虛者加人參秋涼後發者小柴胡湯此肺素有熱陰氣先絶陽氣獨發故但熱不寒也溫瘧由冬受非時之邪伏藏骨髓之中至春夏濕熱氣蒸而發發則先熱後寒或但熱不寒春用小柴胡夏用白虎加桂枝以邪熱勢盛故不惡寒而便發熱熱發於表之後正氣內虛反微似是寒之狀非惡寒也牝瘧邪伏於腎濕瘧則久受陰濕而邪伏太陰皆但寒不熱並宜蜀漆散邪伏血分而多寒少熱慘慘振振柴胡桂薑湯勞瘧大渴柴胡去半夏加栝蔞湯汗出澡浴身體重痛肢節煩疼寒熱而嘔逆者亦屬濕瘧胃苓湯加羌活紫蘇食瘧因飲食不節中脘生痰加以風氣乘之故善飢而不能食食而支滿腹大善嘔實者二陳加枳殼草果因飢飽勞役而發日久不止脈虛者理中湯加枳實青皮素有陰虛勞嗽或因瘧成勞但於調理本藥中稍加桂枝薑棗可也不可純用祛風豁痰藥若表邪勢盛可用小建中黃耆建中為主後與生料六味丸加桂枝鱉甲凡瘧發於午前是陽分受病易愈發於午後陰分受病難愈瘧發日宴為邪氣下陷於陰分必用升柴升發其邪仍從陽分而發補中益氣加桂枝瘧發日早為邪氣上越於陽分宜因勢利導之小柴胡加枳桔夜瘧俗名鬼瘧此邪入血分宜升散血脈之邪千金內補建中加升柴生首烏脾胃素虛人補中益氣加首烏桂枝芍藥瘴瘧山嵐溪澗之毒須用祛瘴滌痰之藥為主疫瘧夏秋之間沿門闔境皆是也其證壯熱多汗而渴宜達原飲煩熱大渴有表證桂枝白虎湯譫妄狂悶涼膈散加草果寒熱便祕大柴胡湯虛人發散後熱不止人參敗毒散有郁證似瘧者寒熱與瘧無異但口苦嘔吐清水或苦水面青脅痛耳鳴脈澀逍遙散倍柴胡加吳茱萸川連痢後發瘧邪從少陽循經外泄也小柴胡去黃芩加桂枝或補中益氣倍升柴升散則愈大抵瘧初起宜散邪消導日久宜養正調中所謂氣虛則惡寒血虛則發熱也日數雖多飲食未節者未可便斷為虛須禁食消導憑脈下手可也形盛氣虛人多濕痰發則多惡寒日久不已脈軟而沉帶滑用補中益氣加苓半兼用熟附子二三分瘧後不喜食四肢倦怠面色痿黃六君子加山楂黃連枳實久瘧不止元氣虛盛者用人參常山各五錢銼碎微火同炒去常山只以人參煎湯未發前服屢驗瘧發四五遍後曾經發散者何首烏散壯實者可用七寶飲至夜熱不止而脈實邪盛者此邪乾血分也常山飲截之瘧發已久遍治無功度無外邪亦無內滯惟人參一兩生薑一兩加桂枝少許冬月無汗稍加麻黃發前五更時服溫覆取微汗必止甚者連進三日無不愈者愈後亦易康復如在貧家人參減半合白朮五錢代之此方不特虛人久瘧治三日瘧更宜夜發則加當歸首烏無不應手取效然發於嚴冬之時有屢用此方及補中益氣不效者必待仲春仍用前藥加桂枝汗之即愈丹溪云痎瘧者三陰瘧也三日一發發於子午卯酉日者少陰瘧也發於寅申巳亥日者厥陰瘧也發於辰戌丑未日者太陰瘧也更須以脈證參之然後決其經而與法治按內經云時有間二日或至數日而發者邪氣與衛氣客於六腑而有時相失不能相得故休數日乃作也李士材釋云客猶會也邪在六腑則氣遠會稀故間二日或休數日也觀此則丹溪辰戌丑未日為太陰瘧非矣子午雖曰少陰而卯酉則陽明矣巳亥雖曰厥陰而寅中則少陽矣丑未雖曰太陰而辰戌則太陽矣三日發者猶可以此為言數日發者又將何以辨之大抵三日瘧初起發於夏秋者宜用二陳去橘皮加生朮檳榔常山逐去痰癖為先稍加穿山甲以透經絡至於暑結營分又當以香薷鱉甲茯苓半夏甘草當歸生薑大棗祛暑為要而前藥為無益也若元氣大虛只用補正宜六君加草果烏梅名四獸飲兼本經引使藥若元氣下陷日發漸晏者補中益氣湯大劑參朮薑棗為治如常山檳榔山甲草果皆為戈戟矣瘧母者頑痰挾血食而結為癥瘕鱉甲煎丸或小柴胡加鱉甲蓬朮桃仁俱用醋製其鱉甲用栗灰湯煮糜爛入藥尤效此金匱法也病氣俱實者瘧母丸虛人久瘧時止時發芎歸鱉甲飲不應脾虛也急用補中益氣加鱉甲少食痞悶胃虛也四獸飲加鱉甲當歸蓬朮肉桂虛人瘧母必用補益蓋緣治之失宜邪伏肝經而脅下有塊仍寒熱時作不可以癖積治之每見急於攻塊者多致不救久瘧不愈必有留滯須加鱉甲消之如無留滯只宜補益凡寒熱有常期者瘧也無常期者雜證也瘧證諸經有邪總不離乎肝膽也石頑曰經言夏暑汗不出者秋成痎瘧此論固是然其輕重之殊今昔迥異良由天運使然以北方風氣運行於南故也夫瘧疾一證向來淮泗以北最劇大江以南甚輕康熙壬子吾吳患此者比戶皆然自夏徂秋日盛一日其勢不減淮北證皆痞滿嘔逆甚則昏熱譫語脈多渾渾不顯弦象亦有關尺微弦者但其熱至晨必減不似熱病之晝夜不分也時醫不察混以傷寒目之因而誤藥致斃者日以繼踵原其寒熱之機又與往歲不同有一日連發二三次者有晨昏寒熱再見者有連發數日中間二三日復發如前者有先熱後寒者有獨寒無熱者有獨熱無寒者有今日但寒明日但熱者證雖變易無常總不越和營散邪等法但須分虛實寒熱輕重治之歷觀用劫劑及祝由之法者十無一驗間有寒熱止而昏熱不休者又須隨所稟形氣之偏勝病氣之盛衰而為調適全在機用靈活不可專守成則而舉世治瘧必先禁止飲食概用疏風發散兼消克痰食寬膈破氣之劑消克不已繼進硝黃胃氣愈傷濁邪愈逆正氣何由得行而振祛邪之力乎余治久瘧壞證每令續進稠飲繼與稀糜使胃氣輸運可行藥力然後施治如此挽回者未遑枚舉更有愈而復發發而復愈愈而又發者又須推原所發之由而為清理若常山草果檳榔厚朴枳殼青皮石膏知母等傷犯中州之藥咸非所宜逮至仲秋以後不特白虎當禁縱不犯石膏知母邪氣駸駸內陷而變腸澼者甚多有先瘧後痢者有瘧痢齊發者嘗遍考昔人治例惟補中益氣一方雖未能盡合肯綮然一隅之舉余可類推庸師不審但守通因通用之法致成夭扎者多矣診瘧脈自弦弦數者多熱弦遲者多寒弦小緊者下之瘥弦遲者可溫之弦緊者可發汗針灸也浮大者可吐之弦數者風發也以飲食消息止之丹溪治一少年冬月患瘧自卯足寒至酉方熱寅初乃休因思必為接內感寒所致用人參大補加附子行經散寒以取汗數日不得汗以足跗道遠藥力難及再以蒼朮川芎桃枝煎湯盛以高桶扶坐浸足至膝食頃以前藥服之汗出通身而愈汪石山治一少年六月因勞病瘧取涼夢遺遂覺惡寒連日慘慘不爽三日後頭痛躁悶家人診之驚曰脈絶矣議作陰證欲進附子湯未決汪曰陰證無頭痛今病如是恐風暑乘虛入於陰分故脈伏耳非絶也若進附子湯是以火濟火安能復生姑待以觀其變次晚果寒熱頭痛躁渴痞悶嘔食自汗脈皆濡小而數脾部兼弦遂用清暑益氣湯減蒼朮升麻二十餘劑而愈李士材治陳眉公三日瘧浹歲未瘥素畏藥餌尤不喜人參其脈浮之則濡沉之則弱營衛俱衰故延不已因固請曰素不服參者天畀之豐也今不可缺者病魔之久也先服人參錢許口有津生腹無煩滿遂以人參一兩何首烏一兩煎成入薑汁鍾許一劑勢減七八再劑而瘧遂截石頑治廣文張安期夫人先是其女及壻與婢數日連斃三人其僕尚傳染垂危安期夫人因送女殮歸亦病瘧雜治罔效遂成壞病勉與生薑瀉心湯救之故友李懷茲乃郎幼韓觸鄧氏疫瘧之氣染患月餘不止且左右乏人失於調理以致愈而復發加以五液注下瘧痢兼併水穀不入者半月有餘當此雖有合劑亦難克應乃攜歸齋中日與補中益氣兼理中六君萸桂之屬將養半月而康二守金令友之室春榜蔣曠生之妹也曠生喬梓見其亢熱昏亂意謂傷寒同舟邀往及診視之是瘧非寒與柴胡桂枝湯四劑而安二尹吳丹生濕盛體肥嘔逆痞脹寒熱昏眩與涼膈散加黃連下之五日而止越半月復發亦五日而止二守湯子端惡寒發熱面赤足冷六脈弦細而數自言不謹後受寒以為傷寒陰證余曰陰證無寒熱例與柴胡桂薑湯二服而痊文學顧若雨之女與甥女先後並瘧皆先熱後寒並與桂枝白虎湯而瘥太學鄭墨林夫人懷孕七月先瘧後痢而多鮮血與補中益氣加吳茱萸制川連而愈每見孕婦病瘧胎隕而致不救者多矣鄉飲張怡泉恆服參附鹿角膠等陽藥而真陰向耗年七十五七月下浣病瘧時醫誤進常山止截藥一劑遂致人事不省六脈止歇按之則二至一止舉指則三五至一止惟在寒熱之際診之則不止歇熱退則止歇如前此真氣衰微不能貫通於脈所以止歇不前在寒熱之時邪氣衝激經脈所以反得開通此虛中伏邪之象為制一方用常山一錢酒拌同人參五錢焙乾去常山但用人參以助胸中大氣而祛逐之當知因常山傷犯中氣而變劇故仍用常山為嚮導耳晝夜連進二服遂得安寢但寒熱不止脈止如前乃令日進人參一兩分二次進並與稀糜助其胃氣數日寒熱漸止脈微續而安玉峰春榜顧玉書瘧發即昏熱譫語痞脹嘔逆切其氣口獨見短滑乃有宿滯之象與涼膈散易人中黃加草果仁一劑霍然督學汪緘庵之女患前證以桂枝白虎湯易人中黃加蔥豉四服而安中翰金淳還乃郎八月間患瘧發於辰戌丑未至春子午卯酉每增小寒熱直至初夏始延治於石頑診其六脈如絲面青唇白乃與六君子加桂附四服不應每服加用人參至一兩桂附各三錢又四服而辰戌丑未之寒熱頓止子午卯酉之寒熱更甚此中土有權而邪並至陰也仍與前藥四服而色榮食進寒熱悉除後與獨參湯送八味丸調理而安文學顧大來年逾八旬初秋患疸瘧昏熱譫語喘乏遺尿或者以為傷寒譫語或者以為中風遺尿危疑莫定豫曰無慮此三陽合病譫語遺尿口不仁而面垢仲景暑證中原有是例遂以白虎加人參三啜而安同時文學願次占夫人朔客祁連山皆患是證一者兼風用白虎加桂枝一者兼濕用白虎加蒼朮俱隨手而痊若以中風遺尿例治則失之矣是日坐間有同道問及今歲瘧脈不弦之故豫謂之曰瘧屬少陽經證其脈當弦而反不弦如平人者以邪氣與正氣混合不分故絶不顯弦象金匱有云溫瘧者其脈如平身無寒但熱骨節煩疼時嘔白虎加桂枝湯主之曷知脈即不弦便非風木之邪即不當用柴胡等少陽經藥豈可以常法施治乎飛疇治沈子嘉平昔每至夏間臍一著扇風則腹痛且不時作瀉六脈但微數無他異此腎臟本寒閉藏不密易於招風也下寒則虛火上僭故脈數耳曾與六味去澤瀉加肉桂肉果五味白蒺作丸服因是臍不畏風脾胃亦實明秋患瘧醫用白虎竹葉石膏等瘧寒甚而不甚熱面青足冷六脈弦細而數用八味地黃三倍桂附作湯更以四君合保元早暮間進二日瘧止調理而愈厥經云厥之為病也足暴清胸將若裂腸若以刀切之煩而不能食脈大小皆澀寒熱客於五臟厥逆上泄陰氣竭陽氣未入故卒然痛死不知人氣復反則生矣按厥論云厥之寒熱者何也陽氣衰於下則為寒厥陰氣衰於下則為熱厥曰陽厥者因善怒而得也曰風厥者手足搐搦汗出而煩滿不解也曰痿厥者痿病與厥雜合而足弱痿無力也曰痹厥者痹病與厥病雜合而腳氣頑麻腫痛世謂腳氣衝心者是也曰厥痹者臥出而風吹之血凝於膚者為痹凝於脈者為泣凝於足者為厥是也今人又以忽然昏暈不省人事手足冷者為厥仲景論傷寒則以陽證傳陰手足寒者為熱厥主以四逆散陰證惡寒手足寒者為寒厥主以四逆湯內經厥論之義則不然蓋足之三陽起於足五指之表三陰起於足五指之裡故陽氣勝則足下熱陰氣勝則從五指至膝上寒其寒也不從外皆從內也論得寒厥之由以其人陽氣衰不能滲榮其經絡陽氣日損陰氣獨在故手足為之寒也附子理中湯論得熱厥之由則謂其人必數醉若飽以入房氣聚於脾中腎氣日衰陽氣獨勝故手足為之熱也加減八味丸經云陽氣者煩勞則張精絶張主也煩勞則主精絶闢積於夏使人煎厥夏暑傷氣而煎厥氣逆也目盲不可以視耳閉不可以聽清暑益氣湯陽氣者大怒則形氣絶而血菀於上使人薄厥血積胸中不散氣道阻礙不行故為暴逆犀角地黃湯二陽一陰發病名曰風厥肝木克胃風勝其濕不制腎水故令上逆地黃飲子又骨痛爪枯為骨厥兩手指攣急屈伸不得爪甲枯厥為臂厥身立如椽為肝厥此皆內虛氣逆也並宜八味丸喘而啘狂走登高為陽明厥此為邪實承氣湯下之厥而腹滿不知人卒然悶亂者皆因邪氣亂陽氣逆是少陰腎脈不至也名曰尸厥卒中天地戾氣使然急以二氣丹二錢用陳酒煎如覺焰硝起傾放盆內蓋著溫服如人行五里許又進一服不過三服即醒若膏粱本虛之人用附子一枚人參三兩酒煎分三次服並灸百會穴四十九壯氣海丹田三百壯身溫灸止艾炷止許緑豆大粗則傷人暴厥脈伏不省人事莫辨陰陽急用雞子三枚煮熟乘熱開豆大一孔襯粗紙一層亦開孔對當臍令熱氣透達於內即蘇然後按脈證療之如連換三枚不應不可救矣張介賓曰厥證之起於足者厥發之始也甚至卒倒暴厥忽不知人輕則漸蘇重則即死最為急候後世不能詳察但以手足寒熱為厥又有以腳氣為厥者謬之甚也雖仲景有寒厥熱厥之分亦以手足為言蓋彼自辨傷寒之寒熱耳實非內經之所謂厥也觀大奇論曰暴厥者不知與人言調經論曰血之與氣並走於上則為大厥厥則暴死氣復反則生不反則死繆刺論曰手足少陰太陰足陽明五絡俱竭令人身體皆重而形無知也其狀若尸或曰尸厥若此者豈止於手足寒熱及腳氣之謂耶今人多不知厥證而皆指為中風也夫中風者病多經絡之受傷厥逆者直因精氣之內奪表裡虛實病情當辨名義不正無怪其以風治厥也醫中之害莫此為甚診脈沉微不數為寒厥沉伏而數為熱厥沉細為氣厥芤大為血虛浮滑為痰弦數為熱浮者外感脈至如喘名曰暴厥寸脈沉而滑沉為氣滑為實實氣相搏血氣入臟唇口身冷死如身和汗自出為入腑此為卒厥孫兆治一人自汗兩足逆冷至膝下腹痛不省人事六脈小弱而急問其所服之藥皆陽藥也此非受病重藥能重病耳遂以五苓散白虎湯十餘劑而安凡陰厥脛冷則臂亦冷今脛冷臂不冷則非下厥上行所以知是陽厥也汪石山治一人卒厥暴死不知人先前因微寒數發熱面色痿黃六脈沉弦而細知為中氣久郁所致與人參七氣湯一服藥未熟而暴絶汪令一人緊抱以口接其氣徐以熱薑湯灌之禁止喧鬧移動移動則氣絶不返矣有頃果蘇溫養半月而安不特此證為然凡中風中氣中暑中寒暴厥俱不得妄動以斷其氣內經明言氣復返則生若不諳而擾亂其氣不得復返致夭枉者多矣諸氣門上氣沙篆曰經云諸痛皆因於氣百病皆生於氣子和曰天地之氣常則安變則動人並天地之氣五運佚侵於外七情交戰於中是以聖人嗇氣如持至寶庸人役物而反傷太和此軒岐所謂諸痛皆因於氣百病皆生於氣遂有九氣不同之説氣本一也因所觸而為九怒喜悲恐寒熱驚思勞也蓋怒則氣上怒則氣逆甚則嘔血及餐泄故氣上矣喜則氣緩喜則氣和志達營衛通利故氣緩矣悲則氣消悲則心系急肺布葉舉而上焦不通營衛不散熱氣在中故氣消矣恐則氣下恐則精卻卻則上焦閉閉則氣還還則下焦脹故氣不行矣寒則氣收寒則腠理閉氣不行故氣收矣炅則氣泄炅則腠理開營衛通汗大泄故氣泄矣驚則氣亂驚則心無所依神無所歸慮無所定故氣亂矣勞則氣耗勞則喘息汗出外內皆越故氣耗矣思則氣結思則心有所存神有所歸正氣留而不行故氣結矣嘗考其為病之詳變化多端如怒氣所至為嘔血為餐泄為煎厥為薄厥為陽厥為胸滿脅痛怒則氣逆而不下為喘渴煩心為消疸為肥氣為目暴盲耳暴閉筋緩發於外為癰疽喜氣所至為笑不休為毛革焦為內病為陽氣不收甚則為狂悲氣所至為陰縮氣並於肺而肝木受邪金太過則肺亦自病恐傷腎腎屬水恐則氣並於腎而心火受邪水太過則腎亦自病思傷脾脾屬土思則氣並於脾而腎水受邪土太過則脾亦自病寒傷形形屬陰寒勝熱則陽受病寒太過則陰亦自病熱傷氣氣屬陽熱勝寒則陰受病熱太過則陽亦自病凡此數者更相為治故悲可以治怒以愴惻苦楚之言感之喜可以治悲以謔浪褻狎之言娛之恐可以治喜以迫遽死亡之言怖之怒可以治思以汙辱欺罔之言觸之思可以治恐以慮彼志此之言奪之凡此五者必詭詐譎怪然後可以動人耳目易人視聽若胸中無才識之人亦不能用此法耳丹溪云冷氣滯氣逆氣皆是肺受火邪氣得炎上之化有升無降熏蒸清道甚則轉成劇病局方類用辛香燥熱之劑以火濟火咎將誰執氣無補法世俗之言也以其為病痞滿悶塞似難於補不思正氣虛者不能運行邪滯著而不出所以為病經云壯者氣行則已怯者則著而成病苟或氣怯不用補法氣何由行氣屬陽無寒之理上升之氣覺惡寒者亢則害承乃制也氣有餘便是火自覺冷氣從下而上者非真冷也蓋上升之氣自肝而出中挾相火自下而上腎熱為甚火極似水陽亢陰微也喻嘉言曰人之體中肌肉豐盛乃血之榮旺極為美事但血旺易致氣衰久而彌覺其偏也夫氣與血兩相維附何以偏旺耶蓋氣為主則血流血為主則氣反不流非真氣之衰也氣不流有似乎衰耳所以一切補氣之藥皆不可用而耗氣之藥反有可施緣氣得補而愈錮不若耗之以助其流動之勢久之血仍歸其統握之中耳七氣所致三因方論最詳喜怒憂思悲恐驚謂之七氣所傷有少痰在咽喉間如綿絮相似咯不出咽不下並宜四七湯為末煉蜜和薑汁為丸噙化及局方烏沉湯諸七氣湯分虛實選用盛怒成疾面色青黃或兩脅脹滿沉香降氣散木香調氣散或四七湯加枳殼木香虛加人參石菖蒲肥人氣滯必有痰以二陳蒼朮香附燥以開之瘦人氣滯必有火且燥宜蘇子山梔當歸芍藥丹皮降以潤之老人胸膈氣滯痞滿不舒或作痛或不能食脈雖數實滑大當作虛治慎不可用耗氣藥宜理中丸或六君子加香砂之類氣不歸源補骨脂為主白朮沉香佐之一切冷氣及婦人血氣攻擊心腹撮痛局方烏沉湯最捷婦女性執多偏屬陰氣易於動如痞悶脹痛上湊心胸或攻築脅肋腹中結塊月水不調或眩暈嘔吐往來寒熱一切氣候先用加味逍遙散或蘇子降氣沉香降氣四磨六磨選用氣從左邊起者肝火也氣刺痛皆屬火當降火藥中加枳殼氣鬱不舒而痛者木香調氣散憂而痰鬱導痰湯加香附烏藥因死血而痛者桃仁紅花歸頭食積寒痰流入脅下背膂刺痛諸藥不效者神保丸久患氣結諸藥不開者先服沉香化氣丸三五服以開其結後用六君子送降氣散調之暴怒氣厥不省人事者蘇合香丸灌之諸氣為患須分暴病久病暴怒傷陰陽氣獨亢氣厥不省者可用辛香破氣以通陰閉若久抱抑鬱氣不宣通營衛不和者又當辛溫散結以調營衛始為合宜也枳殼利肺氣多服損胸中至高之氣青皮瀉肝氣多服能損真氣木香調諸經氣兼瀉肺能使上焦之氣下達陰火上衝禁用砂仁醒脾氣而能上升然後滯氣得以下通白豆蔻能溫肺氣而使下行然後陽氣得以上達香附快滯氣陳皮泄逆氣烏藥紫蘇川芎俱能散氣使濁氣從汗散也厚朴瀉胃氣前胡下氣推陳檳榔瀉至高之氣能使濁氣下墜後重有積者宜之藿香之馨香上行胃氣沉香升降諸氣腦麝散真氣蘇子杏仁下氣潤燥氣滯有火者宜之豆蔻丁沉檀麝俱辛熱能散鬱氣暴郁者宜用稍久成火者忌之稟壯氣實氣不順而刺痛當用枳殼烏藥不已加木香若肥人氣刺痛用二陳加厚朴枳殼氣虛脈微弱者即當用異功加枳殼木香石頑曰舉世皆言氣無補法局方三因七氣四磨六磨等方其中俱用人參能無助氣為患乎古人立方用參非盡為補而設也如局方七氣原以肉桂半夏為主而借人參引入氣分以散氣豈用補之謂耶其三因七氣純是辛散即用一味人參但可隨諸藥建行氣之功不致傷氣足矣何暇逞其補性乎至於四磨六磨不過賴以資應敵之需尚恐不及安能望其補益哉診下手脈沉便知是氣其或沉滑氣兼痰飲沉極則伏澀弱難治皆由大氣鬱滯不舒以故脈顯沉伏大都沉實有力則宜辛散沉弱少力則宜溫養氣主煦之總不離乎辛溫散結也汪石山治一孀婦年四十餘患走氣遍身疼痛或背脹痛或脅插痛或一月二三發發則嘔盡所食方快飲食不進久伏床枕或用流氣飲二陳湯益甚汪診之脈皆細微而數右脈尤弱曰此憂思傷脾而氣鬱也當補脾散郁以人參三錢黃耆二錢歸身一錢半川芎八分香附黃連甘草乾薑砂仁各五分數劑稍緩再以參耆川芎香附山梔甘草神麯糊丸服而愈飛疇治一婦平昔虛火易於上升因有怒氣不得越致中滿食減作酸噯氣頭面手足時冷時熱少腹不時痠痛經不行者半載余其脈模糊快而無力服諸破氣降氣行血藥不效不知此蘊怒傷肝肝火乘虛而克脾土脾受克則胸中之大氣不布隨肝火散漫肢體當知氣從濕騰濕由火燥惟太陽當空則陰霾之氣自散真火令行則鬱蒸之氣自伏又釜底得火則能腐熟水穀水穀運則脾胃有權大氣得歸而諸證可愈矣因用生料八味倍桂附十日而頭面手足之冷熱除間用異功而中寬食進如是出入調理兩月經行而愈郁金匱云婦人咽中如有炙臠半夏厚朴湯主之即四七湯上焦陽也衛氣所治貴通利而惡閉郁鬱則津液不行而積為痰涎膽以咽為使膽主決斷氣屬相火遇七情至而不決則火鬱而不發火鬱則焰不達焰不達則氣如焰與痰涎聚結胸中故若炙臠千金作胸滿心下堅咽中帖帖如有炙臠吐之不出吞之不下證雖稍異然亦以鬱而致也用半夏等藥散郁化痰而已經云木鬱達之火鬱發之土鬱奪之金鬱泄之水鬱折之然調其氣過者折之以其畏也所謂瀉之夫所謂達者通暢之也當以輕揚之劑舉而達之發者升發之也當以升發之劑汗而發之奪者攻下之也當以鹹寒之劑攻而奪之泄者開發之也當以疏散之劑湧而泄之折者制御之也當以苦寒之劑伐而折之此皆論六氣之郁也至於五志之郁又非上法所宜經云嘗貴後賤雖不中邪病從內生名曰脫營嘗富後貧名曰失精及婦人情志不遂悒鬱不舒而致經閉不調發熱咳嗽師尼寡婦種種諸患各推其源而治之趙養葵云郁者抑而不通之義內經五法為因五氣所乘而致郁不必作憂鬱之郁憂乃七情之病但憂亦在其中丹溪云氣血沖和百病不生一有怫鬱諸病生焉又製為六郁之論立越鞠丸以治郁而以香附撫芎蒼朮開鬱利氣為主謂氣鬱而濕滯濕滯而成熱熱鬱而成痰痰滯而血不行血滯而食不化此六者相因而為病者也此説出而內經之理始晦內經之旨又因釋注之誤而復晦所以郁病之不明於世久矣蓋東方生木木者生生之氣即火氣附於木中木鬱則土鬱土鬱則金亦郁金鬱則水亦郁五行相因自然之理惟其相因也豫以一方治其木鬱諸郁皆因而愈逍遙散是也甚者方中加佐金丸以黃連治心火吳茱萸氣臊肝之氣亦臊同氣相求而佐金以制木此佐金之所以得名也凡寒熱往來似瘧非瘧惡寒惡熱嘔吐吞酸嘈雜胸痛胠痛小腹脹悶頭暈盜汗等證以逍遙散出入加減此對證之方無不獲效倘一服即愈少頃即發或半日或一日又發發之愈頻愈甚此必下寒上熱之假證此方不宜復投當改用溫補之劑如陽虛以四君子加溫熱藥陰虛以六味地黃丸作湯加溫熱藥甚者又須寒因熱用少以冷藥從之用熱藥冷探之法否則拒格不入非徒無益而反害之也石頑曰郁證多緣於志慮不伸而氣先受病故越鞠四七始立也郁之既久火邪耗血豈蒼朮香附輩能久服乎是逍遙歸脾繼而設也然郁證多患於婦人內經所謂二陽之病發心脾及思想無窮所願不得皆能致病為證不一或發熱頭痛者有之喘嗽氣乏者有之經閉不調者有之狂癲失志者有之火炎失血者有之骨蒸勞瘵者有之𧈟疽生蟲者有之治法總不離乎逍遙歸脾佐金降氣烏沉七氣等方但當參究新久虛實選用加減出入可也診郁脈多沉伏或結或促或沉或澀郁在肝腎則見於左郁在心脾則見於右氣血食積痰飲一有留滯於其間脈必因之而止澀矣但當求其有神何害之有所謂神者胃氣也郁脈雖多沉伏結促不為患也所慮在牢革弦強不和耳蓋沉伏結促有氣可散氣通則和若牢革弦強則正氣先傷無氣可散即從事調補尚難克效況復誤行耗氣之藥乎所以郁證得弦強脈者往往多成虛損也易思蘭治一婦患渾身倦怠呵欠口乾經月不食強之不過數粒而已有以血虛治之者有以氣弱治之者有知為火而不知火之源者用藥雜亂愈治愈病至冬微瘥次年夏間諸病復作肌消骨露三焦脈洪大侵上脾肺二脈微沉餘部皆平和此肺火病也以梔子仁薑汁浸一宿炒黑研極細末用人參麥冬烏梅煎湯調下進二服即知飢喜食旬日肢體充實如常後因久病不孕衆皆以為血虛而用參耆之品半月胸膈飽脹飲食頓減至三月餘而經始通下黑穢不堪或行或止不得通利其苦萬狀易復以四烏湯換生地加陳皮蘇梗黃芩山梔青皮枳殼十數劑一月內即有孕痞滿丹溪云痞與否同不通泰也由陰伏陽蓄氣與血不運而成處心下位中央䐜滿痞塞者皆土之病也與脹滿有輕重之分痞則內覺痞悶而外無脈急之形也有中氣久虛不能運行精微為痞者有過服消克不能舒化飲食為痞者有濕熱太甚痰氣上逆陽位為痞者古方治痞用黃連黃芩枳實之苦以泄之厚朴生薑半夏之辛以散之人參白朮之甘以補之茯苓澤瀉之淡以滲之既痞同濕治惟宜上下分消其氣如果有內實之證庶可略與消導世人痞塞喜行利藥以求速效雖暫時快通痞若再作危殆滋甚天地不交而成痞此脾之清氣不升而下溜胃之濁氣不降而上逆當用補中益氣加豬苓澤瀉蓋升麻柴胡從九地之下而升其清氣豬苓澤瀉從九天之上而降其濁氣即所以交痞而為泰矣諸痞塞及噎膈乃痰為氣激而上氣為痰膩而滯痰與氣搏不得流通並宜連理湯乾薑黃芩黃連人參湯黃連湯諸瀉心湯選用氣滯痞脹用五膈寬中散不應丁沉透膈湯應諸痞塞脹滿胸膈不利或氣上逆或腹疼痛並宜指迷七氣湯胃虛加參朮氣滯加木香大便祕加檳榔面目浮加蘇葉四肢腫加木瓜虛痞只用局方七氣局方烏沉二湯最妙鬱怒暴痞面目浮腫心腹脅滿二便祕澀四肢脹大增損流氣飲膈上諸般冷氣嘔逆不食不問痞塞疼痛且與薑汁探吐然後用藥痰飲尤宜邪氣作痞宜用疏劑若氣不順逆上為痞此乃虛痞愈疏而痞愈作宜於收補中微兼疏通之意不可過用香劑古人治瀉後膈痞用理中丸即此意也痞塞諸藥不效大便不通脈數實者小陷胸湯三黃湯選用甚則寶鑑木香檳榔丸通利之若肥人痰痞風閟大便不通者御藥院木香檳榔丸疏解之肥人心下痞悶內有濕痰也二陳湯加枳實芩連然不若小陷胸湯尤捷瘦人心下痞悶乃鬱熱在中焦三黃加枳實以導之心下痞而寒熱不除者小柴胡加枳桔如飲食後感冒風寒飲食不消或食冷物而作痞悶宜溫中化滯二陳加縮砂紫蘇藿香或平胃加藿香草豆蔻之類虛人停滯不散心下痞或寬或急常喜熱物者枳實理中湯老人虛人脾胃虛弱轉運不及飲食不化而作痞者九味資生丸飽悶常嚼一丸或六君子加香砂山楂曲糵之類胸中氣塞短氣橘皮枳實生薑湯有酒積雜病過下傷脾脾虛不運作痞養胃兼和血參朮歸芍兼升柴稍佐陳皮枳殼之類大怒之後成痞或痰中見血或口中作血腥氣是瘀血用丹皮紅曲香附桔梗降香紅花蘇木山楂麥芽童便甚則加大黃桃仁泥有痰挾瘀血成窠囊作痞脈沉澀日久不愈多郁人悲哀過度有之宜從血鬱治桃仁紅花香附丹皮韭汁之類舉世治中滿痞脹不問虛實咸禁甘草殊不知古人所謂中滿勿食甘者指實滿而言也若自覺滿而外無腹脹之形者當以甘治之診脈弦急而滑驟然胸中痞悶乃肝氣與食滯而成為實脈弦或沉弦或澀或虛大無力氣口為甚此日久脾胃受傷或過服克伐藥所致為虛胸膈痞悶而寸口脈沉滑或遲滑者為有停滯羅謙甫治真定趙客六月間乘涼傷濕面心下痞滿躁熱時作坐臥不安宿於寺中僧以丸藥十數丸下之下十餘行痞稍減越日困睡為盜劫其資心動遂躁熱而渴飲酒一甌是夜臍腹脹痛僧再以前藥復下十餘行病加困篤四肢無力躁熱身不寧喜冷水米穀不化痢下如爛魚腸腦赤水相雜全不思食強食則嘔痞甚於前噫氣不絶足胻冷小腹不任其痛診之脈浮數七八至按之空虛曰豫溯流尋源蓋暑熱已傷正氣以熱毒之劑下之一下之後其所傷之物已去無餘遺巴豆之氣留毒於腸胃間使嘔逆而不能食胃氣轉傷而然及下膿血無度大肉脫下皮毛枯稿脾氣弱而衰矣舌上赤澀口燥咽乾下多亡陰之所致也陰既已亡火獨旺故心胸躁熱煩亂不寧經曰獨陽不生獨陰不長夭之由也遂辭去易一醫不審脈究源惟見痞滿以枳殼丸下之病添喘滿利下不禁而死金匱云不當下而強下之令人開腸洞泄便溺不禁而死正此謂也石頑治內兄顧九玉頒詔假道歸吳大暑中患胸痞顱脹脈得虛大而濡氣口獨顯滑象此濕熱泛濫於膈上也與清暑益氣二劑顱脹止而胸痞不除與半夏瀉心湯減炮薑去大棗加枳實一服而愈家弟曾余雖列賢書最留心於醫理弟婦鄭氏乃世傳女科中山之女昆弟俱為時醫戊申夏患嘔逆不食者月餘服寬膈理氣藥二十餘劑幾至絶粒而痞脹異常邀余診之脈得虛大而數按仲景脈法云大則為虛數則為虛此胃中陽氣大虛而濁陰填塞於膈上也因取連理湯方用人參三錢服之四劑而痞止食進後與異功散調理數日而康別駕吳蛟水公祖夫人患痞眩嘔逆向因下體畏寒肢肘麻瞀久服八味參附不徹六脈弦滑而按之則濡此中焦素蘊痰濕陽氣不能周於四末之象得桂附辛熱之力有時雖可暫開究非真陽之虛且有地黃之滯所以痞暈漫無止期遂疏局方七氣湯加沉香一服豁然再劑神爽食進而安內翰繆鈞間尊大人子長老先生青年罷職樂志林泉偶因小憤遂眩暈痞悶三月來服豁痰利氣藥不應反覺疲倦飲食日減下元乏力至七月下浣邀石頑診之六脈似覺有餘指下略無沖和之氣氣口獨滯不調時大時小兩尺俱濡大少力此素多痰濕漸漬於水土二經復加剝削之劑屢犯中氣疲倦少食逮所必至法當先調中氣輸運水穀之精微然後徐圖溫補下元為疏六君子湯加當歸兼調營血庶無陽無以化之虞其如夫人久患崩淋遍服諸血藥罔效以補中益氣加制香附烏梅升舉其陽兼調其氣所謂病在下取之上端不出古聖之成則耳腹滿經云太陰所至為中滿諸濕腫滿皆屬於脾諸脹腹大皆屬於熱清氣在下則生飧泄濁氣在上則生䐜脹金匱云趺陽脈微弦法當腹滿不滿者必便難兩胠疼痛此虛寒從下上也當以溫藥服之趺陽以候內因寸口以候外因趺陽脾胃之脈而見微弦為厥陰肝木所侵侮其陰氣橫聚於腹法當脹滿有加設不滿陰邪必轉攻而上決無輕散之理蓋陰邪即聚不溫必不散陰邪不散陰竅必不通故知其便必難勢必逆攻兩胠而痛較腹滿更進一步也虛寒之氣從下而上由腹而胠才見一斑亟以溫藥服之使陰邪從陰竅走散而不至上攻則善矣病者腹滿按之不痛為虛痛者為實可下之舌黃未下者下之黃自去腹滿時減復如故此為寒當與溫藥腹滿不減減不足言當須下之宜大承氣湯腹滿不減減不足言當須下之宜大承氣湯一條已見傷寒陽明府實證此腹滿時減復如故為虛寒當溫之蓋腹滿雖因中氣虛寒然下焦之真陽未滅有時而升則有時而減然終屬虛寒故復如故而當與溫藥也按之心下滿者此為實也當下之宜大柴胡湯邪從胸脅而入於陽位合用大柴胡兩解之與臍腹硬痛承氣證不同病者痿黃躁而不渴胸中寒實而利不止者死寸口脈弦者即脅下拘急而痛其人嗇嗇惡寒也此論外因之腹滿故脈辨於寸口也寸口脈弦而脅下拘痛者其人表氣微虛不能外御其邪俾風邪即與水氣相合而為脅下拘痛表中陽虛故嗇嗇惡寒也夫瘦人繞臍痛必因風冷穀氣不行而反下之其氣必沖不沖者心下則痞瘦人本無痰濕痹著而繞臍痛者為肌肉疏薄風冷得以直入干於脾土之陰分土氣傷則不能轉運是以穀氣不行若反下之徒虛其腸胃邪氣愈逆因而上衝經曰氣上衝胸邪在大腸故也不沖者邪在於胃客氣上逆則心下痞也病腹滿發熱十日脈浮而數飲食如故厚朴七物湯主之腹滿者邪氣入於裡也發熱者陽氣達於外也雖病經十日而脈浮數邪猶未全入里況能食以證胃氣之有權故用小承氣合桂枝去芍藥湯兩解表裡之法較之桂枝加大黃湯多枳朴而少芍藥以枳朴專泄壅滯之氣故用之芍藥專收耗散之陰此腹但滿而不痛與陰血無預故去之腹中寒氣雷鳴切痛胸脅逆滿嘔吐附子粳米湯主之腹中寒氣奔迫上攻胸脅以及於胃而增嘔逆頃之胃氣空虛邪無所砥輒入陽位則殆矣是以除患之機所重全在胃氣乘其邪初犯胃尚自能食而用附子粳米之法溫飽其胃胃氣溫飽則土厚而邪難上越胸脅逆滿之濁陰得溫無敢留戀必還從下竅而出矣痛而閉者厚朴三物湯主之痛而閉塞無雷鳴嘔逆之證者為實當下之即用小承氣倍厚朴而易其名以其無亢極之火故不用承氣二字與理中湯之易名人參湯一義東垣曰經云諸脹腹大皆屬於熱此八益之邪有餘之證自外而入風寒之邪傳入於裡寒變為熱而作胃實日晡潮熱大渴引飲譫語脹滿者承氣湯下之下之則脹已是也五臟六腑俱有脹滿更以脹家寒熱多少較之胃中寒則脹滿濁氣在上則生䐜脹胃中寒濕菀遏故也太陰之厥則腹滿䐜脹後不利不欲食食則嘔不得臥按所云寒脹多如此亦有膏粱之人醇酒厚味之濕熱不得施化鬱於內而成脹滿者此熱脹之謂也調經篇云因飲食勞倦損傷脾胃始受熱中末傳寒中皆由脾胃之氣不能運化精微致水穀聚而不散遂成脹滿又有飲食過傷而成䐜脹飧泄者經云清氣在下則生飧泄濁氣在上則生䐜脹此陰陽反作病之逆從也夫飲食不節起居不時者陰受之陰受之則入五臟入五臟則閉塞不通而成䐜脹矣此皆飲食自倍腸胃乃傷所致治脹務在調其虛實適其寒溫兼寒熱補瀉之法於戰守之間從少從多各從其類可一言而盡也張三錫曰脹滿悉屬脾虛運化不及濁氣填塞所致初起微佐以消化舒郁為先勢甚而二便澀滯者微利之弱人或稍久一切病後産後瘡疽後必用參朮耆芍大補脾氣為主而佐以消化厚朴木香黃連之類然王道無近功必數十帖以漸取效每見粗工專守下之則脹已一法用商陸牽牛等一瀉即消三日後復起然真氣因瀉而下脫邪氣必復聚而成脹遂致不救可勝道哉腹脹諸證雖屬寒者多屬熱者少然世治脹喜用辛溫散氣之藥即使濕熱作脹亦必賴辛溫之品以散氣氣散則脹滿亦寬但須以去濕熱之藥為主而兼辛溫為引導則可然又有火盛陰虛熱乘血分者其腹雖脹而不甚大按之益堅小便黃赤大便祕澀至夜則微熱其脈數實而細小不可誤作食積濕熱治蓋消導則陰愈傷去濕則津愈涸矣宜用極苦極寒之藥如當歸龍薈丸或四物湯加宣胡二連蘆薈俱用醋製可一服而效也有氣虛不能裹血血散作脹必其人大便不堅或時結時溏溏則稍減結則漸加小便清利甚則渾白如泔其脈緩大而滯氣口益甚慎不可用辛溫耗氣之藥宜四君子去白朮加木香澤瀉當歸芍藥以固其氣中之血有血虛不能斂氣氣散作脹必其人煩熱便燥小便黃數其脈浮數而弦人迎尤甚慎不可用苦寒傷胃之藥宜四物湯去地黃加黃耆肉桂甘草煨薑以和其血中之氣外因六氣成脹藿香正氣散內因七情成脹沉香降氣散憂思過度致傷脾胃心腹膨脹喘促煩悶腸鳴氣走漉漉有聲大小便不利脈虛而澀局方七氣湯濁氣在上則生䐜脹生薑瀉心湯加木香厚朴脾胃不溫不能腐熟水穀而脹附子理中湯腎臟虛寒不能生化脾土而脹濟生腎氣丸中滿腹內堅硬如盤不能坐臥大小便澀滯上氣喘促面色痿黃通身虛腫者此寒熱錯雜膠固於中營衛血氣凝滯於內也分消湯分消丸詳寒熱多少或加減用之諸七氣選用亦可氣口脈緊滑噁心飽悶口乾內熱者是食積枳實導滯丸飽食奔走或跌撲凝血不散或婦人血聚而成腫脹腹上有青紫筋腹中按之疼脈來弦澀當作蓄血治之怒甚氣逆腹脅脹滿兩手脈弦青皮陳皮木香山梔柴胡枳殼歸尾桃仁芍藥薄桂嗜酒之人病腹脹如斗前後溲便俱有血用利藥轉加其脈數而澀此得之濕熱傷脾陰不能統血胃雖受谷脾不輸運故成痞脹當理脾氣祛濕熱兼養血之劑如枳實黃連炮薑半夏茯苓當歸芍藥阿膠烏梅砂仁之類白芍烏梅收脾陰黃連枳實瀉脹滿歸膠補營血苓半去涎飲砂仁醒脾氣也倘觸動平昔所蓄之濕熱脹滿逆上喘急者多死下利不止者亦死診脈來緩大者屬氣虛弦數者為血熱氣口緊盛或滑為停滯濡滑為濕熱弦細為肝邪乘脾人迎浮弦為風氣內乘弦細而數為陰邪上逆若虛大無根為脾胃氣衰沉細短澀為腎臟氣絶石頑治太史錢宮聲媳去秋瘧久大虛飲食大減經水不調季冬略行一度今春時發寒熱腹滿不食服寬脹利水藥不應擬進破血通經之劑邀石頑相商其脈左寸厥厥動搖右關與兩尺雖微弦而重按久按卻滑實流利惟右寸左關虛濡而數尋之澀澀少力此陰中伏陽之象洵為胎脈無疑良由中氣虛乏不能轉運其胎故爾作脹前醫曰自結褵迄今距十二載從來未曾受孕病後元氣大虛安有懷娠之理石頑曰向之不孕必有其故今病後餘熱留於血室因而得妊亦恆有之細推病機每粥食到口輒欲作嘔惟向晚寒熱之際得熱飲入胃其寒熱頓減豈非胃氣虛寒水精不能四布留積而為涎液汪洋心下乎俗名惡阻是也其腹滿便難之虛實尤須明辨金匱有云趺陽脈微弦法當腹滿不滿必便難乃虛寒從下上也當以溫藥服之況大便之後每加脹急以裡氣下通濁陰乘機上擾與得下暫時寬快迥殊其治雖當安胎為主但濁陰之氣非藉辛溫不能開導其結遂疏四君子湯益入歸芍以收營血之散稍借肉桂為濁陰之嚮導使母氣得溫中健運之力胎息無濁陰侵犯之虞桂不傷胎龐安常先有明試余嘗屢驗之矣服後寒熱漸止腹脹漸寬飲食漸進胎息亦漸形著而運動於臍上至仲夏因起居不慎而胎漏下血前醫猶認石瘕而進破積之方乃明諭脈證左寸動滑斷屬乾象而與扶脾藥得安後産一子舉家稱快設不審而與通經破血能保子母雙全之慶乎飛疇治謝元海因夏月常飲火酒致善食易飢半月後腹漸脹滿大便艱澀而食亦日減醫用削克清火俱不效左脈細數右脈澀滯此始為火助胃強而善食繼為火灼胃液而艱運艱運則食滯而脹滿脹滿則食減今宜斷食辛烈乘元氣未漓祛其滯而回其液日久則費調理也因用枳實導滯湯去黃連白朮加葛根一服大便通利而滯行又用健脾理氣三日後以小劑生脈加葳蕤煨葛根不半月而愈水腫經云肺移寒於腎為湧水湧水者按腹不堅水氣客於大腸疾行則鳴濯濯如囊裹漿水之病也水始起也目窠上微腫如新臥起之狀其頸脈動時咳陰股間寒足脛腫腹乃大其水已成矣以手按其腹隨手而起如裹水之狀此其候也邪氣內逆則氣為之閉塞而不行不行則為水脹三陰結謂之水平治權衡去菀陳莝微動四極溫衣繆刺其處開鬼門潔淨府精已時復五陽已布故精自生形自盛骨肉相保巨氣乃平此言土虛不能制水之病平治權衡者使陰陽各得其平也菀者積也陳者久也莝者腐也陰陽平治水氣自去微動四極者運動四肢也溫則水氣易行故須溫衣不拘隧穴名曰繆刺腠理謂之鬼門膀胱謂之淨府開者發汗也潔者滲利也陽氣既和陰精時復由是五陽宣布陰水盡滌精血自生形肉自盛骨肉與衣相保大氣平矣金匱云師曰病有風水有皮水有正水有石水有黃汗風水其脈自浮外證骨節疼痛惡風皮水其脈亦浮外證胕腫按之沒指不惡風其腹如鼓不渴當發其汗正水其脈沉遲外證自喘石水其脈自沉外證腹滿不喘黃汗其脈沉遲身發熱胸滿四肢頭面腫久不愈必致癰膿風水者腎本屬水因風而水積也經云並浮為風水傳為胕腫又曰腎風者面胕痝然壅害於言不能正偃正偃則咳名曰風水其本在腎其末在肺皆積水也上下溢於皮膚故為胕腫今止言外證骨節疼痛惡風不言胕腫脫文也腎外合於骨水則病骨肝外合於筋風則筋束關節故骨節痛脈浮惡風者知其風水之在外也皮水者皮膚胕腫是也蓋肺主氣以行營衛外合皮毛皮毛病甚則肺氣膹郁當發其汗散皮毛之邪外氣通而鬱解矣正水者腎經之水自病也經曰腎者胃之關也關門不利故聚水成病上下溢於皮膚胕腫腹大上為喘呼不得臥標本俱病也石水者乃水積小腹胞內堅滿如石經曰陰陽結邪陰多陽少名石水又曰腎肝並沉為石水水積胞內下從足少陰故不發喘黃汗者病水身黃汗出如柏汁由陽明胃熱故見色於外今之發熱胸滿四肢頭面腫者正屬足陽明經脈之證也熱久在肌肉故化癰膿風水脈浮身重汗出惡風者防己黃耆湯主之腹痛者加芍藥風水惡風一身悉腫脈浮不渴續自汗出無大熱越婢湯主之水主腎病腎脈本沉以其肝木過盛火熱生風水勢乘風上湧所以風水之脈反浮也素問云腎肝並浮為風水蓋腎肝同處腎為陰主靜其脈常沉肝為陽主動其脈常浮二臟俱有相火動於腎者猶龍火之出於海動於肝者猶雷火之出於澤龍起而水隨風發而波湧今水從風湧是以腎肝並浮也水既從風而脈浮其病在表也骨節疼痛表之虛也身重水客分肉也汗出惡風衛氣虛也防己療風腫水腫通腠理黃耆溫分肉補衛虛白朮治風主汗甘草和藥益土薑棗辛甘發散腹痛者肝邪氣塞不得升降再加芍藥以收陰也若見一身悉腫而脈浮不渴續自汗出無大熱此風氣鼓搏其水駸駸向外當與越婢湯發之此因勢利導之法且中有石膏化熱而無上逆喘滿之虞也皮水為病四肢腫水氣在皮膚中四肢聶聶動者防己茯苓湯主之厥而皮水者蒲灰散主之風水脈浮用防己黃耆湯矣而皮水即倣佛用之前脈論中同一開鬼門而標中之本則微有分風水下郁其土氣則用白朮崇土薑棗和中皮水內合於肺肺病則氣病故又名氣水金鬱泄之水積於皮以淡滲之故以茯苓易白朮加桂枝解肌以散水於外不用薑棗和之於中也況四肢聶聶風在營衛觸動經絡桂枝安得不用耶若皮水而見厥逆知水漬入腎胃病不能行陽氣於四末故手足諸陽之本先病也與傷寒厥而心下悸當先治水藥雖異而理則同也水之為病其脈沉小屬少陰浮者為風水虛脹者為氣水發其汗即已脈沉者宜麻黃附子湯浮者宜杏子湯此論少陰正水之病其脈自見沉小殊無外出之意若脈見浮者風發於外也虛脹者手太陰氣鬱不行而為虛脹也風氣之病發其汗則已即脈沉無他證者當效傷寒少陰例用麻黃附子甘草蕩動其水以救腎邪若見外證喘滿知水氣之在上而不在下即於前方除去附子而加杏仁以救肺邪此治金水二臟之正法也里水者一身面目黃腫其脈沉小便不利故令病水假令小便自利此亡津液故令渴也越婢加朮湯主之甘草麻黃湯主之里水即石水水積膀胱內胞而小腹硬滿如石也首條言其脈自沉外證腹滿不喘腎肝並沉之象其水潛伏於裡矻然不動非借風水越婢湯之法不能激之四汔也此言一身面目黃腫脈沉小便不利雖顯陽邪內動究竟脈沉不鼓不能破陰邪之堅壘必需前湯加朮以發越脾氣俾陰邪從陽里邪從表一發而陰霾迅掃此內經開鬼門法也夫小便不利而水積為患理固宜然設小便自利而水道順趨可無病水之慮矣何至亡津作渴耶不知金匱設以為例意謂此證皆由小便不利所致即使溲溺忽利反加煩渴此必陽邪內擾迫其陰津下亡當非寒去欲解之比故證雖變而治不殊總不出越婢加朮之範圍也按正水與石水似同而實異正水則外證自喘其本在腎其末在肺石水其脈自沉外證腹滿不喘其水之藏伏於下積結如石可知求其如風水皮水之脈浮殊不可得非用麻黃石膏重劑發之永無解散之期也甘草麻黃湯即越婢湯之變法病氣本輕但需開發肺氣於上則膀胱氣化行矣問曰黃汗之為病身體腫一作重發熱汗出而渴狀如風水汗沾衣色正黃如柏汁脈自沉何從得之師曰以汗出入水中浴水從汗孔入得之宜耆芍桂酒湯主之溫服一升當心煩服至六七日乃解若心煩不止者以苦酒阻故也黃汗之病兩脛自冷假令發熱此屬歷節食已汗出又身常暮臥盜汗出者此營氣也若汗出已反發熱者久久其身必甲錯發熱不止者必生惡瘡若身重汗出已輒輕者久久必身瞤瞤即胸中痛又從腰以上必汗出下無汗腰髖弛痛如有物在皮中狀劇者不能食身疼重煩躁小便不利此為黃汗桂枝加黃耆湯主之須臾飲熱粥一升余以助藥力溫覆取微汗若汗不出更服黃汗皆由營氣不和水氣乘虛襲入所以有發熱汗出身體重痛皮膚甲錯肌肉瞤動等證至於脛冷髖弛腰下無汗內經所謂身半以下濕中之也脈沉遲者水濕之氣滲於經脈而顯遲滯不行之狀證雖多歧觀其所治咸以桂芍和營散邪即兼黃耆司開闔之權杜邪氣復入之路也按仲景於瘀熱壅滯之候每云甲錯即肌若魚鱗之狀故發熱不止則瘀熱潰腐而為惡瘡每言身瞤乃經脈動惕之兆故發汗不已則營氣內乏而胸中痛也氣分心下堅大如盤邊如旋杯水飲所作桂枝去芍藥加麻辛附子湯主之當汗出如蟲行皮中即愈心下堅大如盤邊如旋盤水飲所作枳朮湯主之腹中軟即當散也肺主一身之氣而治節行焉今氣分心下堅大如盤邊如旋杯水飲所作形容水飲久積胸中不散傷其氤氳之氣乃至心下堅大如盤遮蔽大氣不得透達只從旁邊轆轉如旋杯之狀正舉空洞之位水飲占據為言其用桂枝去芍藥加麻黃附辛以通胸中陽氣陽主開陽盛則有開無塞而水飲之陰可見晛耳若胸中之陽不虧當損其有餘則用枳術二味開其痰結健其脾胃而陽分之邪解之自易易耳人但知枳實太過而用白朮和之不知痰飲所積皆由脾不健運之故苟非白朮豁痰利水則徒用枳實無益耳夫水病人目下有臥蠶面目鮮澤脈伏其人消渴病水腹大小便不利其脈沉絶者有水可下之諸有水者腰以下腫當利小便腰以上腫當發汗乃愈張介賓曰水本畏土因土虛不能制水則寒水侮所不勝反乘脾土泛濫為邪其始起也必從陰分漸次而升按肉如泥腫有分界夫水雖制於脾而實主於腎腎本水臟而元氣寓焉若腎中陽虛則命門火衰既不能自制陰寒又不能溫養脾土陰陽不得其正則化而為邪夫氣即火也精即水也氣之與水本為同類但在化與不化耳故陽旺則化而精即是氣陽衰則不化而水即為邪凡火盛水虧則病燥水盛火虧則病濕故火不能化則陰不從陽而精氣皆化為水所以水腫之證多屬陽虛喻嘉言曰病機之切於人者水火而已水流濕火就燥水柔弱火猛烈水泛溢於表裡火遊行於三焦拯溺救焚可無具以應手乎經謂二陽結謂之消三陰結謂之水手足陽明熱結而病消渴火之為害固已而三陰者手足太陰脾肺二臟也胃為水穀之海水病莫不本之於胃乃以屬之脾肺者何耶使脾足以轉輸水精於上肺足以通調水道而下則胃無病水之虞矣惟脾肺二臟之氣結而不行後乃胃中之水日蓄漸漬表裡無所不到也是則脾肺之權可不伸耶然其權尤重於腎腎者胃之關也腎司開闔腎氣從陽則開陽太盛則關門大開水直下而為消腎氣從陰則闔陰太盛則關門常闔水不通而為腫經又以腎本肺標相輸俱受為言然則水病以脾肺腎為三綱矣於中節目尤難辨晰金匱分五水之名及五臟表裡主病徹底言之後世漫不加察其治水輒宗霸術不能行所無事可謂智乎治氣之源有三一曰肺氣肺氣清則周身之氣下行也一曰胃氣胃氣和則胸中之氣亦易下行也一曰膀胱之氣膀胱之氣旺則能吸引胸中之氣下行也經曰膀胱者州都之官津液藏焉氣化則能出矣又云上焦如霧言其氣之氤氳如霧也又云膻中者臣使之官言其能分布胸中之氣而下傳也夫膻中者與上焦胸膈同位膀胱位於腹內膀胱之氣空洞善容而膻中之氣得以下運若膀胱之氣不化則腹已先脹膻中之氣安能下達耶然欲膀胱之氣化其權在於保腎腎以膀胱為府也腎氣動必先注於膀胱屢動不已膀胱脹滿勢必逆奔於胸膈其窒塞之狀不可名言治法補腎水而致充足則精氣深藏而膀胱之脹自消膀胱而令氣旺則腎邪不蓄而輸化之機自裕所以然者以腎不補則不能藏膀胱不補則不能瀉凡治水腫喘促以順肺為主肺氣順則膀胱之氣化而水自行矣試以格物之理論之凡禽畜之類有肺者有尿無肺者無尿故水道不利而成脹滿以清肺為急此義前人闡發不到後人以五苓五皮等方治水者總之未明此旨至於車水放塘種種劫奪膀胱之劑則殺人之事矣水腫有陰陽之辨陽水者脈息浮數遍身腫煩渴小便赤澀大便多祕急宜疏鑿飲禹功散浚川散神芎丸神祐丸選用小便不通危急旦夕者沉香琥珀丸陰囊腫脹二便不通者三白散然驟發便劇元氣未衰者可用上法若病後脾虛發腫只宜輕劑投之如六君五苓理苓之類俱可應用陰水者脈沉遲或細緊遍身腫不煩渴大便自調或溏泄小便雖少而不赤澀實脾散加減小便頻數者濟生腎氣丸小便有時黃赤有時不赤晚則微赤此陰本陽標未可據用溫補先與五苓散清理其標次與復元丹陰陽結邪多陰少陽為石水越婢加朮湯發之腎肝並沉為石水真武湯溫之小便涓滴不通諸藥不應急用金液丹灶心赤土煎湯送半錢誤用峻利小便不通者理苓湯和之經云結陽者腫四肢四肢為諸陽之本陽結則不行其陰故留結為之肢腫五苓散分利之水腫暴發脈浮喘滿咳逆煩熱者小青龍湯上熱戴陽下虛足冷小青龍去麻黃換肉桂加熟附子四五分面目四肢浮腫屬濕熱五皮散初起脈實氣盛五子五皮湯面獨腫而氣急蘇子降氣湯煎成磨沉香調服有一身惟面與足腫早則面甚晚則足甚蘇子降氣合除濕湯各半帖和服右半邊腫甚者肺胃中有積滯也導氣為先大忌琥珀鬱金蘇木五靈之類左半邊腫甚者肝腎間有瘀血也散血為要大忌胃苓非特蒼朮性燥能阻滯惡血即白朮亦須生用生則有逐濕散血之功而無壅滯之患皮水四肢腫而聶聶動者防己茯苓湯感濕而腫者其身雖腫而腰以下至腳尤重防己黃耆湯加黑黃牛尿輕者除濕湯加木瓜大腹皮因於氣為腫者脈必沉伏而腫滿喘急增損流氣飲大腹水腫喘脹大小便祕者葶藶木香散不服水土而腫胃苓湯病後腰腳浮腫為有水氣胃苓湯加黃連因患瘡用干瘡藥太早而致身腫上半身甚者羌活勝濕湯加升麻白芷蘇葉下半身甚者五苓散換茅朮加木瓜大腹皮婦人經水先斷後至四肢浮腫小便不通通身皆腫此血化為水名曰血分此病乃七情乖違脾胃虧損不能統攝而成最為難治日用歸脾湯下椒仁丸一丸藥雖峻厲數日當效畏而不用有養病害身之患若先小便不利後至身面浮腫經水不通者血為水敗也名曰水分用歸脾湯送葶藶丸七丸其經脈不通而化為水流走四肢悉皆腫滿者亦曰血分其證與水腫相類而實非水也歸脾湯送人參丸十五丸皆形氣不足邪淫隧道必用此藥以宣導其邪佐以調補元氣庶藥力有所仗而行則邪自不能容而真氣亦不致於觸傷矣水腫死證見一即危傷肝唇黑及腫傷心缺盆平掌無紋傷脾臍突傷腎足底平傷肺背平肩聳如卵縮向上陰囊無縫及莖腫腐者死大便滑泄水腫不消者死加以喘滿雖暴病亦必不治泄後腹脹而有青筋者死鼻煽目青耳焦面黑破䐃脫肉者死期迫矣先起於腹後散於四肢者可治先起於四肢後歸於腹者死如肺氣不能下行兩足腫潰而小水全無腹中之痛不可名狀以手揉左則痛攻於右揉右則痛攻於左當臍揉尉則滿腹俱痛叫喊不絶利水敷臍之藥俱不效無可治矣開鬼門之劑麻黃羌活防風柴胡蔥白及柳枝煎洗潔淨府之劑澤瀉木通通草防己葶藶茯苓豬苓秋石代鹽去菀陳莝之劑商陸大戟甘遂芫花牽牛宣布五陽之劑附子肉桂乾薑吳茱萸血腫之劑琥珀鬱金劉寄奴蘇木丹方治水腫用灶心赤土升許燒紅乘熱以陳三白酒或火酒淋澄清空腹食之愈血腫紅酒淋服虛人用伏龍肝煎湯澄清每日煮粥食之血腫脈證俱實大便閉者生萊蔔搗汁半盞和白蜜少許隔湯燉熱食之生牛膝搗絞汁服亦通但精滑人禁用丹方治水腫用蝦蟆七隻去頭皮足白酒漂淨同獨蒜四五十枚入豬肚中白酒煮爛去蝦蟆食豬肚食後溲便頻腫即消又方活鱧魚一枚去腸垢入獨蒜滿腹白酒煮食食後大小便與矢氣齊通即消虛人煅灰分三次砂糖調服亦消消後復脹者過三四日再服一次三次必盡後以健脾理氣及溫腎藥調之水腫小便不通諸藥不應用車前草葉搗爛絞自然汁一盞入燒酒半杯燉熱空心通口服不過七日效病久虛極不勝開泄者用薏苡四兩湯泡煮數沸頻與熱服即通勿過熟過熟即不效赤豆煮湯代茶良鯉焦重斤許者和冬瓜蔥白煮汁食鯽魚亦佳鱧魚作羹用醋勿用鹽而千金水腫蒜醋皆忌以其性味之濁也而血腫尤忌緑頭鴨或白鴨同赤豆煮汁空腹食之切忌鹽醬入口病必轉甚以鹽能助腎水之邪豆麥助濕發熱也不能戒者用赤豆大麥面盦成黃以伏龍肝水澄清化青鹽下之青鹽産砂土與煮海水成鹽不同能清心滋腎而無助水之患也忌豬羊雞鵝蝦蟹麩面及一切生冷炙爆尤戒房室憂勞醉飽診脈沉主水沉而滑浮而遲弦而緊皆水腫水病腹大脈實大者生浮虛者死水病腹閉其脈沉實弦者生沉細虛小者死水病一身悉腫瀉利厥逆脈沉實者急溫之虛大者必死加以喘迫此為命絶李士材治錢賞之遍體腫急臍突背平法在不治舉家堅請用藥以金匱腎氣丸料大劑煎服兼進理中湯五日不效乃以人參一兩生附三錢牛膝茯苓各五錢小便忽通進食計服人參四斤附子薑桂各斤余而安劉默生治汪去塵脾虛水逆傷肺喘嗽不食小水不通脈虛不勝補瀉用茯苓五錢澤瀉橘紅各一錢五分防風肉桂熟附各五分二服水去後加入參調理而安石頑治王庸若嘔逆水腫溲便涓滴不通或用五苓八正不應六脈沉細如絲因與金液丹十五丸溺如泉湧而勢頓平後以濟生腎氣培養而安鼓脹靈樞脹論云其脈大堅以澀者脹也水脹云膚脹者寒氣客於皮膚之間𪔣𪔣然不堅腹大身盡腫皮厚按其腹窅而不起腹色不變此其候也腹脹身皆大大與膚脹等色蒼黃腹筋起此其候也夫脹者皆在於臟腑之外排臟腑而郭胸脅脹皮膚故命曰脹五臟六腑各有畔界其病各有形狀營氣循脈衛氣逆為脈脹衛氣並脈循分為膚脹三里而瀉近者一下遠者三下無問虛實工在疾瀉夫心脹者煩心短氣臥不安肺脹者虛滿而喘咳肝脹者脅下滿而痛引小腹脾脹者善噦四肢煩悗體重不能勝衣臥不安腎脹者腹滿引背央央然腰髀痛胃脹者腹滿胃脘痛鼻聞焦臭妨於食大便難大腸脹者腸鳴而痛濯濯冬日重感於寒則飧泄不化小腸脹者少腹䐜脹引腰而痛膀胱脹者小腹滿而氣癃三焦脹者氣滿於皮膚中輕輕然而不堅膽脹者脅下痛脹口中苦善太息凡此諸脹其道在一明知逆順針數不失補虛瀉實神歸其室久塞其空謂之良工按諸脹統言無問虛實工在疾瀉次云補虛瀉實神歸其室二説相左其義何居原夫諸脹之因良由衛氣僭逆故宜疾瀉以下其氣氣下則脹消矣衛為水穀之悍氣常行脈外不能入於脈今以僭逆過甚乃並居營分而入於脈則為脈脹衛氣並脈循分肉間則為膚脹故昭揭於臟腑諸脹之前且言凡此諸脹其道在一故其治總不越針三里以疾瀉之也明知逆順者知胃逆之甚與不甚也針數不失者隨近遠之一下三下也素問云有病心腹滿旦食則不能暮食名為鼓脹治之以雞矢醴一劑知二劑已其有時復發者何也此飲食不節故時有病氣聚於腹也胃脈實則脹脾氣實則腹脹涇溲不利濁氣在上則生䐜脹中滿者瀉之於內下之則脹已論實證飲食起居失節入五臟則腹滿閉塞論虛證腹滿䐜脹支鬲胠脅下厥上冒過在足太陰陽明太陰之厥則腹滿䐜脹後不利不飲食食則嘔不得臥胃中寒則脹滿臟寒生滿病胃風鬲塞不通腹善滿失衣則䐜脹論寒證熱勝則腫諸脹腹大皆屬於熱諸病有聲鼓之如鼓皆屬於熱論熱證丹溪曰單腹脹乃脾虛之甚必用大劑參術佐陳皮茯苓蒼朮厚朴之類或曰腹已脹矣反用參術何耶曰乃內經塞因塞用之法正氣虛而不能運行濁氣滯塞於中今扶助正氣使之自然健運邪無所留而脹消矣盛啓東云凡下氣虛乏中焦氣壅欲散滿則恐虛其下欲補下則滿甚於中況少服則資壅多服則宣通當以啓峻湯峻補其下疏啓其中故氣既得峻補則上行而啓其中中焦運行之令使之疏通則中滿自消下虛自實乃塞因塞用也補脾藥必佐薑製厚朴以其溫能益氣辛能寬脹也張介賓曰按五臟六腑雖皆有脹然無不本於脾肺腎三臟脾屬土主運化肺屬金主五氣腎屬水主五液故五氣所化之液咸本於腎五液所行之氣咸本於肺轉輸於金水二家以制水而生金者咸本於脾是以腫脹之病無不由此三者但陰陽虛實治法各殊耳大抵陽證必熱熱者多實陰證必寒寒者多虛先脹於內後脹於外者多實先脹於外後脹於內者多虛小便黃赤大便祕結者多實小水清白大便稀溏者多虛脈滑數有力者多實脈細微無力者多虛形色紅黃氣息粗大者多實容顏枯稿音聲喘促者多虛脹起於經年纍月由食少多瀉而致者虛也當補中為主脹起於旬日之間忽因七情六氣而成者實也當疏利為主朝寬暮急血虛暮寬朝急氣虛朝暮皆急氣血俱虛余於脹滿察其實者直清陽明反掌收功若涉虛者溫補脾腎漸次康復其有不大實亦不大虛者先以清利見功繼以補中調攝又有標實而本虛瀉之不可補之無功極為危險在病名有鼓脹與蠱脹之殊鼓脹者中空無物腹皮繃急多屬於氣也蠱脹者中實有物腹形充大非蠱即血也在治法有理脾理肺之殊先喘而後脹者治在肺先脹而後喘者治在脾然脹則必喘喘則必脹二者相因也脾不運而濁火上炎肺不得清則喘肺氣被郁喘而不得下降則脹治分新久虛實初起脈實大二陳蘇子葶藶泄之二便通暢喘脹俱減其功易易也喻嘉言曰從來腫脹遍身頭面俱腫尚易治若只單單腹脹則難治遍身俱腫脹者五臟六腑各有見證故瀉肝瀉脾瀉膀胱大小腸間有取效之時單單腹脹久窒而清者不升濁者不降互相結聚牢不可破實因脾胃之衰微所致而瀉脾之藥安敢漫用乎且腫脹之可瀉者但可施之於壯盛及田野之流豈膏粱老弱所能受設為腫病為大滿大實必從乎瀉則久病後腫與産後腫將亦瀉之耶後人不察概從攻瀉其始非不遽消其後攻之不消矣其後再攻之如鐵石矣不知者見之方謂何物邪氣若此之盛自明者觀之不過為猛藥所攻即此身之元氣轉與身為難有如驅良民為盜賊之比明乎此則有培養一法補益元氣是也則有招納一法宣布五陽是也則有解散一法開鬼門潔淨府是也三法是不言瀉而瀉在其中矣夫脹皆脾胃之氣虛弱不能運化精微致水穀聚而不散故成脹滿飲食不節不能調養則消氣下降濁氣填滿胸腹濕熱相蒸遂成此證小便短澀其病膠固難以治療用半補半瀉之法健脾順水寬中為主不可過用猛烈反傷脾胃病再復脹不可治也宜分消湯分消丸隨寒熱虛實加減治之脹滿得之未久或脹或消腹皮稍軟不泄不喘隨治隨愈若臍心凸起利後脹復急久病羸乏喘急不得安者名曰脾腎俱敗無有愈期至咳嗽失音青筋橫絆腹上及爪甲青卒腫頭面蒼黑嘔吐頭重上喘下泄者皆不治蓄血成脹腹上青紫筋見或手足有紅縷赤痕小水利大便黑金匱下瘀血湯不應抵當丸去水蛭加樗雞作丸空腹日進梧子大三丸血下止後服輕則散血消脹湯肥白人腹脹多是濕痰二陳六君平胃五苓參酌瘦人腹滿是熱用炒川連厚朴白芍香附婦人血腫煩躁漱水不欲咽神昏善忘小便多大便黑散血消脹湯虛人血蠱琥珀人參丸或因産崩血虛或瘀血不散亦成腫脹其人必脈澀面黑不可作水濕治之腹脹便血其脈大時絶者死腹大脹四末清形脫泄甚上氣喘息者死腹脹誤用攻藥暫寬復脹者皆不治先脹於內後脹於外小便赤澀大便祕結氣色紅亮聲音高爽者實也木香沉香砂仁枳實厚朴蒼朮大腹皮以治脾也桑皮葶藶蔻殼蘇子桔梗枳橘以治肺也木通防己茯苓車前澤瀉豬苓以利小便也麻黃防風羌活葛根以發汗也如氣壯能食年少新病者大黃芒硝皆可應用先脹於外後甚於內小便淡黃大便不實氣色枯白語言低怯者虛也參苓白朮陳皮甘草以補脾也人參黃耆桔梗苡仁以補肺也沉香枳殼木香以理氣也桂苓澤瀉豬苓白朮以利小便升麻柴胡以開鬼門如虛甚多寒桂附薑萸俱宜取用金匱腎氣丸益火消陰脈沉者誠為切要之藥然必小腹脹極而後旁及於上者為宜試觀冰盤冷氣必從下滲冰壇脹滿則從上而裂矣小建中湯於土中瀉木必脈浮而弦強者乃為合劑亦須脅下脹急而後旁及於中者方可投之蓋風木之邪起於東方土敗木賊然後中央受困耳脹而本虛證實攻補兩難者丹方用陳香櫞去穰入溺白垽煅過水腫用通草湯氣腫用砂仁湯血腫濃煎土牛膝湯虛極用人參湯每日空腹服二錢此方能散積滯而不大傷元氣也脹而虛實莫辨宜用火酒熱飲覺辣喉者屬實熱當進苦寒燥濕攻堅之劑若飲熱火酒如啜冷水者屬虛寒參朮薑桂須大劑頻投方可救援金蟾散治一切實脹用大蝦蟆一隻以砂仁堆滿腹中鹽泥固濟煅令紅透煙盡去泥研末陳酒下三錢並治小兒疳積腹脹米湯下一錢腫脹服藥最忌鹽醬糟物愈久欲食須用開鹽醬法用大鱧魚一個破開入五苓散放瓦上對合上下俱用火炙黃焦存性為末加麝香少許空心薑棗湯服之水腫亦然惟火脹不忌鹽醬如面色枯稿肢體消瘦單腹脹急而塊壘不平者皆屬火脹此非水腫無慮助腎水之邪也若脈弦細澀雖能飲食終亦必亡火腫誤服金匱腎氣等藥急投連柏金鈴白芍之類仍用桂附少許為熱因熱用之嚮導庶可挽回若喘瀉肢枯脈無胃氣者不救診脈弦為肝克脾胃脈實則脹此屬實關上脈虛即脹滿此屬虛洪數為熱脹遲弱為陰寒浮為虛滿緊為中實虛數者不可治實大浮洪者易治沉微細小者難痊盛而緊大堅以澀遲而滑皆脹滿多熱脈浮大腹脹為逆發熱不休或寒熱如瘧皆不可治腹大脹四肢冷泄瀉不及一時而死腹脹便血脈大時絶為逆脹而上則喘咳下則泄瀉脈浮大沉細皆不治項彥章治一女腹脹如鼓四體骨立衆醫或以為妊為蠱為瘵診其脈告曰此氣薄血室其父曰服芎歸輩積歲月非血藥乎曰失於順氣也夫氣道也血水也氣一息不運則血一息不行經曰氣血同出而異名故治血必先順氣俾經隧得通而後血可行乃以蘇合香丸投之三日而腰作痛曰血欲行矣急以芒硝大黃峻逐之下汙血纍纍如瓜者數十枚而愈緣其六脈弦滑而數弦為氣結滑為血聚實邪也故行氣而血大下又一女病同而診異項曰此不治法當數月死嚮者脈滑為實邪今脈虛元氣奪矣又一女病亦同而六脈俱弦項曰真藏脈見法當逾月死後皆如之喻嘉言治一血蠱服藥百日後大腹全消左脅始露病根一條如小枕狀以法激之嘔出黑汙血鬥許余從大便泄去始消每思蠱脹不論氣血水痰總必自開一宇如寇賊蟠據必依山傍險方可久聚內經論五歲之積皆有定所何獨於六腑之積久為患如鼓脹等類者遂謂漫無根柢區界乎石頑治文學顧若雨鼓脹喘滿晝夜不得寢食者二十餘日吾吳名醫用大黃三下不除技窮辭去更一醫先與發散次用消克破氣二十餘劑少腹至心下遂堅滿如石腰脅與䏚中皆疼痛如折亦無措指而退彼戚王墨公邀余往診脈得弦大而革按之漸小舉指復大詢其二便則大便八九日不通小便雖少而清白如常此因克削太過中氣受傷濁陰乘虛僭據清陽之位而然以其濁氣上逆不便行益氣之劑先與生料六味丸加肉桂三錢沉香三分下黑錫丹二錢導其濁陰是夜即脹減六七胸中覺飢侵晨便進糜粥但腰胯疼軟如失兩腎之狀再劑胸腹全寬少腹反覺微硬不時攻動此大便欲行津液耗竭不能即去故也診其脈僅存一絲改用獨參湯加當歸枳殼大便略去結塊腰痛稍可少腹遂和又與六味地黃仍加肉桂沉香調理而安積聚經云寒氣客於小腸膜原之間絡血之中血澀不得注於大經血氣稽留不得行故宿昔而成積矣有身體髀股胻皆腫環臍而痛名曰伏梁此風根也其氣溢於大腸而著於肓肓之原在臍下故環臍而痛也不可動之動之為水溺澀之病病脅下滿氣逆二三歲不已名曰息積此不妨於食不可灸刺積為導引服藥藥不能獨治也按息積乃氣息痞於脅下不在臟腑營衛之間積久成形氣不幹胃故不妨於食婦人重身大積大聚毒可犯也衰其大半而止過乃死腸覃寒氣客於腸外與衛氣相搏氣不得營因有所繫癖而內著惡氣乃起瘜肉乃生其始生也大如雞卵稍以益大至其成如懷子之狀久者離歲按之則堅推之則移月事以時下此其候也石瘕生於胞中寒氣客於子門子門閉塞氣不得通惡血當瀉不瀉衃以留止日以益大狀如懷子月事不以時下皆生於女子可導而下金匱云奔豚病從少腹起上衝咽喉發作欲死復還止皆從驚恐得之驚則傷心恐則傷腎心傷氣虛而腎邪乘之從少腹起上衝咽喉腎脈所循之處也其水邪逆上凌心故發作欲死少頃邪退還止也奔豚氣上衝胸腹痛往來寒熱奔豚湯主之氣上衝胸腹痛者陰邪上逆也往來寒熱者邪正交爭也奔豚雖曰腎積而實衝脈為患沖主血故以芎歸芍草苓半生薑散其堅積之瘀葛根以通津液李根以降逆氣並未嘗用少陰藥也設泥奔豚為腎積而用伐腎之劑則謬矣即使果有水氣凌心不過桂苓之類千金成法可師不必如東垣奔豚丸之用巴豆烏附等耗水傷津藥也心胸中大寒痛嘔不能飲食腹中寒上衝皮起出見有頭足上下痛而不可觸近大建中湯主之大寒填塞於胸膈之間不能出納是以痛嘔不能飲食也腹中有寒則汁沫溢於腸胃之外是以上衝皮起出見有頭足痛不可觸乃有形之積聚於空郭之間故當大建其中使邪不敢內干於藏也乾薑人參膠飴大溫補其中土蜀椒補心氣而散胸中之寒又能消皮膚中之陰聚總取其辛散耳脅下偏痛發熱其脈緊弦此寒也以溫藥下之宜大黃附子湯脅下偏痛發熱其脈緊弦寒在厥陰少陰之分也邪在下當從下解然寒邪之在陰分故當以溫藥下之附子驅少陰之寒細辛達厥陰之氣用大黃通泄其積此寒熱並施之妙用也寒氣厥逆赤丸主之寒氣逆於上下則陰陽之氣不相順接是以厥逆而不知也烏頭驅上逆之寒茯苓導心氣下降細辛發腎氣上升半夏散寒飲結聚真朱為色有坎離相生之義世俗以烏半相反殊失此方之奧難經云氣之所積名曰積氣之所聚名曰聚故積者五臟所生其始發有常處其痛不離其部上下有所終始左右有所窮處聚者六腑所成其始發無根本上下無所留止其痛無常處肝之積名曰肥氣在左脅下心之積名曰伏梁在臍上上至心下脾之積名曰痞氣在胃脘肺之積名曰息賁在右脅下腎之積名曰賁豚發於少腹上至心下若豚狀或上或下無時癥者按之應手亦如五積之不移瘕者假物成形如血鱉石瘕之類痃者皮厚也在肌肉之間而可見者也癖者僻也內結於隱僻外不得見者也李士材曰按積之成也正氣不足而後邪氣踞之然攻之太急正氣轉傷初中末之三法不可不講也初者病邪初起正氣尚強邪氣尚淺則任受攻中者受病漸久邪氣較深正氣較弱任受且攻且補末者病根經久邪氣侵凌正氣消殘則任受補蓋積之為義日積月纍匪朝伊夕所以去之亦當有漸太急則傷正氣正傷則不能運化而邪反固矣余嘗用陰陽攻積丸通治陰陽二積藥品雖峻用之有度補中數日然後攻伐不問其積去多少又與補中待其神壯而復攻之屢攻屢補以平為期經曰大積大聚毒可犯也衰其大半而止過者死故去積及半純與甘溫調養使脾土健運則破殘之餘積不攻自走必欲攻之無餘其不遺人夭殃者鮮矣經曰壯者氣行則已怯者則著而成病潔古云壯人無積惟虛人則有之皆由脾胃怯弱氣血兩衰四氣有感皆能成積若遽以磨堅破積之藥治之疾似去而人已衰藥過則依然氣愈消痞愈大竟何益哉善治者當先補虛使血氣壯積自消也不問何藏先調其中使能飲食是其本也雖然此為輕淺者言耳若夫大積大聚不搜而逐之日進補養無益也審如何經受病何物成積見之既確髮直入之兵以討之何患其不愈兵法曰善攻者敵不知其所守是亦醫中之良將也夫五積六聚隨氣上下發作有時心腹㽱痛上氣窒塞小腹滿大小便不利大七氣湯用鐵洛飲煎服形羸氣弱者禁用有飲癖結成塊在脅腹之間病類積聚用破塊藥多不效此當行其飲六君子合五苓散最妙更加旋覆前胡枳實白芍即海藏五飲湯若在膜外者宜導痰湯主之何以知其飲其人先曾病瘥口吐涎沫清水或素多痰者是也又多飲人結成酒癖肚腹積塊脹急疼痛或全身腫滿肌黃食少宜大七氣湯紅酒煎服腹中似若瘕癖隨氣上下未有定處二陳加當歸杏仁桂心檳榔名散聚湯若氣作痛遊走心腹間攻刺上下如雷鳴或已成積或未成積宜木香通氣散肉積妨礙飲食四味阿魏丸石瘕利血通經湯不應見睍丸虛人十全大補湯送下腸覃阿魏麝香散伏梁環臍而痛金匱三物大建中湯加桂苓息積氣逆而不妨於食內服三因化氣散外用良方阿魏膏此膏尉貼一切痞積並效食魚鱉成痞𪁽䳓丸瘧痞寒熱阿魏化痞散喬氏陰陽攻積丸可代東垣五積諸方局方治七種癖塊五種癲病十種疰忤七種飛尸十二種蠱毒五種黃病十二種瘧疾十種水病八種大風十二種𤸷痹及五臟滯氣壅閉心腹脹滿諸蠱積聚時定時發十年二十年不瘥者千金耆婆萬病丸悉主之好食茶葉成癖面黃少力者用椒紅二兩茶葉一兩為末飛羅麵炒香打糊為丸茶清送下三十丸又方苦草二兩加茶葉一兩如好食米穀土炭紙布之類即以其物加入並用其物煮湯送下瘧痞丹方月明淨雄黃醋煮研細神麯為丸空心溫酒送下四五分勿令間斷消盡乃止血積桃仁穿山甲乾漆大黃虻蟲瘀血蓬朮瓦壟子痰積半夏南星白朮枳實礞石硝石風化硝白芥子老痰海石蛤粉水積大戟甘遂蕘花芫花酒積乾葛神麯砂仁豆蔻黃連乾薑甘遂牽牛茶積薑黃茱萸椒薑癖積三稜蓬朮巴霜大黃肉積山楂阿魏硝石蟲積雄黃錫灰檳榔雷丸蕪荑使君子鶴蝨瘧積桃仁鱉甲草果診脈來細而附骨者積也積脈堅強者生虛弱者死沉而有力為積沉緊者為寒積脈弦而牢積聚弦而伏者腹中有癥不可轉也不治小沉而實者胃中有積聚不下食食即吐脈沉重而中散者因寒食成癥脈左轉而沉重者氣癥結在胸中右轉出不至寸口者內有肉癥也喻嘉言治一人少腹臍傍三塊堅硬如石以手拊之痛不可忍其脈止兩尺洪盛余俱微細此由見塊醫塊不究其源而誤治也初起時塊必不堅以峻猛之藥攻之致真元內亂轉助邪為害故迸緊不散其實全是空氣聚成非如女子月經凝而不行即成血塊之比觀兩尺脈洪盛明是腎氣傳於膀胱姑用補中藥一劑以通中下之氣後用大劑藥內收腎氣外散膀胱先以理中湯加附子五分塊減十之三再用桂附大劑腹中奔氣響甚三塊一時頓沒更用補腎藥加桂附調理而愈顧晉封夫人患痞在脅下或令用膏藥加阿魏一分麝香半分貼之五六日間遂下鮮血血塊甚多二三日方止是後每歲當貼膏時必發近鄰嫗亦用阿魏膏貼痞下血如前世以阿魏麝香為痞塊必用之藥外用為患若此況服食乎因為拈出以為虛人漫用攻擊之戒
