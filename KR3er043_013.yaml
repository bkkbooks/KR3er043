知母茯神栝蔞根鮮地骨皮各二兩石膏四兩碎生地黃汁二升麥門冬汁白蜜各一合生薑汁二合竹瀝六合半上㕮咀以水一斗二升先煮諸藥取汁三升去滓下竹瀝地黃門冬汁緩火煎至四升下煉白密薑汁再煎數沸初服三合日三夜一服加至四合夏月為散收薑汁竹瀝焙乾蜜丸服煎膏尤妙喻嘉言曰此方生液涼血制火撒熱兼擅其長再加人參乃治虛熱之良劑然非能食便祕者斷不可施通幽湯治大便燥結便出堅黑油當歸二錢五分升麻三分醋浸桃仁泥一錢甘草生炙各五分紅花少許熟地黃生地黃各一錢五分水煎將成用藥汁磨檳榔五分調入稍熱服潤燥湯通幽湯加麻仁大黃各一錢清涼飲治上焦積熱肺氣不化口舌乾燥黃連黃芩薄荷黑參當歸赤芍藥各一錢五分甘草炙一錢水煎入生白蜜一匕熱服大便祕結加酒蒸大黃四順清涼飲一名四順飲治血熱便祕脈實者當歸赤芍甘草大黃酒蒸各一錢五分水煎入生白蜜一匕熱服按清涼飲治上焦之燥熱故用薄荷之辛散四順飲主下焦之燥結故用大黃之苦寒功用天淵麻仁丸玉函治脾約大便燥結厚朴姜汗炒芍藥枳實炒各二錢大黃四錢麻仁泥杏仁泡去皮尖各錢半上六味為末煉白蜜丸梧子大飲服五十丸日三服以利為度潤腸丸治大腸風熱血祕麻仁桃仁另研各一兩羌活當歸各半兩大黃緑礬水浸濕紙裹煨半兩皂角仁秦艽各半兩一作防風除二仁另研外為細末蜜丸梧子大每服五十丸食前溫酒下本方加郁李仁防風名潤燥丸豬膽導玉函大豬膽一枚瀉汁和醋少許以灌穀道中如一食頃當大便出虛人不可用膽導陳醬薑陳醬瓜皆可削為導濕熱肥盛痰悶可用黃瓜根浸濕削之為導此即土瓜根導也蜜煎導白蜜七合一味納銅器中微火煎之稍凝如飴狀攪之勿令焦著欲可丸並手捻作挺令頭鋭大如指長五寸當熱時急作冷則硬納穀道中以手急抵欲大便去之異功散四君子湯下錢氏六味丸崔氏八味丸下固本丸二冬膏下滋燥養營湯四物湯下大補地黃丸四物湯下虎潛丸大補丸下火門紫雪局方治腳氣瘴毒內外熱熾狂越躁亂心腹㽲痛口舌生瘡一切實火閉結諸藥不效者黃金十兩賃金鋪中葉子有效用水三斗先煮一斗旋添煮至一斗為度去金取汁煮下項藥石膏寒水石如無真者元精石代之磁石醋煅白滑石各五兩上四味搗入前汁中煮至五升入下項藥烏犀角鎊羚羊角鎊青木香切沉香研各五錢黑參切升麻各一兩六錢生甘草八錢丁香搗研一錢上八味入前汁中煮取一升五合去滓入下項藥芒硝一兩焰硝三兩上二味入前藥汁中微火上煎柳木捶攪不住手候有七合半投在水盆中半日欲凝入下項藥硃砂研細水飛淨五錢麝香當門子研一錢二分上二味入前藥中攪勻勿見火寒之二日候凝結成霜紫色鉛罐收貯每服一分至二分杵細冷水或薄荷湯調下小兒以意量減此即千金玄霜局方於紫雪方中參入甘草丁香硃砂三味遂用紫雪之名一方而兼兩方之制但此專主石藥毒火方中丁香一味用方者審之黃金本無氣味必鋪中葉子曾經煉煅煮之方有性味以其香味易散故較原方減小其制碧雪局方治一切積熱咽喉腫痛口舌生瘡心中煩躁咽物妨悶或喉閉壅塞水漿不下天行時疫發狂昏憒並皆治之寒水石芒硝石膏煅飛青黛馬牙硝朴硝硝石甘草各等分上將甘草煎湯二升去滓卻入諸藥再煎用柳木篦不住手攪令消熔得所卻入青黛和勻傾入砂盆內候冷結凝成霜研為末每用少許含化咽津不拘時候如喉閉壅塞不能咽物者用小竹筒吹藥入喉中頻用神效千金朴硝煎治服石藥成消疸大渴者朴硝一斤芒硝八兩石膏二兩寒水石四兩上四味先納二硝於八升湯中攪令消以紙密封一宿取清納銅器中別搗寒水石石膏碎如豆粒以絹袋盛之納汁中以微火煎候其上有漠起以箸投中著箸如凌雪凝白急下瀉貯盆中待凝取出烈日曝乾積熱困悶不已者以方寸匕白蜜一合和冷水五合攪和令消頓服之日三熱定即止武德中貴高人加金二兩崔氏八味丸方祖保元湯方祖既濟解毒湯伊尹三黃湯下火鬱湯升麻湯下瀉陰火升陽湯保元湯下升陽散火湯升麻湯下佐金丸方祖當歸龍薈丸伊尹三黃湯下黑錫丹金液丹下四君子湯方祖錢氏六味丸崔氏八味丸下生脈散方祖滋腎丸大補丸下傷飲食門枳實導滯湯治傷濕熱之物痞悶不安枳實炒三錢白朮炒焦五錢茯苓三錢黃芩酒炒二錢黃連薑汁炒三錢澤瀉炒二錢大黃酒蒸一兩神麯炒四錢生薑三片水煎食遠服此枳朮丸合三黃湯而兼五苓之制以祛濕熱宿滯也木香化滯湯治氣食痞結腹微痛不思飲食半夏甘草炙草豆蔻研各一錢柴胡木香橘皮各六分枳實炒當歸各四分紅花一分生薑五片水煎食遠稍熱服保和丸治宿食酒積山楂肉薑汁泡二兩半夏薑汁炒橘紅炒神麯炒便血用紅曲麥糵炒去殼茯苓連翹萊蔔子黃連薑汁炒各五錢為末水泛為丸每服二錢茶清送下本方加炒白朮二兩名大安丸按保和丸大安丸中麥糵傷腎蔔子傷肺胃之氣恐非丸劑所宜久服之品當易枳實香附子功用不殊而不致傷犯先後天之真氣也紅丸子治宿食冷積作脹荊三稜炒蓬莪朮煨青皮炒陳皮炒乾薑炮等分為末陳酒麴糊丸梧子大礬紅為衣每服三十五丸食前沸湯下小兒量減葛花解酲湯治傷酒嘔吐胸痞小便不利葛花白豆蔻砂仁炒各一錢青皮炒神麯炒澤瀉乾薑各五分白朮炒八分人參橘紅茯苓豬苓各四分木香一分水煎服但得微汗則酒濕去矣按此雖本五苓四君子益入葛花豆蔻等辛散之味大損元氣世人不知妄謂方中人參有補益之功恃此縱飲是自伐其天也曲糵丸治酒積成癖腹脅滿痛後便積沫神麯炒麥糵炒去殼各一兩黃連半兩同