擾喘嗽失血強中滑精者禁用以其專主溫散而無涵養真陰之澤也或問烏鰂茹蘆俱搜血之品如何可治血枯經閉之疾答曰夫血枯經閉非純虛而經絶不行也良由氣竭肝傷乾血內結以故營血不能內藏如胸脅支滿目眩血結肝部也聞腥臊妨於食血結胃脘也出清涕胃氣衰而濁逆清道也凡崩淋胞痹諸證若沃以湯上為清涕皆陽衰不能灌注精微敗殘之液悉化為涕得湯氣蒸而上走空竅也是知血枯經閉心以清理乾血為首務故金匱治五勞虛極羸瘦內有乾血用大黃䗪蟲丸由此而推胞痹精傷亦必清理敗濁為首務蓋大黃䗪蟲丸一派破瘀之味較烏鰂蘆茹丸之搜血猛竣白倍耳又問雀卵以時而生急需未可必得奈何答曰大匠在乎繩墨不拘物料皆可成器雀卵功專暖腎如無雀肉煮搗可代雞卵及肝亦可代雞屬巽而肝主血也活法在人可執一哉花蕊石散局方治氣虛血凝瘀積壅聚胸膈作痛宜用重劑竭之花蕊石五兩碎産硫黃山中狀如黃石中有黃點如花之心故名花蕊近世皆以玲瓏如花蕊者僞充欲試真僞煅過置血上血即化水者真硫黃二兩上二味同入煬成罐內鹽泥封固煅一伏時研如面每用二錢食遠童便調服婦人産後血逆血暈胞衣不下或子死腹中俱宜服之瘀血化為黃水然後以獨參湯調之十灰散治虛勞吐血咯血先用此遏之大薊小薊柏葉薄荷茜根茅根山梔大黃牡丹皮棕櫚皮等分各燒灰存性紙裹蓋地上一夕食遠服二三錢童便調下花蕊石散為破血之峻劑功專化血為水而世畏其峻罕能用之葛可久言暴血成升斗者宜花蕊石散若病久涉虛及肝腎二家之血非其所宜且與十灰散並舉而言不分寒熱主治所以後世不能無誤用之失當知十灰散專主火炎上湧之血倘誤用以治陰邪固結之證為害猶輕若誤用花蕊石散治血熱妄行之病為患莫測況血熱妄行十常八九陰邪固結十無一二所以舉世醫者病者俱畏之如蠍遂致置而不講乃致一切陰邪暴湧之血悉皆委之莫救豈其命耶瑞金丹治虛勞吐紅瘀結者川大黃酒拌炒黑至黃煙起為度真秋石各一兩上杵為細末煮紅棗肉為丸小豆大空腹簿荷湯下二錢瘀在心包不時驚悸面赤神昏者加真鬱金三錢皮色如梧桐子紋皺者真瘀在胃吐血成盆者犀角地黃湯送下童真丸治虛勞吐血氣虛喘嗽真秋石川貝母去心等分上二味煮紅棗肉為丸空腹薄荷湯下二錢如脈虛氣耗加人參若脈細數為陰虛禁用人參加牡丹皮脾虛溏泄加山藥茯苓炙甘草龜鹿二仙膏治督任俱虛精血不足鹿角膠一斤龜版膠半斤枸杞六兩人參四兩另為細末桂圓肉六兩上五味以杞圓煎膏煉白蜜收先將二膠酒浸煬杞圓膏中候化盡入人參末瓷罐收貯清晨醇酒調服五六錢聚精丸治腎虛封藏不固鰾膠白淨者一斤碎切蛤粉或牡蠣粉炒成珠再用乳酥拌炒則不黏韌沙苑蒺藜五兩乳浸一宿隔湯蒸一炷香曬乾勿炒為細末煉白蜜中加入陳酒再沸候蜜將冷為丸不可熱搗熱搗則膠黏難丸丸如緑豆大空心溫酒或白湯下八九十丸忌諸魚牛肉張景嶽加五味二兩大補黃庭丸治虛勞食少便溏不宜陰藥者人參一兩茯苓一兩山藥二兩上為末用鮮紫河車一具用河水二升稍入白蜜隔水熬膏代蜜為丸空心淡鹽湯下三錢巽順丸治婦人倒經血溢於上男子咳嗽吐血左手關尺脈弦背上畏寒有瘀血者烏骨白絲毛雞一隻男雌女雄取嫩長者溺倒泡去毛竹刀剖脅出肫肝去穢留內金並去腸垢仍入腹內烏鰂骨童便浸曬乾為末微炒黃取淨四兩茹蘆去梢酒洗切片淨一兩即茜根鮑魚切薄片四兩上三味入雞腹內用陳酒童便各二碗水數碗砂鍋中旋煮旋添糜爛汁盡搗爛焙乾骨用穌炙共為細末乾山藥末調糊為丸梧子大每服五七十丸空心百勞水下百勞水見百勞丸下烏骨雞丸祕旨治婦人鬱結不舒蒸熱咳嗽月事不調或久閉不行或倒經血溢於上或産後褥勞或崩淋不止及帶下赤白白淫諸證兼療男子斫喪太早勞嗽吐紅成虛損者烏骨白絲毛雞一隻男雌女雄製法同巽順丸北五味一兩碎熟地黃四兩如血熱加生地黃二兩上二味入雞腹內用陳酒酒釀童便於砂鍋中煮如巽順丸綿黃耆去皮蜜酒拌炙於術飯上蒸九次各三兩白茯苓去皮當歸身酒洗白芍藥酒炒各二兩上五味預為粗末同雞肉搗爛焙乾骨用酥炙共為細末入下項藥人參三兩虛甚加至六兩牡丹皮二兩酒淨勿炒川芎一兩童便浸切曬上三味各為細末和前藥中另用乾山藥末六兩打糊衆手丸成曬乾勿令餿瓷罐收貯侵晨人參湯或沸湯送下三錢臥時醇酒再服二錢大便實者煉白蜜為丸亦可骨蒸寒熱加九肋鱉甲三兩銀柴胡地骨皮各一兩五錢經閉加肉桂一兩崩漏下血倍熟地加真阿膠二兩倒經血溢加麥門冬二兩鬱結痞悶加童便制香附二兩沉香半兩赤白帶下加真川萆薢二兩四制香附二兩蘄艾一兩白淫倍用參耆苓術按烏骨雞丸諸藥皆平常無奇而調經最驗蓋雞屬巽補肝尤妙在烏骨益腎變巽歸坎甲癸同源兼滋衝任也孫真人云自古名賢治病多用生命以濟危急雖曰貴人賤畜至於愛命人畜一也如白鳳膏烏骨雞丸等方為虛損門中調經要藥在證治之所必需者不得已而用之以人命至重非蜎飛蠕動之比苟有他方可以代充取效尤為曲體天地好生之心倘用之無濟徒傷生命以為財利之謀仁人君子諒不為之也逍遙散局方治肝氣抑鬱寒熱咳嗽月事不調柴胡七分炒白朮蜜水拌蒸一錢茯苓一錢甘草炙八分當歸一錢白芍酒炒一錢五分陳皮略去白八分乾咳用蜜制薄荷葉五分煨姜三片上九味水煎半飢時服加味逍遙散逍遙散加牡丹皮一錢五分炒黑山梔一錢脾虛食少便溏去山梔易香附此本八珍湯去參之益氣芎之上竄地之膩膈而加