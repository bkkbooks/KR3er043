body:
  text: 卷十三專方諸家類集方藥皆隨論次第是編逐門但隸專方其藉古方加減各門可以通用者倣佛祖劑之義另自為卷於後中風門侯氏黑散金匱治大風四肢煩重心中惡寒不足菊花三兩白朮一兩防風八錢桔梗六錢黃芩四錢人參茯苓細辛當歸乾薑芎藭桂枝牡蠣熬礬石各二錢二分上十四味杵為散酒服方寸匕日三服初服二十日用溫酒調服禁一切魚肉大蒜常宜冷食六十日止即藥積在腹中不下也熱食即下矣冷服自能助藥力外臺藉此治風癲疾大風四肢煩重脾土受風水之制土氣內結不能敷布於四末也心中惡寒不足者胸中為濁氣填塞心火內蘊不得發越熱極反兼寒化也方中用菊花為君以解心下之蘊熱防桂辛桔以升發腠理參苓白朮以實脾杜風芎歸以潤燥熄火牡蠣礬石以固澀腸胃使參術之性留積不散助其久功乾薑黃芩一寒一熱寒為風之嚮導熱為火之反間也用溫酒服者令藥性走表以開其痹也冷食而禁諸熱物者恐礬得熱而下不能盡其藥力以礬石性得冷即止得熱則下也郭雍曰黑散本為滌除風熱方中反用牡蠣礬石止澀之味且令冷食使藥積腹中然後熱食則風熱痰垢與藥漸次而下也風引湯金匱千金名紫石散除熱癱癇並治大人風引小兒驚癇瘛瘲日數十發大黃乾薑龍骨熬各一兩二錢甘草牡蠣熬各六錢滑石石膏各一兩八錢赤石脂紫石英白石脂寒水石如無石鹽代之桂枝各一兩千金作桂心上十二味杵節以韋囊盛之取三指撮井花水三升煮三沸溫服一升巢氏借治腳氣郭雍借治火逆風者外司厥陰內應肝木上隸手經下隸足經中見少陽相火所以風自內發者由火熱而生也風生必害中土土病則四末不用聚液成痰癱者風木挾痰注於四肢也癇者風熱擾其經脈內應於心主也前方祛風外散此方引風內泄故用大黃兼甘草桂枝滑石石膏以化風熱乾薑以為反諜使火無格拒之虞石英寒水以潤血燥石脂龍骨牡蠣以補塞其空絶風火復來之路也千金三黃湯金匱治中風手足拘急百節疼痛煩熱心亂惡寒經日不欲飲食麻黃黃芩各三錢八分獨活三錢細辛一錢五分黃耆六錢上五味水煎溫服一服小汗二服大汗心熱加大黃錢半腹滿加枳實一枚氣逆加人參三錢悸加牡蠣二錢渴加栝蔞根二錢先有寒加附子一片石頑曰此方千金云仲景三黃湯治惡寒經日不止不欲飲食全似內外虛寒之候而方中反用黃芩之苦寒豈不礙麻黃輩之溫散乎既用麻黃復用黃耆豈不礙表氣之閉拒乎曷知惡寒經日不止雖有似乎虛寒而實衛虛不能勝邪所致不欲飲食亦是風熱內蘊之故觀煩熱心亂一語病情灼然故方中雖以麻黃獨活細辛開發腠理於外即以黃芩清解風出於內更慮衛虛難於作汗乃以大劑黃耆助之與黃耆建中之義不殊其用黃耆之意有二一以佐麻黃開發之權一以杜虛風復入之路也方後復云心熱加大黃言服前藥後心中煩熱不除知黃芩不能祛之外散即以本方加大黃以引之下泄也其加枳實加人參加牡蠣加栝蔞等法或治旺氣或助本元各隨標本而施加附子者專佐麻黃之蒸發助黃耆溫經殊非陰寒之謂與麻黃附子細辛湯同源異沠詳金匱以千金二字名方珍重之也千金祖金匱之意而銜其集曰備急千金方不忘祖述之本也千金竹瀝飲子治風痱身無痛四肢不收志亂不甚者用此方當先以竹瀝二十分生葛汁十分薑汁一分和服然後用竹瀝飲子芎藭防己附子人參芍藥黃芩甘草桂心各一分羚羊角三分石膏六分杏仁十四粒麻黃防風各分半上十三味水煮減半內竹瀝十分生葛汁五分薑汁半分分三服取汗間二三日更服一劑三服後隨病進退增減地黃飲子治腎氣不上交於心舌喑足痱熟地黃三兩巴戟天酒浸去骨肉蓯蓉酒浸去腐切焙山茱萸去核石斛附子炮白茯苓石菖蒲遠志甘草湯泡去骨甜肉桂麥門冬去心各一兩五味子五錢共為粗末每服五錢生薑五片大棗一枚薄荷七葉水煎日二服服無時喻嘉言曰方中桂附巴戟原為驅逐濁陰痰涎而設不可執己見而輕去之天麻丸治腎臟虛熱生風天麻牛膝二味酒浸二日焙川萆薢黑參羌活各四兩杜仲酒炒七兩附子炮去皮一枚當歸十兩生地黃酒浸焙十六兩為末煉白蜜丸侵晨沸湯臨臥溫酒送七十丸方中雖以歸地補養陰血為君其妙用全在天麻與牛膝同浸同焙俾風痰濁濕咸從下趨而不敢上逆得力又在附子之雄引領歸地直入下焦填補其空使風邪無復入之慮萆薢杜仲以祛在裡濕熱羌活黑參以疏在表風熱標本合治有法斂散各得其宜此方具矣牛黃清心丸局方裁定治初中痰涎壅盛昏憒不省語言謇澀瘛瘲不遂一切痰氣閉塞證牛黃羚羊角勿經火鎊為末茯苓白朮生用桂心當歸甘草各三錢麝香雄黃煉水飛淨各二錢龍腦錢半人參犀角各五錢上十二味各取淨末配勻蜜如成劑分作五十丸金箔為衣待乾蠟護臨用開化沸湯薑湯任下原方尚有防風黃芩麥門冬白芍柴胡桔梗杏仁芎藭阿膠大豆黃卷蒲黃神麯白蘞乾薑薯蕷大棗一十六味因太冗雜故去之清心牛黃丸治暴中神昏不語痰塞心包口角流涎煩熱氣急一切痰熱閉遏證西牛黃三錢陳膽南星一兩黃連薑汁浸炒五錢當歸甘草炙各三錢五分辰砂五錢水飛為極細末蒸餅和勻分作五十丸金箔為衣候乾蠟護臨服剖開生薑湯簿荷湯人參湯量虛實選用調化服至寶丹局方治諸中卒倒痰飲血氣俱閉寒熱交錯者生烏犀角鎊硃砂研水飛雄黃研水飛生玳瑁鎊琥珀勿見火研各一兩麝香研龍腦研各一錢金銀箔各五十片西牛黃研半兩安息香以無灰酒飛過濾去沙土約取淨一兩微火熬成膏如無以蘇合香油代之上將犀玳為細末入余藥研勻將安息膏重湯煮後入諸藥和搜成劑分作百丸蠟護臨服剖用參湯調化二丸卒中山嵐瘴氣及産後惡血攻心童便入薑汁化服蘇合香丸局方裁定治傳尸殗殜心腹卒痛僵仆不省一切氣閉屬寒證蘇合香另研白色者佳安息香無灰酒熬飛去砂土各二兩薰陸香另研龍腦另研丁香麝香另研勿經火各一兩青木香白朮沉香另研極細香附炒烏犀角鎊屑另研極細上十一味為末逐一配勻諒加煉白蜜和劑分作五十丸另以硃砂一兩水飛為衣蠟護臨用剖開井花水生薑湯溫酒化下一丸原方尚有白檀香蓽茇訶黎勒三味因太澀燥故去之蘇合香丸取諸香以開寒閉僅用犀角為寒因寒用之嚮導與至寶丹中用龍腦桂心無異李士村曰牛黃丸蘇合香丸皆中風門中奪門之將而功用迥異熱阻關竅用牛黃丸開之寒阻關竅用蘇合香丸開之若夫口開手撒眼合聲鼾自汗遺尿等虛脫證急用參附峻補庶或可救若用牛黃蘇合之藥入口即斃也稀涎散治中風卒倒痰涎擁盛者脈氣虛微禁用豬牙皂角四條去皮弦子酥炙另為末白礬一兩半生半枯為末每用三字溫水灌下未蘇少頃再用一方用巴豆六粒去皮膜研壓去油入礬中熔化待礬枯為末和牙皂末拌勻每用四五分吹入鼻中即吐濁氣風湧而上則清陽失位倒置故令暴僕以此先治其標使咽喉疏通能進湯藥便止若欲攻盡其痰則液無以養筋令人攣急筋枯此為大戒舒筋三聖散治口眼喎斜左急右緩血脈受邪者當歸肉桂延胡索等分為散每服五錢水煎去滓早暮各一服參歸三聖散治風中血脈左半肢廢口目左喎舒筋三聖散去延胡索加人參風中血脈急需流布營氣營行脈中便不當泛用風藥所謂血行風自滅也至於左半肢廢氣血不能運行延胡耗血胡敢輕試必藉人參引領當歸肉桂何慮虛風之不散乎正舌散治驚痰堵塞竅隧肝熱生風舌強不正蠍尾去毒滾醋泡炒三錢茯苓一兩薑汁拌曬為散每服二錢溫酒調服並擦牙齦日三度面赤倍蠍尾加薄荷半兩每服四錢水煎熱服取汗效解語湯治中風脾緩舌強不語半身不遂防風天麻煨切薑汁拌焙附子炮各一錢五分棗仁炒研二錢五分羚羊角鎊觀桂羌活各八分甘草炙五分水煎入竹瀝半杯薑汁數匕服無時脈虛加人參祛風定志湯治心虛驚悸不能言防風棗仁炒研人參當歸各一錢遠志肉一錢二分橘紅菖蒲南星泡茯苓各八分羌活甘草炙各五分生薑五片水煎服無時甄權防風湯千金治偏風防風芎藭白芷牛膝狗脊萆薢白朮各三錢羌活葛根附子外臺作人參杏仁各六錢薏苡仁石膏桂心各九錢麻黃一兩二錢生薑兩半上十六味水煎分三服並針風池肩髃曲池支溝五樞陽陵泉巨虛下廉各一凡七穴一劑覺好更進一劑即針一度九劑九針即瘥灸亦得薏苡仁湯治中風濕痹關節煩疼不利薏苡仁一兩薑湯泡芍藥酒洗當歸各錢半麻黃去節桂各八分蒼朮去皮芝麻拌炒一錢甘草炙七分生薑七片水煎服無時若自汗加石膏煩熱疼痛加酒黃柏厥冷拘急加熟附子升麻胃風湯治胃風能食手足麻瞀目瞤面腫升麻當歸白芷葛根各六分蒼朮制八分麻黃去節藁本羌活草豆蔻研蔓荊子研各四分柴胡黃柏薑製各三分甘草炙五分生薑三片大棗一枚水煎食遠服按風入胃府大便清血四射用人參胃風湯之桂芍祛之內散風入胃經面目瞤動面腫者用升麻胃風湯之升葛麻黃輩祛之外散不可不辨犀角升麻湯治風熱頭面腫痛頰上如糊咽喉不利犀角鎊三錢升麻一錢五分防風羌活各一錢二分白芷黃芩白附子各六分甘草炙四分水煎食遠溫服烏藥順氣散局方治暴中風氣攻注遍身麻痹語言謇澀口眼喎斜喉中氣塞有痰聲者麻黃去根節泡橘皮烏藥各三兩殭蠶炒川芎枳殼甘草炙白芷桔梗各一兩乾薑炮五錢上十味為散每服半兩加生薑三片大棗一枚水煎熱服吳鶴臬曰此治標之劑初病邪氣實者宜之解風散治風成為寒熱頭目昏眩支體疼痛手足麻痹上膈壅滯人參二兩半麻黃去節一兩半芎藭獨活細辛甘草炙各一兩為散每服四五錢入生薑五片薄荷七葉水煎服按此本千金三黃湯去耆芩加參芎甘草彼主杜風清熱此主解散虛風同源異沠今人但知人參為補虛之藥不知人參有祛邪蕩實之功此證因虛風久襲若獨用麻黃無人參助其胃氣必不能克效也古今録驗續命湯方祖近效白朮附子湯朮附湯下千金八風續命湯續命湯下千金獨活湯桂枝湯下三生飲星香湯下四物湯方祖四君子湯方祖二陳湯方祖小續命湯續命湯下三化湯小承氣湯下六君子湯四君子湯下大秦艽湯四物湯下十全大補湯保元湯下大建中湯保元湯下人參養榮湯保元湯下大省風湯星香湯下八味順氣散四君子湯下千金附子散麻黃湯下省風湯星香湯下秦艽升麻湯升麻湯下滌痰湯二陳湯下涼膈散方祖星香湯方祖導痰湯二陳湯下黑錫丹金液丹下補中益氣湯保元湯下麻黃附子湯麻黃湯下倉公當歸湯麻黃湯下胃苓湯平胃散下千金排風散續命湯下黃耆建中湯桂枝湯下小柴胡湯方祖當歸補血湯保元湯下傷寒門香蘇散局方治感冒四時不正之氣香附薑汁浸勿炒紫蘇莖葉各二兩橘皮一兩甘草炙五錢為散每服半兩加生薑三片大棗一枚水煎去滓熱服暖覆取微汗日三夜一服以得汗身涼為度芎蘇散治三時感冒偏於血分者半夏茯苓橘皮葛根柴胡紫蘇川芎枳殼桔梗等分甘草炙減半為散每服半兩加薑棗煎服取微汗效本方去川芎柴胡加人參前胡木香名參蘇飲治虛人感冒偏於氣分者十神湯局方治感冒頭痛麻黃去節泡葛根紫蘇香附橘皮芍藥川芎各一錢白芷升麻甘草炙各五分生薑五片蔥白四莖水煎去滓熱服取微汗大陷胸丸玉函治結胸項強如柔痙狀下之則和大黃八兩葶藶半升熬芒硝半升杏