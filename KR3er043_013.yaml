內金炙膽為末荷葉裹陳米飯為丸每服二三錢空心溫酒送下此方出黃帝內經世本有加大黃桃仁者大謬啓峻湯治脾腎俱虛腹脹少食人參黃耆當歸白朮炒枯各一錢五分陳皮八分甘草炙五分肉桂半錢茯苓一錢五分乾薑炮四分肉果沉香各八分附子炮一錢五分水煎溫服氣滯硬滿者去黃耆加厚朴此方出醫林黃治啓東之方不多見僅一夔耳散血消脹湯治血脹小便多大便溏黑光亮歸尾一錢五分五靈脂觀桂烏藥甘草炙木香各六分川芎一錢二分半夏蓬朮煨各八分紫蘇三分砂仁一錢炒生薑五片水煎食前溫服琥珀人參丸治血蠱人參五靈脂各一兩琥珀肉桂附子生各五錢赤茯苓川芎沉香穿山甲煅各三錢為末濃煎蘇木汁為丸每服二錢早暮溫酒各一服此人參與五靈脂並用最能浚血血蠱之的方也二陳湯方祖中滿分消湯腹滿門中滿分消丸腹滿門下瘀血湯抵當湯下六君子湯四君子湯下平胃散方祖五苓散方祖金匱腎氣丸崔氏八味丸下小建中湯桂枝湯下蘇合香丸中風門黑錫丹金液丹下大黃附子小承氣湯下積聚門金匱奔豚湯治腎積上賁犯肺喘脹發熱甘草芎藭白芍當歸黃芩各一錢半夏甘李根白皮葛根各二錢生薑三片上九味水煎溫分四服日三夜一以積下小腹減為度不應加戎鹽一字千金無甘草黃芩有吳茱萸石膏人參茯苓桂心赤丸金匱治寒積厥冷茯苓半夏各四兩一方用桂烏頭二枚炮細辛一兩千金作人參上四味為末納真朱即硃砂為色蜜丸如麻子大先食酒下三丸日再夜一服不知稍增以知為度千金無半夏有附子桂心射罔普濟方用白鳳仙子一錢小川烏二枚半夏三枚杏仁四十九粒各生搗為末紅棗肉丸梧子大黃丹為衣早暮各服七丸俱溫酒下若治小兒丸如粟米大量用三五丸待穀道血出住服忌大葷生冷腐醋等物此方與赤丸功效相類故附於此此方烏頭與半夏同劑用相反以攻堅積沉寒非妙達先聖至理不能領略其奧與胡洽治膈上積用十棗湯加甘草大戟同一妙義而普濟方僅用烏頭半夏二味易白鳳仙子杏仁黃丹為衣服七丸至穀道見血而止其瞑眩之性可知蓋藥之相反相惡不過兩毒相激原非立能傷人後世以為相反之味必不可同用陋哉喬氏陰陽攻積丸治寒熱諸積吳茱萸乾薑炮觀桂川烏炮黃連薑汁拌炒半夏薑製茯苓延胡索人參各一兩沉香另研琥珀另研各五錢巴豆霜另研一錢為末皂角四兩煎汁糊丸緑豆大每服八分加至一錢五分薑湯下與脾胃藥間服此方出士材先生必讀先生向寓郭園會以此方授之郭嫗云是喬三餘所定方中萸桂走肝乾薑入脾烏頭達腎專取辛烈以破至陰之固壘半夏茯苓以開痰蔽延胡琥珀以散血結沉香以通氣閉巴霜以蕩堅積黃連以除旺氣人參以助諸味之力也其所授郭嫗之方酒麴糊丸較之皂角汁稍平妙用全在與脾胃藥間服豫會效用此方每以六君去朮倍苓加肉桂當歸米飲糊丸或朝服增損六君夕用陰陽攻積或服攻積一日六君二三日隨人強弱而施但初服未嘗不應積勢向衰即當停服所謂衰其大半而止專力補脾可也千金耆婆萬病丸治七種痞塊五種癲病十種疰忤七種飛尸十二種蠱毒五種黃病十二種瘧疾十種水病八種大風十二種𤸷痹並風入頭眼暗漠漠及上氣咳嗽喉中如水雞聲不得眠臥飲食不作肌膚五臟滯氣積聚不消壅閉不通心腹脹滿及連胸背鼓氣堅結流入四肢或復叉心膈氣滿時定時發十年二十年不瘥五種下痢疳蟲寸白諸蟲上下冷熱久積痰飲令人多睡消瘦無力蔭入骨髓便成滯患身體氣腫飲食嘔逆腰腳痠疼四肢沉重行立不能久婦人因産冷入子臟臟中不淨或閉塞不通胞中瘀血冷滯出流不盡時時疼痛為患或因此斷産並小兒赤白下痢及狐臭耳聾鼻塞等病此藥以三丸為一劑服藥不過三劑萬病悉除說無窮盡故稱萬病丸牛黃麝香犀角鎊桑白皮銼炒茯苓乾薑炮桂心當歸芎藭芍藥甘遂黃芩蜀椒去目及閉口者炒出汗細辛桔梗巴豆去皮心膜炒前胡紫菀去蘆蒲黃微炒葶藶炒防風人參硃砂雄黃油煎黃連去須大戟銼炒禹餘糧醋煅芫花各一錢六分醋炒赤蜈蚣六節去頭足炙石蜥蜴一寸去頭足炙芫青十四枚入糯米同炒米色黃黑去頭足翅上三十一味崔氏無黃芩桑白皮桔梗防風為二十七味並令精細牛黃麝香犀角硃砂雄黃禹餘糧巴豆別研余者合搗重絹下篩以白蜜和更搗三千杵密封之平旦空腹酒服三丸如梧子大取微下三升惡水為良若卒暴病不拘平旦早晚皆可服但以吐利為度若不吐利更加一丸或至三丸五丸須吐利為度不得限以丸數病強藥少即不吐利更非他故若其發遲以熱飲汁投之若吐利不止即以酢飯兩三口止之服藥忌陳臭生冷酢滑黏食大蒜豬雞魚狗牛馬驢肉白酒行房七日外始得一日服二日補之得食新米韭根汁作羹粥臛飲食之三四頓大良亦不得全飽産婦勿服吐利後以常須閉口少語於無風處溫床暖室將息若旅行卒暴無飲以小便送之為佳若一歲以下小兒有疾者令乳母服兩小豆亦以吐利為度近病及卒病皆用多積久疾病即少服常取微溏利為度其細證服法注解並詳千金衍義膽腑門本方下木香通氣散治寒氣成積腹痛堅滿不可忍木香戎鹽三稜炮各半兩厚朴薑製一兩枳實炒甘草炙各三錢乾薑炮蓬朮煨各二錢為散每服三錢食前淡薑湯調下四味阿魏丸治肉積發熱山楂肉薑汁炒一兩連翹仁黃連薑汁炒各五錢為末另用阿魏一兩醋煮糊丸麻子大每服二十丸至三十丸食前沸湯下脾胃虛人六君子湯下和血通經湯治婦人寒客胞門月事不來結為石瘕及一切血結成積當歸熟地黃蘇木各一錢三稜炮廣朮炮木香貫衆肉桂各八分紅花三分血竭五分食前紅酒煎服忌酸