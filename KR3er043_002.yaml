body:
  text: 卷二諸傷門傷寒傷寒雜病世分兩途傷寒以攻邪為務雜病以調養為先則知工傷寒者胸中執一汗下和解之法別無顧慮正氣之念矣雜病家寧不有攻邪之證耶只緣膠執己見不能圓通以致傷寒一切虛證壞證不敢用補雜病一切表證實證不敢用攻舉俗所見皆然病家亦寧死無怨良由聖教久湮邪說橫行之故是不得不以傷寒入門見證定名真訣一句喝破令雜病家粗知分經辨腑不致妄為舉措寧無小補於世哉姑以陰陽傳中冬溫溫熱時行大綱辨述如下陰陽傳中如交霜降節後有病發熱頭痛自汗脈浮緩者風傷衛證也以風為陽邪故只傷於衛分衛傷所以腠理疏汗自出身不疼氣不喘脈亦不緊如見惡寒發熱頭疼骨節痛無汗而喘脈浮緊者寒傷營證也以寒為陰邪故直傷於營分營傷所以腠理固閉無汗而喘身疼骨節痛而脈不柔和如見發熱惡寒頭痛身疼汗不得出而煩躁脈浮緊者風寒並傷營衛也以風為陽邪無竅不入風性善動法常有汗寒為陰邪萬類固閉寒氣斂束郁遏腠理所以不得外泄熱勢反蒸於裡而發煩躁也上皆太陽經初病見證有桂枝麻黃青龍鼎峙三法若交陽明之經則惡寒皆除但壯熱自汗而脈浮數以陽明內達於胃多氣多血邪入其經蒸動水穀之氣故皆有汗但以能食為陽邪屬風不能食為陰邪屬寒辨之若交少陽之經則往來寒熱口苦脅痛以其經居表裡之半邪欲入則寒正與爭則熱所以只宜和解而有汗下利小便三禁至其傳變雖有次第本無定矩有循經而傳者有越經而傳者有傳遍六經者有傳至二三經而止者有犯本者有入府者有邪在太陽不傳陽明之經即入陽明之府者有陽明經府相傳者有從少陽經傳入陽明府者所以仲景有太陽陽明正陽陽明少陽陽明之異或云少陽無逆傳陽明之理殊不知胃為十二經之總司經經交貫且少陽之經在外而陽明之府在內何逆之有至若傳入陰經亦有轉入胃府而成下證者太陰臟腑相連移寒移熱最易少陰亦有下利清水色純青心下痛口乾燥者厥陰亦有下利譫語者此皆陰經入腑之證少陰更有移熱膀胱之府一身手足盡熱小便血者厥陰亦有轉出少陽嘔而發熱者二經接壤故也又有轉出太陽表證者如下利後清便自調身疼痛此陰盡復陽也夫所謂犯本者太陽經邪入膀胱之本如煩渴引飲水入即吐小便不利者風傷衛之犯本也如熱結膀胱其人如狂或下血者此寒傷營之犯本也所以仲景有五苓桃核承氣之分邪熱入胃則當詳三陽明之原而與三承氣緩急分治蓋陽明居中萬物所歸無所復傳至此悉宜攻下但須俟結定則熱邪盡歸於胃然後下之若結未定而下早則有結胸痞硬挾熱利等證以邪熱歸併中土未盡乘機內入而為變矣故傷寒家有汗不厭早下不厭遲發表不開不可攻裡之戒邪在少陽入犯膽府則胸滿驚煩小便不利一身盡重不可轉側或入血室則晝日明瞭夜則譫語如見鬼狀皆宜按證求治但此經之要全重在於胃氣所以小柴胡中必用人參仲景云胃和則愈胃不和則煩而悸之語乃一經之要旨也至傳三陰太陰則腹滿時痛少陰則腹痛自利下重小便不利甚則口燥心下痛厥陰則寒熱交錯寒多熱少則病進熱多寒少則病退大抵少陰傳經熱邪必從太陰而入厥陰必從少陰而入非若陰證有一入太陽不作鬱熱便入少陰之理當知傷寒傳經之證皆是熱邪經中邪盛而溢入奇經故其傳皆從陽維而傳布三陽陰維而傳布三陰與十二經臟腑相貫之次第無預也其邪必從太陽經始以冬時寒水司令故無先犯他經之理但有他經本虛或為合病或為越經或陷此經不復他傳非若感冒非時寒疫之三陽混雜也大抵寒疫多發於春時春則少陽司令風木之邪必先少陽而太陽陽明在外病則三經俱受以是治感冒之方若香蘇芎蘇參蘇正氣十神之類皆三經雜用不分耳試觀夏暑必傷心包秋燥必傷肺絡總不離於司運之主令也其有誤治而成壞證者證類多端未能悉舉即如結胸痞滿良由誤下表邪內陷故脈必有一部見浮蓋寒傷營營屬血而硬痛者為結胸風傷衛衛屬氣而不痛者為痞滿然痞滿之基多由其人痰濕內蘊非若結胸之必因下早而陽邪內陷此大小陷胸五種瀉心分司結胸痞滿諸治也至於懊憹諸證無結可攻無痞可散惟梔子豉湯可以開發虛人內陷之表邪一湧而迅掃無餘即勞復食復但於方中加枳實一味其溫熱時行亦可取法乎此也至於陰證即無熱邪氣蒸萬無傳經之理即有陰邪陰主靜斷不能傳原其受病必先少陰或形寒飲冷傷脾則入太陰有之其厥陰之證無不由少陰而病所以少陰溫經之藥峻用薑附四逆厥陰風木之臟內伏真火雖有陰寒不過萸桂之屬若當歸四逆加吳茱萸換肉桂足矣不必薑附也然仲景厥陰例中非無四逆等治也當知厥陰之寒皆是由少陰虛寒而來故用薑附合少陰而溫之所謂腎肝同治也即太陰未嘗不用四逆也亦是命門火衰不能生土致病故必兼溫少陰所謂治病必求其本也夫治傷寒之法全在得其綱領邪在三陽則當辨其經腑病入三陰則當分其傳中蓋經屬表宜從外解腑屬裡必須攻下而除傳屬熱雖有陽極似陰厥逆自利等證但須審先前曾發熱頭痛至四五日或數日而見厥利者皆陽邪亢極厥深熱深之證急當清理其內誤與溫藥必死但清之有方須知陽極似陰之證其人根氣必虛即與救熱存陰須防熱去寒起間有發汗太過而成亡陽之候亦有攻下太過而陰陽俱脫者不妨稍用溫補然脫止陽回即當易轍不可過劑以耗其津況此證與真陰受病不同中屬寒雖有陰極似陽發熱躁悶等證但須審初病不發熱無頭痛便嘔吐清水蜷臥足冷自利腹痛脈來小弱至四五日或六七日反見大熱躁亂欲坐臥泥水中渴欲飲水而不能下喉脈虛大不能鼓激者此陰盛格陽之假熱陽欲脫亡之兆峻用參附無疑有卒暴中寒厥冷不省者此真陽大虛寒邪斬關直入之候丹溪所謂一身受邪難分經絡是也非頻進白通通脈不能挽回更有少陰中風雖不發熱亦無自汗厥冷嘔吐下利等證但覺胸中痞滿不安不時心懸若飢自言腹滿他人按之不滿手足自溫六脈小弱而微浮者此為陰經陽邪人罕能識惟宜黃耆建中稍加人參熟附溫散其邪若挾飲食則氣口澀滯亦有模糊不清者當與枳實理中手足微冷加附子若誤與發散必死破氣寬中亦死消克攻下亦死若峻用四逆傷犯真陰多有咳逆血溢之虞此證初時不以為意每每委之庸師所以犯之百無一生也冬溫冬時天氣大暖而見發熱咳嗽者此為冬溫以伏藏之令而反陽氣大泄少陰不藏非時不正之氣得以入傷少陰之經陽氣發外所以發熱熱邪傷氣所以咳嗽其經上循喉嚨所以喉腫下循腹裡所以感之深者則自利也冬溫本秋燥之餘氣故咽乾痰結甚則見血與傷風之一咳其痰即應不同咳則顱脹者火氣上逆也咳甚則臟腑引痛者火氣內郁也其脈或虛緩或虛大無力亦有小弱者熱邪傷氣故也若腎氣本虛則尺中微弦暮則微寒發熱素常氣虛則氣口虛大身熱手足微冷或有先傷冬溫更加暴寒寒鬱熱邪則壯熱頭痛自汗喘咳脈來浮舉則微弦中候則軟滑重按則少力雖有風寒切不可妄用風藥升舉其邪輕則熱愈甚而咳愈劇重則變風溫灼熱而死亦不可用辛散多致咽喉不利唾膿血痰中見血甚則血溢血泄發斑狐惑往往不救又不可用耗氣藥多至咳劇痛引周身面熱足冷而致危候惟宜加減蔥白香豉湯調之兼有風寒外襲則加羌活紫蘇寒邪盛極而發煩躁者但於前藥中稍加麻黃五七分石膏錢許或葳蕤湯本方主之緣此證見於冬時舉世醫流莫不以傷寒目之而與發散致夭枉者不可枚舉曷知西北二方患真中風傷寒者最多患冬溫者絶少間有傷於火炕者亦有傷於火而復傷於寒者可與越婢湯桂枝二越婢一湯以其地厚質實可勝攻伐非若東南之稟氣孱弱也至如大嶺以南陽氣常泄之地但有瘴癘之毒絶無傷寒之患即使客遊他處感冒風寒僅可藿香正氣之類若麻黃青龍絶不可犯誤用而發動身中素蘊之瘴濕則壯熱不止每致殞命不可不慎溫病有冬時觸犯邪氣伏於經中至春分前後乘陽氣發動而為溫病素問所謂冬傷於寒春必病溫是也其證不惡寒但惡熱而大渴其脈多數盛而渾渾不清越人所謂溫病之脈行在諸經不知何經之動絶不似傷寒浮緊之狀且右尺與氣口必倍於人迎信非人迎緊盛之比此證大忌發汗若誤與表散必躁熱無汗悶亂不寧而死以其邪伏經中日久皆從火化而發其熱自內達外必用辛涼以化在表之熱苦寒以泄在裡之熱內氣一通自能作汗有服承氣大汗淋漓而愈者有大渴飲水通身汗出而熱頓除者有渾身壯熱服黃芩湯蔥白香豉湯得汗而解者有發熱自利服葛根黃芩黃連湯而愈者有舌乾便祕服涼膈散而安者故古諺有溫熱病誤下不為大害誤汗為害有非時寒疫間雜其間不可不審諦明白而為治療蓋暴感風寒之說初時畏寒不渴至二三日熱邪傷耗津液方渴與溫病熱病之一病便昏昏不爽大熱煩渴不同其脈多浮盛而見於左手與溫病之右脈數盛亦異若兼右脈滑盛或澀滯模糊者必停飲食之故故治寒疫當先發散為主即有宿滯兼與橘半枳朴不得濫用里藥倘邪未入里而誤與攻下不無引賊破家之虞故其治與伏氣迥乎不類也熱病伏氣之發於夏至後者熱病也其邪乘夏火鬱發從少陰蒸遍三陽與傷寒之逐經傳變不同亦有兼中暍而發者其治與中暍無異暍雖熱毒暴中皆緣熱耗腎水汗傷胃汁火迫心包故用白虎之知母以淨少陰之源石膏以化胃府之熱甘草粳米護心包而保肺胃之氣與熱病之邪伏少陰熱傷胃汁火迫心包不殊故可異病同治而熱邪皆得渙散也若熱毒亢極不解腹滿氣盛者涼膈雙解承氣解毒兼苦燥而攻之或三黃石膏梔子豉湯汗之用法不峻投劑不猛必不應手非如傷寒待陽明胃實而後可攻下也時行時行疫癘非常有之病或數年一發或數十年一發多發於饑饉兵荒之後發則一方之內沿門闔境老幼皆然此大疫也亦有一隅偶見數家或一家止一二人或三五人病證皆同者此常疫也即如痘疹麻斑之類或越一二年或三五年一見非若大疫之盛行所以人不加察耳即如軟腳瘟證醫者皆以腳氣目之捻頸瘟證醫者皆以喉痹目之絞腸瘟證醫者皆以臭毒目之楊梅瘟證醫者皆以丹腫目之黑骨瘟證醫者皆以中毒目之瓜瓤瘟證醫者皆以蓄血傷寒目之惟疙瘩瘟之闔門暴發暴死大頭瘟之驟脹熱蒸穢氣遍充不敢妄加名目也其常疫之氣皆是濕土之邪郁發治宜表裡分解隨邪氣所在而攻之孫真人云疫氣傷寒三日以前不解蔥白香豉湯加童便熱服汗之不汗少頃更服以汗出熱除為度三服不解而脈浮尚屬表證則用白虎見里證則宜承氣解毒表裡不分則宜涼膈雙解汗下後復見表證再與白虎復見里證更與承氣表裡勢熱則宜三黃石膏三黃梔子豉湯汗之有汗下三四次而熱除者有熱除後忽復壯熱不妨再汗再下若見脈證皆虛法無更攻之理惟與清熱解毒湯人中黃丸人中黃散之屬調之非如傷寒有下早變證之慮亦非溫熱不可頻下之比大率以熱除邪盡為度不當牽制其虛也惟下元虛人非生料六味補其真陰則不能化其餘熱又不可拘於上說也至於大疫則一時詳一時之證一方用一方之法難可預為擬議也以上所述不過為雜病家開一辨證法門其間肯綮不遑繁述湖廣禮部主事範求先諱克誠寓金閶之石窩庵患寒傷營證惡寒三日不止先曾用過發散藥二劑第七日躁擾不寧六脈不至手足厥逆其同寓目科方耀珍邀石頑診之獨左寸厥厥動搖知是欲作戰汗之候令勿服藥但與熱薑湯助其作汗若誤服藥必熱不止後數日枉駕謝別詢之果如所言不藥而愈一童姓者伏氣發於盛暑其子跪請求治診時大發躁擾脈皆洪盛而躁其婦云大渴索水二日不敢與飲故發狂亂因令速與連進二盞稍寧少頃復索又與一大盞放盞通身大汗安睡熱除不煩湯藥而愈同時有西客二人寓毛家亦患此證皆與水而安文學範鉉甫孫振麟於大暑中患厥冷自利六脈弦細芤遲而按之欲絶舌色淡白中心黑潤無苔口鼻氣息微冷陽縮入腹而精滑如冰問其所起之由因臥地晝寢受寒是夜連走精二度忽覺顱脹如山坐起暈倒便四肢厥逆腹痛自利胸中兀兀欲吐口中喃喃妄言與濕溫之證不殊醫者誤為停食感冒而與發散消導藥一劑服後胸前頭項汗出如漉背上愈加畏寒而下體如冰一日昏憒數次此陰寒挾暑入中手足少陰之候緣腎中真陽虛極所以不能發熱遂擬四逆加人參湯方用人參一兩熟附三錢炮姜二錢炙甘草二錢晝夜兼進三日中進六劑厥定第四日寅刻陽回是日悉屏姜附改用保元方用人參五錢黃耆三錢炙甘草二錢加麥門冬二錢五味子一錢清肅膈上之虛陽四劑食進改用生料六味加麥冬五味每服用熟地八錢以救下焦將竭之水使陰平陽祕精神乃治徐君育素稟陰虛多火且有脾約便血證十月間患冬溫發熱咽痛里醫用麻黃杏仁半夏枳橘之屬遂喘逆倚息不得臥聲颯如啞頭面赤熱手足逆冷右手寸關虛大微數此熱傷手太陰氣分也與葳蕤甘草等藥不應為制豬膚湯一甌令隔湯燉熱不時挑服三日聲清終劑而痛如失國學鄭墨林夫人素有便紅懷妊七月正肺氣養胎時而患冬溫咳嗽咽痛如刺下血如崩脈較平時反覺小弱而數此熱傷手太陰血分也與黃連阿膠湯二劑血止後去黃連加葳蕤桔梗人中黃四劑而安太倉州尊陳鹿屏夫人素患虛羸骨蒸經閉少食偶感風熱咳嗽向來調治之醫誤進滋陰清肺藥二劑遂昏熱痞悶異常邀石頑診之脈見人迎虛數而氣口濡細寸口瞥瞥而兩尺搏指此肝血與胃氣皆虛復感風熱之象與加減蔥白香豉湯一服熱除痞止但咳則頭面微汗更與小劑保元湯調之而安同道王公峻子於四月間患感冒昏熱喘脹便祕腹中雷鳴服硝黃不應始圖治於石頑其脈氣口弦滑而按之則芤其腹脹滿而按之則濡此痰濕挾瘀濁陰固閉之候與黃龍湯去芒硝易桂苓半夏木香下瘀垢甚多因宿有五更咳嗽更以小劑異功加細辛調之大抵腹中奔響之證雖有內實當下必無燥結所以不用芒硝而用木香苓半也用人參者藉以資助胃氣行其藥力則大黃輩得以振破敵之功非謂虛而兼補也當知黃龍湯中用參則硝黃之力愈鋭用者不可不慎二尹閔介眉甥媳素稟氣虛多痰懷妊三月因臘月舉喪受寒遂惡寒不食嘔逆清血腹痛下墜脈得弦細如絲按之欲絶與生料乾薑人參半夏丸二服不應更與附子理中加苓半肉桂調理而康門人問曰嘗聞桂附半夏孕婦禁服而此並行無礙何也曰舉世皆以黃芩白朮為安胎聖藥桂附為隕胎峻劑孰知反有安胎妙用哉蓋子氣之安危系乎母氣之偏勝若母氣多火得芩連則安得桂附則危母氣多痰得苓半則安得歸地則危母氣多寒得桂附則安得芩連則危務在調其偏勝適其寒溫世未有母氣逆而胎得安者亦未有母氣安而胎反墮者所以金匱有懷妊六七月胎脹腹痛惡寒少腹如扇用附子湯溫其臟者然認證不果不得妄行是法一有差誤禍不旋踵非比芩術之誤猶可延引時日也館師吳百川子年二十餘素有夢交之疾十月間患傷寒頭疼足冷醫用發散消導屢汗而昏熱不除反加喘逆更一醫用麻黃重劑頭面大汗喘促愈甚或者以為邪熱入里主用芩連或者以為元氣大虛議用冬地爭持未決始求治於石頑診之六脈瞥瞥按之欲絶正陽欲脫亡之兆急須參附庶可望其回陽遂疏回陽返本湯加童便以斂陽一劑稍寧三啜安臥改用大劑獨參湯加童便調理數日頻與稀糜而安洪德敷女於壬子初冬發熱頭痛胸滿不食已服過發散消導藥四劑至第六日周身痛楚腹中疼痛不時奔響屢欲圊而不可得口鼻上唇忽起黑色成片光亮如漆與玳瑁無異醫者大駭辭去邀石頑診之喘汗脈促而神氣昏憒雖證脈俱危喜其黑色四圍有紅暈鮮澤若痘瘡之根腳緊附如線他處肉色不變許以可治先與葛根黃芩黃連湯加犀角連翹荊防紫荊人中黃解其肌表毒邪俟其黑色發透乃以涼膈散加人中黃紫荊烏犀微下二次又與犀角地黃湯加人中黃之類調理半月而安此證書所不載惟龐安常有玳瑁瘟之名而治法未備人罕能識先是牙行徐順溪患此誤用發散消克藥過多胃氣告匱辭以不治又綢鋪王允吉侄患此瀕危始邀豫往其口目鼻孔皆流鮮血亦不能救一月間親歷此證十餘人大抵黑色枯焦不澤四圍無紅暈而灰白色黯者皆不可救其黑必先從口鼻至顴頰目胞兩耳及手臂足脛甚則胸腹俱黑從未見於額上肩背陽位也有武員隨任家丁黃姓者患傷寒半月道經吳門泊舟求治詢其同伴云自渡淮露臥受寒恣飲燒酒發熱在京口服藥行過兩次熱勢略減而神昏不語不時煩擾見其唇舌赤腫燥裂以開水與之則咽不與則不思察其兩寸瞥瞥虛大關寸小弱按久六脈皆虛曰此熱傳手少陰心經也與導赤瀉心湯一啜神識稍寧泊舟一日夜又進二帖便溺自知次早解維復延往診而脈靜神安但與小劑五苓去桂易門冬二帖囑其頻與稀糜可許收功也錢順所素有內傷因勞力感寒發熱頭痛醫用表散藥數服胸膈痞悶不安以大黃下之痞悶益甚更一醫用消克破氣藥過傷胃氣遂厥逆昏憒勢漸瀕危邀石頑診之六脈縈縈如蜘蛛絲視其舌上焦黑燥涸異常此熱傷陰血不急下之真陰立槁救無及矣因以生地黃黃連湯去黃芩防風加人中黃麥門冬酒大黃另以生地黃一兩酒浸搗汁和服夜半下燥矢六七枚天明覆下一次乃與生脈散二帖以後竟不服藥日進糜粥調養而大便數日不行魄門迸迫如火令用導法通之更與異功散調理而安陳瑞之七月間患時疫似瘧初發獨熱無寒或連熱二三日或暫可一日半日發熱時煩渴無汗熱止後則汗出如漉自言房勞後乘涼所致服過十味香薷九味羌活柴胡枳桔等十餘劑煩渴壯熱愈甚因邀石頑診之六脈皆洪盛搏指舌胎焦枯唇口剝裂大便五六日不通病家雖言病起於陰而實熱邪亢極胃府剝腐之象急與涼膈加黃連石膏人中黃得下三次熱勢頓減明晚復發熱煩渴與白虎加人中黃黃連熱渴俱止兩日後左頰發頤一晬時即平而氣急神昏此元氣下陷之故仍與白虎加人參犀角連翹頤復焮發與犀角連翹升柴甘桔鼠黏馬勃二服右頤又發一毒高腫赤亮另延瘍醫治其外調理四十日而痊同時患此者頗多良由時師不明此為濕土之邪初起失於攻下概用發散和解引邪泛濫而發頤毒多有腫發綿延以及膺脅肘臂數處如流注潰腐者縱用攻下解毒皆不可救不可以為發頤小證而忽諸山陰令景昭侯弟介侯遼東人患時疫寒熱不止舌苔黃潤用大柴胡下之煩悶神昏雜進人參白虎補中益氣熱勢轉劇頻與芩連知母不應因遣使兼程過吳相邀石頑到署診之左脈弦數而徑右脈再倍於左而周身俱發紅斑惟中脘斑色皎白時湖紹諸醫群集莫審胸前斑子獨白之由因論之曰良由過服苦寒之劑中焦陽氣失職所以色白法當透達其斑兼通氣化無慮斑色不轉也遂用犀角連翹山梔人中黃晝夜兼進二服二便齊行而斑化熱退神清食進起坐徐行矣昭侯曦侯同時俱染其氣並進蔥白香豉人中黃連翹薄荷之類皆隨手而安吳介臣傷寒餘熱未盡曲池雍腫不潰不消日發寒熱瘍醫禁止飲食兩月餘日服清火消毒藥上氣形脫倚息不得臥渴飲開水一二口則腹脹滿急大便燥結不通兩月中用蜜導四五次所去甚難勢大瀕危邀石頑診之其脈初按繃急按之絶無此中氣逮盡之兆豈能復勝藥力耶乃令續進稀糜榻前以鴨煮之香氣透達徐以汁啜之是夕大便去結糞甚多喘脹頓止飲食漸進數日後腫亦漸消此際雖可進保元獨參之類然力不能支僅惟穀肉調理而安近松陵一人過餌消導胃氣告匱聞穀氣則欲嘔亦用上法不藥而痊徽商黃以寬風溫十餘日壯熱神昏語言難出自利溏黑舌苔黑燥唇焦鼻煤先前誤用發散消導藥數劑煩渴彌甚恣飲不徹乃求治於石頑因諭之曰此本伏氣鬱發更遇於風遂成風溫風溫脈氣本浮以熱邪久伏少陰從火化發出太陽即是兩感變患最速今幸年壯質強已逾三日六日之期證雖危殆良由風藥性升鼓激周身元氣皆化為火傷耗真陰少陰之脈不能內藏所以反浮考諸南陽先師原無治法而少陰例中則有救熱存陰承氣下之一證可藉此以迅掃久伏之邪審其鼻息不鼾知腎水之上源未絶無慮其直視失溲也時歙醫胡晨敷在坐相與酌用涼膈散加人中黃生地黃急救垂絶之陰服後下溏黑三次舌苔未潤煩渴不減此杯水不能救車薪之火也更與大劑涼膈大黃加至二兩兼黃連犀角三下方得熱除於是專用生津止渴大劑投之舌苔方去而津回渴止此證之得愈者全在同人契合無分彼此得以挽回設異論紛紜徒滋眩惑安保其有今日哉上仁淵祖道臺時疫大義謹按時疫之邪皆從濕土鬱蒸而發土為受盛之區平時汙穢之物無所不受適當歲氣並臨則從分野疏豁之隅蒸騰郁發不異瘴霧之毒或發於山川原陸或發於河井溝渠人觸之者皆從口鼻流入募原而至陽明之經脈必右盛於左蓋濕土之邪以類相從而犯於胃所以右手脈盛也陽明居太陽之裡少陽之外為三陽經之中道故初感一二日間邪犯募原但覺背微畏寒頭額暈脹胸膈痞滿手指痠麻此為時疫之報使與傷寒一感便發熱頭痛不同至三日以後邪乘表虛而外發則有昏熱頭汗或咽腫發斑之患邪乘裡虛而內陷或挾飲食則有嘔逆痞滿嘈雜失血自利吐蛔之患若其人平素津枯兼有停滯則有譫語發狂舌苔黃黑大便不通之患平素陰虛則有頭面赤熱足膝逆冷至夜發熱之患至於發厄發噦冷汗喘乏煩擾瘛瘲等證皆因誤治所致也大抵傷寒之邪自表傳裡溫熱之邪自里達表疫癘之邪自陽明中道隨表裡虛實而發不循經絡傳次也以邪既伏於中道不能一發便盡故有得汗熱除二三日復熱如前者有得下里和二三日得見表熱者有表和復見里證者總由邪氣內伏故屢奪屢發不可歸咎於調理失宜復傷風寒飲食也外解無如香豉蔥白連翹薄荷之屬內清無如滑石芩連山梔人中黃之屬下奪無如硝黃之屬如見發熱自利則宜葛根芩連胸膈痞滿則宜枳桔香附嘔吐厄逆則宜藿香芩連衄血下血則宜犀角丹皮發斑咽痛則宜犀角牛蒡煩渴多汗則宜知母石膏愈後食復勞復則宜枳實梔豉隨證加葳蕤茯苓丹皮芍藥之類皆為合劑而香豉人中黃又為時疫之專藥豉乃黑豆所盦得濕熱之氣釀成敗穢之質故能引領內邪從巨陽蒸汗而解人中黃本甘草所制漬以滓穢專解臟腑惡毒從下而泄同氣相求之妙莫過於此以其總解溫熱時行外內熱毒也當知其證雖有內外之殊一皆火毒為患絶無辛溫發散之例每見窮鄉無醫無藥之處熱極恣飲涼水多有浹然汗出而解者此非宜寒涼不宜辛熱之明驗乎況當庚申金運北政少陽相火司天之歲目今又在三氣之中主令客氣俱屬相火一切風燥辛熱皆不可犯每見時師用羌獨柴前蒼芷芎防之類引邪上逆亢熱彌甚者以風燥之藥性皆上升橫散如爐冶得鼓鑄之力也用朴半檳榔青皮木香等耗氣之藥胸膈愈加痞滿者揠苗助長之道也有下證已具而遲疑不敢攻下屢用芩連不應者此與揚湯止沸不殊也至於發狂譫語舌苔焦黑而大便自利證實脈虛不可攻者及煩熱痞悶冷汗喘乏四肢逆冷六脈虛微不受補者皆難圖治也時疫變證多端未能一一曲盡謹陳大略數則庶不負憲恩之澤及黎庶垂問芻蕘也飛疇治鄭月山女寡居二十載五月間忽壯熱多汗煩渴耳聾脅痛月山為女科名宿謂證屬傷寒委之他醫用柴葛桂枝等劑其熱彌甚汗出不止胸滿昏沉時時噫氣邀豫診之右脈數大左脈少神舌苔微黑此伏氣自內少陽發出故耳聾脅痛法當用白虎清解反行發表升越其邪是以熱渴轉甚汗出多故左脈無神胃液耗故昏沉胸滿其噫氣者平素多郁之故今元氣已虛伏邪未解與涼膈去硝黃易栝蔞根丹皮竹葉一服熱減得睡但汗不止倦難轉側或時欲嘔此虛也以生脈加棗仁茯神白芍扶元斂陰兼進粥飲以扶胃氣渴止汗斂而脈轉虛微欲絶此正氣得補而虛火潛息之真脈也復與四君歸地調補而痊暑參緒論暑證素問云因於暑汗煩則喘喝靜則多言暑氣內擾於營則汗上迫於肺則煩喘內干於心則多言總不離乎熱傷心胞而蒸肺經之證也金匱云太陽中暍發熱惡寒身重而疼痛其脈弦細芤遲小便已灑灑然毛聳手足逆冷小有勞身即熱口開前板齒燥若發其汗則惡寒甚加溫針則發熱甚數下之則淋甚太陽中暍發熱惡寒身重而疼痛此因暑而傷風露之邪手太陽標證也太陽小腸屬火上應心胞二經皆能制金爍肺肺受火刑所以發熱惡寒似乎足太陽證其脈或見弦細或見芤遲小便已灑灑然毛聳此熱傷肺胃之氣陽明本證也發汗則惡寒甚者氣虛重奪其津也溫針則發熱甚者重傷經中之液轉助時火肆虐於外也數下之則淋甚者劫其在裡之陰熱勢乘機內陷也此段經文本無方治東垣特立清暑益氣湯足補仲景之未逮太陽中熱者暍是也汗出惡寒身熱而渴白虎加人參湯主之此無形之熱傷肺胃之氣所以多汗惡寒而渴故用白虎以化熱人參以益氣也太陽中暍身熱疼重而脈微弱此以夏月傷冷水水行皮中所致也一物瓜蒂湯主之此因冷水灌汗有形之水郁遏皮毛閉其汗濕所以身熱疼重故用一物瓜蒂湯湧吐則陽氣發越汗大泄而熱愈矣後人不敢效用每以五苓散加蔥豉或梔子豉湯並用探吐皆效王節齊曰夫暑者相火行令也夏月人感之自口齒而入傷心胞絡之經其脈多虛或浮大而散或弦細芤遲蓋熱傷氣則氣消而脈虛弱其證身熱汗出而喘煩渴多言倦怠少氣或下血發黃生斑甚者火熱爍金致金不能平木搐搦不省人事治暑之法以去濕熱清心利小便為主氣傷宜補真氣為要又有惡寒或四肢逆冷甚者迷悶不省而為霍亂吐利痰滯嘔逆腹滿瀉利此非暑傷乃因暑而自致之病也若行人或農夫於日中勞役得之此熱傷陽證也必苦頭痛發熱汗泄肌膚大熱而渴乃天熱外傷元氣也宜益元散白虎湯竹葉石膏湯選用若避暑熱於涼亭水閣得之此暑傷陰證也必頭痛惡寒身形拘急肢節疼痛而煩心肌膚大熱無汗此為陰寒所遏使周身陽氣不得伸越宜消暑十全散或腹痛水瀉者胃與大腸受之局方香薷飲噁心者胃中有痰飲也香薷飲下消暑丸伏暑大熱水瀉脈數可用黃連香薷飲若外既受寒內復傷冰水生冷腹痛泄瀉霍亂吐逆藿香正氣散養胃湯選用若飲食過多吐瀉腹痛脈沉微者大順散若真陽虛人房室不慎復傷生冷腹痛極瀉利脈沉弦者冷香飲子甚則霍亂吐利通身冷汗不止脈伏或脫者急用漿水散救之庶可十全一二暑氣攻裡腹內刺痛小便不通生料五苓散加木香小便血者導赤散加辰砂伏暑霍亂腹痛泄瀉如水身熱足冷者五苓散下來復丹傷氣困倦身有微熱頭重吐利小便赤澀十味香薷飲傷暑咳嗽發寒熱盜汗不止脈數者熱在肺經清暑益氣湯冷水澡浴致暑濕相搏一身盡痛自汗發熱五苓加羌活吐瀉者五苓與正氣和服冒暑縱飲及飲冷酒引暑入腹大熱而小便如血五苓減桂加黃連日間冒暑經營夜間露臥門窗此先感暑而後感寒去衣則凜著衣則煩或鼻流清涕或寒熱如瘧六和湯加羌活無汗加紫蘇嘔吐加藿香兼食加草豆蔻砂仁冒暑作勞乘汗冷浴身痹如針刺間有赤腫處或發水泡者六和湯加蒼朮荊防甚則加桂若身熱頭痛躁亂不寧或身如針刺此熱傷肉分也白虎湯加蒼朮虛加人參或咳嗽發寒熱盜汗不止脈數者熱在肺經清燥湯秋暑瀉利消暑丸疰夏病屬陽虛元氣不足宜補中益氣加半夏茯苓其人傷濕因而中暑名曰濕溫兩脛逆冷胸滿頭目疼重妄言多汗脈陽濡而弱陰小而急及煩渴引飲者切不可汗汗之必死蒼朮白虎湯喻嘉言曰體中多濕之人外暑蒸動內濕二氣交通最易中暑所以肥人濕多夏月百計避暑反為暑所中者不能避身之濕即不能避天之暑也益元散驅濕從小便出夏月服之解暑體盛濕多則宜之清癯無濕之人津液為時火所耗當用生脈散充其津液若用益元散妄利小水竭其下泉枯槁立至故凡汗多之人即不可利其小便也小半夏茯苓湯治暑專治其濕也少加甘草即名消暑丸是消暑在消其濕理明辭正矣又如益元散加辰砂則並去其熱五苓散加人參則益虛加辰砂減桂則去熱白虎湯加人參則益虛加蒼朮則勝濕也中暑必顯躁煩熱悶東垣仿仲景竹葉石膏湯制方名清燥湯仍以去濕為首務夫燥與濕相反者也而清燥亦務除濕非東垣具過人之識不及此矣古方治暑風用蘇合香丸大非今人治暑概用香薷飲大謬按香薷辛淡辛能發散淡能滲泄乃夏月解表利水之劑果身熱煩躁嘔吐小便不利者合黃連以解暑靡不應手獲效若氣虛胃弱之人食少體倦自當多服參耆豈能堪此發泄苟誤用之是虛其虛也至於奔走勞役而中熱者用此溫散之劑復傷其氣如火益熱矣今人不分虛實當否夏月少有不快一概用之所謂習俗成訛也夏月無故卒例昏不知人面垢冷汗自出手足微冷搐搦或吐瀉或喘渴此君相二火內外相煽兼之素有痰鬱因火鼓動窒礙心竅故也宜先以熱土尉臍中或研蒜水灌鼻中皆取其通竅也石頑曰按中寒卒然倒僕如中風者乃盛寒之氣卒犯少陰而厥逆無脈此陽氣大虛不勝陰寒厲氣也必口鼻氣冷而無痰聲雖盛暑中亦有之以其人真陽素虛之故不可拘於時月也中暑卒然暈倒如中風者乃酷暑之氣鼓運其痰壅塞心胞此腎水素虧不勝時火燔灼也必喘乏而無痰聲若中風卒倒則必手足搐引痰聲湧塞於喉中甚則聲如拽鋸為中風之真候以此辨之萬無差誤也或問暍暑用白虎清暑香薷等法何以為辨石頑曰中暍用白虎湯熱傷形之治也用人參白虎湯兼傷無形之氣也中暑用生脈散暑傷無形之氣也用清暑益氣暑傷於氣兼挾風熱乘虛而傷其經也傷暑用十味香藿風熱濕雜合而傷形氣也偏於表則變香薷飲為消暑十全偏於里則變香薷飲為六和湯此夏月鼎峙三法也其用消暑丸者上盛之濕泛濫而為痞滿也用益元散者下盛之熱阻滯而為溺澀也用大順散者冰果內傷於脾也用冷香飲者冷食內傷於腎也用來復丹者陰氣固結於下也用五苓散者陽氣遏絶於內也近世醫人治夏月諸病不論虛實寒熱概用香薷飲既開汗孔復利水道且克中氣況於方中必除去人參增入枳殼檳榔輩重耗其氣而痞滿發熱煩躁愈劇此際補之不可瀉之不可惟梔子豉湯隨證加入甘草生薑等味以和之夜甚者導赤散加丹皮白芍以調之次以生料六味調之虛甚躁渴者合生脈以滋金水之源此前賢未之及也當知治暑暍諸證汗液大泄中氣先傷雖有膈滿潮熱最忌攻下以無形之熱不能隨藥下散也即有頭額重痛最忌發汗凡表藥皆能升舉痰食濁氣支撐膈上也而肥人濕熱素盛加以暑氣相搏則為濕溫證必自汗足冷漉漉如從水中出脈雖沉細而小便必赤澀不可誤認陰寒而與溫藥亦不可因其頭重身疼而與發汗誤汗身青面色變者大劑竹葉石膏湯可救之亦有因其痞滿喘脹誤與下藥者大劑桂苓丸可療之惟誤用附子者雖有合劑不能起矣至於觸熱勞形卒然倒僕方書用道途中熱土置當臍更使聚溺其腹並搗生蒜汁注鼻孔其立法最精惜乎未經闡發世都不解殊不知此雖酷烈為患良由其人真元素虧加以時火亢極鼓激命門之虛陽歘然離根非藉道途中之熱土往來人之熱溺不能護衛其陽使之歸源用蒜汁注鼻孔者取蒜以開竅溫散其鬱閉之熱所謂熱因熱用溫能除大熱也若與冷水灌之潠之漬之則氣隨焰息而暴絶不返矣間有元氣不大虛人真火原未離根不勝亢暵而倒者用水灌漬亦有得蘇者因是愚夫一見熱倒便以水灌既灌不蘇雖盧扁不能復圖矣診經去脈虛身熱得之傷暑此暑傷元氣也仲景以弦細芤遲為傷暑以暑傷氣而不傷形所以氣消而脈虛弱也大抵脈來虛大無力或小弱皆本氣虛而為暑所中不足之證也若得洪盛數疾之脈皆熱氣燔灼而為時氣所傷為有餘之邪至若內傷寒冷及中寒脈沉緊之類雖當夏月卻與暑證無預羅謙甫治一人夏月胸項多汗兩足逆冷譫語關前濡關後急當作濕溫治經曰濕溫之脈陽濡而弱陰小而急濡弱見於陽部濕氣搏暑也小急見於陰部暑氣蒸濕也蓋先傷濕而後傷暑暑濕相搏是名濕溫先與白虎加參次換蒼朮三日而愈又治一蒙古百戶因食酒肉湩乳得霍亂吐瀉從朝至午精神憒乏脈皆浮數無力知所傷之物已出即於牆陰掘地約二尺貯新汲水攪動一時澄定用清者一杯調桂苓白朮散徐徐服之吐瀉遂止翌日微煩渴遂與錢氏白朮散時時服之而愈滑伯仁治一人病自汗如雨目赤身熱口燥心煩盛暑中帷幕周密以至亡陽服朮附數劑脈虛而洪數舌上苔黃曰前藥誤矣令撤幔開窗以黃連解毒人參白虎三進而汗止渴用冰水調益元散七日而愈石頑治禮部員外申菽斾觸熱過梁溪歸而眩暈麻瞀發熱便閉服黃連香薷不應用涼膈散便通或時昏眩不省或時四肢清冷而晡時為甚邀石頑診之脈得弦細而芤此暑傷心包陽氣鬱伏所以有似陰寒也與生脈合保元清理肺胃則包絡自寧矣濕濕熱經云諸濕腫滿皆屬於脾地之濕氣感則害人皮肉筋脈陽受風氣陰受濕氣身半以下者濕中之也傷於濕者下先受之聲如從室中言是中氣之濕也濕勝則濡瀉因於濕首如裹濕熱不攘大筋緛短小筋弛長緛短為拘弛長為痿因於氣為腫四維相代陽氣乃竭首為諸陽之會其位高其氣清其體虛故聰明系焉卻被濕土之獨氣熏蒸清道不通故沉重不利似乎有物蒙之失而不治濕鬱為熱熱留不去熱傷血不能養筋故為拘攣濕傷筋不能束骨故為弱痿素嘗氣疾濕熱加之氣濕熱爭故為腫諸陽受氣於四肢也今人見膝間關節腫痛全以風治者誤矣風寒暑皆能中人惟濕氣積久留滯關節故能中非如中風寒暑之暴也外中濕者或山嵐瘴氣或天雨濕蒸或遠行涉水或久臥濕地則濕從外中矣其證關節疼重頭重體疼腹脹煩悶昏不知人或四肢倦怠腿膝腫痛身重浮腫大便泄瀉小便黃赤羌活勝濕湯若一身盡痛為風濕相搏除風濕羌活湯肢體煩疼頭重鼻塞或見泄利或下清血為風木之邪內乾溼土神術湯濕毒下血大便泄瀉四肢沉重升陽除濕防風湯若腰以下重著為濕滯經絡滲濕湯然病有傷中之不同傷濕者足太陽膀胱經也中濕者足太陰脾經或足少陰腎經傷膀胱則煩渴引飲小便不利而腫脹五苓散著脾則四肢浮腫不能屈伸大便多溏此醇酒厚味水濕等物所傷濕從內中也除濕湯著腎則腰疼身重小便不利此醉臥濕地或下體濕衣所傷濕從外中也腎著湯濕盛身疼小便不利體重發渴者五苓散加羌活治濕在上在外者當微汗羌活勝濕湯在下在內者當利小便五苓散東垣云治濕不利小便非其治也然亦不可過治病去六七即當改用理脾之劑如水去其地猶濕若過用之腎水受虧矣羅謙甫云春夏之交病如傷寒其人汗自出肢體重痛轉側難小便不利此名風濕非傷寒也陰雨之後卑濕或引飲過多多有此證但多服五苓散小便通利濕去則愈切忌轉瀉發汗小誤必不可救初虞世云醫者不識妄作傷風治之發汗死下之死己未京師大疫正為此羅得其說救人甚多大抵五苓散能分水去濕胸中有停飲及小兒吐哯欲作癇五苓散最妙以中有桂辛溫能散肝脾之結耳戴復庵云五苓散仲景本治太陽汗濕之邪自經犯本故取治風濕自汗肢體重痛渴而小便不利者最宜若無煩渴小便不利者此邪猶在經宜用羌活勝濕湯或除風濕羌活湯選用不必拘於前說也戴人曰夏月人之腠理疏豁元氣不閉故易於傷風傷濕如汗出未拭而風閉之則為風濕素有熱而濕臨之則為濕熱濕久菀亦然也元氣素虛而受濕則為寒濕或受於地或受於天或受於酒酪湩乳治者宜分別之如風濕小建中加黃耆白朮羌活防風濕熱苓桂朮甘湯寒濕小青龍加減陽虛者去麻黃加熟附白朮或麻黃加朮湯濕家無汗身煩疼者麻黃加朮湯傷濕而兼感風則眩暈嘔逆煩熱惡風不欲去衣被或額上微汗或身體微腫汗漬衣濕當風坐臥多有此證麻黃杏仁薏苡甘草湯或羌活勝濕湯令微發汗若大發汗則風去濕在已得汗而發熱不去者敗毒散加蒼朮防己傷濕又兼感寒則拳攣掣痛無汗慘慘煩痛五積散風濕脈浮身重汗出惡風者防己黃耆湯緩脈風濕相搏身重煩疼不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯若其人大便硬小便自利者白朮附子湯骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯喻嘉言曰人身陽盛則輕矯濕盛則重著乃至身重如山百脈痛楚不能轉側而此不用附子回陽勝濕更欲何待在表之濕其有可汗者用附子合桂枝湯以驅之外出在裡之濕其有可下者用附子合細辛大黃以驅之下出在中之濕則用附子合白朮以溫中而燥脾今之用白朮雜入羌防枳朴梔橘等藥且無濟於事況用檳榔滑石舟車導水等法乎濕家不可發汗以身本多汗易至亡陽故濕溫之證誤發其汗名曰重暍故為深戒若久冒風涼以水灌汗抑鬱其陽者又不得不微汗之濕家當利小便此大法也而真陽素虛之人汗出小便滴瀝正泉竭而陽欲出亡之象若以為濕熱恣膽利之真陽無水維附頃刻脫離而死矣濕熱賈真孫曰濕為土氣熱能生濕故夏熱則萬物濕潤秋涼則萬物乾燥濕病本不自生因熱而怫鬱不能宣行水道故停滯而生濕也況形盛氣弱之人易為感受豈必水流而後為濕哉人只知風寒之威嚴不知暑濕之炎喧感於冥冥之中也原病式曰諸痙項強皆屬於濕或胕腫體寒而有水氣必小便赤少或渴是蓄熱入里極深非病寒也治法宜理脾清熱利小便為上治濕不利小便非其治也濕證有二濕熱證多濕寒證少當以脈證明辨之如脈滑數小便赤澀引飲自汗為濕熱證若小便自利清白大便瀉利身疼無汗為寒濕也濕熱身黃如橘子色而小便不利腹微滿者茵陳蒿湯身黃小便不利而渴者五苓散加茵陳煩熱小便不利而渴者桂苓甘露飲濕熱相搏者清熱滲濕湯肩背沉重疼痛上熱胸膈不利及遍身疼痛者屬外因之濕熱當歸拈痛湯其人平素陰虛多火加之走精者濕襲精竅也虎潛丸或拈痛加龜板白朮牡蠣濕熱之屬於里者則水腫小便不利當與五苓神芎輩分輕重以泄之後用實脾之劑調理若夫陰水腫脹另詳水腫本門石頑曰昔人有云濕熱一證古所未詳至丹溪始大發其奧故後世得以宗之殊不知其悉從東垣痹證諸方悟出然其所論皆治標之法絶無治本之方及讀仲景書至痞論中則濕熱治本之方具在蓋傷寒誤下則有痞滿之變然亦有不經攻下而痞者皆由痰氣逆滿之故故仲景特立瀉心湯諸法正以祛逆上之濕熱也濕熱證類最多如鼓脹水腫嘔逆吞酸黃疸滯下腰腿重痛腳氣痹著等候悉屬濕熱為患然皆別有所致而然咸非濕熱之本病也嘗見蒼黑肥盛之人及酒客輩皆素多濕熱其在無病之時即宜常服調氣利濕之劑如六君子加黃連沉香澤瀉之類夏秋則清燥湯春夏則春澤湯加薑汁竹瀝使之日漸消弭此謂不治已病治未病也及乎五旬內外氣血向衰漸至食少體倦或胸腹痞滿或肢體煩疼或不時舉發或偶有所觸而發忽然胸高喘脹煩悶嘔遂甚至上下不通者須乘初起元氣未衰急投控涎丹十餘粒不下少頃再服當此危急之時不下必死下之庶或可生此係專攻濕熱痰涎之藥不可與硝黃輩同視也世醫舍此而用香燥之劑未有不相引喪亡而已以與身偕老之固疾因元氣衰憊而驟然僭發已為九死之候更兼誤治必無生理慎勿復藥自貽其咎也又有素稟濕熱而挾陰虛者在膏粱輩每多患此以其平時嬌養未慣馳驅稍有憂勞或縱恣酒色或暑濕氣交即虛火挾痰飲上升輕則胸脅痞滿四肢乏力重則周身疼重痰嗽喘逆亦有血溢便祕面赤足寒者甚則痿厥癱廢不起矣大抵體肥痰盛之人則外盛中空加以陰虛則上實下虛所以少壯犯此最多較之中年以後觸發者更劇而治又與尋常濕熱迥殊若用風藥勝濕虛火易於僭上淡滲利水陰津易於脫亡專於燥濕必致真陰耗竭純用滋陰反助痰濕上壅務使潤燥合宜剛柔協濟始克有賴如清燥湯虎潛丸等方皆為合劑復有陰陽兩虛真元下衰濕熱上盛者若乘於內則不時喘滿眩暈溢於外則肢體疼重麻瞀見此即當從下真寒上假熱例治之否則防有類中之虞即如痰厥昏僕舌強語澀或口角流涎或口眼喎斜或半肢傾廢非內熱招風之患乎歷觀昔人治法惟守真地黃飲子多加竹瀝薑汁送下黑錫丹差堪對證服後半日許乘其氣息稍平急進大劑人參入竹瀝薑汁童便晬時中分三次服之喘滿多汗者生脈散以收攝之若過此時藥力不逮火氣復升補氣之藥又難突入重圍矣服後元氣稍充喘息稍定更以濟生腎氣丸雜以黑錫丹一分緩圖收功可也至於但屬陽虛而陰不虧者斷無是理雖有邪濕干之亦隨寒化不能為熱也即使更感客邪自有仲景風濕寒濕治法可推不似陰虛濕熱之動輒扼腕也其濕熱挾外感諸例另詳緒論本條診石頑曰濕脈自緩得風以播之則兼浮緩寒以束之則兼沉細此皆外傷於濕之診也若濕中三陰則脈有沉緩沉細微緩之分治有朮附姜附桂附之異蓋沉緩沉細為太少二陰寒濕之本脈人所易明獨厥陰脈見微緩世所共昧今特申之夫厥陰為風木之藏內藏生陽雖有濕著風氣內勝鼓激其邪流薄於經絡之中所以脈不能沉而見陽浮陰緩之象是知微緩亦厥陰受邪之本脈觀仲景厥陰例中可以類推至於濕襲經中得人身濁氣蘊釀而為濕熱則脈多軟大若浮取軟大而按之滑者濕並在胃之痰也浮取軟大而按之澀者濕傷營經之血也濕寒濕熱之辨大略不出乎此羅謙甫治中山王知府子年十三六月中暴雨水泛戲水濕衣至精神昏憒怠惰嗜臥次日頭痛身熱腿腳重一醫用和解發散重衾覆之致苦熱不禁遂發狂言欲去其衾而不得汗至四更濕透其衾明日循衣撮空又以承氣下之語言不出四肢不能收持有時項強手足瘛瘲搐急而攣目左視而白睛多口唇肌肉蠕動羅視之具說前由蓋傷濕盛暑之時過發其汗更復誤下虛熱生風發痙也與保元湯加升柴芍藥五味甘草二日語聲漸出四肢柔和飲食漸進而愈丹溪治一人患濕氣背如負二百斤重以腎著湯加桂心豬苓澤瀉酒芩木通蒼朮服之而愈又治一人腰似折胯如冰用除濕湯加附子半夏厚朴蒼朮而愈石頑治沈汝楫子夏月兩膝脛至腳痛極僵挺不能屈者十餘日或用敷治之法不效其脈軟大而數令拭去敷藥與當歸拈痛湯二劑汗出而愈燥原病式云諸澀枯涸幹徑皴揭皆屬於燥乃陽明燥金肺與大腸之氣也蓋風熱火同陽也寒燥濕同陰也然燥金雖屬秋陰而異乎寒濕反同其風熱也故火熱勝則金衰而風生風熱勝則水竭而為燥也燥之為病皆屬燥金之化然能令金燥者火也故繫辭曰燥萬物者莫暵乎火夫金為陰之主為水之源而受燥氣寒水生化之源竭絶於上而不能灌溉周身榮養百骸色干而無潤澤皮膚者有自來矣或大病克伐太過或吐利津液內亡或養生誤餌金石或房勞致虛補陽燥劑辛熱太多皆能偏助狂火而損真陰陰中伏火日漸煎熬血液衰耗使燥熱轉甚而為諸病在外則皮膚皴揭在上則咽鼻生干在中則水液衰少而煩渴在下則腸胃枯涸津不潤而便難在手足則痿弱無力在脈則細澀而微此皆陰血為火熱所傷法當治以甘寒滋潤之劑甘能生血寒能勝熱陰陽滋而火殺液得潤而燥除源泉下降精血上榮如是則陰液宣通內神茂而外色澤矣盛啓東云浚治之法其理不出乎滋榮潤燥流通血氣而已且人身之中水一火五陽實陰虛皆緣嗜欲無節以致腎水受傷虛火為患燥渴之病生焉或前後祕結或痰在咽喉干咯不出此皆津液不足之故而火動元傷腎虛惡燥也理宜補養水中金使金水相生出入升降浚澤流通何燥之有喻嘉言曰燥之與濕有霄壤之殊春月地氣動而濕勝秋月天氣肅而燥勝故春分以後之濕秋分以後之燥各司其正奈何內經獨遺燥氣詳病機諸氣膹郁皆屬於肺諸痿喘嘔皆屬於上二條明指燥病而言生氣通天論謂秋傷於燥上逆而咳發為痿厥燥病之要可一言而終只緣內經失卻長夏傷於濕句致誤傳秋傷於燥為傷濕而解者競指燥病為濕病宜乎經旨之不明也戴人有云休治風兮休治燥治得火時風燥了斯治燥之要亦一言而終也老人多有大便後寒熱發作有時頗似外感實非外感也大便努掙傷氣故便出則乘於陽而寒頃之稍定則陽勝陰而熱若果外感之寒熱何必大便後始然耶世醫遇此證每謂濕熱內蘊而用滑利之劑以驅之不知瘦人身中以濕為寶有濕則潤無濕則燥今指燥為濕是欲出而反閉其戶也石頑曰夫燥有臟腑之燥有血脈之燥燥在上必乘肺經故上逆而咳宜千金五味子湯若外內合邪者千金麥門冬湯風熱心煩脾胃熱壅食不下者千金地黃煎積熱煩渴日晡轉劇喘咳面青能食便祕者生地黃煎主之燥於下必乘大腸故大便燥結然須分邪實津耗血枯三者為治邪實則大煩渴躁悶腹脹通幽湯潤燥湯清涼飲四順清涼飲麻仁丸大腸風祕血燥潤腸丸加郁李仁防風名潤燥丸潤而下之能食熱盛可用豬膽導法津耗者屢欲便而不可得圊欲了而不了便出仍是大塊異功散加二冬沉香用麻仁擂水煎服兼嚼蘇子胡麻之類外用蜜煎導或削陳醬瓜導之亦佳血枯者嘔逆食不下大便日漸燥結如栗生料六味丸去山萸加生何首烏當歸煎服或生料六味丸加肉蓯蓉桃仁擂水煎服兼食人乳酥蜜之類但蓯蓉咸腐服之每令嘔吐不可不知老人氣血俱耗竭者固本丸作膏服若至嘔逆不食便如羊矢不可治矣燥在血脈多見風證木無所畏也燥本火氣之餘故以滋燥養營湯治外大補地黃湯治內潤燥養陰為第一義火熱亢甚津液耗竭不能榮養百骸手足痿弱不能收持反似痹濕之證養陰藥中必加黃柏以堅之如虎潛丸之類若誤作風治則殆矣診凡物近火則潤離火則燥猶金之投入烈火而化為液也故燥證多有反似痹弱之證者熱傷陰血也燥有內外諸證不能盡述其在皮膚則毛焦皴揭在大腸則脾約便難在肺經則乾咳痰結在肺臟則悲愁欲哭證雖各異而脈之微細澀小則一間有虛大數疾浮芤等狀以意察之重按無有不澀不細不微者則知諸燥之證皆肺金之一氣亦不出肺金之一脈也火經云壯火之氣衰少火之氣壯壯火食氣氣食少火壯火散氣少火生氣亢則害承乃制制則生化外列盛衰害則敗亂生化大病火在丹田之下者是為少火少火則生氣離丹田而上者是為壯火壯火則食氣食氣之火是為邪火生氣之火是為真火故少火亢極則為壯火夫五行之道亢極則承亢而過甚則害乎所勝而承其下者必從而制之此天地自然之理也六氣雖屬外因而火氣鬱發未有不因諸內者內經除亢則害一說屬諸六氣勝復余皆不離身中偏勝之機也丹溪云火水木金土各一其性惟火有二曰君火人火也曰相火天火也見於天者出於龍雷則木之氣出於海則水之氣也具於人者寄於肝腎肝屬木而腎屬水也膽者肝之腑膀胱者腎之府心包絡者腎之配三焦司肝腎之分皆陰而屬火也天非此火不能生物人非此火不能有生或曰相火天火所同何東垣謂為元氣之賊蓋相火易起五性厥陽之火相煽則妄動矣火起於妄變化莫測無時不有煎熬真陰陰虛則病陰絶則死故曰相火元氣之賊岐伯歷舉病機一十九條而屬火者五原病式曰諸風掉眩皆屬於肝火之動也諸氣膹郁皆屬於肺火之升也諸濕腫滿皆屬於脾火之勝也諸痛癢瘡皆屬於心火之用也是火皆出於臟腑者然也按心為君火而又有相火寄於肝腎即內經所謂一水不能勝二火也五性之火為物所感而動即內經所謂一水不能勝五火也又凡動皆屬火故氣鬱火起於肺大怒火起於肝醉飽火起於脾思慮火起於心房勞火起於腎此五臟所動之火也然而六腑皆然如牙痛齦宣腮頰頤腫此胃火之所傷也目黃口苦坐臥不寧此膽火之所動也舌苔喉痛便祕不通此大腸之火動也癃閉淋瀝赤白帶濁此小腸之火動也小腹作痛小便不利此膀胱之火動也頭眩體倦手足心熱此三焦之火動也凡人一身只陰陽二氣陽氣生髮陰氣皆化為血陽氣不足陰氣皆化為火矣陰虛火動者難治如八味丸桂附之類虛火可補如保元湯參耆之類實火可瀉如解毒湯三黃之類鬱火可發如火鬱湯升柴之類凡火盛者不可驟用寒涼必兼辛散如瀉陰火升陽湯升陽散火湯之類氣壯脈實火盛顛狂者可用硝黃正治如虛火盛而狂亂以生薑湯從治之若投以硝黃正治立危一切壯火狂陽痰氣上衝膈膜流入心包諸藥不效內外熱熾者和劑紫雪可以平之積熱咽腫口舌生瘡煩躁妨悶水漿不下碧雪主之好餌丹石藥毒迅發壯熱不已者千金朴硝煎主之凡氣有餘便是火氣從左邊起者肝火也佐金丸當歸龍薈丸從臍下起者陰火也八味丸黑錫丹五志過度喜怒悲思不節正氣亢郁變而為火者於郁門求之此治火之大略也趙養葵云以火言之有陽火有陰火有水中之火有土中之火有金中之火有木中之火陽火者天上太陽之火生於寅而死於酉陰火者燈燭之火生於酉而死於寅此對待之火也水中火者霹靂火也即龍雷之火無形而有聲得雨而益熾見於季春而伏於季夏原夫龍雷之見也以五月一陰生水底冷上天熱龍為陽物故隨陽而上升冬至一陽來復故龍亦隨陽下伏雷亦收聲人身腎中相火亦猶是也以平日不能節欲致命門火衰腎中陰虛龍火無藏身之位故遊於上而不歸是以上焦煩熱咳嗽等證善治者以溫腎之藥從其性而引之歸源行秋冬陽伏之令而龍歸大海此至理也奈何今之治陰虛火者以黃柏知母為君而愈寒其腎益速其斃良可悲哉若夫陰虛火旺者此腎水乾枯而火偏盛宜補水以配火亦不宜苦寒之品以滅火壯水之主以制陽光正此謂也如燈燭火亦陰火也須以膏油養之不得雜一滴寒水得水則滅矣獨有天上火入於人身如六氣溫熱之病及傷熱中暍之疾可以涼水渥之可以苦寒解之其餘爐中火者乃灰土中無焰之火得木則煙見濕則滅須以灰培實以溫燼人身脾土中火以甘溫養其火而火自退經曰勞者溫之損者溫之甘能除大熱溫能除大熱此之謂也又空中之火附於木中以常有坎水滋養故火不外見惟乾柴生火燎原可以止遏力窮方止人身肝火內熾鬱悶煩躁須以辛涼之品發達之經曰木鬱達之火鬱發之使之得遂其炎上之性若以寒藥下之則愈郁矣熱藥投之則愈熾矣金中火者凡山中金銀之礦或五金埋瘞之處夜必有光此金鬱土中而不得發越故有光輝於外人身皮毛竅中自覺針刺蚊咬及巔頂如火炎者此肺金氣虛火乘虛而現肺主皮毛故也東方木實因西方金虛也補北方之水即所以瀉南方之火雖曰治金中之火而通治五行之火無餘蘊矣臟腑雖皆有火總不離於君相蓋君火為陽火可以直折相火為龍火僅可溫順導之歸源又何患乎今人率以知柏治相火殊不知相火寄在肝腎之間乃水中之火龍雷之火也若用苦寒則龍雷之火愈發矣龍雷之火每當濃陰驟雨之時火焰愈熾其勢誠不可遏惟太陽一照火自消滅此得水則熾得火則滅之一驗也惟八味丸桂附與火同氣直入腎中據其窟宅而招之同氣相求相火安得不引之歸源耶且人身豈可一刻無火譬之元宵之鰲山走馬燈拜者舞者飛者走者無一不具其中間惟是一火耳火旺則動速火微則動緩火熄則寂然不動而拜舞飛走之軀殼未嘗不存也是以老人以火為用而少年惟恐多火高年惟恐無火無火則運化艱而易衰有火則精神健而難老是火者老人性命之根未可以水輕折也昔賢治喉干謂八味丸為聖藥譬之釜底加薪則釜中津氣上騰理則然矣可見下虛者不但真陰虛究竟真陽亦虛耳命門之火乃水中之火相依而永不相離也火之有餘緣真水之不足也毫不敢去火只補水以配火壯水之主以制陽光火之不足因見水之有餘也亦不必瀉水就於水中補火益火之源以消陰翳診石頑曰按脈法云浮而洪大為虛火沉而實大為實火其說似是而實紕繆火性燔烈抑之則空雖有虛實之分絶無沉實之脈詳內經二火五火之說無不本諸三焦三焦配合心主代心司化育之令即謂之君而命門獨操其權故謂之相若相火妄臨五位則為五志之火其實一氣之亢初無彼此但以洪盛滿指者為實火或炎膈上即為心肺之火或迫中宮即為脾胃之火或結下焦即為小腸膀胱之火分其部位以推之隨其微甚而調之若弦細而數按之益堅為少火氣衰而見肝腎真脈非火使然夫下焦之火龍火也水盛則蟄藏不見其脈自平今弦細且數乃冰雪陰凌之象虛勞見此最為劇候或反虛大數疾為食氣之火耗竭真陰虛陽飛越之兆久病得此百不一生惟暴脫元氣者猶可峻補以斂固之大抵火證之脈但有虛大按之必空斷無實大之理其火鬱中焦惡寒戰栗則有六脈小匿者此火氣鬱伏灰燼不得發光舒焰反兼寒水勝己之化矣熱結胃口咳吐結痰亦有寸口滑實者熱遺下焦淋濁溺痛多有尺內洪滑者皆胃中濕濁上逆下滲之候終與火無預也當知火盛之脈浮取雖洪盛滑疾中按則軟闊不堅重按則豁然中空尋之脈見指傍舉指澀澀然如輕刀刮竹之狀方是無形之火象若中宮有物阻礙則關上屈曲而出膈上有痰凝滯則寸口屈曲而上總謂之鉤如無阻礙則無屈曲之象矣若洪盛而中按重按益實指下纍纍如循貫珠薏苡子狀者皆有形之濕熱蘊積於經脈之中不當於火門求治也東垣治一人傷寒目赤而煩渴脈息七八至按之不鼓擊經曰脈至而從按之不鼓諸陽皆然此陰盛格陽於外非熱也與薑附之劑汗出而愈按此與海藏治狂言發斑身熱脈沉細陰證例同丹溪治一婦患心中如火燒一燒便入小腸急去小便大便隨時亦出脈滑數此相火送入小腸以四物加芩連蘹香木通四劑三年之患頓愈石頑治太史張弘蘧精氣下脫虛火上逆怔忡失血證診其右關氣口獨顯弦象左尺稍嫌微數余皆微細搏指明系陰火內伏之象診後乃尊唯一詳述病情云自去冬勞心太過精氣滑脫加以怵惕恐懼怔忡驚悸不寧都門之醫峻用人參桂附至歲底稍可交春復劇如前遂乞假歸吳吳門諸醫咸效用參附導火歸源固斂精氣之藥略無一驗轉覺委頓異常稍稍用心則心系牽引掣痛痛連脊骨對心處或時痛引膺脅或時巔頂如掀或時臂股手足指甲皆隱隱作痛怔忡之狀如碓杵如牽繩如簸物如繃絹如以竹擊空控引頭中如失腦髓之狀夢中嘗自作文覺時成篇可記達旦倦怠睡去便欲失精精去則神魂如飛越之狀觀其氣色鮮澤言談亹亹總屬真元下脫虛陽上擾之候細推脈證始先雖屬陽氣虛脫而過餌辛溫峻補之劑致陽暴亢而反耗真陰當此急宜轉關以救垂絶之陰庶可挽回前過為疏二方煎用保元合四君丸用六味合生脈服及兩月後諸證稍平但倦怠力微因自檢方書得補中益氣湯為夏月當用之劑於中加入桂附二味一啜即喉痛聲喑復邀診候見其面顏精采而聲音忽喑莫解其故詢之乃尊知為升柴桂附升動虛陽所致即以前方倍生脈服之半月後聲音漸復日漸向安但起居調攝殊費周折衣被過暖便咽乾痰結稍涼則背微畏寒或啜熱飲則周身大汗怔忡走精此皆宿昔過用桂附餘熱內伏而尋出路也適有石門董載臣謂其伏火未清非芩連不能解散時值嘉平不敢輕用苦寒仲春載臣復至坐俟進藥可保萬全服數劑形神爽朗是後堅心服之至初夏反覺精神散亂氣不收攝乃盡出從前所服之方就正於豫豫謂桂附陽藥火毒之性力能上升得參以濡之故可久伏下焦與龍潛水底不異若究其源惟滋腎丸一方為之正治但既經芩連折之於上豈堪復受知柏侵伐於下乎從頭打算自春徂夏不離苦寒苦先入心必從火化何敢兼用肉桂引動虛陽發其潛伏之性哉端本澄源仍不出六味合生脈經歲常服不特壯水制陽兼得金水相生之妙用何憚桂附之餘毒不化耶傷飲食內經云五臟者藏精氣而不瀉也故滿而不實六腑者傳化物而不藏故實而不滿也氣口何以獨為五臟主胃者水穀之海六腑之大源也五味入口藏於胃以養五臟氣氣口亦太陰也是以五臟六腑之氣味皆出於胃變見於氣口經言水穀之寒熱感則害人六腑又曰陰氣者靜則神藏躁則消亡飲食自倍腸胃乃傷此乃混言之也分之為二飲也食也飲者水也因而大飲則氣逆形寒飲冷則傷肺肺病則為喘咳為腫滿為水瀉輕則發汗利小便上下分消其濕如重而蓄積為滿者利下之食者物也因而飽食筋脈橫解腸澼為痔又飽食勞力傷太陰厥陰則氣口滑大於人迎兩倍三倍或嘔吐痞滿或下利腸澼當分寒熱輕重治之輕則內消重則除下亦有宜吐者所謂在上者因而越之也然不可過劑過則反傷脾胃蓋先飲食自傷加之藥過脾胃復傷而氣不能化食愈難消也趙養葵云今方家治傷飲食者以平胃散為主出入增減以為脾胃之準繩平胃者胃中有高阜則使平之一平即止不可過劑過劑則平地反成坎矣而枳朮丸尤勝今人以此丸為補脾藥朝服暮餌更有益之橘半香砂者則又甚矣至若山楂神麯麥芽三味舉世所常用者蓋山楂能化肉積産婦兒枕痛者用炒黑山楂砂糖水煎服兒枕立化其性消積破血豈可輕用曲糵者以米與水在瓷缸中心藉曲以釀成酒必藉糵以釀成糖脾胃在人身非瓷缸比原有化食之能今食不化者其所能者病也只補助其能而食自化何必用此消克之藥哉大凡元氣完固之人多食不傷過時不飢若人先因本氣不足致令飲食有傷前藥一用飲食雖消但脾胃既已受傷而復經此一番消化愈虛其虛矣明後日食復不化猶謂前藥已效藥力缺多湯丸並進展轉相害羸瘦日增良可悲哉東垣論飲食勞倦為內傷不足之證而王安道又分飲食傷為有餘法當消導東垣自有枳朮丸等方勞倦傷為不足專立補中益氣湯主治其傷食之證胸膈痞悶吐逆咽酸噫敗卵臭畏食頭疼發熱惡寒病似傷寒但氣口脈大於人迎身不痛耳宜豁痰運脾二陳加枳朮曲糵山楂香附之類挾氣脈沉加木香青皮停食感冒芎蘇散加消導一二味食滯中宮胸膈痞悶噯氣發熱頭痛有類外感藿香正氣散若七八日不大便口乾煩躁臍上硬痛枳實導滯丸因憂氣食濕黏結於中脘發熱腹皮底微痛心下痞滿不思飲食食之不化常常痞氣木香化滯湯食積痞滿消瘦發熱保和丸虛加白朮二兩名大安丸調理之食滯心下初起不可驟用苦寒必兼辛散二陳平胃消導之及枳實白朮青皮陳皮山楂曲糵之類以食得寒則凝得熱則腐也日久成積發熱者加薑汁炒川連連翹之屬清利之若已成糟粕日久生熱燥結不行方可用承氣輩攻下之如冷物停滯作吐二陳加炮薑白豆蔻蒼朮厚朴神麯藿香之類甚則廣朮巴豆之屬若冷食停蓄心腹暴痛作脹當用紅丸子備急丸溫下之痰飲結聚谷不得入冷痰宿食在上脘者用白散湧吐之痰食已消中焦未和不思飲食或吐或瀉倦怠面黃按之心下軟脾胃受傷也六君子加木香砂仁燥渴用七味白朮散老人虛人易於傷食或膨脹痞悶或腹滿作瀉當消補兼施宜九味資生丸常常服之若口淡思食而見食不甘食過則厭兼噁心胸膈不快胃虛挾痰飲也六君子加枳實香砂若不思飲食食不克化食後反飽脾虛不能健運也枳實理中丸病後飲食不調中脘隱隱作痛有時得食則已有時得食轉加此胃中火燎作痛得食以壓其勢故痛少安若飲食稍過氣不能運轉其食故痛轉加連理湯加沉香靈樞云夫胃滿則腸虛腸滿則胃虛更實更虛其氣乃居若醉飽過度或感風寒或著氣惱以致填塞胸中胃氣不行忽然厥逆昏迷口不能言肢不能舉此名食厥若誤作中風中氣治之必死宜煎姜鹽湯探吐之風寒者藿香正氣散氣滯者八味順氣散吐後別無他證只以蒼朮白朮陳皮厚朴甘草之類調之如遇此卒暴之病必須審問明白或方食醉飽或飲食過傷但覺胸膈痞悶痰涎壅塞氣口脈緊盛者宜作食滯治之傷諸肉食用草果山楂挾外感風寒山楂須用薑汁炒黑則不酸寒收斂兼能破血和傷消導食積更速傷麵食炒萊蔔子傷麩筋粽子等物諸藥不能消化俱用本物拌緑礬燒灰砂糖酒下二三服效傷糯米粉食炒酒藥或酒麴砂糖調淡薑湯服傷索粉用杏仁炒黑研如脂砂糖拌薑湯服傷生冷果菜宜木香砂仁炮薑肉桂傷蟹腹痛者丁香紫蘇生薑傷蛋滿悶薑汁蒜泥傷肉生魚鱠必用生薑草果炮黑山楂積久生熱口乾噫氣二陳加薑汁炒川連及消導藥傷酒經曰因而大飲則氣逆酒入於胃則絡脈滿而經脈虛脾主為胃行其津液者也若飽以入房氣聚於脾中不得散酒氣與穀氣相搏熱盛於中故熱遍於身內熱而溺赤也東垣云酒者大熱有毒氣味俱陽乃無形之物也若傷之止當發散汗出則愈其次莫如利小便使上下分消其濕今之病酒者或以雄黃巴豆蠍梢大熱之藥下之或用牽牛大黃甘遂大寒之藥下之是無形元氣受病反下有形陰血則真水愈弱陽毒太旺反增陰火是以元氣消爍折人長命患此者不得已用葛花解酲湯或五苓散加人參草豆蔻傷酒食積發熱者曲糵丸腹滿虛脹合塌氣丸不應神保丸酒症丸並加酒炒黃連胃氣虛者上法俱不可用惟獨參湯助其胃氣立蘇神驗喻嘉言曰夫酒者清洌之物不隨濁穢下行惟喜滲入者也滲入之區先從胃入膽膽為清淨之府同氣相求然膽之攝受無幾其次從胃入腸膀胱滲之化溺為多逮至化溺則所存者酒之餘質其烈性惟膽獨當之每見善飲者必淺斟緩酌以俟腹中之滲若連飛數觥則傾囊而出耳靈樞云怯士之得酒怒不避勇士者其氣慓悍入於胃中則胃脹氣上逆滿於胸中肝浮膽橫當是之時同比於勇士氣衰則悔名曰酒悖蓋膽之府原無輸瀉善飲者膽之熱恆移於腦則為鼻淵或頭間多汗腦熱大泄或注於腸則大便時溏濕熱下泄俱不為大患也如膽之熱汁滿而溢出於外以漸滲於經絡則身目皆黃為酒疸之病以滲而出也轉驅而納諸膀胱從溺道而消也診氣口脈浮大按之反澀者有宿食也脈數而滑者有宿食也脈遲而滑者宿食作脹也氣口脈緊寒食停滯胃中溫消而下之氣口脈沉緊而細冷食傷脾溫補兼消之兩手脈皆模糊不清此宿食結滯胃氣不行急下奪之傷食脈有滑澀之異脾虛不能鼓運胃虛不能熟腐故其脈不滑而澀澀甚則模糊不清矣若人迎緊盛而氣口滑者停食感冒也許叔微治一酒客感冒風寒倦怠不思飲食已半月矣睡後發熱遍身疼如被杖微惡寒六脈浮大按之豁然作極虛受寒治之用六君子加黃耆當歸葛根大劑與之五服後遍身汗出如雨得睡諸證悉平江南仲治一人冬月覆舟盡力救貨忍飢行五十里遇族人縱飲青樓遂發熱四肢如火左脅一點疼痛小便赤澀五日不更衣醫作傷食治不效脈弦數無力氣口倍於人迎此醉飽竭力傷肝所致內經所謂數醉飽以入房氣聚於脾中不得散酒氣與穀氣相搏熱盛於中故熱遍於身內熱故溺赤酒氣慓悍腎氣日衰陽氣勝故手足為之熱也與四君子加神麯枳殼白芥子二服熱退調理而愈石頑治幼科汪五符夏月傷食嘔吐發熱顱脹自利黃水遍體肌肉捫之如刺六脈模糊指下尋之似有如無足脛不溫自認陰寒而服五積散一服其熱愈熾昏臥不省第三日自利不止而時常譫語至夜尤甚乃舅葉陽生以為傷暑而與香薷飲遂頭面汗出如蒸喘促不寧足冷下逆歙醫程郊倩以其證大熱而脈息模糊按之殊不可得以為陽欲脫亡之候欲猛進人參附子云間沈明生以為陰證斷無汗出如蒸之理脈雖虛而證大熱當用人參白虎爭持未決取證於石頑診其六脈雖皆澀弱模糊而心下按之大痛舌上灰刺如芒乃食填中宮不能鼓運其脈往往多此當與涼膈散下之諸醫正欲藉此脫手聽余用藥一下而神思大清脈息頓起當知傷食之脈雖當氣口滑盛若屢傷不已每致澀數模糊乃脾不消運之兆也此證設非下奪而與參附助其壯熱頃刻立斃可不詳慎而妄為施治乎又診葉新宇停食感冒而兩寸關皆澀數模糊兩尺皆沉弦而按之益堅雖其人尚能行走而脈少衝和此必向有陳氣在少腹詢之果患寒疝數年因緩辭不便用藥是夜即腹暴滿而逝門人問曰葉子偶抱小恙何以知其必死而辭之曰凡人胃滿則腸虛腸滿則胃虛更實更虛其氣乃居今胸有嘏而腹有積上下俱困能保其不交攻為患乎當知厥疝入腹腳氣衝心等疾皆是陰邪搏結鬱積既久則挾陰火之勢而上升若胸中陽氣有權則陰邪仍歸陰位而止今胸中先為宿食填塞腹中陳氣不逆則已逆則上下俱滿正氣無容身之地往往有暴絶之虞所以不便用藥實未知其即死也故凡診六部中病脈有不相應處即當審其有無宿病不可輕忽以招誹謗也癸卯元夕周徐二子過石頑齊頭縱飲次日皆病酒不能起欲得葛花湯解酲余曰東垣葛花解酲湯雖為傷酒專劑然人稟氣各有不同周子縱飲則面熱多渴此酒氣皆行陽明肌肉之分多渴知熱傷胃氣豈可重令開泄以耗津液與四君子湯去甘草加藿香木香煨葛根澤瀉下咽即蘇徐子久患精滑飲則面色愈青此素常肝膽用事腎氣並傷酒氣皆行筋骨所以不上潮於面葛花胃藥用之何益與五苓散加人參倍肉桂服後食頃溲便如皂角汁而安勞倦經曰飲食不節起居不時陰受之陰受之則入六腑身熱不時臥上為喘呼陰虛生內熱者有所勞倦形氣衰少穀氣不盛上焦不行下脘不通而胃氣熱熱氣熏胸中故內熱陽盛則外熱者因上焦不通則皮膚緻密腠理閉塞玄府不通衛氣不得發泄故外熱勞則喘且汗出內外皆越故氣耗矣東垣云夫喜怒不節起居不時有所勞倦皆損其氣氣衰則火旺火旺則乘其脾土脾主四肢故困熱無氣以動懶於語言動作喘乏表熱自汗心煩不安經言勞者溫之夫勞之為病其脈浮大手足煩熱春夏劇秋冬瘥以黃耆建中湯治之人受水穀之氣以生所謂清氣營氣運氣衛氣春升之氣皆胃氣之別名也夫胃為水穀之海脾胃氣虛則下溜肝腎陰火得以乘其土位故脾病始得則氣高而喘身熱而煩脈洪大而頭痛或渴不止其皮膚不任風寒而生寒熱若陰火上衝則氣高而喘煩熱為頭痛為渴而脈洪脾胃之氣下溜使穀氣不得升浮是春升之氣不行而無陽以護其營衛使不任風寒乃生寒熱此皆脾胃之氣不足所致也然與外感風寒之證頗同而實異內傷脾胃乃傷其氣外感風寒乃傷其形傷其外則有餘有餘者瀉之傷其內則不足不足者補之汗之下之吐之克之之類皆瀉也溫之和之調之養之之類皆補也內傷不足之病苟誤認作有餘之證而反瀉之則虛其虛也惟當以辛甘溫劑補其中而升其陽甘寒以瀉其火則愈矣以陽氣下陷故用味薄氣清之品若升麻柴胡之類舉而揚之使地道左旋升於九天之上倘陰氣不降者用黃柏澤瀉之類抑而降之使天道右遷而入於九地之下此東垣補中益氣為萬世無窮之利不必降也清升濁自降矣血中伏火日漸煎熬如氣浮心亂硃砂安神丸鎮固之以手捫之而肌表熱者表證也只服補中益氣湯一二服得微汗則已非正發汗乃陰陽氣和自然汗出也如腹中痛惡寒而脈弦者是木來剋土也小建中湯如脈沉結腹中痛理中湯如脈緩體重節痛腹脹自利米穀不化是濕勝也平胃散燥克之脅下縮急加柴胡臍下急加肉桂身體疼重者濕也合五苓散如風濕相搏一身盡痛加羌防藁本升麻蒼朮勿用五苓所以然者為風藥已能勝濕別作一服與之內傷有虛實之分如飲食失節勞役所傷發熱自汗倦怠乏力乃虛中之證應補益中和之劑調治無施解表若飲食過飽乃虛中之實為其所傷飲食積滯不消以致心胸痞悶仍發寒熱噁心惡食須用消導之劑俟其消克心胸舒泰仍用益脾之藥使無重虛元氣有宿食不消日晡熱氣實者下之亦要詳審無過妄利故虛人飲食所傷及外感暴病新愈之後皆當用六君子理胃為主內傷勞倦及久病之後用補中益氣理脾為主理脾則百病不生不理脾則諸病續起久之仍入於胃也內外傷辨人迎脈大於氣口為外感氣口脈大於人迎為內傷外則寒熱俱作而無間內則寒熱間作而不齊外感惡寒雖近火不除內傷惡寒得暖則解外感惡風乃不禁一切風寒內傷惡風卻惡門隙中賊風外感證顯在鼻故鼻息不利而氣擁有力雖不能食而不惡食內傷證顯在口故口不知味而腹中不和怯弱妨食惡聞食氣外感則邪氣有餘發言壯厲先輕而後重內傷則元氣不足出言懶怯先重而後輕外感頭痛常常而痛多見於腦後額上以及遍身肢體腰脊筋骨攣痛內傷頭痛時作時止不離兩太陽額顱多兼肩背胸脅腰腿骨節痠疼外感則手背熱而手心不熱內傷則手心熱而手背不熱外感小便赤澀而痛終日難得內傷小便黃赤必短而頻外感燥結則發熱腹中硬痛內傷祕澀則虛坐常見些少白膿外感胸腹結痛則痛不可按內傷有時胃脘當心而痛上支兩脅外感則手足動搖煩擾不寧內傷則四肢不收倦怠嗜臥東垣辨法如此然或二者兼病則其脈必並見而難辨尤宜細心求之若內證多者則內傷重而外感輕宜補養而兼散邪補中益氣加羌活若外感多者則外感重而內傷輕宜和營而邪自解黃耆建中加當歸內傷始為熱中病似外感陽證頭痛大作氣高而喘身熱而煩上氣鼻息不調四肢困倦不收無氣以動無氣以言或煩躁悶亂心煩不安或渴或不渴心火上炎克肺經則渴血脈中有濕則不渴或表虛不任風寒目不欲開口不知味氣口脈大於人迎兩三倍但急大而時見一代此內顯脾氣不續之脈也補中益氣湯若有宿食則右關獨沉而滑枳朮丸內傷末傳寒中病似外感陰證腹脹胃脘當臍痛四肢與兩脅拘急膈噎不通或涎唾或清涕或多溺足下痛不能任身履地骨乏無力喜睡兩丸多冷陰陰作痛或妄見鬼狀腰背肩胛脊膂皆病不渴不瀉脈盛大以澀名曰寒中宜枳實理中加附子肉桂益智草豆蔻兼腎臟火衰面黑足寒小便不利者八味丸加鹿茸五味子內傷似外感陽明中熱證有天氣大熱時勞役得病與陽明傷熱白虎湯證相似此脾胃大虛元氣不足之證因飢困勞役之後肌熱躁悶煩渴引飲口鼻氣促目赤面紅惡熱晝夜不息脈大而虛重按全無經曰脈虛則血虛血虛則發熱誤服白虎必危當歸補血湯內傷似外感惡風寒證有因勞役辛苦腎中陰火沸騰後因脫衣或沐浴歇息於陰涼處其陰火不行還歸皮膚腠理極虛無陽被風與陰涼所遏以此表虛不任風寒與外感惡風相似其證少氣短促懶於言語困弱無力不可同外感治補中益氣加紫蘇羌活甚者加桂枝最當勞倦所傷虛中有寒脾胃虛弱不能運化致寒物冷痰膠固於中焦時時痞悶不覺飢飽其脈雖弦而按之不鼓當溫暖以助脾健運清理中宮理中丸若臍下築者腎氣動也去朮加桂吐多者氣上壅也去朮加生薑下多者氣泄而不收也還用術悸者飲聚也加桂苓渴欲飲水者津液不足也倍用術腹中痛者倍人參寒多倍乾薑腹滿者去朮加附子勞倦所傷虛中有熱飢飽勞役損傷脾胃元氣不足之人其脈多弦或洪緩按之無力中時一澀其證身體沉重四肢困倦百節煩疼胸滿短氣膈咽不通心須不安耳聾耳鳴目熱如火視物昏花口中沃沫飲食失味忽肥忽瘦怠惰嗜臥溺色變赤或清利而數或上飲下便或時飧泄腹中虛痛不思飲食調中益氣湯如時顯熱躁是下元真火蒸蒸然發也加生地黃柏如大便虛坐不得或大便了而不了腹中常逼迫氣血虛澀也倍歸身如無以上證只服黃耆人參甘草橘皮柴胡升麻蒼朮酒黃柏飲食不節勞倦所傷腹脅滿悶短氣遇春則口淡無味遇夏雖熱猶有惡寒飢則常如飽不喜食冷物升陽順氣湯勞倦所傷寒溫不適身熱頭疼自汗惡寒脈微而弱黃耆建中湯飢飽勞役胃氣不足脾氣下溜氣短無力不時寒熱早飯後轉增昏悶須要眠睡怠惰嗜臥四肢不收懶倦動作五心煩熱先服升陽補氣湯二三劑後服補中益氣湯脾胃虛弱喘促少氣衄血吐血門冬清肺飲脾胃之氣俱病似痿弱證脾胃虛則怠惰嗜臥四肢不收時值秋燥令行濕熱少退體重節痛口乾舌燥飲食無味不欲食食不消大便不調小便頻數兼肺病灑灑惡寒慘慘不樂而色槁不和乃陽氣不伸故也升陽益胃湯王安道曰經云陰虛生內熱奈何曰有所勞倦形氣衰少穀氣不盛上焦不行下脘不通胃氣熱熱氣蒸胸中故內熱嗟夫此內傷之說之原乎夫人身之陰陽有以表裡言者有以上下之分言者有以氣血言者有以身前身後言者有以臟腑言者有以升降呼吸之氣言者余如動靜語默起居之類甚多不必悉舉此所謂陰虛之陰其所指與數者皆不同蓋勞動太過則陽氣皆亢極而化為火矣況水穀之氣又少入故陽愈甚而陰愈衰此陰虛之陰蓋指身中之陰氣與水穀之味耳或以下焦陰陽為言或以腎水真陰為言皆非也夫有所勞役者過動屬火也形氣衰少者壯火食氣也穀氣不盛者勞傷元氣則少食而氣衰也上焦不行者清陽不升也下脘不通者濁陰不降也夫胃受水穀故清陽升而濁陰降以傳化出入滋榮一身也今胃不能納而穀氣衰少則清無升而濁無降矣故曰上焦不行下脘不通然非謂絶不行不通也但比之平常無病時則謂之不行不通耳上不行下不通則鬱矣鬱則少火皆成壯火而胃居上焦下脘兩者之間故胃氣熱則上炎熏胸中而為內熱也東垣所言正與經旨相合固宜引此段經文於內外傷辨以為之主乃反不引此卻謂火乘土位此不能無疑者也又經曰勞者溫之溫者養也東垣以為溫涼之溫謂用溫藥以補元氣而瀉火邪又改損者益之為損者溫之又以溫能除大熱為內經所云而遍考內經並無此語亦不能無疑者也然溫藥之補元氣瀉火邪者亦惟氣溫而味甘者斯可矣蓋溫能益氣甘能助脾而緩火故元氣復而火邪息也夫宜用溫藥以為內傷不足之治則可以為勞者溫之之注則不可苟以補之除之抑之舉之散之等說比類而觀則其義自著矣陸麗京曰內傷之原有三曰勞役傷脾曰飢飽傷胃曰負重傷血三者虛實懸殊所謂勞役傷脾者證必發熱頭痛惡風畏食自汗喘乏脈必氣口虛大平昔未慣勞役人多此東垣補中益氣證也飢飽傷胃者證必黃腫痞滿喘嗽惡食發熱身疼脈必氣口粗大藜藿勞苦人多此平胃散加棗礬負重傷血者在胃口則咳嘔血腥痞滿少食膈間隱隱刺痛脈必氣口見弦飽食奔馳人多此犀角地黃湯加酒大黃稍奪其勢即當因病制宜余積不攻而去矣周慎齊云內傷左脈常細而澀右脈多浮而大陽氣下陷不能生陰故血枯而左脈細澀脾胃虧損不能生金故氣虛而右脈浮大內傷寸口大於尺內此陽盛脈也保元加歸芍引下則大脈去而陽氣亦內收也此從陽引陰之法肝脈細餘脈和緩補中加枸杞以枸杞補肝血故也脈氣不足用四君子脈氣有餘用平胃散有餘則瀉不足則補五臟皆然病重藥宜輕緩劑宜減小只以固中劑三四味以俟胃氣之復脾氣虛而脈弦者服補中益氣湯後必發瘧脾氣虛而濕勝服補中益氣湯後必患痢此邪尋出路仍服前湯自愈清陽下陷陰火上升若用寒藥則陽愈陷火愈熾火尋出竅虛者受之或目痛或耳聾或齒痛從其虛而散也脾脈豁大須防作瀉虛陽作瀉遇此脈必難愈凡胸前作脹痛者皆陽氣不達於胸陰氣填塞故也蓋陽則氣化通達陰則痰凝氣滯清陽下陷陰火上升則為氣逆濁氣凝滯則為痰厥所謂脾氣下溜乘於腎肝而成痰厥氣逆之漸也腳氣上升則為清陽下行則為邪氣內傷中虛表熱或潮熱自汗補中正方表熱加羌防腹中滿加附子中氣不和加青皮神麯間用八珍調理氣血俱虛十全大補陰虛火動脈洪大而不作瀉六味丸惡寒八味丸腹痛少食理中丸作瀉六味去熟地加遠志沉香砂仁不應加補骨脂肉豆蔻倘病顛倒難明必從脾胃調理凡用補中病熱已退升柴不可用也若大便燥結小便不利或平常見此證此清氣下陷補中雖數帖無妨如熱甚不去者甘草少故也如用補中汗少肺氣不開加用黃耆汗多里氣不守加用人參熱不退加用甘草臍以下無汗加酒黃柏三分渾身拘急作脹系風寒宜加羌防但作脹不拘急為內寒宜加附子內傷大便閉者補中加蘇子枳殼杏仁小便不利加牛膝汗多加白芍減升麻口乾加煨葛根五味子無汗加用升麻久病而熱不退氣短促用保元桂附煩躁加當歸白芍麥冬五味大便欲去而不去或著而不出為氣虛了而不了為血虛俱宜補中氣虛加用人參血虛加用當歸裡急後重初起皆屬於熱日久作陽氣虛陷治之前湯加用升柴內傷久而不愈潮熱微汗咳嗽不思飲食補中加乾薑五味自愈不必理痰治嗽正氣足則痰嗽自除矣凡用補中下體痿軟或虛弱者不可用當與八味丸凡內傷作瀉藏附子於白朮中令其守中以止瀉也表熱藏附子於黃耆中欲其走表以助陽也凡內傷調理脾胃必用羌活散其肝邪此為正治內傷用補中十餘劑而無汗及汗不至足者難治然亦有服至二三十劑而汗出者若服後遍身疼痛者亦難治氣虛作脹而脈虛用補中等和中藥脈反有力者不治內傷寒熱間作氣血兩虛一不宜頭痛二不宜便祕三不宜絶谷瀉利三者皆難治凡內傷誤用竹葉石膏須防失血過二十日必有反復誤服黃柏知母等藥須防泄瀉嘔吐二三日便見內傷身無大熱頭不甚疼胸膈飽悶大便不通庸醫下之而閉閉而復下下而不愈陽已將去或遍身疼痛不能轉動腹脹內有積血雖神氣清爽飲食可進亦不能治或問素有病人過勞役動作反覺精神強健何也曰此陰火沸騰扶助於內不覺元氣之不足也若靜養調適反覺神倦氣弱此陰火已退陽無以復本相透露故也診氣口脈大而虛者為內傷於氣氣口脈大而時顯一澀者為內傷於血氣口脈大而澀人迎及尺弦者為醉飽入房肝脾氣血俱傷人迎脈弦而數者為瘀血氣口脈滑而實者為宿食也汪石山治一人形長而瘦色白而脆年三十餘得奇疾遍身淫淫如蟲行從左腳腿起漸次而上至頭復下至右腳自覺蟲行有聲之狀醫多不識為何病汪診其脈浮小而澀按之不足兼察形視色知其為虛仲景曰身如蟲行汗多亡陽也遂用補中益氣倍參術加酒炒黃柏五分服至二十餘劑而愈虛損傳尸素問云邪之所湊其氣必虛陰虛者陽必湊之邪氣盛則實精氣奪則虛脈氣上虛尺虛是謂重虛氣虛者言無常也尺虛者行步恇然脈虛者不象陰也此滑則生澀則死也形不足者溫之以氣精不足者補之以味金匱云勞之為病其脈浮大手足煩春夏劇秋冬瘥陰寒精自出酸削不能行其脈大者勞傷陽氣也手足煩者脾主四肢也春夏陽氣升騰而陰火僭逆故劇秋冬陰氣收藏而虛陽斂遏故瘥皆勞傷元氣之證下言陰寒精自出酸削不能行此則勞傷精氣腎肝失職之候也夫失精家少腹弦急陰頭寒目眩發落脈極虛芤遲為清穀亡血失精脈得諸芤動微緊男子失精女子夢交桂枝龍骨牡蠣湯主之脈虛芤遲者亡血失精本虛之脈也芤動微緊者本虛中伏有微邪肝氣內動所以魂夢不寧也夫亡血失精皆虛勞內因之證舉世皆用滋補血氣之藥而仲景獨舉桂枝湯其義何居蓋人身之氣血全賴後天水穀以資生水穀入胃其清者為營濁者為衛營氣不營則上熱而血溢衛氣不衛則下寒而精亡是以調和營衛為主營衛和則三焦各司其職而火自歸根熱者不熱寒者不寒水穀之精微輸化而精血之源有賴矣以其亡脫既慣恐下焦虛滑不禁乃加龍骨牡蠣以固斂之蓋龍骨入肝斂魂牡蠣入胃固精皆收斂精魂之品後世鮮有用之者每每疑其止澀而非之殊不知二味入於石脂鍾乳巴戟蓯蓉金櫻益智之類則為劫劑入於桂枝湯中則為固蟄封藏之本藥也至於虛勞失精悸衄腹痛煩熱口燥則於本方加膠飴為小建中虛勞裡急為營衛枯槁更加黃耆為黃耆建中此皆後天不足所致故以調和營衛為主治也後人專用滋陰降火誤治遺害未至於劇者用此悉能挽回若夫先天腎虛致病者又當八味腎氣丸其虛煩不得眠主以酸棗湯內有乾血主以大黃䗪蟲丸以上諸治除酸棗湯外後世皆所切禁非特不敢效用亦無齒及之者良可慨夫虛勞裡急悸衄腹中痛夢失精四肢痠疼手足煩熱咽乾口燥小建中湯主之虛勞裡急諸不足黃耆建中湯主之上條言虛勞失精而裡急腹痛煩熱悸衄明系陽氣內奪之候故用小建中以和之下條言虛勞裡急諸不足較上條虛證更劇故於前方更加黃耆以大補衛中陽氣也按虛勞而至於亡血失精消耗津液枯槁四出難為力矣內經於針藥莫制者調以甘藥金匱遵之而用小建中湯黃耆建中湯以急建其中氣俾飲食增而津液旺也後人樂令建中並用前胡細辛以退表熱十四味建中兼用熟附蓯蓉以補下虛均失建中之義虛勞腰痛少腹拘急小便不利者八味腎氣丸主之治虛勞腰痛少腹拘急純屬腎肝虛寒無疑而小便不利一證又似虛中有熱豈桂附所宜用乎殊不知肝既失其疏泄之權腎亦傷其生髮之氣水道自難流利故以八味腎氣之桂附以導火歸源設非辛溫蒸其至極之陽則沉沍有加無已乃於補陰藥中稍加陽藥使陰陽適均無偏勝之虞斯其所以為至治也虛勞諸不足風氣百疾薯蕷丸主之按薯蕷丸專主表邪不解誤用涼藥傷犯肺胃自上而下之虛勞若房勞傷精鬱火傷神自下而上由中所發之證咸非所宜其立方全以桂枝湯和營散邪合理中丸兼理藥誤君以薯蕷大理脾肺毫不及乎補益腎肝醫門法律以為虛勞不足最易生風生氣殊失金匱立方本旨虛勞虛煩不得眠酸棗湯主之虛煩者肝虛而火氣乘之也故特取棗仁以安肝膽為主略加芎藭調血以養肝茯苓甘草培土以榮木知母降火以除煩此平調土木之劑也五勞虛極羸瘦腹滿不能飲食食傷憂傷飲傷房室傷飢傷勞傷經絡營衛氣傷內有乾血肌膚甲錯兩目黯黑緩中補虛大黃䗪蟲丸主之舉世皆以參耆歸地等為補虛仲景獨以大黃䗪蟲等補虛苟非神聖不能行是法也夫五勞七傷多緣勞動不節氣血凝滯鬱積生熱致傷其陰世俗所稱乾血勞是也所以仲景乘其元氣未漓先用大黃䗪蟲水蛭虻蟲蠐螬等蠕動啖血之物佐以乾漆生地桃杏仁行去其血略兼甘草芍藥以緩中補虛黃芩以開通熱鬱酒服以行藥勢待乾血行盡然後純行緩中補虛收功其授陳大夫百勞丸一方亦以大黃䗪蟲水蛭虻蟲為主於中除去幹漆蠐螬桃杏仁而加當歸乳香沒藥以散血結即用人參以緩中補虛兼助藥力以攻乾血梔子以開通熱鬱服用勞水者取其行而不滯也仲景按證用藥不慮其峻授人方術已略為降等猶恐誤施故方下注云治一切勞瘵積滯疾不經藥壞者宜服可見慎重之至也李士材病機沙篆云古稱五勞七傷六極二十三蒸證狀繁多令人眩惑但能明先天后天二種根本之證無不痊安夫人之虛非氣即血五臟六腑莫能外焉而血之源頭在乎腎氣之源頭在乎脾脾為肺母肺為生氣之宮故肺氣受傷者必求助於脾土腎為肝母肝為藏血之地故肝血受傷者必藉資於腎水補腎補脾法當並行然以甘寒補腎恐妨腎氣以辛溫扶脾恐妨腎水須辨緩急而為之施治或補腎而助以沉香砂仁或扶脾而雜以山藥五味機用不可不活也虛勞之證扶脾保肺多不可缺然脾性喜溫喜燥而溫燥之劑不利於保肺肺性喜涼喜潤而涼潤之劑不利於扶脾兩者並列而論脾有生肺之機肺無扶脾之力故曰土旺而生金勿拘拘於保肺瀉火之亢以全陰氣壯水之主以制陽光法當並行然瀉火之劑多寒而損陽氣壯水之劑多平而養陰血兩者並列而論苦寒過投將有敗胃之憂甘平恆用卻無傷中之害故曰水盛而火自熄勿汲汲乎寒涼治虛邪者當先顧正氣正氣存則不致於害且補中自有攻意蓋補陰即所以攻熱補陽即所以攻寒世未有正氣復而邪不退者亦未有正氣竭而命不傾者如必不得已亦當酌量緩急暫從權宜從少從多寓戰於守斯可矣此治虛之道也治實證者當去其邪邪去則身安但法貴精專便臻速效此治實之道也惟是假虛之證不多見而假實之證最多也假寒之證不難治而假熱之治多誤也然實者多熱虛者多寒如丹溪曰氣有餘便是火故實能受寒而余續之曰氣不足便是寒故虛能受熱世有不辨真假本末而曰知醫者則未敢許也凡陰虛多熱者最嫌辛燥恐助陽邪也尤忌苦寒恐伐生氣也惟喜純甘壯水之劑補陰以配陽虛火自降而陽歸於陰矣陽虛多寒者是嫌涼潤恐助陰邪也尤忌辛散恐傷陰氣也只宜甘溫益火之品補陽以消陰沉寒自斂而陰從乎陽矣不知者惟知以熱治寒以寒治熱所以陰虛不宜降者則服寒反熱陽虛不宜耗者則服熱反寒此無他皆以專治旺氣故其病反如此春夏之令主生長秋冬之令主肅殺人知之矣殊不知藥之溫者行天地發育之德藥之寒者象天地肅殺之刑如四物湯加黃柏知母名坎離丸舉世奉之以為滋陰上劑降火神丹不知秋冬之氣非所以生萬物者涼血之藥常膩膈非痰多食少者所宜涼血之藥多滋潤多用必致泄瀉嘗見虛勞之死多死於泄瀉泄瀉之因多因於清潤況黃柏苦寒苦先入心久而增氣反能助火至其敗胃所不待言川芎上竄非火炎上氣者所宜知母滑腸豈元氣下陷者可服丹溪云實火可瀉虛火可補試問虛勞之火屬之虛乎屬之實乎瀉之可乎昔人云畏知柏如鴆毒恐其伐我命根耳雖然病初起而相火正隆苦燥渴而右尺滑大暫投亦是無妨久用斷乎不可故用溫補病不增即是減內已受補故也用寒涼病不減即是增內已受伐故也蓋溫暖之藥像陽明君子苟有過人皆見之寒涼之藥類陰柔小人國祚已危人猶莫覺其非虛損之證皆下寒上熱所謂水火不交者也其重感於寒者則下焦作痛不感寒者則不痛至於上焦燥熱則一也上焦方苦煩熱得寒涼之藥則暫快遂以為藥有功故喜服之不知寒涼之藥不久下注則下元愈寒火為寒逼上行則上焦之熱愈甚展轉反覆遂至沉錮而不救是以寒涼補陰非徒無益而且有損也氣有餘便是火補虛而用益氣之藥能無助火為害乎夫火與元氣勢不兩立一勝則一負正氣旺則邪無所容矣即血虛而用血藥亦必兼氣藥為主經曰無陽則陰無以生血脫者益氣為血不自生須得陽和之藥乃生陽生則陰長也若單用血藥血無由而生反有傷犯中州之患矣東垣云人參甘溫補肺氣肺氣旺則四臟之氣皆旺精自生而形自盛也白飛霞雲人參多服回元氣於無何有之鄉凡病後氣虛及肺虛喘嗽者並宜用之人參補氣功載本草人所共知王好古謂肺熱還傷肺王節齊謂虛勞服參耆必死以故天下皆稱有毒如蠍殊不知肺家本有火右寸大而有力東垣所謂鬱熱在肺者誠當勿用若肺虛而虛火乘之肺方被難非人參何以救之古方治肺寒以溫肺湯肺熱以清肺湯中滿以分消湯血虛以養營湯皆用人參自內經以至諸賢諄諄言之以氣藥有生血之功血藥無益氣之理可謂深切著明人亦奈何不悟耶內經論風寒暑濕燥火六氣之變皆能失血各當求責若不察其所因概與涼藥折之變乃生矣服寒涼後證雖大減脈反加數者陽郁也宜升宜補大忌寒涼而執迷不省復用寒涼不徹者必死而後已七情妄動形體疲勞陽火相迫致血錯行脈洪多熱口乾便澀宜行涼藥若使氣虛挾寒陰陽不相為守血亦妄動必有虛冷之狀蓋陽虛陰必走是也更驗其血之色必瘀晦不稠非若火盛迫血妄行之血色濃厚紫赤也宜理中加肉桂收攝之因氣而發者加木香烏藥或飲食傷胃逆上吐衄加香砂楂曲咳嗽有紅用固本丸集靈膏脾胃虛而大便不實者瓊玉膏勞嗽吐紅上熱下寒四味鹿茸丸濟生鹿茸丸選用腎虛風襲下體痿弱骨節疼痛喘嗽失精腰腹腿膝脛踝作痛不能起立者安腎丸久病虛勞失血血枯發熱及女人經閉血枯者宜素問四烏賊骨一蘆茹丸或四物換生地加桃仁虻蟲作丸服吐血成升斗者花蕊石散然必陽虛不能制陰陰氣暴逆者為宜著氣盛血隨火湧者誤用必殆宜十灰散若胃脘蓄血上溢犀角地黃湯加大黃下逐之吐血初起多宜大黃下之失血以下行為順上行為逆又言亡血虛家禁下何也大抵宜行者行之於蓄妄之初禁下者禁之於亡脫之後不可不明察也積勞吐血者血病之餘吐血者吐血多而久不止者並宜獨參湯主之氣虛有熱保元湯加童便藕汁即有血亦無礙一切失血或血虛煩渴躁熱不寧五心煩熱聖愈湯血證既久古人多以胃藥收功異功散加丹皮山藥澤瀉咳嗽更加葳蕤此虛家神劑也凡失血無論衄血出於經咳血出於心嗽血出於肺吐血出於胃咯血出於腎嘔血出於肝唾血出於脾但以色紫黑者為瘀積久血色鮮紅者為暴傷新血色淡清者為氣虛挾痰總屬炎火沸騰故治血以降火下行為首務不可驟用酸寒收斂使瘀積發熱轉增上炎之勢先用瑞金丹次用童真丸引血與火下行最速若血色正赤吐出即凝剔起成片如柿皮者此守藏之血因真陰受損而脫雖能食倍常必驟脫而死若吐淡紅如肉如肺者謂之咳白血此肺胃並傷雖淹歲月亦終不救虛勞精滑無度或交寅刻夢泄氣少力微日漸瘦削目視不明者因房勞太過督任不交不能約制陰火也陽虛者鹿茸丸龜鹿二仙膏陰虛者六味丸加鰾膠五味或六味丸雜聚精丸一分合服飲食減少難於克運者納氣丸陰陽俱虛者十補丸脾胃陰陽俱虛者香茸八味丸皆兼補先後天藥也男子精未充滿色欲過度泄出多有半精半血者此竭力傷肝肝傷不能藏血也蓋少陰常少血多氣厥陰常多血少氣少陰之精氣既竭則厥陰之血氣亦傷是以並血泄出腎主閉藏肝司疏泄氣竭肝傷中空無主所以二臟俱闢其治總不出上法也若夫思欲不遂鬱火無制精為火擾而亡脫者又當清利瀉火為主設與固斂其滑愈甚矣沈朗仲曰陰虛多火人偶感客邪其蒸熱咳嗽雖異平時然察其脈不能便顯浮緊之象但較平時必然稍旺慎勿輕用疏風散表以風藥性皆上升嗽喘咸非所宜亦不可妄與清肺止嗽轉傷胃氣為害不淺當此宜暫停補藥靜以養陰邪自退聽內本多火腠理必疏或啜熱湯稀飲汗氣隨通邪即解散先哲有云陰虛火旺人元氣傷損雖有客邪切忌羌防柴葛等升發散表之劑設不知此誤用風藥則風乘火勢火助風威以煽動其陰邪輕則虛陽擾亂不寧重則氣隨汗脫而斃蓋邪氣方張如日之初升雖有合劑遏之愈逆不獲已而用藥只宜小劑蔥白香豉以解散之若陰火原不太盛小建中黃耆建中亦無妨礙誤用保肺藥必咳嗽益甚即於建中湯稍加葳蕤細辛以搜散之俟其勢衰脈虛確遵趙以德甘寒杜風清熱之例庶無差誤如六味合生脈去萸肉倍地黃人參加葳蕤大劑作湯晨夕兼進合標本而為施治服後咳嗽稍減蒸熱未除此虛陽不能斂制也加牛膝鱉甲以滋下源分先後而為處裁然鱉甲非九肋者必不能應手也若因飲食過度者亦宜暫停補藥以觀其勢慎勿輕與消導戕伐其胃以招虛虛之謗惟枳實理中甘草乾姜二湯分別本元及所停多少而裁用可也因勞役飢飽者補中益氣去升麻加煨葛提挈脾胃之清陽則邪火自降若陰虛火炎斷無升舉之理後人不審每以升柴治陰虛火旺無不蒙其害者虛勞不足汗出而悶脈結心悸行動如常不出百日危炙甘草湯主之千金翼法也若少年稟氣不足因飲食飢飽所傷致成虛損日晡潮熱形體羸弱腹脹氣急脈來弦數者白鳳膏最當此葛可久法也大約咳嗽發熱始先以泄氣為主若久嗽不止必然氣虛火旺一切耗氣之藥俱不可用如桔梗杏仁橘紅蘇子皆主疏泄非久嗽所宜若氣耗甚者又當以保元生脈收斂之此新久虛實不同治也有郁證發熱喘咳誤用寒折致心火淫肺肺被火淫勢不得不奔迫大腸而成泄瀉慎不可用溫補脾胃藥惟逍遙散隨證加減多服乃效思慮不遂心神耗散日漸發熱肌肉瘦削而成風消內經所謂二陽之病發心脾以風熱勝氣日益消瘦也宜多服逍遙散後用歸脾湯調理婦人血既滿而失合男子精未充而思室多成是證婦人則經閉血溢男子則亡血失精並宜巽順丸專調衝任兼散瘀血瘀血散後更與烏骨雞丸調補之若誤用苦寒涼血藥致脾胃滑脫者不治嫠婦師尼所欲未遂陰陽離絶鬱火亢極不得發泄而成失合證者較之房勞更甚始則肝木鬱熱繼則龍火上煽致心肺受病而喘嗽煩熱甚則迫血驟亡者有之經閉不行而吐衄者有之此證宜開鬱降火增損柴胡湯加味逍遙散選用陰火亢極者可用滋腎丸玉燭散光瀉鬱火後服滋養之藥如烏骨雞丸之類若鬱火不泄血氣不榮而發癰疽者去生遠矣劉默生云虛勞多起於郁鬱則其熱內蒸內蒸則生蟲蟲侵蝕臟則咳初起早為杜絶不致蔓延若遷延日久咳嗽不止痰如白沫聲啞喉痛不可治矣脾胃泄瀉六脈細數而堅急久臥床褥煩躁血多者不治如六脈平緩重按有神飲食不減大肉未消二便調適者可用貝母麥冬消痰寧嗽功多開鬱蛤蚧透骨追蟲佐以百部殺蟲獨步兼地骨皮薄荷以清內熱橘紅甘草調中和營為主如寒熱不止加青蒿鱉甲骨蒸無汗加牡丹皮每夜發熱不已加酒浸白芍血虛有傷加茜根氣虛少食加人參脾虛大便不實加茯苓燥結加杏仁小便不利加茯苓澤瀉但覺脊中熱痛不已或時淫淫作癢者皆是瘵蟲為患宜用向東南桃頭四五十個生艾一握雄黃豆大一塊麝香二分搗爛烘熱擦脊骨膏肓百勞肺俞等穴及四肢關節間七日一次亦有用桃葉斤許同艾葉一二兩分二囊盛以陳酒三斤煮乘熱尉背脊膏肓百勞等處不過二三次蟲從魄門而下下後以六味丸合生脈散調理傳尸勞瘵亦宜用之凡骨蒸以多汗為易治氣虛血尚未竭也若干熱無汗為難治氣血內涸不能外通也骨蒸勞嗽而見脈弦細數疾面赤如妝面黧色枯目睛無神眼眶陷下汗出如珠天柱不正指瘦如籩聲啞咽痛嗽而加汗嗽而上喘下泄嗽而左不得眠肝脹嗽而右不得眠肺脹肉脫骨痿而熱甚泄瀉無度而畏寒失血發熱而脈數實咳吐白血及嘔血聲散骨肉相失陽事不禁暮熱如焚身熱面色夭然白及下血衃寒熱脫形脈堅搏者皆不可治如病久痞閉忽得氣血沖和心腎交媾陽事必舉尤宜切戒房室犯之必復愈難調治也大抵虛勞起於斫喪者肝腎過勞多致亡血失精強中陰竭而死起於鬱結者內火爍津多致血結乾咳嗜食發癰而死起於藥誤者脾肺受病居多多致飲食減少喘嗽泄瀉而死此證多患於膏粱不但所稟柔脆且性喜服藥小病必然變重展轉戕賊不至傷殘不已試觀貧居村野有病何嘗服藥所以得盡天年明哲保身胡不自省而甘委之庸術哉面色不衰肌膚日瘦外如無病內實虛傷俗名桃花疰其證必蒸熱咳嗽或多汗或無汗或多痰或無痰或經閉或泄精或吐血或衄血或善食或泄瀉須察其所現何證何臟受傷而治之然此皆為陰火煎熬之證治多不效室女過時不嫁男子過時不娶及少寡者多犯此證以陰火雖乘陽位非但不能消爍陽分之津液陰分之津液反竭力上供陽火之消爍故肢體日削而面色愈加鮮澤也輕者嫁娶後漸愈重者雖暫愈一兩月向後必死以其軀體柔脆精氣先枯不能勝其發泄也惟少寡再醮者每多自愈以其軀體堪任也鬱火既散津液既通可不藥而愈矣傳尸熱毒積久則生惡蟲蟲蝕人臟腑故沉沉默默不知所苦無處不苦經年纍月漸就羸瘦其證蒸熱咳嗽不止胸背痛兩目不明四肢無力腰膝痠疼臥而不寐或面色脫白或兩頰時紅常懷忿怒夢與鬼交同氣連枝多遭傳染至於死亡又傳傍人至於滅門又傳他姓慘毒之禍聞者駭心辨之之法燒真安息香病人吸烟嗽不止者乃傳尸也若嗽不甚者非也瘵蟲最易傳人能謹戒七情嚴避六氣常遠房室慎節飲食蟲不得傳也惟縱欲恣情精血內耗邪祟外乘凡覺元氣稍虛或腹飢餒勿入勞瘵之家或女病思男男病思女一睹其面隨即染傷不可不知治療之法固本為先祛蟲次之安息阿魏蘇合沉香冰片麝香犀角龍齒獺肝獺爪硃砂雄黃皆有祛邪伐惡之靈更以天靈蓋助之然各有所宜若能食便祕面赤者合用獺肝獺爪食少便滑面青者合用天靈蓋其夫死傳妻妻死傳失毒邪深入腎肝二臟者用骨殖中水以生甘草末收曬九次丸服服後必大瀉數行則熱邪自大便而下也其蘇合香丸芎歸血餘散鱉甲生犀散傳尸丸皆治瘵之專方若病入膏肓不能起枯骨也慎柔師訓云嘗治虛損脈和緩而五六至但咳嗽發熱無惡寒咽痛喉哽等證以為可治服保元四君之類十餘劑咳嗽略可熱亦微退至二十劑外咳嗽反盛熱復如前而身反不能轉側足漸無力至不能行而蜷此何也緣下焦腎氣衰憊無津液滋養百骸陽氣不能四運脾肺之氣不能下輸故足無力而蜷藥雖有效病雖暫減終不可治若初服四君保元十餘劑而脈細如絲其數不改決不可治如細而不數者此猶有胃氣無腹痛作瀉而飲食如常可用保元參術調理須二三年方愈若服藥後數脈漸減和緩有神雖曰可治亦得三月見功年半方可全愈又須看年力之衰壯精神脾胃之強弱斷之若服藥後脈雖和緩而腿漸無力如前所述且痰嗽不止脈雖緩治之無益又或如前證足雖無力而熱退嗽減飲食如平人此脾胃尚強猶可遷延歲月又有如前證六脈俱和緩服前劑熱退而脈漸弦反作瀉下血此平時火熱煎熬血留經絡得補藥氣血流通邪不能留而下下後半月十日自愈下血時能食者不死不能飲食精神倦怠者死可立待吐血後反驟能食者亦不可治若見腹痛理中湯噁心飲食少六君子湯無此二證用四君保元服之蓋下血者邪從下竅而出也又有變作傷風狀者邪從上竅而散也當服補肺助脾之藥亦須半月而愈凡病求汗不得汗者不治虛損六脈俱數服滋陰降火之劑不及四五十劑者猶可治之如服至百劑真元耗盡脈洪數而無神雖用補劑而洪數變為細數必漸痿困不起而斃矣又或服寒涼未多用保元四君加生薑一二十劑求汗不出而洪數之脈不退亦難救治或雖無汗而洪脈漸減病亦漸去且能飲食此為可治如此之脈大抵秋冬易治春夏難療凡虛損脈六七至若逢春夏火令津液枯槁腎水正行死絶之鄉肺絶脾燥無有不死者若秋冬火令已退金水正旺脈雖數可治也設病者骨立聲啞喉痛寒熱腹疼作瀉而脈細數亦屬不治凡病延至三四月服藥已多其不效者必過用寒涼五臟愈虛邪火愈熾初用補藥數帖邪火一退反覺頭眩噁心骨疼腳痠神氣昏懶不思飲食倘脈不細數而帶和緩急用保元四君大劑連服便安寢半月睡覺精神頓爽再服再寢飲食漸增則為可治倘脈細如絲腹痛昏憒者難治凡久病人脈大小浮沉弦滑而三部不勻或寸浮尺沉或尺浮寸沉但見病脈反屬可治如久病浮中沉但和緩細察無神而體倦甚者必死再看其面色光潤此精神皆發於外死期速矣凡虛損見數脈為胃氣不足若轉緩弱為胃氣生髮之兆乃少陽春升之氣也凡虛損病久脈雖和緩未可決其必療蓋久病之人元氣虛弱脈反和緩假氣也遇七八月間服補劑病得漸減此生機也或延至十一月一陽初動陽氣漸升內氣空虛無以助生髮之氣則變憎寒壯熱服補劑十餘帖寒熱漸退猶可延捱調理至二三月不變則生否則不治緣春夏木旺脾肺久虛氣衰不能敵時命耳凡醫新病初時有邪脈浮數服按病藥數劑數脈即退病已向安再數劑則倦脈反浮數此時不可為尚有邪也蓋邪退而神氣初轉故浮只宜保元湯調養元氣浮數之脈得微汗而退倘不識此仍以祛邪之藥治之則變虛勞矣久病服藥後六脈俱和偶一日診或細或數或虛弱或變怪異常即當細問起居之故或因一夜不睡而變者或因勞役惱怒或因感冒風寒各隨其感而治之久病咳嗽氣喘若脈數者不可用補藥如服之虛火一退多令人痿倦不起須先用獨參湯稍加陳皮以接其氣數日後脈數漸退方與調理診石頑曰金匱云男子平人脈大為勞極虛亦為勞脈浮者裡虛也脈虛浮弦為短氣目瞑衄血脈大者春夏劇秋冬瘥男子脈浮弱而澀者為無子精氣清冷虛弱微細者善盜汗出脈沉小遲者溏泄食不化脈虛芤遲及諸芤動微緊男子失精女子夢交緊數之脈表裡俱虛緊為寒傷營數為血不足脈見短數則無胃氣細數緊數俱非吉祥脈洪大按之虛者須防作瀉凡見數脈難治病久脈數尤非所宜脈忽浮澀而數忽沉弱而緩變易不常虛火之故也虛損轉潮熱泄瀉脈短數者不治虛損脈浮大者屬陽虛細數者屬陰虛芤為失血若兩手俱芤而中有一部獨弦者為有瘀蓄未盡當散瘀為先不可驟補若見數大者為火旺必難治若見澀脈來至者亦不可治也弦數為骨蒸自上而下者必寸口浮數自下而上者必尺中弦急若關尺俱弦細而急如循弦縷者不治又尺中弦強者必因房室發熱加之誤服寒涼故脈如是然虛損之人雖遠房室其尺脈之弦強必不能便軟若更犯房室明日反和此陰陽得交故爾暫軟後日診之其弦強必愈甚診察之際不可不辨也石頑治牙行陶震涵子傷勞咳嗽失血勢如泉湧服生地汁墨汁不止余及門周子用熱童便二升而止邀石頑診之脈得弦大而虛自汗喘乏至夜則煩擾不寧與當歸補血湯四帖而熱除時覺左脅刺痛按之漉漉有聲此少年喜酒負氣嘗與人鬥狠所致與澤術麋銜湯加生藕汁調服大便即下纍纍紫黑血塊數日乃盡後與四烏鰂骨一蘆茹為末分四服入黃牝雞腹中煮啖留藥蜜丸盡劑而血不復來矣又治顏汝玉女病虛羸寒熱腹痛裡急自汗喘嗽者三月餘屢更醫藥不愈忽然吐血數口前醫轉邀石頑同往診候其氣口虛澀不調左皆弦微而尺微尤甚令與黃耆建中加當歸細辛前醫曰虛勞失血曷不用滋陰降火反行辛燥乎余曰不然虛勞之成未必皆本虛也大抵多由誤藥所致今病欲成勞乘其根蒂未固急以辛溫之藥提出陽分庶幾挽回前失若仍用陰藥則陰愈亢而血愈逆上矣從古治勞莫若金匱諸法如虛勞裡急諸不足用黃耆建中原有所祖即腹痛悸衄亦不出此更兼內補建中之制加當歸以和營血細辛以利肺氣毋慮辛燥傷血也遂與數帖血止次以桂枝人參湯數服腹痛寒熱頓除後用六味丸以棗仁易萸肉或時間進保元異功當歸補血之類隨證調理而安余治虛勞嘗屏絶一切虛勞之藥使病氣不致陷入陰分深得金匱之力也門人進問虛損之治今人恆守肝只是有余腎只是不足二語咸以清熱平肝為務吾師每以扶脾益肝建功其旨云何石頑答曰夫嗽雖言肺病而實本之於胃內經咳論有云其本在胃頗關在肺其義可見至於平肝之說關係匪輕肝為生髮之臟主藏精血精血內充證脈俱無由見也凡虛勞裡急亡血失精煩熱脈弦諸證良由生氣內乏失其柔和而見乖戾似乎邪熱有餘之象是須甘溫調補以扶生髮之氣審系陰虧則壯水以制陽陽虛則培土以厚載使之榮茂而保其貞固詎可復加削伐而損既病之胃氣乎復問虛損之宜於扶脾益肝敬聞命矣先哲治按中多有三黃四物等方者何也答言風土不同故也西北之人恆食煤火煤為水土之精英得水益熾作食食之能助真火真火過極則為壯火壯火散氣是以西北之人患中風者多虛羸者少即或有之惟以苦寒清火為務雖有虛證無藉辛溫也東南之人惟食薪火薪稟水土之慓悍得水即滅作食食之專助龍火龍火飛騰則為邪火是以東南之人患中風者少虛羸者多縱有肝邪最忌苦寒傷中之劑雖有木鬱難於升發也然西北之人豈無真陽虛劇宜用薑附者東南之人豈無邪熱亢極宜用芩連者當知北人稟賦雖強以水為事真陽耗竭非峻投辛烈烏能扶元氣於無何有之鄉南人稟賦雖薄恣情自恃邪火暴逆非暫用苦寒何以救真陰於將竭之頃哉庸師但知辛熱有助陽之功曷知有損陰之患苦寒有傷中之慮曷知有救陰之力歟
