body:
  text: 卷十五目門千金磁朱丸治神水寬大漸散光采不收及內障撥後翳不能消用此鎮之磁石能吸鐵者良硃砂先以磁石置巨火中煅七次每煅必淬以醋研細水飛澄定曬乾取淨二兩硃砂亦研細水飛曬乾取淨一兩用生神麯末三兩與前二味和勻更以神麯一兩水和作餅煮浮搜入前藥為丸加緑豆大每服三四十丸空心米飲送下按千金磁朱丸方本指南之制而立昔黃帝徵蚩尤玄女授帝指南以定方隅法用神砂雄黃拌針入生雁脛骨空中鍛鍊而成鍛過必置磁石之上蓋朱稟南方離火之氣而中懷嬰奼磁稟北方坎水之精而外發氤氳真匡正辟惡之靈物也得陰陽二氣之交所以入水不濡戾天能飛用以佐磁朱而制針則最重之質置水能浮隨磁吸引以為指南之準則近世以雁脛難得用白雄雞血硃砂雄黃拌針入活鯉魚首煆過同磁石收貯取其準上午下子者用之與雁脛之義不殊凡羽禽之目皆自下睫而交上睫性皆升舉所以能飛非若毛獸之目悉自上睫而交下睫也吾嘗靜觀飛走升沉之理於茲可默識矣千金爰悟其旨取磁硃之重以鎮神水之不清而收陰霾之障蔽用生曲者籍以發越丹石之性猶雁脛鼓躍二氣之義也噫崇古立方之聖莫如長沙長沙之後唐進士一人而已皂莢丸治外內一切障膜翳嫩不宜針撥者此丸與生熟地黃丸並進蛇蛻酥炙七條蟬蛻元精石穿山甲炮當歸白朮生茯苓穀精草木賊白菊花刺蝟皮蛤粉炒龍膽草赤芍連翹各兩半獖豬爪三十枚蛤粉炒人參一兩川芎半兩共為細末一半入牙皂十二挺燒存性和勻煉白蜜丸梧子大每服一錢五分空心食前杏仁湯送下一半入仙靈脾即淫羊霍一兩每服三錢用豬肝三片批開夾藥煎熟臨臥細嚼用原汁送下生熟地黃丸治肝虛目暗膜入冰輪內外諸障生地黃八兩熟地黃十二兩石斛鹽水炒牛膝酒蒸各四兩菊花去蒂六兩羌活防風杏仁湯泡去皮尖枳殼各二兩蜜丸梧子大每服五七十丸以黑豆三升炒令煙盡淬好酒六升每用半盞食前送下鹽湯亦可或用生雞肝搗爛為丸尤妙此即明目地黃丸加菊花羌活其間防風杏仁枳殼與地黃牛膝同用者以其久風襲入寒水之經也若精血虧人則當去此三味易白蒺藜當歸枸杞未為不可也夏枯草散治肝虛目珠痛至夜疼劇夏枯草花一兩香附童便浸二兩甘草炙二錢為散每服四錢茶清調日三服或加芽茶煎服痛久血傷加當歸六錢白芍四錢生地黃一兩黃耆二兩每服五錢入芽茶一撮水煎去滓服洗肝散局方治風毒上攻暴赤腫痛薄荷當歸羌活防風山梔酒炒黑甘草炙各一兩大黃酒蒸二兩川芎八錢為散每服三錢沸湯調日二三服酒煎散治暴露赤眼生翳漢防己酒洗防風甘草炙荊芥穗當歸赤芍藥牛蒡子甘菊去蒂等分為散每服五六錢酒煎食後溫服大黃當歸散治眼壅腫瘀血凝滯不散攻脈見翳大黃酒蒸黃芩酒炒各一兩紅花三錢蘇木屑當歸梔子酒炒木賊各五錢為散每服四錢水煎食後服瀉肺湯治暴風客熱外障白睛腫脹羌活黑參黃芩各一錢地骨皮桑白皮大黃酒蒸芒硝各一錢甘草炙八分水煎去滓半飢溫服世本無桑皮多桔梗密蒙花散局方治眥淚昏暗密蒙花塞鼻即嚏者真甘菊花去蒂白蒺藜炒去刺白芍藥局方無羌活石決明煅木賊去節甘草炙各半兩局方無為散每服二三錢茶清調服準繩無羌活還睛丸局方治男子女人風毒上攻眼目赤腫怕日羞明多饒眵淚隱澀難開眶癢赤痛瞼眥紅爛瘀肉侵睛或患暴赤眼睛疼不可忍者並服立效白朮生菟絲子酒浸別研白蒺藜炒去刺木賊去節羌活去苗青葙子去土密蒙花防風去蘆甘草炙各等分上為末煉蜜丸如彈子大每服一丸細嚼白湯下日三服又治偏正頭風頭目眩運石膏散治頭風患眼生石膏三兩藁本白朮生甘草炙各兩半白蒺藜炒去刺一兩為散每服四五錢熱茶清調空腹臨臥各一服通肝散治轆轤轉關瞼硬睛疼風熱翳障梔子炒黑白蒺藜炒去刺各一兩羌活二兩荊芥穗當歸牛蒡子炒研甘草炙各一兩二錢為散每服三錢食後竹葉湯調服世本無羌活當歸多枳殼車前絳雪膏即寶監春雪膏治昏暗癢痛隱澀難開眵淚生翳爐甘石四兩銀罐內固濟煅過水飛預將黃連一兩當歸五錢河水煎汁去滓入童便半盞將甘石丸如彈子多刺以孔煅赤淬藥汁內以汁盡為度置地上一宿去火氣收貯待用硼砂研細水調盞內炭火緩緩燉干取淨一錢半黃丹明乳香煅存性研烏賊骨燒存性研白丁香真者各一錢半麝香輕粉各五分煉白蜜四兩先下制淨爐甘石末一兩不住手攪次下後七味攪至紫金色不黏手為度捻作挺子每用少許新水磨化時時點之忌酒醋蕎麥又方用爐甘石一兩煅赤以羊膽汁青魚膽汁荸薺汁梨汁人乳白蜜等分相和淬之再煅再淬汁盡為度入冰片麝香青鹽硼砂煅過各二分研勻每用少許井花水調點兩眥石燕丹點外障諸翳爐甘石四兩用黃連一兩歸身木賊羌活麻黃各五錢河水二升童便一升同煮去滓製法如絳雪膏取淨一兩硼砂銅杓內同水煮乾石燕琥珀硃砂水飛各取淨錢半鷹屎白一錢如無白丁香代之冰片麝香各分半上為極細末每用少許點大眥如枯澀無淚加熊膽一分白蜜少許血翳加真阿魏黃翳加雞內金風熱翳加蕤仁熱翳加珍珠牛黃冷翳加附子尖雄黃老翳倍硼砂加豬𦚟子助陽和血湯治氣血不和痛如針刺黃耆生三錢當歸甘草炙防風各一錢白芷蔓荊子升麻各六錢柴胡八分水煎食後服趙以德加赤芍藥七分白蒺藜散治肝腎虛熱生風赤澀多淚白蒺藜炒去刺菊花蔓荊子草決明甘草炙連翹等分青葙子減半為散每服三四錢水煎去滓熱服羌活勝濕湯治目疾一切風熱表證羌活錢半白朮一錢川芎枯梗枳殼荊芥柴胡前胡黃芩各八分白芷六分防風五分細辛一分薄荷三分甘草炙四分水煎食後熱服世本無細辛有獨活瀉肝散治肝熱目赤腫痛一切里證梔子仁荊芥大黃甘草等分為散每服四五錢水煎熱服此治肝熱不用赤芍膽草當歸反用梔子清肝則血熱疼腫何能便退詳此四味治白睛赤痛則可治風輪赤痛則不可春雪膏局方治風熱生翳蕤仁去皮研細紙包壓去油再研再壓數十次上取淨蕤仁五錢入龍腦五分煉白蜜一錢五分再研勻瓷罐收貯每用少許箸頭點大眥蕤仁膏治風熱眼生赤脈癢痛無定蕤仁去皮研極細壓去油上取淨蕤仁霜五錢濃煎秦皮汁調和隔紙瓦上焙熟有焦者去之塗淨碗內以艾一錢分作三團每團中置蜀椒一粒燒煙起時將碗覆煙上三角墊起熏之煙盡曬乾再研入硃砂麝香各半錢瓷瓶收貯每用麻子大點大眥日二度如點老翳加硼砂少許一方但用蕤仁研壓去油淨五錢麝香硃砂水飛各五分每用少許點大眥效碧雲散治外障攀睛眵淚稠黏鵝不食草一兩嗅之即嚏者真青黛川芎各半兩為散先噙水滿口每用緑豆許搐鼻內以嚏淚為效搐無時一方加北細辛牙皂末各一錢宣明丸治瘀血灌睛赤腫澀痛赤芍當歸大黃酒蒸黃芩各二兩生地黃三兩黃連川芎薄荷各一兩蜜丸梧子大每服五十丸食後米飲服羌活除翳湯治太陽翳膜遮睛麻黃根薄荷各五分生地黃酒浸一錢當歸川芎黃柏酒炒知母荊芥各六分藁本七分防風八分羌活錢半川椒炒去汗細辛各三分水煎食前稍熱服忌酒醋濕面炙煿龍膽飲治肝經濕熱目赤腫痛黃芩犀角木通車前黃連黑參各一錢梔子炒黑大黃芒硝各錢半龍膽草淡竹葉各八分黃柏酒炒黑五分水煎食後分二次熱服清涼膏治打撲傷眼腫脹大黃芒硝黃連酒炒黃柏赤芍當歸各一錢細辛五分薄荷八分芙蓉葉三錢為細末用生地黃一兩酒浸搗絞汁入雞子清一枚白蜜半兩同調貼太陽及眼胞上四生散治腎風上攻耳中鳴癢目癢昏花白附子黃耆獨活白蒺藜等分為散每服二錢用豬腎批開入藥濕紙裹煨熟稍入鹽花細嚼溫酒送下萬應蟬花散局方名蟬花無比散治奇經客邪目病蟬蛻半兩蛇蛻酥炙三錢川芎防風羌活甘草炙當歸茯苓各一兩赤芍石決明煮一伏時研細蒼朮童便浸去腐刮去粗皮切麻油拌炒各兩半為散每服二三錢食後臨臥茶清送下祕旨無蒼朮多白蒺藜保命羚羊角散治陷翳久不得去用此焮發羚羊角鎊二兩升麻兩半細辛一兩甘草五錢一半蜜丸一半為散以泔水煎吞丸子五七十丸食後熱服取散為前導丸為後合也阿魏搐鼻法去星翳阿魏三錢雞內金一錢冰片三分蜜和捻箸頭上令中空通氣外裹烏金紙去箸每夜塞鼻中星翳目退撥雲退翳丸治陽蹺受邪內眥赤脈攀睛蔓荊子木賊去節密蒙化各二兩川芎白蒺藜炒去刺當歸各兩半菊花荊芥穗各一兩楮實子薄荷蜀椒黃連酒洗蟬蛻各五錢蛇蛻酥炙甘草炙各三錢蜜丸每兩分作八丸食後臥時細嚼一丸茶清送下熊膽膏治一切老翳爐甘石煅過水飛丸如彈子大每淨一兩分作十丸用川黃連三錢濾煎去滓燒淬之汁盡為度每料用淨者二錢琥珀五分瑪瑙水飛淨三錢珊瑚水飛淨三分珍珠煅飛淨三分硃砂水飛淨五分冰片二分麝香二分和勻瓷罐收貯每用少許點大眥上日二三次照水丹治攀睛翳障烏賊骨一錢辰砂半錢為散點之白翳加冰片少許赤翳加五靈脂少許蠍附散搐鼻退冷翳鵝不食草一兩青黛一作細辛生附子尖薑黃薄荷全蠍各五錢為散口含冷水搐少許神消散治黃膜上衝黃芩蟬蛻甘草炙木賊各一兩蒼朮童便浸麻油炒穀精草各二兩蛇蛻酥炙四條為散每服二錢臨臥新汲水調服爐甘石散治爛沿風眼爐甘石三兩銀罐煅飛丸如彈子多刺以孔先以童便一盞煅淬七次次以黃連三錢煎濃汁煅淬七次後以芽茶一兩濃煎煅淬七次又並余汁合一處再煅淬三次安放地上一宿出火氣細研入冰片麝香少許點之煅時選大炭鑑一孔以安爐甘石一方不用童便黃連芽茶用車前草一斤搗取自然汁淬數十次汁盡為度細研瓷罐收貯臨用加冰片少許防風瀉肝散治蟹眼睛疼針去惡水用之防風羌活一作遠志桔梗羚羊角鎊赤芍黑參一作人參黃芩各一兩細辛甘草各五錢為散每服二三錢沸湯調服羚羊角散與局方不同治內外翳障但痠疼澀痛不熱不腫者羚羊角鎊一兩白菊花川烏頭炮川芎車前防風羌活半夏薄荷各半兩細辛二錢為散每服二錢生薑湯調薄荷湯送下陷翳加升麻五錢肉桂二錢補腎丸治腎虛眼目無光巴戟肉山藥補骨脂鹽酒炒牡丹皮各二兩茴香一兩鹽水炒肉蓯蓉酒浸去腐切焙枸杞子各四兩青鹽半兩蜜丸梧子大每服五七十丸空心鹽湯溫酒任下羚羊角湯治肝熱生風內障羚羊角鎊人參各錢半黑參地骨皮羌活車前各一錢二分水煎食前熱服羚羊角飲子治風輪熱翳及黑泡如珠羚羊角一錢五味子二十粒細辛三分防風大黃酒蒸知母各一錢芒硝七分水煎食前溫服龍木羚羊角飲子羚羊角散羚羊補肝散等方並以羚羊為主丹溪云羚羊力能舒筋入厥陰經甚捷惟翳在風輪者用之為宜若不在風輪漫投寧不引邪入犯耶黃連羊肝丸局方治目多赤脈黃連一兩白羯羊肝一具生用先以黃連為細末用竹刀將羊肝刮下如糊除去筋膜入盆中研細入黃連末搗和為丸如緑豆大每服三四十丸茶清送下睛痛者當歸湯下忌豬肉冷水其膽冬月以生白蜜相和盛滿懸掛當風膽外漸生黃衣雞翅刷下點赤脈熱翳良補腎磁石丸治腎虛肝氣上攻目昏漸成內障磁石醋煅七次水飛甘菊花石決明煅各一兩菟絲子酒煮搗絲焙肉蓯蓉酒浸去腐切焙各二兩為末雄雀十五枚去皮嘴留腸以青鹽二兩水三升煮雀至爛汁盡為度搗如膏和藥為丸梧