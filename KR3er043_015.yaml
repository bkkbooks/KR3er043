末每服四五分至一錢獖豬尾血調紫草湯下古方入麝少許酒釀調服錢氏云痘疹最怕麝與酒觸恐防發癢珍珠人牙散治痘瘡毒伏心腎黑陷神昏人牙煅五錢珍珠一錢血竭五分為散每服四五分酒漿調服桑蟲漿治痘氣虛毒盛白陷不起生桑樹內蟲一二枚蒸熟酒釀搗絞燉服之地龍酒治痘血熱毒盛黑陷不起治地龍五七枚同烏芋搗絞入酒漿少許燉熱服之雞冠血治痘青乾紫黑陷血熱毒盛者穿山甲炮研極細每用五六分至一錢刺老雄雞冠上血數滴酒釀調勻燉熱服牛李膏一名必勝膏治痘黑陷不起牛李子一名鼠李子又名烏絳子俗名緑子可以染緑一味熬膏收干丸如皂子大桃膠煎湯化下如無鮮者乾者熬膏用之棗變百祥丸治痘瘡黑陷便祕大棗十枚擘大戟二兩去骨上二味煮爛去大戟將棗搗丸如緑豆大周歲兒十丸紫草湯或木香湯下從少至多以利為度周天散治痘黑陷項強直視喘脹發搐地龍去土焙乾二兩蟬蛻去翅足半兩為散每服半錢至一錢乳香湯調下日三夜一痘起為效周天之名因軫水蚓為二十八宿之末故取此義與地龍酒功用稍有不同若但黑陷喘脹用地龍酒最捷如兼作癢則周天散為合劑耳水楊浴法治痘出頂陷漿滯不行或為風寒所侵俱宜用之如初出及收斂時癢塌破損者勿用用水楊五斤三時用葉冬用枝以長流水一大釜煎六七沸取三分之一置浴器內候溫浴之內服應用之藥然後浴洗漸次加湯良久乃以燈照纍纍然有起勢陷處暈暈有絲此漿影也後必滿足如未滿足又浴如前力弱者只浴頭面手足若無起勢則氣血敗而津液枯矣必難救治白花蛇散治痘虛寒白陷毒匿不起白花蛇三錢丁香十枚為散每服三五分熱酒調下熏穢散蒼朮細辛甘松川芎乳香降香等分為散燒煙解血厭及諸穢氣闢穢香大黃一倍蒼朮減半為散燒煙闢尸厭諸穢芍藥湯治痘將靨時微癢白芍酒炒甘草炙忍冬茯苓黃芩等分薏苡仁倍用水煎熱服橘皮茱連散治痘瘡初起乾嘔而噦橘皮六錢吳茱萸三錢黃連一兩同吳茱萸炒竹茹一團為散每服一錢水煎服前胡枳殼湯治喘嗽上氣煩渴引飲便實溺赤前胡枳殼赤茯苓大黃酒蒸甘草炙等分為散每服三錢水煎溫服身溫脈微者禁用補肺湯治氣虛痘毒乘肺咳嗽不已黃耆鼠黏子各一錢阿膠八分馬兜鈴甘草各五分杏仁去皮尖七枚桔梗七分糯米一撮水煎溫服黃芩瀉肺湯治肺熱喘嗽裡實便祕黃芩酒炒大黃連翹山梔熬黑杏仁去皮尖枳殼桔梗薄荷生甘草水煎溫服射干鼠黏子湯治痘不起發咽喉疼腫鼠黏子錢半甘草五分射干六分升麻四分水煎不時服之紫草消毒飲治痘疹血熱咽痛紫草連翹鼠黏子各一錢荊芥七分甘草山豆根各五分水煎不時溫服生津葛根湯治痘瘡發渴葛根栝蔞根麥門冬去心生地黃等分升麻甘草生減半用糯米泔水煎去滓入茆根自然汁一合服之人參酸棗湯治心肺虛熱煩躁不寧人參棗仁炒研山梔熬黑生地黃麥門冬去心當歸等分甘草炙減半水煎溫服梔子仁散即梔子湯治痘疹毒盛色黑便祕梔子仁熬黑一兩白鮮皮赤芍藥升麻各五錢寒水石如無石鹽代之甘草炙各三錢為散每服一二錢水煎量兒大小調紫草茸末半錢匕服之移痘丹治痘出目中初見點時用此移之守宮十枚去頭足配辰砂一錢陰乾珍珠茯神遠志肉各一錢琥珀五分為末紫草膏和丸如梧子大每服一錢二分欲移在手足觀桂威靈仙煎湯下欲專移在足牛膝木瓜煎湯下微汗為度再用後藥二服川芎藁本荊芥白芷各五分蟬蛻三分防風生薑一片蔥白一莖水煎溫服血熱者加紫草連翹此方出麻城家祕黃石峰極言其神而吾吳以痘疹名世者莫不以守宮為方士異端曷知醫學正傳聖濟總録衛生寶鑑丹溪摘玄聖惠方等咸取入劑豈可以方士目之耶排毒散治痘後餘毒發癰能食便祕大黃酒蒸一兩白芷七錢五分沉香另研木香各二錢五分穿山甲炮三錢歸尾五錢為散每服二三錢忍冬花煎湯調日三服虛者減大黃加荊防連翹甘草節欲托加黃耆防風解毒內托散治痘後發癰黃耆當歸防風荊芥連翹赤芍木通等分甘草節減半忍冬花倍用水煎入醇酒少許服之真人解毒湯治痘母木通連翹防風荊芥各三錢忍冬花半斤甘草節一兩水酒各半煎溫分三服以腫消痘出為度清咽滋肺湯治麻後餘熱咳嗽聲喑黑參鼠黏子荊芥葳蕤貝母去心栝蔞根馬兜鈴桔梗麥門冬等分甘草減半水煎溫服繆仲淳無馬兜鈴有薄荷清熱透肌湯治麻疹未透熱甚而咳黑參石膏鼠黏子荊芥防風前胡葛根杏仁等分生甘草減半水煎熱服葛根解肌湯治麻疹初起發熱咳嗽或乍涼乍熱葛根前胡荊芥鼠黏子連翹赤芍蟬蛻木通等分生甘草減半水煎熱服涼血飲子治麻疹火毒熾盛紫赤而黯生地黃錢半黃連五分黃芩荊芥黑參各一錢紅花三分赤芍丹皮各八分木通七分水煎溫服甘桔湯治麻疹咽痛口舌生瘡甘草桔梗山豆根黑參鼠黏子荊芥等分麥門冬倍用水煎溫服石斛清胃散治麻後嘔吐腎虛不食熱滯石斛茯苓橘皮枳殼扁豆藿香丹皮赤芍等分甘草減半為散每服三四錢加生薑一片水煎服之門冬甘露飲治麻疹熱甚而渴麥門冬二錢去心黑參黃芩栝蔞根連翹各一錢生甘草五分燈心二十莖竹葉二十片水煎溫服除熱清肺湯治麻疹盡透而壯熱咳嗽大便祕結石膏三錢黑參生地黃赤芍貝母栝蔞根各一錢麥門冬去心錢半甘草五分水煎溫服射干消毒飲治麻疹咳嗽聲喑咽喉腫痛射干黑參連翹荊芥鼠黏子等分甘草減半水煎溫服當歸散治口舌生瘡牙根毒發大便祕結當歸赤芍各一錢川芎五分大黃三錢甘草生五分為散加生薑一片水煎服之無比散治麻後牙疳腐爛取黃牛糞煅存性入龍腦少許研細吹之燒鹽散