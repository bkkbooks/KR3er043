再見及陰頽腫土瓜根芍藥肉桂䗪蟲等分上四味為散酒服方寸匕日三服土瓜根黃瓜根也藥鋪不收往往以栝蔞根代用考之本經栝蔞根性味雖同苦寒而無散瘀血通月閉之功此治雖專惜乎其力彈緩故以桂䗪弼之芍藥監之與旋覆花湯之用新絳不殊歸附丸治氣亂經期或前或後當歸四兩香附八兩童便浸透晾乾再加酒醋鹽姜四制為細末醋糊丸空心砂仁湯下三錢血虛加熟地八兩虛寒加桂附各一兩帶下氣腥加吳茱萸靳艾各一兩臍下冷痛加桂附沉香各一兩丁香三錢經行少腹先痛或血色紫黑結塊加醋煮蓬朮二兩沉香一兩經後少腹虛痛加參耆阿膠各四兩蘄艾二兩經水色淡加薑桂各二兩人參四兩醋煎散治經行少腹結痛産後惡露不行三稜蓬朮香附烏藥赤芍甘草肉桂等分通用醋炒為散每服三錢空心砂糖湯調服蘆薈丸治肝疳口舌生瘡牙齦腐爛遍體生瘡及婦人熱結經閉作塊上衝梗痛蘆薈青黛硃砂另研水飛各三錢麝香一錢大皂莢去皮弦子一兩乾蟾一兩同皂莢燒存性為細末蒸餅糊丸麻子大每服三五十丸空心米湯下防風丸治風入胞門崩漏下血色清淡者防風勿見火為末醋丸梧子大空腹蔥白湯下二錢五分子芩丸治風熱入犯肝經崩漏下血色稠紫者條黃芩酒炒為末酒丸梧子大空腹烏梅湯下三錢千金茯苓補心湯治心氣不足善悲愁恙怒衄血面黃煩悶五心煩熱獨語不覺婦人崩中面赤茯苓六錢桂枝三錢甘草二錢紫石英碎如米粒一兩人參麥門冬去心各五錢大棗四枚赤小豆一合水煮日三服千金小牛角腮散治帶下五崩下血外實內虛之病牛角腮一枚燒令赤鹿茸禹餘糧當歸乾薑續斷各二兩阿膠三兩烏鰂骨龍骨各一兩赤小豆六合上十味為散空腹溫酒服方寸匕日三服千金伏龍肝湯治勞傷衝任崩中去血赤白相兼或如豆汁臍腹冷痛口乾食少伏龍肝如彈子大七枚生薑生地黃各兩半甘草艾葉赤石脂桂心各六錢上七味㕮咀以水一斗煮取三升分四服日三夜一失笑散治婦人瘀結少腹急痛五靈脂酒研澄去砂蒲黃篩淨生半炒半等分為散每服二錢半酒煎入砂糖少許和滓服少頃再服瘀結腹痛經水反多元氣虧弱藥力不行者用人參二三錢調服以擊搏之千金七子散治丈夫風虛目暗精氣衰少無子補不足五味子鍾乳粉牡荊子菟絲子車前子菥蓂子石斛乾地黃薯蕷杜仲鹿茸遠志各八銖附子蛇床子芎藭各六銖山茱萸天雄人參茯苓黃耆牛膝各三銖桂心蓯蓉各十銖巴戟天十二銖上二十四味治下篩酒服方寸匕日二不知增至二匕以知為度禁如藥法不能酒者蜜丸服亦可紫石門冬丸千金治全不産及斷緒方紫石英天門各三兩當歸芎藭紫葳卷柏桂心烏頭乾地黃牡蒙禹餘糧石斛辛荑各二兩人參桑寄生續斷細辛厚朴乾薑食茱萸牡丹牛膝各二十銖柏子仁一兩薯蕷烏賊骨甘草各一兩半上三十六味為末蜜和丸如梧子大酒服十丸日三漸增至三十丸以腹中熱為度不禁房室夫行不在不可服禁如藥法比來服者不至盡劑即有娠慶雲散千金治丈夫陽氣不足不有施化無成覆盆子五味子菟絲子各一升天雄一兩石斛白朮各三兩桑寄生四兩天門冬九兩紫石英二兩上九味治下節酒服方寸匕先食服日三素不耐冷者去寄生加細辛四兩陽氣不少而無子者去石斛加檳榔十五枚朴硝蕩胞湯千金治婦人立身已來全不産及斷緒久不産二三十年者朴硝牡丹當歸大黃桃仁生各三銖細辛厚朴桔梗人參赤芍藥茯苓桂心甘草牛膝橘皮各一銖附子六銖虻蟲水蛭各十枚上十八味㕮咀以清酒五升水五升合煮取三升分四服日三夜一每服相去三時更服如常覆被取少汗汗不出冬日著火籠之必下積血及冷赤膿如赤小豆汁本為婦人子宮內有此惡物使然或天陰臍下痛或月水不調為有冷血不受胎若斟酌下盡氣力弱大困不堪更服亦可二三服即止如大悶不堪可食酢飯冷漿一口即止然恐去惡物不盡不大得藥力若能忍服盡大好如無水蛭用鯪鯉甲以生漆塗炙脆代之白薇丸千金治月水不利閉塞絶産白薇細辛各三十銖人參杜蘅牡蒙厚朴半夏白殭蠶當歸紫菀各十八銖牛膝沙參乾薑秦艽各半兩蜀椒附子防風各一兩半上十七味為末蜜和丸如梧子大先食服三丸不知稍增至四五丸此藥不可長服覺有娠即止用之大驗葆真丸治房勞太過腎氣虛衰精寒不能生子鹿角膠八兩即用鹿角霜拌炒成珠杜仲鹽水拌炒三兩乾山藥微焙白茯苓人乳拌蒸曬熟地黃山茱萸肉各三兩北五味益智仁鹽水拌炒遠志甘草湯泡去骨川楝子酒煮去皮核川巴戟肉酒炒補骨脂胡蘆巴與補骨脂同羊腎煮汁盡為度焙乾各一兩沉香五錢另為末勿見火上十四味共為細末入沉香和勻以肉蓯蓉四兩洗去皮垢切開心有黃膜去之取淨二兩好酒煮爛搗如糊同煉蜜杵勻丸如梧子每服五七十丸空心溫酒下以美物壓之精薄者加鰾膠六兩此方不用桂附壯火助陽純用溫養精血之味獨以沉香益智鼓其氤氳又以楝子抑其陽氣引諸陽藥歸宿下元深得廣嗣之旨千金種子丹此方服之令人多子並治虛損夢遺白濁沙苑蒺藜取淨末四兩水一大碗熬膏候用蓮鬚取淨末四兩覆盆子去核取淨二兩山茱萸肉取淨三兩芡實取淨四兩龍骨煅飛淨五錢上用伏蜜一斤煉以紙黏去浮沫滴水成珠者止用四兩將前五味藥末先以蒺藜膏和作一塊再入煉蜜搗千杵丸如豌豆大每服三十丸空心鹽湯送下忌房室二十日此藥延年益壽令人多子五子衍宗丸此藥添精補髓疏利腎氣不問下焦虛實寒熱服之自然平祕甘州枸杞子菟絲子酒蒸搗成餅各八兩北五味子一兩覆盆子酒洗去目四兩車前子炒二兩上五味俱擇道地精新者焙曬乾共為細末煉蜜丸如桐子大每日空心服九十丸臥時服五十丸沸湯鹽湯任下煉真丸治高年體豐痰盛飽飫肥甘恣情房室上盛下虛及髓臟中多著酒濕精氣不純不能生子者服之並效大腹子七兩童便浸切茅山蒼朮去皮泔浸麻油炒人參茯苓各三兩厚黃柏三兩童便乳汁鹽水各制一兩鹿茸大者一對酥炙大茴香去子一兩淫羊霍去刺羊脂拌炒澤瀉蛇床子酒炒白蓮鬚酒洗沉香另末勿見火五味子各一兩金鈴子即川楝子酒煮去皮核三兩鳳眼草一兩即樗樹葉中有子一粒形如鳳眼故名如無樗根皮代之上為末用乾山藥末調糊代蜜為丸空心鹽湯送下三四錢臨臥溫酒再服二錢煉真者煅煉精氣使之純粹也故方中專以大腹佐黃柏茅朮滌除身中素蘊濕熱則香茸茴香不致反助濁濕痰氣何慮年高艱嗣哉抑氣散治婦人氣盛於血所以無子尋常頭目眩暈膈滿體疼怔忡皆可服香附制炒淨二兩陳皮焙二兩茯神甘草炙各一兩上為細末每服二三錢不拘時白湯調下秦桂丸即螽斯丸治婦人子宮虛寒不能攝精成孕熟附子二枚桂心勿見火厚朴薑汁炒厚杜仲鹽酒炒細辛秦艽酒洗焙白薇川牛膝酒淨沙參各二兩茯苓人參各四兩煉白蜜丸梧子大空心溫酒下五七十丸得孕二三月不可更服忌牛馬肉犯之難産此方鄭心芣手裁較世本減附子四兩細辛三兩茯苓二兩削去乾薑易入當歸以和陽藥之性不致陽無以化且免經水紫黑胎息不育之虞其秦艽朴半專理痰積沙參膝薇專清濁帶使子戶溫和陽施陰化孕自成矣皺血丸局方治婦人血海虛冷百病變生氣血不調時發寒熱或下血過多或久閉不通崩中不止帶下赤白癥瘕癖塊攻刺疼痛小腹緊滿脅肋脹痛腰重腳弱面黃體虛飲食減少漸成勞怯及經脈不調胎氣多損胎前産後一切病患無不治療熟地黃甘菊去心蒂梗茴香去子當歸身延胡索炒赤芍藥桂心蒲黃取淨粉焙蓬朮牛膝香附炒去毛酒浸三日焙各三兩上十一味為末用細黑豆一升醋煮候乾為末再入米醋三碗煮二碗為糊和丸梧子大每服二十丸溫酒或醋湯下血氣攻刺煨薑湯下癥瘕絞痛當歸酒下忌鴨肉羊血方以皺血命名取醋之酸引藥歸宿子臟以收攝精氣也蓋血海之虛寒皆緣肝臟生陽氣衰不能宣散濁陰而致子臟不淨子臟不淨烏能攝精而成胎息乎故立方專以推陳致新為綱旨是以清熱散瘀之劑反過於歸地桂茴等味使子臟安和生生之機不竭矣大抵婦人之百病變生總屬氣血不調即寒熱虛怯經閉崩中靡不因血海不淨所致其妙用尤在醋煮烏豆以血得酸則斂不致滑脫瘀得辛則散不致留蓄更慮陰寒內結勢必虛陽上浮故用菊花以清在上之虛陽冷積胞門勢必熱留經隧又需牛膝赤芍輩以祛在經之積熱與秦桂丸中用厚朴秦艽白薇沙參之意不殊良工苦心非深究其旨何以獲先哲立方之旨哉但服此而得坤儀者多良由純屬血藥血偏旺而氣偏餒是不能無陰勝之過宜於方中增入人參一味或等分或倍加隨質而助陽和之力鼓氤氳之氣為乾道之基未始其為不可也再詳廣嗣諸方男子世稱葆真丸婦人首推秦桂丸然服之有驗有不驗者質之偏勝不同也蓋男子腎臟陽衰婦人血海虛冷則二方為專藥若男子體肥痰盛精氣不純婦人瘀積留著子戶不淨豈可純以暖腎溫經為事哉又需煉真丸之大腹茅朮金鈴祛滌蘊濕皺血丸之蓬朮牛膝甘菊清解瘀熱為合劑耳用方者審諸千金大黃丸治帶下百病無子服藥十日下血二十日下長蟲及青黃汁三十日病除五十日肥白而能成孕大黃破如豆粒熬黑柴胡芒硝各一斤芎藭五兩乾薑蜀椒各一升茯苓雞子大一枚上七味為末蜜和丸如梧子大先食米飲服七丸加至十丸以知為度五日微下桂心茯苓丸金匱治妊娠癥瘕下血胎動在於臍上桂心茯苓牡丹皮桃仁去皮尖熬赤芍藥等分上五味蜜丸如兔屎大每日食前服一丸不知加至三丸當歸貝母苦參丸金匱治妊娠煩熱小便難當歸貝母去心苦參等分上三味蜜丸如小豆大飲服三丸加至十丸葵子茯苓散金匱治妊娠小便不利惡寒頭眩葵子五兩向日葵子也茯苓一兩上二味為散飲服方寸匕日三服白朮散金匱治妊娠胎寒帶下白朮芎藭各二十分蜀椒三分炒去汗牡蠣熬五分上四味為散酒服一錢匕日三服千金半夏茯苓湯治妊娠惡阻心煩頭眩惡寒汗出少食半夏生薑各四錢乾地黃茯苓各二錢半橘皮旋覆花細辛人參芍藥芎藭桔梗甘草各一錢六分上十二味水煎服二劑便急使服茯苓丸令能食便強健也千金茯苓丸治妊娠惡阻心中煩悶不能健運茯苓人參桂心熬乾薑半夏橘皮各一兩白朮葛根煨甘草炙枳實各二兩上十味為末蜜和丸如梧子大飲服二十丸漸加至三十丸日三妊娠忌桂故熬乾薑地黃散治妊娠漏胎下血乾薑炮一兩乾地黃六兩切焙上二味為散酒服方寸匕日三服香桂散治子死腹中胞衣不下服片時如手推出肉桂三錢麝香三分為散酒煎和滓服加生川烏三錢為下私胎猛劑千金鯉魚湯治妊娠遍身浮腫胎間有水氣白朮茯苓當歸芍藥各三錢橘皮一錢生薑五片活鯉魚重斤許者一頭上六味先煮鯉魚至熟澄清取汁納藥煎汁分五服日三夜二虛加人參一錢五分千金竹瀝湯治妊娠子煩竹瀝一盞麥門冬去心防風黃芩各三錢茯苓四錢上五味以水四升合竹瀝煮取二升分三服不瘥更作加味竹葉湯治妊娠心煩不解名曰子煩白茯苓錢半麥門冬去心二錢半黃芩一錢人參一錢竹葉五片粳米一撮水煎空腹熱服肥人加半夏生薑原方無人參粳米千金石膏大青湯治妊娠傷寒頭疼壯熱肢節煩疼石膏八錢大青黃芩各三錢蔥白四莖前胡知母梔子仁各四錢上七味水煎去滓溫服此方既可散邪又能安胎允為妊娠傷寒溫熱時行神方非千金