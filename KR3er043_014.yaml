body:
  text: 卷十四噎膈門開關利膈丸寶監名人參利膈丸治腸胃壅滯噎膈不通大便燥結木香檳榔各七錢人參當歸酒洗藿香甘草炙枳實炒各一兩大黃酒蒸厚朴薑製各二兩滴水為丸梧子大每服三五十丸食後米飲下按此本小承氣加入參歸等味意在養正祛邪而實攻多於補惟熱壅膈塞用之庶為得宜然噎膈之燥結皆由五志抑鬱傷耗精氣而成非有熱邪留結可攻下而除也用方者審諸五噎丸千金治胸中久寒嘔逆妨食結氣不消乾薑蜀椒吳茱萸桂心細辛各一兩人參白朮各二兩橘皮茯苓各一兩半附子一枚炮上為細末煉白蜜丸梧子大酒服十五丸日三服漸加至三十丸五膈丸千金治飲食不得下手足冷上氣喘息麥門冬三兩去心甘草二兩蜀椒炒去汗遠志肉桂心細辛乾薑炮各一兩附子一枚炮人參二兩上為細末煉白蜜丸彈子大先食含一丸細細咽之喉中胸中當熱藥丸稍盡再含一丸日三夜二服七日愈五噎五膈二丸同用參附椒辛薑桂之屬一以肝氣上逆胃氣不下而嘔噎故用萸橘以疏肝降逆苓術以健胃通津一以腎氣不蒸肺胃枯槁而不納故用冬草以滋肺和胃遠志以補火生土又嘔噎而藥食可進者頻與小丸調之膈塞而飲食不納者時用大丸噙之其立法之詳若此可不辨而忽諸旋覆代赭石湯玉函治胃虛噫氣不除旋覆花二錢代赭石煅一錢人參二錢甘草炙二錢半夏三錢生薑半兩大棗四枚擘上七味水煎去滓分溫日三服六君子湯四君子湯下異功散四君子湯下四君子湯方祖指迷七氣湯局方七氣湯下局方七氣湯方祖四物湯方祖代抵當丸抵當湯下理中湯方祖越鞠丸郁門崔氏八味丸方祖二陳湯方祖反胃門藿香安胃散治脾胃虛弱飲食不進嘔吐不腐藿香橘紅各半兩丁香三錢人參一兩為散每服二錢生薑三片水煎溫食前和滓服四逆湯方祖小半夏湯二陳湯下大半夏湯二陳湯下理中湯方祖茯苓澤瀉湯五苓散下六君子湯四君子湯下異功散四君子湯下平胃散方祖四君子湯方祖桂苓丸五苓散下七味白朮散四君子湯下二陳湯方祖開關利膈丸噎膈門固本丸二冬膏下逍遙散虛損門歸脾湯保元湯下崔氏八味丸方祖黑錫丹金液丹下錢氏六味丸崔氏八味丸下代抵當丸抵當湯下嘔吐噦門金匱甘草粉蜜湯治吐涎心痛發作有時毒藥不止吐蛔者甘草半兩粉三錢即鉛粉蜜一兩二錢上三味以水三升煮甘草取二升去滓納粉蜜攪令和煎如薄粥溫服一升瘥即止吳茱萸湯玉函治胃氣虛寒乾嘔吐涎沫頭痛吳茱萸取開口者湯泡七次以去濁氣淨一錢人參半錢大棗四枚擘生薑半兩上四味水煎去滓溫分日三服千金通草橘皮湯治傷寒胃熱嘔逆通草三錢橘皮錢半粳米一合生蘆根汁半合上四味水煎熱服不瘥更作本方去通草橘皮加竹茹生薑汁千金名蘆根飲子治傷寒後嘔噦反胃乾嘔千金麥門冬理中湯治漏氣上焦熱腹滿不欲飲食食則先嘔後瀉身熱痞悶麥門冬去心白朮各五錢甘草炙茯苓各二錢人參橘皮蓴心葳蕤各三錢蘆根一握生竹茹一團雞子大生薑四錢陳米一合上十二味水煎溫分日三服澤瀉湯千金治上焦飲食下胃胃氣未定面背身中皆熱名曰漏氣澤瀉半夏柴胡生薑各三錢桂心甘草炙各一錢茯苓人參各二錢地骨皮五錢石膏八錢竹葉一把蓴心五錢上十二味水煎溫服日三人參湯千金治下焦熱氣逆不續嘔逆不禁二便不通名曰走哺人參黃芩知母葳蕤茯苓各三錢白朮梔子薑汁炒黑陳皮蘆根各四錢石膏煅八錢上十味水煎溫服日三準繩多竹菰走哺漏氣皆屬火淫於內火性急速故得食則既吐且利是名漏氣若得食即嘔而便溺不通者則為走哺總是胃虛火逆所致觀麥門冬理中湯人參湯二方可知不可誤認虛寒輕用溫補之劑也安蛔散治吐蛔色赤成團而活屬熱者烏梅肉三錢黃連蜀椒藿香檳榔各一錢胡粉白礬各半錢為散每服三四錢水煎如糊空腹服之瘥即止半夏瀉心湯方祖豬苓散五苓散下小柴胡湯方祖大黃甘草湯小承氣湯下文蛤湯麻黃湯下橘皮湯二陳湯下橘皮竹茹湯二陳湯下半夏乾薑湯二陳湯下二陳湯方祖理中湯方祖小半夏湯二陳湯下大半夏湯二陳湯下姜附湯四逆湯下即乾薑附子湯黑錫丹金液丹下逍遙散虛損門六君子湯四君子湯下橘皮半夏湯二陳湯下小青龍湯桂枝湯下小承氣湯方祖豬苓湯五苓散下橘皮乾薑湯七氣湯下黃芩湯桂枝湯下黃芩加半夏生薑湯桂枝湯下佐金丸方祖連理湯理中湯下補中益氣湯保元湯下附子理中湯理中湯下平胃散方祖五苓散方祖烏梅丸理中湯下四君子湯方祖異功散四君子湯下歸脾湯保元湯下霍亂門理中湯方祖四逆湯方祖胃苓湯平胃散下藿香正氣散平胃散下平胃散方祖六和湯暑門香薷飲暑門竹葉石膏湯白虎湯下五苓散方祖漿水散四逆湯下二陳湯方祖黃芩加半夏生薑湯桂枝湯下連理湯理中湯下天水散方祖即益元散導痰湯二陳湯下補中益氣湯保元湯下六君子湯四君子湯下關格門人參散治胃虛津枯關格吐逆人參五錢至一兩麝半分至一分冰腦三釐至半分為散水煎和滓分二三次溫服此云岐子治噎膈胃反關格不通九方之一用獨參湯峻補其胃稍加腦麝以發越其氣得補中寓瀉之至訣乃肥盛氣虛痰窒中脘及酒客濕熱郁痰固結之專劑以中有腦麝善能開結利竅散郁也若瘦人津枯不能出納而大便祕結者即以此方去腦麝加蘆根汁竹菰未嘗不為合轍也柏子仁湯治胃虛關格脈虛微無力人參錢半白朮茯苓陳皮各一錢略去白甘草炙三分柏子仁研三錢麝香一字生薑五片水煎去滓入麝調服此云岐第二方取用異功加柏仁麝香其法稍平而胃中津枯大便艱澀者最宜亦可加蘆根汁竹茹或竹瀝俱妙既濟丸治關格脈沉細手足厥冷熟附子一兩人參三兩麝香少許為衣為細末陳米飲糊丸梧子大每服十丸至三十丸米飲下此云岐第三方用參附加麝單刀直入以破中下二焦之結藥雖峻而用法最緩不可不詳此義而擅改作湯也二陳湯方祖四君子湯方祖補中益氣湯保元湯下黃連湯半夏瀉心湯下崔氏八味丸方祖厄逆門丁香煮散與局方不同治胃反嘔逆厄噦泄瀉丁香三七粒建蓮肉去心二七粒上二味另煎去滓生薑七片黃秫米半合水一碗半煮熟去姜啜粥此仿附子粳米湯之制彼用粳米此用糯米皆取其直達胃腑雖其勢稍平亦是突圍之將局方無蓮肉秫米而多川烏紅豆青皮陳皮甘草乾薑良薑益智胡椒等味為散煮湯入鹽一字調服異功散四君子湯下錢氏六味丸崔氏八味丸下理中湯方祖橘皮竹茹湯二陳湯下越鞠丸郁門附子粳米湯腹滿門四逆加人參湯四逆湯下羌活附子散四逆湯下連理湯理中湯下旋覆代赭石湯噎膈門調中益氣湯保元湯下蘇子降氣湯七氣湯下黑錫丹金液丹下胃脘癰門射干湯治人迎逆而盛嗽膿血營衛不流熱聚胃口成癰射干去毛梔子仁薑汁炒黑赤茯苓去皮升麻各一兩赤芍藥兩半白朮生半兩上為粗末每服五錢水二盞煎去滓入地黃汁一合再煎溫日再服日晡發熱每服加犀角丹皮各一錢甘草二分太乙膏治內外一切癰瘍黑參白芷歸身肉桂大黃赤芍生地黃各二兩上切為片麻油二斤浸春五夏三秋七冬十日煎熬去滓攄淨再熬徐下黃丹不住手攪滴水不散為度內癰可丸服之金匱排膿湯桔梗湯下大黃牡丹湯小承氣湯下涼膈散方祖金匱排膿散桔梗湯下犀角地黃湯傷寒門八珍湯四君子湯下諸見血門柏葉湯金匱治吐血不止柏葉炒三錢乾薑炮一錢艾一撮一本作阿膠三錢上三味水煎入馬通汁一杯合煮取一盞分溫再服如無馬通以童便代之血逆不止當責之於火旺故用柏葉治其旺氣即兼薑艾之辛溫散結使無留滯之患更加馬通導之下行非近世專用柏葉棕灰血餘之屬可比黃土湯金匱治陰絡受傷血從內溢先血後便及吐血衄血色瘀晦者並主産後下痢白朮附子炮甘草炙乾地黃阿膠黃芩各錢半灶心黃土雞子大碎上七味先用水煎灶心土澄清去滓納諸藥煎成分溫日再服有熱加柏葉一握千金無附子地黃有乾薑赤小豆當歸散金匱治小腸熱毒流於大腸先便後血及狐惑蓄血腸癰便膿等證赤小豆二升即赤豆之細者浸令芽出曬乾當歸三兩為散漿水服方寸匕日三服如無酸漿水以醋和沸湯代之瀉心湯方祖即伊尹三黃湯崔氏八味丸方祖白通湯四逆湯下歸脾湯保元湯下衄血門止衄散治久衄發熱黃耆六錢當歸赤茯苓白芍藥乾地黃阿膠各三錢為散半飢時麥門冬湯調服三錢日三服面熱足冷心懸如飢下焦陰火也加肉桂末一錢五分渴不能飲自覺膈滿者瘀血也加犀角丹皮氣虛少食二便如常者獨參湯服之兼感微風發熱頭痛者蔥白香豉湯服之虛煩不安不時哄熱者梔子豉湯服之素有偏風頭痛異常者黑豆荊芥灰淋酒服之驟衄不止者茅花湯服之久衄不時舉發者烏梅湯服之小烏沉湯局方治血氣不調心中刺痛香附童便浸杵三錢甘草炙一錢烏梅錢半上三味水煎即用藥汁磨沉香五分入鹽一字熱服上三味在婦科名抑氣散合四物即四烏湯乃局方烏沉湯之變法中去參姜而易香附其破氣之力雖峻而功力稍遜故以小字加之立方之意微矣黑神散局方治吐血衄血屢發不止甘草炙二兩乾薑炮肉桂各一兩熟地黃四兩當歸蒲黃篩淨炒黑各三兩白芍酒製二兩上為散每服四錢用細黑豆半合微炒香淋酒半盞和水半盞煎至半盞入童便半杯和服世本以黑豆炒熱去殼同上藥為散不知黑豆之功全在殼也氣虛加人參三兩黃耆六兩以固衛氣庶無營脫之患千金當歸湯治衄血吐血當歸一錢乾薑炮五分芍藥阿膠黃芩各錢半上五味水煎日再服小安腎丸治風寒襲於腎經下體沉重夜多小便耳鳴歧視牙齦動搖出血小腹寒疝作痛香附童便制二兩川烏頭炮淨一兩蘹香青鹽微焙三兩川椒去閉口者炒一兩熟地黃四兩川楝子酒蒸取肉三錢酒糊丸梧子大空心鹽湯臨臥溫酒各服三錢清胃散治胃中蘊熱中脘作痛痛後火氣發泄必作寒熱乃止及齒齦腫痛出血痛引頭腦生地黃四錢升麻錢半牡丹皮五錢當歸川連酒蒸各三錢為散分三服水煎去滓細細呷之半日再服犀角地黃湯專以散瘀為主故用犀芍此則開提胃熱故用升連其後加味清胃則兼二方之制但少芍藥耳加味清胃散治斑疹口舌生瘡齒齦腐爛清胃散加犀角連翹生甘草麻黃湯方祖越婢湯麻黃湯下四物湯方祖理中湯方祖三黃補血湯四物湯下犀角地黃湯傷寒門當歸補血湯保元湯下保元湯方祖補中益氣湯保元湯下小建中湯桂枝湯下五苓散方祖錢氏六味丸崔氏八味丸下蘇子降氣湯七氣湯下歸脾湯保元湯下黃耆六一湯保元湯下生脈散方祖消風散咳嗽門調胃承氣湯小承氣湯下柴胡清肝散小柴胡湯下桅子豉湯方祖獨參湯保元湯下黃耆建中湯桂枝湯下當歸六黃湯伊尹三黃湯下桃核承氣湯小承氣湯下既濟湯白虎湯下吐血門柴胡疏肝散治怒火傷肝脅痛血菀於上柴胡橘皮醋炒各二錢川芎童便浸切芍藥枳殼炒各錢半甘草炙五分香附醋炒錢半山梔薑汁炒黑一錢煨姜一片水煎食前溫服吐血加童子小便半盞犀角地黃湯傷寒門千金當歸湯衄血門十灰散虛損門花蕊石散虛損門參蘇飲傷寒門六味地黃丸崔氏八味丸下四君子湯方祖五苓散方祖桂苓甘露飲五苓散下新定紫菀茸湯咳嗽門六君子湯四君子湯下枳實理中湯理中湯下獨參湯保元湯下歸脾湯保元湯下烏骨雞丸虛損門巽順丸虛