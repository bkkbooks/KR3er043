body:
  text: 卷十二嬰兒門下夫人習尚不同趨舍各異痘疹一門向得涵高兄採輯諸家方論備列醫通其間方藥多有以意參易者惜乎筆削未竣完璧難求志兒心折其學因命續貂系以麻疹諸例庶不失先哲二者併名之義云錢氏痘疹論小兒在胎時食母五臟血穢生後其毒當出故痘疹所發皆五臟之液肝水泡其色青小肺膿泡色白而大心為斑其色赤小脾為疹其色赤黃瘡疹欲出五臟證具惟腎無候但耳涼尻冷是也瘡疹出時辨視輕重一發便出盡者必重也瘡夾疹者半輕半重也出稀者輕裡外微紅者輕外黑裡赤者微重也外白里黑者大重也疹端里黑點如針孔者勢甚也青乾紫陷昏睡汗出不止煩躁熱渴腹脹啼喘大小便不通者困極也凡瘡疹當令乳母慎口不可令飢及受風冷致歸腎變黑難治也有大熱當利小便有小熱宜解毒若黑紫干陷者百祥丸下之不黑者慎勿下更看時月輕重大抵痘疹屬陽出則春夏為順秋冬為逆又當辨春膿泡夏黑陷秋斑冬疹亦不順也黑者無問何時十難救一其候寒戰噤牙或身黃腫紫急宜百祥丸下之復惡寒不已身冷汗出耳尻反熱者死腎氣大旺脾虛不能制故也下後身熱氣溫欲飲水者可治脾旺勝腎寒去而溫熱也治之宜解毒不可妄下下則內虛多歸於腎若能食而痂頭焦起或未焦而喘實者四順清涼飲下之若身熱煩渴腹滿而喘大小便澀面赤悶亂大吐此當利小便不瘥者宣風散下之若五六日痂不焦是內發熱熱濕蒸於皮中故痂不得焦宜宣風散導之用生犀磨汁解之便熱退痂脫矣瘡疹欲出先缺呵頓悶肝也時發驚悸心也乍涼乍熱手足冷多睡脾也面腮頰赤咳嗽噴嚏肺也此四臟證俱見惟黑者屬腎也瘡疹乃五臟之毒內一臟受穢多者出則歸其臟矣丹溪參補陳氏痘疹論小兒瘡疹大抵與傷寒相似發熱煩躁臉赤唇紅身痛頭疼乍寒乍熱噴嚏呵缺嗽喘痰涎始發之時有因傷風傷寒而得有因時氣傳染而得有因傷食嘔吐而得有因跌撲驚恐瘀血而得或為竄眼驚搐如風狀或口舌咽喉肚腹疼痛或煩躁狂悶昏睡自汗或下利或潮熱證候多端卒未易辨須以耳冷尻冷足冷驗之蓋瘡疹屬陽腎臟無證耳與尻足俱屬腎故獨冷又不若視其耳後有紅脈赤縷為真候調護之法首尾俱不可汗下但溫涼之劑兼而濟之解毒和中安表而已虛者益之實者損之冷者溫之熱者平之是為權度如庖人籠蒸之法但欲其松耳蓋毒發於表如苟妄汗則營衛一虛開泄瘡爛由是風邪乘間變證者有之毒根於裡如苟妄下則內氣益虛毒不能出而返入焉由是土不勝水變黑歸腎身作振寒耳尻反熱腹脹黑陷十無一生汗下二說古人深戒以此視之瘡疹證狀雖與傷寒相似而治法實不同傷寒從表入里瘡疹從里出表故也如欲解肌葛根紫蘇可也其或氣實煩躁熱熾便祕則犀角地黃湯或紫草飲多服亦能利之故雖云大便不通少與大黃尤宜斟酌若小便赤少者分利小便則熱氣有所滲出凡熱不可驟遏但宜輕解若無熱又不能起發也瘡疹分人清濁就形氣上取勇怯凡已發未發但覺身熱證似傷寒疑似未明先與惺惺散參蘇飲熱甚則升麻湯人參敗毒散張涵高曰上方俱難應用當以輕劑透表為妥一見紅點便忌葛根恐發則表虛也凡痘瘡初欲出時身熱鼻尖冷呵缺咳嗽面赤便宜升麻湯加山楂大力子則瘡稀疏易愈凡痘瘡發熱時法以惡實子為末蜜調貼囟門免有患眼之疾凡初出之際須看胸前稠密急宜消毒飲加楂肉黃芩紫草減食禁加人參初出之時色白者便大補氣血參耆朮草桂芍芎歸若大便瀉加木香肉豆蔻初起時自汗不妨蓋濕熱熏蒸而然有初起煩躁譫語狂渴引飲若飲水則後來靨不齊急以涼藥解其標如益元散之類凡瘡已出可頻與化毒湯當去升麻出不快者加味四聖散或紫草飲紫草木通湯及快斑湯出太甚者人參敗毒散色赤犀角地黃湯疏則無毒密則毒盛宜多服涼藥解之庶無害眼之患爐灰色白靜者作寒看齊湧者燥者焮發者作熱治黑屬血熱涼血為主白屬氣虛補氣為先中黑陷而外白起得遲者則相兼而治凡痘瘡分表裡虛實吐瀉少食為裡虛不吐瀉能食為裡實裡實而補則結癰毒陷伏倒黶灰白者為表虛紅活綻起為表實表實而復補表則潰爛不結痂痘瘡分氣血虛實虛則黃耆養營活血之劑佐以風藥實則芍藥黃芩為君佐以白芷連翹之類調解之法活血調氣安表和中輕清消毒兼而治之溫如當歸黃耆涼如前胡葛根佐以川芎白芍枳殼桔梗羌活木通紫草之屬則可以調適矣黑陷二種因氣虛而毒不能盡出者酒炒黃耆紫草人參輩黑陷甚者用燒人矢蜜水調服癢塌者於形色脈上分虛實實則脈有力氣壯紅紫虛則脈無力色淡平塌虛癢以參耆實表之劑加涼血藥實癢如大便不通少與大黃寒涼之藥下其結糞氣怯輕者用淡蜜水調滑石末以羽潤瘡上瘡干宜退火只用輕劑荊芥防風牛蒡之類上引用升麻葛根下引用檳榔牛膝佐以貝母忍冬白芷栝蔞之類若咽喉痛者鼠黏子湯如聖飲選用喘滿氣壅者麻黃湯加黃芩白芍石膏煩渴瀉利者烏梅與緑豆黑豆作湯時溫服之瀉利嘔逆者理中湯加木香將欲成就卻色淡者宜助血氣芎歸芍藥紅花之類將欲成就卻色紫者宜涼血解毒生地芩連連翹之類甚者犀角大解痘毒淡白色將靨時如豆殼者蓋因初起時飲水多其靨不齊俗呼為倒靨但服實表之劑消息二便如大便祕通大便小便祕通小便小便赤澀大連翹湯甘露飲大便祕結內煩外熱者小柴胡加枳殼最當或少與四順清涼飲瘡疹用藥固有權度大小二便不可不通其大便自下黃黑則毒已成不必多與湯劑但稍與化毒湯不用亦可二便一或閉焉則腸胃壅遏脈絡凝滯毒無從泄眼閉聲啞不旋踵而告變矣陷入者加味四聖散更以胡荽酒薄敷其身厚敷其足噴其衣被並厚蓋之若猶未也獨聖散入木香煎湯若其瘡已黑乃可用錢氏宣風散加青皮錢氏云黑陷青紫者百祥丸下之不黑者慎勿下知其所下者瀉膀胱之邪也又云下後身熱氣溫欲飲水者可治寒戰者為逆知其脾強土可以制水也百祥丸太峻宜以宣風散代之瀉後溫脾當用人參茯苓白朮等分厚朴木香減半為妙蓋瘡發肌肉陽明為主脾土一溫胃氣隨暢何憚不消弭已泄之腎水乎此錢氏不刊之祕旨也其壞瘡者一曰內虛泄瀉二曰外傷風冷三曰變黑歸腎近時痘疹多宗陳文中木香散異功散殊不知彼時立方之時為嚴冬大寒鬱遏痘瘡不得紅綻故用辛熱之劑發之今人不分時令寒熱一概施治誤人冬矣夫渴者用溫藥癢塌者用補藥自陳氏發之迥出前輩然其立方多用燥熱或未適中恐其立方之際必有挾寒而虛者設也痘疹多是毒氣盛便先宜解毒然恐氣血周貫不定故隨後亦宜兼補以助成膿血也薛立齊痘疹大要痘疹大要與癰疽治法無異宜辨表裡虛實寒熱蓋表虛而用發表之劑輕則斑爛重則不能起發而死裡實而用托裡之劑輕則患痘毒重則喘急腹脹而死裡虛而用疏導之劑輕則難以灌膿結痂重則不能結靨落靨而死治法可不慎哉若臖赤發熱疼痛作渴能食便祕此形氣病氣俱實也雖在嚴冬必用四順清涼飲以救其陰若黑陷不食嘔吐泄瀉寒戰咬牙手足逆冷此脾土虛敗寒水所侮也雖在盛暑必用六君薑附或陳氏異功散以回其陽此內經舍時從證之法也若起發遲不紅活不作膿不結痂或發熱作渴飲食少思此脾胃虛弱也參耆四聖散補之若雖起而色白雖灌膿而不滿雖結痂而不落或癢塌作渴飲湯腹痛不食嘔吐泄瀉此脾胃虛寒也陳氏木香散以溫之其在四五日之間死者毒氣盛真氣虛而不能起發也六七日之間死者元氣虛而不能灌膿也旬日之外死者邪氣去脾胃敗而元氣內脫也治者但能決其死而不知其死必本於血氣虧損苟能逆推其因而預為調補豈斷無生理哉蓋起發灌膿結痂三者皆由脾胃榮養不可妄投克伐之劑以致其夭枉也至於大人患此治法迥異昔丹溪嘗治一老人初患痘昏憒不知亟用大補四十餘劑出痘而愈觀此可見魏桂岩逆順險三法論夫痘分逆順險法古無有也愚妄立之何則順者吉之象逆者凶之象險者悔吝之象治痘而執此三法以觀形色驗吉凶將無施而不當也蓋痘發熱三日放標三日起長二日灌漿三日收靨三日始於見形終於結痂凡十四五日之間而已是故吉不必治治則反凶凶不可治治之無益至如險者治之則可以轉危就安夫氣血盛斯毒易解氣血損則毒難愈惟氣血弱者雖毒不能頓解故必加補益扶持使生意固乎其中無不平矣余嘗苦心究討定立法式觀者幸毋以余為僭一二日初出如粟血點淡紅潤色於口鼻年壽之間先發兩三點順之兆也形如蠶種紫黑乾枯於天庭司空印堂方廣太陽等處先見者逆之兆也雖稠紅潤澤成個者亦險也圓暈成形乾紅少潤險之兆也險者毒雖犯上其氣未離候其氣血交會保元湯加桂二三日根窠圓混氣滿血附長髮飽滿光潔為順根窠無暈氣失血散枯死不長為逆根窠雖圓而頂不滿為險保元湯加芎桂四五日大圓光澤大小不一氣和血就為順綿密如蠶種黑陷乾紅紫泡者為逆根窠雖起色不光潔為險保元湯加桂糯米五六日氣會血附紅活鮮明為順氣雖旺而血不歸附灰陷紫陷或發水泡癢塌為逆氣弱血微光白不榮為險保元湯加木香芎歸六七日氣化漿行光潔飽滿為順漿毒不行神去色枯為逆氣血不足不能成漿為險急以保元湯加桂米七八日氣旺血附神全色潤為順毒不化漿色枯乾紫為逆發癰者可治外剝者必死氣血少緩毒雖化而漿不滿為險保元湯加桂米八九日漿足根化而無他證為順漿不足而成外剝者為逆漿不充滿血附線紅氣弱者為險保元湯加薑米十一二日血盡毒解氣調漿足而斂為順氣弱血凝枯朽剝盡為逆血盡漿足濕潤不斂內虛為險保元湯加苓術十三四日氣血歸本漿老結痂為順毒未解而脫形諸邪並作雖結痂為逆漿老結痂之際或有雜證相併不可峻用大寒大熱之劑保元湯隨證加減十四五日氣血收功痂落瘢明為順痂未易落寒戰咬牙譫語狂煩疔腫作者為逆痂落潮熱唇紅口渴不能食者為險四君子加黃連山楂陳皮不解大連翹湯加減論曰保元湯即東垣所制黃耆湯也不越人參黃耆甘草性味甘溫專補中氣而能補火故虛火非此不去人參固內黃耆固表甘草解毒藉以治痘令其內固外護扶陽助氣使氣生血附藉此載領有回生起死之功或云氣血與毒同途何專理氣而不理血殊不知氣旺自能載領其血也或曰桂者辛物痘出已熱而專用之何也蓋取其辛甘發散助參耆之力而成偉功也今更採入痘科諸方協助保元湯以收圖治是以升麻湯和解湯四順清涼飲等有開濟之功故用於三日七日保元之前解毒湯大連翹湯參蘇飲等有平治之能故用於十四日前後四君子湯生脈散桔梗湯參苓白朮散四苓散等故用於保元之間有贊相之能不拘日數白螺散治痘之不收金華散治痘後肥疳疥癬生肌散治痘疳蝕不斂以上諸方不過翊運保元以濟陰陽虧盈之變治痘用藥之要始出之前宜開和解之門既出之後當塞走泄之路痂落以後清涼漸進毒去已盡補益宜疏其他雖有奇方不合中和之道悉皆不録翁仲仁痘疹論夫痘由中以達外用藥因期而變通以常言之發熱三日而後見標出齊三日而後起脹蒸長三日而後灌膿漿滿三日而後收靨故發熱三日當托裡解毒使其易出亦有氣弱而不能出者當微補其氣氣和則出快切不可輕用黃耆恐腠理一密則痘難出也四五六日起發之時宜清熱解毒清熱則無血熱枯燥之患解毒則無壅滯黑陷之虞七八九日灌膿之時宜溫補氣血氣血流行而成漿自易也十日至十一二日收靨之時宜調和氣血補脾利水自然結靨矣此特語其常也蓋常者可必而變幻無期當隨候參詳見紅點之時如痘輕少不可過表在後恐成斑爛如干紅紫色急宜疏利不然在後必成黑陷四五日之內痘出足下為齊苟未盡出於解毒中宜兼發散若專於清涼則痘反凝滯不能起發也七八日之間毒未盡解於溫補之中宜兼解毒若偏於溫燥則毒反蘊蓄不能化漿也十一二日之間漿未滿足雖當大補氣血然須兼解餘毒不然恐有癰毒疱疤之患也夫痘瘡之發也身熱和緩達於外者必輕悶亂煩躁彰於外者必重其顏色貴潤澤而嫌昏暗貴光彩而嫌枯澀貴淡紅而嫌黑滯貴鮮潔而嫌嬌嫩貴圓淨而嫌瑣碎貴高聳而嫌平塌其皮膚貴堅實而嫌虛薄貴勻淨而嫌冗雜其根窠貴收緊而嫌散潤痘根陰陽見點最忌浮腫出要參差血宜歸附耳後頭項心胸少於他處為吉眉稜兩顴額前先後潤而不滯為佳夫色之紅者毒始出也白者毒未解也黃者毒將解也干黃者毒盡解也灰白者血衰而氣滯也焦褐者氣滯而血枯也黑者毒滯而血乾也如紅變白白變黃者吉紅變紫紫變黑者死之兆也痘疹握機論張安世曰醫學貴乎專精崇古分科習業各擅所長庶幾奪權造化痘疹一門為嬰孺始基第一關隘豫嘗歷考錢陳朱魏諸家之論各執一端緣其立言之義有就證而論者有究本而論者有因時而論者觀費氏大運論云嘗稽痘證有獨取於辛熱有得意於寒涼有扼要於保元是皆治痘名家何不見有逐年先後之別要知天運使然非三者之偏僻也而費氏明指文中仲陽桂岩三子而言獨不及濟川者以濟川實得一本萬殊之妙兼該三子之長其論可法後學可宗有言於神宗丁巳至癸亥尚多氣虛由甲子而血熱者漸多矣其毒亦漸深矣向補宜從重者變而宜輕瀉宜從輕者變而宜重逮及丁卯所宜重瀉者雖極清極解而亦弗靈矣勢必蕩滌而元梟之勢始殺然猶放標起脹時之權宜也至壬申後蕩滌之法向施於成漿前者竟有首尾而難免者矣其黃氏痘疹或問亦云豫自萬曆辛巳始行其道所歷之痘多屬虛寒至癸卯歲忽然氣候大變自後當溫補者十無一二虛中挾火挾痰者十常八九痘色亦常變異良由運氣使然握司命之機者可不達權通變而固守成則歟於是會參諸家宗旨綜其大端不出血熱毒盛毒盛氣虛氣虛不振之三綱順險逆之三要順則無庸治逆則治何益惟險者在急治而尚變通其機不暇少緩不可泥於首尾而拘於繩墨也至於病有寒熱證有真假毒有淺深藥有輕重治有緩急時有寒暑人有貴賤稟有強弱安可概論若夫膏粱之治與貧賤之治迥乎不侔夫膏粱之家素嗜肥甘肌體柔脆譬之陰地草木未經風日奚堪勝任況一有微疴即日曆數醫雖具法眼亦難獨出己見稍用一有關之品即衆口譊譊功未見而咎有歸此亦世道使然無足憾也而貧賤之家日甘粗糲風霜切體縱有疾苦力能勝受即或從事醫藥則專任於一雖證劇可危尚堪重劑推扳功成反掌第貧家之痘一涉危疑醫者往往忽略而委之不救棄以待斃因得土氣滋化而復蘇者亦恆有之達權之士務在見機於始萌之際變通於未發之先如毒因表邪而發者疏解之由里邪而發者宣暢之熱劇者涼潤之毒閟者開泄之挾驚者清理之挾痰者驅導之虛者益之實者損之寒者溫之熱者清之此數者乃治痘之大綱必須明燭其機而毅與之慎毋疑似而混用升發標證一退其痘自起蓋治病必求其本審系血熱而用涼解即是升發審系氣虛而用補托即是升發以故新甫有見點忌升麻之說丹溪復有一見紅點便忌葛根之誡夫今之以痘疹名世者或稱家祕或尚師傳下手不辨氣血之虛實熱毒之淺深稟賦之強弱兼證之有無概以通套升發為務直待點齊而驗以凶吉不知延過三日則毒已歸經加之兼證交攻種種變端莫不由此此皆識見未真習俗之謬耳費子所謂識見不真先迷嚮往之路膽力不雄同歸廢弛之地理障未捐難神變化之用是必膽與誠俱心隨理運者而後可以語此嘗有痘雖初放功不在於升發時雖起脹寧有事乎清涼寓補於瀉何嫌灌漿而解利用熱為收何病結痂而疏發至若臨證之機必細察其形熟驗其色復於神情而繹之兼內證以參之庶乎似虛寒而反實熱似有餘而反不足似平易而實危殆似必斃而實可生燎然於心目間其有素稟氣虛而證見血熱者當於發熱之初乘毒未歸經元氣猶堪宜先理其標峻投涼血以化熱毒後固其本任用溫養以助成漿設先不為清理至四五日間欲行涼解則痘心難起灌欲行補托又礙熱毒未清至此攻補兩難而致夭枉者比比且有悶痘一證方書但言白悶紫悶緊悶從無辨救之法因思悶者痘緣毒邪壅蔽悶而不發其證最急是為逆中之逆雖有神丹莫可救也然有似悶而非真悶即屬悶而緩者是為險中之逆此閉證也世多例之悶痘棄而不救可概委之於數乎若能明究其故而開其閉庶可轉危就安猶之雞鳴度關此關一過前途別有料理但閉證之由種種有因火毒熾盛而閉者有因痰垢凝塞而閉者有因蟲䘌內攻而閉者有因挾食挾血而閉者有因真元虧極而閉者略舉一二言之如一發熱即報點如丹身熱如烙漸乾焦紫黑煩躁悶亂唇焦口臭或唇口腫滿是屬火也雖冬月亦須大劑白虎化斑湯石膏非數兩不應或發熱時便頭項不舉痰喘氣急或目閉神昏眩暈顛仆悶亂搐搦是屬痰也亟當猛進金匱大黃甘草湯使上吐下泄以救之或一發熱即煩悶嘔吐舌下當流清水或時沉默喜睡或時躁擾不寧或腹痛狐疑或頻頻叫喊驗其舌下筋青或下唇有黑白細點是屬蟲也宜先與椒梅丸誘入蟲口即以紫草承氣湯下之或初發時便壯熱神昏腹痛譫語舌刺如芒或氣粗便閟狂叫悶亂是屬食也急投大承氣湯及三承氣選用或因跌撲內傷瘀血阻滯譫語神昏喘脹衄血者桃核承氣湯或有身無大熱見點細白如喑氣怯無力目閉無神面色及唇反鮮澤嬌豔光彩倍常是氣虛無陽肺胃之精華渙散於外也然此亦不多見惟豢養柔脆者間或有之若非峻用人參二三兩生耆兩許佐以升麻五味續續灌下烏能回元氣於無何有之鄉而振起之耶其證之屬實而閉者竭力圖之可全十之半屬虛而閉者則與秦越人起虢太子不異可知造化樞機在掌握間豈可拘於尋常例治哉辨證六則初發悠悠身熱最宜氣息和平飲食甘而便溺如常手足溫而面容不改兼之睡臥安寧便見證來之順四肢清而面色㿠白飲食少而精神倦怠此證當作虛看痘出決然不振再見便溏哯乳急當補氣為宜若還熱甚氣粗定須解毒何疑譫語狂言煩躁均為內熱喘滿氣粗便祕須知毒壅毒盛則頭面赤熱氣虛則手足寒清嘔吐為火氣上炎溏瀉為毒氣下迫腹脹口張喘急啼聲不絶嗄頻須防失血面青札眼搖頭狂亂忽生吐乳發驚先兆是以熱盛者只宜清涼發散不可峻用苦寒發散則毒外出而熱自解苦寒則毒反伏而出愈難故發散之劑輕則升葛以疏其熱而煩躁壯實者非此何以定其標重則麻黃以開其壅而喘急脹滿者非此何以救其危未萌先瀉有熱證莫作虛看已泄而渴無熱證便從虛治止熱泄以清涼重加發散治虛溏以溫補仍用開提內虛誤用寒涼助其作瀉實熱妄投補劑轉增煩劇安靜能食勿謂便實可下泄瀉煩渴休言熱證宜涼氣弱而少食者不任其毒神強而能食者不失其常嘗謂痘初見點便觀顏色榮枯一來便覺粗肥稀疏可必始發若還瑣屑繁密堪知帶熱敷瘡陸續出來猶可救一齊湧出焮經皮薄總難生細細白頭如痱㾦乾枯必作內攻形稠稠紅點似丹朱不久定成焦萎勢粗肥饅頂點子不紅終白陷頭尖皮薄茱萸紋起定空瘡白嫩則皮薄嬌紅黃瘦則痘成褐色若人蒼黑皮粗瘡色必然慘暗嬰兒肌肉不同未可一例而斷只宜綻凸有神不喜嬌紅平塌色澤神安見點如珠如粟毛焦皮燥敷瘡或紫或焦帶熱出來最恐密似針頭縱然續出尤忌形如蠶種如麩如㾦如疹如疥根窠不立腳地俱無犯此數端總皆不救夾斑如同蚊咬最為惡烈乃或螺螄云電差為可治未熱先敷數點俗名報痘若還熱久不敷便作疔看先發塊而後發瘡塊為風毒所發先發瘡而後發塊塊名鬼腫難醫避痘避於隱僻眼胞唇內多凶悶痘悶於要處喉舌胸背皆危順不憎多逆嫌一點冷疔先見諸瘡何敢彰形賊痘若生諸痘焉能灌汁辨認若真急須挑破里證未平痘雖出而毒猶在裡解毒為務便調人靜身雖熱而毒已透表安表為先設使內外證平此際不須過治再看精神勇怯審詳表裡如何三日四日痘出當齊點至足心勢方安定猶是陸續不齊尚隱皮膚之內若非風寒壅遏定屬氣虛不振是以四日以前痘毒方出身表宜涼四日以後毒出已定身表宜溫涼則氣血和平痘色必然潤澤溫則腠理開通其勢易以成漿故至此而身不微熱色不鮮澤雖不至於冰伏痘瘡斷乎不長五六日來血包已成候當肥大而粗頂宜發光而白故根紅而頂白者已具行漿之勢若還赤色過頭雖見嬌紅可愛綿延六日依然到頭空殼虛花皮薄而光亮如燈內含似水頂尖而根腳不紅行漿不實熱毒盛而未解則為紫為黑壅而不起則為陷為塌滯而不榮則為乾枯為青灰怯而不振則為不快為停漿或有肉先腫而痘反不起者漿則滯而不行面已浮而痘反退伏者毒則壅而不通故身不熱而痘不起已成冰硬之形赤色若還不變溫之可興氣血弱而瘡不振遂成不快之狀紅潤依然如舊補之可生紫色乾枯切忌溫中帶補只宜活血松肌毒勢壅滯烈藥雖然可發透肌尤是良方溏泄惟於溫補瀉甚佐以升提六日七日之期氣血敷化之際順候漿行半足虛瘡才發微光毒重而壅遏者頂滯乾紅氣盛而焮發者飽滿光澤頭面行漿而四肢未起切莫慌張腿臁發泡而臉額焦枯且休歡喜既以懼其發嗆且又慮其喘急飲食不多恐致臟虛而內陷水漿頻進須防泄瀉而變危熱盛煩渴到此休為實論再加溏泄此時只作虛看黑紫乾枯急須攻發其熱氣虛塌陷便當溫補其虛發嗆愁其失聲喘急恐其腹脹瘡或白而少神根雖紅而難治尖不起而離根腳雖赤而無濟色淡白而塌闊此內必無漿汁皮薄澤而嬌紅有漿亦是清稀犯此四端總屬氣虛八九日間必然發癢若還壯熱燎人不癢定行乾燥紫色乾枯不須著眼中凝血跡或可幸成漿既行而半足時則未當收斂忽爾一齊紫黑倒黶莫認結痂若還攻發得宜傍生血點再行漿如見氣急腹脹不久失音死在邇痘出八九日來已結乾紅痂疕音被如或少生不順至此方得灌漿若遇身重發熱停漿不易結痂此則陽亢陰虛應以清涼收斂漿足氣促恐因痰湧而然忽爾發驚毋乃二便祕結再見氣虛塌陷必然倒黶黑焦一則溫補可興一則攻發可活泄瀉安寧大虛少毒脾寒則下白膿臟毒必然便血唑喉聲啞漿行飽滿亦無妨塌癢咬牙便實聲清猶可活靨來痂硬變證終無疕脫如麩須愁餘毒蒸發或致太過則潰爛難收身熱若見燎人則燎漿發泡空遺痘殼不成痂只為漿清熱重腹脹喘呼而塌陷皆因毒入內攻出來不灌黃漿痂疕猶如血赤若曾解毒於先此證斷之極美胃氣絶則唇口腫硬肝熱盛則目睛吊白喘急發於瀉後總屬氣虛便瀉繼以煩渴諒非實熱泄瀉而煩渴不止理必升提好飲而發渴愈甚勢難救援氣虛寒戰痘瘡無恙即溫經漿足難收便實熱蒸須解利進清涼以助結痂叱補法而防過益痘成痂疕八九功成餘毒變遷終非吉兆是故眼合腹脹猶蹈危機虛浮不退尚罹凶咎痂雖成而反致失聲猶為黑黶腫未退而眼已先開恐毒內攻陽氣極而狂叫喘呼腸胃傷而便溺膿血熱毒逗遛不化結痂而壯熱憎寒經絡餘毒未盡日晡則往來寒熱發在午前為實證煩渴腮紅申後方熱是陰虛便調形瘦他如攝唇弄舌心經蓄熱無疑擷肚抬胸肺胃毒沖有準身熱便祕恐成暴急驚風潮熱便溏防變慢脾風搐驗失明於眼合羞明辨口疳於唇焦齦黑實熱結於大腸必然便祕虛寒客於胃府乃成泄瀉喘渴須分虛實泄瀉當辨寒熱欲觀痂落之餘再審瘢痕之色桃紅光澤營衛俱安灰紫乾焦尚留風熱粉白為氣血之虛皮黏為脾胃之疾遍體赤斑乃是失於解利渾身青紫恐為風寒所客餘毒未消不特為疽為癤見風太早須防發瘡發痍匪人切勿胡傳此本先賢真訣表裡虛實論凡痘灰白不紅綻不起發出不快昏暗頂陷皆表寒而虛二便清身涼手足口氣俱冷不渴少食唇白涕清飲食不化皆裡虛而寒此表裡虛寒之證急宜溫脾胃補氣血當用參耆歸朮木香肉桂等藥以助灌膿收靨夫表虛者以補氣為主補血次之裡虛者於補血之中須兼補氣使胃氣條暢脾氣壯實在後必無陷伏之憂苟能補氣則血亦周流送毒出盡不致凝滯在後必無癢塌之患凡紅紫干滯黑陷焦枯者皆表熱而實大便祕結小便赤澀身熱鼻乾唇燥煩渴者皆裡熱而實此表裡實熱之證急宜涼血解毒當用紫草紅花連翹鼠黏木通蟬蛻荊芥甚則芩連之類如表熱者則宜清涼解表而分利次之裡熱者重於解毒而兼清涼如在二三日之前熱毒盛者以硝黃微下之蓋涼血不至於乾紫解毒則免於黑陷如表虛不補則成外剝裡虛不補則成內攻表實過補則不結痂裡實過補則發癰毒所以痘證變遷不常若色一轉又當變通不可拘於一定也氣血虛實論夫氣有生血之功血無益氣之理故氣不可虧虧則陽位不及而痘之圓暈之形不成血不可盈盈則陰乘陽位而痘之倒黶之禍立至是以治虛證必當補氣為先蓋氣有神而無形補之則易充血有形而無神補養難收速效況氣陽而血陰陰從陽血從氣理也故補氣不補血使氣盛而充血亦隨之而盛矣何謂氣血虛實且如氣過熱則泡血過熱則斑氣不及則頂陷不起血不及則漿毒不附凡痘色淡白頂不堅實不礙手不起脹皆屬氣虛宜保元湯倍黃耆加肉桂丁香人乳與酒釀同服根窠不紅不緊束或紅而散闊以手摸過即轉白毫毛豎起枯槁不活者皆血虛也保元湯加芎歸紅花及山楂以行參耆之滯木香以散滯氣而血自活也凡用黃耆當在痘出盡之後凡用熱藥當看毒盡解之時更察氣血之虛實偏勝而治之則藥無不效矣凡補血首尾用地黃防滯血必用薑製用芍藥恐酸寒伐胃必用酒炒以抑其潤下之性借酒力而行之達表也虛證防變論初發身熱悠悠乍熱乍涼肌松神倦面青㿠白飲食減少手足時冷時熱嘔吐便溏痘點方見隱隱不振淡紅皮薄三四日陸續不齊不易長髮五六日不易成漿少食氣餒傷食易泄七八日塌陷灰白不起自汗微渴或腹脹喘渴泄瀉塌癢悶亂咬牙寒戰頭溫足冷勢所必致皆緣氣虛之故故治虛痘初發不宜輕投透表之劑即參蘇飲人參敗毒散等亦不宜用況升麻湯等純行升發之藥乎至於黃連紫草皆為切禁惟宜保元湯為主若氣粗皮燥無潤色者亦當忌之只以四君子少加桔梗川芎補益之中略佐升提之法俟點子出齊重用參耆峻補其氣助其成漿至八九日間無他凶證十全大補湯倍桂塌陷灰白腹脹泄瀉木香散塌癢悶亂腹脹渴瀉喘嗽頭溫足冷寒戰咬牙者急進異功散遲則不救虛證變實論氣虛痘疹調理得宜使元氣充實腠理堅固脾胃強健二便調適仍可轉禍為祥若補益太過漿足之後重用參耆多有腹脹喘急之患用枳殼湯誤用五苓木香散多有大便祕結之患用寬中散便實而渴用麥門冬湯過用丁桂辛熱之劑則有咽喉腫痛煩躁閉渴之患用潤燥湯蓋喘急腹脹大便祕堅煩渴咽痛皆類實證然而氣虛變實非真實也是病淺而用藥過深之失也只宜斟酌不宜疏通若誤行疏利則方生之氣復虛而脫證將至矣虛證似實論氣虛痘疹或為飲食生冷調理失宜致傷脾胃遂成泄瀉津液下陷虛火上盛必發而為渴元氣下陷虛陽上壅下氣不續必發而為喘夫渴與喘實證也起於泄瀉之後斯為津液暴亡而渴陰氣暴逆而喘故治渴則宜錢氏白朮散渴瀉不止則用錢氏異功散治喘則宜獨參湯不應亦用錢氏異功散大便實者少與生脈散調之喘渴而泄陳氏木香散異功散選用若至悶亂腹脹毒氣內攻眼合自語者此名失志庸醫不察謬認為實而與耗氣之劑速其斃也安有實熱而渴氣擁而喘生於泄瀉之後哉實證似虛論身發壯熱毛直皮燥睡臥不寧腮紅睛赤煩渴腹脹便祕喘急皆實熱證而復見嘔吐者此熱毒在內不得伸越或為寒冷所搏乳食不節冷熱相拒則上逆而為嘔吐病機所謂諸逆衝上皆屬於火者是也治當升提發散兼辛以散之如升麻湯加生薑橘皮之類吐逆勢甚者更加豬苓澤瀉引之下行可也又有泄瀉兼見似乎虛證然因熱毒郁盛熏炙脾胃不得外達則毒從下陷尋竅而出亦當升提發散熱毒外解內泄自止有食則兼消導如枳殼山楂之類又復有不思飲食似乎內虛不知鬱熱在內不得伸越二便祕結腠理阻塞熱毒壅遏腹脹滿急不思飲食必然之勢亦當升提發散引毒達表有熱則兼清熱如山梔黃連之類則熱氣有所升越而臟腑和平飲食自進矣若誤用丁桂半夏等熱藥於嘔吐泄瀉之證用參耆白朮等補藥於腹脹不思飲食之證立能殺人他如龍骨豆蔻曲糵縮砂皆熱瀉之戈戟也熱證變虛論血熱痘疹只宜清涼發散不宜峻用苦寒過投芩連之屬必致內傷脾胃外閉肌肉脾胃傷則飲食減而泄瀉重則洞泄無度遂致虛寒肌肉閉則熱蒸之氣不行腠理澀滯則痘不起發不行漿遂成伏陷此熱證變虛之驗虛證既形便從虛治不可膠執而畏參耆丁桂也六七日後見之則木香異功皆可應用但中病即止不可過劑以招竭澤之禍也毒盛變虛論毒盛壅遏固宜升提發散而佐以清涼使熱毒得平而止若發散太過必致肌表空虛元氣耗散內灌清漿或虛腫空殼或癢塌外剝或潰爛不收百變皆至而內氣亦不能自守略傷飲食則成泄瀉泄瀉不止遂變虛寒而氣脫煩渴悶亂寒戰咬牙無所不至矣夫始出之時雖為血熱壅遏至三四日後身反不熱痘瘡不長焉得不進溫和之劑如觀桂川芎乾薑之類使內氣一暖則外氣自和泄瀉之後其內必虛雖有腹脹煩渴喘急焉得復為實熱不過內虛伏陷毒氣內攻而然故實熱之證七八九日曾經泄瀉皆從虛治有木香異功證便進木香異功如無冰硬之證非泄瀉之後切勿誤投溫劑蓋塌陷倒黶乾枯而無冰硬泄瀉之患者多因熱毒內攻而然又當用百祥丸豬尾膏等方治之誤投溫熱盧扁不能復圖也氣虛血熱毒盛三法治例凡氣虛之證初發身熱手足厥冷乍涼乍熱精神倦怠肌肉㿠白飲食減少睡臥安寧清便自調此皆虛證無疑未見點前用保元湯加紫蘇防風白芷以發散之見點後以保元湯加川芎桔梗以開提之見點四五日後仍用保元湯隨證加減處治七八日漿足之後宜四君子加歸芍山藥以調養之大便實者加熟地以兼補其陰若證見虛寒不妨加肉桂倍參耆以溫補之如見塌陷黑黶多用陳氏木香異功收功凡血熱之證初發壯熱腮紅臉赤毛焦色枯煩躁渴欲飲水日夜啼哭睡臥不寧好睡冷處小便赤澀此皆熱證無疑未出之前升麻湯加生地芎歸紅花鼠黏連翹以涼血解毒見點三四日後熱證漸平將欲灌漿紫草木通湯加生地川芎桔梗紅花山楂之類八九日漿足之後亦宜四君子加養血藥調理之若七八日根腳紅暈不化或紫黑乾枯及青灰乾黑陷者皆由血熱之故急宜清熱涼血為主切勿誤用補氣之藥則營血愈虛愈熱矣惟泄瀉之後變黑陷乾紅者則從小劑木香異功治之凡熱毒壅遏之證初發身熱面赤氣粗喘滿腹脹煩躁譫語狂言睡中驚妄二便祕澀面浮眼脹多啼多怒此皆熱甚無疑未見標時先須升麻湯一服隨加羌防荊芥川芎連翹紫草白芷桔梗鼠黏子以清熱透表至見點三日之內諸證向寧勢將行漿紫草木通湯加川芎桔梗山楂蟬蛻鼠黏子之類漿足之後亦宜四君子加養血藥調理之若六七日外根窠連肉通紅或紫黑乾枯及青灰乾白陷者此皆氣虛血燥毒邪壅盛之故急宜涼血解毒兼調中氣為主切不可輕用溫補惟曾泄瀉內氣暴虛而陷則當小劑木香異功救之汗下論錢氏論痘瘡發散利下皆不可妄又曰非微汗則表不解非微下則里不解言表熱方熾痘點未見之先或外感寒邪約束腠理痘因出不快此當微汗之令陰陽和營衛通俾痘易出而毒易解若原無閉塞不快而妄汗之則成表虛癢塌斑爛之患也如痘出時煩熱譫語喘脹便祕此毒蓄於腸胃之間當微下之但臟腑疏通陳莝滌去氣血和平而毒易升發若原無裡實壅熱而妄下之則元氣下陷致變灰白虛脫之證矣張涵高曰余治血熱毒壅便結之證每用涼膈散下之百不失一所感輕重論或問時氣之盛衰而痘出之輕重者何也蓋痘之出必假天行時氣而發天時疫氣有盛而有衰人之生稟有強而有弱疫氣盛行雖輕亦能變重稟弱者當之必致於危厲氣已衰雖重亦能變輕稟強者當之益見其輕故貧賤家兒多歷辛苦風寒更無厚味傷脾即有重證亦能抵當富貴家兒暖衣厚味少見風日脾胃脆弱不經勞苦凡遇小疾亦為大病譬之陰地草木豈能御冰霜烈日乎臨證之際可不辨人之強弱貴賤參時氣之盛衰而為施治哉死而復蘇論痘有死而復生者非氣血相離也乃毒火彌熾氣血壅遏不行故肢體俱冷而氣絶本不終絶雖絶必通毒火有時而少解則正氣漸復而蘇嘗見痘兒氣絶轉臥於地良久復生者得土氣以化毒熱而正氣復矣然雖氣絶而死其心胸必溫暖若胸冷氣絶復生者未之有也原委嘗讀炎黃扁鵲仲景書從無痘瘡一證相傳謂是伏波定交趾歸中原始有此患則知皆是炎方火毒蒸發先天淫火毒邪而成蓋得於有生之先發於既生之後或感風寒驚食或當歲氣並臨則蘊發為痘今之所見者不問何臟所主但發熱之後一二日間紅點成水泡水泡成膿泡膿泡後結痂脫靨總謂之痘此則胎毒也其或隱現於肌肉不膿不痂謂之癮疹一見紅色而後沒復現者謂之膚疹北人謂之瘙疹遍身紅斑如錦紋雲霞者謂之麻疹吳人謂痧越人謂瘄其或初發紅點有似痘瘡不三日而灌漿紅潤見漿即焦者謂之水痘南人謂赤痘以上諸證乃脾肺蓄熱或外感風熱或傷寒發斑之候不可盡歸胎毒方書所謂痘毒之發傳於心為斑傳於肝為水痘傳於肺為疹傳於脾為痘其沿街里巷一概出痘者此則歲氣並臨疫癘傳染豈可概為胎毒哉發熱痘瘡將出必先發熱然其熱有風痰食驚變蒸之異及時氣傳染俱能出痘疑似之間即當審其所觸隨證清理以觀其勢更察其耳冷尻冷足冷中指梢冷耳後紅絲赤縷現呵缺噴嚏六脈洪數身微灑淅顫動白睛微紅目光如水顴間有花紋見者乃為真候如溫溫微熱乍涼乍熱咳嗽嚏嘔缺呵頓悶面微紅者此必痘稀毒少身涼後出尤輕也其或驟發壯熱如火熏炙頭面俱赤悶亂昏眩狂躁不定一熱便見紅點此必稠密毒盛急投柴胡飲甚則涼膈散下奪之發熱時肢體骨節俱痛者六淫之邪也宜表散兼透毒之劑發熱時遍身作癢此表虛客冒風寒毒不能出故癢桂枝湯加黃耆防風白芷蟬蛻發熱時惡寒身振振動搖此氣血弱不能逼邪快出邪正交爭故振升麻湯加人參穿山甲桂枝防風發熱時腹痛攻攪躁渴此毒勢壅遏熱氣內蒸急以蜜調元明粉四五錢不下再服甚則涼膈散大便一利其痛即減瘡亦隨發勿泥首尾不可下也若虛寒脈弱而腹痛者小建中加升麻若腰脅痛者此毒在肝腎最為惡候急以石膏六七錢人參一錢茶一撮煎好入元明粉三五錢加生白蜜熱服或可十全一二若唇口上下紫黑燥裂疼痛者此毒攻脾臟難治急投犀角消毒飲加石膏黑參以救之發熱時或吐或瀉此毒邪奔越精神不減者為吉兆毒氣上下分泄也若見點後猶吐瀉不止四苓散加枳橘山楂虛者錢氏異功散加藿香木通發熱時如驚者為熱乘心包亦是吉兆導赤散加蟬蛻紫草形實便祕者瀉青丸微下之如見點後驚搐不止者危發熱時咬牙竄視此心經熱甚也導赤散加黃連赤芍若咬牙悶瞀為肝經風熱羌活湯加青皮柴胡發熱時聲音遂變者宜清肺氣消毒飲加連翹桔梗面赤加紫草發熱及見點時兩目紅腫者風熱上攻也導赤散加荊防蟬蛻若熱至五六日或腹脹喘急便祕狂煩痘不見點而熱甚於背者風寒留滯於經羌活湯不應加麻黃熱甚於腹者實熱亢盛於裡大承氣湯其或譫語循衣昏睡不省者皆毒氣內攻導赤散加連翹犀角使小便流利神爽發出為吉若大便四五日不通而譫語者紫草承氣湯下之昏迷纍次譫語不休者不治發熱二三日痘隱隱不透壯熱譫語喘脹便祕者夾食感寒而發先以升麻湯加麻黃汗之次以大柴胡利之發熱時小便黃赤短澀者熱毒不透滲入膀胱也導赤散加荊芥連翹鼠黏子自汗者邪從汗散也不須更與升發之劑衄血者邪從衄解也衄久不止犀角地黃湯去丹皮加木通荊芥穗發熱時遍身皆熱手足獨冷者此脾胃虛弱急宜補中益氣湯三四服仍厥冷者難治發熱時以火照之若皮肉裡有鮮紅成片者凶也若遍身如蚊跡蚤斑者不治發熱時壯熱譫語喘脹搐搦尋視腰背有一二點如蚊跡者悶痘也不治發熱時腰痛如折不能坐立者折腰痘也四五日當口鼻出血而死痘出三四日身猶有熱者尚欲添痘也出盡則熱自止若五六日後痘出盡復熱者必有餘毒未盡當輕劑以解其毒不可驟遏至八九日復發熱者名曰煎漿將欲收靨結痂故耳凡痘疹發熱不可誤認外感過投解散之劑則表之陽虛不惟不能長髮且有癢塌之患亦不可誤認內傷過投消導則里之陰虧不惟不能灌漿倒陷之禍立至矣見點痘家以看法為要初見點時用紙捻蘸清油點照遍觀其色熟視其形須以火在內向外平照則隱於肌肉間者悉皆顯現以手揩摩面頰如紅色隨手轉白白隨轉紅謂之血活生意在矣如揩之不白舉之不紅是為血枯縱疏難治又看目睛光彩瞭然口唇尖上紅活如常無燥白紫滯之色乃為吉兆又須知燈火之下紅紙窗之下白不可不審先哲看痘有四曰根曰窠曰腳曰地根欲其活窠欲其起腳欲其固地欲其寬四者俱順雖密無慮近世看法但言盤頂蓋盤即根也頂即窠也所謂腳地則本乎根窠之圓混痘點之稀密也凡見頂起盤深紅暈透在肉裡方是正痘若無盤頂紅色浮在皮膚即是水痘非正痘也否則必是氣虛毒盛之故始雖長髮後必漿清腳闊十朝十一朝必變癢塌而死若根腳闊散不成紅暈後必難於收斂十二三朝必有變也蓋痘疹須辨血氣之盛衰形色之輕重大抵形屬氣色屬血故形色為氣血之根本最為切要其起先專看根腳緊束緊束則熱聚易長易灌若灌漿後專要根腳溶化溶化則毒解易收易脫若發熱三四日身涼而出初見淡紅三四日方齊微覺明亮磊落如珠大小不等顆顆如黍米摸之礙手四五日間明亮光澤根窠紅活二三次出頭面胸腹腰背項下稀少大小便如常者為吉若一熱便出瘡多稠密者當詳視其根窠分與不分顏色紅潤不紅潤若其中有先起虛大色黃如金者名賊痘大而黑者為痘疔若報點青色箸頭大一塊不起凸者此冷疔也若根窠分色紅潤或一盤三四頂中有黑疔者當以銀針挑破口含清水吸去穢血用紫草膏油胭脂加血餘灰真珠末填入瘡內或珍珠散並與三仙散或犀角消毒飲加紫花地丁以解其毒挑後痛不止者隔蒜灸之若無根窠色紫黑疔多小弱者不治若頭面一片光潤如胭脂塗抹隱隱於皮膚中者是血澀不流氣凝不運為痰阻滯不得通貫也先以升均湯大吐其痰次以犀角地黃湯去丹皮加木通紫草蟬蛻連翹但兩顴瑣碎成攢紅暈不分顆粒者急投羚羊解毒湯以分之若雖分根窠身熱枯紫者後必發躁導赤散以利小便更用涼血解毒藥入燒人矢一錢遲則變黑而危矣若身不熱只乾焦者熱也導赤散若雖紅活太覺嬌嫩此元氣不實毒入氣分保元湯加連翹忍冬若色淡皮寬者此元氣至虛參耆內托散若雖高起色紅但乾燥口渴此火盛血少四物湯換生地加荊芥紫草連翹木通最忌參術若帶淫淫濕氣者此脾胃氣弱四君子加蒼朮荊防川芎切戒黃耆若色雖光潤捺之即破此氣不足大劑參耆內托散或保元湯若色如麩殼無水氣者此氣血俱虛急用十全大補加燒人矢治之能變紅潤含水者可治否則危矣以上俱有癢塌之變均險證也若遍身有細如芥子者夾疹也有皮肉鮮紅成片者夾斑也皆毒火太盛故一齊湧出並宜化斑湯發之熱劇勢甚加石膏若初見點簇簇於皮中不現不起者非風寒壅遏必氣虛不振風寒壅遏必煩擾色晦羌活湯加升葛氣虛不振必氣微色淡保元湯加芎桂有痘出身涼而口燥渴者此熱毒內盛其痘必密而重急宜內解熱毒禁用升麻痘初出而肢體作癢爬搔不寧者此風寒滯於皮膚也解毒飲子加穿山甲痘出隱隱不起而發狂便悶溺澀者此毒火鬱結於陽明也涼膈散下之痘本磊落而變乾焦紫黑厥冷脈伏者此必飲食所傷不能運化致氣血凝滯故形如死狀但按其胸腹必熱枳實梔子豉湯加大黃痘出將半遍身作痛者此熱毒鬱滯而未盡外出也荊防解毒飲亦有六淫所滯而作痛者審時令寒暄而調適之痘出壯熱煩渴痰喘便祕者肺胃二經實熱壅遏也涼膈散加前胡枳殼痘未出齊而煩躁壯熱色赤用涼劑轉躁熱者此毒得寒而凝滯也仍用前藥稍加辛溫之味以開發之凡痘出未盡毒猶在內慎不可與大寒大熱之劑寒則凝滯其毒熱則轉助其火惟宜平和疏透之品隨表裡虛實寒熱調之痘未出齊而痢下赤白此血熱毒盛兼有積滯也黃芩湯去棗加楂糵防風若痘隱不振形色淡白者非保元湯加桂附不救痘出而手足搖動者由脈不能約束其毒熱甚生風之象也荊防解毒飲加全蠍痘出未齊而頭面浮腫者風熱上攻也解毒飲子痘出而兩目赤腫色見乾紅大小便祕睡臥不寧者此血熱毒盛不解上攻於目也犀角地黃湯去丹皮加連翹黑參牛蒡荊芥有未見點時身熱和緩見點後身反大熱不休煩躁昏沉便祕或吐瀉者逆證也痘報形起脹時身熱四肢冷者後天脾胃衰弱也蜷臥不伸者先天腎氣本虧也俱不可治有初出便見水泡二三日即頭戴白漿不久即干此火毒盛劇不治若叢雜細密如蠶種平塌如胖蠶如冷粥結面或大者平塌小者稠密皮薄而軟邪視若無皮肉眼胞面唇先腫則五七日出血而危若皮膚如寒風粟起如疹如喑或隱或現此不待長髮當啼叫而危若正面胸背手足腫硬或成塊青紫或紫如瘤狀當黑陷破爛而危若紅紫黑斑如蚤齧蚊跡灑朱點黑潑青與皮膚一平頭面一片如胭脂者三五朝即危矣部位痘瘡見點之時先察部位即可知吉凶輕重矣痘為陽故隨陽而先見於面凡口鼻兩傍人中上下腮耳年壽之間出見者吉若見於天庭司空印堂方廣太陽等處俱非佳兆大抵見點於眉以下頤以上正中陽明部分皆吉若見點於眉心上至髮際太陽部分多凶其見點於腮頰耳傍少陽部分俱險朱濟川曰余初業時亦據前論每每不應究心三十餘年從正額間兩顴先見者多順人中口鼻先見者多險或口唇目胞預為浮腫者此脾胃受毒尤險太陽頤頰腮耳先見者多逆其不能先見於上而反於下部見者亦元氣之不振耳其起漿收靨亦同凡初見點於正面吉部相去一二寸一顆尖細淡淡桃紅色者必稀而輕也若初見點於正面凶部二三相併五六成叢或赤或白頂平而少神者必密而重也張潔古云一發稠密如針頭者形勢重也輕則表而涼其內連翹升麻湯然稠密之處各有經絡部分所屬額主心面主胃腹與四肢主脾脅主肝兩腋主肺腰足主腎肩背主膀胱當隨見證治之若面色黃大便黑煩躁喘渴或腹脹者瘀血在內也犀角地黃湯或磨生犀汁但根窠分明肥滿者無妨其頭面最要稀少勻朗綻凸紅澤肢體雖密治之可生若頭面稠密平塌肢體雖稀未可輕議其吉故頭額多者為矇頭頸項多者為鎖項胸前多者為瞞胸兩頰兩頤多致成片或如塗朱則肝盛克脾八九日當作瀉不食而為險候惟四肢雖多不妨痘出稠密雖為險候若面痘易起易灌目封能食者可治若身痘雖好面痘漿清平塌者難治若諸處痘不起惟面部及臀上痘有漿起綻者可治有面痘好惟鼻上無痘或有痘不起綻行漿者皆不治四肢有痘身面無者難治一身有痘漿足惟面上不行漿者死一身痘色紅活惟面部焦枯者死遍身痘好惟兩足膝下全無者凶冬寒不出胡荽酒熱洗多次內服溫解透肌之藥加木瓜薏苡以引之延至五日治無及矣若面部漿足收靨肢體尚不行漿神清能食可治有面上左有右無右有左無此氣血乖離必難漿難綻多不可治痘出而面半以下稠密灰白面半以上勻朗紅潤者補中益氣湯若面半以上稠密灰滯而面半以下勻朗綻澤者名云掩天庭不治痘出左半身稠密紅潤右半身間有數點者此毒發於陽為順補中益氣湯若右半身稠密灰滯平塌左半身間有數點者此毒發於陰為逆漿雖行不能收斂九日死痘出齊而諸處俱勻朗紅潤而腰圍稠密灰滯作痛者名纏腰此毒滯於陰不能成漿九日死遲則不過十一朝也痘出齊而遍身稠密頭面全無者此陰毒不能升於陽位不治以上諸證除不治外俱要疏通營衛健脾生津使無干枯焦黑之患紫草消毒之味似不可少若熱甚者芩連地骨皮渴者花粉煨葛根氣虛者參耆木香大便祕者枳殼小便澀者木通食少者山楂枳術癢者白芷蟬蛻脹者木香厚朴腹痛者芍藥丁香然亦看人之大小虛實大而實者猶或可治小而虛者多不可救諺云樹小花多難結果小船重載定傾危可為善喻者矣形色形乃氣之充色乃血之華氣旺則頂尖圓血旺則根盤緊形貴尖圓起發瘡皮堅厚若見平塌皮薄為凶色貴光明潤澤根窠紅活若見慘淡昏黑為危然形有起發而致變者由色不明潤根不紅活故耳若痘色光澤根窠紅活雖塌可治但以紅活為貴而又有圈紅噀紅鋪紅之別圈紅者一線淡紅緊附根下而不散吉兆也噀紅者血雖似附根腳隱隱出部險兆也鋪紅者痘色與肉不分平鋪散漫凶兆也根者血之暈膿者血之腐故六日以前專看根窠六日以後專看膿色若無根窠必不灌漿若無膿色必難收靨此必然之勢也然間有色不明潤而根腳好者仍得收功以根為痘之本也若根腳不圓顏色雖好須防七朝有變不可以色好而轉許無事也有初出色白不紅活若尖圓易起分顆潤澤者此氣血未會至三四日色轉紅活不宜妄補反生變端若色白枯燥稠密腳散目微紅唇腫燥熱劇無神二便祕澀或作吐瀉此火盛無血多致內攻死在五六日間矣王肯堂曰痘疹之中惟黑者最難識若初出時隱隱有黑點見於頭面自三四朝至六七朝黑色如故不見紅色形如圓珠而有光澤行漿充滿漸漸黃赤者名曰黑痘今人皆以變黑歸腎者指為腎經之痘不知血熱毒盛之痘初必乾紅青紫至六七日後倒黶變黑與初出便見黑潤不同與一熱腰下便見黑點如蚤咬者迥異此腎氣充實之黑豈可與尋常痘疹同例而論哉起脹痘瘡既出之後二三日間足心齊見漸漸長髮肥潤光澤面目漸腫灌漿為吉若三四日內隱於肌膚不長髮者此元氣虛也快斑湯透肌散催之色不紅活紫草快斑湯若身面俱起手足四肢不能長髮者桂桂湯加防風黃耆若見吐瀉口渴手足指清而不長髮者此內虛寒也陳氏木香散並雞冠血和酒釀灌之外以胡荽酒微噴衣被若四五日雖見長起顏色淡白陷頂者此氣虛也參耆內托散加糯米雖不白亦不紅活陷頂者此血虛也四物湯合保元若色赤而兼癢者血虛有熱也四物湯換生地加犀角連翹若氣虛有熱保元湯加連翹木通桔梗忍冬若痘頂色白連肉紅腫而痘反不腫口燥唇焦者九日死急以化毒湯加生地川芎調二寶散救之若色紅根散不長髮者此血熱而氣不相依大鼠黏子湯加紫草若色雖紅而焦口乾不起發紫草飲加紅花酒芩連翹芍藥若大便祕結內有實熱不發者消毒飲加犀角或四聖散加枳殼黃芩山楂穿山甲若大便利口渴不發者此內虛熱七味白朮散若自利不渴者此內虛寒理中湯加木香若出遲而小便澀滯咳嗽有痰生聖散起遲而小便赤澀四聖散去黃耆加連翹升麻虛則紫草木通湯若夏月暑氣熏炙煩渴不發四苓散加門冬竹葉冬月冷氣所侵寒凜不發者陳氏木香散寒顫渴瀉飲沸湯口不知熱陳氏異功散作渴飲冰水口不知寒實則四順飲虛則地黃丸手足不冷飲湯溫和者錢氏異功散若鼻塞聲重咳嗽不發者此風寒所侵人參敗毒散加荊防若血氣虛弱偶為外穢所觸伏陷不發內服參耆內托散外燒胡荽乳香闢之觸犯風寒邪穢黑陷不起奪命丹至如長髮之際頭面多者自然腫脹目閉然不要目胞光亮若應腫閉不腫閉此毒鬱於內不得起越急用托裡快斑湯腫者吉否者凶腫後忽然平塌目開此為氣泄急用參耆內托散加穿山甲糯米漿滿後無別變證而不回者參耆內托散加白芍連翹復腫吉否者凶又有頭面太多將起發時頭先腫大者此天行大頭病急宜羌活救苦湯解者吉否者凶此證易腫易消六七日變為癢塌嗆水錯喉聲啞痰喘倒陷百無一生矣若六七日不起發顏色不正雖能灌漿亦難保十一二朝之變也痘不起發皮粗色晦而隱於肉下者此脾肺俱虛也須防七日之變八日之喘陳文宿云痘瘡出不快誤言毒氣壅盛用藥宣利解散致臟腑受冷營衛澀滯則氣不能充貫其瘡不起發不光澤不充滿不結實不能成痂多致癢塌煩躁喘渴而死翁仲仁云起脹發頂雖起而四圍淡白枯澀者屬血虛有四圍雖收起暈而頂陷者屬氣虛頂陷色白氣血俱虛保元湯加芎歸肉桂之類起脹時痘上有小孔而色淡者此腠理不密元氣開泄也保元湯加桂若色黑者為火毒熾盛又當涼血解毒痘起其孔自密海藏云痘瘡身後出不快者足太陽經也身前出不快者足陽明經也身側出不快者足少陽經也若便利調和而出不快者熱在表也又有上中下三部先上部次中部後下部出齊自愈又有作三次出者錢氏云三日不快不出用消毒之藥仍不出脈平靜者本稀也不必服藥大凡五六日間當解毒補托七八日間毒氣不能盍出而反入於內必用藥祛出之此大法也灌漿痘瘡出齊長足至六七日紅潤灌漿九日十一日收靨為吉蓋成實之令肺金用事然必藉脾胃強則氣血充實中陷者盡起頂平者盡峻飽滿光榮先長者先作漿次長者次作漿循循有序為順若脾胃弱則氣衰微不能助痘成漿為險若脾胃損則氣血澆漓不能灌汁必喘脹悶亂癢塌倒黶嘔噦泄瀉為逆其或唇上有痘先黃者此毒攻黶當十一二日不食而危若稠密焦紫不起頂者此血熱毒盛當視其人皮之厚薄厚者化毒湯加連翹黑參若皮薄如水泡者雖灌不滿必有癢塌黑陷之變若頭面稠密身上稀少色白不能起頂灌漿者此血氣虛少參耆內托散藥力在上先頭面漿滿四肢不灌前藥加糯米芍藥以牛膝下引至足若五六日漿雖灌而不稠濃不圓滿或陷頂者此為氣弱不能統血保元湯合四物加觀桂若雖飽滿色見㿠白者此氣盛血弱也四物湯加木香糯米若六七日內灌漿不滿中有不灌者此氣血不和必變虛寒癢塌保元湯加芎歸芍藥白芷糯米若雖兒長滿摸則皮皺此血虛而氣不相依必難收靨參耆內托散加糯米若氣虛之證用內托補藥暫起灌漿不滿而復平塌者更用大劑保元湯加芎歸木香升桂糯米痘養漿時漿不易充而色淡白食少便溏此氣虛也保元湯加當歸肉桂若根赤煩渴便祕者此血熱也犀角地黃湯誤用參耆托漿而熱愈甚者四順清涼飲養漿時干空無水此氣虛伏陷也若人事清爽飲食如常痘無損處補中益氣湯若喘脹噦瀉煩悶外剝者不治痘本稠密色淡養漿時昏睡妄言者此血虛神無所依也保元湯加棗仁茯神歸地門冬養漿時喜笑不止者此心包熱甚也保元湯加人中黃黃連養漿時嘔噦不止而漿不充者土敗木侮不治之證也灌漿時痘色朗綻而兩臂腫痛如瓜者此手三陽氣虛而毒凝滯不散也保元湯加桂枝羌防當歸忍冬犀角連翹養漿時能食便溏諸痘俱灌惟正面平塌無漿此足陽明氣虛也保元湯加觀桂芍藥有灌漿時忽然倒黶或血熱毒盛不能起長伏陷喘脹便祕諸藥不效者攻毒湯有漿雖灌而清稀不能充滿者後來必有餘毒能食便堅者用嫩黃雌雞入黃耆一兩煮汁少和酒釀飲之若漿清頂不足而不犯條款自能飲食者當發痘毒方可收功若有變及不能飲食者必危以上諸證年大能食者十全五六年小不能食者難治漿雖灌而色太紅根腳散者此血熱未解九朝十一朝內必發癢急宜化毒湯去升麻加芎歸白芷連翹忍冬勿令抓破如破處鮮血淋漓則氣血流通外用陳年屋茅研細摻之或以松花掩之若因發癢而擦破清水無血必無生理破後隨灌隨干痂色青白堆垛如雞矢者終必咬牙寒顫發渴作喘二十日外必危但抓破處如剝光魚皮湯火泡者不治若八九朝灌漿之時身發壯熱渴欲飲水者此瘡多毒盛表裡氣血俱虛之故加味四聖散去木香加歸芍亦有漿半足而熱甚煩渴引飲不已此津液外布而肺胃枯涸也大劑保元湯合生脈散頻進漿滿而渴自止也若壯熱頰渴舌乾唇裂痘色乾紫者血熱毒盛或重裘暖炕所致不可誤與前藥犀角地黃湯去丹皮加芩連若行漿時感冒風寒痰喘者難治略與疏散不效者死痘漿充而腹滿泄瀉此停食所致保和丸消導之若灌漿時痛不止者氣滯也保元湯加山楂木香以行其滯則痛自止有塌癢不止者此血熱也四聖散加生地黃干首烏以涼其血其癢自止若漿足而癢不妨若灌漿之時十朝之外身體倦怠煩悶嗜臥口有氣息此必胃中蘊熱喉舌生瘡之故急用黃連解毒湯或消毒飲加防風遲則瘡雖收靨脫痂延至二十日外牙齦蟲蝕出血而成牙宣呼吸息出而成息露或為走馬硼砂狐惑齒落唇爛為不治矣收靨痘瘡至八九朝至十一二朝灌漿滿足膿汁漸干先從人中上下口鼻兩邊收至項下額上遍身手足一齊俱收痂厚色黑漸漸脫落飲食便溺如常為吉若額上先收者孤陽不生腳上先收者獨陰不長為大逆兆若漿不稠濃頂未滿足面腫忽退目閉忽開瘡腳放潤色白乾皺痂薄如紙此津液枯竭血少毒存急用四君子湯加麥冬牛蒡荊芥連翹救之今人每見此證認作結痂無事致成不救者多矣或有將靨之時熱不止而脈滑數者痘未盡也托裡快斑湯發之服後復出贈痘其熱自除有將靨時痘內復出贈痘者吉若漿足難靨色轉黑者凶亦有能食神清者可治有收靨時咳嗽咽喉不利者此肺胃餘火不清也桔梗湯加牛蒡連翹黑參痘漿清而忽然乾黑謂之倒靨若漿足而次第收靨痂厚色蒼忽然喘急腹脹者此傷食所致保和丸消導之若收靨如期而身熱喘逆者此客冒風寒也當隨輕重以汗之其或當靨之時身熱悶亂不寧哽氣腹脹泄瀉寒顫咬牙急用錢氏異功散加木香當歸助其收靨若目開腫退色白不收反腹脹燥渴悶亂哽氣者此必曾經泄瀉或過用涼藥脾胃虧損所致陳氏木香散否則倒靨而危矣薛氏云若手足並冷屬脾胃虛寒陳氏異功散手足微冷屬脾胃虛弱錢氏異功散加木香若手足熱大便祕作渴引飲屬脾胃實熱四順清涼飲救其陰以抑其陽又有當靨之時潰爛淋漓者毒當發而發散遲則毒蓄肌肉未當發散而發散早則毒邪暴出肌肉虧損熏灼腐爛甚至內氣並虛滑泄自利悶亂呻吟而死急用陳氏木香散或錢氏白朮散治里豆蔻丸以止瀉外以白螺散或牆上敗草為末摻之或用黃牛糞燒存性入麝少許摻之或蠶繭燒灰加枯礬少許摻之或用蕎麥麵豬膽調塗爛處並用蕎麥麵襯身下以收其毒夏月盛暑用芒硝豬膽汁調塗若手臂臀胯之間久著床席展擦破損急難成痂或破爛成片焦乾黧黑如火燒湯潑亦難治也又或當靨之時發熱惡寒身疼面青瘡不收靨者此必風寒侵襲故發身疼桂枝湯加荊防淡豉虛則參蘇飲如或夏月居處過熱熱與毒相凝而痛益元散加枳橘連翹白芍痛去熱退瘡自靨矣倘痘疔失於挑拔收靨時作痛急宜挑治以泄其毒又或頂破膿出結聚如碎松香者此因多用溫補之藥邪氣得補反傷正氣急磨生犀水飲之及益元散利小便當歸丸導大便自然收靨亦有漿雖灌而未得滿足不能收靨者犀角消毒飲解散其毒方得收靨又有曾用涼解之藥及飲冷水致腹中滑泄氣短體倦而不靨者以胃苓湯和胃安脾亦能收靨其或瘡頭有孔膿水流出或清水無膿卒然自破水出乾黑是名漏瘡不治又有遲延日久潰爛淋漓皮脫腥臭若先曾成膿而後潰爛能飲食無他證者當和脾胃避風寒多用干黃土末摻之自能平復若先未成膿而潰爛者不治又有先因皮薄破損多用補藥重復灌漿而發熱不靨者此正氣得補驅邪為膿然正氣終為邪克不能逼邪成痂十全大補湯又有雖重灌漿膿血浸淫面目加味消毒飲更加犀角多服若元氣本實可愈如或膿血不止變成疳蝕難治也又有結痂乾厚忽然戰栗乾噦煩渴者此正氣將復不能禁持之故生脈散又遍身俱收惟頭與足不收者此氣血不調四物湯去地黃加升麻牛膝牛蒡紅花荊芥陳文宿云痘瘡收靨之後渾身壯熱經日不除別無他證柴胡麥冬人參甘草黑參膽草主之翁仲仁云痘瘡灌漿已滿熱毒已解至收靨時有數日不焦者只看痘色如初此亦無妨乃表虛不能收斂之故八珍湯加木通牛蒡補脾利水痘自靨矣朱濟川曰表虛則易出而難靨表實則難出而易靨於此可見其表裡虛實矣脫痂痘瘡灌漿滿足干靨結痂數日之間脫盡疤色紅潤如桃花色者為吉若痂厚色蒼當落不落乃火盛之故宜清餘熱或有半月二旬痂皮黏著不脫此名丁疤或脫去痂薄疤痕凹陷乾枯色白或潮熱發癢者皆表虛無力收斂發表太過所致人參固肌湯痂疕半黏半脫疤色紅紫焮腫癢痛重復作膿者此名翻疤為風熱餘毒急宜涼血犀角地黃湯若發癢剝去痂皮或出血或無血仍復灌漿如瘡疥者此血熱氣虛十全大補湯去桂加紅花紫草牛蒡子不愈名疳蝕瘡出血不收者名陽瘡俱危痂落不光淡白全無血色疤平不滿者名蓑衣痘元氣虛寒之故當大補脾胃補中益氣湯加桂若痂不落反見昏沉不省人事者此脾胃虛也歸脾湯若抓破被風侵襲作痛屢愈屢破為血風瘡雖多用養血消毒之劑亦難速效若結痂乾燥深入肌肉不落即以真酥或蜜水潤之遲延日久則成瘢痕矣脫後疤痕凸起紫赤作痛者餘毒不解也解毒防風湯瘢下濕者密陀僧滑石白芷為散干則蜜水調敷濕則乾摻須避風日可免瘢痕也痘收靨乾黑黏著皮肉不脫而身熱煩渴夜臥不寧者熱毒不化也犀角地黃湯加連翹牛蒡若妄言譫語四物湯合生脈散加棗仁若痂薄如麩昏睡少食者此脾胃虛也大劑保元湯補中益氣並加穿山甲預防發癰之患有收靨後身熱咳嗽聲啞吐痰而衄者此毒火乘金越出上竅也犀角地黃湯加芩連門冬牛蒡子有脫痂後自汗不止疤痕色淡而手足清者氣虛也十全大補湯若身熱手足自汗不止而疤痕紫赤者胃中餘熱傍達四末也犀角地黃湯夏暑人參白虎湯脫痂後能食便祕身熱口渴者此胃中積熱上蒸須防口疳齒䘌之患清胃散有脫痂後午後潮熱臉赤煩悶錯語昏沉者此火從虛發也保元湯加歸芍有收靨後復發斑疹紫色者此餘毒熾盛也犀角地黃湯加荊防連翹牛蒡人中黃若服藥後反加溏瀉或喘脹者不治凡痘疤色白急當調補中氣為主若服藥而漸紅活為吉色不轉者危雖二三年後多患瀉痢而死若妄投攻伐禍在反掌陷伏發生聚散而彰於外者陽之德也灌溉滋潤而守於內者陰之德也陰不足則陽不長而枯萎之變出焉陽不足則陰不生而陷伏之變出焉痘瘡正當長髮灌漿之時平塌不起謂之伏出而覆沒謂之陷有紫黑白三者不同虛實寒熱之異今人乃謂變黑歸腎欲用錢氏宣風散百祥丸下之不知牽牛大戟峻利之藥有傷元氣非質堅便實者不可輕用大抵血熱之證初必深紅失於解散必變紫變黑甚至乾焦自然之理治者當於乾紅之時急用解毒涼血頂雖平陷斷不可以氣虛例治而用參耆補劑則氣盛而血愈涸矣丹溪曰瘡干宜退火只用輕劑荊防牛蒡之類若其人能食便祕溺赤者當用解毒防風湯發散其毒有黑疔挑出惡血內服犀角消毒飲外以珍珠散塗之觸犯寒邪肌表固閉毒氣伏而不發致黑陷者神應奪命丹發之熱毒內攻神昏悶亂寒戰咬牙而黑陷者神授散救之便祕氣實四順清涼飲小便不利導赤散減食氣弱加味四聖散兼扶脾以勝腎水自愈閻孝忠不達錢氏本意妄言黑陷為寒及云斑瘡終始不可服涼瀉之藥後人因之反致熱甚黑陷而死者多矣觀斑瘡之陷者無不腹滿喘急小便赤澀不通豈非熱極所致耶間有胃氣虛寒而陷伏不起則用至寶丹毒邪傷胃無價散毒邪竄入腎經人牙散毒邪伏於心腎珍珠人牙散但人牙發痘最猛用之不當則有痘頂迸裂之虞不可不慎若因虛熱毒盛而陷急用桑蟲漿地龍酒雞冠血等方選用蓋氣虛白陷用桑蟲血熱黑陷用地龍瘡乾紫陷用雞冠血不可混也朱濟川曰毒壅心肺二經用雞冠血以發之毒壅脾經用桑蟲漿以酵之毒壅肝經用紫草茸以松之毒壅腎經用人牙散以攻之毒滯經絡用穿山甲以透之葉子蕃云毒壅於肺則用桑蟲毒壅於肝則用雞冠血毒壅脾胃則用地龍毒壅心腎無藥可治惟寒閉毒邪於腎則用人牙與濟川稍異古方牛李膏宣風散棗變百祥丸獨聖散周天散皆治毒盛黑陷之藥咸可取用如外觸穢氣當用胡荽酒噴其衣被並燒紅棗乳香闢之若瘙癢者茵陳蒿為末棗膏和曬乾燒煙燻之在大江以北則用水楊湯浴之凡見灰白陷者此必不能食乳或先因吐瀉脾胃虛弱毒匿不起而變虛寒白陷者白花蛇散最捷蓋氣虛則為癢為陷血熱則為痛為燥痘色白者必至於灰慘灰慘者必至於癢塌此皆氣虛而不能起脹血虛而不能華色也參耆內托散加歸芍使血活氣行白者可變為紅矣若虛寒甚者陳氏異功散加養血藥救之若單行補氣則氣燥血虛必致發癢抓破灰慘倒塌為不治矣倒黶痘瘡能依期灌漿結痂如螺靨為吉若膿未滿足忽然干靨或膿成之後不痂破爛或收靨之時泄瀉膿血或空泡乾枯或發熱昏憒或咬牙寒戰或手足並冷飲沸湯而不知熱是名倒黶由中氣不足毒從內入之故宜參耆內托散補中益氣湯保元湯選用使破者重復灌漿無處更出贈痘則正氣得補復祛出毒邪也若服補藥不出贈痘破處不復腫灌更下膿血者不治若將靨之時忽然黑黶或漿未充而忽然收靨或漿雖充而一齊結疕乾紫此氣虛血熱因火迫而收之太速也犀角地黃湯加紫草茸或四聖散加人參當歸然其形證又當推辨如身痛四肢微厥瘡色青紫者此則外感寒邪腠理閉拒而倒黶人參敗毒散並用胡荽酒噴之忽然倒黶而心神不寧者豬尾膏若心煩狂躁譫語便祕口渴飲水能食者此則外觸穢氣而倒黶內服奪命丹外燒熏穢散闢之尸氣所觸而黶闢穢香解之有漿未滿足忽然目眶深陷乃氣脫倒陷若作昏沉痰喘者死丹溪云痘瘡倒黶因真陽虛而毒氣不能出者保元湯加紫草之類若將成就之際卻淡色者屬血虛芎歸之類或加紅花紫草屬熱升麻芩連桔梗之類甚者用犀角薛氏云若熱毒方出忽被風寒閉塞肌竅血脈不行身體作痛或四肢微厥斑點不長或變青紫黑色者此為倒黶若胃氣虛弱不能補接營衛出而覆沒者謂之陷伏誤用解毒之藥必致陷塌若喜熱飲食手足並冷者乃脾胃虛弱之證宜用辛熱之劑補之喜冷飲食手足並熱乃陽氣壯熱之證宜用苦寒之劑瀉之外感風寒者溫散之毒氣入腹者分利之陽氣虛者溫補之外寒觸犯者熏解之陳文宿用異功散以預保脾胃於未敗之先實發前人之未發開萬世之蒙瞶也夾斑痘瘡夾斑疹而發是臟腑熱毒交盛故一齊湧出豫嘗洗心體會痘證但有夾麻而夾斑之說未果斑乃傷寒之熱毒內蘊而發安有與痘齊出之理即前見點例中所言皮肉鮮紅成片者為夾斑實麻疹也細如芥子者為夾疹則癮疹也然斑則多見於胸腹肢體頭面絶少於此可以明辨而舉世通謂夾斑若一齊衆楚大不合時矣觀先輩治例首推升麻葛根湯先散表邪俟斑退痘起然後隨證施治遍考方書無不皆然張涵高曰斑痘齊出方書俱言先撤斑熱往往痘隨斑陷惟發其痘則熱聚於痘痘起其斑自退兩說似乎相左其實並行不悖當知斑痘齊發總由熱毒勢盛絶無挾虛之候得其旨則撤斑無非清涼化毒起痘亦無非清涼化毒化斑湯一方隨證加增允為斑痘夾出之金錍如斑色紫赤加大劑石膏以化之大便祕結稍加大黃以利之設不知此而誤認真斑專事寒涼則痘隨斑陷若不化斑專力升發則斑隨痘起叢雜不分頭粒兩難分解也黃五芝云風寒夾斑當先表散則痘自起大便祕者宜速下之大便利者涼血透肌解毒為主次言先痘後麻者輕麻出以分痘之勢也先麻後痘者重麻發於肺表氣先虛失其起灌之力也麻痘齊出者險兩毒併發但看麻之形色痘之稀密斟酌而為處治若斑見紫黑痘見漿清證見喘急皆不可治大抵斑痘齊發總由熱毒勢盛不可誤用參耆若元氣本虛痘色淡白小劑保元亦不禁也如六七日內熱毒未盡而誤與之必身復壯熱痰喘不食而死否則癰毒口疳目疾之害所不免焉板黃痘瘡根窠薄劣漿汁板滯不活而枯黃色晦者曰板黃若方廣天庭板黃而余者潤活癰毒必結於腦項若腮臉板黃而四肢潤美癰毒必發於肩阜若肚腹板黃癰毒必發於曲池三里若背脊板黃癰毒必結於兩軸尻骨如遍身板黃頸項前後板黃頭面板黃眼眶唇上板黃兩脅莖囊板黃皆死證也愚按板黃皆由胃熱能食食滯蘊積於中胃氣不得宣通而致非痘之根氣本然也治者能達斯意急與苦寒消導大便祕者當微利之熱滯去而內外宣通烏有癰毒之患哉焮赤聞人規云痘瘡焮赤大便不通小便如血或結癰毒身痘破裂出血乃內火熾盛失於解利急用犀角地黃小柴胡加生地黃及四順飲之類薛氏云若心脾熱甚犀角地黃湯心肝熱甚小柴胡加生地黃若大便不通先用四順飲次用犀角地黃湯若色赤焮痛二便不通急用活命飲加硝黃若色赤焮痛惡寒發熱活命飲加麻黃若因乳母怒火加味逍遙散斑爛聞人規云痘瘡斑爛之證因當發散而不發散則毒氣閉塞以致喘促悶亂不當發散而誤發散則毒隨陽氣暴出於外遍身皮肉潰爛治宜調脾胃進飲食大便調和脾胃健旺毒氣自解而無目赤咽痛吐衄等證若發表過甚大便自利急用理中丸豆蔻丸以救其里亦有痘瘡如蚊所齧面色黑乃危證也若小便祕結煩躁導赤散加山梔犀角赤芍自利不食者不可用蓋毒發於表而妄汗之腠理開泄營衛益虛轉增斑爛由是風邪乘虛變證者有之若毒蘊於裡而妄下之則內氣益虛毒不能出而反入焉由是土不勝水變黑歸腎身體振寒兩耳尻冷眼合腹脹其瘡黑陷十無一生醫者審之飲食痘瘡既出全藉脾胃安和進納飲食則易漿易靨自四五日以至痂落之後飲食不減二便如常雖不起發不紅綻或陷塌用藥得宜可保無虞若乳食減少兼之泄瀉則元氣日衰雖無前證日後必至有變藥亦難效豈能保其無事哉若胸前稠密毒氣傷脾減食者消毒飲加黃芩山楂紫草人參有傷食腹脹不食者枳朮丸有痘出太多中氣暴虛不食者四君子加糯米有痘已痂起而不能食身無熱者調補脾胃為主凡四五日前不食而便祕者此毒盛於裡猶為可治至六七日後反不能食則變證百出縱藥何益有稟受壯實而發於五歲之外者又不可一例而論也又有痘起之後能食易飢者此胃大熱不久而變生焉大便祕者四順飲加連翹牛蒡微利之不祕者芍藥湯加茯苓木通牛蒡子以和之又有飢欲食而不能者必喉舌有痘難於吞嚼也吐瀉凡痘疹發熱有嘔吐者有泄瀉者有吐利兼作者有乾嘔而噦者有不食者皆毒火所致不可驟止吐利中有疏通之義治宜平和疏透引毒達表則吐瀉自止如不止兼調脾胃如干嘔而噦為胃虛火逆最危之兆宜橘皮茱連散以安胃氣清火毒有不嗜食者此脾受熱毒當升提發散俾毒得外出飲食自進若誤認嘔吐泄瀉不食為裡寒而用丁桂薑附轉增煩劇也誤認嘔吐泄瀉不食為裡虛而用參耆苓術反增壅遏也此專為痘疹初出未透者而言若漿正行時而吐利不食者乃脾胃虛弱多有內虛倒黶喘脹之患凡長髮起頂灌漿時泄瀉俱為險候急用白朮茯苓以滲泄健脾人參黃耆以助元托裡訶子肉果以止瀉佐以升提之藥使無壅遏之患若不升發難免倒黶之虞如見心煩乾嘔而噦此臟敗毒攻最為凶候二陳加黃連木通燈心竹葉夏月四苓散以利小便利而不通者危至如泄瀉而手足熱面赤者熱也弱者白朮散加竹葉陳皮強者瀉黃散若下午瀉甚上午瀉稀此傷食平胃散加山楂麥芽厥冷加乾薑或益黃散補之瀉利而嘔逆厥冷理中湯加木香上午瀉甚下午不瀉者脾虛也朝用白朮散夕用豆蔻丸瀉出腥臭穢滯者腸胃熱也葛根黃芩黃連湯瀉而失氣者氣下泄也白朮散加升麻防風提之若受寒邪或食冷物而泄瀉清冷痘色灰白頂陷或手足厥而寒顫咬牙者陳氏木香散異功散瘡雖正而吐瀉或下血俱為逆候若但吐不瀉無痰益黃散有痰二陳湯吐而身熱煩渴腹滿氣促大小便澀而赤者當利小便若先吐而後出痘足蜷不伸聲啞熱蒸者雖有清漿不治陳文宿云痘瘡瀉水穀或白色或淡黃者陳氏木香散送豆蔻丸不愈異功散救之腹痛痘瘡腹痛者皆毒郁三陰如腹痛面青手足冷此脾胃虛寒理中湯益黃散選用若腹痛痞滿氣滯手足厥逆而大便不通者此毒壅不透也桂枝大黃湯合表裡而開泄之若腹痛面赤作渴手足熱此脾胃實熱消毒飲加山楂枳殼黃芩木通若氣粗身發顫動而痛口臭唇舌白胎者此毒攻臟腑腸胃內潰不治樓全善云腹痛多是熱毒為患當臨證消息之薛氏云若痘未出而發熱煩躁作渴飲冷大便堅實而痛此熱毒壅滯也急調元明粉通利之若痘不出而煩熱渴不能飲冷大便不實此元氣虛也白朮散溫補之若噯腐吞酸大便穢臭乳食停滯也保和丸消導之凡腹痛作渴飲冷手足並熱者屬實熱若作渴飲湯手足並冷者屬虛寒也翁仲仁云痘疹腹痛當升發以解利痘毒兼分利小便使上下分消則痛隨利減俗醫恆用厚朴以行滯氣不行升發解利者非其治矣亦有乳食停滯而腹脹痛者當於升發解利藥中加消導之劑兼審所傷何物而為之清理又有數日不大便者大便行而痛自止亦未可驟用硝黃也然有實邪固結按之硬滿而痛又須峻攻不可膠於上說耳腹脹痘出腹脹皆毒郁腸胃所致若胃中伏熱心氣不降小便赤澀而腹脹者導赤散加滑石紫草若痘乾紫而腹脹不大便者為血熱毒盛紫草承氣湯若瘀血在裡面黃煩躁小便利大便黑犀角地黃湯加穿山甲若氣促體倦大便利小便祕手足冷者脾虛也五苓散加木通木香若腹脹腸鳴氣喘厥逆瘡白躁渴者急用陳氏木香散救之遲則陷伏難治矣若讝語便祕躁渴瘡紫焦者此內實熱小承氣湯若長髮時倒黶腹脹者不治腰痛經曰腰者腎之府痘瘡見腰痛或痛連背脊轉側不能皆因腎郭空虛邪火亢盛真陰不能勝邪之故急宜四順清涼飲救熱存陰為務若痘未出而驟熱腰痛面色紫赤痘必乾枯紫黑此腎臟火毒盛劇急用百祥丸或水調元明粉以下奪其勢後用消毒飲加防風紫草連翹木通若腰下見紫黑成片如蚤齧者不出七朝必死二便祕澀痘疹要小便清而長大便疏而潤謂之裡氣和一有艱阻則毒邪內蓄腸胃壅遏不能傳化便宜清解得大便通溺自利矣三黃丸四順飲前胡枳殼湯之類此專為痘始發時而言若痘正養漿時而二便祕者宜審虛實治之中病即止不可過劑若飲食如常二便如昔內證平和不可溫補亦不可妄施攻擊也大便祕痘瘡出後灌漿之時雖要大府堅實為順若痘出五六日不大便此毒火內乘津液外耗腸胃乾枯而祕也四順飲若色白少神不食嘔吐清水者虛祕也錢氏異功散加歸芍若血熱口乾煩躁便祕四順飲加紫草使其便利二三度熱毒自解煩躁自寧若有風寒先宜解散然後可下若不先解恐表邪乘虛入里痘反伏而不發發亦不齊遂成塌陷焦枯勢所必至如六七日灌膿之時壯熱脈盛而大便不通加味消毒飲及蜜煎導以潤下之否則腹脹喘滿矣有過利小便津液內耗而祕者生脈散加當歸又氣血俱化成漿而四五日不大便者只宜清涼活血漿足自行不須治之薛氏云痘疹大便不通當分辨虛實以手足冷熱及飲水飲湯驗之溺澀痘瘡解毒以利小便為要小便不利乃熱毒始於下焦連翹防風湯赤澀有血者犀角地黃湯加木通莖中痛者合益元散延久則身熱躁悶喘渴焦紫或生癰破裂或口瘡咽腫或內作膿血變證不測大抵未出之先熱甚而小便不利恐欲起驚導赤散微解之初出不快小便赤澀者生聖散長髮灌漿時溺澀者五苓散加木通收靨之後小便不利煩熱而渴豬苓湯若肺熱氣化不行小水不通五苓散探吐之元氣虛弱不能清理傳道者補中益氣加門冬車前肺虛不能滋其化源生脈散加黃耆甘草膀胱不能吸引肺氣錢氏異功散加麥冬五味胃熱小便赤澀不通生聖散肝熱小便癃閉龍膽瀉肝湯腎熱水道不行導赤散腎虛肝熱小便枯約生料六味去萸加麥冬痢痘瘡未出之先先曾下痢此元氣已虧起灌最難滿足升發劑中必兼實脾為要又須辨其寒熱赤白如痘色紫赤口躁咽乾小水短澀痢下鮮赤此風能動血也三奇散四苓散參用若痘色淡白四肢清冷小水清利痢下晦淡此水液清冷也補中益氣湯陳氏異功散參用有食積而腹急脹痛者平胃散加山楂木通若至二七內外而瀉痢膿血為餘毒未盡熱移大腸兼之濕熱相併紅白交作四苓散加芩連山楂木通連翹大抵痘後利膿血為五液注下最危之兆若以痢治而峻用苦寒不旋踵而告變矣驚搐古人謂先發驚而後發痘者是熱在痘而不在心為順先發痘而後發驚是熱在心而不在痘為逆然有因風邪所激而發者有因脾氣虛弱而發者不可不辨若正當灌漿之時忽手足搖動驚搐者肝熱生風風火相搏生痰也治當平肝木利小便為要瀉肝則風去利小便則熱除先與導赤散瀉青丸次以四聖散加人參鉤藤若手足瘛瘲口眼喎斜涎盛語澀腰項強急口張舌強者此火盛耗金木無所制而風生消風散加蠍尾鉤藤痰盛加元明粉若渾身冰冷不知人事者不治若發搐至口噤流涎此脾胃受虛風或誤服涼驚之藥所致謂之痘風急當清火養血卒多莫救若痘初出時無驚搐收靨時忽然發搐如角弓反張直視流涎者此毒火傳心移熱於肝木來乘土氣血但虛最凶之兆惟痘疹將出先發驚搐者多吉然發一二次即止而見點者其痘必稀發十數次而報點者必密報痘一二日而驚搐不止多重雖曰痘前搐者吉若發之不止為毒伏於裡未可以言吉也安世曰大抵痘前發搐責在熱盛痘後發搐責在正虛昔余治一五歲兒放標時忽發驚搐痰涎壅盛壯熱不省忝在同道不忍坐視先與西黃釐許點舌上遂用硝黃芩連佐以荊翹大力之類下之一服神清熱緩痘亦隨起反掌收功近於都門療正黃旗四川道監察御史諱粹然李公之孫年四歲痂後忽發驚搐諸方皆謂莫救亟邀豫往診其六脈虛數無力手足時發拘攣口眼喎僻唇燥囊縮溲便澀難證雖危殆以舉家懇救甚切因思痘後發搐多緣氣血兩虧土衰木賊虛風內動所致法當溫養肝脾峻補氣血使正氣有權虛風得以自息若治其驚是速其斃也為疏一方以十全大補桂用枝日進二服搐遂稍定又二服二便自通囊亦少縱目睛轉動諸證向安但頭髮毒數處其色亦不甚赤於前方中去芍地加白芷忍冬貝母三日後毒亦消散聲音清朗飲食如常惟左臂與左足不能舉動更於原方加牛膝倍當歸四劑便能步履獨手腕無力仍以牛膝易桂枝先後不逾一方調理而痊孰謂證見危逆而悉委之不救哉痘疹盛行時如見驚搐切不可作驚治一切硃砂牛黃腦麝輕粉等皆痘所忌不可不慎咳喘咳嗽痰喘雖屬肺熱然有氣虛腠理不固風邪侵肺而嗽吐稀痰者參蘇飲頭痛身熱鼻塞喘嗽者風寒也芎蘇散若咳嗽不已無表證者此肺虛為痘毒所乘補肺湯喘脹便祕者肺熱也黃芩瀉肺湯有湯水入口即咳而吐出者肺胃熱痰膠固也先與梔子豉湯加蔥白桔梗探吐後服如聖飲面白手足冷喘促者此虛寒也白朮散亦有肺脘有痘淫淫作癢習習如梗阻礙氣道而為咳嗽痘收自愈有不咳嗽但喘者若初出噴嚏鼻流清水而喘風寒客肺也參蘇飲痘點乾紅腹脹便祕而喘毒盛氣不舒暢也宜清火解毒有氣虛不能逐邪外出毒伏於內而喘脹者乃悶痘證不治有瀉後喘者脾氣下陷虛火上擁下氣不續也補中益氣湯有吐後喘者胃虛不能制伏相火也六君子湯痘四五日伏陷喘脹必再攻發復起可治痘漿半足而倒黶喘脹者宜補兼攻發復腫灌為吉有誤服參耆腹脹而喘枳殼湯有痘密以致鼻塞而口中氣促似乎喘者非喘也以喘治之誤矣涕唾痘瘡要涕唾稠黏則熱毒容易蒸發若涕唾稠黏身熱鼻塞大便如常小便黃赤芎蘇散加減如痰盛壯熱胸中煩悶大便堅實臥則喘急前胡枳殼湯微利之庶元氣不傷痘瘡易出咽喉痘出最要咽喉清利若毒火上熏咽喉先受以致腫塞窄狹呼吸不能飲食不入疼痛啞嗆等證如聖飲甘露飲射干鼠黏子湯選用血熱咽痛者紫草消毒飲最當若咽痛發熱手指初捻似熱捻久則冷者此脾氣虛也錢氏異功散若咽痛發熱作渴引飲手足並熱者脾氣熱也瀉黃散若大便溏泄飲食不進者白朮散慎勿用涼藥致損脾胃而變吐瀉癢塌也若咽痛足熱小便赤澀而頻數此三陰虛無根之火循經上至咽喉也生料六味加麥冬五味嗆水嗆水者咽門為毒所壅則飲不得入而溢於氣喉故氣逆噴而嗆也若嗆水在六七日前見痘色紅紫者乃熱毒上壅若痘色灰白不起乃氣血虛弱肺胃受傷大為危兆急宜解毒開胃色赤兼涼血色淡兼補氣若七日後外痘蒸長光潤而見此證乃內痘起發而嗆只須助其灌漿外痘結痂而嗆自愈矣失音失音之證大抵肺熱氣病咽喉有痘也若於七日前見者毒氣熏蒸肺竅閉塞內瘡糜爛呼吸俱廢者為難治若七日後嗆水失音乃內瘡先熱而靨射干鼠黏子湯或有內本無瘡多服熱藥所致者急用消毒飲去荊芥加桔梗門冬焮赤熱甚更加犀角黑參或涼膈散去硝黃若毒火上熏於肺肺受火鬱而竅塞聲啞者導赤散加桔梗牛蒡若聲啞而煩熱焮痛呻吟作渴欲飲冷水大便不通者此心脾實熱急與清涼解毒夏月盛暑之時稍與冷水救之潔古云痘疹已出而聲音如故者形氣俱不病也痘疹未出而聲不出者形未病而氣先病也痘疹出而聲音不出形氣俱病也其治法可領悟矣凡痘瘡黑陷乾枯咳嗽失音吐瀉煩渴發熱肢冷昏睡少食痰多氣促寒顫咬牙黑陷燥癢者皆為不治惟猛進溫養之劑間有得生者寒顫咬牙痘疹咬牙寒顫有先後之序痘正出時為寒邪所襲則肌腠閉塞不能宣達而發寒顫宜疏解之若養漿時寒顫乃陰凝於陽陽分虛則陰入氣道而作顫保元湯加丁桂以溫陽分若系表虛風寒所乘則宜保元湯加羌防荊芥連翹木香之類痘未透而咬牙者陽明胃熱宜清解之若養漿時咬牙乃陽陷於陰陰分虛則陽入血道故咬牙也保元湯加芎歸以益陰分若系肝盛木邪乘土則宜瀉青丸合導赤散作湯二證並作於吐瀉後者邪正交攻氣血俱虛之候十全大補湯單見且凶況並見乎若痘色紅紫大小便祕煩渴欲飲水者表裡俱熱之證而不寒但顫者瘡痛而搖也咬牙者忍痛也乍作乍止四順清涼飲若潰爛灰白泄瀉不止此脾胃虛寒純陰無陽之證急用陳氏木香異功若瘙癢悶亂腹脹足冷者倒黶也不治若痘焦紫陷伏悶亂昏睡或躁擾不寧聲啞氣急而寒顫咬牙者為熱毒內攻法在不治急投神授散以救之若青乾紫陷二便不通大渴不止者此純陽無陰百祥丸宣風散急下以救陰津下後身安手足溫者方許可治若腹脹氣喘讝語手足冷者伏陷也不治大抵二證並見最為危候又當以痘色辨其吉凶或單寒顫者當補氣之中兼補其血單咬牙者於補血之中兼助其氣然此二證多發於痘後其人屬虛無疑雖有少熱亦餘毒耳在養漿收靨之時最忌見此故於七日前見者可治在七日後見者為逆發泡發泡為氣盛血虛之候蓋肺火動而皮毛傷前聚而為泡小者如水珠大者如葡萄色白而空或有清水者氣虛有火也治之當補脾肺順水道而虛自實矣錢氏異功散加車前澤瀉之類紫而空者血虛有熱也清肺湯加當歸芍藥茯苓車前使小便下行則氣平血和其泡自斂若薄如竹膜燎漿泡者必待漿臭而後可治泡碎則亡矣發癢氣虛則陷伏血虛則癢塌痘初出而遍身作癢者此邪欲出因風寒閉其腠理其火遊移往來故癢宜疏散而瀉肝木邪氣得泄痘出而癢自止痘收斂而作癢者膿成毒解火氣漸微本無毒蘊也芍藥湯若大便祕結犀角消毒飲痘養漿時淡白平塌少食便溏漿清而癢爬搔不寧者此脾胃虛弱氣血俱虛虛火擾攘所致參耆內托散甚則陳氏木香散佐之藥不應者凶痘色紅紫干滯二便祕口渴煩躁漿充而癢抓破血流者此氣盛血熱也四物湯加連翹赤芍白芷蟬蛻甚則四順飲下之如作癢人事清爽自知其誤抓破或言其癢欲人拊之吉如癢而悶亂煩躁語禁不止搖頭手足舞亂破損無血眼札目開凶也若他處破損雖多膿血稠黏正面不破者其臟府精華不散正氣未虧儘可收功有面痘雖癢甚擦破即痂能食神清者可治昏亂者死若破無膿血不結靨如無膚之狀寒顫咬牙便泄噦嗆者不治發渴痘前渴者宜清金利水痘後渴者當大補元氣若痘瘡稠密而渴為津液外泄生脈散在藜藿生津葛根湯如煩躁讝語身熱者白虎湯加麥冬竹葉若大便黑小便利面黃小腹脹喘急而渴者內有瘀血犀角地黃湯加歸尾桃仁紅花穿山甲若夏暑窗牖閉塞煩渴四苓散加麥冬黃連薛氏云若發熱作渴大便祕結手足並熱善飲冷水此陽盛也四順飲若煩渴泄瀉手足俱冷飲沸湯而不知熱或陷伏黑黶者此屬虛寒錢氏白朮散或陳氏異功散選用若煩熱作渴面赤睛白此為腎經虛熱生料六味丸煎與恣飲以救腎家將竭之水燕都小兒出痘作渴恣與冷水飲之如期而愈亦無痘毒之患蓋北方人臥火炕飲火酒有熱與水相構而然也按陳文宿云痘瘡發熱口渴煩躁切不可與冷水蜂蜜柿子西瓜等物恐內損脾胃致腹脹喘滿寒顫咬牙則難治也蓋方宜各有不同不可一例而論張涵高曰痘出三四朝便祕溺澀煩渴壯熱痘色乾紅焦紫必用涼膈散下之後用涼血解毒調理如八九朝元氣虛弱而痘平塌漿色清稀保元湯補之有火證發渴始終不可溫補但與涼血解毒則漿行結疕而愈煩躁凡痘未出而煩躁者毒火內郁或風寒壅遏不能即出宜發散為主痘未盡出而煩躁者亦毒火盛也消毒飲加連翹黑參痘盡出而煩躁者乃血熱毒盛犀角地黃湯解之痘長養時煩躁者當辨虛實若痘頂平淡白少神漿不易充者此氣血不足保元湯加歸芍門冬虛煩懊憹者梔子豉湯加解毒之藥若綻凸紫滯便祕溺澀乃正氣實而毒盛不解涼膈散四順飲三黃丸解利之小便赤澀益元散導赤散分利之若痘倒黶喘脹而煩躁悶亂乃氣虛毒盛難治昏沉痘瘡成漿之時精神倦怠神思昏沉不省人事呼之不應自語呢喃如邪祟狀此痘出太過心臟空虛神無所依也人參酸棗湯氣虛大劑獨參或保元加棗仁茯神若煩熱氣壯痰涎湧盛者改定清心丸如服藥後不寧反加悶亂者死漿清不食者不治汗出痘瘡多汗則津液外泄或未漿或既靨並宜保元湯加養血藥然又有面赤發渴汗出不及腰者皆胃熱腎虛四君子湯去朮易麥冬下六味丸若面赤作渴手足心熱大便堅者腸胃實熱也瀉黃散若初起發熱時自汗不妨乃濕熱熏蒸而然切不可便用耆術之類以實腠理亦不可妄用升葛之類以泄肌肉蓋自汗則痘熱已輕恐發泄太甚則津液內耗陰隨陽散難以收靨即靨後自汗亦宜詳審而治若血虛自汗則至夜煩熱作渴當歸補血湯氣虛不能自固而汗則動作喘息力微身熱四肢不溫四君子加歸耆有痘出平塌淡白少神身涼而汗者保元湯加肉桂當歸有重幃暖炕厚衣重衾而多汗者宜漸減以清適之失血痘疹失血俱為危候若氣血旺毒火盛而失血者乃邪從血解不可妄投止血之劑惟宜清血解毒若治之不止者凶有氣血虛而毒盛失血者不治有悶痘五竅流血者不治有痘倒黶而鼻流血水者不治有熱證誤投熱劑而失血者宜清涼解毒痘未盡出而用寒涼毒為涼激傷脾不能運動其血致逆於臟府之中內毒搏滯於胸膈之上積成穢血妄行而暴吐衄昏暈痘色淡白陷伏者理中湯獨參湯並加肉桂溫補為主所謂血脫益氣陽生陰長是也若痘尖綻紫滯而衄者乃毒火刑金犀角地黃湯加炒黑山梔有靨後餘毒乘脾脾氣受傷不能統血而衄小劑參苓白朮散加炒黑連芍若躁熱悶亂口乾渴甚而衄手足並熱者犀角地黃去丹皮加黃連山梔炮姜亦有中氣虛而不時哄熱手足時冷時熱而衄此清陽之氣不能上升無根之火倏往倏來也補中益氣加芍藥肉桂有毒盛壅熾肺金受制流注大腸而便血者四物湯換生地加芩連若下血不止昏睡不醒者危凡痘中失血惟從鼻出者可治從口中及口鼻齊出者多不治亦有從痘瘡出者則為走泄走泄多則分肉空虛毒無定位是皆有犯於裡為難治也身痛經曰諸寒為痛又曰甚熱則痛又曰諸痛為實三說不同各有其理當熱作之時毒始運行忽遇暴寒折之毒邪壅於皮膚之間不能宣發此因寒而痛也宜透肌運表如煩躁渴甚狂言讝語便祕溺赤更值春暄夏炎之令痘見乾紅焦紫就火熱而痛甚就陰涼而痛衰此因熱而痛也宜清涼化毒若身不壯熱口不煩渴飲食如常二便清調痘見尖綻紅澤至七八日漿極充滿惟覺根窠脹痛此諸痛為實宜平和疏養若初出而身痛者為發未盡升麻湯冬月加蜜炙麻黃二三分既出稠密而身痛為毒盛瘀血也犀角消毒飲倍連翹加紫草兼腰背痛者肝盛血凝也瀉青丸減大黃加甘草防風便祕腹脹四肢厥冷腰痛瘡色紫黑者難治百祥丸若遍身如齧而色紫者瘀毒壅滯最危之兆若二便祕結喘急煩躁梔子仁散自利不食者不治若身後痛屬太陽經用羌活防風甘草身前痛屬陽明經用升麻葛根紫草身側痛屬少陽經用連翹柴胡防風四肢痛屬脾經用防風芍藥甘草急止之蓋恐叫號傷氣忍痛傷血而致變證也若食雞魚酒物而致者清胃散加生犀汁大凡痘瘡切不可食毒物恐作痛致傷元氣輕者反重重者難治然有專取毒物以攻其毒如豬尾膏雞冠血攻毒湯等方之義不可以此礙彼也頭面朱濟川曰痘未起發而頭面先腫者此陽火亢盛陰血不能歸附氣血相離之象若痘瘡起發頭面以漸而腫者此毒氣發越聚於三陽欲作膿血故宜腫也設當起發而頭而不腫者必痘本磊落毒勢輕淺所以不腫如痘本稠密起發應腫不腫此毒伏於內不能發越治宜助正為主如痘稀疏起發不應腫而腫者此感疫毒之邪須兼疫氣而治如應腫而平塌如餳餅或痘肉齊平或乾焦紫滯者此毒盛氣虛不治之證也大凡應腫者直至漿滿結疕毒化而腫消目開為吉若漿未充足而腫消目開者此正氣不足不能化毒成漿名為倒黶乃凶兆也聞人氏云痘疹屬火面色赤者為順赤甚為熱若肝木克脾面色青者是為逆也急用四君子或附子理中並加升麻調補脾胃色正方許可治有痘毒遇風寒相搏凝滯於肌肉遍身皮膚色青急用奪命丹發之然多不救正額朱濟川曰額乃心之部分若痘出遍處平黯而正額勻朗綻凸紅潤調理無虞遍處雖勻紅綻而正額平塌灰滯無神者此元氣不足不能成功於上凶也正額雖平塌而間有數點尖綻者險也又須兩顴頰來助若顴頰不起發無潤澤為氣血不足終不可治也若眉心密簇如錢而色灰滯雖遍身朗綻八九日漿行俱滿眉心必空殼無水後必癢塌倒黶喘脹而死手足朱濟川曰四肢之痘應出不出應起不起應漿而清水應收疕而不痂應脫靨而黏著不脫者皆脾胃虛不能旁達四肢也治宜調理脾胃為主然四肢始終貴乎溫暖若痘出手足冷者脾弱也痘出而手足作痛者乃毒火乘脾疏解為上若遍身漿滿而四肢尚空殼多有不治者臨病之際可不撫按手足之溫冷哉又有自言手足冷及按之熱而夜臥不寧者此脾弱而虛陽發露於外也當補脾調血為主痘出而兩足常動搖不休此熱毒流於陰分不治若出七八日足不伸者不治唇舌痘出始終以唇舌紅潤為吉若唇口腫脹紫黑乾裂或有痘先黃或唇色皎白或有白泡或腫爛流膿者皆毒火乘脾極為危候當先升解以化其毒次補益以培其本庶可無虞若痘出稠密唇口瘡相黏乾黑者死證也若臭爛延及牙齦腮頰腫破而成走馬崩砂牙宣息露狐惑等證皆不易治即用化慝丸馬鳴散亦難取效若初見舌白唇紫即知實熱急投涼膈散及馬鳴散吹之庶可急奪其勢若見痰喘作渴者不治若氣虛火盛津液不能上行而舌乾口燥者補益為主若毒火盛而舌乾口燥者解利為主若舌上燥黑芒刺者此熱毒內蘊急用硝黃下之或可十救一二又舒舌者脾之熱弄舌者心之熱有因唇燥而舒舌者亦脾之熱也若痘稠密漿清唇口搖動昏沉寒顫者不治唇口瞤動目眶內陷足常動搖者不治若下唇有白屑如芝麻或翻轉如葵花或有紫泡出血及唇燥裂而見面色枯槁煩渴不止及腰足痛者皆不可治眼目痘疹初發熱時目赤腫者風熱上攻也四五日間目赤者火毒盛而上熏也痘後目赤腫者餘毒鬱於心脾也痘疹出多至灌漿時自然眼閉然干靨之後又當開眼若仍閉不開者此毒氣上攻於目急宜清解餘毒甚則涼膈散加荊芥牛蒡蟬蛻大抵過期不開即當以舌舔潤去其眵汙自開痘瘡害目不在於初而在收靨之後皆由頭面痘密膿血膠固或破爛而復腫灌毒火鬱蒸內攻於目又或痘出太盛成就遲緩過服辛熱失於清解或逼受火氣或衣衾過厚或客冒風寒或恣食諸卵皆能害目治當活血解毒得血活其毒即解切不可概用涼劑恐冰凝血脈終成痼疾也亦不可點香竄之藥穀精散決明散密蒙散神功散羚羊散等方選用初見點時有痘叢生目中急須移痘丹移之庶無害眼之患方雖似誕而功效特奇不可因其異而忽諸若三日後根氣已定不可移也輕者以象牙磨水點入移之餘毒痘瘡平塌倒黶破爛之證用藥得以收靨者餘毒發泄未盡必循經絡而出發為癰毒看何經絡而用藥俱以托裡解毒為主如未潰腫硬者排毒散隨元氣虛實加減外用生黃豆嚼爛罨之或大黃酒煮入真緑豆粉敷之或蛇蛻蘸生豆漿貼之若潰腫而膿未透解毒內托散加白芷鯪鯉甲外用海石細研蜜調敷之如已潰膿盡者十宣散加連翹忍冬凡痘後餘毒發癰根赤而作癢者氣虛也四君子加當歸芍藥色赤而腫痛者血熱也四物湯換生地加犀角鯪鯉甲連翹忍冬腫而不潰者氣血兩虛也托裡消毒散潰而不愈者脾氣虛弱也六君子加歸耆忍冬若發於皮膚之外或大片小片如塗朱或作核腫痛不可摸者此名紫丹瘤內臟毒盛雖用解毒藥亦難消散從上發者過心即死從下發者過腎則死急以瓷鋒砭去惡血毒腫未平再與砭之更須內奪其毒得以開泄也若皮膚髮出隱隱紅斑搔癢或紅塊者俗名蓋痘痧消毒飲加防風若收靨安好忽然手足厥冷此脾氣虛弱不可認作寒證參耆內托散加桂枝若手足忽然拘攣不能屈伸者此外感風寒濕三氣勿用發散耗血之藥十全大補湯用桂枝蒼朮骨節痛加羌防有痘瘡收靨後忽然下痢膿血者此毒氣流入大腸須二三日間聽其下盡然後清熱利小便再後補脾健胃不可用止澀之劑若熱毒蘊蓄於肺閉塞咽喉則口張不食欲吐不吐乾嘔聲嘶此胃中有瘡腐爛最凶之兆急用消毒飲加甘桔黑參牛蒡竹葉並磨犀角水救之遲則咽爛而死若腹痛脹滿煩躁氣急者此毒入於脾當用枳實導滯湯利之否則喘急厥冷難治矣若痘後勝常飲食日漸羸瘦此氣血兩虧胃中虛火也錢氏異功散四物湯並加黃連相間服之更節飲食為要若大便祕結毒盛血枯也消毒飲加生地黃麻仁杏仁以潤之因多服熱藥燥結者消毒飲加麻仁芍藥山梔若口舌生瘡赤者為心脾蘊熱宜涼膈散白者為心肺有熱宜清肺湯外以青布蘸水拭淨用馬鳴散摻之收靨時口舌生瘡及患齒疳者皆由余毒不解乘於陽明而熏逼上焦也宜清胃化毒甘露飲加犀角連翹咽痛者亦由余毒留於管籥肺受火淫而為腫痛也如聖飲若收靨之後目閉不開或生翳膜疼痛昏暗者俱宜涼血解毒清心瀉肝隨證治之若收靨未齊忽發餘毒而身面目睛俱赤者難治翁仲仁云痘瘡既靨之後或成癰腫人固知為餘毒矣不知氣高而喘息作聲擷背抬肚者餘毒之在肺也痰涎稠黏咬牙戛齒泄瀉不止而口臭者餘毒之在脾胃也盜汗出於胸前向午則熱而渴者餘毒之在心包也睡中多驚身常發熱餘毒之在肝也耳輪與尻常熱餘毒之在腎也眼合不開身腫不消壯熱不清鬱鬱不樂諸經皆有餘毒也又須知發於巔頂及胸者為心經之毒發於臂肘及背者肺經之毒發於脅膝及筋聚處者肝經之毒發於七節之傍及尻上者腎經之毒發於正面及咽者胃經之毒肝肺及胃之毒多易治心毒多危腎毒不必治也大抵血熱毒盛而發者其毒必焮腫色赤能食便祕並宜消毒飲加解毒涼血藥胃氣實者排毒散微下之若氣虛毒盛而發其毒必漫腫色淡食少便滑雖用參耆內托多不可治若用犀角芩連地黃之屬是速其斃也如遍身流注清水延綿不已者不治婦人女人天癸既至陰常不足痘瘡以氣為主血為輔一有不足則變易生如發熱之時正遇經來此熱從血解瘡自發出最為吉兆若四五日不止則熱入血室血必妄行內動中虛之證也小柴胡加芎歸若非經行之期於發熱時而經忽至者此毒火內熾逼血妄行必瘡多毒盛急以犀角地黃湯加紫草蟬蛻牛蒡連翹使熱清毒解痘出經止方無變患遲則內虛瘡陷矣又如起發灌漿之時適遇經行三四日不止必難起發灌漿或平塌或灰色或黑陷急用十全大補湯加熟附使起發灌漿或出贈痘為吉若寒顫咬牙喘滿者為內脫不治又如起發灌漿之時經水適來或口喑不能語者乃血去心虛不能上榮於舌先與保元湯加歸地門冬茯神棗仁待其能言後以十全大補湯加豬心血調服又經不斷之時適逢出痘發熱神昏言語狂妄循衣撮空如祟狀者此經後血室空虛邪熱乘虛而犯衝脈也四物湯合導赤散加麥冬又如崩漏不止氣血俱虛之後出痘此必不能勝任雖十全大補多不可救又如向來經閉不通血海乾涸適逢出痘毒氣怫鬱衝任之間二陽之證併發攻之則妄行不止宜歸脾湯調其心脾使毒得發泄庶或可救至如孕婦出痘最為可慮不問輕重悉以安胎為主胎動不安者四物湯加參朮砂仁有熱證當用黃芩必須酒炒胎安痘出稠密參耆內托散加紫草歸芍至如痘瘡正在起發灌漿時忽遇分娩氣血俱虛十全大補倍參耆加熟附子以補氣血甚則大劑保元湯更加膠艾薑附續續灌之若小腹急痛瘀血未盡須加肉桂胎下之後絶無瘀血按之急痛者此必瘀積小腹加炮黑山楂以伏龍肝煎湯代水煎藥臨服再加熬枯黑糖半兩最妙若咬牙寒顫腹痛作渴手足冷身熱者此脾胃內虛而顯假熱於外也十全大補湯加熟附服後止者吉不止者凶如産後半月十日之間適遇出痘此氣血新虛必以大補氣血為主大抵男婦婚嫁之後出痘其頂必不能高聳其形多大而扁闊其色多淡而不黃不可拘小兒元氣未發泄之例也痘形痘瘡從顴骨上起者曰當顴痘朗朗不妨稠密者危在口兩角出者曰監門痘後必成水泡及瀉下頤先出曰脫須痘漿雖充灌終屬危候痘出紅活光澤粗細一勻者曰石痘吉手足四肢皆有惟身少者曰四腕痘凶吉相半若身面皆無者不治通身皆有足心無者曰無根痘須看周身多少少者吉多者凶上身少下身多者曰逆痘凶上身多下身少者曰順痘吉上下有而中間少或兩脅多而腹上無腿上不起者曰兩節痘危此證當從虛治胸前獨多曰瞞心痘多凶加渴瀉者不治兩腰每邊一個紫大者或皆紫黑如蚤咬者及未出先見腰痛者曰折腰痘五日死初報點五七粒成叢數十處皆然者曰梅花痘起腫必達成一片平塌若有贈痘光澤如珠者吉贈痘亦平塌枯滯者凶報點周時即痂復又報點如是數番名九焦痘可治若當額地角顴骨心胸背手耳後有一二個黑陷者亦曰九焦不治痘粗肥而嬌紅色豔不能結實名晃痘不可因其好看而妄斷為吉急宜調補脾氣否則為溏瀉癢塌之患痘出而頂有皺紋者曰椒皮痘或紋如茱萸者皆不治痘出紅潤而中心少有黑點者曰茱萸痘為血熱可治中黑陷而四圍灰白者曰陷頂痘九日死初出狀如蚊蚤所齧三日後反不見者曰反關痘五日死痘起黑陷或紫黑中有血疔者曰紫疔痘七日死痘瘡中有紫黑疔生於頞上太陽當心者曰黑疔痘三日死痘黑而光澤者曰賊痘有背部與當顴監門及拘腮鎖口俱用銀針挑破以珍珠散塗之初起瘡色淡紫成片曰紫雲痘十日死痘未出時先驚搐曰先驚痘不必治驚痘出自愈若出而覆沒雖少而不起發者難治若已出而發驚者曰逆驚痘不治痘起稠密無縫紫黑成片而發搐者曰驚搐痘不出六日死痘出雖有縫粒密而色昏者曰數臾痘不治痘出不圓不起頂紅根白者曰頂紅痘不治痘空處有云頭紅色者名夾斑痘治之而斑退痘起者吉否則凶痘空處細密有頭粒者曰夾疹痘痘稀而疹先退者輕痘密而疹不退者重痘出大便祕結而痘瘡朗朗紅活者曰關門痘不妨痘瘡不成膿而內瀉痢者曰伏陰痘治宜溫里痘瘡紅潤而引飲渴不止及狂言讝妄者曰向陽痘治當涼解痘瘡正出而胸膈高腫內不寬者曰結胸痘下之生遲則死周身皆收靨脫痂巔頂一粒紫大不收者曰鶴頂痘二十日外必發驚而死亦有周身痂脫正額一粒潰而不斂至月餘作癢破出臭膿聲啞悶亂而死者有周身痂脫頭上一粒不斂至四七日忽癢甚出蛆聲啞悶亂而死皆鶴頂之類也有收靨脫痂之後忽身發火熱舊靨愈處重出一番痘竦囊聚腫痛愈加者曰檮杌痘此毒蓄營衛急宜涼血解毒當慎風寒節飲食否則必毒邪攻迫腹脹潰爛陰陽不分而死痘皮薄破爛者曰濕痘大劑補脾燥濕間有生者切禁黃耆以其反助表濕也痘一出如豆殼水泡兼腹瀉不止曰水患痘不治痘起脹而與肉齊平雖有黃漿根血紫滯者曰板黃痘亦名延日痘雖痂盡脫而日漸枯涸延至月餘多死痘四圍平塌闊薄中間一點色白而點者曰蟢窠痘必死痘出數粒面叢平塌不起者曰蛷𮔄痘治之起發分顆者吉否則凶初起發時瘡頭便帶白漿者曰疫痘不治痘點見於下頤或耳下眉心若白頭如㾦漸乾枯倒陷者曰白悶痘三四日死若報點如丹漸乾焦紫黑者曰紫悶痘五六日死若喘脹衄血便血者曰緊悶痘二三日死痘周身皆白內空殼一聯者曰蛇殼痘難治若變臭者可治痘瘡至漿來而潰爛臭不可聞者曰臭痘無妨臭而裂者為外剝不治痘稠密不能起發灌漿六七日間忽瀉膿血者曰瀉漿痘此證多有生者雖危不妨痘初起時光澤至四五日反不起而伏陷將發虛寒者曰伏陷痘急當扶里為主痘雖起發灌漿漿未足而忽然干靨者曰倒黶痘多危痘出既紅忽然變白更加寒顫咬牙者曰寒顫痘急當助表養血亦須防過十二十四朝方可無事若先出紅澤適遇婦人經事所觸而變灰白色者曰血厭痘急覓月月紅花或莖葉煎湯調紫草茸末一錢匙入酒釀服之緩則難救異痘夫痘有似凶而吉者似吉而凶者不可不辨如諸痘不起而天庭曉星起灌者吉諸痘壯起而天庭曉星不起者凶諸痘不起而太陽獨起者吉諸痘壯起而太陽不起者凶諸痘不起而耳邊方圓寸許獨起者腎經旺也吉諸痘壯起而耳邊方圓寸許不起者為腎敗也不治遍身俱起灌惟左耳下外面有兩三粒不起灌者肝腎毒盛定作唇裂齒乾宜急救之凡頭面四肢密者為險若得地角有數粒如珠者為順諸痘俱好地角獨伏陷乾枯或灰白不起者為逆痘遍身俱陷惟尻骨飽滿如珠此腎臟有權補托灌漿即愈面部俱稀而鼻梁左右密如蠶種者毒聚於胃也危面部俱稀而口角有黑痘一粒獨大或兩邊有兩粒者為攔門疔初起可救五六日不治痘出遍身稀疏惟項下稠密一片至頤者名鎖項托頤不治若喉頸太多者急用山豆根牛蒡子黑參木通甘桔芎歸生地荊芥輩治之遲則毒結咽喉不救矣初見標時胸上臍下俱有中間一截無者此脾胃虛急用參耆歸芷厚朴紫草木通防風輩救之七日之外難矣痘出遍身斑斑成片如打傷痕者不治痘標既完手足胸背俱多而頭面無者氣血不能上升也急用升麻芎歸甘桔防芷蘇葉前胡加姜服之五日後不治曲池生癰而死若遍身稀者不在此例初出便如緑豆兩三日大如棋子其痘根頂全無血色比衆獨大按之虛軟曰賊痘四五日出血而死痘出數十粒成塊肌肉結硬中有一大者曰痘母此血凝毒盛急須挑破內服真人解毒湯外用綿胭脂煮熱尉之尉之肉不柔和者不治頭面無空平塌色白俗名蛇皮此乾枯不能作漿至十一二日必危若得發臭而不剝裂者可治初標紅潤至四五日忽變伏陷此為藥患急扶表裡痘雖肥滿而內實幹無血水者死痘中有凹四邊特起明亮堅硬漿板不化形加石臼者不治痘瘡生蟲皆濕熱所化毒流皮膚也雖冬月亦有之以柳葉鋪下令兒臥上則蟲自死無柳葉時預收乾者為末香油調敷亦效初出血點其色紅紫遍身如點朱者六日死血泡協熱而漿肥滿刺泡血紅急以犀角地黃湯加白芍治之血黑不治痘本稀少四五日起發六七日收靨痂干而赤九日而痂落此氣血充足毒少故隨出隨痂不及作膿也最佳瘡雖起發四畔又出小痘攢簇如粟米不待長養灌漿必加搔癢而死瘡頭有孔膿水漏出堆聚乾結或清水自破水去幹黑者不治痘發漿泡而人中平滿唇翻腹脹氣急者不治痘發燎漿泡切忌損破漿臭後猶或可治破則不治其形如豆殼灰白全無血色擦破血出無膿不治痘已出齊紫色不起不漿如浮萍貼於肉上者不治如微微高起爬出有血急以涼血解毒之劑救之黑痘多屬血熱本為惡候然形狀多端宜隨證解救紫黑點子隱於皮膚間者用人牙燒灰豬尾血酒釀調五七分量人大小與之初出便見黑點急用紫草茸三錢酒煎服或形如痣或如牽牛子或如煤炭或青紫成塊皆為寒閉熱毒宜化毒涼血荊防蟬蛻紫草黑參木通連翹輩救之熱甚加黃連黑而軟大者氣弱毒盛也保元湯加紫草以上諸證竭力圖成或可十全一二也近看如水蓼花遠望如胭脂色清水不能成漿者不治先見標一二點於面部或口唇上下周身俱無如常起脹灌漿收靨此為報痘不知者以為本痘稀少以火照之紅點隱隱藏於肌肉之內急宜托裡解毒其痘齊出否則頤下發癰毒而成不救逆證痘瘡不治之證總勉強用藥終無生理初出時從天庭司空太陽印堂方廣等處發出或如蠶種或如魚膘或發點朱灑墨潑青成青黑紫斑或肌肉有成塊處或有青胳𦞂成紫黑乾枯或遍身有瘙疹或如玳瑁或頭面一片如胭脂或初出紅點帶紫或夾斑如錦紋者俱危於四五朝遲則不過六七朝也若見青斑者頃刻危矣若遍身不起俱發紫黑斑點或初起頂陷連肉通紅或如沸無縫或薄如竹膜摸之便破或如蛇殼如魚皮頂陷如羊眼赤亮如湯泡火燒或腰腹作痛上下出血或如糍糕成片連貫眼合無漿者俱危於七八朝遲則不過十朝也若四五日間面目浮腫而瘡不腫其痘黑陷紫陷或灰白或發紫泡水泡癢塌者危於十一二朝其泡刺破出黑血黃水者不治若四五日諸痘未灌漿唇上有瘡先黃失於針挑者不治若五六日內痘白而腫光亮如水根腳不紅或聲啞氣急或鼻陷齧齒或目閉忽開露白無神不省人事者不治若六七日不能灌漿但空殼乾枯全無血水搔破無膿血而癢塌者十二日死有膿血者不死二三日根窠不分紅腫如瓜或如冷粥結面或如胖蠶之形或如油光黍米內有紅紫或頂陷有眼如針孔色紫黑者俱不治若兩頰兩頤多致成片如塗朱者此肝乘脾當十二三朝不食而危若七八日間陷伏焦紫乾枯不能灌漿或咬牙寒顫讝語狂躁煩悶嗆水錯喉在七日前見者難治或目閉口中臭爛成疳延及內外者不治或七八日後腹脹氣喘有痰如拽鋸啼哭不止者可治無啼哭者不治或嫩薄易破抓塌成餅堆垛如雞屎泄瀉不止者不治或瀉下如豆汁或便膿血或乳食不化痘爛或口臭唇焦或目閉反開者不治或不時哽氣如欲大便狀或胸高突起神昏悶亂或舌卷囊縮咽腫不食或蜷腳不伸或憎寒四肢逆冷或目閉腹脹厥冷過膝或先痘後驚連發搐不止及痘後慢驚目無神而色青者皆不可治當靨癢塌無膿皮如血殼者必發寒顫咬牙口噤而死婦人經水不止或墮胎下血身大熱不退者並不可治凡發熱時頭溫足冷昏悶如癡渴飲不止者其痘必危凡腰下見點腰上不出者不治凡斜視之臉如橘皮不分肉地者死起脹時色白如飯平塌不起者死若此者乃毒盛血枯不可認以為虛寒之候至如可畏之證附列於後如不食或多渴寒顫困倦脾虛也戛齒噤牙腎經熱甚也煩躁體熱搖頭肝熱生風也吐逆泄瀉乳食不化便膿血者脾胃虛寒毒入大腸也瘡作黑坑內無膿血者腎熱脾虛也大小便澀口渴者心肺熱也喘急痰盛者肺熱甚也以上可畏之證內犯一二用藥得效者生不效者死若犯三四證必無生理也諸證頭疼可治目閉初起不治八九日無事十三四日凶咳嗽無事氣急初起無事八九日凶搖頭初起雖凶可治八九日後不治聲啞初起難治七八日可治痂落後凶兼喘急不治或哭泣聲啞色澤者可治色晦者不治喉痛初起可治痂落後凶讝語初起重痂落後凶心胸痛不治腹疼初起無事痂落後凶腰痛初起及痘中凶十四日後無事項不能舉天柱折雖結痂干靨二十日外必凶十指冷脾虛者可治毒盛者不治手足搖不治手足痛初起凶八九日無事足冷過膝不治眼耳出血不治鼻衄無事吐血鮮紅可治紫黑不治尿血不治大便血可治吐黃水腹不疼無事腹疼者凶吐清水無事吐濃痰無事吐臭痰不治錯喉初熱凶灌漿時不妨寒顫初起不治七八日後亦不可治咬牙初起不治起長時凶七八日後可治泄瀉清白寒也可治泄瀉黑水臟腑壞也不治吐蛔初起吐一二條無事多則凶十四五日吐出即死便出多者亦凶燥渴結痂後凶不食結痂後凶餘毒盛也看法朱濟川曰醫以認證為要凡一入門必先知其家貧富何如時月炎冷何如兒之稟賦何如形色善惡何如脈診微盛何如肌膚老嫩何如痘出稀密何如部位順逆何如氣血虛實何如表裡寒熱何如聲音清濁何如口舌燥潤何如睡臥安否何如舉止動靜何如飲食多少何如二便堅利何如又有凶中藏吉吉中藏凶不可不辨審此數者隨宜而治可也用藥痘瘡者血蘊也治宜活血為主故紫草紅花不可少紅甚便滑則忌山楂散血消積胃虛不能食則忌甘草解毒和中中滿則忌陳皮健脾行氣自汗則忌大腹皮利水治脹發散則忌牛蒡子疏風潤色滑竅通肌泄瀉則忌木通疏利膀胱溺多則忌訶子烏梅止瀉渴斂汗便實則忌參術扶元益胃血燥毒盛則忌升麻葛根升發開提痘密汗多毒盛裡實則忌羌活白芷敗毒追膿氣虛則忌歸芎活血補血血熱黑爛則忌芍藥地黃涼血助陰血寒不發則忌辰砂定神除熱卻煩灰白不發則忌糯米暖胃實脾氣滯則忌防風散風解熱氣喘則忌木香調氣散寒止腹痛瀉青斑黑燥渴則忌厚朴溫胃治脹煩渴則忌細辛發散上行通肺燥熱則忌柴胡發表透熱氣升則忌前胡除痰治嗽便泄則忌半夏消痰止嗽燥渴則忌麻黃紫蘇散表逐寒表虛則忌薑桂助血溫中血熱妄行乾紅焦紫則忌附子回陽補元治虛寒厥冷煩亂則忌大黃蕩滌實熱胃虛食少則忌人牙起發腎邪陷伏血熱毒陷則忌山梔降火下行氣虛便溏則忌犀角涼血止衄時值行漿則忌牡丹皮行血歸經痘前多汗則忌肉豆蔻健脾止瀉便實則忌桔梗開鬱發導用下則忌蟬蛻驅風散毒表虛汗脫則忌枳殼寬胸下氣氣虛下陷則忌胡荽乳香時焚開竅血熱毒盛煩渴衄汗則忌黃柏緑豆生甘草等分煎膏預先塗目眶或胭脂塗眼眶耳前使痘不侵目出後則忌一發熱起便以絲瓜近蒂三寸連子燒灰存性加辰砂酒服可使痘稀見點則忌每年端午日服之服久可使不出也禁忌痘瘡自初出至收靨時臟腑俱虛外邪易觸飲食易傷必須避風寒調飲食日用胡荽紅棗大黃乳香焚之若血熱毒盛禁燒胡荽紅棗之屬恐變煩渴焦癢之患如煎油炒豆殺牲腥血硫黃腦麝諸香蔥蒜糞穢之氣房事淫氣異服生人及鑼鈸金器之聲俱宜避之勿令洗面恐生水損眼故也眼鼻勿動其痂則無眼吊鼻齆之患行坐勿令太早免致腰痠腳痛之虞能食者與鯽魚白鯗之類切不可與生冷瓜柿梨橘韭蒜醋醬糍粽雞鵝椒姜辛辣等物雞子害目亦不可食近世多用鮮筍鮮魚發痘若脾胃虛寒者誤與每致泄瀉不食如天大寒蓋覆常宜溫暖恐毒氣為寒所滯則痘不能生髮也如天大熱勿使客熱與毒相併致增煩躁潰爛也其麻疹比之出痘固輕然調治失宜風寒不避禍不旋踵一切辛辣厚味助火酸收之物咸須禁食如酸醋胡椒豬肉核桃及梅杏櫻桃梨柿荸薺等類若誤犯之則有伏慝焦紫喘脹聲喑而難救也誤食雞則終身肌膚粟起誤食糖霜多發疳蝕必俟兩月後方無禁忌也麻疹總論麻疹者手足太陰陽明二經蘊熱所發小兒居多大人亦時有之是亦時氣傳染之類其發熱時多咳嗽多嚏多嘔眼中如淚面浮腮赤多瀉多痰多熱多渴多煩悶甚則躁亂咽痛唇焦神昏通身紅赤起而成粒勻淨而小斜目視之隱隱皮膚之下以手摸之磊磊肌肉之間其形若疥其色若丹以其陽氣從上故頭面愈多者為順法當清涼發散為主藥用辛散以升發之涼潤以清解之切忌酸收凡動氣燥悍及一切溫補之藥慎不可犯誤用禍不旋踵辛散如荊芥薄荷前胡葛根麻黃石膏鼠黏子涼潤如黑參栝蔞根葳蕤麥冬生甘草芩連貝母連翹竹葉皆應用之藥又當隨所發月時量兒大小及見證輕重而為製劑若漸出漸收者其勢雖輕而熱尚未平須防喘急若連綿三四日者其勢雖盛而熱已發泄必無他變宜大青湯或消毒飲加黑參石膏麥冬竹葉若發熱時遍身汗出或衄血者此毒解也勿遽止之若汗出太多血流不止當以清肺湯去款冬杏仁加麻黃根以斂汗犀角地黃湯以止血遲則氣虛神耗為難治也若發熱時或嘔吐或自利者此火邪內逼毒氣上下行也俱宜清熱解毒利小便切勿止澀大凡疹證發熱時未有不渴者但當與緑豆燈心湯勿與冷飲致成水蓄多生變幻也即葷腥酒面生冷水果咸須禁之麻疹多有熱痰在肺初發時必咳嗽宜清熱透表不得止嗽麻後咳嗽切忌辛溫酸澀但用清咽滋肺湯以清餘熱痰壅自愈多喘者熱邪壅肺也切勿定喘惟應大劑竹葉石膏湯去半夏加貝母黑參薄荷如冬天寒甚麻毒為寒鬱於內不得透出而喘加蜜酒炒麻黃一劑立止夏月熱勢甚者即用白虎湯加竹葉忌用升麻誤服必喘然喘為肺氣壅遏故喘必兼嗽而張口抬肩者肺竅不通不治也故諺有喘而咳嗽者可療喘而不嗽者難醫之語又其證多泄瀉慎勿止澀惟宜芩連葛根則瀉自止疹家不忌瀉瀉則陽明之邪熱得解是亦表裡分消之義又有疹收之後飲食如常卒然心腹絞痛遍身冷汗如冰者此元氣虛弱而中惡氣也朝發夕死勿妄治之凡麻疹以鮮明似錦為吉黑晦如煤最凶頭面不出者重紅紫黯慘者重咽喉腫痛不食者重黑黯乾枯一出即沒者不治鼻扇張目無神者不治鼻青糞黑者不治牙疳臭爛者不治疹之牙疳最為難治外用無比散吹之內服加味清胃散更加荊芥石膏緩則不救疹中諸患不宜依證施治惟當治本本者手太陰足陽明二經之邪熱也解其邪熱則諸證自退矣有夾痘而出者此毒氣太盛故一齊湧出不必治疹但當托痘為主然治痘宜溫治疹宜涼此又不可不審大人男婦出疹當與外感並治惟清涼解表隨天時寒暑施治凡麻痘並作臟腑風熱交患也麻乃風邪外感痘為胎毒內發二者相雜赤暈發焮多有誤認痘出太密而委之不救殊不知其為疹夾痘也當與化斑湯續續頻進麻毒解而痘自起矣有種行漿疹子極似痘最難看然痘則必有頂盤疹雖有漿而頭粒必不堅根盤必無紅暈也疹後痘不結痂乃元氣虧損當大補脾胃為主不可誤認邪熱未盡復與清熱退火之藥例治四十則麻疹俗名痧子浙人呼為瘄子麻病風熱人或未知痧之與瘄字學不收皆土音習俗之訛耳原其證之輕重今昔懸殊吾吳水土濡弱之鄉生氣最易萌動故麻疹之發自始至終不過二三日即安從古迄今靡不皆然邇來風氣變遷有似北方氣候即尋常麻疹必六七日乃化消若熱勢未盡或觸風寒或犯飲食變證百出其危有甚於痘者因遍考方書從無麻疹專學間有一二及此無非附見痘疹之末一皆簡略不詳何怪兒科之莫能舉措且以痘方混治曷知麻屬陽陽從陰化故外出內沒而不漿痘屬陰陰從陽化當外疏內托以助膿二者相去天淵烏不可辨然皆為嬰孺說也但今不特嬰孺少壯每多患此雖當參詳診切仍不能捨此繩墨而臨證之機活法在乎心手繩墨又不可拘也豫聞扁鵲入咸陽秦人愛小兒即為小兒醫豫由是隨時兼愛曲盡一貫之道為麻疹特開生面云發熱麻痘之初必由發熱但痘熱不過二三日即出麻熱有六七日或半月乃出或乍涼乍熱或壯熱經日不退始熱之際必見面赤眼腫多涕淚咳嗽連聲是其候也熱甚經日不退曰壯熱惟正出時為正候若初發壯熱至已出而熱不少衰者其證必重清熱透肌湯出盡而壯熱不退者竹葉石膏湯去半夏加荊芥黑參沒後而壯熱不退者危急需涼解為主其有熱數日止而復作者有早熱而暮退者在初發時為熱邪未透葛根解肌湯正出之際而煩熱轉甚乃邪熱未解而復內攻也清熱退肌湯沒後見者為餘邪未盡四物湯換生地赤芍加連翹黑參亦有麻退身涼越六七日而復熱者非餘熱未清即復感風邪當以意消息或因大病之後中氣虛而然者治本為要臨病之機不可不審也部位麻屬府候發則先動陽分而後婦陰經一身之中陽部宜多陰部宜少陽部宜透陰部即不透亦可無慮若陰部多而陽部反少不透者為險防有他變陽部者頭面背四肢向外者皆為陽陰部者胸腹腰四肢向內者皆為陰也凡發自頭至足為齊頭面多者為順先從胸腹暖處起漸發四肢者順如從手足起漸發胸腹背者逆形色色貴紅潤形貴尖聳若色雖紅潤而不起二便艱澀者清熱透肌湯如色淡不起二便如常此屬本虛當兼培養氣血亦有色黯不起大便祕結唇舌燥赤者為火邪內郁白虎湯加黑參荊芥其有色白不分肉地惟點粒高聳晬時即沒者邪熱本輕也然有表氣本虛而色白者調護溫暖越一二日自變紅活也若正出時為風寒所遏而色白如膚必毛竅竦栗葛根解肌湯或麻出成片一被風寒便變為白身不發熱而反內攻煩躁腹痛痰喘氣急者危如毒攻於胃則嘔吐清水攻於脾則腹脹不食攻於肺則鼻塞喘促攻於心包則唇舌焦燥不省人事搖頭掣手攻於腎肝則變黑而不救也若色紫赤而黯是火毒熾盛頂粒起者可治宜涼血飲子讝語煩躁者黃連解毒湯調益元散枯燥不起者難治若頂粒焦者無論紅淡皆為熱劇之候並宜白虎湯重用石膏乾燥無汗加麻黃以汗之大便祕者涼膈散下之亦有麻發如雲頭大片其形有二一者大片焮赤一者大片之上覆有小紅點粒皆火邪熾盛所致白虎湯加黑參竹葉若麻出斑爛如錦紋或出膿血腥臭不幹心胸煩悶嘔吐清水身溫熱者白虎湯加黃芩茅朮若初發時有似斑屑者乃風寒在表而成癮疹只宜疏解俟麻一透其疹自退切勿誤認為斑而與苦寒之劑致麻內陷而難救也咳嗽麻疹乾咳連聲不斷是火邪凌爍肺金所致然咳則毛竅開而麻易出故未出之先最喜咳甚發透其咳自已若出盡及沒後而咳仍不止者清咽滋肺湯咳嗽多痰去麥冬加橘皮茯苓其有感觸風寒咳嗽煩悶嘔逆清水眼赤咽痛口舌生瘡者甘桔湯加芩連沒後見者人參白虎湯去知母易麥冬以滋化之汗麻發之際常宜微汗微汗則肌腠疏豁而邪易透不可復用升發升發恐汗大泄不無亡陽之慮其有隱陷不透之壞證用權升發得大汗而解者此特語其變也若壯熱無汗而皮膚乾燥者必風寒壅滯難出多成內攻之候或腹脹痛或發喘促宜與葛根解肌湯冬月越婢三拗選用但不可過劑亦有因熱極火鬱皮膚乾燥而難出者必致唇舌燥裂二便祕澀壯熱昏沉或身體脹痛喘促痰鳴無論何時急宜白虎湯加黑參牛蒡芩梔竹葉之類大抵麻證當以微汗為順若始終無汗雖沒後不無餘咎其治總不逾上法也嚏麻疹初起而多嚏者是內火因風邪激搏而然正出時有嚏者其候必輕如沒後尚有嚏者邪熱盡解可無餘患矣如嚏而多涕者濁壅得泄肺氣自清最為吉兆若無嚏而鼻塞不通必有風邪留滯宜辛涼之劑以透達之嘔吐麻之初起吐瀉交作者順乾霍亂者逆欲吐不吐者危嘔吐是胃中熱邪不得發泄而作葛根解肌湯正出及正沒時見者消毒飲加枳實黃連多痰者更加貝母栝蔞根若沒後而嘔者脾胃虛而熱滯也石斛清胃散其有嘔而吐蛔者胃中痰熱膠固蟲無所養而上竄也能食即定如蛔出多而不能食為胃敗不治泄瀉泄瀉為麻疹之常候熱邪得以開泄也發熱時瀉而黃赤稠黏小水短澀者屬熱四苓散加木通滑石已出人參白虎湯去知母易麥冬其證必多發渴渴甚不止熱甚不退雖數劑無妨如瀉下清稀白沫腹疼喜得溫按者屬寒胃苓湯去蒼朮加煨姜瀉利窘迫而腹痛脹滿或暖氣如敗卵者為飲食停滯枳殼湯加楂柏木通大抵麻疹泄瀉屬熱者多屬寒者少辨治宜早不可令其瀉久瀉久則正氣下陷或成腫滿或變下利並宜枳實理中之類以理脾胃為主麻後瀉利不止口渴目閉四肢不溫者不治嘔吐不食洞泄不知者不治目麻疹發熱之時眼光如水而多眵淚或白睛微紅此正候也若沒後猶見紅赤為肺經風熱未盡瀉白散加荊芥薄荷黑參牛蒡閉不欲開更加連翹木通赤而腫痛者風熱上壅也導赤散加荊蒡黑參若為風熱所侵而眼眶赤爛者柴胡飲子急須治之否則為終身痼疾發不出初起發熱咳嗽渾身脹痛有似傷寒之候惟乾咳連聲目赤多淚嘔惡便溏確為麻疹之驗若將發之際或為風寒暴襲或因肢體坦露寒鬱熱邪不能外出此全盛之勢未萌與出後沒早不同如氣粗喘促腹中脹痛煩擾不寧而不得出急與麻杏甘石湯或越婢湯去棗重用石膏輕則升麻湯以升發之若因觸犯霧露風寒隱現不能發出以新豬矢沖湯隔簟蒸之冷則更添滾者並取豬矢燒灰蔥白湯下二三錢乃痘瘡黑陷用燒人矢之變法即燒人矢亦能發之發之仍不出者神丹不能復圖矣按古方麻疹升發劑中多用升麻曷知升麻性升能升動陽氣每致邪熱上浮而作喘逆當以紫蘇蔥白代用非特升麻當慎即桔梗初起亦須酌用恐其載引濁氣於上也蓋麻疹宜涼宜潤一切辛燥之味咸為禁劑用藥之機可不為之慎重乎透表麻疹無問尖大細小必得透表可無後患其有一種匾闊焮赤成塊塊上覆有小粒平塌不起者亦有一片如風毒偏高紅腫但頭粒不尖二者雖透其中必有熱邪留伏防有他變並宜竹葉石膏湯去半夏以滋化之縱有餘熱從此渙散矣不透表麻出而皮膚乾燥毛竅竦栗不能透表者風寒鬱遏也越婢湯葛根解肌湯隨輕重取用其有表虛不勝疏透者一味蔥白濃煎時時與之但得微汗即解若頭粒隱隱紅紫一片而不透表者火毒熾盛也白虎湯加荊芥黑參如肌膚不燥唇色淡白二便如常而不透者中氣本虛也消毒飲加連翹木通車前茯苓雖有蘊熱不可輕用寒涼即用峻劑升發亦必不能復透但當解利使之內化為主亦有胸背腰腹暖處起發而紅頭面手足乍有乍無此證必纏綿難已且有沒後五七日復發如前兩三天而愈者此氣候之異當非不透之比只宜辛涼透表漸次向安欲求速效轉增危殆沒早麻出未經三日或為風寒外郁或熱邪內陷或誤食酸收之物一日半日即沒周身暖處絶無紅影終變危候若雖沒早肌膚暖處尚未全沒急需透表發之不起即當審其所觸而與內解如外為風寒所遏邪反內攻而沒早者消毒飲加蔥頭熱服復透者吉甚則加麻黃穿山甲或越婢三拗選用若不急治必喘脹而死亦有遍身青紫熱腫喘脹氣急此毒滯血凝半匿肌表急投涼膈散去芒硝加麻黃石膏以發越之若腹脹喘促溺澀臍突者涼膈散加葶藶庶或可救一二若內挾痰熱火毒亢劇而伏匿煩躁或腹脹喘急不省人事者白虎湯加黑參竹葉若誤食酸醋收斂之物伏匿壯熱喘咳煩悶以豬膽汁制甘草煎成續續與之得吐微汗為效或苦瓠生甘草煎湯灌之亦能取吐吐中便有發越之義誤會豕肉喘脹氣急枳殼湯加山楂芒硝以下奪之誤食核桃喘咳聲喑消毒飲如石膏馬兜鈴若得熱退身安氣息漸調者方可無慮或大病之後或洞泄不止中氣本虛不能發越而沒早惟當健運中氣略兼解表清熱若沒後遍身搔癢者露風早也消風散以疏解之難沒西北水土剛徑稟質亦厚麻必五七日乃沒東南風氣柔弱麻出不過二三日即化邇來地運變遷未有不綿延數日者當非難沒之比若三四日後點燥色白隱隱於肌腠而難沒者此必衛氣素微不能焮發或衣被單薄阻其發越之機以致綿延多日法當辛散透達不可遽用寒涼蔽其開泄之路也渴渴乃肺胃熱盛之候唇口必紅二便祕澀者門冬甘露飲若二便清利唇色不紅而但渴者此必寒涼太過脾虛不生津液而作渴也七味白朮散去木香加糯米渴而煩躁者是熱邪凌爍心包白虎湯加麥冬竹葉正沒時竹葉石膏湯去半夏渴而腹脹者木虛實滯為難治也喘喘者熱邪壅遏肺竅氣道阻塞而然其證有虛實之分虛者難治實者易調虛則小便清利大便溏泄身無大熱雖清痰潤肺多難獲效實則大便堅燥小便赤澀身髮狀熱竹葉石膏湯去半夏加蔞仁貝母冬月量加蜜炙麻黃隨手而應若喘而無涕兼之鼻扇者不治大抵未出而喘者易治沒後喘者難治初發之時喘者三拗湯加石膏芽茶喘而臭干口燥者白虎湯最捷若見於麻後又宜清咽滋肺湯以滋肺胃白虎湯又為切禁故曰醫不執方活法在人耳氣促氣促多緣肺熱不清所致初發正出時見之清熱透肌湯在正沒沒後清咽滋肺湯如喉中有痰齁䶎而鳴者熱邪阻逆不得發越也見於初發正出之間除熱清肺湯正沒沒後見者必邪熱未透或露風沒早餘熱內攻而肺氣受傷也難治喑肺胃熱邪為風寒所襲不能盡達於表咳盛咽傷故喑宜清咽滋肺湯若喑而腫痛者射干消毒飲然喑為麻疹之常不可與痘喑比例搐搐為痰熱聚於心包見於初發未透之時清熱透肌湯加蔞仁竹葉沒後見者難治只宜輕清之劑調之不可誤用金石痰涎壅盛者一味栝蔞湧吐之若搐無痰鳴或自齧指者非真搐也此為正虛不能主持必死不治衄衄者火邪熾盛血隨火載上行而溢於鼻麻疹初起是為順候其熱得以開泄不治自已若衄之不止或失血者犀角地黃湯加荊芥穗正沒及沒之後衄仍不止者四物湯加茅根麥冬以滋降之譫妄譫妄是熱邪熾盛於心包若發熱正出時見者為火邪內伏不得透表而致白虎湯加荊芥鼠黏子甚則加麻黃以發越之在正沒沒後並宜竹葉石膏湯去半夏加生地黃以清解之咬牙痘證咬牙有寒熱之分麻疹咬牙皆為熱例乃陽陷於陰故多發渴而手足熱喜飲冷者麥門冬湯加丹皮若手足不熱而反厥冷喜飲熱湯此為熱邪內亢後必下血咽喉作痛痰鳴而死即與白虎湯多不可救唇燥唇燥多屬脾胃之熱淡而燥者其熱輕赤而燥者其熱深紫黑而燥者熱劇而重也隨輕重以清潤之唇舌破裂唇舌破裂者心脾之火上衝也其色必多深赤初發正出時見之白虎湯加芩連黑參荊芥薄荷若正沒沒後見者為心脾俱絶及紫黑枯燥而血不活者皆難治也口氣口氣穢濁乃熱邪蘊隆於胃清胃散加石膏連翹生甘草其有臭不可聞者此胃敗也不治若其人本有是證不在此例舌胎舌者心之苗麻本火候心屬於火故舌多有胎白為肺熱黃為胃熱但當清解疏利更參外證而為施治純黑為心絶黑而濕者熱淫血分黑而燥者熱淫氣分皆為危候並宜白虎湯濕者加生地黃黑參燥者加麥冬竹葉黑色漸退者吉不退者死口疳牙疳腐爛是熱留陽明餘毒上衝所致加味清胃散加石膏荊芥大便祕者當歸散微利之外用栗根白皮煎湯漱淨以無比散或燒鹽散吹之如通齦色白者自外延入內者無膿血者齒落口臭者喘促痰鳴者皆為不治若滿口唇舌黃赤白爛獨牙齦無恙者此為口瘡非牙疳也亦胃中餘熱未盡毒壅上焦二便必多艱澀導赤散以瀉心脾之火外以緑袍散敷之腹痛腹痛之由不一總為火毒內郁或風寒壅遏或飲食停滯皆能致痛於發熱正出時風寒壅遏毒反內攻而腹痛者急與疏表麻透自已若飲食過傷腹滿脹痛者力為消導其痛自除時當正沒沒未盡而腹痛者兼清中外而痛自止沒後見者分利餘熱其痛自愈又須驗其有無他證屬虛屬實而與治之若熱邪內結而腹痛者通利大便為主有麻後脾氣不調而致腹脹面目四肢浮腫分利小水為要至若元氣大虛陰陽不能升降小水不利遍身浮腫喘促兼見者難治便祕大便祕結火壅血燥而耗津液麻疹大非所宜無論日期前後速宜清潤四順清涼飲甚則涼膈散以通利之慎勿遲延恐麻變焦紫而難救也大抵麻疹自出至沒二便俱不宜祕祕即微利可也溺澀小便赤澀在初熱正出時熱邪澀滲是為正候沒後見之為餘熱下匿膀胱導赤散加麥冬以滋氣化利之仍不通者必大便祕郁之故大便一通小便自利痢麻之作痢為熱邪內陷在正沒或沒後而痢下色白者黃芩湯加防風枳殼下膿血者白頭翁湯去黃柏加防風或因食積而滯下者枳殼湯加楂柏木通腹中作脹時痛時止者厚朴湯亦有瀉久而成痢者乾薑黃芩黃連人參湯自始至終痢不徹者必有風毒留滯於內則宜解毒行滯而兼疏風實脾庶幾克應如痢下紫黯如癰膿如屋漏水如雞肝色如黑豆汁之類加之氣喘躁渴熱甚發厄噤口不食麻色紫晦者皆死不治下蟲下蟲多見於沒後此以胃熱少食蟲不能安而下也與過食傷中蟲不能容而下不同但須調其飲食自愈非上出之比不須治之睡麻疹正出時精神困倦沉睡不醒者為逆蓋緣正氣虧損邪火內郁正氣不勝所致若沒後而沉睡不醒者為氣血俱虛補脾養血為要如沒後煩擾而反不得寐是餘火復燃急需滋養陰血虛陽自斂亦有昏睡不知起止掐其頰車合谷不知疼痛似寐非寐無問正出沒後良非吉兆當察其兼見何證而與施治可也不食不食是胃中邪熱熾盛不可強與雖數日不食亦無妨害在初發正出時白虎湯加荊芥麻透熱清自有食也沒後不能食石斛清胃散量加健運之味元氣委頓者急需培補防有虛羸之患鼻扇鼻扇者肺將絶也若兼喘滿痰鳴此必不治如咽喉清利無喘滿而精神不減者可治宜滋培肺氣為主沒後見者死胸高麻疹胸高肺熱熾盛而脹也多見於正沒沒後為肺經壞證不治身冷麻為肺胃邪熱所發本屬於陽肢體常宜溫暖若反清冷如冰是為逆也其有沒後遍體溫涼如故獨下體厥冷過膝者為腎敗不治如初出腰以下不熱毒不能透而反漸沒者亦為逆候急當溫養脾腎或有得生者妊娠麻屬火候最易墮胎若初發正出時須驗其色之紅淡熱之重輕而與疏解疏解之中佐以清涼滋血安胎為主四物湯加條芩艾葉荊芥紫蘇之類若胎氣上衝急用苧根艾葉煎湯磨檳榔續進以降之一切實脾行氣溫燥之藥既礙麻疹復傷子氣咸須禁之虛羸麻患既平形體羸瘦精神倦怠飲食減少或咳嗽不止或便泄不已或身熱不除皆真元虧損恐成勞瘵並宜雙和湯去川芎以和之嗽加橘紅貝母咳加麥冬百合瀉加白朮扁豆食難孚化加砂仁穀芽氣血俱虛合四君子湯隨證調之切禁寒涼傷犯脾胃之藥專力資培緩圖平復可也麻瘡麻後發瘡多緣生水澡浴太早水氣留泊肌腠而發但須日以荊防艾葉煎湯洗之勿用生水亦不可用瘡藥熏塗失治必每歲依期而發雖云小疾亦須慎之水痘水痘者色淡漿稀故曰水痘色赤者曰赤痘將發之時亦皆發熱由紅點而水泡有紅盤由水泡膿泡而結疕但水痘則皮薄色嬌赤痘則紅潤形軟總不似正痘之根窠圓淨緊束也且見點起發灌漿結痂止於五六日之間其邪氣之輕淺可知皆由風熱鬱於肌表而發小兒肌肉嫩薄尤多此證當與大連翹湯解之亦有夾疹而出者有夾正痘而出者若先水痘收後而發正痘其痘必輕附種痘說痘本胎毒根於先天發則由於時氣以故沿門合境安危相率與疫癘傳染無異且多外挾風寒內停宿滯及乎跌撲驚恐為患種種匪可意料自伏波迄今天生天殺莫可誰何邇年有種痘之說始自江右達於燕齊近則遍行南北詳究其源云自玄女降乩之方專取痘氣熏蒸發兒胎毒於安寧無病之時則開發之機裕如不似正痘之天人合發內外合邪兩難分解也原其種痘之苗別無他藥惟是盜取痘兒標粒之漿收入棉內納兒鼻孔女右男左七日其氣宣通熱發點見少則數點多不過一二百顆亦有面部稍見微腫胎毒隨解大抵苗順則順必然之理如痘漿不得盜痘痂亦可發苗痘痂無可竊則以新出痘兒所服之衣與他兒服之亦能出痘總取同氣氤氳為胎毒之嚮導其盜機也天下莫能知而聖功生焉或有熱發出遲點不即起或雜發於麻疹之中須藥扶持者悉如正痘法調理自安當知胎毒有限助虐無窮況苗發之痘既無客邪鼓動血氣勢無癢塌悶亂之虞正氣內守雖酒氣穢氣略無妨礙脫痂絶無瘢痕口鼻亦無殘廢之厄允為避險就安之捷徑間有意外之變此兒正氣內奪加以客邪交迫時動必潰命之制在氣道之理也值此而與種痘未有不告變者故凡病後之兒及顏色太嬌骨幹太弱肌理太疏者皆正可以輕試也其於痘證初行疫邪方熾之時切須避其鋭氣當俟大勢稍平方可施補天浴日之妙用其間或有不順者此必苗非順痘醫非懾家是不能無揠苗助長之憾然皆方士之所為人知其神之神而不知不神之所以神吾以靜眼觀之曷若順天隨時不假強為之為愈也
