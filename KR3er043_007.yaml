body:
  text: 卷七大小府門泄瀉靈樞云夫中熱消癉則便寒寒中之屬則便熱胃中熱則消穀令人懸心善飢臍以上皮熱腸中熱則出黃如糜臍以下皮寒胃中熱則腹脹腸中寒則腸鳴飧泄胃中寒腸中熱則脹而且泄胃中熱腸中寒則疾飢小腹痛脹世醫治病但知熱以寒治寒以熱治外此總不講也設病中熱消癉而見懸心善飢洵為熱證無疑然必審其臍以上皮熱方是胃中熱氣蘊隆若出黃如糜不但胃中有熱而腸中亦為熱邪奔迫可知倘臍以下皮寒而見腹脹有似乎實熱固結實為胃中虛寒之候或見腸鳴飧泄非特胃中有寒且移寒於二腸矣蓋熱泄則腸垢黃赤寒泄則鶩溏清冷此病機之最顯著者可以明辨況有脹而泄利黃赤此脹為胃寒陽氣不布之脹泄為腸熱便垢之泄復有消穀易飢小腹脹痛之病豈非胃中有熱腸中有寒之一驗乎若此種種苟未明仲景三瀉心湯黃連湯乾薑黃芩黃連人參湯厚朴生薑半夏甘草人參湯乾薑人參半夏丸等法必不可以語至治也經云春傷於風夏生飧泄風木之邪內乘濕土也邪氣留連乃為洞泄邪氣留連既久則中氣失職而為洞泄無度矣清氣在下則生飧泄下焦虛寒火不生土則中氣不治而為飧泄食不化也大腸小腸皆屬於胃胃脈虛則泄脈者氣血之先脈虛則胃虛二腸失其上源而為泄瀉矣濕勝則濡泄脾惡濕濕勝則綿綿而瀉無止期矣諸厥固泄皆屬於下脾腎俱虛則陽氣不能運於四末故厥冷沉固而泄瀉清冷也暴注下迫皆屬於熱暴泄而肛門迸迫此屬火化若暴泄而肛門不禁即屬陰寒久泄而肛門不禁又屬陽虛所謂暴泄非陽久泄非陰是也諸病水液澄澈清冷皆屬於寒火氣炎上寒性潤下加以澄澈清冷安得不為寒乎原病式曰瀉白為寒青為風黃赤黑皆為熱也大抵瀉利小便清白不澀穀不化而色不變者寒也穀雖不化而色變黃赤煩渴小便赤澀者熱證也寒泄而消化者未之有也或火性急速傳化失常穀雖不化而暴泄臭穢色黃者有之仲景云邪熱不殺穀以熱得濕則飧泄也東垣云夏間淫雨陰晦時行瀉利予一日體重肢痛泄利而小便閉澀思其治法必用淡滲以利之今受寒濕之邪若從淡滲非暮年所宜行年五十以上降氣多而升氣少得淡滲之劑是降之又降陽氣愈弱精神愈短矣合用風藥以羌獨升柴甘防同煎所謂濕寒之勝以風平之又曰下者舉之是因曲而為之直也若不達升降之理而一概施治安得愈乎李士材云內經之論泄瀉或言風或言濕或言熱或言寒此明四氣皆能為泄也又言清氣在下則生飧泄此名脾虛下陷之泄也統而論之脾土強者自能勝濕無濕則不泄故曰濕多成五泄若土虛不能制濕則風寒與熱皆得干之而為病治法有九一曰淡滲使濕從小便而去如農夫治澇導其下流雖處卑監不憂巨浸經云治濕不利小便非其治也又云在下者引而竭之是也一曰升提氣屬於陽性本上升胃氣注迫輒爾下陷升柴羌葛之類鼓舞胃氣上勝則注下自止又如地土淖澤風之即干故風藥多燥且濕為土病風能勝濕所謂下者舉之是也一曰清涼熱淫所至暴注下迫苦寒諸劑用滌燔蒸猶當溽暑鬱蒸之時而商飈颯然倏動則炎熇如失矣所謂熱者清之是也一曰疏利痰凝氣滯食積水停皆令人瀉隨證祛逐勿使稽留經云實者瀉之又云通因通用是也一曰甘緩瀉利不已急而下趨愈趨愈下泄何由止甘能緩中善禁急速且稼穡作甘甘為土味所謂急者緩之是也一曰酸收瀉下有日則氣散而不收無能統攝注泄何時而已酸之一味能助收攝之權經云散者收之是也一曰燥脾土德無慚水邪不濫故瀉皆成於土濕濕皆本於脾虛倉廩得職水穀善分虛而不培濕淫轉甚經云虛者補之是也一曰溫腎腎主二便封藏之本雖屬水而真陽寓焉少火生氣火為土母此火一衰何以運行三焦熟腐水穀乎故腎虛者必挾寒脾虛者必補母經云寒者溫之是也一曰固澀注泄日久幽門道滑雖投溫補未克奏功須行澀劑則變化不愆揆度合節所謂滑者澀之是也以上九治治瀉之大法至於先後緩急之權豈能豫設須臨證之頃圓機靈變耳戴復庵云瀉水而腹不痛者濕也升陽除濕湯或胃苓湯飲食入胃輒後便完穀者氣虛也香砂六君子或枳實理中湯腹痛瀉水腸鳴痛一陣瀉一陣者火也黃芩芍藥湯痰留於肺大腸不固或時瀉或時不瀉或多或少者痰也脈必弦滑其人神色不瘁二陳加蒼朮木香或探吐之更佳腹痛甚而不泄泄後痛減者食積也保和丸消導之餐泄者史記名迥風水穀不化濕兼風也風邪干胃木來賊土清氣在下升陽除濕湯若飲食下嗌而輒出不留者死溏泄者汙積黏垢濕兼熱也黃芩芍藥湯加香連鶩溏者中寒糟粕不化色如鴨糞所以澄澈清冷小便清白濕兼寒也附子理中湯洞泄者即名濡泄體重軟弱瀉下多水濕自盛也胃苓湯水液去多甚而轉經血枯故筋急也升陽除濕湯滑泄者久下不能禁濕勝氣脫也四柱飲不應用六柱飲熱瀉糞色赤黃彈響作疼糞門焦痛糞出穀道猶如湯熱煩渴小便不利五苓散瀉水多者亦必用之若去桂即不效寒瀉腹脹泄注食即嘔吐理中湯加肉桂訶子升麻食久窘迫大便色白腸鳴切痛脈沉遲身冷不渴溲清或綿綿腹痛附子理中湯加肉果夏暑暴瀉如水周身疼痛汗出脈弱少氣甚者加吐此名緊病漿水散盛暑逼於外陰冷伏於其中非連理湯不可氣虛而瀉四君子加升柴肉果訶子傷食泄瀉必噯氣如敗卵臭保和丸虛者治中湯加減積滯泄瀉腹必絞痛方泄者是也平胃散加磨積藥傷酒瀉葛花解酲湯痰瀉則頭暈噁心胸腹迷悶或時瀉甚或時不瀉二陳湯加海石香附星香芩連薑汁調神麯糊丸服有人患早起泄瀉或時有血午後仍便結糞能食善飲此是酒積作瀉二陳加炮薑酒炒川連紅曲陳酒麴糊丸烏梅湯下有血去半夏加麝少許晨夕各一服日間無事將晡腹膨一夜腸鳴不得寬泰次早洞泄此名頓瀉是脾虛濕盛也胃苓湯加木香砂仁虛者理苓湯加木香氣泄腸鳴失氣胸膈痞悶腹急而痛瀉則腹下稍安須臾又急亦有腹急氣塞而不通者此由中脘停滯氣不流轉水穀不分所致木香調氣散水漬入胃名為溢飲滑泄渴能飲水水下復泄泄而大渴茯苓甘草湯五苓散並灸大椎三五壯立已乃督脈之病也泄而口渴引飲小便短澀此為津液內亡錢氏白朮散腎水不足之人患泄或過服分利之劑而渴者加減八味丸失治必致小便不利水腫脹滿等證成矣凡大便泄服理中湯小便不利大便反泄不知氣化之故本肺不傳化以純熱之藥治之是以轉泄少服則不止多服則愈熱所以不分五苓散加人參炙甘草名春澤湯經云膀胱者州都之官津液藏焉氣化則能出矣瀉而腹熱脈滑堅者屬實當與消導不應是食積發熱也加香連更不應加大黃微下之瀉而經年不止者屬寒積備急丸神效泄瀉噁心欲吐或水土不伏或感山嵐瘴氣而瀉藿香正氣散脾胃虛弱內挾風冷泄瀉注下水穀不化臍下㽲痛腹中雷鳴乃積寒久利腸滑不禁木香散若藥與食入口即瀉下者名直腸瀉難治本方加人參白朮用伏龍肝湯煎服憂思太過脾氣結而不能升舉陷入下焦而成泄瀉者逍遙散去歸加升麻木香或越鞠枳朮相和服不應用補中益氣加木香久瀉穀道不合或脫肛乃元氣下陷大腸不行收令而然補中益氣加訶子肉果五味烏梅肉為丸或四君子加防風升麻老人消運不及而膨脹作瀉九味資生丸加木香善飲者加澤瀉肉桂凡瀉多因於濕分利小水為上若老人氣虛下陷又宜風藥以勝之如補中益氣加羌防之類或升陽除濕湯升舉脾胃所謂下者舉之濕寒之勝以風平之是也大瀉氣脫而不知人口眼俱閉呼吸欲絕急灸氣海穴大進參附輩溫補之稍遲即不可救五更瀉是腎虛失其閉藏之職也經曰腎司開闔腎開竅於二陰可見腎不但治小便而大便之開闔皆腎操權也今腎既衰則命門之火熄而水獨治故令人水瀉不止其瀉每在五更天將明時必洞泄二三次以腎旺於亥子五更之時故特甚也惟八味丸以補其陰則腎中之水火既濟而開闔之權得宜況命門之火旺則能生土而脾亦強矣有用六味丸加沉香砂仁以山藥末打糊代蜜為丸以攝火歸源而愈者有用六味丸加遠志益智兼調脾腎而愈者有用六味丸七分雜二神丸三分服之而愈者有用五味子煎湯送四神丸者有用二神丸加五味子山茱萸肉桂茴香陳米飲糊為丸服者亦有屬酒積食積者蓋一日進取之物至此時皆下大府而急奔也但食積之瀉其腹必脹滿瀉後則頓減瀉下皆是稀糞酒積瀉下都是稀沫或有兼血積者與腎瀉之純清水液迥乎不同也審系何積即以何積治之石頑曰泄瀉諸治法頗詳何獨不及虛損之泄瀉也蓋腎臟真陰虛則火邪勝火邪上升必傷肺而為咳逆真陽虛則水邪勝水氣內溢必漬脾而為泄瀉既嗽且泄上下俱病先後天之氣並傷故虛損關捩全系乎此余嘗用理中丸加五味子以治下泄異功散加細辛以治上咳每每獲效若服之作脹發熱者終難挽回不可以其咳瀉俱緩輕許其治也診內經云脈細皮寒氣少泄利前後飲食不入是謂五虛死其漿粥入胃泄注止則虛者活泄而脈大者難治大便赤瓣飧泄脈小者手足寒難已飧泄脈小手足溫者易已脈經云泄注脈緩時小結者生浮大數者死又洞泄食不化脈微小留連者生緊急者死脈滑按之虛者必下利腎脈小甚為洞泄脾脈小為泄瀉仲景云下利日十餘行脈反實者死腹鳴而滿四肢清診其脈洪大者死腹大脹四肢清脫形泄甚不及一時而死下則泄瀉上則吐痰皆不已為上下俱脫死滑伯仁治一人年老色蒼夏月與人爭辨冒雨勞役受飢且犯房事夜半忽病發熱惡寒上吐下瀉昏悶煩躁頭身俱痛因自發汗汗遂不止脈皆洪數蓋吐瀉內虛汗多表虛兼之脈不為汗衰瀉減法在不治姑以大劑參耆兼白朮乾薑甘草茯苓陳皮水煎不時服至七劑見面赤四肢發出紅斑凡斑證自吐瀉者吉謂邪從上下出也但傷寒發斑胃熱所致今之發斑由胃虛而無根之火遊行於外可補不可泄可溫不可涼若用化斑升麻黑參之類則死生反掌矣仍服前方十餘劑而愈又治一人每日早起大瀉或時腹痛或不痛空心服熱藥不效令至晚食前服即效以暖藥一夜在腹可勝陰氣也與酒客濕泄服湯藥不效服丸散即效同意石頑治總戎陳孟庸瀉利腹脹作病服黃芩白芍之類脹急愈甚其脈洪盛而數按之則濡氣口大三倍於人迎此濕熱傷脾胃之氣也與厚朴生薑甘草半夏人參湯二劑痛止脹減而瀉利未已與乾薑黃芩黃連人參湯二劑瀉利止而飲食不思與半夏瀉心湯二劑而安痢內經云賊風虛邪者陽受之飲食不節起居不時者陰受之陽受之則入六腑陰受之則入五臟入六腑則身熱不時臥上為喘呼入五臟則䐜滿閉塞下為飧泄久為腸澼賊風不雲實邪而言虛邪者以邪之所湊其氣必虛也設陽氣充盛雖有賊邪莫能為害也起居不時者非特勞役失宜而飲食失節亦在其中矣陽受之則入六腑者言六腑之經氣受邪於外則營衛氣塞而身熱不時臥上為喘呼者邪並於氣之象也陰受之則入五臟者言五臟之神氣受傷於內則水穀不能克運留於腸胃而腹滿飧泄也久為腸澼者言臟氣久滯不能統運津液乃至移於二腸而為澼積崩迫此則陰氣受傷所致也腸澼便血身熱則死寒則生腸澼為腸胃受病不當更見表熱表熱則內外俱困陽無所依故云熱則死寒則生耳腸澼下白沫脈沉則生浮則死腸澼下白沫為裡氣不守反見脈浮中宮無主安得不死腸澼下膿血脈懸絕則死滑大者生腸澼之屬身不熱脈不懸絕滑大者生弦澀者死以藏期之懸絕弦澀皆氣血殆盡之脈故主死滑大為邪實可攻之象故主生脾脈外鼓沉為腸澼久自已肝脈小緩為腸澼易治脾脈外鼓沉言氣口脈盛而按之有力雖久可治肝脈小緩謂人迎緩而不大無客邪乘脾之候故易治腎脈小搏沉為腸澼下血血溫身熱者死心肝澼亦下血二臟同病者可治其脈小沉澀為腸澼其身熱者死熱見七日死腎脈小搏沉而乏陽和之氣且見血溫身熱為真陰下脫故死心肝澼亦下血即前外鼓沉及小緩之脈證以脾為心之子心為肝之子故二臟同病者可治若見脈小沉澀為營血內竭加以血溫身熱不出七日必死也腎移熱於脾傳為虛腸澼死不可治土衰不能制水先後天脾胃俱敗也陰陽虛腸澼死陰虛則血溫身熱陽虛則支冷不食泄而脫血脈實皆曰難治下脫而見脈實脈證相反純屬邪氣用事故為難治仲景云夫六腑氣絕於外者手足寒上氣腳縮五臟氣絕於內者利不禁下甚者手足不仁下痢脈沉弦者下重脈大者為未止脈微弱數者為欲自止雖發熱不死下利手足厥冷無脈者灸之不溫若脈不還反微喘者死少陰負趺陽者為順也下痢有微熱而渴脈弱者令自愈下痢脈數有微熱汗出令自愈設脈緊為未解下痢脈數而渴者命自愈設不瘥必清膿血以有熱故也下痢脈反弦發熱身汗者自愈下痢氣者當利其小便下痢寸脈反浮數尺中自澀者必清膿血下痢清穀不可攻其表汗出必脹滿下痢脈沉而遲其人面少赤身有微熱下痢清穀者必鬱冒汗出而解病人必微厥所以然者其面戴陽下虛故也下痢後脈絕手足厥冷晬時脈還手足溫者生脈不還者死下痢腹脹滿身體疼痛者先溫其里乃攻其表以上金匱要略下痢脈滑而數有宿食當下之下痢不欲食者有宿食當下之下痢而腹痛滿為寒實當下之下痢腹中腎者當下之下痢脈遲緊為痛未欲止當溫之得冷者滿而便腸垢下痢身軀疼痛急救里諸溫之屬可與理中四逆附子湯熱藥急投之美下痢大孔痛者當溫之下痢脈大浮弦下當已下痢舌黃燥而不渴胸中實下不止者死下痢已瘥至其年月日時復發者此為下不盡更下之愈風寒重者不可下下之後心下堅痛脈遲此為寒但當溫之脈沉緊下之亦然脈大浮弦下之當已下痢脈浮大此為虛以強溫之故也設脈浮革者因爾腸鳴當溫之以上千金參補下痢三部脈皆平按之心下堅者急下之宜大承氣湯下痢脈遲而滑者實也痢未欲止急下之宜大承氣湯下痢脈反滑者當有所去下乃愈宜大承氣湯下痢譫語者有燥屎也小承氣湯主之下痢便膿血者桃花湯主之熱痢下重者白頭翁湯主之下痢後更煩按之心下濡者為虛煩也梔子豉湯主之下痢清穀裡寒外熱汗出而厥者通脈四逆湯主之下痢肺痛紫參湯主之氣痢訶梨勒散主之保命集云膿血相雜而脈浮大慎不可以大黃下之下之必死謂氣下竭而陽無所附也凡陰陽不和惟當分利陰陽經云暴泄非陽久泄非陰大便完穀下有寒有熱熱者脈疾身多動音聲響亮暴注下迫此陽也寒者脈沉而細身不動作目睛不了了飲食不下鼻準息微者姜附湯若身重四肢不舉朮附湯證也東垣云飲食一傷起居不時損其胃氣則上升清陽之氣反下降而為飧泄久則太陰傳少陰而為腸澼寒冷之物傷於中䐜滿而脹傳為飧泄宜溫熱以消導之濕熱之物傷於中而下膿血者宜苦寒以疏利之風邪下陷者升舉之濕氣內盛者分利之裡急者下之後重者調之腹痛者和之洞泄腸鳴脈細微者溫之收之膿血稠黏數至圊而不能便脈洪大有力者下之寒之此治痢之大法也張介賓曰腸澼一證即今之所謂痢疾也其所下者或赤或白或膿或血有痛者有不痛者有裡急後重者有嘔惡脹滿者有噤口不食者有寒熱往來者雖其變態多端然總不外乎表裡寒熱而於虛實之辨尤為切要凡邪因表者必有表證但兼其表而行散之表邪解則痢自愈如無表證則必由口腹悉屬內傷但傷於內者極多因於表者則間或有之此內外之不可不辨也以寒熱言之則古以赤者為熱白者為寒至劉河間而非之曰如赤白相兼者豈寒熱俱甚於腸胃而同為痢乎至丹溪則因之曰赤痢乃是小腸來白痢乃是大腸來皆濕熱為本自二子之言出則後世莫敢違之者愚見則有不然夫痢起夏秋濕蒸熱鬱本乎天也因熱求涼過吞生冷由於人也氣壯而傷於天者鬱熱居多氣弱而傷於人者陰寒為甚須知寒者必虛熱者必實更以虛實細詳之而寒熱愈明矣如頭疼身熱筋骨痠痛者實也脹滿惡食急痛拒按者實也煩渴引飲喜冷畏熱者熱也脈強而實者實也脈數而滑者熱也外此則靡非虛寒矣而相似之際尤當審察如以口渴為實熱似矣不知凡系瀉痢必亡津液液亡於下則津涸於上安得不渴更當以喜熱喜冷別虛實也以腹痛為實熱似矣不知痢出於內腸胃必傷膿血稠黏安能不痛更當以痛之緩急按之可否臟之陰陽腹之脹與不脹脈之有力無力分虛實也以小便之黃赤短少為實熱似矣不知水從痢去溲必不長溲以陰亡溺因色變更當以便之熱與不熱液之涸與不涸色之澤與不澤分虛實也以裡急後重為實熱似矣不知氣陷則倉廩不藏陰亡則門戶不閉更當以病之新久質之強弱脈之盛衰分虛實也至於治法須求何邪所傷何臟受病如因於濕熱者去其濕熱因於積滯者去其積滯因於氣者調之因於血者和之新感而實者可通因通用久病而虛者可塞因塞用皆是常法獨怪世之病痢者十有九虛而醫之治痢百無一補氣本下陷而再行其氣後重不益甚乎中本虛寒而復攻其積元氣不愈竭乎濕熱傷血者自宜調血若過欲推蕩血不轉傷乎津亡作渴者自宜止泄若但與滲利津不轉耗乎世有庸工專守痛無補法且曰直待痛止方可補耳不知因虛而痛者愈攻則愈虛愈痛矣脈來微弱者可補形色虛弱者可補口腹素慎者可補胸膈寬快者可補病後而痢者可補因攻而劇者可補後重之可補者陷則升而補之熱則涼而補之腹痛之可補者滑泄則澀而補之虛寒則溫而補之然而尤有至要者則在脾腎二臟如瀉而後痢脾傳腎為賊邪難療痢而後瀉腎傳脾為微邪易醫是知腎為胃關開竅於二陰未有久痢而腎不損者故治痢不知補腎非其治也凡四君子補中益氣皆補脾虛若病在火乘土位侮母設非桂附大補命門以復腎中之陽以救脾家之母則飲食何由而進門戶何由而固真元何因而復耶若畏熱不前僅以參術補土多致不起大可傷已喻嘉言曰內經云下痢發熱者死此論其常也仲景云下痢手足不逆冷反發熱者不死此論其暴也蓋暴病有陽則生無陽則死故虛寒下痢手足不逆冷反發熱者或其人臟中真陽未漓或得溫補藥後真陽隨返皆是美徵此但可收拾其陽協和其陰若慮其發熱反如常法行清解之藥鮮有不殺人者矣金匱申下痢發汗之禁謂下痢清穀不可攻表汗出必脹滿蓋以下痢一傷其津液發汗再傷其津液津液去則胃氣空而下出之濁氣隨勢上入胃中遂成脹滿求其下痢且不可得寧非大戒乎傷寒厥痢發熱與下痢發熱迥然不同傷寒厥而且痢為虛寒之極所以反能食者則死反發熱者不死若痢證則能食者不死發熱者多死也周慎齋曰凡生病處皆為陰為火為陽氣不到若陽氣所到之處斷無生病之理痢疾不發於夏而發於秋者蓋夏時陽氣盡發於表太陰主裡濕土用事純陰無陽或過食生冷積而不化積久成熱痢之所由起也不發於夏者無陽則陰不運發於秋者陽氣入里攻之使然也治法宜以苦寒之藥燥濕滌熱佐以辛熱助陽開鬱達氣故曰行血則便紅自愈調氣則後重自除雖然亦有虛實之辨淺深之別未可以概治也心者血之主也肺者氣之主也凝滯則傷氣鬱熱則傷血氣既病則心肺亦病矣而小腸者心之合也大腸者肺之合也二經皆出納水穀轉輸糟粕之官也而胃又為大小腸之總司肺移病於大腸則氣凝澀而成白痢心移病於小腸則血凝澀而成赤痢大小俱病則赤白互下胃土傳濕熱於大小腸者痢色兼黃如胃中先傷冷物以致胃寒不能遊溢精氣上輸於脾脾即不能散精以上歸於肺則津液留滯於胃即為胃家之積其證嘔逆噁心其狀色如桃膠而不臭右關脈沉細而緊宜用厚朴木香乾薑肉桂吳茱萸等虛人可用附子理中湯非大小腸積之可比也至於色之黑者分為二種如焦黑之黑者此熱極反兼勝己之化也黃芩芍藥湯下香連丸如漆黑之光者此瘀血凝久而然也桃核承氣湯丹溪謂仲景可下者悉以承氣下之大黃之寒其性善走佐以厚朴之溫善行滯氣緩以甘草之甘飲以湯液盪滌腸胃滋潤輕快積行則止局方例用熱藥為主澀藥為臣用之於下痢清白者猶可其裡急後重者皆屬於火又加以溫熱之藥非殺而何大凡熱痢仲景雖有用大承氣者然皆指傷寒熱邪傳裡致病非滯下之謂蓋大黃專攻濕熱在所必需芒硝專攻燥結滯下總有裡急後重其積滯已是下注故無復用芒硝之理若系寒積又須薑桂吳茱萸以溫之以寒積多屬於虛也至於通因通用原有兩法有酒蒸大黃有蠟丸巴豆分析甚明況滯下多因寒滯鬱熱而成世俗恆用薑茶煎赤倍芽茶白倍生薑往往獲效豈可偏執為熱哉積有新舊之分舊積者氣血食痰所化也新積者舊積已去未幾而復生也然舊積宜下新積禁下其故何也蓋腸胃之熟腐水穀轉輸糟粕者皆營衛灑陳於六腑之功今腸胃有邪則營衛運行之度為之阻滯不能施化故衛氣鬱而不舒營血澀而不行於是飲食結痰停於胃糟粕留於腸與氣鬱血澀之積相挾而成滯下矣必當下之以通其壅塞既下之後升降仍不行清濁仍不分則衛氣復郁營血復澀又成新積烏可復下乎但理衛氣和營血以調順陰陽則升降合節積亦不滯而自化矣然舊積亦有不可下者或先因脾胃之虛不能轉輸其食積必當調補脾胃兼行氣之藥俾虛回而痢自止世俗治痢只守清熱破氣攻積涼血利水等法雖朝夕更醫出入增減不過如此已瀕於危猶曰血色依然腹痛未減誰敢溫補死無後悔傷哉痢初起時便見膿血者宜調氣和血氣分藥必不可少若但見白膿宜調氣消積不可用血藥引邪入於血分必變膿血也白痢初起裡急後重頻欲登圊及去而所下無多才起而腹中復急皆濕熱凝滯所致胃苓湯加木香砂仁血痢初起腹痛迸迫或脈數大身有微熱者先與小建中湯和之中有肉桂伐肝和營最捷膿血稠黏勢甚不可遏者黃芩芍藥延胡索木香砂仁腹痛少加肉桂以和之血積稠厚可用黃連若略見少血或稀淡者不可便用苦寒戕犯胃氣為害不淺也凡血色紫黯屢服涼藥而所下愈多作冷痢治故血色如豬肝如紫草如莧菜汁者非炮姜不治理中湯去參加肉桂木香肉果烏梅純下血而色鮮濃厚者此心脾伏熱也大黃黃連瀉心湯有食積枳朮丸加厚朴黃連木香延胡索赤痢初起宜加延胡最散血積小兒八歲已內者作食積治風入腸胃純下清血或濕毒下血胃風湯加枳殼荊防風入腸胃下痢青綠雜色神術湯下痢腹痛異常脈沉而緊無熱證者先以薑桂之類溫之後理積滯裡急而至圊反不能即出者氣滯也疏通為主重則小承氣輕則黃芩芍藥湯裡急而頻見汙衣者氣脫也補中益氣去當歸加木香濕熱下痢後重升陽除濕湯虛滑而後重者圊後不減以得解愈虛故也養臟湯白痢初起但腹痛後重不能食小便卻清痢者為虛寒二陳湯加炮薑焦朮厚朴木香砂仁能滌除痰積宜加用之後重本因邪壓大腸墜下是以用大黃檳榔輩此實也若久痢後重不除此脾氣下陷之故宜升柴以升提之檳榔枳殼皆當禁用若肺氣鬱在大腸腹痛後墜理氣藥中須加桔梗以開之亦有積已去而過食厚味生冷復重者建脾兼消導為主痢如膠凍或如鼻涕或如魚腦此為冷痢先用木香焦朮豆蔻砂仁厚朴次用理中湯加木香不應更加訶子粟殼下痢脈遲緊腹痛未欲止當溫消之枳實理中湯下痢清白手足厥冷腹痛不已附子理中湯積久冷痢少腹痠痛結滯不爽及下久連年不止千金溫脾湯冷痢去甘草加桂心倍香附人參熱痢去桂心加大黃一錢薑附人參各減一錢久痢不瘥雖所下漸減而津血枯槁肛門澀滯者千金羊脂煎潤以導之羊脂本經專主下痢脫肛腹中絞痛而世罕知用惜哉暴下積日久不止千金附子湯久痢虛冷滑脫脈細皮寒少氣畏食不能言或時發虛熱者附子理中湯加肉桂肉果訶子下痢臍下攪痛桃花丸下痢久脫虛冷白滯大桃花湯熱痢二三年不止者厚朴湯久痢所食之物皆不化四肢沉重肌肉消盡椒艾丸下痢發熱自汗脈弦者是伏邪所發法當從表解散倉廩湯有一方長幼相染者謂之時疫痢亦宜倉廩湯一種陰虛痢疾切戒攻積之藥凡見痢下五色膿血稠黏滑泄無度發熱煩渴臍下急痛至夜轉劇而惡食或下鮮血者便屬陰虛急宜救熱存陰為主如駐車丸阿膠丸歸連丸阿膠梅連丸千金黃連湯黃連阿膠湯白頭翁加甘草阿膠湯等方選用下痢至夜發熱煩渴引飲為津液受傷內水虧竭燎原之火自焚不得不引外水以濟急切不可用香燥之藥錢氏白朮散加烏梅下痢失氣者當利小便陰氣前通則陽氣自化矣五苓散加木香痢仍不止以訶子厚朴橘皮等分丸服下痢大孔痛宜溫之黃耆建中加木香當歸痢後大便秘澀裡急後重數至圊而不能便或少有白膽此為氣虛下陷慎勿利之但舉其陽則陰自降矣補中益氣湯加防風下痢后里急後重不除風邪傷衛衛氣不行也非三奇散不愈蠱注毒痢血如雞肝心煩腹痛者茜根丸虛人理中湯加黃連烏梅不應用烏梅丸下利後遍身浮腫五苓散用生朮肉桂加升柴利後虛浮六君子加木香肉桂初利膿血稠黏勢甚宜下者一味大黃酒蒸為丸赤多用溫酒下百丸白多用淡薑湯下七十丸以奪其勢然後調理則易愈冷熱不調下利赤白兼冷食食積者連理湯加枳實砂仁下利乾嘔者胃虛而寒熱錯雜也外臺黃芩湯先前白利後變膿血者戊己丸先前白利後變鮮血者四物湯去地黃加炮薑炙甘草木香先前膿血後變赤白青黑腹痛倍常者駐車丸先前膿血後變白沫白膿者補中益氣加炮薑赤石脂下利日百度精神委頓反不痛者此邪氣勝正氣微不能鼓激也難治有患利晝夜不及數度而反發熱心下痞悶不能食而嘔其有晝夜不止百度反脈靜身涼而能食何也曰利之邪客於下焦由橫連竟傳大腸原無反熱之理以中焦無病雖下利無度不礙飲食惟邪發於中焦由橫連入胃以胃受病自不欲食也凡風寒傷於營衛之中則為瘧飲食傷於腸胃之內則為利而世有瘧後痢痢後瘧者此則表氣不固邪氣內犯而致也若瘧邪發泄已盡必無復為利疾皆由元氣下陷脾氣不能升舉故風寒暑濕得以襲入而為利耳又有利後似瘧非瘧乃陰陽兩虛陽虛則惡寒陰虛則發熱故寒熱交戰似瘧也又有瘧利齊發瘧止而痢甚者皆是脾胃之氣虛陷所致並宜先與黃耆建中加木香厚朴之類次與補中益氣加薑桂若服後痢減而瘧作此陽氣得補而與陰爭也再與補中益氣少加桂附助陽祛陰則愈凡久痢年高與產後病後諸瘡疽及瀉後作痢慎不可用攻伐之劑急宜醒脾崇土補中益氣加炮薑木香有血加烏梅芍藥下痢六七日經盡當有結糞若至十三日再經結糞不出者此胃氣告匱也慎不可更與攻克之劑惟培養正氣庶有生機下痢以胃氣為本胃失生長故惡物而不欲食但得思食無分何物與之遂獲愈者此胃氣勝故也凡痢下如魚腦或如豬肝皆半死半生下如塵腐色大孔開如竹筒不收者或如屋漏水或純下鮮血及如赤豆汁唇如硃紅者皆不可治石頑曰腸澼之證內經原有下血下白沫下膿血之異推詳脈證大抵以白沫屬寒其脈應沉膿血屬熱脈應滑大若見白沫而脈反浮見膿血而脈反弦澀懸絕為脈不應病故皆主死其扼要尤在身熱則死寒則生為大關捩以腸胃受病不當更見表熱表熱則外內俱困將何所恃而與攻救邪更詳臟腑諸痢咸以脈沉小為可治血溫身熱主死內經大義如此再推仲景論痢以身熱手足溫為陽回可治厥逆不返為陽絕主死此蓋指傷寒陰證而言不可與夏秋腸澼並列而論也然下痢豈無身熱得生者凡挾邪之痢與時行疫痢皆有身熱但當先撤表邪自然身涼痢止當知內經所言血溫身熱乃陰虛之本證此則兼併客邪耳及觀先輩論痢並以白沫隸之虛寒膿血隸之濕熱至守真乃有赤白相兼者豈寒熱俱甚於腸胃而同為痢之說丹溪從而和之遂有赤痢從小腸來白痢從大腸來皆濕熱為患此論一出後世咸為痢皆屬熱恣用苦寒攻之蒙害至今未已即東垣之聖於脾胃者猶言濕熱之物傷於中而下膿血宜苦寒以疏利之膿血稠黏數至圊而不能便脈洪大有力者下之亦認定膿血為熱曷知血色鮮紫濃厚者信乎屬熱若瘀晦稀淡或如瑪瑙色者為陽虛不能制陰而下非溫理其氣則血不清理氣如爐冶分金最為捷法設不知此概行疏利之法使五液盡隨寒降而下安望其有寧止之日哉嘗見屢服黃連虛陽迫外而反發熱發斑者亦有虛陽內擾忽發除中反驟能食者有頻用大黃開腸洞泄甚至發呃吐蛔者有大黃下咽反脹閉不通陰氣上逆而變中滿鼓脹水腫者凡此之類未遑枚舉夫天氣之熱四時之正令也因熱而恣傷冰水瓜果是逆其正氣腑臟為寒物所傷而為患也以逆正氣之病又以逆病情之藥治之何怪變證百出乎雖是歲之熱較他歲倍常是以患腸澼者較他歲亦倍常其間總輕重不同所見之積一皆五色良由五臟之氣化並傷是以五色兼見按五色痢古人皆為腎病以腎為藏精之室所居之位最下最深深者既病其淺而上者安有不病之理精室既傷安能任蟄藏之令乎仲景所謂五液注下臍築湫痛命將難全者是也夫以精室受傷五液不守之患不知益火消陰實脾堤水兼分理其氣使失於氣化之積隨之而下未失氣化之津統之而安即口噤不食者亦不出乎此法蓋腸澼之屬皆緣傳化失職津液受傷而致奔迫無度豈可恣行攻伐以為不易之定法乎歷觀時師治痢無高下賢愚必用橘皮枳殼厚朴檳榔之屬稍有赤沫即用芩連芍藥水道不利便與木通車前口噤不食不出黃連石蓮況世所謂石連者皆粵中草實偽充大苦大寒與本草所言蓮子墮淤泥中經歲取出者迥異也凡遇五色噤口及瘀晦清血諸痢每用甘草乾薑專理脾胃肉桂茯苓專伐腎邪其效如鼓應桴初起腹痛後重者則兼木香檳樸以泄之飲食艱進者則兼枳實焦術以運之陰氣上逆乾嘔不食者則兼丁香吳茱萸以溫之嘔吐涎水者則兼橘半生薑以豁之膿血稠黏者則兼茜根烏梅以理之水道不通者則兼升柴以舉之身熱不除者則兼桂枝芍藥薑棗以和之陰虛至夜發熱痛劇者則兼熟地黃耆阿膠歸芍以濟之若數日不已而腹痛後重轉甚者必須參朮升柴兼補而升之久痢噤口不食此胃氣告匱最為危候較之初起口噤尚有濁氣可破積沫可驅迥乎不同非大劑參術佐以茯苓甘草藿香木香煨葛根之屬大補胃氣兼行津液不能開之但得胃氣一轉飲食稍進便宜獨參湯略加橘皮或制香附緩緩調補兼疏滯氣最為合劑如茯苓之淡滲木香之耗氣葛根之行津皆當屏除即如久痢後重用三奇散取黃耆防風以致開闔枳殼以破滯氣以為卓識不群然後重稍減便當改用補中益氣轉關妙用全在乎此若厚朴枳橘砂仁等耗氣之藥皆戈戟也凡脈見弦細小弱或六部沉小皆當準此間有脈來滑大數實者方可用芩連芍藥澤瀉之屬挾熱後重煩渴者當與白頭翁秦皮黃連白芍之類誤用大黃變成腫脹若其人元氣未憊大劑人參桂附散其濁陰尚可救其一二洞泄不止服大劑參術不應用養臟湯亦不應惟附子理中湯調赤石脂末間有得生者即發呃吐蛔尚有四逆參附吳茱萸湯乾薑黃芩黃連人參湯烏梅丸等法然非平日相信之真縱有生機亦勿許治若至發斑發躁久痢不食忽發除中從無救治之法也嘗見痢久虛脫六脈弦細厥逆冷汗煩渴躁擾呃逆不寧峻用理中四逆白通通脈之類雖日進人參二三兩服之非不暫安脈來微續手足漸溫稀糜稍進去後亦稀三四日後必然驟變此根氣已絕燈盡復明之兆切勿因其暫安輕許以治徒為識者鄙笑耳至於婦人臨產下痢最為危殆鄭氏有胎前下痢產後不止七日必死之例予嘗用甘草乾薑湯加厚朴茯苓木香治妊娠白痢千金三物膠艾湯治妊娠血痢連理湯加膠艾治赤白相兼之利駐車丸千金黃連湯白頭翁加甘草阿膠湯胎前產後五色諸痢皆可選用若胎前下痢產後不止勢莫挽回者用伏龍肝湯丸隨證加減未嘗不隨手獲效也世醫治痢專守通因通用痛無補法之例不知因氣病而腸中切痛非溫理其氣則痛不止因氣陷而濁氣下墜非升舉其氣則後重不除因氣傷而津液崩脫非調補其氣則積不已因陰虛而至夜微熱腹痛非峻補其陰則痢痛不息世人見余用參朮薑桂溫補氣血之藥以為可駭更有用黃耆地黃滋陰膩滯之藥益怪甚矣且有用石脂乾薑溫澀固脫之藥以為劫劑而大誹之不知內經中原有澀因澀用之法蓋裡急後重數至圊而不能便非澀而何況因澀而過用利氣乃致滑脫不收安得不用澀以固之耶更有不知調氣但見下痢日久便行止澀輕以粟殼訶子投之閉其滯氣迫痛愈加愈劫愈甚此與殺之無異也痢不納食俗名噤口如因邪留胃中胃氣伏而不宣脾氣因而澀滯者香連枳樸橘紅茯苓之屬熱毒衝心頭疼心煩嘔而不食手足溫暖者甘草瀉心湯去大棗易生薑此證胃口有熱不可用溫藥若陽氣不足宿食未消噫而不食枳實理中加砂仁陳皮木香豆寇或山楂曲糵之類肝乘脾者戊己丸加木香肉桂有水飲停聚者心下必悸動不寧五苓散加薑汁有火炎氣衝者黃連解毒湯去黃柏加枳殼木香有胃虛挾熱而嘔逆者連理湯有積穢太多惡氣熏蒸者大黃黃連瀉心湯加木香丹溪用人參川連石蓮子粳米薑汁煎湯細細呷之神效如吐再作服之但得一呷下咽便開石蓮子真者絕無余常以藕汁煮熟稍加糖霜頻服兼進多年陳米稀糜調其胃氣必效此即石蓮之意也治噤口痢多有用黃連者此正治濕熱之藥苦而且降不能開提況非胃虛所宜不可輕用大抵初痢噤口為濕瘀胃口故宜苦燥治之若久痢口噤則胃氣虛敗即大劑獨參理中恐難為力也久痢不止諸藥不應貧人無力服參者烏梅大棗各數枚煎服屢效休息痢此證多因兜澀太早積熱未盡加以調攝失宜不能節食戒欲所以時止時作補中益氣加肉果木香吞駐車丸亦有陰虛多火不能勝任升柴木香白朮者只用駐車丸加人參肉桂烏梅之類有積可加枳實炮黑楂肉有服補中益氣數服不應反下鮮紫血塊者此久風成飧泄風氣通於肝肝傷不能藏血也三奇湯倍防風加羌葛升柴其一切利水破氣藥皆為切禁蟯蟲痢其證腹大皮膚黃粗循循慼慼然得之於寒濕寒濕之氣菀篤不發化為蟲此九蟲之一其形極細胃弱腸虛則蟯蟲乘之或癢或從穀道中溢出倉公以芫花一撮主之烏梅丸黃連犀角散亦主之然蟲盡之後即用六君子加犀角黃連烏梅肉丸服以補脾胃兼清濕熱庶不再發若一味攻蟲愈攻愈盛漫無止期也痢後風因痢後不善調攝或多行或房勞或感風寒或受濕氣致兩腳痿軟腫痛用大防風湯痢後變成痛風皆調攝失宜所致補中益氣加羌活續斷虎骨痢後呃噦此乃胃氣虛寒之極最為惡候急宜橘皮乾薑湯主之下痢而渴誤食冷物水果而噦者理中湯加丁香十五粒柿蒂五枚水煎熱服兼寒熱往來者小柴胡加丁香血痢嘔噦而渴心煩不得眠小便不通者豬苓湯白痢嘔噦用五苓散以中有肉桂可通逆氣也診下痢白沫初起脈小滑能食者易治洪大急疾四肢厥冷者難治久痢脈微弱小細者即愈數實或虛大無根者危下痢膿血初起脈小滑或弦軟身不熱者易治數實滑大而身熱者勢雖甚猶或可治若先不熱五六日後反發熱脈大者必死久則脈宜芤遲虛細不宜數盛滑實或身熱不止口噤不食者皆死久痢脈結代反驟能食為除中者必死大抵下利之脈初起雖實大不妨六七日後最忌強盛凡下痢脈浮身熱作風治脈沉身重作濕治下痢為腸胃病雖頻迸而能食則吉若噤口痢初起脈數實可治久痢而反不能食脈見有餘者死惟小弱流利者當作胃虛治之海藏治楊師屢大醉後渴飲冷水冰茶後病大便鮮血甚多先以吳茱萸溫藥次與胃苓湯血止後白痢又與溫下藥四服乃止或曰何不用黃連之類以解毒反用溫熱之劑曰血為寒所凝漬入腸間而便下得溫乃行若用寒涼即變證難療矣汪石山治一婦病痢半載余服四物香連愈劇腹痛後重咳嗽煩熱脈皆細弱而數以補中益氣去歸加茯苓芍藥為散日用米飲調下三次而安吳茭山治一婦長夏患痢痛迫下黃黑曾服香薷枳殼黃連愈劇其脈兩尺緊澀此寒傷血也問其由乃行經時渴飲冷水一碗遂得此證與桃仁承氣加延胡索一服次早下黑血升許痛止次用調脾活血之劑而痊此蓋經凝作痢不可不察也李士材治屯田孫侍御夫人久痢不止口乾發熱飲食不進猶服香連等藥完穀不化尚謂邪熱不殺穀欲進芩連數日不食熱甚危迫診之脈大而數按之極微詢之小便仍利腹痛而喜手按此火衰不能生土內真寒而外假熱也小便利則無熱可知腹喜按則虛寒立辨急進附子理中湯待冷與服一劑而痛止連進二十餘劑兼進八味丸而康石頑治春榜項鳴先尊堂下痢血色如莧汁服消克苦寒芩連大黃之類愈甚不時發熱痞悶六脈瞥瞥虛大右關獨顯弦象然按之則芤此氣虛不能統血之候與補中益氣加炮薑肉桂四劑而安又治郭然明之室患五色痢晝夜數十次兼帶下如崩誤服大黃黃連之屬十餘劑遂隔塞不通口噤不食者半月餘至夜必大發熱躁渴六脈弦細而疾此足三陰俱虛之候與理中加桂苓木香烏梅以調其胃次與加減八味作湯導其陰火而痊刑部郎中申勖庵高年久痢色如莧汁服芩連芍藥之類二十餘劑漸加呃逆乃甥王勤中邀石頑往診六脈弦細如絲惟急進辛溫峻補庶合病情遂疏理中加丁香肉桂方諸醫咸謂血痢無用薑桂人參之理遲疑不敢服仍啜芩連芍藥遷延五日病愈甚而驟然索粥舉家及諸醫皆以能食為慶復邀石頑相商而脈至如循刀刃此中氣告竭求救於食除中證也世人但知下痢能食為向愈曷知其有除中之例乎因表出以為後學之鑑褚某水尊堂深秋久痢口噤不食者半月餘但飲開水及爪瓤汁啜後必嘔脹腸鳴絞痛不已煩渴悶亂至夜轉劇所下皆膿血晝夜百餘次小水涓滴不通諸醫束手告辭始邀石頑切其六脈皆弦細乏力驗其積沫皆瘀淡色晦詢其所服皆芩連檳樸之類因謂之曰所見諸證俱逆幸久痢脈弱尚宜溫補姑勒一方用理中加桂苓紫菀調之服後小便即通便得稍寐三四日間糜粥漸進痢亦漸減更與理中倍參伏龍肝湯泛丸調理而痊又治同川春榜陳穎雍觸熱錦旋抵家即患河魚腹疾半月以來攻克不效遂噤口粒米不入且因都門久食煤火肩背發癰不赤不疼陷伏不起發呃神昏勢日瀕危內外醫科互相推委因命楫相邀石頑就榻診之六脈弦細欲絕面有戴陽之色所下之物瘀晦如爛魚腸腦證雖危殆幸脈無旺氣氣無喘促體無躁擾可進溫補但得補而癰腫焮發便可無虞遂疏保元湯每服人參三錢生黃耆二錢甘草肉桂各一錢伏龍肝湯代水煎服一啜而稀糜稍進再啜而後重稍輕三啜而癰毒賁起另延瘍醫敷治其外確守前方服十餘服而安前後未嘗更易一味也一大兵船上婦胎前下痢產後三日不止惡露不行發熱喘脹法在不救有同道誤許可治與藥一服次早反加呃逆計無所施乃同兵丁託言貨船拉石頑往診其脈三至一代直以難治辭之彼則留住前醫不使上涯方知其意原欲巧卸恐余不往故不明言其故當此急迫之際不與解圍必致大傷體面因謂之曰此證雖危尚有一線生機必從長計議庶可圖治彼聞是言始放其醫抵家而求藥於余遂與盞一枚錢數文令習砂糖熬枯白湯調服既可治痢又能下瘀且不傷犯元氣急與服之彼欣然而去其醫得脫閉戶挈家而遁直至數日大兵去後寧家即過我而謝曰若非金蟬脫殼不免為螳臂所執也飛疇治朱元臣子患五色痢二十餘日胸膈脹滿而粥飲不進服藥罔效別延兩醫診視一用大黃一用人參元臣不能自主因執治於予予曰用大黃者因其脈滿脈大也用人參者因其痢久不食也痢久不食大黃斷斷難施膈滿作脹人參亦難遽投今擬伏龍肝為君專溫土臟用以濃煎代水煎焦朮茯苓甘草廣藿木香炒烏梅一劑痢減食進再劑而止遂不藥調理而起大小便不通經曰脈盛皮熱腹脹前後不通瞀悶此謂五實夫脾胃氣滯不能轉輸加以痰飲食積阻礙清道大小便秘澀不快二陳湯加升柴二術數服能令大便潤而小便長濕熱痰火結滯脈洪盛大小便秘赤肢節煩疼涼膈散小承氣湯選用陰囊腫脹二便不通三白散大小便俱不通小腹膨脹乃膀胱溺滿支撐迴腸故並大便不得出用二陳倍茯苓加澤瀉木通先利小便迴腸得通而大便隨出矣風閉用燒皂肉灰為末粥清調下或燒湯蒸下部良冷閉用連根蔥一二莖帶土生薑一塊淡豆豉二十一粒鹽二匙同研爛作餅烘熱掩臍中以帛扎定良久於餅上灸之熱閉用田螺搗爛加麝香一分冰片半分入臍中以帛束之如人行十里即通石頑曰肥人素多痰飲濕熱結聚因病每致大小便不通腹滿不食氣逆喘急勢盛不得不下有屢下不得通利者有再三下而始通者有下之利不止者大抵濕熱素盛之人大便不行日數雖多結糞甚少所下不過溏糞垢膩甚至驟下不可遏者多有熱去寒起正氣隨脫即變呃逆之證以此本屬濕熱溫補仍助本病苦寒徒乏胃氣每至不可救藥若始先知其濕熱痰積用導痰湯多加薑汁竹瀝下滾痰丸甚則下控涎丹方為合法若遲則濕熱上湧勢劇胃中津液盡變濁穢雖有合劑不能取效也凡大便不通而腹中雷鳴者下之必無結糞蓋肥人下後多有脫泄不止之虞瘦人汗後每多幹熱不止之患不可不知丹溪治一老人因內傷挾外感自誤發汗脈浮數年高誤汗必有虛證乃與參朮歸耆甘草陳皮等自言從病不曾更衣今虛迸痛不堪欲用利藥朱謂非實秘氣因誤汗而虛不得充腹無力可努仍用前藥間與肉汁及鎖陽粥濃煎蔥椒湯浸下體下軟塊五六枚脈大未斂血氣未復又與前藥二日小便不通小腹滿悶煩苦仰臥則點滴而出朱曰補藥未至倍參術服二日小便通半月而愈又治一婦人脾疼後患大小便不通此是痰隔中脘氣聚上焦二陳加木通初服探吐再服而愈汪石山治一婦因憂懼勞倦小腹脹滿大小便秘結不通醫以硝黃三下之隨用隨秘反增胸腹胃脘脹痛自汗食少汪診之脈皆濡細而數曰此勞倦憂懼傷脾也蓋脾失健運之職故氣滯不行前藥但利血而不能利氣遂用人參二錢歸身錢半陳皮枳殼黃芩各七分煎服而愈喻嘉言治一人大小便俱不通因新秋病瘧三五發後用藥截住遂覺胸腹間脹滿日增不旬日外腹大胸高上氣喘急二便全無食飲不入能坐不能臥能俯不能仰屢服下藥不應商用大黃二兩作一劑喻曰此名何病而敢放膽殺人耶醫曰傷寒腸結下而不通惟有大下一法何謂放膽曰世間有不發熱之傷寒乎傷寒發熱津液枯槁腸胃乾結故用下藥以開其結然有不轉失氣者不可攻之戒正恐誤治太陰之腹脹也此因腹中之氣散亂不收津水隨氣橫決四溢而作脹全是太陰脾氣不能統攝所致一散一結相去天淵再用大黃猛劑大散其氣若不脹死定然腹破遂以理中湯少加黃連疾勢略減次日用五苓散本方藥才入喉病者即索穢桶小便先去大便隨之腹中原是大黃推落之泄糞其所以不出者以膀胱脹大腹內難容將大腸撐緊無隙可出耳石頑治楊松齡夏月感冒曾服發散藥十餘劑大小便俱閉澀不通更一醫用硝黃下之少腹左畔遂脹起如墩不赤不熱有時嘩嘩作聲復延瘍醫以敷藥治其外以解毒利水藥治其內藥未進而躁擾不寧因延石頑診之六脈緊細而快此過汗津液大傷又與苦寒攻裡致陰邪內結膀胱不化溺積不通法在不救幸胃氣有權形神未槁尚能稍進糜飲姑許以治因與濟生腎氣大劑煎成入有嘴壺托起其項徐徐仰灌升許頃令轉側以鵝翎探吐即時溲便如注少腹頓平更與十全大補調理而安此證前後患者四五人或小便淋瀝或遺溺不止或形羸氣脫皆立辭不治大便不通經曰北方黑色入通於腎開竅於二陰可知大便閉結專責之少陰證狀雖殊總由津液枯竭也腎苦燥急食辛以潤之當歸肉蓯蓉之類腎主五液津液盛則大便如常房欲過度精血耗竭多致秘結或飢飽勞役損傷胃氣或辛熱厚味漸漬助火伏於血中耗散真陰津液虧少致令大便結燥高年血不充每患是疾故古人有胃實脾虛風秘氣秘痰秘冷秘熱秘虛秘實秘之分臨證所當細察詳問也胃實而秘善飲食小便赤澀麻仁丸脾虛不能運化倦怠懶於言動補中益氣倍升柴當歸煎成調生蜜麻油清氣一升濁氣自降有脾虛下秘者以此湯下麻仁丸風秘者風入大腸傳化失職羌防蘇子枳殼麻仁杏仁皂角灰煎服潤腸丸氣秘者氣不升降穀氣不升其人多噫枳殼沉香蘇子檳榔烏藥陳皮煎服降氣散或四磨六磨選用痰秘者痰飲濕熱阻礙氣不升降頭汗喘滿胸脅痞悶眩暈腹鳴半夏茯苓木香檳榔枳實橘紅香附白芥子薑汁竹瀝不應加大黃黃連甚則控涎丹下之冷秘者六脈沉遲面白或黑凝陰固結胃氣閉塞腸內氣攻腹中喜熱惡冷藿香厚朴薑桂枳殼陳皮生薑煎服半硫丸熱藥多秘惟硫黃性緩而通冷藥多泄惟黃連厚腸止泄如陰寒秘結當與陽藥冰冷服之然數服中間與清潤藥一服不令結秘若病本虛寒標顯躁熱亦宜助陽藥中少加苦寒以去熱躁躁止勿加熱秘者六脈數實面赤口乾身熱腸胃脹悶時欲得冷或口舌生瘡二腸熱結蘇子黃芩生地芍藥杏仁枳殼煎服潤腸丸或四順清涼飲虛秘者不能飲食小便清白或年高或病久或脾虛津枯血少歸身熟地蓯蓉參耆沉香松子仁桃仁麻仁蜂蜜或麻仁枳殼當歸人參蜜丸服之瘦人血枯火秘通幽湯煎成入蜜服之老人津枯婦人產後去血過多及發汗利小便病後血氣未復虛勞骨蒸皆能作秘惟當益氣補水養血不可用硝黃利藥巴豆牽牛尤在所禁有一種大便不通腹中脹悶求通不得頻頻登廁努力太過虛氣被掙下注肛門裡急後重時不可忍氣逆嘔惡渴而索水飲食不能呻吟不絕欲與通利則氣以下脫欲與升提則氣以上逆嘔惡難堪人參枳殼當歸煎服加陳香櫞皮尤效腎臟血虛大腸風秘生何首烏搗自然汁一盞和白蜜燉熱服之六味丸加蜜調服亦通固本丸作膏常服亦妙古方治老人燥結多用蓯蓉不知胃氣虛者下口即作嘔吐肥人胃中多有痰濕尤非所宜惟命門火衰開闔失職者方為合劑然須丸服若作湯亦必作吐以其味鹹氣濁也丹方治腎肝風秘至夜微發寒熱者用生何首烏兩許頓煎服之神應若暴病熱邪固結及中有留滯者禁用以其純陰味澀無養正祛邪之力也失血後煩渴大便不通一味生地黃搗汁服之大病後不得寐大便不通一味熟棗仁擂水去滓煮粥頻食血枯燥結恆用熟地黃蜜煎常服或熬膏亦佳又老人血枯便閉用生地黃當歸身鮮首烏各四兩廣皮一兩熬膏燉熱服半小杯不通三五次效實秘者能飲食小便赤澀枳實檳榔木香砂仁蓬朮大黃皂肉灰之屬氣滯腹急大便秘澀六磨湯加大黃諸秘服藥不通或虛人畏服利藥者宜蜜煎導削醬姜導分寒熱選用其豬膽導非傷寒邪熱不可輕試病人胃氣虛者用之往往有呃逆之虞不可不慎或問乾結之甚硝黃亦可暫用否曰承氣湯用硝黃乃傷寒邪熱入里胃液乾枯腎水涸竭故宜急下以救陰津為務若老人虛人及病後腎水本虧以致燥結再用硝黃下之是虛其虛目下取快一時來日復秘愈甚欲再下之雖鐵石不能通矣倘遇此證當勸慰之緩圖奏效切勿性急自貽其咎也診陽結脈沉數或促陰結脈遲伏或結老人虛人便秘脈多沉伏而結促不勻若見雀啄者不治小便不通閉癃經云三焦者決瀆之官水道出焉膀胱者州都之官津液藏焉氣化則能出矣下焦者別迴腸注於膀胱而滲入焉故水穀者常並居於胃中成糟粕俱下於大腸而成下焦滲而俱下濟泌別汁循下焦而滲入膀胱焉膀胱之胞薄以懦得酸則縮蜷約而不通水道不行故癃陰者積筋之所終也故酸入而走筋矣飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱經云至陰虛天氣絕至陽盛地氣不足夫腎肝在下地道也心肺在上天道也脾胃居中氣交之分也故天之陽絕而不安於地者則白露不下在上之陽不交於陰則在下之陰無以為化水道其能出乎此上焦之氣化也仲景曰衛氣行則小便宣通又曰脾病則九竅不通此中焦之氣化也東垣云在下之陰虛在上之陽盛致腎氣不化必宣其陽而舉之則陰可得而平也故丹溪云以吐法通小便上竅通而下竅之水出焉然升提止可施於涓滴不通者若溺澀短少或淋漓作痛者非所宜也由經言及諸論觀之未有不主於氣化者不審乎此轉行疏利之劑求功多見其不知量也東垣云小便不通皆邪熱為病分在氣在血而治之以渴與不渴而辨之渴而不利或黃或澀者熱在上焦氣分也小便者膀胱所主若肺熱不能生水是絕其寒水生化之源宜清肺而滋化源故當從肺分助其秋令宜茯苓澤瀉車前木通之類淡味滲泄之藥水自生焉如不渴而小便不通者熱在下焦血分腎與膀胱受熱閉塞其流須知柏之類苦寒氣味俱陰之藥以除其熱稍兼肉桂辛溫散結之陽藥以泄其閉若服淡滲之味則陽無以化而陰愈閉塞不通矣氣分熱渴而小便閉或黃或澀者黃芩清肺飲血分熱小便閉而不渴者滋腎丸不應並中焦亦有熱也加連柏甘草等分煎服陰虛血熱人渴而小便不通或澀痛淋瀝者切禁五苓燥劑宜導赤散津液偏滲於大腸大便泄瀉小便澀少或水停心下不能下輸膀胱者五苓散滲泄之若六腑客熱轉於下焦而不通者用益元散以清之若氣迫閉塞升降不通者二陳湯去半夏加木通滑石柴胡升麻以提之汗出過多小便赤澀此五內枯燥慎勿用利水之劑生脈散加黃耆當歸若右寸獨數大小便點滴而下者此金燥不能生水氣化不及州都生脈散去五味子易大劑紫菀可一服而愈小便不通腹下痛悶難忍如覆碗者為實亦分在氣在血氣壅於下者四磨六磨選用血汙於下者代抵當丸有火虛者非與溫補之劑則水不能行如金匱腎氣丸元氣下陷而水道不通者補中益氣湯加木通車前升清以降濁也小便不利審是氣虛獨參湯少加廣皮如神凡小便不通用獨蒜塗臍法以獨囊蒜一枚梔子三枚鹽少許搗爛攤紙貼臍良久即通未通塗陰囊上立效或用食鹽半斤炒熱布包熨之天行熱病小便不通用蚯蚓泥升許以水浸澄清渴即與飲不應用地龍數枚同蘆根搗汁飲之閉癃閉癃者溺閉不通淋瀝點滴也惟肝與督脈三焦膀胱主之經云膀胱之胞薄以懦得酸則縮蜷約而不通水道不行故癃又云膀胱不利為癃不約為遺溺蓋實則閉癃虛則遺溺遺溺則補之閉癃則瀉之然遺溺閉癃不取膀胱俞者蓋膀胱但藏溺其主出溺者皆從三焦及肝與督脈也閉癃者合而言之一病也分而言之有暴久之殊蓋閉者暴病為溺點滴不出俗名小便不通是也可用疏通利竅之劑甚則用吐法以提其氣自通若補中益氣二陳五苓俱可探吐也癃者久病為溺癃淋瀝點滴而出一日數十次名淋病是也惟宜滋養真陰兼資氣化如六味生脈之類亦可合用若疏泄利氣之藥皆為戈戟矣夏秋熱傷癃閉以滑石調水飲之即通但陰虛泉竭者禁用淋金匱云淋之為病小便如粟狀小腹弦急痛引臍中趺陽脈數胃中有熱即消穀引食大便必堅小便即數小便不利者有水氣其人苦渴栝蔞瞿麥丸主之小便不利蒲灰散主之滑石白魚散茯苓戎鹽湯並主之渴欲飲水口乾舌燥者白虎加人參湯主之脈浮發熱渴欲飲水小便不利者豬苓湯主之淋家不可發汗發汗則便血金匱論淋證四條一曰小便如粟狀小腹弦急痛引臍中此肝移熱於膀胱因肝熱甚失其疏泄之令而然也一曰胃中有熱消穀引食大便堅小便數此因胃熱熾甚消爍津液腸胃膀胱之源俱涸也一曰有水氣其人苦渴此膀胱氣化不行水積胞中為患也一曰小便不利用蒲灰散等治此因膀胱血病血屬陰陰病則陽亦不能施化也其用栝蔞瞿麥丸者蓋緣肺氣不化膀胱不通致水漬則津液不行而胃中燥渴故用栝蔞根以生津薯蕷以補肺茯苓疏肺氣下行瞿麥逐膀胱癃結然欲散下焦之結又需陽藥始得開通故少加附子為使必水積而腹中冷者方可用之若雖有水氣而腹中不冷即當效五苓之法以桂易附或因積熱閉癃又當改附子為知柏也其蒲灰散等三方悉治膀胱血滯氣不化而小便不利之證蒲灰滑石者薄灰治瘀血滑石利竅也亂髮滑石白魚者發灰消瘀血白魚去水氣也茯苓戎鹽者咸潤走血佐茯苓淡滲利小水白朮兼利腰臍間血也三方亦有輕重亂髮為重蒲灰次之戎鹽又次之至於渴欲飲水口乾舌燥明系熱在上焦故用白虎以盪滌膈上之熱加人參以救津液也渴欲飲水小便不利乃熱結膀胱津液固結之候而見脈浮發熱太陽熱邪循經發外也故用豬苓湯以導熱滋燥慎勿因其發熱而與發汗重傷其陰必致便血故為切戒諸淋所發皆腎虛而膀胱生熱也水火不交心腎氣鬱遂使陰陽乖舛清濁相干蓄在下焦故膀胱裡急膏血砂石從水道出焉於是有淋瀝不斷之狀甚者窒塞其間令人悶絕凡小腸有氣則小便脹小腸有血則小便澀小腸有熱則小便痛製劑之法並宜流行滯氣疏利小水清解熱邪其於平調心火又三者之綱領焉心清則小便自利血不妄行最不可用補氣之藥氣得補而愈脹血得補而愈澀熱得補而愈盛水竇不行加之穀道閉遏未見其有能生者也雖然腎氣虛弱囊中受寒而成淋澀者有之其證先寒慄而後溲血蓋冷氣與正氣交爭故也又有胞系轉戾不通者其證臍下急痛小便不通凡強忍小便疾行走馬或忍尿入房使水氣逆上氣迫於胞故屈戾而不得舒張也胞落則殂石淋者臍腹隱痛小便難痛不可忍溲如砂石或黃赤或渾濁色澤不定正如湯瓶久受煎熬底結白鹼宜清其積熱滌其砂石如麥冬葶藶木通葵子滑石車前連翹瞿麥知母澀痛甚者為膀胱蓄血加琥珀肉桂大黃辛溫以散之加味葵子茯苓散專治石淋之聖藥紫雪亦佳勞淋者遇勞即發小便淋瀝不絕如水滴瀝而不斷有脾勞腎勞之分勞於脾者補中益氣加車前澤瀉勞於腎者六味丸加麥冬五味血淋者雖主實主血而與小腸為表裡然須看血色分冷熱色鮮紫者為小腸實熱小腸熱甚而血滲胞中與溲俱下大劑生牛膝為主兼車前山梔生地紫菀犀角桃仁蘆根汁生藕節汁血虛而熱用生地黃三兩黃芩阿膠各半兩柏葉少許水煎服之此千金法也若色瘀淡者屬腎與膀胱虛冷生料六味丸加肉桂蘆根搗水煎候冷服若兩尺脈沉弦而數必有瘀血停蓄犀角地黃湯加紫菀牛膝若琥珀麝香當歸川芎萆薢木通白朮木香香燥破血利水耗氣之類切禁氣淋者氣化不及州都胞中氣脹小腹滿堅溺有餘瀝宜沉香肉桂茯苓澤瀉佐以木通瞿麥葵子山梔石葦之類實則氣滯不通臍下妨悶加香附木香不應加硝黃溺後疼痛去石葦木通瞿麥葵子山梔加秋石生甘草梢藕汁氣淋服利水藥不能通者沉香降氣四磨湯選用膏淋者儼若脂膏或便中有如蜓蚰之狀此名肉淋乃精溺俱出精塞溺道故便欲出不能而痛宜茯苓秋石沉香海金沙澤瀉滑石如不甚痛者須固澀其精慎勿誤與通利鹿角霜肉蓯蓉菟絲子蓮鬚芡實山藥之類或桑螵蛸菟絲子等分澤瀉減半蜜丸服後以六味丸合聚精丸調補之冷淋者寒氣客於下焦水道不宣滿於胞內淋澀而白先發寒慄而後便數成淋宜金匱腎氣丸加鹿茸沉香戴氏云進冷劑愈甚者此是冷淋牛膝半兩煎湯加麝少許下八味丸冷淋小便閉澀數起不通竅中苦痛憎寒凜凜或因煩渴飲水過多水積胞中不行生附子散不應用栝蔞瞿麥湯熱淋者心肺蘊熱不能滋其化源小便赤澀如血而少煩渴引飲者導赤散加黃芩躁熱不渴者滋腎丸或淡竹葉煎湯調辰砂益元散凡人服金石大毒以助入房敗精流入胞中及飲食痰積滲入者則皆成淋或忍精不泄停凝作痛而致淋者木通車前牛膝澤瀉茯苓滑石甘草或湯或丸俱效有膏粱太過食積成痰流注為淋宜尿浸山楂川連丹皮海石玄明粉之類小便艱澀如淋短而不作痛者虛也六味丸加鹿茸肉蓯蓉如莖中不痛而癢者此屬精虛八味丸小便淋瀝莖中痛不可忍相引脅下痛參苓琥珀散有服五苓散不效用生料鹿茸丸卻愈此皆下元虛冷之故胞痹小便淋瀝澀痛腎虛膀胱積熱也腎瀝湯胞痹不得小便小腹痛若沃以湯則小便雖澀而略通者此膀胱虛寒也茯苓丸虛寒甚者巴戟丸老人精氣已衰猶不絕欲小便淋瀝小腹脹閉而牽引穀道或溺血梗痛腎氣丸加牛膝熱極成淋莖中痛五苓散減桂大半加滑石木通生甘草梢口苦咽乾小便赤澀或欲成淋清心蓮子飲伏暑成淋五苓和益元散虛人生脈散不時服之小便自清後有幾點血者五苓散加牛膝熟地紫菀有因怒而致淋者非青皮沉香山梔木通不能已也有因思慮成淋者歸脾湯和五苓散並進汗多而小便痛暑月常有之盛暑冷飲既多上停為飲外發為汗津液不通小腸閉塞五苓散加人參甘草名春澤湯最為合劑老人氣虛下陷成淋者補中益氣加木通澤瀉以升麻柴胡升九地之陰木通澤瀉降九天之陽服之殊驗心脾血虛歸脾湯辰砂妙香散選用淡秋石治血淋莖中熱痛降火最捷但元氣下陷小便多者禁用血淋服諸藥不效一味薏苡根搗汁服之血淋每日用黃繭絲二兩煮湯飲之七日必效留絲煅灰存性蜜丸服之並主婦人血崩又生雞子黃每日清晨沸湯調服二枚其血自清牛膝三兩煮成入麝少許頓服名地髓湯此治血淋要劑但淋久不止元氣下陷者又為切禁且虛人能損胃氣及崩淋下血不止者皆不宜服以其滑精故也朴硝雪白者治痛淋殊效每服二錢血淋用冷水下氣淋木通湯下石淋炒研用溫水下石膏火煅同琥珀滑石乃石淋之要藥然須質壯初起者宜之老人絕欲太早成淋生綠豆水浸擂汁服之然不若淡秋石擂水飲之其效如神一切淋濁屬實熱者應手獲效稍涉陰虛甚於砒鴆不可不慎診少陰脈數婦人則陰中生瘡男子則氣淋盛大而實者生虛小而澀者死薛立齋治一人素膏粱小便赤數口乾吐痰稠黏右寸關數而有力此脾肺積熱移於膀胱先用黃芩清肺飲清理脾肺次用滋腎丸六味丸以滋腎水而安又治一儒者發熱飲水不絕每如廁小便澀痛大便牽痛此精竭復耗所致用補中益氣送都氣丸而安石頑治內閣文湛持夏月熱淋醫用香薷飲益元散五日不應淋澀轉甚反加心煩不寐乃弟廣文彥可相邀往診見其唇赤齒燥多汗喘促不時引飲脈見左手微細右手虛數知為熱傷元氣之候遂疏生脈散方頻進代茶至夜稍安明日復苦溲便澀數然其脈已向和仍用前方不時煎服調理五日而痊又治太史沈韓倬患膏淋小便頻數晝夜百餘次晝則滴瀝不通時如欲解痛如火燒夜雖頻迸而所解倍常溲中如脂如涕者甚多先曾服清熱利水藥半月餘其勢轉劇面色痿黃飲食艱進延石頑診之脈得弦細而數兩尺按之益堅而右關澀大少力此腎水素虧加以勞心思慮肝木乘脾所致法當先實中土使能堤水則陰火不致下溜清陽得以上升氣化通而疼澀廖矣或云邪火亢極反用參耆補之得無助長之患乎曷知陰火乘虛下陷非開提清陽不應譬諸水注塞其上孔傾之涓滴不出所謂病在下取之上若用清熱利水則氣愈陷精愈脫而溺愈不通矣遂疏補中益氣方用人參三錢服二劑痛雖稍減而病者求其速效或進四苓散加知母門冬沙參花粉甫一服徹夜痛楚倍甚於是專服補中益氣兼六味丸用紫河車熬膏代蜜調理補中原方服至五十劑參盡斤余而安小便不禁小便頻數遺溺王節齋曰小便不禁或頻數古方多以為寒而用溫澀之藥殊不知陰虛屬熱者多蓋火邪妄動水不得寧故不能禁而頻數也是以老年人多頻數者是膀胱血少陽火偏旺也治法宜滋腎水真陰補膀胱津液為主而佐以收澀之劑六味丸加麥冬五味之類不可用溫藥也戴氏云小便多者乃下元虛冷腎不攝水以致滲泄宜八味丸生料鹿茸丸若小便常急偏數雖多而所出常少放了復急不澀痛卻非淋證亦有小便畢少頃將謂已盡忽再出些少者多因從忍尿行房事而然宜生料五苓散加阿膠吞加減八味丸小便不禁而淋瀝澀痛者此真陽不固而下滲也固脬丸不應用加減桑螵蛸散晝甚者為陽虛補中益氣加熟附子夜甚者為陰虛八味丸脬氣不足小便頻數晝甚於夜者縮泉丸或時清利過多或時頻數赤澀者舊用萆薢分清飲多不應改用加減八味丸效若夜起小便多者八味丸加五味子數而少為實熱宜滲之五苓減桂加滑石甘草數而色黃虛熱也宜滋陰六味丸數而多色白體羸為真陽虛升氣少而降氣多須補右腎相火八味丸加補骨脂鹿茸病後服苦寒泄利藥太過小水不禁或如稠泔色者加減八味丸小便頻數勞而益甚者屬脾氣虛弱補中益氣湯加山藥五味若小便澀滯補之益甚者乃膀胱熱結也赤芍赤茯苓黑山梔生甘草木通滑石淡竹葉目白睛黃加茵陳有血加當歸延胡索脈滑數盛加大黃二錢芒硝一錢大便通小便亦利也其脾肺氣燥不能化生者黃芩清肺飲膀胱陰虛陽無以生者滋腎丸腎與膀胱俱虛或肺氣不化水泉澀數者六味丸加麥冬五味若小便澀滯或莖中痛屬肝腎濕熱龍膽瀉肝湯遺溺經云督脈生病為遺溺肝所生病為遺溺膀胱不約為遺溺仲景云下焦不歸則遺溺天寒則腠理閉氣濕不行水下流於膀胱則為溺與氣故多溺而寒也至於不禁虛寒之甚非八味丸固脬丸加減桑螵蛸散不效然亦有熱客腎部而遺尿者經曰淫氣遺溺痹聚在腎此係熱證其證發熱作渴或時閉澀或時自遺或陰挺不能約制午前小劑補中益氣加黑山梔午後大劑生料六味丸加五味子常服自效夏月暑病遺尿者白虎加人參湯一服即應有先因病淋服利藥太多致溺不禁者補中益氣少佐熟附子有所傷損汙血蓄於胞中亦令遺失鹿角屑炙黃為末和桃仁泥等分酒調三錢咳而遺溺屬膀胱茯苓甘草湯不應五苓散小兒胎中受冷遺尿一味補骨脂炒研臨臥紅酒調服即不遺孕婦及產後遺尿見婦人門石頑治吳興閔少江年高體豐患胞痹一十三年歷治罔效一日偶述其證於張涵高涵高曰此病隱曲難明非請正於石頑張子不能測識也少江素忝交知因是延余備陳所患凡遇勞心嗔恚或飲食失宜則小便頻數滴瀝澀痛不已至夜略得交睫溺即滲漉而遺覺則阻滯如前十三年來服人參鹿茸紫河車無算然皆平穩無礙獨犯牡丹白朮即脹痛不禁五犯五劇究竟此屬何疾余曰病名胞痹惟見之於內經其他方書不載是以醫不加察並未聞其病名此皆膏粱積熱於上作強傷精於下濕熱乘虛結聚於膀胱之內胞也素問云胞痹者小腹膀胱按之內痛若沃以湯澀於小便上為清涕詳此節經文則知膀胱虛滯不能上吸肺氣肺氣不清不能下通水道所以澀滯不利得湯熱之助則小便澀澀微通其氣循經蒸發肺氣暫開則清涕得以上泄也因舉腎瀝湯方服之其效頗捷但原其不得寧寢寢則遺溺知肝虛火擾而致魂夢不寧疏泄失職所以服牡丹疏肝之藥則脹者不勝其氣之竄以擊動陰火也服白朮補脾之藥亦脹者不勝其味之濁以壅滯濕熱也服人參鹿茸河車溫補之藥平穩無礙者虛能受熱但補而不切於治也更擬加減桑螵蛸散用羊腎湯泛丸服庶有合於病情然八秩年高猶恃體豐不遠房室藥雖中窾難保前證不復也又治徽友黃元吉年六十餘因喪明蓄妾而患小便淋澀春間因顛仆昏憒遺尿此後遂不時遺溺或發或止至一陽後其證大劇晝日苦於溺澀不通非坐於熱湯則涓滴不出交睫便遺之不禁因求治於石頑其脈或時虛大或時細數而左關尺必顯弦象此腎氣大虧而為下脫之兆也乃與地黃飲子數服溺澀稍可遺亦少間後與八味丸去丹皮澤瀉加鹿茸五味巴戟遠志調理而痊又治陝客亢仁軒年壯色蒼體豐善啖患胞痹十餘年諸省名醫俱藥之不應亦未有識其病名者癸丑夏泊吳求治其脈軟大而澀澀不調不時蹲踞於地以手揉其莖囊則溲從穀道點滴而滲必以熱湯沃之始得稍通寐則有時而遺其最苦者中有結塊如橘核之狀外裹紅絲內包黃水雜於脂膩之中與向所治高參議田孟先無異此因恣飲不禁酒濕乘虛襲入髓竅故有是患因令堅戒菸草火酒濕面椒蒜糟醋雞豕炙爆等味與半夏茯苓豬苓澤瀉萆薢犀角竹茹作湯四劑不應省其故以西北人慣食等味不能戒口所以不效乃令其堅守勿犯方與調治仍用前藥四劑勢減二三次與腎瀝湯加萆薢數服水道遂通溲亦不痛但覺食不甘美後以補中益氣加車前木通調之而安此與高參議田孟先證雖同而治稍異高則因遠遊恣樂妓館致病故用腎瀝湯加減八味丸收功田由陰虛多火故用腎瀝湯生脈散合六味丸收功若萆薢分清滲水傷精之味咸為切禁此則肥盛多濕故先與清胃豁痰之藥然後理腎調脾為治不得不異耳又治御前侍衛金漢光年逾花甲初夏誤飲新酒致病前有淋瀝澀痛後有四痔腫突此陰虛熱陷膀胱也先與導赤散次進補中益氣勢漸向安惟庭孔澀痛未除或令服益元散三服遂致遺溺不能自主投劑不應直至新秋脈漸耎弱因採腎瀝之義以羯羊腎制補骨脂羊脬制菟絲子濃煎桑根皮汁制螵蛸甫進三日得終夜安寢涓滴靡遺矣小便黃赤內經曰諸病水液渾濁皆屬於熱夫小便黃赤有四一屬肝熱經曰肝熱病者小便先黃是也二屬胃熱經曰胃足陽明之脈氣盛則身以前皆熱消穀善飢溺色黃是也三屬肺虛經曰肺手太陰之脈氣虛則肩背痛寒則少氣不足以息溺色變是也四屬腎虛經曰冬脈者腎也冬脈不及則令人䏚中清脊中痛少腹滿小便變是也汗多而小便赤澀夏月多有此證盛暑汗既多膀胱閉澀則水不運下四君子合五苓散或五苓合生脈或生脈合保元或消暑丸清燥湯選用有小便赤短體倦食少缺盆痛此脾肺腎俱虛也補中益氣下六味丸滋其化源自愈誤用滲利必危已經分利或病後有此屬脾肺氣虛不能施化補中益氣加麥冬五味尺脈數大陰火上炎而小便赤少者六味丸加麥冬五味肝熱者頻欲解而赤澀梗痛時覺凜凜或發寒熱六味丸多加牛膝脈盛氣實者龍薈丸胃熱者口中乾淡引飲肌膚壯熱竹葉石膏湯膀胱熱甚者滋腎丸遺精經曰怵惕思慮則傷神神傷則恐懼流淫而不止腎者主蟄封藏之本精之處也五臟主藏精者也傷則失守謂一臟之真不得其正則一臟之病作矣厥氣客於陰器則夢接內厥陰主筋故諸筋統繫於肝也腎為陰主藏精肝為陽主疏泄故腎之陰虛則精不藏肝之陽強則氣不固若遇陰邪客於其竅與所強之陽相感則精脫而成夢矣所謂陽強者乃肝藏所寄之相火強耳故治以腎肝為主亦有不在腎肝而在心肺脾胃之不足者然必傳於腎肝而後精方走也治法若從他臟而起則以初感病者為本腎肝聚病者為標若由腎肝二臟自得者獨治腎肝陰陽離決水火不交通者則既濟之陰陽不相抱負者則調和之陽虛者補其氣陰虛者補其血陽強者瀉其火有正治反治從少從多隨其攸利夢與人交接為夢遺相火之強為患不因夢感而自遺者為精滑心腎之傷居多因思想無窮所願不得而為白淫者治法有五神氣浮游宜補中益氣湯加菖蒲下硃砂安神丸思久成痰迷於心竅宜先服四七湯以豁其痰後用豬苓丸威喜丸調之思想傷陰八味丸去附子加酒黃柏以滋養之用心太過心不攝腎以致失精者遠志丸因思欲不遂則耳聞目見其精即出名曰白淫辰砂妙香散色欲過度下元虛憊滑泄不禁六味丸加鹿茸五味龍骨失精夢泄亦有因鬱火而得故壯年火盛多有流溢者若以虛冷用熱劑則精愈失滋腎丸加生地茯神棗仁菖蒲夢遺為肝熱膽寒以肝熱則火淫於外魂不內守故多淫夢失精或時心悸肥人多此宜清肝不必補腎溫膽湯加人參茯神棗仁蓮肉遺精腰疼六味丸加杜仲五味菟絲蓯蓉中年以後還少丹精氣不足吸吸短氣遺精盜汗濟生鹿茸丸斫喪太過滑泄不禁兼心脾氣虛飲食少進者金鎖玉關丸加參耆脾腎俱虛敗精失道精滑不固者九龍丹去當歸加萆薢五味然不若萃仙丸尤妙所謂敗精失道者非敗精不泄而有所蓄滯也以精竅屢開不能閉密失其常度而流溢不止故宜止澀之劑小便過多而便後常有滑精者補中益氣湯下縮泉丸痛而小便頻數者禁用縮泉以益智壯火烏藥耗氣非陰虛多火人所宜遺精莖中癢而水道不禁是陽虛有火加減八味丸脾虛不能堤水水虧不能制火者聚精丸加參朮芡實蓮鬚五味常服有效大抵夢遺多是陰虛火氣用事苟非確係陽虛桂附鹿茸等助陽之藥慎勿輕用非確係氣虛參朮遠志輩益氣之味不可漫施試觀夢遺必在黎明陽氣發動之時其為陰虛陽擾可知矣凡身有熱而脈洪滑皆因於熱犀角山梔麥冬茯神竹葉木通豬苓生地蓮肉凡屬鬱滯積熱等證貴在疏泄醫者不知但用固澀反增其疾矣宜滋腎丸豬苓丸清利之肥盛之人遺濁滾痰丸下之最妙脾胃濕熱之人及飲食厚味太過與酒客輩痰火為殃多致不夢而遺泄宜二陳二術加厚朴黃柏升柴使清升濁降脾胃健而遺滑止矣仲景治失精夢交少腹弦急脈虛遲或芤動微緊用桂枝龍骨牡蠣湯及手足煩熱咽乾口燥或悸或衄此陽上升而不降陰獨居內而為夢用小建中湯和之此世俗所昧也陸麗京曰遺精之源有三有斫喪太過腎氣不藏無夢而遺者當益精以壯火如鹿茸丸安腎丸聚精丸九龍丹金鎖玉關丸之類有勞心太過心腎不交酣臥而遺者當實土以堤水如歸脾湯妙香散遠志丸補中益氣湯硃砂安神丸之類有思想無窮所願不得妄夢而遺者當瀉火以寧水如滋腎丸威喜丸本事豬苓丸清心蓮子飲之類三者其源各異若當清利而反補澀滋患愈甚當補澀而反清利陽氣愈微當升補而反滋陰元氣愈陷不可不求其故而為施治也丹溪治一人二十餘歲攻舉子業四鼓猶未就枕於臥間玉莖但著被與股便夢交接脫精飲食日減倦怠少氣此用心太過二火俱起夜不得睡血不歸肝腎水不足火乘陰虛入客下焦鼓其精房則精不得聚藏而欲走因玉莖著物猶厥氣客之故作接內之夢於是上則補心安神中則調理脾胃升舉其陽下則益精生陰固陽不三月而瘥沈朗仲治王雨泉壯年氣弱溺後精水淋漓不斷服六味丸不應易八味丸反加澀痛兩尺脈數而氣口虛大此土虛不能堤水也與補中益氣加麥冬五味十劑而痊宗伯學士韓慕廬三公郎祖昭素稟清癯宿有精滑不禁之恙邀石頑診之脈得微弦而數尺中略有不續之象此不但腎氣不充抑且氣秘不調愈不能司封藏之令耳為疏六味丸去澤瀉加鰾膠五味略兼沉香於補中寓宣法雖如此但久滑竅疏難期速應毋怪藥之不力也赤濁白濁白淫筋疝濁之為證莖中熱痛如火灼刀割溲溺自清惟竅端時流穢濁如膿淋瀝不斷初與溲溺不相混濫時醫不知其故多以利水之劑雜投不已因而增劇者往往有之蓋由敗積瘀腐者十中六七由濕熱下注與脾虛下陷者十常三四必先補中氣兼升舉之而後分其臟腑氣血赤白虛實以治與夫他邪所傷者固在瀉熱補虛設腎氣虛甚或火熱亢極者則不宜純用寒涼必反佐治之在達人觀變耳色白如泔或如腐花腐漿而馬口不幹結者為濕色黃赤而馬口乾靨者為火此皆為濁胃中濕熱下流也又濁而清者為濕痛者濕兼熱也有溺時結塊阻滯作痛塊中內蓄水泡者此必醉酒使內酒濕乘虛襲入精竅也黏膩如膠或心動輒遺或溺後遺下者皆精病與濁無干肥人白獨白帶多是胃中濕熱濁痰下流滲入膀胱謂之便濁與腎絕不相干雖溺後便出濁塊卻不牽膩用二陳加川萆薢澤瀉薑汁炒黃柏濁物中有水泡者二陳倍半夏加豬苓澤瀉滑石麝香赤小豆竹瀝薑汁之類赤者去半夏加琥珀延胡索赤芍藥椿根皮若腎虛淫火易動精離其位而成精濁者其精牽膩如膏雖不便溺亦常有之用九龍丹收攝之若忍精不泄流入竅隧而患白濁用五苓散赤濁用豬苓湯並加麝少許小便頻數莖中痛調下益元散赤者少加硃砂晝甚者屬上焦燥熱氣化不行益智烏藥皆不可用宜清心蓮子飲虛者妙香散二方選用心經伏暑而赤濁者五苓散減桂合生脈散肥人濕痰成濁二陳加二朮黃柏神麯黑瘦人脈洪數五心煩熱頰赤唇乾小便赤濁龍膽瀉肝湯曾見白濁人服涼藥不效一味生白果即愈者以其專祛濕濁汙垢故也脾虛下陷者補中益氣加半夏茯苓有小便如常放流濁物兩尺脈沉弱足膝痿弱白濁頻數凝白如油光彩不定漩腳澄下如膏糊六味丸加萆薢麥冬莖中大痛便赤口渴脈來滑數者宜與清熱利水津液自行四苓散加生地麥冬芩梔知柏之類丹方治白濁用枸杞一錢五分菟絲車前韭子各一錢蓮子去心二十一粒入獖豬尿脬內煮一伏時加蔥酒啜汁並食豬脬蓮子連服二三次效白淫者一時流放白水火鬱故也加味逍遙散小腹急痛便溺失精溲出白液桂枝加龍骨牡蠣湯脾風傳腎小腹痛冤熱出白液名曰蠱左傳以喪志名為蠱病乃真元不守也當歸內補建中湯加黃耆筋疝者莖中作痛筋急縮或作癢或腫或筋緩不收白物如精隨溺而下此腎不虛而肝經濕熱火旺也龍膽瀉肝湯診濁證脈大而澀按之無力或微細或沉緊而澀為虛動滑為實尺脈虛浮急疾者皆難治遲者易治前陰諸疾陰縮陰縱陰痿陰冷陰腫痛陰中癢前陰所過之脈有二一曰肝脈二曰督脈經云足厥陰之脈入毛中過陰器抵少腹是肝脈之所過也又云督脈者起於少腹以下骨中央女子入系廷孔循陰器男子循莖下至篡與女子等是督脈之所過也陰縮陰縱經曰足厥陰之筋傷於寒則陰縮入傷於熱則挺縱不收治在行水清陰器陰縮謂前陰受寒入腹內也本虛四逆湯加人參肉桂挾表邪發熱黃耆建中加熟附三五分挾食枳實理中湯加熟附五七分發熱面赤戴陽稍加黃連三四分陰縱者謂前陰受熱挺縱不收也小柴胡湯加酒黃柏濕熱龍膽瀉肝湯強中有肝火盛強有金石性發其證莖盛不衰精出不止多發消渴癰疽若因下焦伏火宜用知母生地麥冬黃芩黑參甜桔梗黃連栝蔞根地骨皮石膏生甘草大豆豬腎之類以解毒為主若因腎虛肝熱宜用熟地龜板丹皮茯苓黑參沙參天冬麥冬澤瀉五味之類以補陰為主夏子由奇方治玉莖長硬不痿精出捏之則脆癢如刺針方用補骨脂家韭子各一兩為末每服三錢水煎日三陰痿當責之精衰斫喪太過所致經云足厥陰之經傷於內則不起是也仲景八味丸特妙甚者加人參鹿茸或加巴戟蓯蓉鎖陽枸杞然亦有鬱火甚而致痿者經云壯火食氣譬人在夏暑而倦怠遇冬寒而堅強予嘗治腎經鬱火令服滋腎丸而效故須審察不可偏認火衰也薛立齋云按陰莖屬肝之經絡若因肝經濕熱而患者用龍膽瀉肝湯以清肝火導濕熱若因肝經燥熱而患者用六味丸以滋腎水養肝血而痿自起陰痿弱而兩丸冷陰汗如水小便後有余滴臊氣尻臀並前陰冷惡寒而喜熱膝亦冷此肝經濕熱宜龍膽瀉肝湯柴胡勝濕湯選用腎脈強盛右尺尤甚此相火盛而反痿宜滋腎丸六味丸婦人陰冷肥盛者多是濕痰下流所致二陳加二朮羌防男子外腎冷兩髀樞陰汗前陰痿弱陰囊濕癢臊氣柴胡勝濕湯陰腫痛乃風熱客於陰經腎虛不能宣散而腫發歇疼痛宜桂枝湯加羌防荊芥當歸細辛通草但腫而不痛者是濕熱防己茯苓湯加羌活澤瀉但痛而不腫者瘀積火滯舒筋三聖散加歸尾赤芍生甘草梢婦人產後受風多有此證芎歸羌防荊芥乳香沒藥煎湯熏洗之陰中癢亦是肝家濕熱小柴胡湯下滋腎丸瘦人燥癢屬陰虛六味丸三錢滋腎丸一錢和服外用蛇床子煎湯洗之丹方治婦人陰痿甘蔗楂燒灰入冰片擦之立止尺脈數婦人陰中生瘡下部䘌久之有蟲用豬肝煮熟切長條蘸鶴蝨末即天名精子納陰中引蟲出乃殺蟲要藥婦人瘕聚陰中腫痛不可忍有物如茄突出與男子之疝無異因濕熱者柴胡清肝散龍膽瀉肝湯選用外以枳實切碎炒熱帛包熨之冷再易但是陰痛俱效疝經云任脈為病男子內結七疝女子帶下瘕聚從少腹上衝心而痛不得前後為沖疝邪客厥陰之絡則卒疝厥陰之陰盛脈脹不通為㿉癃疝肝所生病為狐疝腎脈大急沉肝脈大急沉皆為疝心疝心痛引少腹上下無定溲便難者取厥陰金匱云腹痛脈弦而緊弦則衛氣不行即惡寒緊則不欲食邪正相搏即為寒疝寒疝繞臍痛若發則自汗出手足厥冷其脈沉緊者大烏頭煎主之寒疝繞臍痛其脈陽弦陰緊陽弦故衛氣不行而惡寒陰緊故胃中寒盛不殺穀今寒入營中與衛相搏則繞臍腹痛自汗出手足厥冷陽微陰盛其候危矣故用烏頭之溫合蜜之甘入胃以建其中而緩其痛使營中之陽旺則衛中之邪自不能留亦不使虛寒自下上之微旨也寒疝腹中痛及脅痛裡急者當歸生薑羊肉湯主之寒積迫於厥陰衝脈故用當歸以通衝脈之急生薑以散中外之寒羊肉以補精血之虛也寒疝腹中痛逆冷手足不仁若身疼痛灸刺諸藥不能治抵當烏頭桂枝湯主之腹中痛乃少陰與任脈寒證逆冷手足不仁身疼痛營衛之氣亦不調矣灸刺諸藥不效者邪不在經而在腎與任脈也故用烏頭蜜煎以溫少陰任脈之經合桂枝以調營衛之氣方後有云知者如醉狀營衛得溫而氣行也得吐者為中病陽氣內復則陰邪無容息之地而上出矣巢氏所敘厥疝症疝寒疝氣疝盤疝胕疝狼疝戴人又立寒疝水疝筋疝血疝氣疝狐疝㿗疝之名各七然皆謬立多名殊非切要大抵疝之為證受熱則緩縱不收受寒則牽引作痛受濕則腫脹累垂虛者亦然三者之間分其孰多孰少而為施治在血分者不移在氣分者多動往往有左丸偏脹而移於右丸者亦有右丸偏脹而移於左丸者皆是氣分之病若積年痛發不脹大而不能動移者方是血分之病屢發屢更其處者當是厥陰風木為患腫極而不甚痛者當是太陰濕土為患又上引者宜用桂枝吳茱萸茴香等辛熱治之下墜者宜用川楝黃柏蒼朮香附苦燥治之又痛處熱而不欲人按者濕熱也痛處寒而喜人按摩者寒積也以此明辨萬無差誤矣丹溪云睪丸連小腹急痛或有形或無形或有聲或無聲皆以為經絡有寒收引則痛不知始於濕熱壅遏在經又感外寒濕熱被郁不得疏散故作痛若只作寒論恐為未備蓋大勞則火起於筋醉飽火起於胃房勞火起於腎大怒火起於肝火鬱之久濕氣便盛濁液凝聚併入血隧流入厥陰肝性急速為寒所束宜其痛甚當用枳實桃仁山梔吳茱萸山楂生薑濕勝成㿗疝加荔枝核痛甚加鹽炒大茴香痛處可按者加桂此亦前人未備之旨也古方治疝多用溫劑丹溪獨用涼劑然更有寒熱兼施者如烏頭梔子湯治疝瘕少腹緩急痛處按之則減因其人素有濕熱外束寒邪故用黑山梔川烏頭等分為末薑汁糊丸川烏治外束之寒梔子治內郁之熱殊有奇效元氣衰弱者加人參白朮佐以木香砂仁臍下撮急周身皆痛小便數而清諸脈洪緩獨腎脈弦急無力此邪客於腎名曰腎疝酒煮當歸丸凡疝氣帶下皆厥陰風木之病全蠍治風之要藥川楝茴香皆入小腸當歸延胡活血止痛疝氣帶下皆寒邪積聚於小腸總郁化為熱非附子不能開之丁香木香為引導也若有瘀血結滯作痛又當以桃仁赤芍導之沖疝者氣上衝心下二便不通乃寒濕之邪固結於內郁積為熱加以客寒觸之而發天台烏藥散加鐵鏽水調服甚則禹功散加炮薑枳實青皮下之沖疝歲久不除漸成衝心疝氣證與蠱脹無異誤用攻伐脹必轉劇惟辛溫健運庶為合宜然亦取效良難至於調理尤宜詳慎每見食填中脘濁陰之氣上逆頃刻告變業嘗見之此與衝心腳氣不殊也狐疝者臥則入腹立則出腹仲景云陰狐疝氣偏有大小時時上下蜘蛛散主之若寒束熱邪疝瘕攻痛酒煮當歸丸㿗疝者少腹控卵腫急絞痛靈樞刺節篇所謂去瓜是也睪囊腫大如斗如栲栳甚者與身齊等而不作痛中臟穢液甚多此濕邪也最為難治但覺微痛者可治桂苓丸加蒼朮厚朴黃柏川烏水疝腎囊腫痛陰汗如流囊如水晶小腹內按之作聲得之飲酒使內更感風寒濕留囊中所致五苓散換蒼朮加楝實柏皮木腎則陰丸腫大作痛頑痹結硬皆嗜欲內戕腎經虛憊濕熱凝滯其間故頑痹結硬腫大作痛二妙散加肉桂吳茱萸半夏枳實生薑荊芥穗一兩朴硝蘿蔔各二兩蔥七莖煎湯淋洗厥疝者厥氣上衝心腹肝經素有火邪加以寒氣外郁寶鑑當歸四逆湯若陰疝牽引小腹痛房勞痛不可忍者此肝經素虛挾熱而外挾風寒也烏頭梔子湯加蔥白二三莖煎成入紅酒調服痛定用八味丸加茴香瘕疝脾傳之腎少腹冤熱而痛出白即巢氏之症疝子和之筋疝也丹溪所謂內郁濕熱者與此疝相似龍膽瀉肝湯去生地加橘核桃仁吳茱萸偏墜初起香橘散加穿山甲或穿山甲茴香二味為末酒調下乾物壓之患久藥之不效或一核縮入少腹痛不可忍用手按捺方得還舊者木香楝子散外用牡蠣灰良薑等分為末唾津調塗腫大一邊須臾如火熱痛即安陰虛偏墜一味敗龜板為末茴香湯或溫酒調服不應風入厥陰也加醋炒蠍梢三分小腸氣者小腸經為病小腹引睪丸連腰脊而痛蓋小腸虛則風冷乘間而入厥而上衝肝脈控引睪丸上而不下痛衝心肺病名控睪天台烏藥散小腸氣及腎虛腰痛者喝起丸若濕熱內郁小便不通為膀胱實熱加味通心散膀胱氣者膀胱經為病小腹腫痛不得小便是也宜五苓散加川楝子蔥白茴香煎成入鹽少許熱服疝因食積為患者必因飲食而發痛處有塊梗起宜立效散疝因瘀血為患者必因奔馳受寒而發痛處手不可拊按之刺痛如錐宜酒煮當歸丸去丁香加桃仁疝因風與濕熱而發者必連陰囊腫痛九味蟠蔥散疝急作痛者用黃柏酒炒為君醋炒青皮延胡索益智桃仁為臣蒼朮香附茴香俱鹽水炒為佐附子甘草為使研末作湯服後一痛過更不再作七疝痛不可忍灸大敦穴穴在足大拇指聚毛處去甲一韭葉灸七壯屬厥陰井也須用厚蒜瓣襯不可貼肉貼肉則傷指甲一種因肺氣不化膀胱為熱邪所滯而小便不通小腹與睪脹痛一味沙參大劑煎服肺氣化而小便通一服即愈但小便不閉者不可服寒疝用茴香一斤生薑二斤搗絞自然汁浸一夜收盡入青鹽二兩炒燥為末酒丸空心酒或蔥湯下二錢小腸疝氣用四制香附鹽炒茴香等分為末空心酒下三錢婦人陰腫堅硬青橘皮一斤炒燥為末分二分絹包焙熱熨頻頻易之寒疝引急痛連小腹及睪丸偏縮者以胡椒十餘粒為細末摻黑膏上烘熱貼陰囊片時其痛即止若睪丸偏縮者貼偏小半邊蓋縮即寒而墜則熱也患疝之人每浴時忍小便不去入湯揉令腸中和暢出浴即去小便使所郁寒濕乘熱發泄又有疝氣入湯致逼上升者此奔豚證也人常有之而俗醫不能辨耳小兒啼哭不止動於陰器結聚不散則陰核腫大而成疝用桂枝湯加細辛當歸木香蠍尾小兒啼哭陰囊腫大丹方用全蠍一分連皮核桃肉十分蜜丸彈子大日服一丸米湯化下屢效石頑曰疝證多用辛散苦降以解寒熱錯綜之邪然厥陰一經內藏龍火稍涉辛溫如烏頭桂枝肉桂茴香之類每致濕熱鬱發而為囊癰腫潰者多矣因為拈出以警將來診脈數而弦者當下其寒脈緊大而遲者必心下堅脈大而緊陽中有陰也可下之脈弦急搏皆疝弦數宜清熱弦緊宜溫經兼浮宜兼汗兼實宜兼下弦細為寒濕弦濡為濕熱也交腸交腸之病大小便易位而出或因醉飽或因大怒遂致遂臟氣乖亂不循故道法當宣吐以開提其氣宜五苓散加木香以探之肥盛多痰者二陳湯加枳實木香以探之使闌門清利得司泌別之職則愈矣石頑曰交腸證雖見於方書而世罕見緣石山詹石匠之婦產後五六日惡露不行腹脹喘滿大便從前陰而出省其故緣平昔酷嗜菸酒所產之兒身軟無骨因而驚駭遂患此證余以芎歸湯加莪朮肉桂炒黑山楂一服惡露通而二便如常又陸聖祥之女方四歲新秋患血痢而稀糞出於前陰作冷熱不調食積治與五苓散服香連丸二劑而愈又錢吉甫女年十三體肥痰盛因鄰居被盜發熱頭痛嘔逆面青六脈弦促而便溺易位此因驚氣亂痰襲竅端所致也與四七湯下礞石滾痰丸開通痰氣而安腸鳴內經腸鳴有五一曰脾虛經云脾虛則腹滿腸鳴飧泄食不化枳實理中湯加木香二曰中氣不足腸為之苦鳴六君子湯加木香三曰邪在大腸經云腸中雷鳴氣上衝胸邪在大腸半夏瀉心湯四曰土鬱經云土鬱之發腸鳴而為數後是也平胃散加半夏木香茯苓五曰熱勝經云少陰在泉熱淫所勝病腹中腸鳴氣上衝胸葶藶木香散金匱云腹中寒氣雷鳴切痛胸腹逆滿嘔吐附子粳米湯東垣云如胃寒泄瀉腸鳴於升陽除濕湯中加益智半夏各五分生薑大棗和煎丹溪云腹中鳴者病本於胃乃火激動其水也二陳加芩連山梔不應用胃苓湯加減肺移寒於腎為湧水湧水者按腹不堅水氣客於大腸疾行則鳴濯濯如囊裹漿水之病也葶藶丸加木香腸癰金匱云腸癰之為病其身甲錯腹支急按之濡如腫狀腹無積聚身無熱此為腸內有癰膿薏苡附子敗醬散主之詳腸癰始發證未昭著但以腹之支急按之如腫或身有塊壘便為真候若腹無積聚身無熱洵為沉寒固結雖下無濟故用薏苡附子敗醬散專以破散沉寒為務也周禹載云附子辛散以破結敗醬苦寒以排膿務令膿化仍從水道而出將血病解而氣亦開矣腸癰者少腹腫痞按之則痛如淋小便自調時時發熱自汗出復惡寒其脈遲緊者膿未成可下之當有血脈洪數者膿已成不可下也大黃牡丹湯主之詳上條用薏苡附子敗醬散是主寒沫初搏於腸未郁為熱腹濡滿而脈不洪數身無熱而甲錯如鱗故當用辛熱以散其結即內經腎移寒於脾則為癰膿是也若癰已成又非此方所宜觀次條言脈遲緊膿未成可下之當有血則知膿未成時其脈尚帶遲緊便當下而不可溫矣下法用桃核承氣可不言而喻至於脈洪數者膿已成不可下也大黃牡丹湯主之夫既曰不可下而仍用大黃者何也蓋癰膿既成於內不下毒從何泄以意逆之非謂概不可下也必得排膿破瘀之劑始為合宜但戒泛用下藥耳病者脈數無熱微煩默默但欲臥汗出初得之三四日目赤如鳩眼七八日目四眥黑若能食者膿已成也赤小豆當歸散主之脈數而煩熱邪之徵也何反無熱耶脈法有云無故脈數必生癰疽今癰發於內故無熱瘀蓄於內故汗出初得三四日毒邪內盛勢必上蒸故目赤如鳩眼至七八日膿成而滯未得下泄故四眥黑毒勢方張故默默不欲食毒邪將化故漸能食方用赤小豆令芽出以通營分之熱毒當歸以散腸胃之積血用散不用湯者取有質之物以迅掃在下之膿血也金匱此條向在狐惑例中並治腸癰便毒及下部惡血諸疾千金云卒得腸癰而不曉其病候愚醫治之錯則殺人腸癰之為病小腹重而強抑之則痛小便數似淋時時汗出復惡寒其身皮皆甲錯腹皮急如腫狀其脈數者已有膿也其脈遲緊者未有膿也甚者腹脹大轉側聞水聲或繞臍生瘡或膿從臍中出或大便出膿血一羽軍官婦病醫脈之知腸中有膿下之即愈何以知之曰寸口脈滑而數滑則為實數則為熱滑則為營數則為衛衛數下降營滑上升營衛相干血為濁敗小腹痞堅小便或澀或復汗出或復惡寒膿為已成設脈遲緊即為瘀血血下即愈腸癰下血腹中㽲痛其始發熱惡寒欲驗其證必小腹滿痛小便淋澀反側不便即為腸癰之確候無論已成未成俱用大黃牡丹湯加犀角急服之小腹痛若腫滿不食小便不利膿壅滯也用薏苡丹皮桃仁蔞仁煎服以排之若至反側作水聲此膿已成熟也千金托裡散下太乙膏若膿從大便出者為直腸癰可治若從臍中出者為盤腸癰多不治經云腸癰為病不可驚驚則腸斷而死脫肛穀道癢痛難經云出者為虛肛門之脫非虛而何況大腸與肺為表裡肺臟蘊熱則閉虛則脫須升舉而補之慎不可用墜氣之藥產育及久痢用力過多小兒氣血未壯老人氣血已衰故多患此疾是氣虛不能約束禁固也大劑補中益氣湯為主升麻須用醋煮瀉痢後大腸氣虛肛門脫出不腫不痛屬氣血虛補中益氣加伏龍肝赤腫有痛宜兼涼血祛風加羌防芍藥裡急下重有膿血加木香烏梅大腸熱甚而脫升麻湯加羌防芩連腸風下血而脫人參胃風湯老人虛人用力過度而脫者十全大補湯腸胃燥澀大便秘結努掙太過因而脫肛者人參固本丸加槐角涼補以潤之有腸頭作癢即腹中有蟲丈夫因酒色過度所致大腸者傳道之官腎者作強之官蓋腎虛則泄母氣肺熱則大腸不收故成脫肛治法內服黃連犀角散外用朴硝煎湯洗之大腸虛而挾熱肛門紅腫槐花槐角等分羊血拌炙熟為末以酒送下大腸受熱則赤腫受寒則白滑皆能脫出當審其因證寒者以香附荊芥胡蔥煎湯洗之熱者以五倍子朴硝白礬煎湯洗之風熱以荊芥薄荷朴硝煎湯洗之緋赤腫痛不可用熱湯熏洗尤忌五倍子等酸澀收斂湯氣蒸發則愈腫愈痛宜熊膽磨水點之或田螺去靨入冰片少許埋地一宿化水點之病勞人脫肛骨肉相失聲散嘔血陽事不禁夢寐交侵呼吸不相從晝涼夜熱者死唾膿血者亦死其脈不數而有根蒂及頰不赤者生小兒脫肛鱉頭燒灰塗之穀道癢痛多因濕熱生蟲欲成痔瘻宜以雄黃入艾綿燒煙燻之治穀道蟲赤腫或癢或痛用杏仁搗作膏敷之或炒令黃以綿蘸塗穀道中外臺治下部蟲齧杵桃葉一斛蒸之令極熱內小口器中坐定熏之蟲立死治肛門腫痛用木鱉子肉四五枚研極細沸湯泡洗另用少許塗患處痔漏內經曰因而飽食筋脈橫解腸澼為痔又曰督脈生病癃痔或醉飽入房精氣脫舍其脈空虛酒毒乘之流注於脈或淫極而強忍不泄前陰之氣歸於大腸而痔或以藥固精停留不化流著篡間從其所過肛門而為痔也其證有七肛邊發露肉珠狀如鼠乳時出膿血妨於更衣者曰牡痔肛邊腫痛生瘡突出腫五六日自潰出膿血者曰牝痔肛邊生瘡顆顆發㿔癢而復痛更衣出清血者曰脈痔腸內結核痛而有血寒熱往來登溷脫肛者曰腸痔因便而清血隨下不止者曰血痔每遇飲酒發動瘡痛流血曰酒痔憂恐鬱怒立見腫痛大便艱難強力肛出而不收曰氣痔名色種種各當審其因而治之其形有如蓮花雞冠核桃或如牛乳雞心鼠乳櫻桃之狀或藏肛門之內或突出於外久而不瘥變為瘻也潰有血膿都為熱甚至若潰出黃水則為濕熱矣久而不愈血氣衰弱以致穿穴成漏又無痔而肛門左右別有一竅流出膿血者俱當戒酒遠色少勞茹淡方妙立齋云焮痛二便秘宜清熱涼血潤燥疏風若寒涼損中者調養脾胃滋補陰精若漏而穿臀穿腸者宜養元氣補陰精大便秘者潤燥養血肛門墜下作痛瀉火除濕或作癢者祛風勝濕腫痛小便不澀瀉肝導濕若疝與痔俱患用六味丸補中益氣並進痔證之方不一東垣雖分濕熱風燥四治大都不離盪滌瘀熱之藥如蝟皮皂角檳榔大黃桃仁之類在所必用兼風毒則加羌防升柴甚則麻黃藁本汗之兼燥氣則加秦艽當歸黃耆濕勝則加蒼朮黃柏澤瀉茯苓兼熱甚則加芩連郁李生地膿血則加甲片歸尾酒痔則加葛根赤小豆地芍苓半氣痔則加枳橘木香紫蘇食積則加黃連枳實曲糵痛極則加乳沒血多則加發灰氣虛則加參耆血虛則加膠艾不必拘執古方也惟血痔諸藥不應石煤槐花空心烏梅湯服神效陳毓仁云諸痔欲斷其根必須枯藥當實其竅必戒房勞百日方妙凡治內痔先用通利藥盪滌臟腑後以喚痔散填入肛門其痔即出欲用枯痔散先以護痔膏圍護四邊好肉然後上之上枯藥後色黑堅硬裂縫則以落痔湯洗之脫落後孔竅不收者以生肌散摻之至於穿腸久漏者另有胡連追毒丸黃連閉管丸主之諸痔及五癭六瘤凡蒂小而頭大者俱用煮線方治之洗痔法用生蚌劈開取水點即用煮湯熏洗效痔焮赤腫痛以真熊膽研水點之腫痛自消點痔用大螄螺一個挑去靨入麝香冰片少許過一宿化水點之又法用大蝸牛一個去殼生銀杏肉一枚同研爛入冰片半分研勻點上即收漏經云陷脈為瘻留連肉腠因瘡穿膿汁不盡復感七情四氣而成近則常淡紅或微腫或小核久則上而槁白內而黑爛淫蟲惡臭生焉治法宜補氣生血外以黑附子為末唾津和作餅如錢厚以艾灸之隨漏大小作炷但灸微熱不可使痛干則易困倦則止來日再灸直至內平為效仍須補藥常服丹方治痔漏以積年琉璃洗淨油膩火煅研細以紅酒服四錢不過七日其管自去丹方以鰾膠一味炒研為散日用一錢匙砂糖調服服久痔自枯落一法以降藥紙條捻進黑膏掩之自脫以乾漆灰捻進亦脫或生漆塗入亦脫以漆能破瘀血也大抵漏瘡孔中多有惡穢之物以露蜂房白芷苦參煎湯無風處熏洗日三次良有痔漏人每日侵晨食狗肉勿令間斷取其性溫益腎腎主二便百日中管自消不藥而愈又法外用土墼燒赤放罐中以亂髮燒煙日熏二三次無論新久痔漏日漸管脫焦枯而愈
