body:
  text: 卷五諸血門諸見血證經云太陽厥逆僵仆嘔血善衄陽明厥逆喘咳身熱善驚衄嘔吐血氣者喜溫而惡寒寒則泣不能流溫則消而去之失血氣於氣異名同類營衛者精氣也血者神氣也故奪血者無汗奪血者不可復發其汗奪汗者不可復取其血脾移熱於肝則為驚衄脈至而搏血衄身熱者死脈來懸鉤浮為常脈言脈來虛浮按之傍指屈曲而出形容芤脈之象也大怒則形氣絶而血菀於上菀積也悲哀太甚則胞絡絶胞絶則陽氣內動發則心下崩數溲血也胞移熱於膀胱則癃溺血金匱云師曰尺脈浮目睛暈黃衄未止暈黃去目睛慧了知衄今止尺以候腎腎虛則相火擾其陰血從膀胱而升故脈浮也腎之精上營瞳子膀胱之脈下額中二經中有不歸經之血故暈黃黃退則血亦散所以知衄止也明理論云傷寒衄血責邪在表雜病衄血責邪在裡此曰尺浮不言寸浮知為腎虛血逆非外邪也病人面無色無寒熱脈沉弦者衄浮弱手按之絶者下血煩渴者必吐血一作病人面無血色面者血之華血統則華鮮若有寒熱為傷其血而致今無寒熱則是因血脫而然矣夫脈浮以候陽沉以候陰若但見沉弦輕取絶無者是無陽也無陽知血之上脫若止見浮弱重按絶無者是無陰也無陰知血之下脫而煩渴嘔血者以火氣擾亂則神煩火動於膈則咳逆咳則湧血而上越也然則沉之無浮浮之無沉何便見為脫血乎以其面無血色而脈弦弱也男子脈虛沉弦無寒熱短氣裡急小便不利面色白時目瞑兼衄小腹滿此為勞使之然脈虛沉弦者以按之則少神且無寒熱明非外感之邪也其短氣裡急少腹滿小便不利而面色白皆內傷於氣之候故雖時目瞑而衄洵為勞役所致而然也男子面色薄者主渴及亡血卒喘悸脈虛者裡虛也心主血心虛則脈虛上句以面色薄而主心血不榮於外下句以喘悸脈浮而主心氣不充於裡皆由心神耗散血亡津傷所致也夫吐血咳逆上氣其脈數而有熱不得臥者死此金水二臟不足故也水不足則火獨光而金傷矣夫陰血之安養內外者皆腎水主之也腎水虛則不能安靜而血被火逼遂溢出血出則五臟內外之陽皆失其配失配之陽無根之狂陽也有升無降炎爍肺金而為咳逆上氣肺腎之陰有絶無復耳脈數身熱陽獨勝也不能臥陰已絶也陰絶則陽不能獨生故曰死夫酒客咳者必致吐血此因極飲過度所致也酒性大熱傷胃胃氣不守亂於胸中中焦之血不布於經絡因熱射肺而為咳逆隨氣溢出也此即千金所謂由傷胃吐血也吐血不止者柏葉湯主之夫水者遇寒則堅冰潛於地中遇風則洶湧起於平陸人之吐血皆風火使然柏葉稟西方金氣可制肝木之逆則血有所藏艾葉之溫可使火反歸陰而宿藏於下用馬通以降血逆尤屬相宜家祕多阿膠三錢時珍綱目有阿膠無艾總取辛溫之力以和苦寒之性不獨治吐血不止而下血者亦可用之病人胸滿唇痿舌青口燥但欲漱水不欲咽無寒熱脈微大來遲腹不滿其人言我滿為有瘀血凡內外諸邪有血相搏積而不行者即為瘀血血積則津液不布是以唇痿舌青口燥但欲漱水以潤其燥血為陰邪且內無熱故不欲咽也脈大為熱遲為寒今無寒熱之病而微大者乃氣並於上故胸滿也遲者血積膈下也積在陰經之隧道不似氣積於陽之肓膜然陽道顯陰道隱氣在肓膜者則壅脹顯於外血積隧道惟閉塞而已故腹不滿因閉塞自覺其滿所以知瘀血使然也病者如熱狀煩滿口乾燥而渴其脈反無熱此為陰伏是瘀血也當下之血陰也配於陽氣得之以和神得之以安咽得之以潤經脈得之以行身形之中不可斯須離也今因血積神無以養則煩氣無以和則滿口無以潤則燥胃無以澤則渴是皆陽失所配營衛不布津液不化而為是證也非陽之自強而生熱比故曰如熱狀脈反無熱陰邪不能鼓激其脈故為陰伏下血先便後血此遠血也黃土湯主之亦止吐血衄血經言大腸小腸皆屬於胃又云陰絡傷則血內溢今因胃中寒邪並傷陰絡致清陽失守迫血下溢二陽遂成本寒標熱之患因取白朮附子湯之溫胃助陽祛散陰絡之寒其間但去薑棗之辛散而加阿膠地黃以固護陰血其妙尤在黃芩佐地黃分解血室之標熱灶土領附子直溫中土之本寒使無格拒之虞然必血色瘀晦不鮮者為宜若紫赤濃厚光澤者用之必殆斯皆審證不明之誤豈立方之故歟千金用續斷止血湯方用續斷當歸桂心蒲黃阿膠甘草乾薑生地黃八味附此以備按證取用下血先血後便此近血也赤小豆當歸散主之此方在狐惑例中治脈數無熱微煩默默但欲臥汗出初得之三四日目赤如鳩眼七八日目四眥黑全是濕熱傷血菀化為膿之候此先血後便乃小腸熱毒流於大腸為火剋金之象故亦主此方以赤小豆之清熱利水為君且浸令芽出以發越蘊積之毒使丙丁之火疾趨水道而降佐以當歸司統握之權使血有所歸而不致於散漫也千金用伏龍肝湯即治先便後血之黃土湯中除去朮附加乾薑牛膝地榆發灰與金匱主治則有寒熱之殊不可不辨可見治血但使歸經不必論其遠近也心氣不足吐血衄血瀉心湯主之心氣不足言陰津不足非心火之不足也故以大黃導蘊結之火芩連瀉心下之熱而血自安矣趙養葵曰凡腎經吐血者俱是下寒上熱陰盛於下逼陽於上之假證世人不識而為所誤者多矣吾獨窺其微而以假寒治之蓋真陰失守命門火衰火不歸源陰邪逼其浮游之火於上上焦咳嗽氣喘惡熱面紅嘔吐痰涎出血此係假陽之證須用八味丸引火歸源水探冷服下嗌之後冷性既除熱性始發因而嘔噦皆除即仲景人尿豬膽汁加於白通湯中以通格拒之意也倘一服寒涼頃刻立化慎之哉人有偏陰偏陽者此氣稟也太陽之人雖冬月身不須綿口常飲水色欲無度大便數日一行芩連知柏硝黃恬不知怪太陰之人雖暑月不離復衣食飲稍涼便覺腹痛泄瀉參朮薑桂時不絶口一有欲事呻吟不已此兩等人各稟陰陽之一偏者也與之談醫各執其性之一偏面目為全體今之為醫者不鑑其偏之弊而製為不寒不熱之方舉世宗之以為王道豈知人之受病以偏得之感於寒則偏於寒感於熱則偏於熱以不寒不熱之劑投之何以補其偏而救其弊哉故以寒治熱以熱治寒此方士之繩墨也然苦寒頻進而積熱彌熾辛熱比年而沉寒益滋者何耶此不知陰陽之屬也凡治血證前後調理須按心脾肝三經用藥心主血脾裹血肝藏血歸脾湯一方三經之藥也遠志棗仁補肝以生心火茯神補心以生脾土參耆甘草補脾以固肺氣木香者香先入脾總欲使血歸於脾故曰歸脾凡有鬱怒傷肝思慮傷脾者尤宜火旺者加山梔丹皮火衰者加肉桂丹皮又有八味丸以培先天之根治無餘法矣血溢血瀉諸蓄妄證其始也宜以行血破瘀之劑折其脫氣而後區別治之或問失血復下虛何以當答曰血既妄行迷失故道不去蓄利瘀則以妄為常曷以御之且去者自去生者自生何虛之有失血家須用下劑破血蓋施之於蓄妄之初亡血虛家不可下蓋戒之於亡失之後也或問人身陽氣為陰血之引導陰血為陽氣之依歸何為清濁相干亂於中外而致血不歸經則有上溢下脫之患其血或從吐出或從嘔出或從咯出或從鼻出或從眼耳齒舌出或從津唾而出或從肌膚而出或從二便而出復有蓄積不行者為患各有不同願一一顯示至理條分臟腑經絡之源以啓學人矇昧石頑答曰經言血之與氣異名同類雖有陰陽清濁之分總由水穀精微所化其始也混然一區未分清濁得脾氣之鼓運如霧上蒸於肺而為氣氣不耗歸精於腎而為精精不泄歸精於肝而化清血血不瀉歸精於心得離火之化而為真血以養脾臟以司運動以奉生身莫貴乎此雖經有上注於肺乃化為血之說而實不離五行之氣化轉注如環也如上所云不過統論營衛血氣之大端乃節文耳夫營衛者精氣也血者神氣也氣主煦之血主濡之雖氣稟陽和血稟陰質而陰中有陽陽中有陰不能截然兩分其至清至純者得君主之令以和調五臟藏而不失乃養臟之血也其清中之濁者秉輸運之權以灑陳六腑實而不滿則灌注之血也其清中之清者會營周之度流行百脈滿而不泄此營經之血也其源則一析而為三各有司屬若各守其鄉則陰平陽祕安有上溢下脫之患乎蓋緣人之稟賦不無偏勝勞役不無偏傷其血則從偏衰偏傷之處而滲漏焉夫人稟賦既偏則水穀多從偏勝之氣化而勝者愈勝弱者愈弱陽勝則陰衰陰衰則火旺火旺則血隨之而上溢陰勝則陽微陽微則火衰火衰則火失其統而下脫其上溢之血非一於火盛也下脫之血非一於陽衰也但以色之鮮紫濃厚則為火盛色之晦淡無光即為陽衰究其所脫之源或緣臟氣之逆或緣腑氣之乖皆能致病後上溢者勢必假道肺胃從下脫者勢必由於二腸及從膀胱下達耳蓋出於肺者或緣龍雷亢逆或緣咳逆上奔血必從之上溢多帶痰沫及粉紅色者其出於心包亦必上溢色必正赤如朱漆光澤若吐出便凝摸之不黏指者為守藏之血見之必死出於脾者或從胃腕上溢或從小腸下脫亦必鮮紫濃厚但不若心包血之光澤也出於肝者或從上嘔或從下脫血必青紫稠濃或帶血縷或有結塊出於腎者或從咳逆或從咯吐或稀痰中雜出如珠血雖無幾色雖不鮮其患最劇間有從精竅而出者若氣化受傷則從膀胱溺孔而出總皆關乎臟氣也其出於胃者多兼水液痰涎吐則成盤成盞汪洋滿地以其多氣多血雖藥力易到不若藏血之篤然為五臟之本亦不可忽其衄血種種各有所從不獨出於鼻者為衄也鼻衄皆火乘肺金亦有陰盛迫其虛陽而脫者雖經有臟腑諸衄不同然不離手太陰之經所以治有從陰從陽順治逆治之辨別證有久衄暴衄宜補宜瀉之懸殊其齒衄有陽明少陰及風熱之辨但從板齒出者為牙宣屬陽明齒動搖者為骨病屬少陰齦腫上壅者少陽風熱也耳衄則有肝腎二經之殊但以常有不多不腫不疼者為少陰之虛暴出疼腫者則厥陰經火也眼衄亦屬厥陰但以卒視無所見者為實火常流血淚者素患之風熱也其有諸竅一齊湧出多緣顛撲驟傷或藥毒所致若因肝腎疲極五臟內崩多不可活舌衄皆手厥陰心包之火旺但以舌尖破碎者為虛火脈大滿口者挾龍雷之勢而上侮君主也涎中見血為唾衄足太陰經氣不約也汗孔有血為肌衄足陽明經氣不固也如上諸衄皆緣營氣之逆滿衛氣之疏豁不能固護而行清道總無關乎臟氣也其下行之血見於魄門者則以便前便後分遠近近則大腸遠則小腸也以濺灑點滴分風濕濺則風淫滴則濕著也以鮮紫清晦分陰陽鮮則陽盛晦則陽衰也與腸澼之血痔漏之血婦人經癸胎産之血無異雖由二腸頗關經絡是以隨經下趨各有不同至於崩淋下脫倒經上溢雖下上之歧路攸分然皆衝脈為病而崩淋皆脾氣下陷倒經則肝血上逆以脾為身之津梁沖為肝之血海是皆關乎臟氣更有肝脾受傷血雖不下而氣色痿黃大便稠黑乃蓄血之徵驗為患種種難以悉陳如內傷發黃鼓脹喘滿腹大青筋及産後敗血流於經絡皆蓄血致病但證有虛中挾實治有補中寓瀉從少從多之活法貴乎臨病處裁大抵血氣喜溫而惡寒寒則泣不能流溫則消而去之此軒岐密旨但世之名於醫者一見血證每以寒涼濟陰為務其始非不應手而取效於一時屢發屢折而既病之虛陽愈衰必致嘔逆喘乏奪食泄瀉尚以為藥力未逮猛進苦寒在陰不濟陽而上溢者尚為戈戟況陽不統陰而亡脫者尤為砒鴆蓋因陽藥性暴稍有不順下咽立見其害不若陰柔之性至死不知其誤而免旁人譏謗也噫醫之弊僅為知己道難為世俗言也衄血大衄舌衄齒衄耳衄眼衄肌衄衄者血從經絡中滲出而行於清道也傷寒衄血責熱在表有麻黃越婢等法雜病衄血責熱在裡經絡熱甚陽氣壅重迫血妄行而出於鼻從無發散之理若因七情喜怒勞役過傷而致者無論是何經絡並宜茅花煎湯調止衄散或四物加犀角丹皮沉香六脈弦細而澀按之空虛色白不澤者脫血也此大寒證理中湯加黃耆六脈俱大按之空虛心動面赤善驚上熱乃手少陰心火旺而上熏於肺脈也三黃補血湯實熱衄血脈實大便祕者犀角地黃湯加木香大黃衄血過多屢服犀角地黃湯不止此內虛寒而外假熱也千金當歸湯兼標本而治之若至夜發此因多汗衛氣大虛不能固其營血也當歸補血湯不效加木香更不效必是血虛火旺大劑保元湯若誤用涼血藥致瘀熱內結胸中作痛者一味木香酒磨頓服錢許立效內傷勞役之人喘嗽面赤發熱頭痛而衄此肺經氣虛失護衛之職致心包火炎經脈熱甚故行清道當歸補血湯加薄荷荊芥不應補中益氣倍黃耆慎不可用辛熱之藥兼有風寒小建中加蔥豉清道閉塞流入胃脘吐出清血或衄血不盡瘀積停留致面目痿黃大便黑色者犀角地黃湯攧撲而衄不止小烏沉湯調黑神散伏暑而衄五苓散加茅花久衄不止熱在下焦血分六味丸加五味子作湯不效加童便有先因衄血衄止而變生諸證或寒熱間作或喘急無寐病狀不一漸成勞憊當於虛損諸證詳之曾病衄後血因舊路或一月三四衄又有洗面即衄日以為常並宜止衄散茅花煎湯調下大衄不止面浮腫者蘇子降氣湯使血隨氣下得力全在肉桂一味久衄不已須加氣藥如木香香附之類蓋血無氣引則血不歸經也有頭風才發則衄不止用童便浸川芎一兩童便制香附二兩炙甘草半兩共為末每服三錢清茶調下間用搐鼻法診衄血脈浮大數者為邪伏於經宜發汗大而虛者為脾虛不能統攝宜補氣小而數者為陰虛火乘宜攝火弦澀為有瘀積宜行滯凡衄血之脈數實或堅徑或急疾不調皆難治久衄脈虛大頭額痛甚鼻流淡黃水者死大衄大衄血者口鼻俱出也此積勞傷脾所致補中益氣倍黃耆當歸不應歸脾湯加童便藕節舌衄舌上忽出血如線先用蒲黃煎湯漱之次用槐花炒研摻之黃耆六一湯合生脈散服之熱壅舌上出血如泉用文蛤一味為散摻之虛熱舌脹大出血不止生乾薑末蒲黃末摻之齒衄血從齒縫中或齒齦中出者曰齒衄又謂牙宣有風壅有腎虛有胃火風壅者或齒齦微腫或牽引作痛消風散加犀角連翹外擦青鹽藁本末腎虛者口不臭齒浮動齒縫中點滴而出若隱隱作痛者虛風襲入腎經腎主骨齒乃骨之餘也宜鹽湯下小安腎丸不痛腎虛而有火也六味丸加骨碎補外用青鹽炒香附末擦之胃熱者牙疼而齦間出血如湧齒不動搖其人必好飲或多啖炙爆所致口臭不可近宜清胃散甚者服調胃承氣湯耳衄耳中出血為耳衄兩關弦數飲酒多怒人屬肝火柴胡清肝散尺脈弱或躁屬陰虛生料六味丸加五味子更以龍骨燒灰吹入即止眼衄血從目出乃積熱傷肝或誤藥擾動陰血所致暴病發熱見此梔子豉湯加犀角秦皮丹皮赤芍誤藥成壞病見之雖用獨參保元生料六味皆不可救肌衄血從毛孔出者為肌衄脈數當歸補血湯脈浮黃耆建中湯脈弱保元湯脈盛當歸六黃湯滑伯仁治一婦體肥氣盛因無子常服暖子宮藥積久火盛迫血上行為衄衄必升余醫者猶以為上實下虛用丹劑鎮墜之經云上者下之今血氣俱盛溢而上行法當下導奈何實實耶即與桃核承氣三四下瘀積既去繼服既濟湯二十餘劑而愈一膏粱過飲致衄醫曰諸見血為熱以清涼飲子投之即止越數日其疾復作又曰藥不勝病故也遂投黃連解毒湯或止或作易數醫皆用苦寒之劑向後飲食起居漸不及初肌寒而躁言語無聲口氣穢臭其衄之餘波未絶或曰諸見血為熱熱而寒正理也今不愈而反害之何耶蓋醫惟知見血為熱而以苦寒攻之不知苦寒專瀉脾土脾土為人之本火病而瀉其土火未除而土已病病則胃虛虛則營氣不能滋榮百脈元氣不循天度氣隨陰化故聲不揚而肌寒也惟當甘溫大補脾土斯可向安矣石頑治朱聖卿鼻衄如崩三日不止較之向來所發之勢最劇服犀角地黃芩連知柏石膏山梔之屬轉盛第四日邀余診之脈弦急如循刀刃此陰火上乘載血於上得寒涼之藥轉傷胃中清陽之氣所以脈變弦緊與生料六味加五味子作湯另用肉桂末三錢飛羅麵糊分三丸用煎藥調下甫入喉其血頓止少頃口鼻去血塊數枚而愈自此數年之患絶不再發吐血嘔血唾血咳血咯血血溢九竅出血繆仲淳曰吐血有三訣宜行血不宜止血血不循經絡者氣逆上壅也行血則循經絡不止自止止之則血凝血凝則發熱惡食病日痼矣宜補肝不宜伐肝經曰五臟者藏精氣而不瀉者也肝主藏血吐血者肝失其職也養肝則肝氣平而血有所歸伐肝則肝虛不能藏血血愈不止矣宜降氣不宜降火氣有餘便是火氣降則火降火降則氣不上升血隨氣行無溢出上竅之患矣降火必用寒涼之劑反傷胃氣胃氣傷則脾不能統血血愈不能歸經矣今之療吐血者大患有二一則專用寒涼之味如芩連山梔四物知柏之類往往傷脾作瀉以致不救一則專用人參肺熱還傷肺咳嗽愈甚亦有用參而愈者此是氣虛喘嗽氣屬陽不由陰虛火熾所致然亦百中一二也劉默生曰吐血一證人惟知氣逆血溢火升血泛不知血在臟腑另有膈膜隔定其血不能滲溢夫膈膜者極薄極脆凡有所傷則破破則血溢於上矣故有陽絡傷則血上溢陰絡傷則血下滲已傷之膜若有復傷其吐必多膈膜雖傷傷處有瘀血凝定血來則緩若陰火驟衝破瘀積之血血來如潮之上湧自覺瀝瀝有聲彼時喘息不定面赤如醉煩躁不寧心神昏亂一皆龍雷之勢脈亦急疾難憑少頃火退神清面白氣平血亦漸止方可診切用藥須乘此時瘀積蕩盡緩緩清理徐徐調補然不可驟壅亦不可用耗氣之藥悉知此義治血有本矣吐血者一吐則傾盆盈碗或鮮散中兼紫黑大塊吐後不即凝結蓋吐血出於胃胃為水穀之海多氣多血所以吐多而不即凝以中雜水穀之氣也皆勞力內傷中氣而得亦有醉飽接內而致者治法不可驟止止則使敗血留積為瘀血之根不時舉發為害非輕亦不宜峻攻復傷其血只宜清理胃氣以安其血如犀角地黃湯隨證加桃仁茜根橘紅木香大黃童便之屬吐久不止內虛寒而外假熱千金當歸湯不應用十灰散遏之若血色瘀晦如汙泥為陽不制陰宜花蕊石散溫以散之吐血初起脈俱洪數者屬外因須用參蘇飲加歸身倍茯苓蓋茯苓能守五臟真氣瀉腎中伏火去脾胃中濕二三劑後脈數退而洪不退者用六味地黃丸加沉香以納氣歸元若洪退弱極用四君子加橘紅以補脾生肺慎不可用涼藥蓋火載上行逆也復用涼藥強為降下豈非逆而又逆乎不若發散之為愈也上膈壅熱胸腹滿痛吐血脈洪大弦長按之有力精神不倦或覺胸中滿痛或血是紫黑塊者用當歸丹皮荊芥阿膠滑石酒大黃玄明粉桃仁泥之屬從大便導之此釜底抽薪之法不知此而從事於芩連知柏之屬輔四物而行之使氣血俱傷脾胃多敗百不一生也吐血在暑天病人口渴面垢頭暈乾嘔五苓散或桂苓甘露飲並加麥冬五味藕節汁酒後悶嘔血從吐後出者新定紫菀茸湯飲酒過多傷胃吐血六君子加香砂乾葛傷胃吐血因飲食太過不能消化煩悶強嘔因傷胃口吐血腹中絞痛自汗其脈緊而數者難治枳實理中湯加丹皮扁豆灰諸失血後倦怠昏憒面失色懶於言語濃煎獨參湯加橘皮所謂血脫益氣也勞心太過吐血不止歸脾湯去木香加門冬阿膠婦人倒經血溢於上蒸熱咳嗽不除及男子精未充而御女而成虛勞失血並宜烏骨雞丸巽順丸選用若血色晦淡不鮮無論上吐下失俱當用溫熱之劑如甘草乾姜溫理中氣切禁寒涼若至衃血血水難已胃中熱甚迫血妄行犀角地黃湯加大黃灰木香桃仁吐血勢不可遏胸中覺氣塞滯吐紫黑血者桃仁承氣加茜根千金翼治吐血用生地汁半升煎三兩沸調生大黃末一方寸匙分三服治熱毒吐血有效有時吐血兩口隨即無事數日又發經年纍月不愈者小烏沉湯送黑神散不時常服吐甚不止者柏葉乾薑等分加艾少許入童便服失血後頭暈發熱者往往有之此是虛火上炎外擾之故不可誤認外感而用風藥吐血發渴名曰血渴十全大補湯或生脈散加黃耆煨葛根枇杷葉量胃氣虛實用之暴吐血新止後丹方用燕窩菜冰糖各四錢同煮服之連服五七日永不復發吐血脈以微細為順洪大為逆血若暴湧如潮喉中汩汩不止脈見虛大此火勢未斂不可便與湯藥急以熱童便或藕汁灌之俟半日許脈勢稍緩可進調養之劑倘寸關雖弱而尺中微弦為陰虛以防午後陰火上升上午宜服獨參保元以統其血午後與六味丸加童便牛膝以濟其陰服後脈漸調和飲食漸進肢體輕捷面色不赤足膝不冷身不灼熱額無冷汗溲便如常雖有紫黑血塊時欲咯出而無鮮血上行方許可治血雖止而脈大不減或雖小而弦細數疾或弦硬不和慎勿輕許可治亦有他部柔和而左手關尺弦強者為陰虛火旺最為危兆其變有三一則陰火引血復上而暴脫一則虛陽發露而發熱一則火上逼肺而喘咳此終不救脫血用大劑人參益氣以固血惟血色鮮明或略兼紫塊者宜之若見晦淡者為血寒而不得歸經須兼炮黑乾薑或大劑理中溫之尺部脈弦大劑生料六味加肉桂引之亦有用肉桂為末和獨參湯服者若血色如朱光亮如漆吐出即干以指甲剔之成片而起者雖能食不倦後必暴脫而死若血中見似肉似肺如爛焦腸此胃中脂膜為邪火所爍凝結而成方書咸謂必死然吐後凝結既去而不發熱能進飲食令服小劑異功保元大劑六味都氣多有得生者不可盡委之於無救也此證宜與前虛損門參看嘔血嘔血者血從腹脅而上大嘔而出乃肝火內旺鼓激胃中之血上湧猶龍奮於澤而波濤為之沸騰也嘔血證治有三一屬暴怒火逆傷肝其證胸脅痛甚則厥逆柴胡疏肝散加酒大黃一屬極勞奔馳傷肝其證遍身疼痛或時發熱犀角地黃湯加當歸肉桂桃仁泥一屬竭力房勞傷肝其證面赤足冷煩躁口渴生脈散合加減八味丸陽衰不能內守而嘔者異功散研服八味丸然不戒房室思慮勞役終不救也房室勞憊氣竭傷肝而有乾血者四烏鰂骨一蘆茹丸兼童便藕汁之類唾血平時津唾中有血如絲或浮散者此屬思慮傷脾脾虛不能統血也有兼心兼腎兼胃之不同兼心加味歸脾湯兼腎六味丸加五味子肉桂兼胃四君子湯加黃耆山藥粟米名七珍散食少痰清者異功散加枇杷葉白扁豆灰胃中痰食不清吐血加半復生薑即白扁豆散咳血咳血者因咳嗽而見血或乾咳或痰中見紅絲血點一兩口氣急喘促此雖肺體自燥亦為火逆咳傷血膜而血隨痰出也其脈微弱平緩易治弦數急實氣促聲嘶咽痛者不治得此證者若能靜養庶有生理治宜六味丸加門冬五味清金壯水為生略兼阿膠貝母百合款冬紫菀潤肺止咳之劑血止後胃虛少食氣息不續者劫勞散去半夏加紫菀茸及瓊玉膏調理之咳血久而成勞或勞而咳血肌肉消瘦四肢倦怠五心煩熱咽乾頰赤心沖潮熱盜汗減食異功散加阿膠或四君子加黃耆鱉甲麥冬五味陰虛火動而咳血或痰中有血星如珠者生料六味丸加茜根烏賊骨童便咳血不止至夜發熱吐痰或帶血絲者六味丸加蛤粉童便臨臥服肥盛酒客輩痰中有血滾痰丸搜滌之咳唾膿血咳即胸中隱隱痛脈反滑數或數實者此為肺癰更於本門求之咯血咯血者不嗽而喉中咯出小塊或血點是也其證最重而勢甚微常咯兩三口即止蓋緣房勞傷腎陰火載血而上亦有兼痰而出者腎虛水泛為痰也陰虛多火黑瘦之人是忌犯此初起宜紫菀麥冬茯苓棗仁山藥白芍丹皮童便以清手足少陽厥陰諸經遊散之火後以六味丸加牛膝滋補腎陰以安其血慎不可用攻血藥也滑伯仁曰咯血為病是重以肺為清肅之臟金為陰火所制水虧火旺迫而上行以為咯血逆之甚矣經謂上氣見血下聞病音者言喘出於腎而咯出於肺也余嘗用生料六味丸加麥冬五味下靈砂丹治之是得內經之旨也然多有兼挾風寒飲食而發者不可誤認本病而與前藥若兼風寒則人迎浮虛或見弦緊飲食則氣口短滑或反伏澀風寒則黃耆建中飲食則枳實理中不可妄用他藥喻嘉言曰夫血病有新久微甚無不本之於火然火有陰陽不同治法因之迥異經云暴病非陽則其為火也即非陽火甚明陽火者五行之火何暴之有設其暴也復可以五行之水折之惟夫龍雷之火潛伏陰中方其未動不知其為火也及其一發暴不可御以故載陰血而上溢故凡用涼血清火之藥未有不轉助其虐者大法惟宜溫補其陽以制陰火之僭經謂咯血者屬腎明乎陰火發於陰中其血咯之成塊而出不比咳嗽痰中帶血為陽火也此義從前未有發明惟仲景云誤發少陰汗動其經血者下厥上竭為難治後人隨文讀去總置不講不知下厥者陰氣逆於下也上竭者陰血竭於上也蓋氣與血兩相維附氣不得血則散而無統血不得氣則凝而不流故陰火動而陰氣不得不上奔陰氣上奔而陰血不得不從之上溢而竭矣血既上溢其隨血之氣散於胸中不得復返於本位則下厥矣陰既逆於下勢必龍雷之火應之血不盡竭不止也仲景所以斷為難治者非直不治也吾為大辟其扃則以健脾中之陽氣為第一義健脾之陽一舉有三善一者脾中之陽氣旺而龍雷之火潛伏也一者脾中之陽氣旺而胸中窒塞如太空不留纖翳也一者脾中之陽氣旺而飲食運化精微復生其已竭之血也今方書妄引久嗽成勞痰中帶血之陽證不敢用健脾增咳為例不思咯血即有咳嗽不過氣逆氣下則不咳矣況原無咳嗽者乎古方治龍雷之火每用桂附引火歸元之法然施之於暴血之證可暫不可常蓋已虧之血恐不能制其悍而未動之血恐不可滋之擾耳此以崇土為先土厚則濁陰不升而血患自息也血溢原病式云血溢者上出也心主血熱甚則血隨火而妄行或謂嘔吐紫凝血為寒者誤也此非冷凝由熱甚銷爍而為稠濁熱甚則水化制之故赤兼黑而為紫也瀉心湯蓋火性急速故至溢脫從未見有屬陰寒者耳或偶觸破傷血遂泉湧不止惟用十全大補湯頻頻多服外用杏仁研細拌白麵水調塗之九竅出血是證非中毒即跌撲受傷中毒者用生羊血等法受傷者觀其人不發熱尚能飲食者頻灌熱童便無故發熱九竅出血者肝腎疲極五臟內崩也多不可治若見血水必死若因勞傷者補中益氣倍參耆或胎髮灰大薊汁人參湯調服或血餘灰每服二錢以茅根車前草煎湯調下氣有餘便是火血隨氣上補水則火自降順氣則血不逆阿膠牛膝丹皮補水之藥也蘇子橘紅沉香順氣之藥也童便者引血歸下竅兼有行瘀之能藕汁者達血使無滯而有止澀之力脈來沉實腹中滿痛或吐血塊或為瘀血蓄血當歸桃仁赤芍延胡索蓬朮大黃之屬怒傷肝木則血菀於上使人薄厥沉香木香青皮芍藥丹皮之屬勞心蓮肉棗仁薯蕷茯神紫菀柏仁丹參之屬房勞熟地枸杞牛膝杜仲鹿茸人參之屬血熱地骨丹皮犀角血寒桂心附子血熱不止山梔灰黃連灰血瘀發灰大黃灰乾漆灰血寒乾薑灰血滑棕櫚灰蓮房灰血虛地黃灰三七鬱金行血中之氣側柏涼血中之熱大小薊行血中之滯茅根導之使下行也診經曰安臥脈盛謂之脫血失血脈數大為陽盛澀細為少血細數為陰火鬱於血中芤為失血血虛氣不歸附也弦緊脅痛為瘀結諸血皆屬於肝也脈來寸口大尺內微為肺中伏火尺中盛而寸口虛大為腎虛陰火尺滑而疾為血虛有熱右手虛大為脾胃之火左手數盛為肝膽之火大抵失血脈微弱細小而和緩者易治洪數實大弦急或雖小按之如引葛如循刀及衄血身熱脈至而搏嘔血胸滿引背脈小而疾者皆不治汪石山治一中年人面色蒼白平素內外過勞或為食傷則咯硬痰而帶血絲因服寒涼清肺消痰藥至五十餘劑聲漸不清而至於啞夜臥不寐醒來口苦舌乾而常白苔或時喉中梗痛或胸膈痛或噯氣夜食難化或手靠物久則麻木常畏寒不怕熱前有㿗疝後有內痔遇勞即發初診左脈沉弱而緩右脈浮軟無力續後三五日一診或時心肺二部浮虛按不應指或時脾脈輕按格指重按不足又時或數或緩或浮或沉或大或小變動無常夫脈無常血氣虛而隨火用事也譬之虛僞之人朝更夕改全無定準以脈參證其虛無疑蓋勞則氣耗而傷肺肺傷則聲啞又勞則傷脾脾傷則食易積前疝後痔遇勞則發者皆因勞耗其氣氣虛下陷不能升降故也且脾喜溫惡寒而肺亦惡寒故曰形寒飲冷則傷肺以既傷之脾肺復傷於藥之寒涼則聲安得不啞舌安得不苔苔者仲景謂之胃中有寒丹田有熱也夜不寐者由子盜母氣心虛而神不安也痰中血絲者由脾傷不能固血也胸痛噯氣者氣虛不能健運食鬱於中而噯氣或滯於上則胸痛遂以參耆各四錢麥冬當歸貝母各一錢遠志棗仁丹皮茯神各八分菖蒲甘草各五分有食則加山楂麥芽隨病出入服年餘而漸愈此病屬於燥熱故白朮尚不敢用況他燥劑乎又診一人年二十餘形瘦色脆病咳血醫用滋陰降火清燥之藥延及三年不減又一醫用參蘇飲去人參服之病益劇延汪診之脈雖五至而細其證皆逆不可治也或曰五至平和之脈何不可治汪曰五臟已衰六腑已竭九候雖調猶死也視其形證皆屬死候經曰肉脫熱甚死嗽而下泄上喘者死嗽而左不得眠肝脹右不得眠肺脹俱為死證今皆犯之雖能飲食不為肌膚去死近矣越五日果死凡患虛勞犯前數證又或嗽而聲啞喉痛不能藥食或嗽而肛門發瘻者皆在不救醫者不可不知喻嘉言治一人素有失血病晨起陡暴一口傾血一盆喉間氣壅神思飄蕩壯熱如蒸頸筋粗徑診其脈尺中甚亂曰此昨晚大犯房勞也因出驗血色如太陽之紅再至寢所謂曰少陰之脈系舌本少陰者腎也今腎家之血洶湧而出舌本已硬無法可以救急不得已用丸藥一服鎮安元氣若得氣轉丹田尚可緩圖因濃煎人參湯下黑錫丹三十粒喉間汩汩有聲漸入少腹頃之舌柔能言但聲不出急用潤下之劑以繼前藥遂與阿膠一兩溶化分三次熱服半日服盡身熱漸退頸筋漸消進粥與補腎藥多加秋石服之遂愈石頑治刑部湯元洲年八十二而痰中見血服諸寧嗽止血藥不應脈得氣口芤大兩尺微緊面色槁白屢咳痰不得出咳甚方有黃色結痰此精氣神三者並虧兼傷於熱耗其津液而咳動肺胃之血也因其平時多火不受溫補遂以六味丸合生脈散加葳蕤煎膏服之取金水相生源流俱澤而咳血自除不必用痰血藥也又治錢曙昭久咳吐血四五日不止不時哄熱面赤或時成盆成碗或時吐粉紅色痰至夜則發熱自汗一夕吐出一團與魚腸無異雜於鮮血之中薄暮驟湧不已神氣昏昏欲脫灌童子小便亦不止同道相商無策因思瘀結之物既去正宜峻補之時遂猛進獨參湯稍定緣脈數疾無力略加肉桂炮薑童便少許因勢利導以斂虛陽之逆一夜中盡參二兩明晨其勢稍定血亦不來而糜粥漸進脈息漸和改用六味丸作湯調補真陰半月而安同時有胡又曾亦患虛勞吐血一夕吐出如守宮狀者一條頭足宛然色如櫻桃不崇朝而斃陸晦庵曰昔余患吐血暴湧如潮七八日不已吾吳諸名家莫能救止有云間沈四雅寓吳中延請調治慨然擔當求其定方用人參三兩附子一兩肉桂一錢舉家惶惑未敢輕用越二日其血益甚更請診視求其改用稍緩之方彼云病勢較前更劇前方正欲改定始克有濟更加人參至五兩附子至二兩親戚見之愈驚彼曰喘嘔脫血數日不止且頭面哄熱下體厥冷正陽欲脫亡之兆命在呼吸若今日不進來日不可為矣子侄輩懇其稍裁參附彼堅持不允力諭放膽煎服僕當坐候成功親友見豫勢急且見其肯坐候進藥料可無虞遂依方求服彼欣出熟附二十餘塊授咀面稱二兩同人參五兩煎成入童便地黃汁一大碗調肉桂末冷服服後少頃下體至足微汗便得熟睡睡覺血止喘定周身柔和漸可轉側因饋十二金求其收功不受加至二十金始受愈後盛見垣先生見其一劑而效心甚疑駭詢其居常無病時恆服人參兩許無間今雖五兩峻補止煎數沸其味未盡猶可當之至於血證用附子二兩從古未聞因密貽其製藥者云慣用附子汁收入甘草其附已經煎過十餘次雖用二兩不抵未煎者二三錢始知方士之術如此飛疇治蘇天若乃郎賓旭新婚後於五月中暴吐血數升昏夜邀視湯藥不及命煎人參五錢入童便與服明晨諸醫咸集以為人參補截瘀血難以輕用議進生地山梔牛膝等味豫曰六脈虛微而數無瘀可知血脫益氣先聖成法若謂人參補瘀獨不思血得寒則凝反無後患耶今神魂莫主轉側昏暈非峻用人參何以固其元氣之脫乎遂進參一兩二服頓安次與四君保元六味等間服後以烏骨雞丸調理而痊溲血經云胞移熱於膀胱則癃溺血可知溺血之由無不本諸熱者多欲之人腎陰虧損下焦結熱血隨溺出脈必洪數無力治當壯水以制陽光六味加生牛膝溺血不止牛膝一味煎膏不時服之有氣虛不能攝血者玉屑膏最妙方用人參黃耆等分為末以白萊蔔切片蜜炙不時蘸末食之豈非虛火宜補宜緩之意歟然痛屬火盛則謂之血淋不痛屬虛謂之溲血二者不可不辨溲血先與導赤散加桂苓作湯若服藥不效此屬陰虛五苓散加膠艾下四味鹿茸丸小便自利後有血數點者五苓散加桃仁赤芍暴病脈滑實者加大黃滑石甘草延胡索下之溲血日久元神大虛而挾虛熱所下如砂石而色紅有如石淋之痛神砂妙香散加澤瀉肉桂病久滑脫者去黃耆山藥桔梗木香加煅飛龍骨益智仁即王荊公妙香散虛寒以此湯吞四味鹿茸丸老人溲血多是陰虛亦有過服助陽藥而致者多難治惟大劑六味丸加紫菀茸作湯服之咳而溲血脫形脈小徑而搏逆也溲血日久形枯六味加五味子作湯另用肉桂末三錢飛羅麵糊分三丸用煎藥調下甫入喉其血頓止少頃口鼻去血塊數枚而愈自此數年之患絶不再發吐血嘔血唾血咳血咯血血溢九竅出血繆仲淳曰吐血有三訣宜行血不宜止血血不循經絡者氣逆上壅也行血則循經絡不止自止止之則血凝血凝則發熱惡食病日痼矣宜補肝不宜伐肝經曰五臟者藏精氣而不瀉者也肝主藏血吐血者肝失其職也養肝則肝氣平而血有所歸伐肝則肝虛不能藏血血愈不止矣宜降氣不宜降火氣有餘便是火氣降則火降火降則氣不上升血隨氣行無溢出上竅之患矣降火必用寒涼之劑反傷胃氣胃氣傷則脾不能統血血愈不能歸經矣今之療吐血者大患有二一則專用寒涼之味如芩連山梔四物知柏之類往往傷脾作瀉以致不救一則專用人參肺熱遠傷肺咳嗽愈甚亦有用參而愈者此是氣虛喘嗽氣屬陽不由陰虛火熾所致然亦百中一二也劉默生曰吐血一證人惟知氣逆血溢火升血泛不知血在臟腑另有膈膜隔定其血不能滲溢夫膈膜者極薄極脆凡有所傷則破破則血溢於上矣故有陽絡傷則血上溢陰絡傷則血下滲已傷之膜若有復傷其吐必多膈膜雖傷傷處有瘀血凝定血來則緩若陰火驟衝破瘀積之血血來如潮之上湧自覺瀝瀝有聲彼時喘息不定面赤如醉煩躁不寧心神昏亂一皆龍雷之勢脈亦急疾難憑少頃火退神清面白氣平血亦漸止方可診切用藥須乘此時瘀積蕩盡緩緩清理徐徐調補然不可驟壅亦不可用耗氣之藥悉知此義治血有本矣吐血者一吐則傾血之在身有陰有陽陽者順氣而行循流脈中調和五臟灑陳六腑如是者謂之營血也陰者居於絡脈專守臟腑滋養神氣濡潤筋骨若是臟感內外之邪傷則循經之陽血至其傷處為邪氣所阻漏泄經外或居絡之陰血因著留之邪劈裂而出則皆滲入腸胃而泄矣世俗每見下血率以腸風名之不知風乃六淫中之一耳或有風從腸胃經脈而入客者或外淫風木之邪內乘於腸胃者則可謂之腸風若其他不因風邪而腸胃受火熱二淫與寒熱燥濕怫鬱其氣及飲食不節用力過度傷其陰絡之血者亦謂之腸風可乎蓋腸風所下之血清而色鮮四射如濺乃風性使然素問所謂久風入中則為腸風飧泄是也先與瀉青丸一二劑後與逍遙散加酒煮黃連羌防烏梅虛人人參胃風湯最捷人所不知若肛門射血如線或點滴不已者乃五痔之血當詳本門治之血濁而色黯者為臟毒蘊積毒氣久而始見也宜小烏沉湯下黑神散脈實便祕勢盛者臟連丸腸風挾濕毒者下如豆汁兼紫黑瘀血此醇酒厚味所釀之濕由足陽明隨經入胃淫溢而下也脈細有寒者升陽除濕防風湯脈數有熱者去二術加黃連當歸甘草腸風下血以劉寄奴半兩芽茶一兩墨灰三錢為散分三服烏梅湯送下其血立止後宜多服歸脾湯調理腸風下血其血另作一派濺出遠射四散如篩腸中作痛乃陽明氣衝熱毒所作也人參敗毒散不應用升陽除濕和血湯宿有血證因時熱下紫黑血乃濕毒腸澼陽明少陽經證也升陽益腎湯下血久而不已面色痿黃下元虛憊者四君子加黃耆歸芍下斷紅丸虛甚十全大補湯去茯苓加防風潔古云下血防風為上使黃連為中使地榆為下使千金云先見血後見便為遠血宜服黃土湯先見便後見血為近血宜服赤小豆當歸散金匱以先便後血為遠血先血後便為近血傳寫之誤因胃中受冷不能統血失其營運而下故宜黃土湯溫之若大腸受熱不能攝血營行過疾而下故宜赤小豆當歸散清之色鮮紫者為熱傷陰絡槐花炒研米湯服之槐角煎膏尤妙色稀淡者為脾虛一味白朮米湯丸服色瘀晦者為積血以亂髮二兩紅花四兩入煬成罐中煅過去紅花灰止用發灰研細分三服空心炒黑地榆煎湯送下三日必效下血雖曰大腸積熱亦當分虛實不可純用寒涼必加辛散為主久之不愈宜理胃氣兼升舉藥故大便下血多以胃藥收功不可徒用苦寒也戴復庵曰色鮮紅為熱色瘀淡為寒寒血因腸胃受冷營行失度而下四物加炮薑炙甘草熱血因熱毒之氣蘊於腸胃或飲酒過度及啖炙爆所致四物加茜根槐花酒黃連炒黑山梔之類因冷飲中寒或雜食生冷血為寒凝而下必腹痛色晦淡宜附子理中倍炮姜加酒連陰結便血者厥陰肝血內結不得陽氣統運滲入腸間而下非謂陰寒內結也補中益氣倍黃耆加炮姜上二證諸家悉採寶鑑平胃地榆湯結陰丹從無言及其非者敢力正之內傷瘀血胸脅小腹急痛桃仁承氣湯代抵當湯隨痛之高下選用大黃俱宜童便浸透更用韭汁制虛人可略加桂附二三分若瘀滯色晦不鮮者久當用溫血藥始得奏效血枯大便燥結而下鮮紫血者此大腸燥結而下也一味槐角膏涼潤之又方真麻油衝入腐花空腹食之三日即愈腸風便血一味旱蓮花濃煎蔥白湯過口一服立效又方治腸風便血劉寄奴半兩松蘿茶一錢烏梅肉一枚煎服效中蠱臟腑敗壞下血如雞肝如爛肉心腹絞痛者是也治用馬藺根末水服方寸匙隨吐而出李士材治一人患腸風下血久用四物芩連槐花之屬屢發不止面色痿黃診其脈惟脾部浮而緩此土虛而風濕交乘也遂用蒼朮三錢茯苓人參黃耆升麻柴胡防風各一錢四劑而血止改用十全大補湯調理而愈石頑治吳興韓晉度春捷錦旋患腹痛泄瀉下血或用香連丸遂飲食艱進少腹急結雖小便癃閉而不喜湯飲面色痿黃晝夜去血五十餘度邀余診之氣口脈得沉細而緊詢其所下之血瘀晦如莧汁與理中加肉桂二錢一劑溺通小腹即寬再劑血減食進四劑泄瀉止三四次去後微有白膿與補中益氣加炮姜四劑而康蓄血夫人飲食起居一失其節皆能使血瘀滯不行也衄者血蓄上焦犀角地黃湯心下手不可近者血蓄中焦桃核承氣湯臍腹下腫大便黑者血蓄下焦也抵當湯丸下瘀血湯及代抵當湯隨輕重選用三焦蓄血俱見左脈以肝主諸血故也登高墜下重物撞打箭簇刃傷胸腹積血不散以童便同酒煎大黃隨輕重下之或香殼散加童便腰脅滯痛復元通氣散去牽牛加枳殼柴胡牡丹皮惡血留於腹脅痛不可忍復元活血湯挾血如見祟狀當歸活血湯醉飽入房竭力傷肝蓄血在胃口者韭汁童便下越鞠丸不應合平胃散去蒼朮加桃仁丹皮相和服虛人理中越鞠相和服在少腹代抵當丸加熟附子三分虛者必加人參錢許以助藥力身有寒熱發黃脈弦細而伏服補瀉諸藥不應千金用大黃芒硝歸尾桃仁人參桂心為散酒服二方寸匙藉參桂之力以攻之膏粱肥盛多味痰濕熱血蓄胃口或兼脅滿或少腹結痛朝用浚血丸兼培胃氣夕用變通抵當丸專散蓄血方得峻藥緩攻之妙虛人雖有瘀血其脈亦芤必有一部帶弦宜兼補以去其血桃核承氣加人參五錢分三服緩攻之可救十之二三又中氣虛人胃脘有死血每食薑湯必厄宜人參云術各二兩為末桃仁一兩同乾漆炒去漆研細蜜丸彈子大早晚細嚼一丸醇酒下石頑曰蓄血下黑如漆最為危殆但下後神氣稍寧脈無變異即為可療若下後神氣昏憒脈見虛脫加以厥冷厄逆多不可救如針工戚文郁停食感冒後大便下黑如漆煩擾不寧脈來弦徑而數此瘀垢未盡與歸丹苓桂牛膝鯪鯉之屬復下瘀黑升許而瘥嚴文式泰山失記姓氏積勞發熱七八日間亦下黑如漆兩日後神識稍安脈來濡弱知瘀黑已盡與獨參湯童便調補而痊目科鄒泰甫怒氣傷肝嘔逆不食五六日後下血如漆脈得弦小而疾按之則衰此瘀去而肝氣未平也沉香降氣散疏之愈禮科姜如農氣竭肝傷而下瘀血光亮如漆三四日連綿不已神識昏迷時加微厄脈來弦大而芤此正氣告匱脈隨虛陽鼓激而見虛大也雖倉扁復生奚益哉李士材治張鳴之吐血兩年面色痿黃潮熱咳嗽膈有微痛脈數而沉且搏其痛不可按而甚於夜分是堅血蓄積非大下之不可又以久病未敢峻攻用鬱金降真歸地山甲蓬朮人參下血如漆者數次而痛減月餘復痛此病重而藥輕也乃以大黃乾漆蓬朮鬱金山甲肉桂歸尾桃仁虻蟲為丸每日服參耆之劑午後服丸藥錢許十日血積大下數次而安盧不遠治來熙庵廉憲乃侄身體豐碩傷寒已二十八日人事不省不能言語手足揚擲腹脹如鼓而熱烙手目赤氣粗齒槁舌黑參附石膏消黃芩連無不遍服諸名公已言旋矣診之脈濁鼓指用大黃一兩佐以血藥一劑下黑臭血一二斗少蘇四劑始清夫治病用藥譬之飲酒滄海之量與之涓滴則喉唇轉燥矣顧若大軀體病邪甚深不十倍其藥何能克效哉諸痛門諸痛素問云寒傷形熱傷氣氣傷痛形傷腫故先痛而後腫者氣傷形也先腫而後痛者形傷氣也寒氣客於脈外則脈寒脈寒則縮蜷縮蜷則脈絀急脈絀急則外引小絡故卒然而痛得炅則痛立止因重中於寒則痛久矣寒氣客於經脈之中與炅氣相搏則脈滿滿則痛而不可按也寒氣稽留炅氣從上則脈充大而血氣亂故痛甚不可按也寒氣客於腸胃之間膜原之下血不得散小絡急引故痛按之則血氣散故按之痛止寒氣客於俠脊之脈則深按之不能及故按之無益也寒氣客於衝脈衝脈起於關元隨腹直上寒氣客則脈不通脈不通則氣因之故喘動應手矣寒氣客於背俞之脈則血脈澀脈澀則血虛血虛則痛其俞注於心故相引而痛按之則熱氣至熱氣至則痛止矣寒氣客於厥陰之脈厥陰之脈者絡陰器繫於肝寒氣客於脈中則血澀脈急故脅肋與少腹相引痛矣厥氣客於陰股寒氣上及少腹血澀在下相引故腹痛引陰股寒氣客於小腸膜原之間絡血之中血澀不得注於大經血氣稽留不得行故宿昔而成積矣寒氣客於五臟厥逆上泄陰氣竭陽氣未入故卒然痛死不知人氣復返則生矣寒氣客於腸胃厥逆上出故痛而嘔也寒氣客於小腸小腸不得成聚故後泄腹痛矣熱氣留於小腸腸中痛疸熱焦渴則堅幹不得出故痛而閉不通矣岐伯歷舉卒痛一十三條屬熱者止一條余皆屬寒辨之之法當知按之痛緩者為純寒痛甚不可按者為寒伏火邪以能閉塞陽氣最甚也張介賓曰後世治痛之法有曰諸痛屬實痛無補法者有曰通則不痛痛則不通者有曰痛隨利減者互相傳授皆以為不易之定法不知形實病實便閉不通者乃為相宜或形虛脈弱食少便泄者豈容混治觀王荊公解痛利二字曰治法云諸痛為實痛隨利減世俗以利為下也假令痛在表者實也痛在裡者實也痛在血氣者亦實也故在表者汗之則愈在裡者下之則愈在氣血者散之行之則愈豈可以利為下乎宜作通字訓則可此說甚善已得治實之治矣然痛證亦有虛實治法亦有補瀉辨之不可不詳須知痛而脹閉者多實不脹不閉者多虛扼按者為實可按者為虛喜寒者多實愛熱者多虛飽則甚者多實飢則甚者多虛脈實氣粗者多實脈虛氣少者多虛新病年壯者多實久病年衰者多虛補而不效者多實攻而愈劇者多虛痛在經者脈多弦大痛在臟者脈多沉微故表虛而痛者陽不足也非溫經不可裡虛而痛者陰不足也非養營不可上虛而痛者心脾傷也非補中不可下虛而痛者肝腎敗也非溫補命門不可亦泥痛無補法則殺人矣頭痛頭風雷頭風眉稜風痛真頭痛頭重頭搖頸項強痛天白蟻經云風氣循風府而上則為腦風新沐中風則為首風首風之狀頭面多汗惡風當先風一日則病甚頭痛不可以出內至其風日則病少愈頭痛數歲不已當有所犯大寒內至骨髓髓者以腦為主腦逆故令頭痛齒亦痛名曰厥逆頭痛巔疾下虛上實過在足少陰巨陽甚則入腎心煩頭痛病在膈中過在手巨陽少陰頭痛耳鳴九竅不利腸胃之所生也真頭痛頭痛甚則腦盡痛手足寒至節死不治難經曰手三陽之脈受風寒伏留而不去則名厥頭痛入連在腦者名真頭痛按頭者天之象陽之分也六腑清陽之氣五臟精華之血皆朝會於高巔天氣所發六淫之邪人氣所變五賊之運皆能犯上而為災害或蔽覆其清明或墜遏其經隧與正氣相搏鬱而成熱則脈滿而痛若邪氣稽留亦脈滿而痛是皆為實也若寒濕所侵雖正氣衰微不與相搏而成熱然邪襲於外則血凝而脈縮收引小絡而痛得溫則痛減是為虛也因風而痛者抽掣惡風或汗自出因暑而痛者或有汗或無汗皆惡熱而耳前與額脹痛因濕而痛者頭必重遇陰天尤甚因痰飲而痛者亦昏重而痛憒憒欲吐因寒而痛者絀急惡寒因氣虛而痛者遇勞則甚其脈大因血虛而痛者痛連魚尾善驚惕其脈芤或沉數頭痛自有多因而古方每用風藥者蓋高巔之上惟風可到味之薄者陰中之陽自地升天者也在風寒濕者固為正用即虛與熱者亦假引經耳薛立齊云按頭痛除風寒外多主於痰痛甚者乃風毒上攻有血虛者有氣虛者有諸經氣滯者有六氣外傷有勞役內傷有可吐者有可下者當分虛實寒熱兼變而治之痰多加味導痰湯風毒消風散血虛芎歸湯加蔥豉全蠍氣虛六君子加蔥豉氣滯蘇子降氣湯痰多宜吐者稀涎散或梔子豉湯加蔥白火鬱宜下者涼膈散加清酒痰火俱盛者滾痰丸頭痛諸藥不效其痛更甚者此督脈為病也宜茸朱丹上熱頭痛目赤下寒足䯒為甚大便微祕即濟解毒湯大寒犯腦內至骨髓則頭痛齒亦痛羌活附子湯頭痛乾嘔吐涎沫吳茱萸湯風氣循風府而上則為腦風項背惡寒腦戶極冷當歸四逆湯因發散太過頭痛轉劇小建中加當歸童便風火相煽額與眉稜俱痛選奇湯加蔥豉徇蒙招尤目瞑耳聾肝虛風動也六君子加鉤藤羌防芎歸甘菊頭痛耳鳴九竅不利腸胃之所生或勞役動作則痛此氣虛火動也補中益氣加川芎蔓荊子胃熱火炎動作則痛煩渴引飲面赤便祕者川芎茶調散加酒炒芩連梔子石膏勢盛脈實者酒炒大黃末五錢濃茶調服血虛痛連魚尾四物加人參細辛蔓荊有黴瘡毒發頭痛頤下左右如蚯蚓徐行入耳頂上起疙瘩塊冷則痛甚者山牛湯不應作結毒治之頭與腹俱痛有五臭毒頭痛則與腹俱痛一味香附煎成放涼服傷酒傷濕亦有頭腹俱痛但傷酒食則兼嘔逆眩暈外臺茯苓飲加煨葛根傷濕則腹隱隱痛頭重不能舉羌活勝濕湯外用瓜蒂散搐鼻有不伏水土頭腹俱痛者藿香正氣散有瘡毒入腹頭與腹俱痛者黃連解毒湯加臘茶有頭痛止則腹痛腹痛止則頭痛此屬脾陰血虛胃中有火隨氣輒上輒下而然芎歸芍藥黃連木香不應加童便香附蔥白診寸口脈中手短者曰頭痛寸口緊急或短或弦或浮皆頭痛浮滑為風痰易治短澀為虛難治浮弦為風浮洪為火沉細或緩為濕寸弦曰頭痛寸口脈浮中風發熱頭痛頭風薛立齊云偏正頭風久而不愈乃挾痰涎風火郁遏經絡氣血壅滯甚則目昏緊小二便祕澀宜砭其血以開鬱解表逍遙散偏左加黃芩蔥豉偏右加石膏蔥豉郁甚合越鞠兼濕瓜蒂散搐鼻兼風火而發選奇湯加石膏蔥豉芽茶夜甚加酒白芍或川芎茶調散加細辛石膏甘菊凡怒則太陽作痛者先用小柴胡加茯苓山梔後用六味丸常服以滋腎降火永不再發凡頭痛必吐清水不拘冬夏食姜即止者此中氣虛寒六君子加當歸黃耆木香炮姜煩勞則頭痛此陽虛不能上升補中益氣加蔓荊子頭風宜熱藥者多間有挾熱而不勝熱劑者消風散或川芎茶調散加酒黃芩輕者只用薑汁收入陳茶葉內煎服汗出即愈此屢驗者凡風熱頭痛並宜用之與選奇湯不殊頭風多汗當先風一日則痛甚至其風日則病少愈者半夏蒼朮湯濕熱頭風遇風即發選奇湯加川芎柴胡黃連名清空膏不拘偏正並用偏正頭風作痛痛連魚尾常如牽引之狀發則目不可關眩暈不能抬舉芎辛湯每服加全蠍五個覺上膈有熱川芎茶調散加片芩有痰濕頭痛其人嘔吐痰多發作無時停痰上攻所致導痰湯加減或合芎辛湯尤妙寒痰厥逆頭痛三因芎辛湯一切偏正頭風攻注屬虛寒者大追風散腎氣厥逆頭痛四肢逆冷胸膈痞悶多痰者玉真丸有腎臟陽虛之人素有頭風發動則挾濕熱上攻頭面腫脹項後兩向筋緊作痛甚則牽引腰脊其脈虛細而數千金大三五七散並用金匱頭風摩散慎不可用清熱敗毒等藥有風痰頭痛發時面頰青黃暈眩目不欲開懶言身體重兀兀欲吐此欲成頭風也二陳湯加膽星天麻蠍尾痰厥頭痛兩寸脈滑而弦眼重頭旋噁心煩亂吐清水氣短促心神不安語言顛倒目不敢開如在風露中頭疼如裂身重如山胸滿嘔逆四肢厥冷半夏白朮天麻湯有肥白氣虛多痰人卒然頭痛脈沉細四肢厥逆痰響吐涎星香湯加生附子熱厥頭痛數年不愈雖當嚴冬猶喜風寒其痛便止略近溫暖稍見煙火其痛便甚或為灸火或為熱藥所致宜選奇湯加川芎柴胡黃連生地當歸黃柏知母荊芥芽茶風熱伏於血分加以寒邪外郁即痛劇熱甚寶鑑石膏散濕熱頭痛脈數而濡或兩寸脈沉伏而數身重肢節痛或四肢面目浮腫此證多見於酒客宜散濕解熱二陳二朮酒芩羌防之類不已用透頂散搐鼻取涎隨左右搐之涎出即安丹方治頭風用蛇蛻炙脆為末每服一錢蔥豉煎數沸和滓熱服不拘偏正皆效後發漸輕再發再服或加蜈蚣末三分或加全蠍末三分皆取截風之力也每發輕者一服重不過二服也偏頭風者其人平素先有濕痰加以邪風襲之久而鬱熱為火總屬少陽厥陰二經有左痛忽移於右右痛忽移於左者風火擊動其痰濕之氣所以互換也痛久不已令人喪目目者肝之竅肝風內動則害空竅也蓋木邪亢盛則生風生火鼓動胸中之痰積皆隨火上逆為患耳先以川芎茶調散吐之吐訖可服川芎薄荷等辛涼清上搜風之劑偏頭風亦先風一日即發濕痰與火伏頭中雖夏月常欲包裹越婢湯加減濕加泔製蒼朮黑豆制川烏火加薑汁炒山梔左加酒黃芩右加薑汁煅石膏濕熱甚連目腫者加酒大黃有邪風加細辛川芎防風之類婦人頭風兼白帶甚者用白蜀葵花七朵去蒂川芎當歸各一錢蘄艾八分水酒各半煎成乘熱先熏後服頭風兼嘔涎者白槿樹花陰乾焙脆為末每服三錢熱酒調服或用荷葉蒂七枚生薑七片陳芽茶一撮水酒各半煎服覆汗瘥頭風腦中空痛用當歸川芎各三錢黃牛腦子一個和勻分三次熱酒送下盡醉臥醒即愈頭風諸藥不效用大附子一隻切片同緑豆一升煮熟去附子但服緑豆及汁即愈偏頭風左屬風者則浮腫荊芥薄荷左屬血者則疼熱川芎當歸右屬痰者必體肥蒼朮半夏左屬熱者必形瘦黃芩石膏産後須倍用芎歸遇寒即痛者屬寒伏於腦用金匱頭風摩散一法用川烏末醋調塗痛處又法蓽茇細辛為末豬膽汁調搐鼻中萆麻子五錢去皮大棗十五個擘共搗爛塗紙上用箸卷之去箸納鼻中良久取下清涕即止或牙皂末吹鼻中取嚏又法以紅娘子七枚茴香七瓣研為細末同蔥白頭七個連須研爛塗痛處痛止永不再發不拘偏正皆效又外用諸方如搐鼻瓜蒂散透頂散篦麻貼法一字散一滴金火筒散等皆應用之藥然不若用蒸法最效方用川芎半兩晚蠶砂二兩殭蠶如患者年歲之數以水五碗煎至三碗就砂鍋中以厚紙糊滿中開錢大一孔取藥氣熏蒸痛處每日一次雖年久者不過三五次永不再發平時置新鮮木瓜於枕邊取香氣透達引散肝風亦良法也雷頭風頭痛而起核塊者雷頭風也或頭中如雷之鳴為風客所致清震湯腫塊宜刺出血亦有因痰熱生風者半夏用牙皂薑汁製取淨一兩大黃酒浸透紙包煨再浸再煨熟極為度淨二兩白殭蠶連軺橘紅桔梗天麻各五錢片芩七錢薄荷三錢硝煅青礞石白芷炙甘草各一錢蒸餅丸緑豆大臨臥茶吞二餞眉稜骨痛此證多屬陽明風熱有虛實二途虛而痛者見光明即發選奇湯加歸芍實則眼不可開晝靜夜劇選奇湯加蔥豉風盛加葛根火盛加石膏按戴復庵云二證皆屬於肝火虛則地黃丸實則導痰湯大抵此證清火散風不應即當滋陰若泛用風藥則火熱上升其痛愈甚矣痛久成頭風發則眉稜骨痛者選奇湯加川芎白芷荊芥柴胡真頭痛天門真痛上引泥丸旦發夕死夕發旦死腦為髓海真氣所聚卒不受邪受邪則不可治古法用黑錫丹灸百會穴猛進參附可救十中之一然天柱折手足寒至節必死不治頭重濕熱上攻所以頭重秋冬春俱宜羌活勝濕湯夏暑蒼朮白虎湯並瓜蒂搐鼻若時行疫癘之時患頭重者敗毒散加蒼朮藁本內傷元氣頭重氣乏補中益氣加蒼朮蔓荊子頭搖頭搖有二證風火相煽卒然頭搖項背強痛少陽經證也小柴胡去參加防風裡實腹痛不大便而頭搖者陽明府證也涼膈散大柴胡選用若老人及病後辛苦人因氣血虛火犯上而鼓動者十全大補湯大建中湯並加羌活頸項強痛邪客於三陽則痛寒搏則筋急葛根湯風搏則筋弛桂枝湯加葛根然多有挾痰難以回顧者乃痰客太陽二陳加酒芩羌活紅花天白蟻頭內如蟲蛀響者名天白蟻多屬於火亦有因痰濕在上者丹溪云瘦人皆屬於火宜薄荷梔子茯苓甘草細辛川芎黃芩石膏芽茶之類肥人皆屬濕痰半夏茯苓枳實黃連天麻膽星蒼朮黃柏芽茶之類戴復庵云頭中鳴響有虛有實實者用涼膈散礞石丸下奪之虛者非獨參保元六味八味茸朱丹鹿茸丸等藥調補不應也丹方用茶子為細末吹鼻中蓋響屬火茶子輕清行清道散遏伏之火故也凡頭風藥中必用茶引即此可悟程文彬治一婦患頭風雖盛暑必以帕蒙首稍見風寒痛不可忍百藥不效蓋因腦受風寒氣血兩虛氣不能升故藥不效令病人口含冷水仰臥以薑汁灌入鼻中痛立止與補中益氣加細辛川芎蔓荊白芍數服而愈用薑汁滴鼻中開久郁之風寒也若寒濕鬱痛用獨顆蔥汁滴之火鬱頭痛以白萊蔔汁滴之左患滴右鼻右患滴左鼻良李士材治顧淡之勞神之後躁熱甚頭角掣痛時作時止醫禁其食而解表四日議攻裡診之脈不浮緊安得表邪又不沉實安得里邪隻手太陰大而無力為神勞太過乃虛煩類傷寒也先飲糜粥用大劑歸脾湯而愈面痛面為陽明部分而陽維起於諸陽之會皆在於面故面痛皆因於火而有虛實之殊暴痛多實久痛多虛高者抑之郁者開之血熱者涼之氣虛者補之不可專以苦寒降火為事許學士治鼻頞間痛或麻痹不仁如是數年忽一日連口唇頰車髮際皆痛不能開口言語飲食皆妨在頞與頰上常如糊手觸之則痛此足陽明經絡受風毒傳入經絡血凝滯而不行故有此證或以續命與之不效以犀角升麻湯與之數目愈夫足陽明胃也胃中腥膻五味無所不納其腐熟水穀之毒皆聚於胃故方以犀角為主升麻佐之專解飲食之毒余皆滌除風熱之藥也有老人過勞飢則面痛補中益氣加芩梔連翹鼠黏黑參因鬱結積成胃熱遂患面痛越鞠丸加山梔連翹貝母橘紅之類心痛胃脘痛心疝心瘥靈樞云邪在心則心痛喜悲時眩僕此言胞絡受邪在腑不在臟也手少陰之脈動則病嗌乾心痛渴而欲飲此言別絡受邪在絡不在經也厥心痛與背相控善瘈如從後觸其心傴僂者腎心痛也腹脹胸滿心痛尤甚胃心痛也如以錐針刺其心心痛甚者脾心痛也色蒼蒼如死狀終日不得太息肝心痛也臥若徒居心痛間動作痛益甚色不變肺心痛也真心痛手足青至節心痛甚旦發夕死夕發旦死五臟之滯皆為心病腎心痛者多由陰火上衝之故胃心痛者多由停滯脾心痛者多由寒逆中焦肝心痛者多由木火之郁病在血分肺心痛者多由上焦不清病在氣分若知其在氣則順之在血則行之鬱則開之滯則通之火多實則或散或清之寒多虛則或溫或補之必真心痛者乃不可治否則但得其本則必隨手而應也金匱云九痛丸治九種心痛兼治卒中惡腹脹痛口不能言又治連年積冷流注心胸痛並冷衝上氣落馬墜車血疾等皆主之忌口如常法仲景於胸痹後附此方治九種心痛以其久著之邪不同暴病故藥則加峻而湯改為丸取緩攻不取急蕩也九種心痛乃久客之劇證即腎水乘心腳氣攻心等別名也痛久血瘀陰邪團結故用參附溫氣散邪藥中加生狼芽巴豆吳茱萸驅之使從陰竅而出以其邪據胃中結成堅壘非直搗其巢終不去也後人心痛分為九種曰飲曰食曰氣曰血曰冷曰熱曰悸曰蟲曰疰雖祖此義而實未詳內經金匱之旨也論曰諸心痛者皆手少陰厥氣上衝也有熱厥心痛者身熱足寒痛甚則煩躁而吐額上自汗其脈洪大知為熱也先宜越婢湯汗之次用金鈴子散清之有火實心痛者因受時氣卒然發痛大便或祕久而注悶心腹高起按之愈痛不能飲食急以涼膈散利之不應為食積痰飲留結也煮黃丸水煮金花丸選用有寒厥心痛者手足逆而通身冷汗出或大便利而不渴氣力微弱其脈沉細急以朮附湯溫之寒厥暴病非久病也朝發夕死當急救之久痛非寒暴痛非熱不可不察凡言心痛都屬胃脘丹溪云外受寒者當溫散內受寒者當溫利病久屬郁鬱則熱用山梔為熱藥之嚮導必佐以生薑汁多用臺芎開之或二陳加川芎蒼朮倍加薑汁炒山梔如痛甚者加炮姜為從治之法也外吸涼風內傷冷物寒客於胃則卒然而痛二陳加草豆菀乾薑吳茱萸日久發熱加薑汁炒川連山梔心腹絞痛如刺兩脅脹滿千金高良薑湯脈實堅按之心下滿痛者為實大柴胡湯脈弦數者是木剋土也治之以小建中湯取芍藥味酸於土中瀉木如脈沉細是水來侮土治以理中湯取乾薑味辛於土中瀉水大寒客於心胸作痛則嘔逆不能食腹中寒氣上衝痛不可按者金匱三物大建中湯上散濁飲寒氣下安太陰寒氣作痛綿綿不絶無增無減朮附湯加草豆蔻厚朴風冷邪氣入乘心絡或腑臟暴感寒氣上乘於心卒然心痛或引背膂經久不瘥崔氏烏頭丸凡心痛脈沉而遲者易治堅大而實浮大而長滑數者難治因冷積痰氣而痛者理中湯去人參加苓半丁香木香白豆蔻或四七湯加木香肉桂痛而氣上急者蘇子降氣湯去前胡加木香痰涎壅盛而痛小半夏茯苓湯加枳實間進半硫丸郁痰作痛或因恚怒勞力酒食而發發則自下逆沖而上後必作寒熱以郁必從少陽而發出於外其脈必數其熱與痛忽重忽輕其證多渴而大便祕治宜清中蠲痛湯痰積作痛脈滑而實噁心煩滿時吐酸水此因氣滯礙其道路不得運行而作痛清中湯加香附蒼朮南星滑石木香海石之類如痰甚者導痰湯加白螺螄殼煅過一錢停飲噁心煩悶時吐黃水腹中轆轆有聲而痛胃苓湯胸痛短氣者水氣在臟腑也輕者五苓散重者用子和法取之有痰二陳湯加薑汁氣鬱脈沉伏或結或弦胸中氣壅攻刺脹痛沉香降氣散中氣虛按之則痛定二陳加炮姜不應理中湯病久服耗氣藥太過脈大或數無力亦為中氣虛六君子加炮姜心膈大痛發厥嘔逆諸藥不納者趁勢以鵝翎探吐痰盡而痛愈凡按之痛減者為虛宜酸收不宜辛散心痛屬火不時舉發者山梔薑汁炒黑少加炮薑甘草一服立止平日好飲熱酒致死血留於胃口作痛脈必澀或芤飲下作厄口中作血腥氣手拈散加桔梗開提其氣胃氣虛人不能行其藥力者加人參二三錢用相反之味激其性以搜血也壯盛者代抵當丸加乾漆灰虛弱人四物湯加桃仁穿山甲桂心蓬朮赤降香煎服卒中惡心痛用苦參一兩酢煮頓服老弱者分二三服若脈微欲絶手足逆冷肉桂一兩水煮分三服效蟲痛鶴蝨一味為末蜜丸蜜湯下四五十丸慎酒肉取有形滓以入蟲口也胃脘痛吐蟲曾服打積藥不愈是中氣傷當調中氣為主蟲痛面有白斑唇紅能食或口中沫出當以祛蟲法治之因蛔作痛痛有休止令人吐蛔蛔動故也用川椒烏梅黃連檳榔煎服膈上隱隱作痛坐不得臥而吐臭穢痰涎當作肺癰治之膈間腫痛不能進食但喜飲水或咽腫人迎盛而氣口緊者當作胃癰治之心疝腎氣逆上攻痛必從臍下上升小便難此名心疝生韭汁和五苓散以茴香煎湯下或有疝氣衝心而痛者當於疝門求治亦有腳氣攻心而痛者則於腳氣門求治可也心瘥因胃口熱食易消故瘥素問謂之食瘥為痰火鼓動所致亦類中消小半夏茯苓湯加枳實胃中火蘊而瘥二陳加川連或五苓散加辰砂亦有病瘥呷薑湯數口或進乾薑溫劑而愈此膈上停寒中有伏飲見辛熱則消也診心脈微急為痛短而數心痛澀則心痛脈浮大弦長者死沉細者生胃脈微滑為痰飲滑實為宿食沉緊為冷積沉澀為氣滯數為火浮為風弦為血忽大忽小者為蟲也東垣治一妊婦冬至因慟哭口吸風寒忽病心痛不可忍渾身冷氣欲絶曰此乃客寒犯胃故胃脘當心而痛急與草豆蔻半夏生薑炙甘草益智仁之類或曰半夏有毒重妊服之可乎曰乃有故而用也岐伯曰有故無隕也服之遂愈滑伯仁治一婦盛暑洞泄厥逆惡寒胃脘當心而痛引腹引脅轉為滯下嘔噦不食醫以中暑霍亂治之益劇脈三部俱微短沉弱不應呼吸曰此陰寒極矣不亟溫之則無生理內經雖曰用熱遠熱又曰有假其氣則無禁也於是以薑附溫劑三四進間與來復丹脈稍有力厥逆漸退更與薑附七日諸證悉去遂以丸藥除其滯下而安江應宿治一人心脾痛積十年矣時發則連日呻吟減食遍試諸方罔效診之六脈弦數曰此火鬱耳投薑汁炒川連山梔瀉火為君川芎香附橘皮枳殼開鬱理氣為臣反佐炮姜從治為使一服而愈再與平胃散加薑汁炒川連山梔神麯糊丸以刈其根不復舉矣李士材治張侗初善怒善郁且酬應繁劇胸中痛甚夜不成寐醫用菖蒲枳朴木香豆蔻殊不知此證屬虛虛則濁陰不降神氣失守故痛且寤也遂以歸脾湯倍用人參當歸不十劑而胸次快然安寢又治宋敬夫心腹大痛傴僂不能仰日服行氣和血藥罔效其脈左滑而急其氣不能以息偶一咳攢眉欲絶為心疝無疑以生薑飲粥取小蘹香川楝子青木香廣木香吳茱萸木通延胡索歸身青皮一服而痛減五日而安胸痹金匱云師曰夫脈當取太過不及陽微陰弦即胸痹而痛所以然者責其極虛也今陽虛知在上焦所以胸痹心痛者以其陰弦也陽微在胸中氣分上看故曰陽微知在上焦陰弦在陰脈上看如陰寒之脈上於胸中氣分則為胸痹如陰脈上乘於心則為心痛也平人無寒熱短氣不足以息者實也上條是言不及此則言太過也平人蓋言無內困虛勞外因感冒而患短氣不足以息者當是胸中邪氣窒塞腎中陽氣不得上通於胸中故為實也胸痹之病喘息咳唾胸背痛短氣寸口脈沉而遲關上小緊數栝蔞薤白白酒湯主之寸口脈沉遲者陽氣衰微也關上小緊者胃以上有陰寒結聚所以胸中喘息咳唾胸背痛而短氣栝蔞性潤專以滌垢膩之痰薤白臭穢用以通穢濁之氣同氣相求也白酒熟谷之液色白上通於胸中使佐藥力上行極而下耳胸痹不得臥心痛徹背者栝蔞薤白半夏湯主之心痛徹背者胸中痰垢積滿循脈而溢於背背者胸之府故於前藥但加半夏以祛痰積之痹逆也胸痹心中痞痛氣結在胸胸滿脅下逆搶心枳實薤白桂枝湯主之人參湯亦主之痰氣結聚於胸中胸滿溢於經脈故從脅下逆上以搶心也二湯一以治胸中實痰外溢用薤白桂枝以解散之一以治胸中虛痰內結即用人參理中以清理之一病二治因人素稟而施兩不移易之法也胸痹胸中氣塞短氣茯苓杏仁甘草湯主之橘皮枳實生薑湯亦主之夫短氣不足以息者實也故二方皆利氣之劑一以疏利肺氣一以疏利胃氣也胸痹緩急者薏苡附子散主之胸中為陽氣所居之位今胸中之陽痹而不舒其經脈所過非緩即急失其常度總由陽氣不運故也用薏苡舒其經脈附子復其胸中之陽則大氣一轉陰濁不留胸際曠然若太空矣心中痞諸逆心懸痛桂枝生薑枳實湯主之心中痞者心氣逆於上也上氣逆則中下亦逆氣逆則經脈亦逆故為諸逆也上下氣逆脈不交通心主孤懸於上不得營氣以和之故心懸痛也桂枝行心氣以散痞薑棗疏中焦以通經也心痛徹背背痛徹心烏頭赤石脂丸主之心痛徹背背痛徹心乃陰邪厥逆而上干胸背經脈之間牽連痛楚亂其血氣紊其疆界此而用氣分之藥則轉益其痛勢必危殆仲景用蜀椒烏頭一派辛辣以溫散其陰邪然恐胸背既亂之氣難安即於溫藥隊中取用乾薑赤脂之澀以填塞厥氣攻衝之經隧俾胸之氣自行於胸背之氣自行於背各不相犯其患乃除今人但知有溫氣補氣行氣散氣諸法不知有填塞邪氣攻衝之竇也千金治胸痹達背痛用細辛散胸中逆氣心痛徹背少氣不食用前胡湯胸中愊愊如滿噎塞習習如癢喉中澀燥唾沫服橘皮枳實生薑湯不應用治中湯胸痹腹背閉滿上氣喘息用下氣湯胸背疼痛用尉背散足補金匱之未逮病人胸中似喘不喘似嘔不嘔似噦不噦徹心中憒憒然無奈者生薑半夏湯主之千金加橘皮吳茱萸名通氣散治胸滿短氣而噎此即胸痹一門之證必編者之差誤入於嘔吐噦中今並論於此蓋陽受氣於胸中以布氣息今陰乘陽位阻其陽氣布息呼吸往來之道若喘若嘔若噦心舍神者也聚飲停痰則炎熾不寧徹心憒亂無可奈何故用半夏生薑之辛溫以燥飲散寒則陽得以布氣得以調而胸際始曠也其用橘皮吳茱萸及加竹茹人參皆此例也喻嘉言曰按胸痹之證人所通患金匱出十方論治然未明言其故蓋胸中如太空其陽氣所過如離照當空曠然無外設地氣一上則窒塞有加故知胸痹者陽氣不用陰氣在上之候也然有微甚不同微者但通其上焦不足之陽甚者必驅其下焦厥逆之氣通胸中之陽以薤白白酒或栝蔞半夏桂枝枳實厚朴乾薑白朮人參甘草茯苓杏仁橘皮擇用對證三四味即成一方不但苦寒不入即清涼盡屏蓋以陽通陽陰分之藥所以不得預也甚者則用附子烏頭蜀椒大辛熱以驅下焦之陰而復上焦之陽補天浴日在醫之手眼奈何後世總不知胸痹為何病耳腹痛小腹痛腹中窄狹當臍痛東垣云腹中諸痛皆由勞役過甚飲食失節中氣受傷寒邪乘虛入客陽氣不通所致故卒然而痛經云得炅則痛立止中脘痛屬太陰理中湯臍腹痛屬少陰真武湯小腹痛屬厥陰當歸四逆湯加吳茱萸若夫熱病腹痛熱則芍藥甘草湯黃芩湯寒則理中湯若脾胃素虛人飲食不能消克者六君子加香砂若兼外感宿食者藿香正氣散若但少腹硬滿而痛小便利者即是蓄血之證桃核承氣湯小便不利者即是溺澀之證五苓散有心腹大痛欲吐不得吐欲瀉不得瀉是名霍亂急以鹽湯灌之其或清痰留滯於胸膈之間食積鬱結於腸胃之內皆能令人腹痛痰則控涎丹食積枳實導滯丸凡治腹痛必用溫散如臺芎蒼朮香附之類白芍能治血虛腹痛惟脈弦發熱者為宜其性酸寒收斂無溫散之功若氣虛者服之反傷脾胃也綿綿而痛無增減欲得熱手按及喜熱飲食脈沉遲者寒也理中湯加肉桂香砂腹痛用溫藥不效痛愈甚大便祕者微利之平胃散加藿香半夏紫蘇木香大黃虛人人參養胃湯時痛時止熱手按而不減脈洪數者熱也二陳湯加厚朴枳實芩連山梔腹中水鳴乃火擊動其水也二陳加芩連木香枳實木通虛人六君子加香砂豬苓澤瀉感暑而痛或瀉利並作脈必虛豁十味香薷飲感濕而痛小便不利大便溏泄胃苓湯如腹中常有熱而痛此為積熱調胃承氣湯下之因客寒作痛者脈必弦緩小建中加炮姜兼氣鬱脈沉者更加臺芎蒼朮香附因熱作痛脈必數疾二陳湯加芩連芍藥痛甚稍加炮姜從治之若時痛時止口乾噁心頭眩或瀉黃沫者火也前藥勿用炮姜加大黃微利之脈沉結或伏必腹痛痛引兩脅及肩背皆不得俯仰者氣滯也二陳加川芎木香枳殼香附不應有血也加蓬朮穿山甲七情內結心腹絞痛不能飲食時作時發發即欲死七氣湯選用酒積作痛曲糵丸食積作痛保和丸蟲痛者懊憹作痛上下不定痛有休止或有塊梗起痛則嘔吐清水當從蟲積治之因疝致痛者必引睪丸或小腹有一條梗起宜從疝治因觸穢致痛得熱湯飲轉劇者是臭毒攻逆也另詳本門小腹痛小腹痛滿有三皆為內有留著非虛氣也小腹正中為少陰任沖之分野兩傍為厥陰肝經之分野一屬燥結大腸其證五六日大便不通按之堅滿繞臍攻痛小便雖利而黃赤其脈數實有力為府邪實結而痛滿大承氣下之若因津血枯澀而結者其脈雖數而不甚旺麻仁丸通幽湯之類無故而大便不通少腹微滿尺脈雖數而必微弱者蜜煎導之夏月可用豬膽導慎不可用攻裡之藥攻之胃氣受傷必生他患也一屬熱結膀胱其證溺閉不通按之雖滿而不甚堅彈之有聲激指其脈數盛有力而煩渴引飲者晝甚五苓散夜劇豬苓湯一屬血結膀胱而腹滿其證善忘如狂或渴欲漱水而不能飲或喜熱飲仍不能多小便清利或反倍於平時或數缺而不清大抵邪結膀胱陽分熱邪傷血雖有蓄血其人真陰不虛則小便自清尺脈必盛代抵當丸若反倍於常時者為邪據下焦真陽外亡之候本方去硝減黃倍桂加熟附六七分救之若緣醉飽入房強力忍精而致少陰與任督受傷血結陰分者此真陰虧損必致小便澀數脹滿如淋也生料濟生腎氣丸紅酒煎服有婦人經行之時交合受傷時時不淨而少腹滿痛者此衝脈受傷也十全大補湯倍用肉桂若有塊絞痛喜熱按此氣血虛而有瘀積也當歸生薑羊肉湯加肉桂吳茱萸茯苓芍藥不應加人參又有本來下元虛人勉力勞役而致受傷蓄血小腹滿痛者此肝經受傷其滿必偏見於左傍也調肝散代抵當丸審微甚選用可也然亦有右傍偏滿者此必飽食奔馳脾陰下溜食積痰膩留結也當於積滯門求之其臭毒腹痛嘔逆另詳雜門診陰弦腹痛細小緊急皆為腹痛耎滑為痰飲弦為冷食陰弦或緊宜溫沉弦滑實可下沉伏者為氣滯細小緊急腹中刺痛尺脈緊臍下痛弦急小腹痛尺脈伏癥瘕痛細小而遲者易治堅大疾者數而緊者浮大而長者為病不應脈皆難治痛甚而喘臍下急大痛人中黑者死腹中窄狹肥人乃是濕痰留滯氣不升降當行氣燥濕越曲平胃為主瘦人乃是陰虛火旺熏蒸臟腑逍遙佐金降火開鬱為主肥人腹中轆轆有聲須作痰治二陳二術為主氣虛者加人參當臍痛當臍痛為腎虛任脈為病六味丸加龜板灰傷寒陽脈澀陰脈弦法當腹中急痛此為本虛受寒小建中湯和之虞恆德治一壯年寒月入水網魚飢甚遇涼粥食入腹大痛二晝夜不止醫以大黃丸不通又以承氣下糞水而痛愈甚診其六脈沉伏而實面色青黑此大寒證而下焦又有燥屎作痛先與治中湯加丁附一帖又灸氣海二十一壯痛減半繼以巴豆沉香木香作丸如緑豆大生薑湯下五七丸下五七次而愈又治一人六月投淵取魚至深秋雨涼半夜小腹痛甚大汗脈沉弦細實重取如循刀責責然夫腹痛脈沉弦細實如循刀責責然陰邪固結之象便不當有汗今大汗出此必瘀血留結營氣不能內守而滲泄於外也且弦脈亦肝血受傷之候與大承氣加桂二服微利痛減連日於未申時復堅硬不可近與前藥加桃仁泥下紫血升余痛止脈雖稍減而責責然猶在又以前藥加川附子下大便四五行有紫黑血如破絮者二升而愈汪石山治一老婦病腹痛初從右手指冷起漸上至頭如冷水澆灌而腹大痛痛則遍身大熱熱退則痛止或過食或不食皆痛每年發一二次近來二三日一發遠不過三五日用四物四君二陳七氣皆不應汪診之脈皆微弱似有似無或二三至一止或四五至一止乃陽氣大虛也用獨參五錢入陳皮七分煎服十數帖而愈夫四肢者諸陽之本頭者諸陽之會經曰陽虛則惡寒今指梢冷逆上至頭則陽虛陰盛可知陽虛不能健運而痛大作痛作而復熱者物極則反也及其陰陽氣衰兩不相爭則熱歇而痛亦息矣故以獨參湯補之數年之病遂愈脅痛季脅痛腋下腫痛經云肝病者兩脅下痛引小腹令人善怒肝病內舍胸脅邪在肝則兩脅下痛肝熱病者脅滿痛膽動病心脅痛不可反側肝所生病腋下腫脅痛肺病傳肝脅痛出食肝舍於胠脅故脅痛多屬於肝然經筋所過挾邪而痛者自有多端不可執一且左右者陰陽之道路故肝主陰血而屬於左脅脾主陽氣而隸於右脅左脅多怒傷或留血作痛右脅多痰積或氣鬱作痛其間七情六郁之犯飲食勞動之傷皆足以致痰凝氣聚血蓄成積雖然痰氣亦有流於左脅者然必與血相持而痛血積亦有傷於右脅者然必因脾氣衰而致其間虛實治法可默悟矣傷寒少陽脅痛用小柴胡湯硬滿加薄桂不大便加枳殼兼胸脅滿痛加枳桔若不因傷寒而脅痛身體微熱枳殼煮散蓋枳殼為治脅痛專藥諸方皆用之寒氣引脅下痛枳實理中湯戴復庵云腹納諸般冷痛枳實理中湯加減作無限用脅痛而氣喘分氣紫蘇飲增損流氣飲選用有脅痛而吐血者此熱傷肝也小柴胡去半夏黃芩加丹皮鱉甲兩脅腫痛或腹痛或小便澀滯者屬濕熱龍膽瀉肝湯脈弦痛在左屬肝火宜柴胡山梔當歸青皮芍藥不已加吳茱萸炒川連甚則加酒炒龍膽草如果肝氣實當歸龍薈丸因怒傷肝肝氣鬱甚柴胡疏肝散氣滯作痛兩手脈沉伏或弦痛引胸脅不得俯仰屈伸二陳加枳殼香附木香左脅痛者木氣實也抑青丸火盛者佐金丸從治之有蓄血偏著左脅而痛者復元活血湯右脅痛乃悲傷肺氣所致推氣散加桔梗或只用川芎枳殼二味作湯服之脅下偏痛發熱其脈緊弦此寒也以溫藥下之宜金匱大黃附子湯兩脅走痛脈沉弦而滑乃濕痰流注在脅下導痰湯加白芥子枳殼香附木香甚則控涎丹導而下之食積寒痰流於脅下痛若錐刺手不可近諸藥不效者神保丸食積脅痛發寒熱痛引心下噁心惡食必有一條扛起有脈必滑二陳加香砂枳朮曲朴楂芽甚則加吳茱萸制川連結積痰癖冷痛煮黃丸氣弱人脅下痛脈弦細或緊多從勞役怒氣得之六君子加木香芎歸桂心肥白人氣虛發熱而脅痛用參耆柴胡黃芩枳殼木香之類甚則加桂瘦弱人陰虛寒熱脅下痛多怒必有瘀血宜桃仁紅花柴胡青皮丹皮鱉甲之類甚則加大黃咳嗽引脅下痛為水飲停蓄小青龍湯脅下硬滿引痛乾嘔短氣汗出不惡寒有時頭痛心下痞者十棗湯乾咳引脅下痛發寒熱為鬱結所致逍遙散若脅下有塊痛乃過飽勞力所致逍遙散加木香丹皮青皮死血作痛日輕夜重或午後熱脈短澀桃核承氣湯易肉桂加穿山甲鱉甲青皮不應加熟附子一片如跌撲脅痛亦宜上方凡內傷脅痛不止者生香油一盞生蜜一杯和勻服一二次即止房勞腎虛之人胸膈脅肋多隱隱微痛乃腎虛不能納氣氣虛不能生血之故宜補骨脂杜仲牛膝補腎當歸熟地和血及七味丸調理季脅痛經云冬脈不及則令人心懸如病飢䏚中清脊中痛少腹滿小便變又足少陽之筋引脅外轉筋膝不可屈伸膕筋急前引髀後引尻即上乘䏚季脅痛按季脅痛無不因腎虛者加減八味丸腎氣丸選用腋下腫痛少陽濕熱留薄則腋下腫痛小柴胡加撫芎枳殼實人去參加草龍膽體肥痰盛加白芥子有痰飲搏聚而痛者加味導痰湯加柴胡為嚮導診脈雙弦者肝氣有餘兩脅作痛弦數有力為肝盛有餘弦數無力為肝虛有火弦小而細為飲脈沉為氣浮弦為風弦小而弱者為陽虛沉細為陰虛劉默生治諸葛子立脅痛連腰脊不能轉側服六味丸加杜仲續斷不效或者以為不能轉側必因閃挫與推氣散轉劇劉診之曰脈得弦細乏力虛寒可知與生料八味加茴香四劑而安腰痛腰痠腰軟腰胯痛經云腰者腎之府轉搖不能腎將憊矣巨陽虛則頭項腰背痛此二條言證之虛膀胱之脈挾脊抵腰故挾脊痛腰似折此一條言邪之實按內經言太陽腰痛者外感六氣也言腎經腰痛者內傷房勞也假令腎臟真氣布護六氣焉能為害惟腎臟虛傷膀胱之府安能獨足又有膏粱之人久服熱劑醉以入房損其真氣則腎臟熱腰脊痛久則髓減骨枯發為骨痿此為本病其有風寒濕熱閃挫瘀血滯氣痰積皆為標病而腎虛則其本也風痛者脈浮或左或右痛無定處牽引兩足小續命加減寒痛者其腰如冰其脈必緊得熱則減得寒則增乾薑附子湯加肉桂杜仲外用摩腰膏兼風寒者五積散熱服微汗之內蓄風熱痛者脈必洪數口渴便閉小柴胡去半夏加羌活續斷黑豆若大便閉者先用大柴胡微利之濕痛者如坐水中腎屬水久坐水濕或著雨露以致腰下冷痛脈必弦緩小便自利飲食如故天陰頭必重體必沉重滲濕湯腎虛由臥濕地流入腰腳偏枯冷痹疼重千金獨活寄生湯兼風濕者改定三痹湯如挾寒濕並用摩腰膏虛寒甚而挾濕者朮附湯挾濕熱者羌活勝濕湯合二妙散腎氣虛寒而受寒濕腰疼不得立用燒羊腎主之此千金法也閃挫痛者跌撲損傷肝脈搏堅而長兩尺實忽然不可俯仰復元通氣散不效必有惡血復元活血湯氣滯而痛脈沉弦或結伏初起烏藥順氣散不應八味順氣散痰注而痛脈滑或沉伏動作便有痰或一塊作痛導痰湯加香附烏藥枳殼脈實加大黃肝氣不條達睡至黎明覺則腰痛頻欲轉側曉起則止宜柴胡疏肝散或二妙散加柴胡防風即東垣蒼朮湯腰痛如以帶束引痛此屬帶脈為病用辛味橫行而散帶脈之結甘味舒緩帶脈之急調肝散腰痛牽引足膝青娥丸加蠍尾最妙以補腎兼補肝也兩腰僂廢乃熱邪深入血脈久閉之故桃核承氣多用肉桂少加熟附行經但痛者可治僂廢而不痛者不可治也諸般腰痛皆由腎虛若兼六淫須除其邪如無他證而腰肢痿弱隱隱作痛身體疲倦腳膝痠軟者總屬腎虛然須分寒熱主治脈細而軟或虛浮力怯短氣小便清利屬陽虛火衰腎氣丸加肉蓯蓉補骨脂巴戟鹿茸之類脈大而軟或細數小便黃屬陰虛火炎六味丸加龜板當歸杜仲續斷之類腰痠腰痛尚有寒濕傷損之異腰痠悉屬房勞腎虛惟有峻補男子用青娥丸或八味丸加補骨脂杜仲有熱去附子加五味走精用六味丸去澤瀉加鰾膠沙苑蒺藜五味子大便不實加肉果補骨脂山藥粉糊代蜜婦人用六味加杜仲續斷有帶去熟地加艾附經候不調加當歸阿膠腰軟濕氣襲於少陽經絡之中則為腎著金匱用甘姜苓朮湯後世更名為腎著湯或滲濕湯選用斫喪太過者八味丸腎虛風襲腰背軟痛安腎丸腰胯痛寒濕流注於足少陽之經絡則為腰胯痛蓋腰乃膽經之所過因受寒濕結滯於骨節而痛滲濕湯去橘紅加肉桂有痰滯經絡導痰湯加減若腎肝伏熱用薑汁炒黃柏酒防己少加肉桂若腰胯連腳膝曉夜疼痛者腎虛風毒乘之也用虎骨散加補骨脂老人腎虛腰痛連膝痛者二至丸診脈大為肝腎陰虛尺沉為腎臟陽虛浮緩為虛風弦細為寒濕或弦或澀為瘀血或滑或伏為痰飲沉弦而緊為寒沉弦而細為濕沉弦而實為閃肭若腎憊及盛怒傷志則腰失強不能轉搖者死石頑治沈雲步媳常有腰疼帶下之疾或時勞動日晡便有微熱診其兩尺皆弦而右寸關虛濡少力此手足太陰氣衰敷化之令不及也合用異功散加當歸丹皮調補胃中營氣兼杜仲以壯關節澤瀉以利州都則腰疼帶下受其益矣江蘇總藩張公嚴冬腰腹疼重甲夜延石頑診候脈得沉滑而快遂取導痰兼五苓之制一劑而腹痛止三啜而腰臗弛縱自如未嘗用腰腹痛之藥也脊痛脊強尻痛脊者督脈之經與膀胱之經皆取道於脊也故項脊常熱而痛者陰虛也六味丸加麋茸常寒而痛者陽虛也八味丸加鹿茸有腎氣攻背而項筋痛連脊髀不可轉移者此地氣從背而上入也椒附散太陽經脊痛項強腰似折項似拔羌活勝濕湯脈浮緊為傷寒麻黃湯沉緩為風濕五苓散換蒼朮桂枝加羌活打撲傷損從高墜下惡血在太陽經中腰脊痛不可忍地龍湯尻痛尻乃足少陰與督脈所過之處兼屬厥陰若腎虛者六味丸加肉桂不愈加鹿茸肥人屬濕痰二陳合二妙有因死血作痛者當歸赤芍牡丹桃仁延胡索生牛膝穿山甲肉桂之類清理之不應加地龍生附子肩背痛經云背者胸中之府背曲肩隨府將壞矣肺病者喘咳逆氣肩背痛汗出肺盛有餘則肩背痛風寒汗出中風小便數而缺氣虛則肩背寒少氣不足以息溺色變邪在腎則肩背痛是腎氣上逆也東垣云肩背痛不可回顧此手太陽氣鬱不行也以風藥散之通氣防風湯若面白脫色短氣者勿服宜逍遙散加人參火鬱熱盛東垣升陽散火湯形氣虛甚十全大補湯肩背痛脊強腰似折項似拔此足太陽經氣不行也羌活勝濕湯風寒汗出中風肩背痛小便數而缺者風熱乘其肺而肺氣鬱甚也當瀉風熱消風散去殭蠶蟬蛻加枳桔寒熱少氣不足以息而肩痛小便遺失者補中益氣加門冬五味濕熱相搏肩背沉重而痛當歸拈痛湯當肩背一片冷痛背膂疼痛古方用神保丸愈者此有寒積也有因寒飲伏結者近效白朮附子湯亦有因痰氣留伏者指迷茯苓丸素有痰飲流注肩背作痛導痰湯有腎氣不循故道氣逆挾脊而上致肩背痛沉香肉桂茯苓牛膝茴香川椒青鹽或觀書對奕久坐而至脊背痛者補中益氣加羌防肥人喜捶而痛快者屬痰宜除濕化痰兼補脾胃六君子加木香瘦人多是血少氣虛宜養血清火聖愈湯背痛須加羌防引經肥人少佐附子瘦人須佐芩連丹皮有素虛人及病後房勞後婦人産後經行後心膈間痛或牽引乳脅或走注肩背痛並宜十全大補隨證加減診寸口脈促上擊者肩背痛洪大為熱浮大為風沉而滑者背膂痛必有寒飲伏結也丹溪治一人忽患肩胛縫有一線疼起上循肩至胸前側脅而止晝夜不息其脈弦而數重按豁大左大於右夫胛小腸經也胸脅膽經也此因謀事不遂思慮煩心心不病而小腸之火乘膽所致以人參四錢木通二錢煎湯下龍薈丸數服而愈李士材治俞元濟背心一點痛久而漸大服行氣和血藥不效其脈濡滑遇天陰痛輒甚其為濕痰無疑以胃苓湯加半夏三錢數劑而痛消臂痛手痛手氣東垣云臂痛者有六道經絡各加引經藥乃驗以兩手伸直垂下大指居前小指居後而定之臂臑之前廉痛者屬陽明升麻白芷乾葛為引經後廉屬太陽藁本羌活外廉屬少陽柴胡連翹內廉屬厥陰柴胡當歸內前廉屬太陰升麻白芷蔥白內後廉屬少陰細辛當歸臂痛為風寒濕所搏或因飲液流入或因提挈重物皆致臂痛有腫者有不腫者除飲證外其餘諸痛並宜五積散蠲痹湯選用虛人必加人參以助藥力若坐臥為風濕所搏或睡後手出被外為寒所襲而痛者五積散審知是濕痹經絡血凝氣滯作痛蠲痹湯挈重傷筋以致臂痛宜和氣調血十全大補湯痰飲流入四肢肩背痠疼兩臂軟痹導痰加木香片子薑黃薑製白朮若作風治誤矣中脘留伏痰飲臂痛難舉手足不能轉移指迷茯苓丸丹溪治臂痛以二陳湯加酒炒黃芩蒼朮羌活手痛經云手屈不伸者其病在筋薏苡仁湯伸而不屈者其病在骨近效白朮附子湯十味銼散選用手氣手腫痛曰手氣或指掌連臂膊痛悉屬風熱挾痰蠲痹湯薄桂味辛淡能橫行手臂引調氣血藥至痛處片子薑黃能引至手臂惟濕痛最妙又有腫痛時常脫骱者此屬濕痰倍用蒼朮乃效石頑治禮科姜如農次媳春初患發熱頭疼腹痛咳逆無痰十指皆紫黑而痛或用發表順氣不效延余診之脈來弦細而數右大於左曰此懷抱不舒肝火鬱於脾土而發熱熱蒸於肺故咳因肺本燥故無痰脾受木克故腹痛陽氣不得發越故頭疼四肢為諸陽之本陽氣不行氣凝血滯故十指疼紫其脈弦者肝也數者火也細者火鬱於血分也遂以加味逍遙散加桂枝於土中達木三劑而諸證霍然十指亦不疼紫矣腿痛大股痛腿痛亦屬六經前廉為陽明白芷升麻乾葛為引經後廉太陽羌活防風外廉少陽柴胡羌活內廉厥陰青皮吳茱萸內前廉太陰蒼朮白芍內後廉少陰獨活澤瀉痛有血虛血寒寒濕風濕濕熱流注陰虛陽虛腎虛風襲之殊血虛者足不任地行則振掉脈細弱六味丸加巴戟續斷杜仲鹿茸血寒者經急脈沉喜湯火嚴冬尤甚舒筋三聖散濕者兩腿隱隱痛或麻瞀作腫身沉重肢節疼痛惡風不欲去衣脈浮澀或浮細除風濕羌活湯脈沉白朮附子湯肥人導痰湯加減濕熱者痛自腰胯以至足脛或上或下或紅或腫小便赤澀脈濡大而數當歸拈痛湯流注者郁痰留於腰脅有塊互換作痛噁心頭眩脈沉滑或弦二陳湯加羌活白朮陰虛者肌體羸瘦足心及脛熱痛左尺細數或兩尺數盛虎潛丸去橘皮加肉桂陽虛者兩足浮腫無力大便瀉小便短少痛不能動左尺虛大或兩尺浮遲脾與命門俱虛先用補中益氣加桂附後用八味丸腎虛風襲則下體痿弱骨節疼痛喘咳失精腰腹腿脛俱痛尺中浮大而數安腎丸大股痛痛而喜按者肝腎虛寒而濕氣痹著也四斤丸二方選用痛不可按者敗血也川芎肉桂湯或舒筋三聖散酒調服婦人産後多有此證宜加穿山甲桃仁虛人十全大補湯加附子穿山甲有濕熱者痛虛心腫而沉重不能轉側二妙散加羌防升柴朮草之類或除濕湯滲濕湯選用寒熱而膽痛者須防發癰膝痛足跟痛足心痛經云膝者筋之府屈伸不能行則僂俯筋將憊矣故膝痛無有不因肝腎虛者虛則風寒濕氣襲之又曰身半以以下者濕中之也故治膝脛之病又須以去濕為主大抵痛在筋者多挾風熱則屈不伸而腫二妙散加羌防升柴兼陰虛者則熱而不腫虎潛丸或二妙加牛膝肉桂因臥濕地流入腳膝痹弱疼重千金獨活寄生湯夏月濕熱沉重而痛當歸拈痛湯痛在骨者多兼寒飲重而屈伸不利常若拭不幹狀附子丸川芎肉桂湯活絡丹鐵彈丸選用虛寒挾風濕而痛虎骨四斤丸如肝腎虛熱筋骨痿弱顫掉而痛鹿茸四斤丸若痛在衝陽及肉者屬足陽明經痛在委中腨腸者屬足太陽經在外廉者屬少陽在內廉者屬三陰隨其經而取之足跟痛腎臟陰虛者則足脛時熱而足跟痛六味丸加龜板肉桂陽虛者則不能久立而足跟痛八味丸挾濕者必重著而腫換骨丹史國公藥酒肥人濕痰流注導痰湯加木瓜萆薢防己虛人用補中益氣十全大補湯並少加附子為引凡下部痛多用藥酒殊不知病甚於冬者為寒濕故宜用酒若春夏甚而秋冬減者此屬濕熱若用藥酒是反助其濕也足心痛足心及踝骨熱疼者為腎虛濕著命門火不歸經腎著湯下八味丸肥人多濕痰流注足心作痛但久坐臥起則痛甚行動則緩宜腎著湯合二妙散慎不可用補骨藥及血藥助陰愈增其劇戴人治一人兩膝臏屈伸有聲剝剝然此筋濕也濕則筋急有獨緩者不鳴急者鳴也乃一湧一泄上下去其水水去則自然無聲矣身體痛體痛為一身盡痛傷寒霍亂中暑陰毒濕痹痛痹皆有體痛但看兼證及問因診脈而別之治法分見各門其流連難已者於此求之寒而身痛痛處常冷或如濕狀甘草附子湯內傷勞倦兼風濕相搏一身盡痛補中益氣加羌防藁本蒼朮濕熱相搏肩背沉重疼痛上熱胸膈不利遍身上下沉重疼痛當歸拈痛湯風濕相搏一身盡痛陰濕中汗出懶語四肢困倦乏力走注疼痛乃下焦伏火不得泄而躁熱常微汗出而熱不解麻黃復煎湯身體拘急皆屬虛寒與寒濕風濕小續命隨證加減發寒熱而周身作痛胸脅痞悶不舒肝血虛而鬱火用事也逍遙散加羌活桂技小便不利加山梔丹皮天暑衣厚則腠理開汗出邪留於分肉之間聚沫則為痛六和湯加羌活遍身皆痛如勞證者十全大補去白朮熟地加羌活附子下體痛宜分利小便五苓二妙為主下體腫痛脈浮自汗惡風者防己黃耆湯溫覆微汗之痛而大便不通者厚朴七物湯微利之丹溪曰因濕痰濁血流注為痛若在下焦道路深遠非烏附不能下達少加引經用之若以為主治非徒無益而反害之也善治者必行氣流濕疏風導滯滋養新血升降陰陽治有先後須分腫與不腫可也肢節腫痛痛屬火腫屬濕蓋為風寒所郁而發動於經絡之中濕熱流注於肢節之間而無已也先宜微汗以散之故羌活桂枝為肢節痛之要藥身體疼痛及重者濕也五苓散汗之如風濕相搏一身盡痛加羌防升柴藁本蒼朮風能勝濕故也痛家不可食厚味與肉大能助火若食肉厚味痛愈盛者並魚腥麵醬酒醋皆斷去之丹溪曰環跳穴痛不已防生附骨癰掘地成坑以火煅赤沃以小便赤體坐其上以被圍繞下體便熱蒸腠理開血氣暢則愈診傷寒六脈俱緊為太陽表證身如被杖脈沉緊為陰毒發汗後脈弦遲身體痛為氣血不和一身關節盡痛而脈沉弦為中濕肢體重痛微腫汗出惡風關節不利不可轉側而脈緩為風濕遍身疼痛脈弦小或豁大為氣血虛損
