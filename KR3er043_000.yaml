body:
  text: 凡例六則一醫學自軒岐仲景一脈相承而近世名家視素問為迂遠不切傷寒論為古法不可以治今病至於靈樞金匱並其書而未聞也是編首列靈素病機次則金匱治例以冠諸論第文辭質奧非膚淺輩可知故詳加釋義以明其旨獨不及傷寒論者以傷寒纘緒二論先梓行世故也一藝術之學惟醫林最繁汗牛充棟莫可名喻然靈素金匱而外求其理明辭暢如王安道趙嗣真趙養葵張景嶽喻嘉言者指不多屈即歷代名醫造藝各有所長文理不能兼善故選擇方論如披沙揀金況多支辭復義彼此互引不得不稍為筆削其文氣有不續處略加片語以貫之辭義有不達處聊易數字以暢之一切晦滯難明者雖出名賢概置不録一各證治例類次系諸論之後皆從古相承未能逐一辨其出自某某有例雖明確而治未允當者或經治驗或加體會易以對證方藥非故為舉措變亂成則也然亦不過如匠氏之繩墨又必臨病審察隨其所稟之偏勝形志之苦樂而為處方所以一例後有主二三方者如金匱例云短氣有微飲當從小便去之苓桂朮甘湯主之腎氣丸亦主之病溢飲者當發其汗大青龍湯主之小青龍湯亦主之小便不利蒲灰散主之滑石白魚散茯苓戎鹽湯並主之所謂醫不執方合宜而用者其斯之謂歟一古今治按如儒者之歷科程文而諸家所輯方書都未之及且從古立言止就一端而論人之所患都兼併不一非詳究古人治驗不能識治法之奧故於諸按中擇其可以為法者附列論例之末非若類按之泛引稗官野史以混耳目一論中所用諸方祖方各歸其源專方各隸本門更有不專一門不歸一源之方曾採用於前者以後但著見於某門不復疊載祖方則循序貫列令知某湯中加某藥即為某方治某病究其出入增減之意便獲古人用藥心法蓋臨病制方原非作意師古即如善於奕者下手輒成譜勢與醫者之投劑不殊然古方中有極峻厲極迅烈難於輕試者有順逆反正配合寒熱補瀉互用深奧難明其理者有故用相反之性激其成功者有奇兵暫用隨手轉關者各於方後發明其義則極峻厲極奇奧諸方皆為常勝之師庶學者胸中不膠執古方不可治今病之說斯不愧乎大方洵非專守藥性用藥者可同日而語也間有古方因病雜合而制難於取法者稍為更易以合本條治例方下標名改定不敢混廁以浼先哲也一是編證類次第悉如準繩而所輯方論更迭出入肇是甲申迄今癸酉歲逾五甲稿凡十易勒成一十六卷而所選不欲太繁繁則郢書燕說讀者愈滋其惑又不能太簡簡則井蛙鼴鼠臨證罔知所措務在廣搜歷覽由博反約千古名賢至論統敘一堂八方風氣之疾匯通一脈俾後世修性命之學者昭然共由而趨世騖名者歧路攸分請毋事此
