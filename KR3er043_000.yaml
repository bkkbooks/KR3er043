front:
  text: 自序齊一變至於魯魯一變至於道道之興廢靡不由風俗之變通非達道人不能達權通變以挽風俗之隤弊也今夫醫道之變至再至三豈特一而已哉餘生萬曆丁巳於時風俗雖漓古道未泯業是道者各擅專科未嘗混廁而治也甲申世變黎庶奔亡流離困苦中病不擇醫醫隨應請道之一變自此而始當是時也煢煢火孑遺托跡靈威丈人之故墟賴有醫藥種樹之書消磨歲月因循十有餘載身同匏繫聊以著書自娛歲己亥賦歸故園篋中輯得方書一通因名醫歸大都吻合準繩其間彙集往古傳習諸篇多有不能暢發其義者次第以近代名言易之草創甫成同人速豫授梓自揣多所未愜難以示人僅以傷寒纘緒二論先行問世頗蒙宇內頷之壬寅已來儒林上達每多降志於醫醫林好尚之士日漸聲氣交通便得名噪一時於是醫風大振比戶皆醫此道之再變也嗟豫固陋不能與世推移應機接物而外時與先聖晤對一堂無異手提面命遞年已來穎禿半床稿凡十易惜乎數奇不偶曩因趨赴孝伯耿公之招攜至霅川公署失去目科一門先是內侄顧惠吉持去痘疹一冊久假不歸竟成烏有知機不偶已將殘編置之高閣無復行世之心矣近聞懸壺之士與垂簾之侶互參恆德之術聖門之教無違炎黃之德不顯道之三變匪特自今吾於志學之年留心是道迄今桑榆入望歷世頗多每思物壯則老時盛必衰欲挽風俗之隤弊寧辭筆削之罪知因是仍將宿昔所述之言從頭檢點爰命倬兒補輯目科治例柔兒參入痘疹心傳足成全編易以通名標諸簽額書未竟適逢客至隨手開函而語豫曰在昔韓氏醫通名世已久今子亦以是名得無名實相混之慮乎豫謂不然吾聞元氏集名長慶白氏之集亦名長慶二集並驅後世未嘗因名混實奚必拘拘於是耶客莞爾而退遂以醫通定名逮夫三變之術法外之法非可言語形容也康熙乙亥季夏石頑張璐時年七十有九
