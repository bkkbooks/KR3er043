body:
  text: 卷一中風門中風類中匯入靈樞云身半以上者邪中之也身半以下者濕中之也邪之中於人也無有常中於陰則溜於府中於陽則溜於經中於面則下陽明中於項則下太陽中於頰則下少陽其中於膺背兩脅亦中其經中於陰者常從臂胻始其陰皮薄其肉淖澤故俱受於風獨傷其陰足陽明之筋病卒口僻急者目不合熱則筋縱目不開頰筋有寒則急引頰移口有熱則筋弛縱緩不勝收故僻治之以馬膏摩其急者以白酒和桂以塗其緩者以桑鉤鉤之即以生桑灰置之坎中高下以坐等以膏尉急頰且飲美酒啖炙肉不飲酒者自強也為之三拊而已口頰喎僻乃風中血脈也手足陽明之經絡於口會太陽之經絡於目寒則筋急而僻熱則筋弛而縱故左中寒則逼熱於右右中寒則逼熱於左寒者急而熱者緩也急者皮膚頑痹營衛凝滯故用馬膏之甘平柔緩以摩其急以潤其痹以通其血脈用桂酒之辛熱急束以塗其緩以和其營衛以通其經絡桑能治風痹通節竅也病在上者酒以行之甘以助之故飲美酒啖炙肉若不飲者自免強飲之為之三拊者再三拊其急處使氣血流動其病自已也素問云風中五臟六腑之俞亦為臟腑之風各入其門戶所中則為偏風故風者百病之長也至其變化乃為他病也三陽三陰發病為偏枯痿易四肢不舉汗出偏沮使人偏枯偏枯痿厥肥貴人膏粱之疾也脛有大小髀䯒大疲易偏枯內奪而厥則為喑痱虛邪客於身半其入深營衛衰則真氣去邪氣內留發為偏枯胃脈沉鼓澀胃外鼓大心脈小堅急皆鬲偏枯男子發左女子發右不喑舌轉可治三十日起其從者喑三歲起年不滿二十者三歲死趙以德曰胃與脾為表裡胃之陽虛則內從於脾從於脾則脾之陰盛故胃脈沉鼓澀澀者少血多氣之診也胃之陽盛則脾之陰虛虛則不得與陽主內反從其胃越出部分而鼓大於臂之外大者多氣少血之候也心者元陽君主之宅生血生脈今因元陽不足陰寒乘之故心脈小堅急小者陽不足堅急者陰寒之象也夫心胃之三等脈見一即為偏枯心乃天真神機開發之本胃乃穀氣充天真之原一有相失則不能制其氣而宗氣散故分布不周不周於經脈則偏枯不周於五臟則喑喑者腎與包絡內絶也張景嶽曰胃脈沉鼓澀陽不足也胃外鼓大陰受傷也心脈小堅急陰邪勝也胃氣既傷血脈又病故心下痞鬲半身偏枯也金匱云夫風之為病當半身不遂或但臂不遂者此為痹脈微而數中風使然半身不遂者偏風所中也但臂不遂者風遂上受也風之所客凝澀營衛經脈不行分肉筋骨俱不利故曰此為痹今因風著為痹營遂改微衛遂改數故脈見微數蓋微者陽之微數者風之熾也此即內經風論所謂各入其門戶所中者之一證也千金補金匱之不逮立附子散治中風手臂不仁口面喎僻專以開痹舒筋為務也寸口脈浮而緊緊則為寒浮則為虛寒虛相搏邪在皮膚浮者血虛絡脈空虛賊邪不瀉或左或右邪氣反緩正氣即急正氣引邪喎僻不遂邪在於絡肌膚不仁邪在於經即重不勝邪入於腑即不識人邪入於臟舌即難言口吐涎寒邪之脈緊束故浮緊並見於寸口絡脈從經脈左右雙行當邪入之時不治至邪隨絡脈流行緩急牽引故口眼喎斜不遂邪在於絡則不營於肌膚故不仁邪在於經則外不滋於肉故身重而不勝所謂入腑入臟者以胃為六腑之總司心為五臟之君主諸腑經絡受邪變極則歸於胃胃得之則熱甚津液壅溢為痰涎閉塞其神氣出入之竅故不識人也諸臟受邪極而變者亦必歸於心心得邪則神散而樞機息舌者心之竅機息則舌縱廉泉開舌縱則難以言廉泉開則口流涎也主以侯氏黑散祛之從外而散取菊花之甘寒杜風兼牡蠣礬石之澀使藥積腹中以助祛風之力也寸口脈遲而緩遲則為寒緩則為虛營緩則為亡血衛緩則為中風邪氣中經則身癢而癮疹心氣不足邪氣入中則胸滿而短氣寸口脈遲知營氣不及而為亡血寸口脈緩知衛虛邪入而為中風衛不外布於經則為癮疹身癢營不內榮於心則客邪混鬱於胸中害其宗氣之布息故胸滿而短氣治以風引湯引之從內而泄故用大黃引領甘寒諸藥鎮攝虛風即以石脂牡蠣填塞復入之路靈樞所謂久塞其空謂之良工是也中風痱身體不能自收持口不能言冒昧不知痛處或拘急不得轉側古今録驗續命湯痱病者營衛氣血不養於內外故身體不用機關不利精神不治然是證有虛有實虛者自飲食房勞七情得之內經所謂內奪而厥則為喑痱是也實者是風寒暑濕感之虛者不可以實治治則愈散其氣血此方明言治中風痱乃營衛之實邪故用續命即麻黃湯之變方加乾薑開血受寒痹石膏解肌受風痹當歸和血人參益氣芎藭行血散風其並治咳逆上氣面浮者亦為風寒而致也中風手足拘急百節疼痛煩熱心亂惡寒經日不欲飲食千金三黃湯此六氣斂束筋經陽氣不布內搏於心則神亂而煩熱以熱鬱於內不得達表所以惡寒經日而不發熱以邪氣內賊故不欲飲食耳方以千金取名寶之至也觀千金方引用明注仲景三黃湯其為金匱原名可知用麻黃為君者以其能通陽氣而開痹也痹非得汗不開然內虛當慮故以大劑黃耆佐之而虛復有寒熱不同虛熱則用黃芩虛寒則加附子不易之定法也風虛頭重眩苦極不知食味暖肌補中益精氣近效白朮附子湯腎氣虛乏之人外風直入無禁而挾腎中濁陰之氣厥逆上攻其頭間重眩之苦至極難耐兼以胃氣亦虛不知食味故處方全不用風藥但用附子暖其水臟白朮甘草暖其土臟水土一暖則濁陰之氣盡趨於下而頭苦重眩食不知味之證除矣千金云岐伯曰中風大法有四一曰偏枯二曰風痱三曰風懿四曰風痹夫諸急卒病多是風初得輕微人所不悟宜速與續命湯依輸穴灸之夫風者百病之長岐伯所言四者說其最重也偏枯者身半不隨肌肉偏不用而痛言不變志不亂病在分腠之間溫臥取汗益其不足損其有餘乃可復也甲乙經云溫臥取汗則巨針取之風痱者身無痛四肢不收志亂不甚言微知則可治甚則不能言不可治風懿者奄忽不知人咽中塞窒窒然巢氏作噫噫然有聲舌強不能言病在臟腑先入陰後入陽治之先補於陰後瀉於陽發其汗身轉軟者生汗不出身直者七日死巢氏作眼下及鼻人中左右白者可治一黑一赤吐沫者不可治風痹者風寒濕諸痹類風狀風勝則周身走注疼痛寒勝則骨節掣痛濕勝則麻木不仁此言賊風諸痹痛風之大綱也石頑曰千金述岐伯中風大法有四方治頗繁今每例採一專方為逐證之綱旨如偏枯用八風續命湯風痱用竹瀝飲子風懿用獨活湯風痹用附子散此大略宗兆余方不能具載千金所謂變動枝葉各依端緒以取之端緒愈紛則探求愈惑圓機之士諒不能固守成則也趙養葵云河間所謂中風癱瘓者非謂肝木之風實甚而卒中之亦非外中於風良由平日飲食起居動靜失宜心火暴甚腎水虛衰不能制之則陰虛陽實而熱氣怫鬱心神昏冒筋骨不用而卒倒無知也亦有因五志有所過極而卒中者夫五志過極皆為熱甚俗云風者言末而忘其本也觀河間之論則以風為末而以火為本世之尊劉氏者專守主火之說殊不知火之有餘水之不足也劉氏原以補腎為本觀其地黃飲子之方可見矣故中風又當以真陰虛為本但陰虛有二有陰中之水虛有陰中之火虛火虛者專以地黃飲子為主水虛者又當以六味丸為主果是水虛辛熱之藥與夫參耆之品俱不可加東垣云有中風者卒然昏憒不省人事痰涎壅盛語言謇澀六脈沉伏此非外來風邪乃本氣自病也凡人年逾四旬氣衰之際或憂喜忿怒傷其氣者多有此證壯歲之時無有也若肥盛者亦間有之形盛氣衰故也觀東垣之論當以氣虛為主縱有風邪亦是乘虛而襲當此之時豈尋常藥餌能通達於上下哉急以三生飲一兩加人參兩許煎服夫三生飲乃行經治痰之劑斬關奪旗之將必多用人參駕馭其邪而補助真氣否則不惟無益適足取敗觀先哲用參附其義可見矣若遺尿手撒口開眼合鼻鼾為不治證然用前藥多有得生者丹溪云人有氣虛有血虛有濕痰左手脈不足及左半身不遂者四物加薑汁竹瀝右手脈不足及右半身不遂者四君子佐薑汁竹瀝如氣血兩虛而挾痰盛者二陳加星半竹瀝薑汁之類觀丹溪之論平正通達人盛宗之但持此以治多不效或少延而久必斃者何也蓋半身風廢須察脈辨證兼痰兼熱為是乃指左為血病右為氣病教人如此認證內經則無此說也左半雖血為主非氣以統之則不流右半雖氣為主非血以麗之則易散故肝膽居左其氣常行於右脾臟居右其氣常行於左往來灌注周流不息豈可執著哉凡治一偏之病法宜從陰引陽從陽引陰從左引右從右引左盍觀樹木之偏枯者將溉枯者乎抑灌其未枯者使之榮茂而因以條暢其枯者乎至若一味攻擊其風痰死血是相引喪亡而已喻嘉言曰河間指火為訓是火召風入火為本風為標矣東垣指氣為訓是氣召風入氣為本風為標矣丹溪指痰為訓是痰召風入痰為本風為標矣然一人之身每多兼三者而有之曷不曰陽虛邪害空竅為本而風從外入者必挾身中素有之邪或火或氣或痰而為標耶治法風邪從外入者必驅之使外出然挾虛者非補虛則風不出挾火者非清熱則風不出挾氣者非開鬱則風不出挾濕者非導濕則風不出挾痰者非豁痰則風不出王安道謂審其為風則從內經審其為火為氣為痰則從三子徒較量於彼此之間得非拘泥而執一耶王節齊曰古人論中風偏枯麻木痠痛不舉諸證以血虛亡血痰飲為言是論其致病之根源至於得病則必有所感觸或因六淫七情遂成此病此血與痰為本而外邪為標其病中於皮膚血脈經絡肌肉筋骨之間而未入臟腑故邪在皮膚肌肉則不知痛癢麻木不仁如有物一重貼於其上或如蟲蟻遊行或灑灑振寒或腫脹或自汗遇熱則或癢遇陰寒則沉重痠痛邪入血脈筋絡則手足指掌肩背腰膝重硬不遂難於屈伸舉動或走注疼痛皆外自皮毛以至筋骨之病凡脈所經所絡筋所會所結血氣津液所行之處皆凝滯郁遏不得流通而致然也亦何必一一強度某病屬某經某病屬某臟而雜治之哉薛立齊云邪在氣氣為是動邪在血血為所生病經云陽之氣以天地之疾風名之此非外來風邪乃本氣自病也故諸方多言皆由氣虛體弱營衛失調腠理不密邪氣乘虛而入然左半體者肝腎所居之地肝主筋腎主骨肝藏血腎藏精精血枯槁不能滋養故筋骨偏廢而不用也風病多因熱甚惟其血熱故風寒之氣一襲之則外寒束內熱而為痛故有治風先治血血行風自滅之語其真中風者當辨其中臟中腑而治之眼瞀者中於肝經舌不能言者中於心經唇緩便祕者中於脾經鼻塞者中於肺經耳聾者中於腎經此五者病深多為難治然五臟雖中風邪皆其經絡受病若傷其真臟百無一生矣中血脈者外無六經之形證內無便溺之阻隔肢不能舉口不能言中腑者多兼中臟如左關脈浮弦面目青左脅偏痛筋脈拘急目瞤頭眩手足不收坐踞不得此中膽兼中肝也如左寸脈浮洪面赤汗多惡風心神顛倒語言謇澀舌強口乾忪悸恍惚此中小腸兼中心也如右關脈浮緩或浮大面唇黃汗多惡風口喎語澀身重怠惰嗜臥肌膚不仁皮肉瞤動腹脹不食此中胃兼中脾也如右寸脈浮澀而短鼻流清涕多喘胸中冒悶短氣自汗聲嘶四肢痿弱此中大腸兼中肺也如左尺脈浮滑面目黧黑腰脊痛引小腹不能俯仰兩耳虛鳴骨節疼痛足痿善恐此中膀胱兼中腎也議其臟腑經脈之病可因人隨證而施不必拘其方藥也繆仲淳曰凡言中風有真假內外之別西北土地高寒風氣剛猛真氣空虛之人卒為所中中臟者死中腑者飲食便溺艱澀中經絡者重則成廢人輕可調理而瘳治之之法先以解散風邪為急次則補養氣血此真中外來風邪之候也若大江以南天地之風氣既殊人之所稟亦異其地絶無剛猛之風而多濕熱之氣質多柔脆往往多熱多痰真陰既虧內熱彌甚煎熬津液凝結為痰壅塞氣道不得通利熱甚生風亦致卒然僵仆類中風證或不省人事或語言謇澀或口眼喎斜或半身不遂其將發也外必先顯內熱之候或口乾舌苦或大便閉澀小便短赤此其驗也河間所謂此證全是將息失宜水不制火丹溪所謂濕熱相火中痰中氣是也此即內虛暗風確係陰陽兩虛而陰虛者為多與外來風邪迥別法當清熱順氣開痰以治標次當補養氣血以治本設若誤用真中風風燥之劑則輕者變重重則必死故凡內燥生風及痰中之證治痰先清火清火先養陰最忌燥劑張介賓曰風之為病最多誤治者在不明其表裡耳蓋外風者八方之所中也內風者五臟之本病也八風自外而入必先有發熱惡寒頭疼身熱等證顯然可察也五風由內而病則絶無外證而忽病如風其由內傷可知也雖既非外感而經曰諸暴強直皆屬於風諸風掉眩皆屬於肝何也蓋肝主風而藏血血病則無以養筋筋病掉眩強直諸變百出此皆肝木之化故云皆屬於風後世不明此義不惟類風認為真中而且以內奪暴厥等證俱認為風誤亦甚矣夫外感者邪襲肌表故多陽實內傷者由於七情故多陰虛凡臟氣受傷脾病者病在肢體或多痰飲腎病者或在骨髓或在二陰心病者或在血脈或在神志肺病者或在營衛或在聲音肝病者或在筋爪或在血脈此五臟之類風未有不由陰虛而然者惟東垣獨得其義曰有中風者卒然昏憒不省人事此非外來風邪乃本氣自病也人年四十而陰氣自半起居衰矣故多犯之豈非陰虛之病乎夫人生於陽而根於陰根本衰則人必病根本敗則人必危所謂根本者真陰也人知陰虛惟一而不知陰虛有二如陰中之水虛則病在精血陰中之火虛則病在神氣蓋陽衰則氣去故神志為之昏亂非火虛乎陰虧則形壞故肢體為之廢弛非水虛乎今以神離形壞之證乃不求水火之源而猶以風治鮮不危矣試以天道言之其象亦然凡旱則多燥燥則生風是風木之化從乎燥燥則陰虛之候也故凡治類風者專宜培補真陰以救根本則風燥自除矣然外感者非曰絶無虛證氣虛則虛也內傷者非曰必無實證有滯則實也治虛者當察其在陰在陽而直補之治實者但察其因痰因氣而暫開之此於內傷外感及虛實攻補之間是當審其有無微甚而酌其治也甚至有元氣素虧卒然仆倒上無痰下失禁瞑目昏沉此厥竭之證尤與風邪無涉設非大劑參附安望其復真氣於將絶之頃哉倘不能察其表裡又不能辨其虛實但以風之為名多用風藥不知風藥皆燥燥復傷陰風藥皆散散復招風以內傷作外感以不足為有餘是促人之死也景嶽全書曰凡類中風之多痰者悉由中虛而然夫痰即水也其本在腎其標在脾在腎者以水不歸源水泛為痰也在脾者以食飲不化土不制水也故治痰而不知實脾堤水非其治也余嘗聞之俗傳云痰在周身為病莫測凡癱瘓瘛瘲半身不遂等證皆伏痰留滯而然若此痰飲豈非邪類不去痰邪病何由愈余曰汝知痰之所自乎凡經絡之痰蓋即津血之所化也使果營衛和調則津自津血自血何痰之有唯是元陽虧損神機耗敗則水中無氣而津凝血敗皆化為痰耳此果痰也果津血也豈以津血之外而別有所謂痰者耶若謂痰在經絡非攻不去則必並津血而盡去之庶乎可也否則安有獨攻其痰而津血自可無動乎津血復傷元氣愈竭隨去隨化痰必愈甚此所以治痰者不能盡而所盡者惟元氣也矧復有本無痰氣而妄指為痰以誤攻之者又何其昧之甚也故凡治痰之藥在元氣無傷而有壅滯者乃可暫用分消豈云無效若病及元氣而但知治標則未有日用而不日敗者矣李士材曰凡中風須辨血脈腑臟中血脈則口眼喎斜中腑則肢節廢中臟則性命危三者之治各不同中血脈外有六經之形證則從小續命加減中腑內有便溺之阻隔宜三化湯通利之若表裡證俱見先與解表而後攻裡若外邪已解內邪已除而語言謇澀半身不遂未能即愈以六君子加黃耆桂心歸芍久久服之營衛自和即古所稱大藥也因脾胃虛而四肢不舉者慎不可雜以風藥風熱痰盛者但加薑汁竹瀝肥人多濕痰少加製附子行經病在半表半裡外無六經之形證內無便溺之阻隔知為血弱不能養筋故手足不能運動舌強不能語言古法用大秦艽湯然不若十全大補大建中人參養榮選用腎臟虛熱生風天麻丸大抵治風之法初得之便當順氣及其久也即當治血若先不順氣遽用烏附又不活血徒用羌防天麻輩吾未見其能治也然順氣之藥則可破氣降氣之藥則不可若老人虛人治須少汗亦宜少下多汗則虛其衛多下則損其營宜治在經當以大藥養之凡治風須分陰陽陰中者面色青或白或黑痰喘昏亂眩暈多汗甚者手足厥冷陽中者面色赤唇焦牙關緊急上視強直掉眩煩渴陰中危者多見脫證宜三生飲倍加人參及竹瀝薑汁灌之陽中劇者多見閉證若初中痰涎壅盛昏憒不省語言謇澀瘛瘲不遂一切痰氣閉塞牛黃清心丸若暴中神昏不語痰塞心包口角涎流煩熱氣急一切痰熱閉遏清心牛黃丸寒熱互結痰氣壅塞局方至寶丹然中氣之證亦多卒倒昏迷不省人事不可誤用牛黃丸宜蘇合香丸薑湯調化灌之抉口不開不可進藥以細辛牙皂為末吹鼻取嚏即蘇無嚏不治痰涎壅盛者宜吐之用稀涎散三四錢溫水調灌不大嘔吐但微微令涎自口角流出即蘇或橘紅一味大劑煎湯灌之即吐凡中風或未蘇或已蘇或初病或久病忽然吐紫紅色者死卒然中倒輕者即時蘇醒重者不省人事慎不可以滴水入喉入則其涎永繫於心絡不去即成廢人俟稍蘇醒察其有表證小續命湯加減痰涎壅盛而脈數有熱省風湯痰逆嘔泄而脈沉厥冷大省風湯不效頑痰愈盛或轉增困重三生飲肥人多有中病以其氣盛於外而歉於內也元氣素弱或遇勞役嗜欲而卒然厥僕狀類中風手必撒口必開非大劑參耆豈能回元氣於無何有之鄉哉亦有不僕而但舌強語澀痰壅口眼喎斜肢體不遂者作中風治必殆六君子湯加天麻薑汁竹瀝治之中後體虛有痰亦用上法中而口眼喎斜先燒牙皂煙燻之以逐外邪次燒乳香薰之以順血脈若前證多怒此風動肝氣宜小續命加羚羊角熱渴去附子加秦艽恍惚錯語加茯神遠志不得睡加熟棗仁不能言加竹瀝脈虛無力去麻黃加茯苓口眼喎斜耳鼻常靜故風息焉口目常動故風生焉風淫則血液衰耗無以榮筋故筋脈拘急口目為僻靈樞云足陽明之筋病頰筋有寒則急引頰移口有熱則筋弛縱緩不勝收故僻按左寒右熱則左急而右緩右寒左熱則右急而左緩蓋左中寒則逼熱於右右中寒則逼熱於左陽氣不得宣行故也又金匱云極寒傷經極熱傷絡則知經受寒而急則絡必熱而緩即素問大筋軟短小筋弛長之謂也凡口之喎灸地倉目之斜灸承泣苟不效當灸人中去氣虛風入則為偏上不得出下不得泄真氣為風邪所陷故宜灸經曰陷下者灸之至於用藥宜潤燥則風自息古法用大秦艽湯今改用十全大補尤妥又曰足之陽明手之太陽經急則口目為僻眥急不能卒視又口眼喎斜須分左右蓋邪盛則急正虛則緩左急者屬血中有邪舒筋三聖散加薑棗病久氣虛者去延胡索加人參名參歸三聖散易人參者以正虛不勝耗血之品故借陽生陰長之力流動經脈勿疑左半屬血不當用參以助其氣右急者屬氣分受邪八味順氣散去青皮加羌活又法桂枝三兩酒煎濃液以布漬之左喎搭右右喎搭左若口眼喎斜而一臂不仁者千金附子散口噤不開千金謂之風懿經云足陽明頷頰之脈急則口噤不能開肝風乘胃故也皂莢乳香黃耆防風煎湯熏之然須大作湯液如蒸如霧乃得力耳風邪乘虛入其筋則攣故令口眼喎斜牙關急而口噤也秦艽升麻湯風寒客於會厭卒然無音虛則地黃飲子痰則滌痰湯實則涼膈散加犀角黃連一法南星半夏為末擦其牙齦鬱金藜蘆搐鼻痰涎壅盛此證宜先吐之以稀涎散後用星香二陳導痰滌痰之類蓋治痰以順氣為先也挾虛者必用參耆竹瀝挾寒者加桂附薑汁上盛下虛痰涎壅盛者六君子加星香送黑錫丹語言謇澀經曰足太陰之脈連舌本散舌下是動則病舌本強又心之別脈系舌本又曰足少陰之脈其直者循喉嚨挾舌本又曰所謂入中為喑者陽盛已衰故為喑也內奪而厥則為喑痱此腎虛也少陰不至者厥也千金云心脾二臟受風邪舌強不得語者獨活湯專治風懿不能言四肢不收手足嚲曳腎虛而腎絡與胞絡內絶不通於上則喑腎脈不上循喉嚨挾舌本則不能言二絡不通於下則痱厥矣急宜地黃飲子庶可挽回一二如脾土不足痰涎壅盛而謇澀者是痰火壅塞上竅氣虛不能上營則舌機不轉宜六君子加星香菖遠枳實竹茹若口眼喎斜不能言遇風寒則四肢拘急脈浮而緊此手足陽明經虛風所乘秦艽升麻湯若口喑不能言足痿不能行屬腎氣虛弱名曰痱證也地黃飲子卒然暈倒口眼喎斜口角流涎者氣虛挾痰也六君子加秦艽天麻薑汁竹瀝血弱舌痿不能言手足不能舉十全大補湯風熱上壅痰盛不能言涼膈散加菖蒲遠志辰砂驚痰堵塞舌本強硬語言不正正舌散加薄荷舌麻語澀不能言省風湯加沉香脾緩舌強不能言半身不遂解語湯脈虛無力加參苓白朮心血衰少驚悸不能言得之於暴者祛風定志湯血衰心失滋養語言不出叩之不應十全大補加菖蒲遠志痰迷心竅昏憒口噤不能言滌痰渴有熱加芩連薑汁竹瀝舌喑脈洪口角流涎喜笑不休者導痰加白朮芩連竹瀝薑汁肥人舌根強硬作濕痰治瘦人舌根強硬作心火治雖病久正虛不可純用補藥壅滯經絡中之痰火若飲食如常但失音不語俗呼啞風小續命去桂附加菖蒲直中心經啞不能言口開面赤者必死勿治左癱右瘓左半身不遂或傷血致目昏耳聵頭眩乏力四物加羌防肉桂紅花桃仁生薑病久氣虛不應宜參歸三聖散右半身不遂四肢無力痰涎壅盛或一臂不遂時復轉移一臂千金附子散下半體疼重軟弱甄權防風湯並用針灸法偏風其脈沉細是風與痰飲在上焦並宜導痰湯加羌活白朮不應宜六君子湯加當歸寒加桂心熱加竹瀝半身不遂口眼喎斜手足戰掉語言謇澀明顯風從外入身熱無汗惡寒宜小續命加減自汗不宜服然又有病發左半口往右喎者蓋大筋短縮筋屬肝肝病故左半身不遂舌筋亦短而謇於言左畔之小筋弛長故口從左而喎於右治宜從右引左大理右半脾胃之氣以運出左半之熱痰虛風當以四君子加羚羊角柴胡薑汁竹瀝冬月稍加炮薑熟附以從治夏月須用知母石膏此正治也半身不遂而多汗神昏痰涎上湧者大劑參耆補中益氣十全大補人參養營大建中選用半身不遂骨節離解口面喎邪便利無度麻黃附子湯加桂心乾薑芎藭然又有身半以上俱無恙身半以下軟弱麻痹小便或澀或遺此足三陰虛證也當用地黃飲子補其下元慎不可用澡濕攻痰藥若果痰盛星香散二陳湯濕盛薏苡仁湯兼氣虛者六君子湯兼血虛者大秦艽湯皆為合劑又酒濕為病作痹證口眼喎斜半身不遂渾似中風舌強不正當瀉利濕熱不可作風治而汗之也角弓反張風氣乘虛入於諸陽之經則腰背反折攣急如角弓之狀宜小續命加減千金治賊風口噤角弓反張用倉公當歸湯更參痙證治之四肢不舉脈緩大有力而四肢不舉者土太過也當瀉其濕胃苓湯脈細小無力而四肢不用者土不及也當補其氣補中益氣湯隨證加減瘦人血枯筋急土旺風淫者四物湯加鉤藤秦艽防風肥盛色白痰多者六君子加秦艽天麻竹瀝薑汁麻瞀不仁虛風之證能食麻瞀牙關引搐目內蠕瞤升麻胃風湯麻痹不仁鼻額間痛唇口頰車髮際皆痛口不可開言語飲食妨礙左額頰上如糊急手觸之則痛此足陽明經受風氣血凝滯不行犀角升麻湯一切風氣攻注四肢骨節疼痛遍身頑麻手足癱瘓言語謇澀無汗氣實烏藥順氣散十指並面麻瞀乃氣虛風襲補中益氣去白朮當歸橘皮加白芍五味麻瞀體軟癢起白屑乃脾氣不榮補中益氣加地黃芍藥風濕相搏手足麻痹者千金排風湯手足麻瞀膈塞體痛寒熱眩暈風成為寒熱也千金解風散表虛自汗虛風傷衛而汗出者黃耆建中湯陽氣虛者加附子若兼寒熱者小柴胡渴氣虛補中益氣湯每夜發熱自汗為血虛當歸補血湯酒客輩多濕熱人兼房勞汗出中風下體多汗不能勞衣常濡口乾善渴十全大補加熟附防風黃柏澤瀉凡中風自汗而小便少者不可以藥利之既已自汗則津液外亡小便應少若利之使營衛枯竭無以制火煩熱愈甚當俟熱退汗止小便自行且此證屬陽明經大忌利小便神氣昏冒虛火妄動挾痰氣逆沖心主被障所以昏不知人須大劑人參芎歸兼柴胡山梔審系中在心包而非中腑閉證而非脫證牛黃丸虛人六君子加星香菖遠竹瀝薑汁若狂言語亂精神恍惚痰涎壅盛導痰湯加芩連竹瀝薑汁遺尿不禁脾虛下陷而膀胱不約者補中益氣湯加益智腎虛不能攝者地黃飲子若卒中有此兼諸惡證者為腎絶不治不治諸證髮直吐沫搖頭上攛魚口氣粗直視眼小目瞪喉聲如鋸面赤如妝汗出如珠循衣摸床神昏不語頭面手足爪甲青黑大吐大瀉吐血下血其脈堅急躁疾短澀者皆不治石頑曰中風一門為雜證開卷首義其分經絡定腑臟與傷寒無異非精達南陽至理難以語此如西北為真中風東南為類中風又為諸病開一辨別方宜大綱而傷寒主治雖無一不具未嘗昭揭其旨也夫水土之剛柔非特指中風而言當知西北為真中風一語原是因東南水土孱弱雖有卒倒昏迷皆是元氣疏豁為虛風所襲不可峻用祛風猛劑而設其西北為真中風一語原是對待東南類中而言以其風氣剛暴得以直犯無禁則有卒然倒僕之患未嘗言西北之人絶無真氣之虛而中之者內經明言陽之氣以天地之疾風名之即此一語可證風從內發但以西北資稟剛暴風火素盛加以外風猛厲易襲所以西北中風較之東南倍劇也余嘗究心斯道五十年來歷診西北之人中風不少驗其喑痱遺尿詎非下元之憊而從事地黃飲三生飲等治乎喎僻不遂詎非血脈之廢而從事建中十全等治乎東南類中豈無六經形證見於外便溺阻隔見於內即從事續命三化等治乎若通聖愈風即西北真中曾未一試也讀古人書須要究其綱旨以意逆之是謂得之若膠執其語反成窒礙豈先哲立言之過歟諸病各有經脈腑臟之分而卒然倒僕猶須審諦嘗考先哲論中風首雲中血脈則口眼喎斜中腑則肢節廢夫肢節廢與口眼喎斜皆屬六經形證若中腑則有便溺阻隔之患矣中臟則性命危此亦不過論其大綱中臟豈絶無可治而一概委之不救乎診石頑曰中風之脈皆真氣內虧風邪得以斬關直入即南方類中卒倒雖當分屬虛屬火屬痰總由腎氣衰微不能主持是以脈不能沉隨虛風鼓激而見浮緩之象昔人有云中風之脈每見沉伏亦有脈隨氣奔指下洪盛者當知中風之人皆體肥痰盛外似有餘中實不足加以房室內賊遂致卒倒昏迷其初中之時周身之氣閉滯不行故多沉伏少頃氣還微省則脈隨氣奔而見洪盛皆風火痰濕用事也大都中風之脈浮小緩弱者生堅大急疾者危蓋浮緩為中風之本脈兼緊則多表邪兼大則多氣虛兼遲則多虛寒兼數則多虛熱兼滑則多痰濕皆為可治之脈惟兼澀者為脈不應病多為危兆以痰證脈澀為正氣虛衰經絡閉滯難於搜滌也所以中風之脈最忌伏澀不調尤忌堅大急疾素問云胃脈沉鼓澀胃外鼓大心脈小堅急皆鬲偏枯男子發左女子發右不喑舌轉可治則知堅急澀伏皆難治之脈況見聲喑舌機不轉腎氣內衰之證乎羅謙甫治太尉忠武史公年近七旬十月初侍國師於聖安寺丈室中有煤炭水一罏在左側遂覺左頰微汗因左頰疏緩被風寒客之左頰急而口喎於右脈得浮緊按之洪緩先於左頰上灸地倉一七壯次灸頰車二七壯後於左頰上熱手尉之以秦艽升麻湯發散風寒數服而愈趙以德治陳學士敬初因醮事跪拜間就倒僕汗注如雨診之脈大而空虛年當五十新娶少婦今又從拜跪之勞役故陽氣暴散急煎獨參湯連飲半日而汗止神氣稍定手足俱瘲喑而無聲遂於獨參湯中加竹瀝開上湧之痰次早悲哭一日不已因以言慰之遂笑復笑五七日無已時此哭笑為陰火動其精神魂魄之藏相併故耳在內經所謂五精相併者心火併於肺則喜肺火併於肝則悲是也稍加連柏之屬瀉其火八日笑止手動一月能步矣李士材治徽商汪華泉忽然昏僕遺尿撒手汗出如珠口不能言法在不治然大進參附或救萬一用人參三兩熟附五錢濃煎灌之至晚而汗減再劑身體轉動更用參附白朮加薑汁竹瀝數日漸爽調補半年而康石頑治春榜趙明遠平時六脈微弱己酉九月患類中風經歲不痊邀石頑診之其左手三部弦大而堅知為腎臟陰傷壯火食氣之候且人迎斜內向寸又為三陽經滿溢入陽維之脈是不能無顛仆不仁之虞右手三部浮緩而氣口以上微滑乃頑痰湧塞於膈之象以清陽之位而為痰氣占據未免侵漬心主是以神識不清語言錯誤也或者以其神識不清語言錯誤口角常有微涎目睛恆不易轉以為邪滯經絡而用祛風導痰之藥殊不知此本腎氣不能上通於心心藏虛熱生風之證良非風燥藥所宜或者以其小便清利倍常以為腎虛而用八味壯火之劑殊不知此證雖虛而虛陽伏於肝臟所以陽事易舉飲食易飢又非益火消陰藥所宜或者以其向患休息久痢大便後常有淡紅漬沫而用補中益氣殊不知脾氣陷於下焦者可用升舉之法此陰虛久痢之餘疾有何清氣在下可升發乎若用升柴升動肝腎虛陽鼓激膈上痰飲能保其不為喘脹逆滿之患乎是升舉藥不宜輕服也今舉河間地黃飲子助其腎通其心一舉而兩得之但不能薄滋味遠房室則藥雖應病終無益於治療也惟智者善為調攝為第一義又治御前侍衛金漢光如夫人中風四肢不能舉動喘鳴肩息聲如拽鋸不能著枕寢食俱廢者半月餘方邀治於石頑診其脈右手寸關數大按久無力尺內愈虛左手關尺弦數按之漸小惟寸口數盛或時昏眩或時煩亂詢其先前所用諸藥皆二陳導痰雜以秦艽天麻之類不應又與牛黃丸痰涎愈逆危殆益甚因疏六君子或加膽星竹瀝或加黃連當歸甫四劑而喘息頓除再三劑而飲食漸進稍堪就枕再四劑而手足運動十餘劑後屏幃之內自可徐行矣因思從前所用之藥未常不合於治但以痰涎壅盛不能擔當峻用參術開提胃氣徒與豁痰中氣轉傷是以不能奏績耳又治漢川令顧莪在夫人高年氣虛痰盛邇因乃郎翰公遠任廣西府以道遠抑鬱仲春十四夜忽然下體墮床便舌強不語肢體不遂以是日曾食濕面諸醫群議消導消導不應轉增困憊人事不省頭項腫脹事在危急急邀石頑診之六脈皆虛濡無力諸醫尚謂大便六七日不通擬用攻下余謂之曰脈無實結何可妄攻莪在喬梓皆言素有脾約大便常五七日一行而艱苦異常乃令先小試糜飲以流動腸胃之樞機日進六君子湯每服用參二錢煎成燉熱分三次服四劑後自能轉側大便自通再四劑手足便利自能起坐數日之間倩人扶掖徐行因切囑其左右謹防毋使步履有失以其氣虛痰盛不得不防杜將來耳又治松陵沈雲步先生解組歸林以素稟多痰恆有麻木之患防微杜漸不無類中之虞乃謀治於石頑為疏六君子湯服之頗驗而性不喜藥入秋以來漸覺肢體不遂復邀診治脈軟滑中有微結之象仍以前方除去橘皮加歸耆巴戟平調半月而安然此證首在節慎起居方能永保貞固殊非藥力可圖萬全也
