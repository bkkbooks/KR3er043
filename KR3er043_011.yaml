body:
  text: 卷十一婦人門下産後諸禁血暈三沖三急三審嘔吐厄逆飽悶譫語如見鬼神不語發痙發熱寒熱中風咳嗽發喘瘛瘲顫振傷風傷寒瘧痢蓐勞虛煩驚悸多汗麻木大小便諸證諸痛泄瀉浮腫諸血月水不通諸淋乳汁經曰乳子而病熱脈懸小手足溫則生寒則死乳子中風熱喘鳴肩息者脈實大而緩則生急則死上條言産後以乳哺子之時而患熱病其脈只宜懸小不宜實大者以産後新虛故也設脈雖懸小而見手足逆冷又為脾氣衰絶陰氣暴逆之候亦主死也下條言産後中風熱而至喘鳴肩息以風熱逆於陽位其脈必不能懸小但須實大之中而往來和緩則脾胃之氣在其中矣設見急疾胃氣已絶安得不死後世以乳子二字誤認為小兒如張介賓之明亦不加察且因此而謂小兒不當視虎口三關即宜診兩手六部非智者之一失歟金匱云問曰新産婦人有三病一者病痙二者病鬱冒三者大便難何謂也師曰新産血虛多汗出善中風故令病痙亡血復汗寒多故令鬱冒亡津液胃燥故大便難産婦鬱冒其脈微弱嘔不能食大便反堅但頭汗出所以然者血虛而厥厥而必冒冒家欲解必大汗出以血虛下厥孤陽上出故頭汗出所以産婦善汗出者亡陰血虛陽氣獨盛故當汗出陰陽乃復大便堅嘔不能食小柴胡湯主之病解能食七八日更發熱者此為胃實大承氣湯主之産後氣血俱虛汗下皆禁獨此一證用大承氣者乃證治之變不當以尋常例測也以其病解之後尚有餘熱在胃所以能食食入既多至七八日更加發熱者此必復傷飲食之故故知胃有實結恐其煎迫津液故以急下救陰為務然必年體強旺脈證俱實且時日既久與新産大便難不同是可議下設遇胃虛之人雖能食而所食不多即有發熱便祕亦屬血虛急宜調養氣血斷非承氣所宜不可恣行攻擊也産後腹中㽱痛當歸生薑羊肉湯主之並治腹中寒疝虛勞不足若寒多者加生薑成一斤痛多而嘔者加橘皮一兩白朮一兩産後腹中㽱痛乃寒積厥陰衝脈故用辛溫以散血中之寒助以血肉之性大補精血較諸補劑功效懸殊若腹痛兼嘔而所嘔皆是稀痰是知脾虛濁氣上逆故加橘皮以宣散其氣白朮以固護其脾倘見血逆而嘔所嘔渾是清水腹脹滿急則加桃仁肉桂具見言外矣至於寒疝虛勞少腹結痛總是下焦寒結亦不越是方也産後腹痛煩滿不得臥枳實芍藥散主之並主癰膿以麥粥下之仲景凡治腹痛多用芍藥以其能收陰氣之散也以其能除血痹之痛也以其能緩中而止急痛也本草謂主邪氣腹痛故多用之蓋五氣之邪莫如厥陰肝木之性急暴一有不平則曲直作痛也此方治㽱痛用芍藥為主佐以枳實炒黑入血破積聚收陰緩中逐陳致新麥粥補血下氣而壯血脈也師曰産婦腹痛法當以枳實芍藥散假令不愈者此為腹中有乾血著臍下宜下瘀血湯主之亦主經水不利頓服之新血下如豚肝血之燥干凝著者非芍藥枳實可能治須用大黃桃仁蟅蟲下其血閉更加蜜以緩大黃之急也産後七八日無太陽證少腹堅痛此惡露未盡不大便煩躁發熱切脈微實再倍發熱日晡時煩躁者不食食則譫語至夜即愈宜大承氣湯主之熱在於里結在膀胱也太陽為表膀胱為里七八日表證入里故曰無太陽證惡露已為病氣所郁不能盡去熱因入里與惡露相搏結在膀胱而作少腹堅痛下焦熱證故不大便煩躁發熱更切其脈微實再倍其發熱在日晡時而煩躁不食熱邪又攻於胃胃熱則不食食入則穀氣之熱更助兩熱相併故譫語至夜即愈者産後血虛熱邪易入血室入血室則夜如見鬼狀言此以明其熱不在血室而在膀胱與胃故用大承氣湯也産後風續之數十日不解頭微痛惡寒時時有熱心下悶乾嘔汗出雖久陽旦證續在者可與陽旦湯舉此與上文承氣湯為表裡之例産後中風發熱面正赤喘而頭痛竹葉湯主之溫覆使汗出頸項強用大附子一枚破之如豆大入前藥揚去沫嘔者加半夏半升洗此證太陽上行至頭表陽明脈過膈上循於面二經合病多加葛根以葛根為陽明解肌藥也防風佐桂枝去二經之風竹葉桔梗主氣上喘參草和中氣薑棗行營衛穀氣行則上下交濟而汗出解矣附子恐是方後所加治頸項強者以邪在太陽禁固其筋脈不得屈伸故用附子溫經散寒揚去沫者不使辛熱上浮之氣助其虛陽上逆也若邪在胸而嘔加半夏治之上言破之如豆入前藥舊本作如豆大今如徐忠可駁正婦人乳中虛煩亂嘔逆安中益氣竹皮大丸主之有熱者倍白薇煩喘者加柏實一分乳中虛言乳哺而乳汁去多則陰血乏而胃中亦虛陰乏則火撓而神昏亂胃虛則嘔逆用甘草瀉心火石膏療煩亂竹皮主嘔逆桂枝和營氣又宣導諸藥使無扞格之逆煩喘者為心虛火動故加柏實以安之産後下利虛極白頭翁加甘草阿膠湯主之傷寒厥陰證熱利下重者用白頭翁湯苦寒治熱以堅腸胃此産後氣血兩虛故加阿膠甘草然下利血滯也古人云血行則利自止此方豈獨治産後哉婦人在草蓐自發露得風四肢苦煩熱頭痛者與小柴胡湯頭不痛但煩者千金三物黃芩湯自發露謂自發衣露體得風非邪外傷者故不為自汗風病蓋産時天機開發雖微風亦得入之外感之風內應之火合化淫於四末而作四肢苦煩熱上至於頭作頭痛病在表裡之間故用小柴胡湯主治少陽若頭不痛是無表也惟肝膽風熱內動上膈作煩故用黃芩退熱苦參養肝熟地補血而益腎水則肝膽之火寧矣婦人産後虛羸不足腹中刺痛不止吸吸少氣或苦少腹中急摩痛引腰背不能食飲千金內補當歸建中湯産後一月日得服四五劑為善令人強壯若大虛加飴糖六兩湯成納之於火上暖令飴消若去血過多崩傷內衄不止加地黃六兩阿膠二兩合八味湯成納阿膠産後血去營衛俱虛內不充於五臟肝木妄動作腹中刺痛上不充於膻中遂吸吸少氣下不濟於腎故少腹急引外連腰脊六腑不和則不能食用此以益營衛伐肝邪補中和內按此即黃耆建中之變法彼用黃耆以助外衛之陽此用當歸以調內營之血然助外則用桂枝調中則宜肉桂兩不移易之定法也千金二字義見中風門方千金三黃湯下諸禁一禁臥二禁酒三禁浴四禁寒五禁汗六禁下七禁利小便八禁寒涼藥九禁起動作勞蓋初産血氣未定遽臥則惡血上升故分娩之後須高臥仰倚切不可即臥三朝始可稍去其壂尚宜高枕七日後如無他病方可安枕多有半月後未能貼席者酒能助火亂經誤用不無動血之虞至如雞子豬腎一切滯氣堅紉難化物及生冷膩滑皆不可食即砂仁湯亦能動血咸在禁例浴能升動惡露雖當夏月亦須禁之曾有産數日後因浴瘀血上衝而斃者亦有因浴動血誤用寒涼瘀結不行血化為水喘滿腫脹而死者不可不慎也新産驟虛最忌著寒寒則血氣凝滯諸變冗生每至飲食不化腹痛作瀉禍患莫測欲去其瘀則正氣並脫欲止其瀉則瘀結不行惟薑桂參術辛溫峻補庶幾血行瀉止故冬月一産即宜重綿兜護其腹在夏月亦當復巾裹之機要云胎産之病從厥陰無犯胃氣及上中二焦為之三禁不可汗不可下不可利小便製劑之法能不犯三禁則營衛自和而寒熱止矣故産後雖有表證一切風藥皆不可用以其性升不特載血上行令人發暈抑且令人亡陽多致汗脫而死不特風藥當禁即佛手散中芎藭皆為散用恐湯能發汗也至於下藥尤為切禁非特硝黃難於輕試即溲便數難者只宜調養元氣若車前澤瀉之類咸非所宜以産後百脈空疏自里至表無一不虛虛則諸寒皆禁即芍藥亦難輕用以其酸寒伐生髮之氣也地黃皆當慎用以純陰之味能令作瀉也黃芩能凝滯瘀血令人惡露不行為害不淺然皆産後常禁設有表裡客邪又不當拘於上説也試觀金匱産後例中陽旦湯之用芩芍以其中有桂也薛按八珍十全之用熟地芍藥以其中有參術及桂也豈復拘於此例哉況乎大承氣小柴胡三物黃芩下瘀血等方皆産後治例此聖人臨證如日大轉回天之力非尋常下士可得而測識也逮夫早起作勞不避風寒不禁飲食往往致成大病者皆自作之孽耳凡産後之脈寸口洪疾不調者死沉微附骨不絶者生緩滑沉小者吉實大弦急者危牢革結代及澀滯不調者不治血暈産後元氣虧損惡露乘虛上攻眼花頭暈或心下滿悶神昏口噤或痰涎壅盛者急用熱童便主之若血下多而暈或神昏煩亂者芎歸湯加人參三五錢澤蘭葉一握童便半盞兼補而散之痰合二陳加烏梅薑汁並用鐵稱錘燒令赤以醋沃之或燒漆器並亂髮以煙燻之産後因虛火載血上行而暈用鹿茸灰為細末好酒童便灌下一呷即醒行血極快産後昏暈嘔逆不能飲食此胃虛挾痰所致以抵聖散去赤芍加炮薑茯苓慎不可用芎歸血藥膩膈其嘔逆愈不能止矣初産血暈速與扶起勿臥用韭葉一握切碎入有嘴瓷瓶中將醋煎滾澆入瓶內急蓋瓶口以嘴向婦鼻孔令氣透入鼻中即蘇若惡露未盡忽昏悶不省人事須問先因感氣而下胎者以二陳加芎歸香附桃仁山楂薑汁切不可作中風治産後口眼喎斜等證當大補氣血十全大補下黑龍丹肥人佐以痰藥如星半木香之類若作中風治而用小續命必殆若腹中刺痛者嚴氏清魂散血暈語言顛倒健忘失志此血入心包宜失笑散加鬱金或用血竭沒藥等分為末熱酒和童便調下二錢良久再服惡血自下三沖敗血上衝有三或歌舞談笑或怒罵坐臥甚者逾牆上屋口咬拳打山腔野調號佛名神此敗血衝心多死方書用龍齒清魂散然用之多不應不若花芯石散最捷琥珀黑龍丹亦效如雖悶亂不致顛狂者失失散加鬱金若飽悶嘔惡腹滿脹痛者曰沖胃古法用五積散余嘗用平胃加薑桂往往獲效不應送來復丹嘔逆腹脹血化為水者金匱下瘀血湯若面赤嘔逆欲死曰沖肺二味參蘇飲甚則加芒硝蕩滌之大抵衝心者十難救一沖胃者五死五生沖肺者十全一二産後口鼻起黑色而鼻衄者是胃氣虛敗而血滯也急用二味參蘇飲稍遲不救三急産後諸病惟嘔吐盜汗泄瀉為急三者並見必危痰閉心竅抵聖散去芍藥加炮薑茯苓多汗加烏梅慎不可用浮麥傷胃耗氣棗仁膩滑作瀉芍藥五味酸收皆能阻滯惡露也三審凡診新産婦先審少腹痛與不痛以徵惡露之有無次審大便通與不通以徵津液之盛衰再審乳汁行與不行及乎飲食多少以徵胃氣之充餒必先審此三者以脈參證以證合脈脈證相符雖異尋常治之必愈脈證相反縱無危候必多變端即如産後惡露常以彌月為期然間有六七朝即淨者又未可一概論也此雖産母稟質不同而胎之所稟亦異如胎息壯盛則氣血盡歸其子瘀血自少胎息孱弱則氣血涵養有餘瘀血必多亦有産時去多産後必少産時去少産後必多勢使然也曾見一婦艱産異常三朝下一血塊大小形色與茄無異此後絶無瘀血惟小便如皂莢汁其少腹略無痛楚良由艱産過傷子宮關閘廢弛不能收斂故其塊得下世俗名兒枕者是也大抵常産之婦開闔有權既産之後子宮即閉兒枕隨氣攻注碎作小塊續續而下所以綿延日期此則全塊頓出自無淋瀝之患即有餘血盡歸溲便矣此後屢見數婦證雖大異尋常以意逆之其理自若也産後血脫津傷大便自應艱澀每至五七日始通無足怪也其有發熱譫語脈滑實者又當急攻以救津液若兼少腹硬痛又當破瘀為先産後三朝每有寒熱蒸乳寒熱後乳汁大行此胃氣孚化雖有餘病必無他慮如無寒熱而乳汁充然者血氣本旺也若不寒熱無乳汁此營衛不調總無所苦急宜當歸內補建中湯頻與調之否則彌月後漸見寒熱骨蒸而為蓐勞之患矣嘔吐嘔吐惡露不行二陳加當歸蓬朮肉桂乾薑胸腹脹滿多是傷食二陳加丁香不應加人參炮薑澤蘭藿香或抵聖散亦佳如寒理中湯加藿香厄逆厄逆者胃寒所生産後氣血俱虛風冷搏氣而逆上乃胃氣虛寒之極最為惡候理中加丁香古方以丁香豆蔻伏龍肝為末用桃仁吳茱萸煎湯調下一錢匙如人行五里再服未應急投參附遲則不救飽悶産後飽悶惡露不行多因血逆宜行瘀血為主如有塊上升飽悶欲吐者二陳湯加薑桂香附炮楂蓬朮塊不散積久愈堅琥珀黑龍丹若惡露已淨而飽悶受氣也沉香降氣散若敗血傷於脾胃而腹脹嘔吐者抵聖散加鯪鯉甲肉桂孕婦服安胎藥過多或正産或半産後經一兩月惡露未淨此非敗血之比宜導氣行血若用止截誤矣飲食停滯六君子加木香厚朴大凡傷其脾胃者當節飲食為主譫語譫語多有血滯亦有血虛著風而痰鬱者不可專以痰斷亦不可認為血逆其發譫語必脈大有力始與證合然又與産後不宜故多難治去血少者血滯也實則桃仁承氣下瘀血湯虛則龍齒清魂散或四烏湯用赤芍歸尾加桃仁薑汁去血多者血虛也蓋血虛則心神失守故譫語必先養血不可用參術峻補當歸內補建中湯當歸芍藥散膠艾湯選用著風兼痰鬱者心經虛故風痰客之導痰湯加鉤藤鉤薄荷又方益母草為末薄荷湯為丸童便服之專治産後譫語如見鬼神産後傷耗血脈心氣虛則敗血停積上干於心遂至心中煩躁臥起不安如見鬼神言語顛錯誤作風治必殆虛則四物湯換生地加桂心炮薑生蒲黃石菖蒲實則四烏湯加川連煎成入龍腦一捻服後得睡即安心悸恍惚語言錯亂者千金遠志湯如內虛敗血攻心狂言亂語者龍齒清魂散瘀積不行腹脹喘急者急用下瘀血湯攻之庶或可救稍遲必難挽回此證多有心脾血少者宜八珍加炮薑則痰清神自安矣不語産後不語多因停積敗血閉於心竅神志不能明瞭嚴氏清魂加蘇木丹參若因心腎氣虛而不能通於舌則舌強不語辰砂七珍散或人參石菖蒲等分不時煎服腎虛風熱地黃飲子肝木太過柴胡清肝散或小柴胡加鉤藤脾受木侮六君子加升麻鉤藤氣血俱虛八珍湯加菖蒲遠志不應獨參湯加附子一片峻補其氣而血自生若竟用血藥則誤矣發痙産後發痙因去血過多元氣虧極或外邪相搏或陰火內動所致故傷寒汗下過多潰瘍膿血大泄多患此證須大補氣血或保無虞若攻風邪必死其證牙關緊急腰背反張四肢抽搐兩目連札十全大補有汗加炮薑多汗加附子不應並加薑附倍人參多服始應嘗治大虛之證服參耆數斤附子數枚方應若汗拭不及兩手摸空者不治發熱婦人産後血虛陽無所依而浮散於外故多發熱治宜四物補陰而以炮薑之苦溫從治收其浮散使歸於陰若氣血俱虛惡寒發熱煩躁作渴十全大補湯若熱愈甚急加桂附若血虛至夜發熱小腹腰脅作痛四物加黃耆五錢肉桂一錢若作渴面赤當歸補血湯若誤認為火證投以涼藥禍在反掌然産後脾胃多虛有過於飲食傷滯而發熱者慎勿誤作血虛治但遇産後發熱若胸膈飽悶噯氣惡食泄瀉等證只作傷食治之若發熱而飲食自調者方用補血正法産後大發熱必用炮薑同茯苓淡滲其熱一應苦寒並發表之藥皆不可用凡産後發熱惡寒皆屬血虛此熱非有餘之熱乃陰虛生內熱耳故以補陰藥加炮薑大劑服之且炮薑能入肺胃散虛熱入肝脾引血藥生血然不可多用獨用必與補陰藥同用此造化自然之妙也惡寒發熱腹痛者當去惡血産後脈洪數胎前脈澀弱多死懷孕者脈宜滑數已産而滑數不改者雖未必死多費調理寒熱産後因氣血虛弱脾胃虧損而發寒熱皆不足證經云陽虛則惡寒陰虛則寒熱若兼大便不通尤屬氣血枯稿切禁發表降火若寸口脈微為陽氣不足陰氣上入陽中而惡寒補中益氣湯加薑棗發越之尺部脈弦為陰氣不足陽氣下陷陰中而發熱六味丸加肉桂以收攝之若肌熱大渴引飲目赤面紅此血虛發熱當歸補血湯不可誤認客邪而用表散藥下血過多寒熱而小腹不痛者此營衛虧損陰陽不和屬虛增損四物湯若惡露未淨傷滯胞絡寒熱而小腹痛者屬實輕則四烏湯重則醋煎散産後臥不如法敗血流入經絡骨節間寒熱腰股腫熱痛不可拊局方調經散有食消食頭痛骨疼寒熱者外感風寒也參蘇飲增損柴胡湯柴胡四物湯選用或兼瀉及吐者五積散胸膈飽悶前後心痛寒熱者傷氣與食也指迷七氣湯虛人局方七氣合沉香降氣散如飽滿寒熱兼腹痛腰疼者四烏湯熱而不寒胸煩自汗與大病後虛煩相似此去血過多血虛生熱也逍遙散若臍下熱非熟地不能治如大熱必用炮薑日晡轉甚者非柴胡不能治不應必用肉桂新産蒸乳發熱不必服藥中風産後類中風證大多血虛非真中也或挾風或挾痰或挾氣證雖不一治法莫要於行血芎歸湯加荊芥穗淋黑豆酒煎服亦治角弓反張手足瘛瘲脈來虛浮者血暈四肢強直芎歸湯加童便或用荊芥穗微焙為末豆淋酒調下二錢或童便服之口噤則抉齒灌之齦噤則灌入鼻中即蘇手足癱瘓敗血入經絡也用五積散又有形盛氣虛産後痿廢不起者但當補氣藥中兼行氣為主朝用香砂六君子暮用越鞠丸久服自效咳嗽産後咳嗽多因腠理不密外邪所感而致若因風寒所感桔梗湯加蔥白香豉生薑或小建中湯虛用異功散去朮加山藥細辛桂枝陰虛兼感客邪者六味丸去萸加桂枝細辛陰虛水不制火而嗽六味丸加麥冬五味乾咳內熱不寒桔梗湯加葳蕤麥冬丹皮蜜煎薑橘之類蓋乾咳一證有小兒食乳易治無則成勞發喘喘而痰聲大作此痰犯肺金也豁其痰喘自定風則金匱旋覆花湯加甘草桔梗惡露未淨加炮薑丹參有食加厚朴陳皮不嗽而喘此肺為火迫乃真喘也難治若肺虛熱生脈散為主藥肺胃氣虛異功散加桔梗兼外邪加細辛中氣虛寒前方加炮薑肉桂陽氣虛脫更加附子腎虛不能納氣歸元都氣丸作湯送靈砂丹兼氣虛者與異功散兼進大抵産後發喘加以脈之虛大急疾皆不可治瘛瘲産後陰血去多陽火熾盛筋失營養虛極生風而成此證若見唇青肉冷汗出目眩神昏命在須臾四君子加芎歸丹皮鉤藤蓋血生於至陰至陰者脾土也若肝經血虛逍遙散加鉤藤陽氣虛敗十全大補加薑附鉤藤鉤經云脾之榮在唇心之液為汗若心脾二藏虛極而唇白多汗急用參附救之若無力抽搐戴眼反折汗出如珠不流者皆不可治顫振産後顫振乃氣血虧損虛火益盛而生風也切不可以風為治急用十全大補溫補氣血為主如小産後半身肉顫半身汗出亦宜上法若産後不省人事口吐涎沫而顫振或瘛瘲者當歸補血湯加荊芥穗豆淋酒煎服婦人胎前産後顫振瘛瘲逍遙歸脾小柴胡補中皆可選用傷風産後傷風須問惡露淨否而後用藥若未淨而小腹疼痛者以行血理氣為先金匱旋覆花湯四烏湯選用若惡露已淨小腹不疼但頭痛身熱足冷自汗咳嗽黃耆建中湯頭重香蘇散若風寒並傷營衛俱病遍體痛無汗敗毒散虛甚著風者不可發散逍遙去朮加桂枝得效雖遲無失傷寒産後傷寒不可遽用小柴胡蓋有黃芩在內停滯惡血也宜小建中湯增損柴胡湯時疫柴胡四物湯香蘇散伏氣發溫蔥白香豉湯感冒氣食香蘇散産後得熱病四肢暖而脈息和平者生四肢冷而脈沉澀煩熱甚而脈洪盛者皆死證也瘧産後痁瘧在初産時絶少即胎前久瘧淹纏産後裡氣通達無不霍然間有微寒發熱不止者此衛氣向虛營血驟傷之故但與內補當歸建中湯熱多倍芍藥寒多加黃耆夜發一倍當歸三倍黃耆不應加生何首烏虛熱不止大便不實加炮薑茯苓惡露不行小腹結痛另用炮黑山楂熬枯黑糖伏龍肝湯煎服或有産後一月半月感犯風暑而瘧小柴胡補中益氣選用風加羌活紫蘇暑加香薷厚朴隨證裁酌但黃芩苦寒無論惡露淨與未淨皆非所宜痢産後下痢有三一者因胎前患痢産後不止昔人以為七日必死之候若元氣未敗脈有胃氣可進粥食者伏龍肝湯丸隨證加減多有得生者一者因産後臍腹受冷飲食不化腹痛惡露不行理中湯為主白加吳萸木香赤加桂心茯苓一者因産後誤食生冷或臨産飲食過度産後泄瀉下痢亦宜理中湯白加枳實茯苓厚朴木香赤加香附炮楂熬糖虛加人參肉桂間有熱痢下重白頭翁加甘草阿膠湯清理之惡露已淨痢久不止腹痛後重補中益氣升舉之大抵産後下痢惟宜顧慮元神調和血氣則積滯自下惡露自行非若妊娠之有胎息難於照顧也蓐勞蓐勞者因産理不順疲極筋力憂勞心慮或將養失宜虛風客之致令虛羸喘乏寒熱如瘧百節煩疼頭痛自汗肢體倦怠咳嗽痰逆腹中絞刺當扶正氣為主六君子加當歸若脾肺氣虛咳嗽口乾異功散加麥冬五味氣虛頭暈補中益氣倍用歸耆肝經血虛肢體作痛四物加參苓朮桂肝腎虛弱自汗盜汗往來寒熱六味丸加五味子脾虛血弱腹痛月經不調歸脾湯倍木香血虛有熱增損柴胡湯骨蒸勞熱嗽痰有紅者異功散去朮加山藥丹皮五味阿膠童便熱而無痰乾咳逍遙散用蜜煎薑橘蜜蒸白朮産後虛損不時寒熱或經一二載元神不復月事不轉先與千金當歸芍藥湯後與烏骨雞丸調補大抵此證多因脾胃虛弱飲食減少以致疲憊而成當補脾胃進飲食則諸臟有所倚賴病自愈矣虛煩産後虛煩皆氣血虧損虛火上泛所致千金治産後內虛煩熱短氣用甘竹茹湯産後乍寒乍熱手足身溫心胸煩滿用知母湯産後虛煩頭痛短氣悶亂不解用淡竹茹湯産後煩滿不安用人參當歸湯俱孫真人法也驚悸産後心悸皆心虛所致千金治産後沖悸志意恍惚言語錯亂用茯神湯虛熱口燥加麥門冬虛加人參善忘加遠志麥門冬産後大虛心悸志意不安恍惚恐畏虛煩不眠少氣人參丸吸吸乏氣善忘本方去薯蕷加遠志亦孫真人法也多汗産後血虛身熱自汗逍遙散加熟棗仁烏梅不可用補氣藥古方用麥煎散治産後盜汗自汗為害不可勝數因外感而汗者黃耆建中湯氣血俱虛十全大補湯不應加附子若汗多不止必發柔痙尤當前藥若頭汗者或因濕熱或因瘀血當審虛實治之半身汗出昔人用二陳合四物治多不效以血藥助陰閉滯經絡也此屬氣血不充而有寒痰留滯非大補氣血兼行經豁痰不效宜十全大補人參養榮加星半川烏肥人多加豁痰行氣藥瘦人氣血本枯夭之徵也麻木産後麻瞀宜生血補氣十全大補湯去血過多手足發麻小腹大痛則遍體麻暈欲死此非惡露凝滯乃虛中挾痰六君子加炮薑香附當歸曾治一婦産後右半身麻瞀而昏暈不省人事發即胸膈痞悶下體重著或時心神蕩搖若無心肺之狀頃則周身冷汗如漉大吐痰涎而蘇此産後經脈空虛痰飲乘虛襲入之故因與六君子加歸耆肉桂隨手而效復有一婦産後左半身麻瞀昏暈不省人事發則周身大痛筋脈瘛瘲肌肉瞤動或時頭面赤熱或時腿上振振動搖頃則蒸蒸汗出而蘇此産後營血大虧虛風襲入之故用十全大補湯治之諸證悉平但麻瞀不止後與地黃飲子而安大小便諸證産後去血過多大腸乾涸每至三五日後甚至五七日而大便始通者皆其常也或血虛火燥不可計其日期必待腹滿覺脹欲自去而不能者乃結在直腸宜用導法蜜煎導或削醬薑醬瓜皆可為導惟豬膽汁導禁用以其苦寒誤用每致發厄也若用苦寒藥攻通反傷中焦元氣或愈結難通或通瀉不止必成敗證若屬血虛火燥四物加鮮何首烏潤下之氣血俱虛之人雖數日不通飲食如常腹中如故者八珍加桃仁蘇子熟蜜若多日不解躁悶異常不得已用人參當歸枳殼煎服亦權宜之術耳古人用玉燭散治之反致危殆者多矣至治産後日久病外感熱結有實邪燥屎者急用承氣大柴胡下之又不當拘於此例也小便不通腹脹如鼓用炒鹽加麝半字填臍中外用蔥白十餘莖作一束切如半指厚置鹽麝上將艾灸之覺熱氣入腹難忍方止小便即通此惟氣閉者宜之若氣虛源涸與夫熱結膀胱者皆不可用産母但覺小水少此即是病便宜調治如大小便俱祕惡露不行先通惡露四烏湯加蓬朮山楂如惡露不行大便泄小便難五苓散倍肉桂加桃仁不可服胃苓湯以蒼朮能止血也産後小便數乃氣虛不能制水補中益氣加車前茯苓若膀胱陰虛而小便淋瀝生料六味合生脈散滋其化源須大劑煎成隔湯燉熱續續進之産後遺尿不知乃氣虛不能統血也補中益氣湯若新産廷孔未斂溺出不知此恆有之至六七朝自止不必治也婦人産後水道中出肉線一條長三四尺動之則痛欲絶先服失笑散數服次用帶皮薑三斤研爛入清油二斤煎油干為度用絹兜起肉線屈曲於水道邊以前薑熏之冷則尉之一日夜即縮二日即盡再服芎歸湯調理如肉線斷則不可救矣産婦尿胞損破致病淋瀝者當與峻補丹溪云難産多是氣虛産後氣血尤虛當以參耆為君芎歸為臣桃仁陳皮為佐同豬羊脬煎湯時時飲之勿令間斷使氣血驟長匝月其脬自完若稍緩則難成功矣産間傷動脬破終日不小便但淋濕不幹用天然黃絲二兩不用染者牡丹皮白芨人參各一錢水煎至絲爛如餳服服勿作聲作聲則泄氣無效名補胞飲經月常服有效産後損尿胞而淋瀝參耆朮草熬膏豬羊胞煎湯飢時調服月餘胞長淋止産後陰尸著風痛四物湯加藁本防風不應有瘀傷也加血餘龜版灰肉桂陰頽脫下氣血俱虛不能收斂者八珍加升麻黃耆陰戶腫痛濕熱也用枯礬荊芥白芷當歸桃仁細辛川椒五倍子等分入蔥三莖煎湯熏洗即愈諸痛産後遍身疼痛氣虛百節開張惡露乘虛流入經絡骨節之間謂之敗血流經或流於腰胯或流入髀股痛不可拊痛處熱腫流注日深漸致身面浮腫局方調經散最當琥珀地黃丸亦宜若因虛風所侵以致肢體沉重不利筋脈引急發熱頭痛局方用五積散去蒼朮加鯪鯉甲用生漆塗煅尤良或四神散加桂枝薑棗和營止痛最捷若誤作傷寒發汗致經脈抽搐手足厥冷而變為痙又當十全大補為主若以手按而痛益甚者是瘀滯也四烏加鯪鯉甲桂枝薑棗以散之按而痛稍緩者此血虛也四物加香附炮薑人參白朮甘草以養之如皮肉痛者外感也如月內惡露未淨者香蘇散加肉桂鯪鯉甲産後五臟皆虛胃氣虧損飲食不充則令虛熱陽氣不守上湊於頭則令頭痛補中益氣加川芎香附子不應加附子一片若血虛四物加參術有産後敗血上衝頭痛非琥珀黑龍丹不效又方治産後敗血作梗頭痛諸藥不效用大附子一枚釅醋一碗用火四畔炙透蘸醋令盡去皮臍加川芎等分併為末每服錢半或二錢茶清調下偏正頭風作痛川芎茶調散去白芷加細辛黑豆淋酒煎乘熱熏患處候溫服之如左半邊惡寒腦後掣痛者本方去白芷加歸芍右半邊畏寒兩太陽引痛者本方去白芷加參耆千金治産後中風頭痛手臂逆冷白朮三兩附子一枚獨活一兩生薑三兩豆淋酒煎服婦人患頭風者常居其半每發必掉眩如在車船上皆因血虛風邪運動其痰二陳加當歸黃芩羌活防風不應加烏頭石膏挾氣虛者必加黃耆然崩傷産後吐血衄血並令人眩暈當隨所因而治感氣而胃口作痛養胃湯因氣而心腹痛降氣散感寒而痛甘草乾薑湯加焦白朮桂枝有食枳實理中加炮黑山楂産後惡血上攻心痛為陰血虧損隨火上衝心絡名心胞絡痛宜理中加當歸産後惡露未淨胸腹作痛或小便不利琥珀地黃丸溫散之産後心痛大寒嘔逆不食千金蜀椒湯産後心痛乾嘔吐涎沫大岩蜜湯若真心痛旦發夕死夕發旦死瘀血上衝用失笑散一錢童便調下即定血既散而仍痛增損四物湯調補之脅痛宜分左右蓋左屬血血藏於肝肝傷有死血故痛小柴胡去芩加丹皮香附薄桂當歸童便右屬脾脾有痰積於脅則痛補中益氣去升麻加葛根半夏茯苓枳殼生薑左右俱痛者屬虛補中益氣加桂下六味丸腹痛惡露已淨者下焦虛寒也六味丸加桂如痛定於一邊及小腹者此是側臥敗血留滯所致四烏湯加蓬朮有産後腹痛服上藥不應而喜溫喜按者屬虛屬寒寒則理中加肉桂當歸虛則金匱當歸生薑羊肉湯隨證加減神驗産後三日腹痛補中益臟強力消血羊肉生地黃湯若腹中㽱痛畏寒少食大劑人參阿膠生薑煎服效此即仲景當歸生薑羊肉湯之變法也若痛而噁心或欲作嘔六君子加炮薑有瘀加莪朮桃仁炮黑山楂若泄瀉腹痛後重補中益氣加木香炮薑若胸膈飽脹或惡食吞酸或停惡露至夜發熱譫語腹痛手不可按此是飲食所致當用二陳加枳朮楂肉虛人枳實理中加肉桂炮楂發熱腹痛按之痛甚不惡食不吞酸此是瘀血停滯四烏湯加蓬朮肉桂若止是發熱頭痛或兼腹痛按之卻不痛此是血虛四物加艾附耆桂若腹痛脅脹此氣寒不能溫養肝血當歸乾薑香附肉桂丹皮茯苓入鹽少許熱服産後下血不盡腹內堅痛不可忍者甘草乾薑當歸芍藥桂心桃仁山楂煎服産後少腹作痛俗名兒枕塊古法用失笑散及四物加莪朮山楂産後崩中去血赤白相兼或如豆汁千金伏龍肝湯能溫脾胃涼肝血其效如神若惡露既去而仍痛四神散調補之小腹痛當視去血多少如敗血凝滯有塊而痛者醋煎散無塊者四烏湯須看人虛實酌用産後臍腹作痛冷氣乘虛也內補當歸建中湯産後腰痛者因産勞傷腎所致十全大補湯加附子産後惡露漸少忽然不來腰中重痛下注兩股痛如錐刺入骨此由敗血流滯經絡不即通之必發癰疽局方調經散加鯪鯉甲水煎日三服以痛止為度琥珀地黃丸亦宜下瘀血湯代抵當丸皆可取用切勿誤用五積散等辛溫之藥丹溪云局方五積散治産後瘀血作痛以蒼朮為君麻黃為臣厚朴枳殼為使雖有歸芍之補血僅及蒼朮三分之一不思産後之婦有何寒邪血氣未充似難發汗不過借藥性溫和可以推陳致新豈可用麻黃之悍蒼朮厚朴之燥乎虛而又虛禍不旋踵矣泄瀉産後泄瀉其因有五一者因胎前泄利未止産後尤甚一者因臨産過傷飲食産後滑脫一者因新産驟食肥腥不能克運一者因新産煩渴恣飲水穀混亂一者因新産失護臍腹臟腑受冷其致瀉之由雖異一皆中氣虛寒傳化失職之患並宜理中湯為主食加枳實山楂水加桂心茯苓虛加桂附倍參寒加桂附倍薑久瀉腎虛加桂心熟附瘀結不行加炮楂歸身若見完穀不化色白如糜此脾胃大虛元氣虛脫之候十有九死惟猛進溫補之劑庶可挽回即有煩躁發熱面赤脈來數大皆虛火上炎之故當並進桂附人參甘薑苓術之類伏龍肝煮湯代水煎服仍得收功若小便混濁如泔或大便中有白沫如腸垢者乃元氣下陷之故並宜補中益氣加桂苓炮薑升舉之或臭水不止加蘄艾香附吳茱萸若兼瘀結不通腹脹喘急神丹不能復圖也浮腫腫脹腹大筋青小便不利必食生冷傷滯瘀血也若用利水藥病必轉劇理中湯加木香肉桂蓬朮身腫或腹大如鼓四七湯加木香嗽者忌木香用炮薑灰面腫下不腫屬風宜發散紫蘇飲加防風下腫上不腫屬濕宜利小便紫蘇飲加木通四肢與頭面腫甚氣食也紫蘇飲加消導藥有血兼破血藥停血不散腹腫喘滿夜甚於晝四烏湯加蓬朮若足忽腫者乃濕熱注病恐成腳氣當歸拈痛湯若紅腫而痛恐生腫毒則以膚熱與不熱為辨産後敗血乘虛停積循經流入腿脅留滯日深故令面目四肢浮腫宜調血為主醫者不識便作水氣治以道水之藥必危夫産後既虛又以藥虛之是謂重虛往往多致夭枉但多服局方調經散或四神散加蓬朮桃仁肉桂穿山甲血行腫消則愈陳無擇云若風邪乘於氣分皮膚腫而浮虛乃邪氣有餘也若皮膚腫其形色如熟李者乃水也水腫者宜利小便氣腫者宜發汗諸血産後鼻衄乃氣血逆行所致紫蘇飲入童便荊芥灰如口鼻黑氣起而衄者難治初産時口中血溢出暴或吐血嗽血名血氣衝心四物加延胡木香炮薑産久惡露已淨吐咯咳血者治與平人同産後血崩因經脈未復而勞碌惱怒或犯房事多成此候若小腹滿痛肝經已傷最為難治若血滯小腹脹滿四烏湯加蓬朮肉桂血少小腹空痛四物加丁香膠艾肝火迫血妄行加味逍遙散脾郁不能統血加味歸脾湯脾虛不能攝血補中益氣湯厚味積熱傷血清胃散加炮楂風熱相搏傷血四君子加防風枳殼惡寒嘔吐大便頻瀉六君子加炮薑下焦虛寒不能統血漏下色晦及瘀淡不止千金芎藭湯鹿茸散選用月水不通乳子周歲而乳母經行是其常也若兒半歲而母經行有血盛血熱之分血熱者宜涼血四物加續斷條芩不乳者不在此例若兒二三歲其母經不行而無疾不必服藥若肢體倦怠食少內熱是血少也宜逍遙散加參耆以健脾胃若以藥通之則誤矣若脾胃虛弱六君子湯加當歸若兼鬱火傷脾歸脾湯加丹皮山梔若怒火傷血柴胡四物湯氣血俱虛八珍湯加丹皮諸淋淋因熱客於脬虛則頻數熱則澀痛氣血兼熱血入胞中則血隨小便出而為血淋也若膀胱虛熱六味丸若陰虛而陽無以化腎氣丸蓋土生金金生水當滋化源若少壯元氣實強者用滑石通草車前葵子瞿麥蒲黃漿水煎服乳汁産後三朝五更發寒熱名曰蒸乳若産後乳雖腫而臖作者須服清利之藥則乳自行仍以美臛引之産後乳汁自出不止乃胃氣虛宜服五味異功散加黃耆五味以攝之若乳多滿急痛者用溫帛尉之新産兒未能吮乳乳汁蓄結與血氣相搏而壯熱大渴通乳脹硬掣痛名曰妒乳當以手撙去宿乳或吮去尤妙並以貝母栝蔞實甘草節木通煎服初産因子不育蒸乳而發寒熱作痛者俗名乳膨用斷乳法以四烏湯加炒麥芽一兩即止不然恐內結成癰多致潰膿亦有乳囊潰而成危候者不可不知若有子而乳不下者通草八錢煮豬蹄湯飲之白蝦汁亦妙乳母氣血虛而不能蒸乳八珍湯加黃耆麥冬肺胃虛寒而乳不通者千金鍾乳湯寒熱不均氣道阻逆而乳不通者麥門冬散有熱去鍾乳加漏蘆因怒火者逍遙散加參耆麥冬之類凡産不蒸乳者後必有變須預言之元氣壯實者不在此例吹乳腫痛速用栝蔞實一枚連穰搗爛甘草節一寸乳香一錢煎成加溫酒服服後側臥於床令藥氣行外以天南星生末醋調敷以手揉之自散瘡瘍瘰癧結核流注乳癰乳岩陰瘡金匱云少陰脈滑而數者陰中生瘡陰中蝕瘡爛者狼牙湯洗之少陰脈滑而數熱結下部也治用狼牙煮湯纏箸如繭浸湯瀝陰中日四遍以解毒殺蟲但用一味以取專功蓋此證多患於嫠寡證必咳逆經閉骨蒸寒熱凡見頰赤中有白斑下唇紅中白點皆陰蝕之候雖用上法及服降火滋陰藥終歸必亡此情志之病非藥可治故仲景但用外法絶不及於湯藥厥有旨哉胃氣下泄陰吹而正喧此穀氣之實也豬膏發煎導之導之者服之使病從小便而出非外用導引之謂詳陰吹正喧婦人恆有之疾然多隱忍不言以故方書不載醫不加察金匱明言胃氣不清穀氣之實所以腹中喧響則氣從前陰吹出如失氣之狀第用豬膏發煎之治難於推測余治一僕人之婦經閉三月少腹痛貫徹心而見前證不已與失笑散一服瘀血大下遂不復作又治一貴顯之媳小産後寒熱腹痛亦有前證與炮黑楂肉熬焦黑糖為丸用伏龍肝煮水澄清煎獨參湯送三錢一服結糞大下再進瘀血續行而前證頓止始悟豬膏發煎皆為逐瘀而設雖皆未用其方而實不離金匱之法也瘰癧婦人瘰癧多因憂思鬱怒傷損肝脾纍纍然如貫珠多生於耳之前後項側胸脅間若寒熱腫痛乃肝經氣鬱而為病不可峻用痰藥加味逍遙散若寒熱既止而核不消乃肝經之血亦病四物湯加白朮茯苓柴胡丹皮若飲食減少經事不調為脾胃虧損六君子加香附丹皮柴胡當歸若初生如豆粒附著於筋肉色不變而後漸大腫痛內熱口乾精神倦怠久不消潰乃肝脾虧損逍遙散歸脾湯健脾土培肝木切不可輕用散堅追毒之劑誤下之必犯病禁經禁若久潰脈浮大邪火盛也面色皎白金剋木也皆難治凡風木之病但壯脾土則木自不能克矣若行伐肝則脾胃先傷而木反來侮土矣結核婦人結核皆因鬱怒虧損肝脾觸動肝火所致非但婦人多郁患此則小兒胎中受母氣之郁生後至七八歲外往往有之多結於項側耳前後或發寒熱屬膽經風熱怒火柴胡清肝散加鉤藤山梔以清肝火若結於肉裡其色不變晡熱內熱屬肝火血虛加味逍遙散或結於肢節或纍纍如貫珠其色不變亦肝火血燥而筋攣急小柴胡加鉤藤佐以六味丸若時消時作此氣滯而痰結也用歸脾六君二湯以調和脾胃之氣外用一味香附末唾調作餅艾灸干即易之勿令傷肉常灸自消丹方治痰核用貝母全蠍連皮胡桃肉各百枚同搗蜜丸空心日服彈子大二三丸效又方用羯羊角瓷片刮下為末或舊明角琉璃刮下為末尤良每斤入貝母四兩全蠍二兩蜜丸空腹服三錢外用皂莢肉入鯽魚腹中煅灰存性蜜和醋調塗大效若潰而肉不腐或肉不生或膿水清稀肌寒肉冷自汗盜汗寒熱內熱面色痿黃食少體倦便利不調者五臟皆虛也但用補中六君益氣養營等湯調補脾胃則各證自退故經云氣傷痛形傷腫慎不可輕用行氣破血之劑流注婦人流注多因憂思鬱怒虧損肝脾以致營氣不從逆於肉裡或因腠理不密外邪客之或濕痰流注或跌撲血滯或産後惡露凝積蓋氣流而注血注而凝或生於四肢關節或留於胸腹腰臀或結塊或漫腫皆屬鬱火急用蔥尉法內服益氣養營湯未成自消已成自潰須久服無間自然收功若久而腫起作痛肢體倦怠病氣有餘形氣不足尚可調治若漫腫微痛屬形氣病氣俱不足最為難治或不作腫或膿成不潰氣血虛也人參養榮湯憎寒畏寒陽氣虛也十全大補湯晡熱內熱陰血虛也四物加參術作嘔欲嘔胃氣虛也六君子加炮薑食少體倦脾氣虛也補中益氣加茯苓半夏四肢逆冷小便頻數命門火衰也八味丸小便頻數痰盛作渴腎水虧損也六味丸加麥門冬月經過期多日不止肝脾虛也八珍加柴胡丹皮凡潰而氣血虛弱不斂者十全大補煎膏服之久潰而寒邪凝滯不斂者豆豉餅祛散之其潰而內有膿管不斂者用藥腐化之若不補氣血不節飲食不慎起居不戒七情或用寒涼克伐俱不治乳癰乳岩婦人乳癰有內吹外吹上逆下順之異總屬膽胃二經熱毒氣血凝滯故初起腫痛發於肌表肉色焮赤其人表熱發熱或發寒熱或憎寒頭痛煩渴引飲加味逍遙散加栝蔞霜若至數日之間膿成滿竅稠膿湧出膿儘自愈若氣血虛弱或誤用敗毒久不收斂膿清脈大非大劑開鬱理氣溫補氣血不能收功丹方治乳癰初起用蒲公英草搗汁和陳酒服以滓敷腫處即消然此施於藜藿之人輒效若膏粱七情內郁所致者良非所宜當用鹿角瓷鋒刮屑加麝香溫酒調服若肥盛多痰鬱滯者用橘皮摘碎如豆大湯泡淨以飛羅面拌炒去面為末黑糖調二錢醇酒服之又方用蟹殼煅存性醇酒服三錢又乳房焮腫用貝母栝蔞實甘草節各三錢煎服效已潰加忍冬一兩佳乳岩屬肝脾二臟久郁氣血虧損故初起小核結於乳內肉色如故其人內熱夜熱五心煩熱肢體倦瘦月經不調益氣養營湯加味逍遙散多服漸散氣虛必大劑人參專心久服其核漸消若服攻堅解毒傷其正氣必致潰敗多有數年不潰者最危潰則不治周季芝云乳癖乳岩結硬未潰以活鯽魚同生山藥搗爛入麝香少許塗塊上覺癢極勿搔動隔衣輕輕揉之七日一塗旋塗漸消若荏苒歲月以致潰腐漸大類巉巖色赤出水深洞臭穢用歸脾湯等藥可延歲月若誤用攻伐危殆迫矣曾見一婦乳房結核如杯數年諸治不效因血崩後日服人參兩許月餘參盡二斤乳核霍然陰瘡婦人陰瘡乃七情鬱火傷損肝脾濕熱下注其外證有陰中舒出如蛇俗呼陰挺有翻突如餅俗呼陰菌亦有如雞冠如鼠乳亦有生諸蟲腫病濕癢潰爛出水脹悶脫墜者其內證口乾內熱體倦經候不調飲食無味晡熱發熱胸膈不利脅腹不調小腹痞脹赤白帶下小水淋瀝其治法腫痛者四物加柴胡山梔丹皮膽草濕癢者歸脾湯加山梔柴胡丹皮淋瀝者龍膽瀉肝湯加白朮丹皮潰腐者加味逍遙散腫悶脫墜者補中益氣加山梔丹皮佐以外治之法可也若陰中有蟲癢痛乃肝經濕熱此惟獨陰無陽鬱火內蘊所致患此者必骨蒸潮熱經水不調乾咳吐紅面赤聲啞雖日用開鬱降火之藥多不能愈大抵五志之病非藥可醫而失合證治尤難外治之法以桃仁研膏和雄黃末輕粉塗豬肝納陰中並用肥湯煎苦參洗滌或以鯽魚膽塗之然旋治旋發如菌蒂生蟲不腐不止又有交接時輒出血作痛此肝傷而不能藏血脾傷而不能攝血也多用加味逍遙散加肉桂或歸脾湯下加減八味丸自愈嬰兒門上脈法小兒三歲以內看虎口食指寅卯辰三關以驗其病脈紋從寅關起不至卯關者易已若連卯關者難愈若寅侵卯卯侵過辰者最劇其脈紋見五色如因驚必青熱則赤風熱瀉利色紫當以類推之又紋色顯而有縈紆者為有胃氣易治紋色細淡而直如刀刃者乃正氣之虛難治紋上另有一點如流珠者為宿食紋傍另有一條如絲縷者為風痰紋斜向內者易已斜向指甲者難愈三歲後則以一指轉側辨其脈五六歲後脈六七至為平脈浮為風浮大而數為風熱沉細為寒沉澀為傷食伏結為物聚微細為疳積為腹痛浮而洪為有熱浮而遲為有寒弦急為氣不和促結為虛驚脈亂不治此論脈之大端也面目證左腮屬肝右腮屬肺額上屬心鼻屬脾頤屬腎青主驚積不散紅主痰積驚熱黃者食積癥癖白主泄瀉水穀黑主腎氣受傷目內赤者心實熱淡紅者心虛熱青者肝實熱淡青者肝虛熱黃者脾實熱白而混者肺實熱目無精光者腎虛也若目無大眥者五臟皆不滿兒多不育五臟虛實寒熱心主驚實則叫哭發熱飲水而搐虛則困臥而悸心熱則合面睡或上竄咬牙心氣實則喜仰臥肝主風實則面青目直叫哭壯熱項急頓悶虛則咬牙呵欠肝熱則手循衣領及亂捻物壯熱飲水喘悶肝有風則目連札得心熱則發搐或筋脈牽緊而直視肝熱則目赤兼青則發搐風甚則身反張強直脾主困實則身熱引飲虛則吐瀉生風若面白腹痛口中氣冷不思飲食或吐清水者脾胃虛寒也呵欠多睡者脾氣虛而欲發驚也肺主喘實則悶亂氣急喘促飲水虛則哽氣出息肺熱則手掐眉目鼻面肺盛復感風寒則胸滿氣急喘嗽上氣肺臟怯則唇白若悶亂氣粗喘促哽氣者肺虛而邪實也腎主噓皆胎稟虛怯神氣不足目無精光面白顱解此皆難育雖育不壽或目畏明下竄者蓋骨重則身縮也咬牙者腎水虛而不能制心火也惟痘瘡有實則黑陷證乃邪火亢盛非正氣之實也變蒸小兒變蒸變者變其情智蒸者蒸其血脈大抵三十二日為一變每經變畢則情智異常全嬰方論云變蒸者以長氣血也變者上氣蒸者發熱輕則體熱虛驚耳冷尻冷微汗唇生白泡三日可愈重者寒熱脈亂腹疼啼叫不能乳食食即吐五七日方愈變蒸之時不欲驚動當其時有熱微驚慎不可治及灸刺但熟視之若良久不已少與紫丸微下熱歇便止若於變蒸之中加以時行溫病或非變蒸而得時行病者其證皆相似惟耳及尻通熱口上無白泡當先服黑散以發其汗汗出溫粉粉之熱歇便瘥若猶不除乃與紫丸微下之小兒稟虛在所不免勿藥可也嘗見小兒變蒸發熱有痰投以抱龍丸卒至不救若不熱不蒸略無證候而暗變者稟氣壯實故也胎證小兒胎證謂胎熱胎寒胎黃胎肥胎弱是也胎熱者生下有血色旬日之間目閉面赤眼胞腫啼叫驚煩壯熱溺黃大便色黃急欲食乳此在胎中受熱及膏粱內蘊宜用清胃散之類胎寒者初生面色㿠白啼聲低小或手足攣屈或口噤不開此母氣虛寒或在胎時母過食生冷或感寒氣宜用五味異功散之類胎黃者體目俱黃小便祕澀不乳啼叫或腹膨泄瀉此在胎時母過食炙爆辛辣致生濕熱宜用瀉黃散之類胎肥者肌肉稟厚目睛粉紅彌月後漸瘦五心煩熱大便不利口吻流涎此受母之胃熱所致也乳母服大連翹湯兒亦飲少許以疏利之胎弱者面無精光肌體瘦薄身無血色大便白水時時哽氣及噦因父氣不足者六味地黃丸因母氣不足者八珍湯母子並服近世初生小兒概與化毒丹及黃連犀角貝母甘草硃砂之屬殊不知此惟身面皆赤胎稟多熱毒者為宜若身面皆白胎稟虛寒本來少毒者服之反伐其始生之氣多致夭枉當用連皮胡桃肉三枚研極爛橄欖核三枚燒存性明雄黃研細水飛淨三分甘草煎濃汁和生白蜜數匙研勻攪去滓時時溫服引出腎臟之毒嘗見服此者多不出痘即出亦稀而無苦寒傷胃之患可不辨虛實寒熱而漫投化毒之劑乎胎毒小兒初生其身如有湯潑火傷者皆母過食膏粱所致母服清胃散逍遙散清其氣血兒亦常飲數滴有身無皮膚而焮赤發熱者皆由産母胃中火盛也用熟石膏末加珍珠粉撲之亦有因父遺毒所致當從黴瘡毒治夏月以兒臥蕉葉上尤良有身無皮膚而不焮赤者皆由産母脾肺不足也以參耆末加珍珠粉撲之脾主肌肉肺主皮毛故知病脾肺也子母俱服保元湯如腦額生瘡者火土相合濕熱攻擊髓海也難治腳上有瘡者陰虛火盛也不滿五歲而死如未滿月而撮口握拳腰軟者此肝腎中邪勝正弱也三日內見者必不治如男指向里女指向外尚可治鉤藤散主之噤風撮口臍風小兒初生噤風者胎中受熱毒流心脾生下復為風邪所搏致眼閉口噤啼聲不出舌上如粟口吐白沫七日內見者百無一生撮口者因胎熱兼風自臍而入心脾致面目黃赤氣息喘急聲不出舌強唇青口撮腹脹急於囟門灸七壯灸之不哭吊腸吐沫者不救臍風者因斷臍之後為水濕風邪入於心脾致腹脹臍腫四肢厥直啼不吮乳甚則撮口發搐七日內患者最危宜用麝香蠍尾銅緑輕粉辰砂為散薑湯調服若臍邊青黑握拳口噤是為內搐不治若齒齦有泡如粟挑破即開不必用藥急欲乳急欲乳不能食者此風邪由臍而蘊心脾致舌乾唇燥不能吮乳也因外邪而唇口撮緊者名臍風多不可救若心脾有熱舌尖痛不能吮乳者以柳華散敷之目閉口噤啼聲不出吮乳不得而吐沫者辰砂膏塗乳令兒吮之若舌下腫如小舌者或舌絡牽痛或齒齦患白星俱用線針刺出毒血亦數柳華散凡針重舌以針向外橫挑底尖細脈不可傷其本絡輕則言語不清重則血出而死若暴病發熱作渴飲冷口舌生瘡大便祕結瀉黃散若病後發熱口渴飲湯大便不實異功散或口角流涎或痰氣壅盛脾不能攝也六君子湯若兒自食甘肥或母食酒面致兒口舌生瘡清胃散弄舌脾臟虛熱令舌絡牽緊時時微露而即收者名弄舌屬心脾虧損溫脾散有熱人參安胃散舌舒長而良久不收者名吐舌乃心脾積熱或兼口舌生瘡作渴飲冷屬胃經實熱並用瀉黃散若飲水者脾胃虛而津液少也兼面黃肌瘦五心煩熱者疳瘦也胡黃連丸大病未已而弄舌者凶遊風猴疳丹瘤之證俗名遊風因胎毒客於腠理搏於氣血發於皮膚其赤暈遊走者乃血隨風熱也若發於胸脅遊走四肢者輕發於頭面四肢延及胸背脅腹者重千金云赤遊風腫若遍身入心腹者即能殺人伏龍肝為細末雞子白和敷勿令乾或加發灰豬膏敷之古人云從四肢起入腹囊者皆不治當令人用力於各患處遍吮毒血各聚於一處急砭出之內服小劑活命飲惟百日內禁砭若肚腹膨脹二便不通毒入內也用大連翹湯亦有生者或用雄黃二分硃砂一分水飛生蜜水調勻隔湯溫熱常服數匙得瀉其毒便解在小腹脅上陰囊等處忽紅腫如霞流行不定不止一處者用白殼胡桃七個連殼捶碎大川連一錢五分生甘草節去皮二錢水煎燉熱陸續勤服鄉村不便醫藥者以生萊蔔搗汁塗之亦可灌服數匙更以萊蔔滓絹包烘暖裛紅腫處猴疳者狀如圓癬色紅從臀而起漸及遍身四圍皮脫中露赤肉臀疳若猴之狀乃胎中毒邪蓄於腎臟而發不急治必死用大川連生甘草各六分乳香沒藥並炙雄黃水飛各四分青黛研淨硃砂水飛各分半西牛黃一分各為細末和勻每服分半蜜調燈心湯下日三夜二服外用淨青黛二錢黃柏末微炒閉口連翹炒黑人中白火煅醋淬各一錢土貝母去心炒褐色五錢為末和勻臨用入西牛黃冰片各半錢麻油調敷神效胎驚小兒胎驚者因妊娠飲酒忿怒驚跌或外挾風邪內傷於胎兒生下即病也若月內壯熱翻眼握拳噤口出涎腰強搐掣驚怖啼叫腮縮囟開頰亦面青眼合者當疏風利驚化痰調氣及貼囟法若面青拳搐用鉤藤散切不可誤作脾風妄用溫藥若眉間色赤或虎口指紋曲里者可治鉤藤散加全蠍若眉間青黑者不治大抵小兒臟腑脆弱不可輒用銀粉鎮墜之劑反傷真氣多致不救也目睛瞤動目者肝之竅也肝膽屬風木二經兼為相火肝血不足則風火內生故目睛為之瞤動經曰曲直動搖風之象也宜四物湯滋其血柴胡山梔清其肝陰血內營則虛風自息兼用六味丸以滋其源若愈後驚悸不寐或寐中發搐咬牙目睛瞤動者血虛不能榮筋脈也補中益氣倍歸耆凡病氣有餘皆屬元氣不足況此證兼屬肝脾多為慢驚之漸尤當審之唇口蠕動唇為脾之華陽明之脈環唇而交人中是以脾胃虛者多有此證不獨病後而已夫脾主涎脾虛則不能收攝多兼流涎或誤認為痰而用祛逐之藥則津液益枯不能滋養筋脈遂致四肢抽搐病勢愈甚原其治法與慢脾風相同當大補脾胃六君子加升柴切禁青皮龍膽草伐肝之藥若兼四肢微搐或潮熱往來或泄瀉嘔吐面色痿黃皆脾胃有傷也加黃耆當歸白芍若脾氣下陷而肝木侮之者補中益氣以升其陽加苓半芍藥制肝補脾切不可用疏風治驚之藥發搐驚癇發搐多因乳母鬱怒傳兒胎中受患或生後乳傷驚恐致病證多吐乳面青若痰實壅積則壯熱面紅當兼調治其母切不可損其元氣驗其順逆男則握拳拇指叉入食指中為順於外為逆女則叉入食指為逆於外為順凡小兒忽然驚搐目直者皆肝經風熱若肝虛生風則目連札而不搐及多呵欠咬牙若肝經風實則目直大叫呵欠項急頓悶若肝經有熱則目直視不搐得心熱則搐其證手循衣領及亂捻物宜瀉肝熱為主凡病之新久皆能引動肝風風內動則上入於目故目為之連札若熱入於目牽其筋脈兩眥俱緊不能轉視故目直也亦有飲食停滯中焦致清陽不升濁陰不降肝木生髮之氣不得升致生虛風者若胸滿腹痛嘔吐惡食輕則消導化痰重則探吐攻積更須審其所傷寒物熱物亦有因感冒吐瀉致土敗水侮而生虛風者不可遽服驚藥若輒用之反成其風而益其病矣潔古云傷風發搐當辨有汗無汗用大青膏小續命分治薛按前證若口中氣熱搐而有力屬形病俱實宜大青膏以散風邪若口氣不熱搐而無力屬形病俱虛宜異功散以補脾土六味丸以滋肝木鉤藤飲以清肝火因風邪鬱熱而變諸證當理肺經清風邪若外邪既解而諸證不愈者當實脾土補肺金若竟治其風恐脾氣復傷諸證蜂起矣若傷食後發搐身溫多睡或吐不思食宜先定搐搐止白餅子下之後與祕旨安神丸若飲食停滯嘔吐不食腹脹便祕者屬實熱白餅子下之若下後搐熱益甚嘔吐不食者屬虛熱異功散補之若脾胃既傷肝火所勝六君子加鉤藤鉤以健脾氣平肝木大凡飲食既消而不愈者但調補脾胃則諸邪自退百日內發搐真者不過兩三次必死假者頻發不死真者內生驚癇假者外傷風冷血氣未實不能勝任故發搐也口中氣熱大青膏及塗囟法並用大青膏加白礬取三錢入桃枝一握煎水浴之勿浴兒背此即浴體法也前證多因胎中受患或乳母鬱怒傳兒或兒脾傷自病當固元氣為主凡搐頻者風在表易治宜發散搐稀者風在臟難治宜補脾癲癇錢仲陽云小兒發癇因氣血未充神氣未實或為風邪所傷或為驚怪所觸亦有因乳母七情驚怖所致若眼直目牽口噤流涎腹膨搐搦背項反張腰脊強徑形如死狀或一時二時醒若反折上竄其聲如雞屬肝抽搐有力為實邪柴胡清肝散大便不通者瀉青丸陰虛地黃丸若目瞪吐舌其聲如馬屬心發熱飲冷為實熱硃砂安神丸發熱飲湯為虛熱辰砂妙香散若目直腹痛其聲如牛屬脾若發熱抽掣仰臥面色光澤脈浮病在腑為陽易治加味導痰湯身冷不搐覆臥面色黯黑脈沉病在臟為陰難治六君子加木香柴胡若驚跳反折手縱其聲如羊屬肺面色痿黃者土不能生金也五味異功散面色赤者陰火上衝於肺也地黃丸若肢體如尸口吐涎沫其聲如豬屬腎地黃丸用紫河車膏代蜜丸服腎無瀉法故悉從虛治凡有此證先宜看耳後高骨間有青紫紋抓破出血可免其患此皆元氣不足之證須常用六味丸加鹿角膠或八味丸用鮮河車膏代蜜以助先天更以六君子補中益氣以助後天設若泛行克伐復傷元氣則必不時舉發久而危殆多致不救凡癲癇虎口脈亂乃氣不和也脈紋見有五色由其病甚色能加變至於純黑者不可治也睡中驚動小兒睡中驚動由心腎不足所致蓋臟腑脆弱易為驚恐夫人之神氣寤則行於目寐則棲於腎今心腎既虛則不能寧攝精神故睡中驚動也治宜清心安神亦有驚嚇而作者因擊動其肝故魂不安也宜抱龍丸以豁痰鎮驚若食鬱生痰驚動不安者用四君子以健脾加神麯半夏以化痰山梔柴胡以清熱目動咬牙小兒驚後目微動咬牙者皆病後亡津液不能榮其筋脈也亦有肝經虛熱生風者宜審其氣血有餘不足而治之其日中發熱飲冷而動者氣有餘也瀉青丸夜間盜汗及睡不寧而動者血不足而肝腎有熱也地黃丸或因肝經風邪傳於脾腎者亦令咬牙先用柴胡清肝散次用五味異功散六味地黃丸若因肝胃虛熱補中益氣加芍藥山梔實熱瀉黃散以牙齦屬手足陽明故也搖頭便血經曰諸風掉眩皆屬於肝肝屬木木得風則搖動乃肝經火盛而生虛風也便血者風木搖動則土受凌虐而不能統血也或因乳母恚怒風熱熾盛肝木傷脾使清陽不升亦有風邪侵入大腸者治法若因風熱柴胡清肝散若因怒火者小柴胡湯加白芍丹皮若清氣不升脾氣下陷者補中益氣湯肝經血熱妄行者六味地黃丸脾土不能培肝木者六君子加柴胡鉤藤鉤偏風口噤小兒偏風者少陽厥陰肝膽二經證也口噤者由風木太甚而乘於脾則筋燥而急然燥令主於收斂徑切或左或右其因一也若足陽明胃經氣虛風邪所乘其筋脈偏急者屬內因若脾肺虛弱腠理不密外邪所乘或吐瀉後內亡津液不能養肝致口眼喎斜皆屬肝血不足內火生風宜滋腎水養肝血壯脾土治法脾胃虛而動風者異功散加柴胡鉤藤鉤肝肺虛而外邪所乘者鉤藤飲若兼目緊上視寒熱往來小便淋瀝面青脅脹皆肝經本病也或唇口喎斜腹痛少食目胞浮腫面色青黃肢體倦怠皆肝木乘脾證也當審五臟相勝而主之設執其見證概投風藥反成壞證矣角弓反張角弓反張即是痙病經脈空疏虛風襲入而致筋脈拘急或因驚駭停食肝脾受困內動虛風皆能致此若身反張強直發熱不搐者風傷太陽也人參敗毒散小續命湯因驚駭目直呵欠項強頓悶者為木風內病鉤藤散因暴怒擊動肝火者瀉青丸若服前劑其證益甚者此邪氣已去而脾氣虧也異功散加芎歸補之若氣血素弱或服攻伐之劑而手循衣領咬牙呵欠者肺經虛甚也兼進六君子地黃丸補之急驚錢氏云小兒急驚因聞大聲或驚而發搐搐止如故此熱生於心身熱面赤引飲口中氣熱二便黃赤甚則發搐蓋熱盛生風陽盛而陰虛也經曰熱則生風風則痰動痰熱客於心膈間風火相搏故抽搐發動當用抱龍丸瀉青丸除其痰熱不可用巴豆之藥樓全善云急驚屬木火土實木實則搐有力及目上視火實則動札頻睫土實則身熱面赤而不吐瀉偃睡合睛治法宜涼宜瀉用利驚丸等亦有因驚而發者牙關緊急壯熱涎潮竄視反張搐搦顫動唇口眉毛眨引口中熱氣頰赤唇紅二便祕結脈浮洪數緊此內有實熱外挾風邪當截風定搐若痰熱尚作仍微下之痰熱既泄急宜調養脾氣此肝膽血虛火動生風蓋風生則陰血愈散陰火愈熾若屢服祛風化痰瀉火辛散之劑不愈便宜認作脾虛血損急以六君子湯補其脾胃否則必變慢驚也急驚而兒目睛翻轉足擺跳搐忽大叫吐逆藥不得入搐鼻無嚏者不治漫驚錢氏云小兒慢驚因病後或吐瀉或藥餌傷損脾胃肢體逆冷口鼻氣微手足瘛瘲昏睡露睛此脾虛生風無陽之證也因吐瀉脾肺俱虛肝木所乘或急驚屢用瀉熱則脾損陰消遂變慢驚而致瘛瘲微搐樓全善所謂木虛則搐而無力火虛則身寒口中氣冷土虛則吐瀉睡而露睛治宜溫補脾胃六君子薑桂蠍尾或兼夾熱夾食夾痰與外感證相似者當審其因而治之大率吐瀉痰鳴氣喘眼開神緩昏睡露睛驚跳搐搦乍發乍靜或身熱肢冷面淡唇青其脈沉遲微緩者是也當溫補脾氣為主佐以安心制肝藥若稟賦不足或久病脾虛及常服克伐之藥者多致此證若因土虛不能生金金不能平木木來侮土致成慢驚者五味異功散加當歸棗仁鉤藤以補土平木若脾土虛寒者六君子加烏頭蠍尾泄瀉加炮薑木香不應急加附子以回陽氣凡元氣虧損而致昏憒者急灸百會穴若待下痰不愈而後灸之則元氣脫散而不救矣此乃臟腑傳變已極總歸虛處惟脾受之無風可逐無驚可療因脾虛不能攝涎故津液妄泛而似痰者當依前法自效若不審其因泛用祛風化痰之劑反促其危也每見小兒脾胃弱者一病即成慢驚不可泥為久病誤藥而後始成也內經謂之慢脾風意可見矣慢驚而見目不轉睛痰鳴如拽鋸聲項軟身冷黏汗手足一邊牽引者不治喻嘉言曰小兒初生以及童幼肌肉筋骨臟腑血脈俱未充長陽則有餘陰則不足故易於生熱熱甚則生痰生風生驚亦所恆有設當日直以四字立名曰熱痰風驚則後人不眩因四字不便立名乃節去二字後人不解遂以為奇特之病且謂此病有八候以其頭搖手徑也而立抽掣之名以其卒口噤腳攣急也而立目邪心亂搐搦之名以其脊強背反也而立角弓反張之名相傳既久不知其妄造遇此等證無不以為奇特而不知小兒之腠理未密易於感冒風寒病則筋脈牽強因筋脈牽強生出抽掣搐搦角弓反張種種不通名目而用金石藥鎮墜外邪深入臟腑千中千死間有體堅證輕得愈者又詫為再造奇功遂至各守專門雖日殺數兒不自知其罪矣如方書中有云小兒八歲以前無傷寒此等胡言竟出自高明偏足為驚風之説樹幟曾不思小兒不耐傷寒初傳太陽一經早已身強多汗筋脈牽動人事昏沉勢已極於本經湯藥亂投死亡接踵何由見其傳經解散耶此所以誤言小兒無傷寒也不知小兒易於外感易於發熱傷寒為獨多世所妄稱為驚風者即此也小兒傷寒要在三日內即愈為貴若待經盡方解必不能耐矣又剛痙無汗柔痙有汗小兒肌腠不密故剛痙少柔痙多世醫見其汗出不止神昏不醒往往以慢驚風證為名而用參耆朮附等藥閉其腠理熱邪不得外越亦為大害但比金石藥為差減耳所以凡治小兒之熱但撤其出表不當固其入里也仲景原有桂枝湯法若舍而不用從事東垣內傷為治毫釐千里矣天釣內釣天釣者發時頭目仰視驚悸壯熱兩目反張淚出不流手足搐掣不時悲哭如鬼祟所附甚者爪甲皆青蓋由乳母厚味積毒在胃致兒心肺生熱熱痰鬱滯為患加以外挾風邪而發法當解利其邪鉤藤飲面色皎白氣虛喘促者四君子湯加蠍尾內釣者腹痛多喘唇黑囊腫傴僂反張眼尾赤色若內臟抽掣作痛狂叫或泄瀉縮腳內證一作則外證亦然極難調理內證烏蠍六君子丸外證鉤藤飲進乳食者可治若因乳母醇酒厚味積毒在胃加味清胃散若因乳母鬱怒積熱在肝加味逍遙散稍加漏蘆母子俱服盤腸氣痛小兒盤腸氣者痛則曲腰乾啼額上有汗皆由肝經風邪所搏也肝腎居下故痛則曲腰乾啼者風燥其液故無淚也額上有汗者風水助心火也口閉足冷者脾氣不榮也下利清糞者肝木乘脾也丁香楝實丸曲腰乾啼者鹽湯送下額上有汗者蔥豉湯下口閉足冷者人參湯下若面赤唇焦小便不通小腹脹痛者小腸熱也加味通心散若痛不止煎蔥湯淋揉其腹就以熱蔥尉臍腹間良久尿出痛止若因乳母飲食停滯者保和丸怒動肝火者加味逍遙散子母俱服傷風小兒傷風鼻塞發熱或痰壅發搐多因乳母鼻吹囟門但服惺惺散或用蔥頭七莖生薑一片細切擂爛攤紙上置掌中合待溫貼於囟門其邪即解乃去其蔥卻用絹緞寸余塗以麵糊仍貼囟門永無傷風之患其餘用藥發散與大人不異但脾胃怯弱所以多手足寒冷之證故治法以照顧脾胃為主諸經發熱潮熱小兒之熱有五臟之不同虛實之各異實則面赤氣粗口燥唇腫作渴飲冷大小便難或掀衣露體煩啼暴叫伸體而臥睡不露睛手足指熱宜用汗下虛則面色青白恍惚神緩口中虛冷噓氣軟弱喜熱惡寒泄瀉多尿或乍涼乍溫怫鬱驚惕上熱下泄夜則虛汗屈體而臥睡而露睛手足指冷宜用調補壯熱者肢體大熱熱不已則發驚癇若身熱而口中氣熱乃風寒外感也輕則惺惺散重則羌活之類發熱而搐搦上竄拗哭昏睡者驚熱也實則瀉青丸抱龍丸虛則鉤藤散肝火內熱者龍膽瀉肝湯陰盛格陽而熱者理中湯發熱而不欲飲水者胃氣虛熱也白朮散發熱而飲水作渴喜冷飲食者胃氣實熱也瀉黃散小兒諸熱其因外證而作者當從外證治之或乳母七情厚味飲食停積遺熱於兒或兒嗜食甘肥衣裳過暖或頻浴熱湯積熱於內為患者當詳其因而治之潮熱者時間發熱即退來日依時而至有風寒疳積食癖之分表裡陰陽虛實之異如汗出身熱呵欠面赤風熱也傷寒時疫陰陽相勝外感熱也肌瘦口乾骨蒸盜汗疳熱也大小便祕澀汗下不解積熱也腹背先熱夜發旦止食熱也涎嗽飲水乳食不消癖積也又有煩熱者氣粗喘促心煩不安頰赤口瘡兼發癇證瘡疹熱者耳鼻尖冷心熱者巳午間發至夜則涼虛熱者困倦少力大凡壯熱飲水大便祕結屬實熱瀉黃散加黃耆犀角熱渴飲湯大便如常屬陰虛六味丸若見驚搐等證肝經血虛生風也四物加天麻鉤藤鉤頰赤口乾小便赤色大便焦黃表裡俱實熱也清涼飲如大便已利或熱未止表邪未解也惺惺散微汗之陽氣下溜於陰中而發熱者補中益氣若食乳嬰兒當兼治其母小兒潮熱或壯熱不退多是變蒸及五臟相勝不必用藥又多食積鬱熱由中發外見於肌表只理其中清陽明之熱而表熱自除不可認作外感用解表攻裡等藥重傷其內又潮熱不退恐是出痘亦當審察勿便下藥大抵發熱飲水者熱在內不飲水者熱在外宜詳辨之傷寒夾驚夾食錢仲陽云小兒正傷寒者謂感冒寒邪壯熱頭痛鼻塞流涕畏寒拘急是也夾驚者因驚而又感寒邪或因傷寒熱極生風是熱乘於心心神易動故發搐也羌活散解之不可便用抱龍丸以有硃砂能鎮固其邪也夾食者或先傷風寒後復停滯飲食或先停滯飲食而後傷風寒以致發熱氣粗噯氣壯熱頭疼腹脹作痛大便酸臭先用解散次與消導不解者大柴胡湯周歲以前傷寒熱輕者惺惺散周歲以後須解表微汗若五六日不除邪入經絡傳變多端不可枚舉大略參以六經例治之咳嗽兒因腠理不密外邪內蘊或因乳母七情厚味鬱熱若風邪外傷鼻流清涕頭痛身重者參蘇飲小兒傷寒發熱咳嗽頭面熱千金用麻黃湯加石膏黃芩芍藥生薑小兒發熱喘咳喉中水雞聲千金射干湯若嗽而吐青緑水者六君子加柴胡桔梗若嗽而吐痰乳者但加桔梗勿用柴胡嗽而嘔苦水者膽汁溢上也二陳湯加黃芩嗽而喉中作梗心火刑金也桔梗湯加山梔有痰加半夏茯苓風熱加葳蕤薄荷小兒嗽久不止服發散之藥不應至夜微熱急當改用小劑六味地黃以濟其陰若面目浮腫者五味異功以益其氣其嗽立止切禁升發及助氣藥若痰中有血或嗽則鼻衄須加紫菀因風熱痰結屢嗽痰不得出者必用葳蕤白蜜以潤之百日內嗽者名乳嗽甚難調理桔梗湯隨證加薄荷紫蘇羌活前胡蔥白香豉之類更須禁其吮乳但與粥湯乃效風邪外感者惺惺散痰熱既去而氣粗痰盛或流涎者脾肺氣虛也異功散加桔梗口瘡眼熱五心煩熱腹滿氣粗大便堅實者涼膈散若因乳母食五辛厚味致兒為患者母服清胃散仍參所見諸證治之喘喘急之證有因暴驚觸心者有因風寒之邪壅盛者有因膏粱積熱熏蒸清道者有因過服消導脾胃氣虛者然喘與氣急有輕重之別喘則欲言不能隘於胸臆氣急則但息短心神迷悶耳治法因驚者抱龍丸風寒傷肺氣者小青龍湯或三拗湯加減熱傷肺氣者當涼肺定喘痰聲如鋸者小劑金匱麥門冬湯加牙硝脾肺氣虛者面色青白四肢不溫大便不實五味異功散薛云前證因脾肺氣虛腠理不密外邪所乘真氣虛而邪氣實者為多若已發之際散邪為主未發之先補脾為主設概攻其邪則損真氣徑補其肺則壅其邪惟在臨證之活法耳凡喘嗽小便不利則必生脹脹則必生喘當分先後標本治之土瀉小兒脾胃俱傷則嘔泄並作傷辛熱停滯則嘔吐出酸穢或黃色乳或腹痛下利者瀉黃散保和丸選用胃虛食不化而發熱者六君子加黃連吳茱萸木香若停滯已去泄瀉不已理中湯去參加茯苓木香胃氣不能化食益黃散若傷生冷腹痛瀉利青白六君子加砂仁木香炮薑若傷魚肉等物六君子加山楂砂仁若瀉紅黃赤黑腸胃俱熱也養胃湯加木香黃連若夏秋傷熱吐瀉色黃者玉露散若夏秋霍亂吐瀉手足心熱口乾唇燥喜飲冷水者五苓散凡霍亂吐瀉手足逆冷喜飲熱湯者理中湯若瀉利青白乳食不化額上微汗脈沉遲而或噦逆者由胃氣虛甚過服克伐使清氣不升濁氣不降以致氣不宣通而作也若瀉而噯臭吞酸胸腹滿痛按之益甚者雖作瀉而所傷之物未消也保和丸消導之腹痛按之不哭者乳食已消也異功散加木香驚瀉者肝主驚木盛必傳克於脾脾土既衰則乳食不化水道不調故泄瀉色青或兼發搐也亦有因乳母脾虛受驚及怒動肝火致兒吐瀉色青異功六君加柴胡鉤藤鉤蠍梢之屬實脾以寧肝膽之氣慎勿用峻攻之藥脾氣益虛肝邪彌甚甚至抽搐反張也若母食厚味而乳熱者清胃散若母飲燒酒而乳熱或子母身赤或昏憒吐瀉丹方用錫掇盛滾水蓋良久取蓋上蒸氣水服之即解同氣相求之義也吐痰涎及緑水者胃虛受冷也吳茱萸湯小兒衣甚薄則腹中乳食不消不消則大便酸臭此欲為癖之漸也便將紫丸微消之乳哺自當如常若兒不受食哺而但欲乳者此是有癖當下之不下必致寒熱吐利失下之故也凡小兒屎黃而臭甚此腹中有伏熱龍膽湯微下之若白而酸臭者此宿食不消也當與紫丸微者少與藥令內消甚者稍增藥令小下節乳哺數日令胃氣平和若不節乳哺則病易復復下之則令腹脹滿必發癇此為食癇輕則下之重則難療大凡吐乳瀉青色手足乍冷乍熱者屬驚法當平肝補脾若吐瀉青白色而不甚臭手足指冷或昏睡露睛者屬虛法當溫補脾土若吐瀉黃赤色而臭穢異常或喜冷飲而睡不露睛手足指熱者屬實法當消導清理脾胃此驗虛實補瀉法也鬾病海藏云鬾病者因母有妊兒飲其乳所致他孕相迫亦能致此其狀微利寒熱往來或發熱形瘦腹大毛髮鬇鬡情思不悅令兒斷乳先與龍膽瀉肝湯加萹蓄及白餅子下之後與異功散益黃散補之稟氣素虛不勝攻擊者理中加黃連茯苓萹蓄或一味萹蓄濃煎日服以其能利小便也瘧小兒瘧疾不越風食乳癖食積痰積挾驚挾暑與脾虛胃弱之不同蓋風則多寒食則多熱乳癖則泄瀉多哭痰積則嘔吐喘鳴食積則腹脹下血挾驚則發搐指冷挾暑則昏睡壯熱脾虛則倦怠肢冷胃虛則多渴少食治法不離疏風消導豁痰如小柴胡隨證加減多寒則加羌活桂枝多熱則加橘皮枳實泄瀉則加厚朴神麯嘔吐則加橘皮枳實下血則加枳實黃連發搐則加鉤藤羌活昏睡則加茯苓澤瀉脾虛則補中益氣加桂枝胃虛則六君子加草果夜發則加當歸日晏則加升麻若痢後瘧瘧後痢與夫三日瘧及久瘧不止俱補中益氣為主瘧母以小柴胡加鱉甲桃仁丸服大抵小兒肌腠疏薄無汗者絶少即使無汗稍加桂枝有汗並加芍藥不必用知母石膏紫蘇羌活輩也至於勞瘧瘴瘧之類小兒本無不復贅及其有因乳母七情六淫所致者又當以小柴胡逍遙散之類兼治乳母為當痢錢仲陽云瀉利黃赤黑皆熱也瀉利清白米穀不化皆冷也東垣云白者濕熱傷於氣分赤者濕熱傷於血分赤白相雜氣血相亂也羅謙甫云小兒下利色白大都受寒下利膿血大都受熱與食積薛云手足指熱飲冷者為實熱香連丸手足指冷飲熱者為虛寒理苓湯若兼體重肢痛濕熱傷脾也升陽益胃湯小便不利陰陽不分也五苓散若濕熱退而久痢不愈者脾氣下陷也補中益氣湯倍升柴瀉利兼嘔或腹中作痛者脾胃虛寒也異功散加炮薑木香或變而為瘧者六君子加升柴若積滯已去利仍不止者脾氣虛也四君子加肉果有寒加吳茱萸炮薑有熱加炒黑宣連丸服尤妙脫肛實熱則大便祕結虛寒則肛門脫出因吐瀉脾虛肺無所養故大腸氣虛下脫也補中益氣為主若脫出緋赤或作痛者血虛有熱也本方加丹皮芍藥甚則加川連外用槐角煎湯熏洗若色淡不腫不痛無血此屬氣虛只用補中益氣以升舉之或加烏梅以收斂之大凡手足指熱屬胃熱手足指寒屬胃寒若小兒肛癢或嗜甘肥大腸濕熱壅滯或濕毒生蟲而齧蝕肛門者內服肥兒丸外以雄黃銅緑為散納肛門若因病不食蟲無養而蝕肛者為狐惑黃連犀角散若蝕肛透內者不治便血熱入大腸則便血補中益氣加黃連柴胡熱入小腸則尿血六味丸小兒多因胎中受熱或乳母六淫七情厚味積熱或兒自食甘肥積熱或六淫外侵而成糞前見血者清胃散加槐米糞後見血者清胃散加犀角連翹若嬰兒則以治母為主余當臨證制宜大便不通小兒大便不通肺與大腸有熱也清涼飲若飲食夾驚及積滯不通者瀉青丸此皆治實熱例也若因乳母膏粱積熱及六淫七情鬱火傳兒為患者清胃散加蜂蜜清邪解鬱若兒稟賦怯弱五心煩熱作渴引飲而大便難者六味丸加二冬滋補肺腎若用大黃麻仁輩是速其咎也小便不利小便不利有在氣在血之分上焦氣分有火則必渴下焦血分有濕則不渴若津液偏滲於腸胃大便瀉利而小便澀少者五苓散加半夏人參若脾胃氣滯不能通調水道者補中益氣加木通澤瀉心神煩熱臍腹脹悶而小便不通者梔子仁散脾肺燥熱陰無以化而赤澀者黃芩清肺飲膀胱陰虛陽無以生而淋瀝者滋腎丸若膀胱陰虛陽無以化而淋瀝者六味丸若因乳母厚味酒面積熱者清胃散遺尿膀胱者州都之官津液藏焉臥則陽氣內收腎與膀胱之氣虛寒不能約制故睡中遺尿一味補骨脂酒炒為散醇酒或益智仁煎湯送下脾肺氣虛者補中益氣加補骨脂山茱萸疳楊氏云疳者腑藏蟲疳也其名甚多姑舉其要蟲疳者其蟲如絲出於頭項胸背之間黃白赤者可治青黑者難療蛔疳者皺眉多啼嘔吐清沫中脘作痛腹脹青筋唇口紫黑頭搖齒癢脊疳者身熱羸瘦煩渴下利拍背有聲脊骨如鋸齒十指皆瘡頻齧爪甲腦疳者頭皮光急滿頭俱瘡腦熱如火髮結如穗遍身多汗腮腫囟高疳渴者日則煩渴飲水不食夜則渴止疳瀉者毛焦唇白額上青紋肚脹腸鳴瀉下糟粕疳痢者停積宿滯水穀不聚瀉下惡物疳腫者胃中有積肚腹緊脹脾復受濕則頭面手足虛浮疳勞者潮熱往來五心煩熱盜汗骨蒸嗽喘枯悴渴瀉飲水肛硬如石面色如銀無辜疳者腦後項邊有核如彈丸按之轉動軟而不疼壯熱羸瘦頭露骨高乃乏乳所致丁奚疳者手足極細項小骨高尻削體痿腹大臍突號哭胸陷哺露疳者虛熱往來頭骨分開翻食吐蟲煩渴嘔噦走馬疳者疳熱上攻速如走馬或痘毒上攻則牙齒蝕爛蓋齒屬腎腎虛受熱疳火上炎致口臭齒黑輕則牙齦腐爛唇吻腫痛可治重則牙齦蝕落腮頰透爛不治其證雖多要不出於五臟治法肝疳則頰左生瘡眼目赤爛肢體似癬兩耳前後項側缺盆兩股結核或小腹內股莖囊睪丸腫潰便溺癃閉或出白津或咬指甲搖頭側目白膜遮睛羞明畏日肚大青筋口乾下血用蘆薈丸以殺蟲地黃丸以滋腎心疳則口舌蝕爛身體壯熱面黃頰赤或作腫痛腹滿膈悶或掌熱咽乾飲水便出盜汗齧齒虛驚用胡黃連丸以治心異功散以補脾脾疳則體黃而瘦皮膚乾澀頭不生髮或生瘡痂或人中口吻赤爛吐逆乳食嗜土腹大臍突瀉下酸臭小便濁白或合目昏睡惡聞水音用肥兒丸以治疳五味異功散或益黃散以生土肺疳則鼻外生瘡咽喉不利頸腫齒痛喘嗽氣促寒熱少氣皮膚皺揭鼻癢出涕衄血目黃小便混濁而頻數用加味陷胸丸以治肺補中益氣湯以生金腎疳則腦熱吐痰手足逆冷肢體瘦削夜則微寒發熱滑泄腹痛口臭作渴齒齦潰爛爪黑而黧尻耳生瘡或耳出水用蟾蜍丸以去疳地黃丸以補腎其無辜疳用保元湯蟾蜍丸丁奚哺露用六味丸蟾蜍丸走馬疳敷馬鳴散服蟾蜍丸若作渴瀉利腫脹勞瘵等類詳參方論而治之蓋疳者干也因脾胃津液乾涸而患在小兒為五疳在大人為五勞總以調補脾胃為主凡小兒疳在內目腫腹脹臍突溺稠瀉利青白體漸瘦弱疳在外鼻下赤爛頻揉鼻耳或肢體生瘡鼻瘡蘭香散諸瘡白粉散熱疳如聖丸冷疳木香丸冷熱交錯元氣久虧溫脾丸最宜疳病害眼者用蕪荑仁青葙子細末各一錢不經水騸雞肝一具研爛入白酒釀飯上蒸熟食之不過五七服必愈二便色白祕旨云小兒便如米泔或溺停少頃變作泔濁者此脾胃濕熱也若大便泔白色或如魚凍或帶紅黃黑者此濕熱積滯也宜理脾消滯去濕熱節飲食若忽然變青即變蒸也不必用藥若久不愈用補脾制肝藥若母因七情致兒小便如泔肥兒丸大便色青日久不復或兼泄瀉色白或腹痛者六君子加木香仍審乳母飲食七情主之食積小兒食積者因脾胃虛寒乳食不化久而成積其證至夜發熱天明後涼腹痛膨脹嘔吐吞酸足冷壯熱喜睡神昏大便酸臭甚則下血是也若兼寒熱者為食積發熱若食在胃者消之腹痛痞脹按之益痛者下之下後仍痛按之則止者補之夾食傷寒者先散之參蘇飲熱甚便祕者先利之大柴胡湯如無外感但只傷食不至於甚保和丸調之蓋脾為至陰之臟故凡脾病者至夜必熱熱而兼寒則又見所勝者侮所不勝矣食未消者消之則寒熱止食既消者補之則寒熱痊若手足並冷喜熱飲食此中州虛寒也宜溫之大便欲去不去脾氣下陷也宜升之若夜間或侵晨泄瀉者脾腎俱虛也四神丸手足並熱作渴飲水者脾胃實熱也瀉黃散大便祕結大柴胡湯手足雖熱口不作渴大便不實者白朮散大便下血者理中湯去參加枳實黃連紅曲腹痛腹脹小兒腹痛體瘦面色㿠白目無精光手足指寒口中氣冷不思飲食或嘔利撮口此脾土虛而寒水所侮也益黃散或理中丸去參加茯苓若口中氣溫手足心熱面色黃白目無精光或多睡惡食或大便酸臭此積痛也消積丸甚者白餅子下之後以白朮散調補脾胃若腹脹而悶亂喘滿者白餅子若不悶亂喘滿者脾虛也白朮散調補之誤下而致目胞腮面四肢浮腫肚腹愈脹脾虛欲發驚癇者塌氣丸溫理之若腹中有癖不食飲乳則吐按之則啼當暫用白餅子下之蓋小兒病此良由乳食不消伏於腹中乍冷乍熱飲水過多脾胃虛弱不能傳化水穀以致四肢羸瘦肚腹漸大而成疳矣六君子加乾蟾若痛連兩脅肝木乘脾也四君子加柴胡芍藥若腹痛重墜脾氣下陷也補中益氣湯加枳實若手足指冷或厄逆泄瀉寒水侮土也六君子加炮薑肉桂不應急加附子若服克削之藥致腹作痛按之痛止者脾氣復傷也五味異功散至於腹脹喘滿亦皆脾虛邪乘所致東垣所謂寒脹多而熱脹少熱者六君子加芩連枳朴寒者六君子加薑桂吳茱萸亦有寒熱錯雜者瀉心湯芩連炮薑並用若治實脹用二陳加枳朴木香有熱加芩連可也煩渴小兒唇紅如丹即發渴紅甚焦黑則危篤若三焦煩熱作渴導赤散風熱瀉青丸虛煩懊憹梔子豉湯虛煩不得眠酸棗湯夜甚者當歸補血湯傷寒後唇口焦者竹葉石膏湯瀉利作渴五苓散暑傷心脾煩渴引飲者人參白虎湯下利脾虛作渴七味白朮散熱結膀胱小便祕渴五苓散上焦虛熱四君子湯膏粱積熱清胃散脾虛積熱瀉黃散中氣虛熱異功散腎水虛熱六味丸慎勿誤用寒涼降火脾胃復傷則腹脹而為敗證矣汗小兒腠理疏薄常時微汗但不宜過多亦不可衣被過厚使汗大出若睡中出汗名盜汗止汗散遍身多汗煩熱為胃熱三補丸胃虛汗者上至項下至臍也益黃散六陽虛汗者上至頭下至項乃稟賦不足保元湯加防風白朮小兒元氣未充腠理不密或飲食停滯或厚衣溫暖熱鬱心包而津液妄泄也導赤散血虛用人參當歸等分煎服名團參湯其盜汗屬胃經虛熱者五味異功腎經虛熱者六味丸若寒水侮土益黃散設泛行施治誤損脾胃多成疳瘵大凡汗多亡陽必至角弓反張頸項痙強用十全大補多有生者黃疸夫人身之神貴於臟而默用見於外則內虛也其證皆由脾氣有虧運化失職濕熱留於肌膚發而為疸錢仲陽所謂身痛背強二便澀滯遍身面目爪甲皆黃小便褐色是也治法宜固脾為先如專用克伐寬中淡泄利水之藥則鮮有不致危者若初生及百日之中半旬之內不因病而身黃者胃熱胎黃也腹大食土為脾疳兼作渴冷飲瀉黃散小便不利五苓散加茵陳大便祕茵陳蒿湯病後發黃肢體浮腫白朮散清便自調肢冷嗜臥益黃散身淡黃白理中丸加茵陳身熱膈滿肌膚面目皆黃瀉黃散加枳殼生薑若閉目壯熱多哭不已大小便赤澀口中熱氣乃妊母厚味遺毒也母子並服清胃散生料地黃丸忌酒面五辛熱物倘誤傷脾土急則驚風吐瀉緩則肢體浮腫小便不利眼目障閉多成疳疾矣又有脾虛發黃者當於脾胃中求之蛔曹氏云蛔者九蟲之一因臟腑虛弱及傷甘肥生冷致蛔不安動則腹中攻痛或作或止口吐涎水貫心則死錢仲陽云吐水不心痛者胃冷也吐沫心痛者蟲痛也與癇相似但目不斜手不搐耳化蟲丸田氏云蟲痛啼哭俯仰坐臥不安自按心痛時時大叫面色青黃唇色兼白目無精光口吐涎沫也若因胃冷即吐理中湯加炒川椒烏梅或送烏梅丸尤妙若中氣虛而蟲不安者但補脾胃自安冬月吐蟲多是胃氣虛寒白朮散加丁香烏梅疝小兒陰腫疝氣多屬肝腎氣虛為風邪所傷血氣相搏而成六味丸加茴香川楝子若坐臥濕地所致者五苓散換蒼朮加蠍尾柴胡山梔車前不時寒熱者小柴胡去參加桂苓川楝蠍尾若因啼哭不止動於陰器結聚不散而睪丸腫大者桂枝湯加細辛當歸木香蠍尾啼叫氣逆水道不行而致者沉香降氣散加青皮蠍梢柴胡小腹作痛小便澀滯者龍膽瀉肝湯加延胡索肉桂目五臟六腑之精氣皆上注於目而黑睛為肝之竅瞳神又為腎之精華小兒目無精光及白睛多黑精少者肝腎俱不足也地黃丸加鹿茸晝視通明夜視罔見者所稟陽氣衰弱遇夜陰盛則陽愈衰故不能視也沖和養胃湯煮肝散疳眼者因肝火濕熱上衝脾氣有虧不能上升清氣故生白翳睫閉不開眵淚如糊久而膿流遂至損目益氣聰明湯決明雞肝散目閉不開者因乳食失節或過服寒涼之藥使陽氣下陷不能升舉補中益氣湯眼連札者肝經風熱也柴胡清肝散若目札面青食少體倦肝木克脾土也五味異功散加白芍柴胡生薑實者去參換赤芍加羌活蠍梢若生下目黃壯熱大小便祕結乳食不思面赤眼閉者皆由在胎時感母熱毒所致兒服瀉黃散母服地黃丸若乳母膏粱積熱致兒目黃者母服清胃散若肢體面目爪甲皆黃小便如屋塵色者難治余參眼目本門治之小兒誤跌或打著頭腦受驚肝系受風致瞳神不正名曰通睛宜石南散吹鼻內服牛黃平肝鎮驚藥耳耳者心腎之竅肝腎之經也心腎主內證精血不足肝膽主外證風熱有餘或聾聵或虛鳴者稟賦虛也或脹痛或膿癢者邪氣客也稟賦不足地黃丸肝經風熱柴胡清肝散若因血燥梔子清肝散不應佐以六味丸若因腎肝疳熱朝用六味丸夕用蘆薈丸若因乳母膏粱積熱而致者子母並服加味清胃散鼻塞鼻衄曹氏云鼻乃肺之竅皮毛腠理乃肺所主因風邪客於肺而鼻塞不利者內服消風散外用蔥白七莖入膩粉少許擂攤帛上掌中護溫貼囟門小兒鼻衄多因驚僕氣散血無所羈而隨氣上脫先用小烏沉湯次用止衄散或異功散加柴胡山梔久不愈用麥冬黃耆當歸生地人參五味煎服若衄久血脫但出淡紅水或帶黃黑色者難已解顱解顱者生下囟門不合也長必多愁少笑目白睛多面色㿠白肢體消瘦皆屬腎虛按腎主髓腦為髓海因父母精血不足不能斂固也地黃丸加五味鹿茸更用天南星微炮為末醋調攤緋帛烘熱貼囟門虛寒用細辛桂心乾薑為末乳汁和敷上干復敷之兒面赤即愈又方半夏生薑芎藭細辛桂心烏頭苦酒煮去滓以帛浸藥汁中適寒溫以尉囟上冷更溫之復尉如前朝暮各三四尉乃止二十日可愈有至七八歲或十四五歲氣血既盛而自合若縱恣色欲戕賊真陰終焉不壽此證若在乳下當兼補其母更以軟帛束緊兒首使其易合亦有囟陷囟填俱屬賦稟不足或五疳久病元氣虧損瀉利氣虛脾氣不能上充所致者補中益氣及十補丸若手足並冷前湯加薑桂不應虛寒之甚也急加附子緩則不救龜胸背龜背者由兒生下風客於脊入於骨髓小續命去附加防風龜胸者因肺受濕熱攻於胸膈龜胸丸並用龜尿點其骨節多有得愈者蓋小兒腠理不密風邪乘之或痰飲蘊熱於肺風熱交攻而致或坐早風入骨髓治用上法若稟受肝腎虛熱六味丸腎氣不足八味丸背加鹿茸胸加龜甲治之貴早遲則不驗虛羸小兒虛羸因脾胃不和不能乳食使肌膚瘦弱或大病後脾氣尚弱不能傳化穀氣所致若冷者時時下利唇口清白熱者身溫壯熱肌體微黃更當審形色察見證如面赤多啼心之虛羸也面青目札肝之虛羸也耳前後或耳下結核肝經虛火也頸間肉裡結核食積虛熱也面黃痞滿脾之虛羸也面白氣喘肺之虛羸也目睛多白腎之虛羸也仍參相勝治之五遲五硬五軟五遲者立遲行遲齒遲發遲語遲是也蓋腎主骨齒者骨之餘發者腎之榮若齒久不生生而不固發久不生生則不黑皆胎弱也良由父母精血不足腎氣虛弱不能榮養而然若長不可立立而骨軟大不能行行則筋軟皆肝腎氣血不充筋骨痿弱之故有肝血虛而筋不榮膝膝蓋不成手足拳攣者有胃氣虛而髓不溫骨骨不能用而足脛無力者並用地黃丸為主齒遲加骨碎補補骨脂發遲加龜版鹿茸何首烏立遲加鹿茸桂附行遲加牛膝鹿茸五加皮語遲之因不一有因妊母卒然驚動邪乘兒心不能言者有稟父腎氣不足而言遲者有乳母五火遺熱閉塞氣道者有病後津液內亡會厭乾涸者亦有脾胃虛弱清氣不升而言遲者邪乘兒心菖蒲丸腎氣不足地黃丸加遠志閉塞氣道加味逍遙散津液內亡七味白朮散脾胃虛弱補中益氣湯若病久或五疳所致者但調補脾胃為主五硬者仰頭哽氣手腳心堅口緊肉硬此陽氣不榮於四末獨陽無陰之候若腹筋青急者木乘土位也六味丸加麥冬五味若系風邪小續命去附子五軟者頭項手足口肉皆軟胎稟脾腎氣弱也若口軟不能齧物肉軟不能輔骨必先用補中益氣以補中州若項軟天柱不正手軟持物無力足軟不能立地皆當六味丸加鹿茸五味兼補中益氣二藥久服仍令壯年乳母乳哺為第一義失音舌者音聲之機也喉者音聲之關也小兒卒然無音者乃寒氣客於會厭則厭不能發發不能下開闔不致故無音也若咽喉聲音如故而舌不能轉運言語則為舌喑此乃風冷之邪客於脾絡或中舌下廉泉穴所致若舌本不能轉運言語而喉中聲嘶者則為喉喑此亦風痰阻塞使氣道不通故聲不得發而喉無音也大抵此證多有稟賦不足不能言者有乳母五志之火遺兒熏閉清道不能言者有驚風中風不能言者若遺熱與津液耗者七味白朮散清氣不升者補中益氣湯稟賦不足與虛火傷肺者地黃丸若仰首咳嗽肢體羸瘦目白睛多或兼解囟呵欠咬牙等證悉屬腎虛非地黃丸加鹿茸遠志不能治也若吐瀉後或大病後雖有聲而不能言又能咽物者非失音乃胃氣不能上升地黃丸與補中益氣湯兼服咬牙小兒寤寐不時咬牙及齧乳者雖多屬驚然所致各有不同惟齧乳驚搐者抱龍丸若發熱飲水叫哭而搐者心經實熱也瀉心湯睡困驚悸合目而臥者心經虛熱也導赤散面青目札呵欠項強煩悶者肝經實熱也柴胡清肝散手循衣領及亂捻物者肝經虛熱也發搐目青面赤肝經風熱也並宜六味丸夜啼驚啼夜啼有二曰脾寒曰心熱夜屬陰陰勝則脾臟之寒愈盛脾為至陰喜溫而惡寒寒則腹中作痛故曲腰而啼得燈火其啼便止其候面青白手腹俱冷不思乳食亦曰胎寒益黃散加鉤藤若見燈愈啼者心熱也心屬火見燈則煩熱內生兩陽相搏故仰身而啼其候面赤手腹俱暖口中氣熱導赤散加黃連麥冬若面色白而黑睛少屬腎氣不足至夜陰虛而啼也宜用六味丸因驚者參客忤驚啼治之驚啼者邪氣乘心也哭而多淚是驚也啼而無淚是痛也若因心火不足而驚啼者祕旨安神丸心火熾盛導赤散木火相搏加柴胡梔子肝血不足六味丸喜笑不休經曰神有餘則笑不休又曰在臟為心在聲為笑在志為喜又火太過為赫曦赫曦之紀其病笑謔狂妄又云少陰所主為喜笑又云精氣並於心則喜此數者皆言屬心火也先用瀉心湯治其心火次與六味丸滋其腎水太僕所謂壯水之主以制陽光也扁鵲云其人唇口赤色者可治青黑者死若腎水虧涸不勝心火而喜笑不休尋作不安之態者六味地黃丸肝木過盛上挾心火而喜笑不休者柴胡清肝散余兼別證各從其類而參治之循衣撮空循衣撮空皆由肝熱筋脈血枯而風引之故手指為之撮斂也宜確服六味丸間有回生之功亦有脾虛肝乘者六君子加鉤藤蠍梢若肝經實熱瀉青丸蓋循衣撮空皆病之敗證求其實熱十無一二許叔微云循衣撮空皆神虛無主非大劑獨參保元不能挽回虛寒則十全大補人參養榮大建中溫補之然亦有心包熱極所致者王海藏治血脫循衣撮空摸床揚手搖頭錯語失神脈弦浮而虛血脫內燥熱之極也氣粗鼻乾此為難治生地黃黃連湯壽夭孫真人曰兒初生叫聲連延相屬者壽聲絶而復揚急者不壽啼聲散不成人啼聲深不成人臍中無血者好臍小者不成人通身軟弱如無骨者不壽鮮白長大者壽生下目自開者不成人目視不正數動者大非佳汗血者多危不壽汗不流不成人小便凝如脂膏不成人頭四破不成人常搖手足者不成人額上有旋毛者早貴妨父母兒生枕骨不成者能言而死尻骨不成者能踞而死掌骨不成者能匐匍而死踵骨不成者能行而死臏骨不成者能立而死身不收者死魚目者死股間無生肉者死頤下破者死陰不起者死陰囊下白者死赤者死卵縫通達黑者壽兒小時識悟通敏過人者多夭大則項橐顏回之流也小兒骨法成就威儀回轉遲舒稍費人精神雕琢者壽其預知人意回旋敏速者夭大則楊修孔融之徒也張介賓曰小兒之壽夭其因有二一則由於稟賦一則由於撫養夫稟賦為胎元之本精氣之受於父母者也撫養為居處寒溫飲食飢飽之得失者也凡少年之子多有羸弱欲勤精薄也老年之子多強壯者欲少精全也多飲者子多不育蓋以酒濕亂精則精半非真而濕熱勝也多欲者子多不育以孕後不節則泄母陰奪養胎之氣也此外如飢飽勞逸五情六氣無不各有所關是皆所謂稟賦也至於撫養之法則俗傳有云若要兒安須帶飢寒此言殊為未審夫欲其帶飢者恐飲食之過耳過則傷脾而病生寧使略飢其猶庶幾至若寒之一字則大有關係小兒以未成之血氣嫩薄之肌膚較之大人相去百倍顧可令其帶寒耶嘗見新産之兒多生驚搐此為穩婆不慎則風寒襲之多致不救者此也及其稍長每多發熱輕則為鼻塞咳嗽重則為小兒傷寒幼科不識一概呼為變蒸投藥致斃者此也或寒氣傷臟則為吐瀉或因寒生熱則為驚為疳種種變生多由外感雖稟體強盛不畏風寒者亦所常有但強者三之一弱者三之二傷熱者十之三傷寒者十之七況膏粱貧賤氣質本是不同醫家不能察但知見熱攻熱嬰兒不能言病家不能辨徒付之命誠可嘆也又有謂小兒純陽之體故多宜清涼治之此説尤為誤人而王節齋又曰小兒無補腎謂男至十六而腎始充滿既滿之後妄用虧損則可用藥補之若受胎之時稟之不足則無可補稟之原足又何待補嗚呼此何説耶夫小兒謂純陽者以其陰氣未成即腎虛也或父母多欲而所稟水虧亦腎虛也陰既不足而不知補之陰絶則孤陽亦絶矣何謂無可補耶殊不知錢氏六味地黃丸專治小兒腎虛解顱以其純陽無陰故取崔氏八味丸裁去桂附以獨補腎水也此義惟薛立齋得之惜乎世醫多所未悟也
