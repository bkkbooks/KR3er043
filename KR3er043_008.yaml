body:
  text: 卷八七竅門上目疾統論內經曰五臟六腑之精氣皆上注於目而為之睛睛之窠為眼骨之精為瞳子筋之精為黑眼血之精為絡其窠氣之精為白眼肌肉之精為約束裹擷筋骨血氣之精而與脈併為系上屬於腦後出於項中後世五輪八廓蓋本諸此是故瞳子黑眼法於陰白眼赤脈法於陽陰陽合傳而精明也東方青色入通於肝開竅於目藏精於肝人臥則血歸於肝肝受血而能視心合脈諸脈皆屬於目目者宗筋之所聚上液之道也泣不止則液竭液竭則精不灌精不灌則目無所見矣氣脫者目不明目眥外決於面者為鋭眥屬少陽近鼻上為內眥上為外眥屬太陽下為內眥屬陽明赤脈從上下者太陽病從下上者陽明病從外走內者少陽病邪客陽蹺之脈令人目痛從內眥始東垣曰經云諸脈皆屬於目目得血而能視又云心事煩冗飲食失節勞役過度故脾胃虛弱心火大盛則百脈沸勝血脈逆行邪害空竅夫五臟六腑之精氣皆稟受於脾土而上貫於目目者血之宗也故脾虛則五臟之精氣皆失所司不能歸明於目心者君火也主人之神宜靜而安相火代行其令相火者胞絡也主百脈皆榮於目既勞役運動勢乃妄行及因邪氣所並而損其血脈故諸病生焉凡醫者不理脾胃及養血安神治標不治本不明正理也子和云目不因火則不病如氣輪變赤火乘肺也肉輪赤腫火乘脾也黑水神光被醫火乘肝與腎也赤脈貫目火自甚也能治火者一句可了故內經云熱勝則腫治火之法在藥則鹹寒吐之下之在針則神庭上星囟會前頂百會血之翳者可使立退痛者可使立已昧者可使立明腫者可使立消惟小兒不可刺囟會為肉分淺薄恐傷其骨然小兒水在上火在下故目明老人火在上水不足故目昏內經云血實者宜決之又云虛者補之實者瀉之如雀目不能夜視及內障暴怒大憂之所致也皆禁出血止宜補肝養腎目暴腫隱澀難開者以三稜針刺前頂百會穴出血大妙宜淺勿深深則傷骨惟後頂強間腦戶風府四穴不可輕用針灸以多忌犯故也目忽盲不見物此相火也太陽陽明氣血俱盛乃刺其鼻中攢竹穴與頂前五穴大出血立明他經出血其病轉劇故曰刺太陽陽明則目愈明刺少陽陽明則目愈昏近世有以光明草於上下胞打出血絲往往獲效即三稜針刺血之法惟可施之於有餘暴發耳外障屬風熱上壅上下胞胬肉蓓蕾磨蕩其睛久之生翳蔽其睛明當消風散熱外用點藥退之內障屬虛挾氣鬱黑水神光昏翳外似好眼而不能照物不痛不癢惟不能睹須分氣血脾胃治銀海精微曰夫眼者乃五臟之精華如日月麗天昭明而不可掩者也其首尾赤眥屬心其滿眼白睛屬肺其烏睛裹擷屬肝其上下肉胞屬脾而中間一點黑瞳如漆者腎實主之是隨五臟各有證應然論所主則瞳子之關係重焉何以言之目者肝之外候也肝取木腎取水水能生木子肝母腎焉有子母而能相離者哉故肝腎之氣充則精彩光明肝腎之氣乏則昏蒙眩暈烏輪赤暈刺痛浮漿此肝熱也眼生新淚枯黃繞睛此肝虛也瞳神開大淡白偏斜此腎虛也瞳神緊小或帶微黃此腎熱也一虛一實以此驗之凡熱沖發於眼皆當清心補肝又不可拘執其水生木之說析而論之則拘急牽颼瞳胞白癢而清淚不赤不痛是謂風眼烏輪突起胞硬紅腫眵淚濕漿裡熱刺痛是謂熱眼眼昏而淚胞腫而軟上壅朦朧酸澀微赤是謂氣眼其或風與熱並則癢而浮赤風與氣薄則癢而昏沉血熱交聚故生淫膚粟肉紅縷偷針之類氣血不至故有眇視胞垂雀目盲障之形淡紫而隱紅者為虛火鮮紅而焮赤者為實熱兩眥逞露生胬肉者此心熱血旺白膜紅膜如拘輪者此氣滯血凝熱證瞳神肉壅白睛帶濕色浮而赤者也冷證瞳神青緑白睛枯槁氣沉而濁也眼熱經久復有風冷所乘則赤爛眼中不赤但為痰飲所注則作痛肝氣不順而挾熱所以羞明肝熱蓄聚而傷胞所以胞合此外證之大概然而五臟不可缺一脾與肺獨無預何也曰白睛帶赤或紅筋者其熱在肺上胞下瞼或目胞間如疥點者其熱在脾脾主味也五味榮養諸中則精神發於外肺主氣也水火升降榮衛流轉非氣孰能使之前所云五臟各有證應於此又可推矣雖然眼之為患多生於熱其間用藥大抵以清心涼肝調血順氣為先有如腎家惡燥設遇虛證亦不過以當歸地黃輩潤養之輕用溫藥不可也至於退翳一節尤關利害凡翳起肺肺家受熱輕則朦朧重則生翳如珍珠如碎米者易散翳狀如梅花者難消雖翳自熱生然治法先退翳而退熱若謂熱極生翳先去赤熱則血為之冰而翳不能去矣其有赤眼涼藥與之過多又且滌之以水不反掌而水凝矣眼特一團水且水性澄清尤不可拘拘於點洗喜怒失節嗜欲過度窮役眼力泣涕過多凌寒衝風當暑觸熱不避煙火飲啖熱多此皆患生於臟腑者也專事點洗可乎有能靜坐澄神愛護目力放懷息慮心逸目休調和飲食以養之斟酌藥餌以平之明察秋亳斷可必矣五輪八廓所屬五輪者肝屬木曰風輪在眼為黑睛心屬火曰血輪在目為二眥脾屬土曰肉輪在目為上下胞其上屬脾而下屬胃肺屬金曰氣輪在目為白仁腎屬水曰水輪在目為瞳神此為眼目之根本又藉血為之胞絡也逮夫八廓有名無位膽之府為山廓又名清淨廓大腸之府為天廓又名傳送廓膀胱之府為澤廓又名津液廓肝之府為風廓又名養化廓腎之府為水廓又名會陰廓命門之府為火廓又名抱陽廓脾胃之府為地廓又名水穀廓小腸之府為雷廓又名關前廓此雖眼目之源派而實無關於治療也五臟或蘊積風熱或有七情之氣鬱結不散上攻眼目各隨五臟所屬而見或腫而痛羞澀多淚或生冷翳障膜昏暗失明治之須究其源風則散之熱則清涼之氣結則調順之切不可輕用針刀鉤割偶得其愈出乎僥幸倘或不然終身之害又目不可過用寒涼恐冰其血凝而不流亦成痼疾當量人之老少氣體虛實用藥又有腎虛者亦令人眼目無光或生冷翳當暖腎經北方之人患服皆是目冒飛沙夜臥熱炕二氣交蒸治宜多用涼藥稟氣與南方不同也又痘疹之後毒氣鬱於肝氣不能瀉發於眼目傷於瞳神者素無治法也開導說開導之法蓋由陰虛火盛經絡鬱滯不得通暢而設其處有五謂迎香內睥上星耳際左右兩太陽穴也內睥正隊之衝鋒也其功雖遲漸收而平順兩太陽擊其左右翼也其功次之上星穴絶其餉道也內迎香抵賊之巢穴也成功雖速乘險而徵耳際擊其遊騎耳道遠功卑智者不取此實極危之良術挫敵之要機與其閉門捕賊不若開門逐之為良法也若病淺而邪不勝正者固內治而邪自退矣倘或六陽炎熾不若開導通之縱使其虛雖有所傷以藥內治而補其所虧庶免瘀滯至極而有潰爛枯凸之患點服藥說病有內外治各不同內疾已成外證若無點之何益外有紅絲赤脈若初發乃微邪退後乃余賊點亦可消服之猶愈內病始盛而不內治只泥外點者不惟徒點無功且有激發之患內病既成外病已見必須內外夾攻點服並行奈何人多愚拗有喜服而畏點者有喜點而畏服者不知內證既發非服不除外疾既成非點不退外障服而不點者病初發浮嫩未定者亦退既已結成者服雖不發不長所結不除當內外夾攻方盡其妙鉤割針烙說鉤割針烙四者猶斬刈之刑剪戮凶頑之法也如鉤先須識定何處皮肉筋脈浮淺而手力亦隨病輕重行之如針先須識定內障證候可針歲月已足氣血寧定者方與之針庶無差誤針後當照證內治其本或補或瀉各隨其證之所宜若止治其標不治其本則氣不定不久復為害矣割如在氣血肉三輪者可割而大眥一塊紅肉乃血之英心之華也若誤割之則目盲傷重者死有割傷因而惹風則為燥為潰爛為漏為目枯凡障若掩及風輪之重厚者可割如攀睛胬肉雞冠蜆肉魚子石榴赤脈虯筋肉睥黏輪等證可割凡鉤割見血及針犯血絡須以綿漬墨水裛之余病及在風輪之淺者誤割之則珠破而目損矣烙能治殘風潰眩瘡爛濕熱久不愈者輕則不須烙而能自愈若紅障血分之病割去者必須烙定否則不久復生在氣分之白者不須用烙凡針烙皆不可犯及烏珠雖有惡障厚者鉤割亦宜輕輕淺淺披去外邊其內邊障底只點藥緩伐久自潛消若鐮割風毒流毒瘀血等證當以活法審視不可拘於一定針瞳神發白一切內障在心融手巧輕重得宜須口傳目見非筆下可形容也金針開內障論造金針法張飛疇曰內障一證皆由本虛邪入肝氣衝上不得外越凝結而成故多患於躁急善怒之輩初起之時不痛不癢視物微昏或朦朧如輕煙薄霧次則空中常見黑花或如蠅飛蟻垂睹一成二瞳神漸漸變色而至失明初時一眼先患次則相牽俱損能睹三光者可治若三光已絶雖龍樹復出亦難挽回古人雖立多名終不越有水無水之辨若有水而光澤瑩徹者易明無水而色不鮮明者難治忽大忽小收放如氣蒸動者針之立明若久視定而不動者為死翳縱水未枯治之亦難全復翳色白或帶青或如爐灰色糙米色者易明若真緑正黃色者不治凡翳不拘何色但有稜角撥即難落翳狀破散及中心濃重者非撥可除若猶能視物者其翳尚嫩不可便針俟翳老然後針之又一種翳色雖正水縱不枯目珠軟塌者此必不治不可輕用金針如一眼先暗而三光已絶其後眼續患亦難針治若夫瞳神散大或緊小或渾黑或變色而無障翳至不睹三光者此內水虧乏不在證治倪仲賢所云圓翳冰翳滑翳澀翳散翳浮翳沉翳橫翳棗花翳白翳黃心黑水凝翳驚振內障等證金針撥之俱可復明但針後數日中宜服磁朱消翳等藥後則常服補腎調養氣血之劑以助其光其翳狀龍木論中已悉不暇再述姑以針時手法言之若江西流派先用冷水洗眼使翳凝定以開鋒針先刺一穴續進圓針撥翳或有開孔撥翳俱用鴨舌針者云雖龍樹真傳但針粗穴大每至痛極欲暈余所用毫針細而尖鋭取穴輕捷全無痛楚然必擇吉日避風雨陰晦日酷暑嚴寒日令病人先食糜粥不可過飽少停嚮明端坐一人扶定其首禁止傍人喧雜醫者凝神澄慮慎勿膽怯手顫以左手大次二指按開眼胞使其轉睛向鼻睜目如努出狀右手大次中三指捻正金針鑲處之上看準穴道從外眥一邊離黑珠約半米長許平對瞳神下針最便必須手准力完一針即進切勿撓動使之畏忍所以開單瞽須遮蔽好眼方可進針進針之後以下唇略抵針柄輕輕移手於針柄盡處徐徐捻進第一宜輕稍重則痛俟針進約可撥至瞳神時以名指曲附大指次節承其針柄虛虛拈著向上斜回針鋒至瞳神內夾道中貼翳內面往下撥之翳即隨落若不落再如前手法從上往下撥之倘三五撥不下須定穩念頭輕輕撥去自落惟死翳撥之不動者忌撥有撥落而復起者當再撥之其翳隨針捺於黑珠之下略頓起針緩緩捻出但元氣虛人針後每多作嘔以托養神膏者屬胃氣也須預備烏梅之類勿使其嘔為妙嘔則防翳復上上則一兩月後復針翳既盡不可貪功多撥多撥則有傷損神膏嘔動胃氣之害凡翳嫩如漿不沾針首而不能撥下或撥下而復泛上滿珠者服補養兼消翳藥自明先與千金磁朱丸七服次與皂莢丸生熟地黃丸並進否則俟凝定再針不可限以時日有種翳雖撥落圓滑而捺下復滾上者必略縮針頭穿破其翳捺之自下不下亦如前用藥自消或有目珠難於轉內者針內眥亦得此名過梁針取穴較外眥稍遠一線針法與外眥無異但略覺拗手然鼻梁高者難於轉針不可強也若針右眼外眥下針之後換左手轉針撥翳手法亦須平日演熟庶無失誤出針之後令病者垂垂閉目用綿紙五七重量紙厚薄及天時寒暖封固更以軟帛裹黑豆數粒以線系定鎮眼使目珠不能動移動則恐翳復上是以咳嗽之人不宜用針亦是此意又肝虛人時有淚出勿用黑豆宜以決明子代之則無脹壓珠痛之患然覺緊則宜稍松覺寬則宜稍收以平適為主封后靜坐時許然後輕扶高枕仰臥不須飲食若飢則不妨少與周時後以糜粥養之戒食震牙之物及勞動多言不可扳動露風露風則疼痛疼痛則復暗不可不慎過七日方可開封看物切勿勞視亦有針時見物開封時反不見者本虛故也保元湯六味丸補養自明針後微有咳嗽難用黃耆者以生脈散代之若形白氣虛者大劑人參以補之肥盛多痰濕者六君子加歸芍以調之一月之內宜美味調攝毒物禁食不得高聲叫喚及洗面勞神百日之中禁犯房勞惱怒周年勿食五辛酒面等物若犯前所禁諸條致重喪明者不可歸罪於醫也其有進針時手法遲慢目珠旋轉針尖劃損白珠外膜之絡而見血及傷酒客輩目中紅絲血縷者雖為小過切勿驚恐如法針之所謂見血莫驚休住手是也又進針後觸著黃仁而血灌瞳神急當出針而服散血之藥所謂見血莫針須住手是也法雖若此醫者能無咎乎又年高衛氣不固針時神膏微出者即與保元湯調補之開卦時白睛紅色勿訝以封固氣閉勢使然也其用針未熟者量針穴與瞳神相去幾許以墨點針上庶指下無過淺過深之惑凡初習針時不得以人目輕試宜針羊眼久久成熟方可治人諺云羊頭初試得其輕重之宜正初習金針之要法不可以其鄙而忽諸造金針法用上赤不脆金抽作金絲粗如底針約長三寸敲作針形以小光鐵槌在鐓上緩緩磋之令尖圓若繡針狀亦不可太細細則易曲易斷如覺柔軟再磋令堅不可銼擊恐脆則有傷斷入目中為害不淺緣金銀之性經火則柔磋擊則堅務令剛柔得宜以堅細中空慈竹三寸作柄則輕便易轉且不滑指柄中以蠟入滿嵌入大半留鋒寸余針根用銀鑲好無使動搖針鋒以銀管護之先用木賊草擦令圓鋭更以羊肝石磨令滑澤穿膚不疼則入目不痛方可用之造成後亦宜先針羊眼試其柔脆庶幾無失飛疇治畫師吳文玉母年五十四失明數年諸治罔效余偶見之曰此內障眼可以復明何棄之也曰向來力能給藥治而不靈今縱有仙術可回力莫支也豫曰無汝費但右眼之翳尚嫩遲半載可撥遂先與針左眼針入撥時其翳下而珠尚不清卦後因與磁朱丸七日開封視物模糊又與皂莢丸服而漸明其後自執鄙見謂一眼復明已出望外若命犯帶疾而全療之於壽有阻遂不欲更治右眼雖是知足誠亦愚矣又治孫搗年七十茹素五十餘年內障失明四載余用金針先針左眼進針時外膜有血針入微有膏出觀者駭然余於膏血中進針撥去翳障次針右眼出針兩眼俱明遂與封固用黑豆包系鎮眼因向來肝虛多淚是夕淚濕豆脹不敢寬放致右眼痛而作嘔明晨告豫令稍寬其系先以烏梅止其嘔用六味丸調服以補其肝遂痛止安穀至七日開封其右眼因嘔而翳復上侵掩瞳神之半視物已灼然矣許其來春復撥以收十全之功但針時有神膏漏出稠而不黏知壽源無幾為惜耳又治徐天錫內障十五年三載前曾有醫針之其翳撥下復上如是數次翳不能下委之不治乃甥周公來見余針吳之寰內障兩眼俱一撥而明因詳述其故豫曰此圓翳也遂同往與針其翳撥下果復滾上即縮針穿破其翳有白漿灌滿風輪因謂之曰過七日其漿自澄設不澄當俟結定再針則翳不復圓也過七日開封已能見物但瞳神之色不清其視未能了了令多服補腎藥將三月而視清又沈倩若年二十五患內障年餘翳狀白潤而正能辨三光許其可療臨時見其黑珠不定針下覺軟遂止針不進曰風輪動是肝虛有風目珠軟是神水不固辭以不治病者惻然曰豫得遇龍樹許可復明今辭不治則終為長夜之人也免慰之曰汝姑服藥俟元氣充足方可用針後聞一醫不辨而與針治翳韌不能撥下終屬無功胡似不針之為上也又治楚商馬化龍患內障三月色含淡緑白珠紅赤而頭痛究其根是舟中露臥腦受風邪而成因其翳色低不欲與針復思本風而致青緑有之且證未久猶為可治遂先與疏風次與清肝頭痛止目赤退然後針之其翳難落稍用力始開內泛黃緑沙於風輪似屬難愈服補腎養正藥兩月翳色變正再撥而明又陳彥錫夫人內障何宇昭內障李能九內障陳順源內障俱年遠一撥即明但服磁朱消翳藥後之調治各異彥錫夫人多郁不舒散結養神為主字昭肥白多痰理脾滲濕養神為主能九勞心沉默宣達補血養神為主順源善飲性暴開封時風輪紅紫瞳神散闊視物反不若針時明瞭此火盛燔灼瞳神散漫平肝降火斂神為主凡此不能枚舉總在臨證變通非執成見之可獲全功也又治趙嫗內障進針一撥漿泛風輪全白兩目皆然服消翳藥一月後能視此屬包漿內障與圓翳似同而別並識以曉未經歷者目痛目痛有二一謂目眥白眼痛一謂目珠黑眼痛蓋目眥白眼痛屬陽故晝則疼甚點苦寒藥則效經所謂白眼赤脈法於陽是也目珠黑眼痛屬陰故夜則疼甚點苦寒藥反劇經所謂瞳子黑眼法於陰故也樓全善云夏枯草散治目珠痛至夜則疼甚者神效血熱本方加當歸芍藥虛人四物湯換生地加羌活香附下咽則疼減風熱瞳痛甚瀉青丸洗肝散選用白眼痛多有赤脈若惡寒脈浮為在表選奇湯脈實有力大府閉為在裡瀉青丸加薄荷甘草亦有不腫不紅但沙澀昏痛者乃脾肺氣分隱伏之濕熱秋天多有此患故俗謂之稻芒赤瀉青丸加黃耆甘草天行赤熱證目赤痛或睥腫頭重怕熱羞明涕淚交流里巷老幼相傳治法前後不可鐮洗只用童子小便煎黃連溫洗日三五遍更用宣胡二連白礬雄黃共研細調薑汁點大眥通其惡淚其痛立止先服洗心散一劑次用洗肝散一二服此證只氣候瘴毒之染全屬外因雖有赤絲亂脈赤腫痛甚終不傷損瞳神也二七日不愈必犯本虛之故防變他證暴露赤眼證此證與天行赤熱眼同而天行能傳染此但患一人而無傳染天行雖痛腫而無翳此則痛而生翳為不同耳切不可鐮洗亦不可用補先宜酒煎散發散次與大黃當歸散疏通血氣洗以黃連當歸赤芍滾湯泡乘熱熏洗冷即再溫日三五次暴風客熱證卒然而發其證白仁壅起包小烏睛疼痛難開此肺經受毒風不散熱攻眼中致令白睛浮腫雖有腫脹治亦易退非若腫脹如杯之比宜服瀉肺湯腫濕甚者稍加麻黃三四分赤腫甚者加黃連半錢生地黃一錢火脹大頭證目赤痛而頭目浮腫夏月多有此患有濕熱風熱濕熱多淚而睥爛風熱多脹痛而憎寒普濟消毒飲隨證加減若失治則血滯於內雖得腫消而目必變也羞明怕熱證熱亮之處則目痛澀畏避不能開火鬱於上也病在心肝脾三經火燥血熱偏在陽分蓋己之精光弱而不能敵彼之光者生料六味丸換生地去山萸加決明羌活芩連若風氣攻注眵淚羞明密蒙花散風痛日久漸變作火而羞明畏熱頭目脹痛若以風藥與之則火愈熾此風火相煽選奇湯倍加蔥白怕熱皆有餘證羞明有不足證患久不已此風從火化也還睛丸若目不赤痛而羞明者乃血不足膽汁少也神效黃耆湯今人皆稱怕日羞明俗傳音近之誤瞼硬睛疼證不論有障無障但或頭痛者尤急乃風熱痰火及頭風夾攻血滯於睥內所致先用香油調姜粉擦之稍軟翻睥開導若堅硬之甚其脹日高雖治不退不軟此頭風欲成毒也石膏散加羌活全蠍不應用通肝散若有障膜絳雪膏石燕丹選用赤熱如邪證眼不赤不疼乍痛如神祟者陰陽升降不和氣血偏勝相攻使然或有血虛者下午痛大黃當歸散或有氣虛火旺者上晝痛甚助陽和血湯氣眼痛才怒氣則目疼肝火過旺也石決明草決明楮實香附木賊甘草川芎蟬蛻等為末清茶調下珠痛如針證病屬心經實火若驀然一二處如針刺目雖不赤亦是心經流火宜洗心散然此證多有體疲目勞營氣不上潮於目而如針刺之痛者宜養其營若降火則殆矣熱結膀胱證目病小便不通利而頭疼寒熱者方是若小便清利者非也宜先利其水後治其目五苓散加車前滑石之類血熱導赤散合益元散肝風目暗證肝腎虛熱生風疼痛舉發無時眼睛墜疼頗有赤澀淚出眼前多花發一物如見兩般白蒺藜散還睛丸選用大小雷頭風證不論偏正但頭痛倏疾而來疼至極而不可忍身熱頭旋噁心嘔吐目痛便祕若失治禍變不測目必損壞輕則米厭凸重則結白如珠而變內障清震湯左右偏頭風證久則左發損左目右發損右目有左損反攻右右損反攻左而二目俱損者若外有赤痛淚熱等病則外證生若內有昏眇眩暈等病則內證生矣痛從內起止於腦則攻害遲痛從腦起止於內則攻害速若痛從中發及眉梁內上星中發者兩目俱害也從頭風例治之陽邪風證額板眉稜骨痛也發則多於六陽用事之時元氣弱者則有內證之患若兼火者則有證外之病選奇湯清空膏還睛丸選用陰邪風證腦後枕骨痛也多發於六陰用事之時發則虛暈耳鳴久而不治內障成矣三因芎辛湯巔頂風證頂骨內痛極如錘如鑽也夾痰濕者每痛多眩暈若痛連及目珠而脹急瘀赤者外證之惡候若昏眇則內證成矣外證用羌活勝風湯內證沖和養胃湯痰濕礞石滾痰丸卒腦風證太陽內如槌似鑽而痛也若痛及目珠珠外有赤脂縱貫及瘀滯者外證之惡候也若珠不赤痛自覺視如雲遮霧障漸漸昏眇者內證成矣治法如巔頂風證急早治之以免後慮遊風證頭風痛無常位一飯之頃遊易數遍若痛緩而珠赤必變外障痛甚而腫脹緊急者必有瘀滯之患久而失治不赤痛而昏眇者內證成矣邪風證人素有頭風因而目病內經所謂風入系頭則為目風眼寒是也發則頭痛目亦病目病頭亦痛輕則一年數發重則連綿不已先用羌活勝風湯次與還睛丸目中常若風吹狀者此火氣內伏陽氣不行於外也大追風散若無赤痛而止內脹昏眇者內證成矣目赤目赤有三一曰風助火鬱於上二曰火盛三曰燥邪傷肝戴復庵云赤眼有三有氣毒有熱壅有時眼無非血壅肝經所致屬表者羌活勝風湯屬裡者瀉肝散等藥赤久生翳膜者春雪膏蕤仁膏選用並用碧雲散吹鼻目赤腫足寒者必用時時溫洗其足並詳赤脈處屬何經治之王節齊云眼赤腫痛古方用藥內外不同在內湯散用苦寒辛涼之藥以瀉火在外點洗用辛熱辛涼之藥以散邪故點藥莫要於冰片而冰片大辛大熱因其性辛甚故藉以拔出火邪而散其熱氣世俗不知冰片為劫藥誤認為寒常用點藥遂致積熱入目昏暗障翳又不知忌寒涼而妄將寒涼冷藥挹洗常致昏暗者比比皆是赤眼腫痛脾虛不能飲食肝脈盛脾脈弱用涼藥治肝則脾愈虛暖藥暖脾則肝益甚惟於平和藥中倍加肉桂殺肝而益脾一舉兩得經云木得桂而枯更以芍藥制之散熱存陰之捷法也人乳點眼久病昏暗極效以乳與血液同源目得血而能視也凡赤而腫痛者當散濕熱赤而干痛者當散火毒赤而多淚者當散風邪赤而不痛者當利小便先左赤而傳右者為風熱挾火散風為主勿兼涼藥涼能鬱火也先右赤而傳左者痰濕挾熱瀉火藥中必兼風藥風能勝濕也凡赤甚腫痛於上睥開出惡血則不傷珠瘀血灌睛證此證為病最毒若人偏執己見不用開鐮者其目必壞初起不過紅赤次後紫脹及後則白珠皆脹起在睥則腫脹如杯在珠則白輪湧起失治必有青黃牒出米厭凸之禍凡見白珠赤紫睥腫虯筋紫脹傳點不退必有瘀滯在內可翻睥內視之若睥內色暈泛浮椒瘡或粟瘡者皆用導之導後服宣明丸血灌瞳神證因毒血灌入金井瞳神水內也清濁相混時痛澀紅光滿目濛濛如隔絹看物若煙霧中此證有三者肝腎血熱灌入瞳神者多一眼先患後相牽俱損最難得退有撞損血灌入者雖甚而退速有針內障失手撥著黃仁瘀血灌入者三證治法頗同用大黃當歸散有翳退翳活法治之赤脈貫睛證不論粗細多少但貫到風輪經過瞳外接連氣輪者最不易治細者稍輕粗者尤重貫過者有變證絲粗及有傍絲虯亂者有變證凡各障外有此等脈罩者雖在易退之證亦退遲也貫雖未連而侵入風輪皆不易退起於大眥者心之實火也宜洗心散筋脈大者用小鋒針挑撥起於小眥者心之虛火也宜導赤散不必挑又有暴橫嗜酒之人赤脈灌睛乃生相也不在此例赤絲亂脈證病生在氣輪白珠上有絲脈縱橫或稀密粗細不等有痛不痛有淚無淚羞明不羞明但常常如是久而不愈也非若天行客風暴壅赤脈貫睛之比當驗其大脈從何部分而來或穿連其位即別其所患在何經絡以治之治外者細脈易退大脈虯紫者退遲必須耐久去盡庶無再來之患不然他日犯禁其病復發凡絲脈沿到風輪上者病最重而能變凡見絲脈虯紫內服外點點時細縮不點即脹久久亦然及因而激動病變者珠雖不紫睥雖不腫亦有積滯在絡中幽深之處揭開上睥深處看之其內必有不平之色在焉略略導之不可過過則有傷真血水虧膏澀目力昏弱之患點以石燕丹服用大黃當歸散酒煎散之類白睛黃赤證人有白睛漸漸黃赤者皆為酒毒脾經濕傷肝膽邪火上溢肺經故也五苓散加茵陳甚則黃連解毒加山梔膽草目青目之白睛變青藍色者病在至急蓋氣輪本白被郁邪蒸逼走散珠中膏汁游出在氣輪之內故色變青藍瞳神必有大小之患羌活除翳湯去麻黃川椒薄荷荊芥加升麻川連甘草桔梗然當各因其病而治其本如頭風者風邪也因毒者毒氣所攻也余仿此目腫脹腫脹如杯證水火之邪傳脾土而為炎燥之病其珠必疼而睥方急硬若暴風客邪作腫者必然淚多而珠疼稍緩然風熱外感治之易愈若水火內自攻擊重則疼滯閉塞血灌睛中而變證不測矣輕則敷治而退重則必須開導敷治不退開導不消消而復發痛連頭腦而腫愈高睥愈實者此風熱欲成毒也洗肝散龍膽飲選用脹有胞脹珠脹不同胞脹多屬濕勝治其濕熱為主珠脹多屬火淫治當去火為先故治珠脹雖挾風邪不宜輕用麻黃木賊之類恐有烏珠脹裂之患不可不慎形如蝦座證有半邊脹起者有通珠俱被脹起蓋定烏珠者又有大眥內近鼻柱處脹出一片如皮如肉狀似袋者乃血脹從額中落來不可割為血英在此處誤割者為漏為瞽不可不辨急宜開導血漸去而皮漸縮小眥脹出如袋者亦然在肺部是重久則移傳於肝而風輪有害也宣明丸狀如魚脬證氣輪努脹不紫不赤狀如魚脬乃氣分之證金火相搏所致不用鐮導惟以清涼自消瀉肺湯若有微紅及赤脈者略略於上睥開之若頭痛淚熱及內燥而赤脈多者防有變證宜早導之庶無後患鶻眼凝睛證此驟然而起五臟皆受熱毒致五輪壅起頭疼面赤目脹不能轉動若鶻之睛乃三焦陽邪亢極之害先用香油調姜粉汁於額臉項上摩擦急服酒煎散覆蓋出汗其眼即活動而用燈火燒斷風路其迎香太陽兩睥上星等要隘處並舉而劫治之此證多是小兒急驚大人少有此患因風成毒證初發時乃頭風濕熱瘀血灌睛瞼硬睛疼等病失於早治或治不得其法遂至邪盛搏夾成毒睥與珠脹出如拳連珠帶腦痛不可當先從烏珠爛起後爛氣輪有爛沿上下瞼並腦及顴上肉盡空而死若患頭疼腫脹珠凸等證治退復發再治再發痛脹如前者即成此患若已成者雖治之脹少退痛少止決又發發時再治至於數四終當一發不復退矣惟初起時急用石膏散加羌活細辛川芎薄荷赤芍若至珠爛治無及矣旋臚泛起證氣輪自平水輪自明惟風輪泛起也或半邊泛起者亦因半邊火盛火鬱風輪故隨火脹起服用涼膈散點用石燕丹非旋螺突起已成證而頂尖俱凸不可醫治之比也旋螺突起證烏珠高而綻起如螺為肝熱盛必有瘀血急宜石燕丹絳雪膏點之或調鱔血點尖處若年久須用鋒針對瞳神量淺深橫入放出惡水紙封避風忌口數日先服守真雙解散後以六味丸加知柏急救少陰伏匿之邪若初起失於正治之法則瘀雖退而氣定膏不復平矣神珠自脹證此陰峻利害之證因五臟毒風所蘊熱極充服與旋螺突起不同初起麻木疼痛淚出其勢莫測急投大黃當歸散宜退五臟熱毒搗蔥艾尉五輪之突起洗以白芷細辛麻黃防風羌活未可與點或突起高寸許者須鋒針針出惡水疼方得止珠突出眶證此烏珠忽然突出眶也與鶻眼證因滯而漫漫脹出者不同有因精華衰敗癢極揩擦而出者其人不久必死有酒醉怒甚及嘔吐極而綻出者有因患火證熱盛關格亢極而脹出者有因打撲而出者凡此雖離兩瞼而脈皮未斷者乘熱捺入雖入脈絡損動終是光損須用清涼膏若突出閣在瞼中而含者易入光不損若離瞼脈絡皮俱斷者不救目癢目癢因風寒者姜粉和白蜜點之風熱四生散或黃耆防風蒺藜羌活蟬蛻黃芩甘草之類因火者於赤痛條求降火之劑因血虛而癢者四物湯加羌防蒺藜黃耆癢若蟲行證乃癢不可忍非若常時之小癢也為病不一如有障無障皆有癢極之患病源非一有風邪之癢有血虛氣動之癢有虛火入絡邪氣行動之癢有邪退火息氣血得行脈絡通暢而癢大凡有病之目不治不治而自作癢者癢一番則病重一番若醫治後而作癢病必去速若癢極難當自覺低陷者命亦不久急宜溫補庶或可圖若癢而淚多者血虛夾火大抵癢屬虛火治宜姜粉枯礬硼砂津唾調如米大時將一丸納大眥及鹽湯蒸洗不應於大小眥旁去一韭葉許各灸七壯其癢立止如蟹睛黑翳如珠等證作癢俱可用灸但痛甚者皆屬實火不可誤用艾灼反增其劇也外障外障在睛外遮暗凡赤脈翳初起從上而下者屬太陽以太陽主表其病必連腦項痛治宜溫之散之赤脈翳初從下而上或從內眥出外者皆屬陽明以陽明主裡其證多熱或便實是也治宜寒之下之赤脈翳初從外眥入內者屬少陽以少陽主半表半裡治宜和之解之翳膜者風熱重則有之或斑入眼此肝氣盛而發在表也翳膜已生在表明矣宜發散而去之若反疏利則邪氣內陷為翳益深邪氣未定謂之熱翳而浮邪氣已定謂之冰翳而沉邪氣牢而深者謂之陷翳當以焮發之物使其邪氣再動翳膜乃浮佐之以退翳之藥自去病久者不能速效以歲月除之新翳東垣羌活除翳湯有熱萬應蟬花散加犀角白蒺藜木賊焮發陷翳用保命集羚羊角散翳盡至其年月日期復發者有留積也皂莢丸倪仲賢云風熱不制之病曰翳如雲霧如絲縷如稱星或一二點多至數十點如螺蓋為病久不去治不如法服寒涼藥過多脾胃受傷生氣不能上升以漸而致也羌活勝風湯專主風熱去翳自內眥而出者加蔓荊自鋭眥而入者加膽草藁本自上而下者加黃連倍柴胡自下而上者加木通熱甚者兼用治濕熱之藥搐鼻碧雲散大抵如開鍋法搐之隨效然力少而鋭宜不時用之去星用阿魏搐鼻法又論奇經客邪之病經曰邪客於足陽蹺之脈令人目疼從內眥始故陽蹺受邪者內眥即赤生脈如縷縷俗呼攀睛是也撥雲退翳丸萬應蟬花散選用外用點藥如春雪膏蕤仁膏專祛風熱暴翳如去老翳則以石燕丹絳雪膏熊膽膏選用若宿翳冰凝者當以照水丹蠍附散助之石頑曰外障諸證雖殊究其本不出風火濕熱內蘊故必以滌熱消翳為務然初起者但於除風熱藥中略兼消翳其翳自去若去宿障自當專力攻翳但必兼助脾胃行其藥力始克有濟諦觀外障內治之藥雖多咸以神消散皂莢丸二方為主外治之藥不一莫如石燕丹為最今之專於此者能識斯意守是法而行之亦可以為中工矣血翳包睛證此乃心經發熱肝虛受邪致令眼赤腫痛淚出常時舉發久則赤筋結厚遮滿烏睛服瀉心火破血涼肝之劑痛時用破血藥兼硝黃下之紅霞映日證眼赤澀腫痛年深有紅翳於烏睛上濃淚如紅霞映日之狀乃肝膈風熱上攻所致治宜去風散血清涼之劑黃膜上衝證在風輪下際神膏之內有翳色黃與凝脂翳同一氣脈但凝脂翳在輪外生點藥可去此在膏內邪熱蒸起點藥所不能除若漫及瞳神其珠必損此經絡阻塞極甚三焦關格火土邪實故大便祕小便澀而熱蒸膏內作膿也失治者有米厭凸之患神消散皂莢丸選用諸外障俱可用石燕丹吹之絳雪膏點之碧雲散搐之黃膜下垂證此脾胃熱結血凝氣滯膏脂窒塞故生是證發歇無時痛澀淚出漸生黃膜下垂發則膜長遮滿瞳神甚至滿目皆黃不辨人物治宜蟬花散加石膏膽草大黃點以石燕丹有淚者退易無淚者退遲厚者宜挑剪赤膜下垂證初起甚薄次後甚大有赤脈貫白輪而下烏珠上半邊近白際起障一片仍有赤絲牽絆障大絲粗虯赤淚澀珠疼頭痛者病急而有變絲細少色微赤珠不疼頭不痛者緩而未變或於障邊絲下仍起星數點此星亦是凝脂之類皆火內滯之患其病尚輕蓋無形之火潛入膏內故作是疾非比有形血熱之重也若障上有絲及星生於絲梢皆是退遲之病翳薄細絲赤不甚者只用善逐之甚者不得已而開導之若貫過瞳神者不問粗細聯斷皆退遲此濕熱在腦幽隱之火深潛在絡一有觸動則其患迸發輕者消散重者開導此定法也內服神消散去二蛻加皂莢石決明外點絳雪膏次用皂莢丸凝脂翳在風輪上有點初起如星色白中有米厭如針刺傷後漸長大變為黃色米厭亦漸大為窟者有初起便帶鵝黃色或初起便成一片如障又於障內變出一塊如黃脂者或先有痕米厭後變出凝脂一片者所變不一禍則一端大法不問星障但起時能大色黃善變速長者即此證也甚則為窟為漏為蟹睛內潰精膏外為枯凸或氣極有聲爆出稠水而破者此皆郁遏之極蒸爍肝膽二絡不過旬日損及瞳神若四圍見有瘀滯者因血阻道路清汁不得升運之故若四圍不見瘀赤者其內絡深處必有阻滯之故此證當急用神消散皂莢丸曉夜治之若遲待長大蔽滿烏珠雖救得珠完珠上必有白障終身不得脫凡有此證但是頭疼珠痛二便燥澀即是急之極甚若二便通暢禍為稍緩花翳白陷證因火燥絡內而膏液蒸傷凝脂從白輪之際生來四圍高中間低此金剋木之禍也或就於脂內下邊起一片黃膜此二證夾攻尤急亦有上下生起名順逆障此火土鬱之禍也亦有細條如翳或細顆如星四散生起長大牽連此木火禍也以上三者必有所滯輕則清涼之重則開導之若漫及瞳神不甚厚重者速救亦可挽回但終不得如舊止可救其米厭凸而已龍膽飲去黃連加赤芍藥蟹睛證真珠膏損凝脂翳破壞風輪神膏綻出黑顆小如蟹睛大則如黑豆甚則損及瞳神至極則青黃凸出者此證與黑翳如珠狀類而治不同夫黑翳如珠源從膏內生起此因破而出中挾虛火所以時時奇癢或時掣痛酸澀古法用小鋒針針出惡水流盡即平以爐甘石散不用腦麝點之內服防風瀉肝散次用六味丸加蒺藜車前調之然終未免瘢靨之患斑脂翳證其色白中帶青黑或焦黃微細有細細赤絲絆者則有病發之患結在風輪邊傍大則掩及瞳神雖有神手不能除去治者但可定其不垂不發亦須神消散皂莢丸石燕丹絳雪膏內外夾攻得氣血定久瘢結牢固庶不再發若治不固或即縱犯則斑跡發出細水泡時起時隱甚則發出大泡起而不隱又甚則於本處作痛或隨絲生障或蟹睛再出矣黃油證生於氣輪狀如脂而淡黃浮嫩乃金受土之濕熱也不腫不疼目亦不昏故人不求治略有目疾發作則為他病之端揭開上脾氣輪上有黃油者是濕熱從腦而下先宜開導上睥即與神消散皂莢丸之類有頭風證者石膏散兼皂莢丸若癘風目上有此者最重當從癘風證治狀如懸膽證有翳從上而下貫及瞳神色青或斑上尖下大薄而圓長狀如懸膽蓋膽有瘀熱肝膽膏損變證急來之候若眼帶細細赤脈紫脹者最急頭疼者尤惡內必有滯急向四圍尋其滯而導之庶免損壞之患服用石膏散皂莢丸點以石燕丹玉粒分經生於氣輪者燥熱為重生於睥者濕熱為重其形圓小而顆堅淡黃如白肉色初起不疼治亦易退亦有輕而自愈者若恣酒色嗜辛熱多忿怒及久而不治因而積久者則變堅大而疼或變大而低潰如爛瘡相似者尚輕宜神消散去二蛻加皂莢石決明燥熱去蒼朮加當歸杏仁若復不知禁忌且犯戒者則爛深而變為漏矣不可誤認為粟瘡銀星獨見烏珠上有星獨自生也蓋人之患星者由火在陰分而生故不能大若能長大者必是各障之初起也即如凝脂一證初起白顆小而圓嫩儼然一星不出一二日間漸漸長大因而觸犯遂至損目若誤認為星則謬矣大凡見珠上有星一二顆散而各自生至二三日看之不大者方是若七日而退者火數盡也若連萃貫串相生及能大者皆非是也凡星見青色者為風其人必頭痛蟬花散去蒼朮加白蒺藜穀精草並用碧雲散祛風為主星久不退恐其成翳阿魏搐鼻法每夜搐之星見陷下者或小點亂生者為腎虛其人必因夢泄或房勞之故宜生料六味丸加穀精草白蒺藜車前子凡去星之藥非穀精不應也聚開障證其障或圓或缺或厚或薄或如雲似月或數點如星痛則見之不痛則隱聚散不一來去無時或月數發或年數發乃腦有濕熱之故大約治法不出鎮心火散瘀血消痰飲逐濕熱而已聚星障證烏珠上有細顆或白色或微黃或聯綴或團聚或散漫或頓起或漸生初起者易治生定者退遲白者輕黃者重聚生而能大作一塊者有凝脂之變聯綴四散傍風輪白際而起變大而接連者花翳白陷也若兼赤脈絆者或星翳生於絲盡頭者退遲此證多由痰火之患能保養者庶幾斫喪犯戒者變證生焉先服羚羊角散後服補腎丸垂簾障證生於風輪從上而下證有數般緩急各異一胬肉初生一偃月侵睛一赤膜下垂治各不同此只白障漫生自上而下為混障間有微紅因其觸犯搏動其火方有變證其病從上而下本當言順何以逆稱蓋指火而言火本炎上今反下垂是謂逆矣生熟地黃丸羚羊角湯選用虛者兼進補腎丸湧波翳證障從輪外自下而上故曰湧波非黃膜上衝從內向上急甚之比白緩赤急亦有激犯變出黃膜宜涼膈散先去上衝後以四物換生地赤芍加犀角甘草丹皮治之逆順障證白赤而脹及絲脈赤亂見於風輪際處由白珠而來粗細不等周圍侵入黑睛障起昏澀者即此證必有瘀滯在內滯於左則從左而來滯於右則從右而來宜先導去惡血後用皂莢丸生熟地黃丸點用石燕丹若色浮嫩能大或微黃者乃花翳白陷也若燥澀甚者則下起一片變為黃膜上衝若頭疼珠痛脹急者病尤重而急陰陽翳證烏珠上生二翳俱白色一中虛一中實兩翳連串如陰陽之圖若白中略帶焦黃色或有細細紅絲絆者皆不能盡去內服蟬花散皂莢丸外點石燕丹熊膽膏此證非心堅耐久不能得效瑪瑙內傷證其障如瑪瑙之雜色是雖生輪外實是內傷肝膽真氣清液受傷結成此翳皂莢丸絳雪膏久久耐心醫治方得減薄終不能除盡也連珠外翳證與聚星相似蓋聚星在可治之時此則凝定之證雖妙手久治難免跡滯如冰瑕之患冰瑕翳證或片或點生於風輪之上色白而薄如冰上之瑕時常淚出眵滿矇蔽瞳神發歇往來風輪有痕米厭如凝脂聚星等證初發點服不得盡去或點片腦過多皆為此證與魚鱗障不殊雖治不能速去內與六味丸加菟絲子白蒺藜外點石燕丹必須堅守久而方退圓翳外障證薄而色白大小不同間有厚者亦非堆積之比又名遮睛障以其光滑深沉病最難治治與冰瑕翳證不殊雖堅心久治亦難免終身之患水晶障證清瑩見內但高厚滿珠者看雖易治得效最遲乃初起膏傷時內服寒涼太過外點冰片太多致精液凝滯結為此病若傍斜細看則白透睛瞳內陰處與日中看其形不同治法須分新久若有進退紅腫有淚發歇未定用石燕丹則眼淚帶藥流出此翳必能漸退若發年久無進退紅腫縱有撥雲墜翳聖藥終不能取效也服藥與冰瑕同風輪釘翳證乃勞傷肝經所致其證赤澀難開病牽頭腦淚出羞明釘翳日深接引黃仁根深不移治宜退熱去風散血頭痛尉以蔥艾外以琥珀龍腦硃砂玄明粉點之避風戒房室不痛者不治魚鱗障證色雖白而不光亮狀帶欹斜故號魚鱗乃氣滯膏凝結如凝脂病已甚不得已大用寒涼及多用冰片點者往往結為此也用青鹽黃泥固濟煨熟研細以羽毛蘸點一日一次內服退翳之藥馬蝗積證兩頭尖薄中間高厚肉紅色若馬蝗狀橫臥於中乃血分之病久久方成難去易來風疾人每多此患必先用鉤割十去五六方用殺伐之藥則有功然割須用烙其根處不爾則朝去暮生枉受痛楚多有激邪之禍外雖劫治內須平治不然外雖平而內心發也胬肉攀睛證多起於大眥如膜如肉漸侵風輪甚則掩過瞳神初起可點而退久則堅韌難消必用鉤割以針從上邊胬肉中道挑起穿過先揭起風輪邊後揭至大眥邊鉤定沿眥割去留則復長過則傷眥適當為妥若血出用軟紙蘸墨浥之則止胬肉四沿雖黏中則浮也有用線穿掛割亦能去之但延緩為纍去後用點藥消其根內服和血清火之劑肺瘀證由大眥而起貫過氣輪如皮筋橫帶風輪甚則掩及瞳神初起如薄薄黃脂或赤脈數條後漸大厚赤者少白者多雖赤者亦是白者所致蓋先有白而不忌火毒辛熱故傷血而赤必須殺伐用殺伐之法一割即烙見其再發大抵眼科鉤割一法惟此最為得效雞冠蜆肉二證形色相類經絡相同治亦一法多生睥眥之間然後害及氣輪而遮掩於目治須用割亦用烙定方好宜三黃丸加芒硝噙化外用絳雪膏去麝加阿魏點之其目大眥內有紅肉一塊如雞冠蜆肉者乃心經血部之英華若誤割者輕則損目重則喪命慎之魚子石榴二證經絡不異治法亦同其狀生肉一片如榴子綻露於房障滿神珠血部瘀實目疾之惡證治用割割後見三光者可治服用皂莢丸點以絳雪膏若三光瞑黑者內必瞳神有損不治輪上一顆如赤豆證氣輪有赤脈灌注風輪上有顆積色紅內有瘀血之故念宜開導血漸通顆亦漸消然至此十有九損若白珠上獨有顆鮮血者亦是瘀滯上下無絲脈接貫者吹點自消若有貫接者必絡中有血灌來向所來之處尋看量輕重導之睛中一點似銀星證白點一顆如星光滑當睛中蓋定雖久不大傍視瞳神在內乃目痛時不忌房事及服滲泄下焦寒涼之藥過多火雖退而腎絡受傷所致終身之患也五花障證生於神珠之上斑斑雜雜蓋五臟經絡間之氣俱傷結為此疾其色斒斕駁雜不一若中有一點黑色者乃腎絡氣傷雖治不能盡去此狀與斑脂翳瑪瑙內傷形略相似斑脂翳乃破而結成瘢痕不能去者瑪瑙內傷乃小而薄未掩瞳神之輕者此則高厚顯大生在膏外可退故不同耳宜神消散皂莢丸並用點藥混睛障證有赤白二種赤者畏赤脈外絆白者畏光滑如苔一種白睛光赤而後癢痛迎風有淚閉塞難開或時無事不久亦發年深則睛變成碧色滿目如凝脂赤露如橫赤絲此毒風積熱所致也宜服補肝調血之劑血行則風自息外用吹點則翳漸退黑翳如珠證非蟹睛木疳之比蟹睛因破流出此則肝氣有餘欲泛起之患故從風輪際處發起黑泡如珠多寡不一其火實盛者痛虛緩者不痛治法用小鋒針逐個橫穿破其黑翳中有惡水流出即平挑後用爐甘石散去腦麝點之先服羚羊角飲子去五味加赤芍藥次用六味丸後服補腎丸設若不諳此法服涼劑點涼藥鮮能奏效也內障內障在睛里昏暗與不患之眼相似惟瞳神里有隱隱青白者樓全善曰內障先患一眼次第相引兩目俱損者皆有翳在黑睛內遮瞳子而然今詳通黑睛之脈者目系也目系屬足厥陰足太陰手少陰三經蓋此三經臟腑中虛則邪乘虛入經中鬱結從目系入黑睛內為翳龍木論所謂腦脂流下作翳者即足太陽之邪也所謂肝氣衝上成翳者即足厥陰之邪也治法以針言之則當取三經之俞穴以藥言之則當補中疏通此三經鬱結使邪不入目系而愈倪仲賢云心者五臟之專精目者其竅也又為肝之竅腎主骨骨之精為神水故肝木不平內挾心火乘勢妄行火炎不制神水受傷上為內障此五臟病也膀胱小腸三焦膽脈俱上循於目四腑一衰則精氣盡敗邪火乘之上為內障此六腑病也初起時視覺微昏常見空中有黑花神水淡緑次則視歧睹一成二神水淡白可與沖和養胃湯益氣聰明湯有熱兼服黃連羊肝丸久則不睹神水純白永為廢疾也內障小眥青白翳大眥亦微顯白翳腦痛瞳子散大上熱惡熱大便澀難遇熱暖處頭疼睛脹日沒後天陰暗則昏六味丸加麥冬五味石頑曰內障諸證其翳皆生於烏珠裡面故宜金針撥之撥後用滋養之劑以助其光如六味丸磁朱丸之類氣虛者佐以八珍湯神效黃耆湯若翳嫩不可撥者只與用藥治法縱各不同大意不出乎皂莢丸生熟地黃丸其間虛實寒熱輕重隨證出入活法在心非筆可盡有肚腎陰虛絶無翳膜者惟宜滋養真陰切勿誤與消翳等藥也有偏正頭風久而生翳以蛇蛻炙脆為末每服一錢黑豆炒香淋酒一盞入蔥白三莖同煎去蔥和滓日服效青風內障證視瞳神內有氣色昏蒙如晴山籠淡煙也然自視尚見但比平時光華則昏蒙日進急宜治之免變緑色變緑色則病甚而光沒矣陰虛血少之人及竭勞心思憂鬱忿恚用意太過者每有此患然無頭風痰氣夾攻者則無此證病至此危在旦夕急用羚羊角湯緑風內障證瞳神濁而不清其色如黃云之籠翠岫似藍靛之合藤黃乃青風變重之證久則變為黃風雖曰頭風所致亦由痰濕所攻火鬱憂思忿怒之故此病初患則頭旋兩額角相牽瞳神連鼻內皆痛或時紅白花起或先後而發或兩眼同發肝受熱則先左肺受熱則先右肝肺同病則齊發羚羊角散黑風內障證與緑風相似但時時黑花起乃腎受風邪熱攻於眼宜先與去風熱藥三四劑如荊防羌活木賊蒺藜甘菊之類後用補腎磁石丸黃風內障證瞳神已大而色昏濁為黃也病至此十無一人可救銀風內障證瞳神大成一片雪白如銀其病頭風痰火人偏於氣忿怒郁不得舒而傷真氣此乃痼疾金丹不能返光也絲風內障證視瞳神內隱隱然若有一絲橫經或斜經於內自視全物亦如有碎路者乃絡為風攻郁遏真氣故視亦光華有損宜六味丸加細辛白蒺藜間與皂莢丸延久變重內證篤矣烏風內障證色昏濁暈滯氣如暮雨中之濃煙重霧風痰人嗜欲太多敗血傷精腎絡損而膽汁虧真氣耗而神光墜矣偃月內障證瞳神內上半邊有隱隱白氣一灣如新月覆垂而下乃內障欲成之候成則為如銀翳腦漏人及腦有風寒陰氣怫鬱者患之先與芎辛湯後與消內障丸劑此與偃月侵睛在輪膜中來者不同仰月內障證瞳神下半邊有白氣隱隱一灣如新月仰而從下向上也久而變滿為如銀內障乃水不足木失培養金反有餘故津液虧乃火氣鬱滯於絡而為病也補腎丸補腎磁石丸等選用如銀內障證瞳神內白色如銀輕則一點白亮如星重則瞳神皆白一名圓翳有仰月偃月變重為圓者有一點從中起而漸變大失明者乃濕冷在腦鬱滯傷氣故陽光為其閉塞而不得發現也非銀風內障已散大而不可復收之比血氣未衰者撥治之先服羚羊補肝散次用補腎丸庶有復明之理如金內障證瞳神不大不小只是黃而明瑩乃濕熱傷元氣因而痰濕陰火攻激故色變易非若黃風之散大不可治者神消散皂莢丸羚羊角補肝散主之緑映瞳神證瞳神乍看無異久之專精熟視乃見其深處隱隱緑色自視亦漸覺昏眇病甚始覺深緑蓋痰火濕熱害及清純之氣也先服黃連羊肝丸後與補腎磁石丸皂莢丸之類久而不治為如金青盲等證其目映紅光處看瞳神有緑色而彼自視不昏者乃紅光爍於瞳神照映之故不可誤認為緑風此但覺昏眇而瞳神緑色明處暗處看之皆同氣濁不清者是此證也雲霧移睛證自見如蠅飛花墮旌旆條環空中撩亂或青黃黑白仰視則上俯則下也乃絡間津液耗澀鬱滯清純之氣而然其原皆屬膽腎黑者膽腎自病補腎磁石丸或白或黃者因痰火傷肺脾清純之氣也皂莢丸圓翳內障證黑睛上一點圓初患之時但見蠅飛蟻垂薄煙輕霧先患一眼次第相牽若油點浮水中日中看之差小陰處看之則大或明或暗視物不明醫者不曉以冷藥治之轉見黑花此因肝腎俱虛而得先與皂莢丸合生熟地黃丸次與羚羊補肝散補腎丸冰翳內障證如冰凍堅實傍觀透於瞳神內陰處及日中看之其形一同疼而淚出此因膽熱攻腦而然也皂莢丸合生熟地黃丸滑翳內障證有如水銀珠子但微含黃色不疼不痛無淚遮繞瞳神皂莢丸生熟地黃丸澀翳內障證微如赤色或聚或開而傍微光瞳神上有凝脂色時復澀痛而無淚出皂莢丸生熟地黃丸散翳內障證形如鱗點乍青乍白或瞼下起粟子而爛日夜痛楚瞳神最疼常下熱淚或生散翳形如爛綿皂莢丸生熟地黃丸浮翳內障證上如冰光白色環繞瞳神初生目小眥頭至黑珠上細看方見不癢不疼無血色相混皂莢丸生熟地黃丸沉翳內障證白藏在黑水下向日細視方見或兩眼相傳疼痛則早輕夜重間或出淚皂莢丸生熟地黃丸右圓翳以下七證雖有治法然皆難於奏效惟金針撥之為善偃月侵睛證風輪上半氣輪交際隱隱白片薄薄蓋下其色粉青從膜中而來為害最遲每每忽之乃腦有風濕鬱滯火激腦脂滴下而成羚羊補肝散劍脊翳證亦名橫翳色白或如糙米色者或微帶焦黃色者但狀如劍脊中高邊薄有似鋒芒橫於風輪之外厚薄不等厚者雖露上下風輪而瞳神被掩視亦不見薄者瞳神終是被掩視亦昏眊縱色嫩根浮者亦有瘢痕若微微紅絲罩絆者尤為難退非需之歲月必無功耳皂莢丸生熟地黃丸棗花障證薄甚而白起於風輪從白膜之內四圍環布而來雖有棗花鋸齒之說實無正形初患時微有頭旋眼黑時時癢痛凡性躁急及患痰火傷酒濕熱之人多有此證久則始有目急乾澀昏花不爽之病犯而不戒則瞳神細小火入血分昏淚赤痛者亦在變證例宜皂莢丸生熟地黃丸白翳黃心證四邊皆白中心一點黃大小眥頭微赤時下澀淚團團在黑珠上乃脾肺相傳停留風熱皂莢丸合生熟地黃丸黑花翳證又名黑水凝翳初患時頭旋眼澀見花黃黑不定其翳凝結青色大小眥頭澀頻頻下淚口苦不喜飲食蓋肝受風寒所致羚羊角散皂莢丸生熟地黃丸五風變成內障證初患時頭旋偏腫痛甚或一目先患或因嘔吐雙目並暗瞳神結白如霜卻無淚出乃毒風腦熱所致先與除風湯次用皂莢丸生熟地黃丸瞳神散大瞳神散大者風熱所為也火性散挾風益熾神光怯弱不能支亦隨而散漫猶風起而水波也亦有過服辛散而致者治宜苦宜酸宜涼如四物去川芎加芩連甘草五味或六味丸加五味石決明大忌辛熱當瀉木火之邪飲食中常如此理尤忌食冷水大寒之物能損胃氣也藥中不可用茺蔚青葙川芎蔓荊之類以味辛反助火也當歸味亦辛甘而不去者以其和血之聖藥也又有瞳神散大而風輪反窄甚則一周如線者乃邪熱鬱蒸風濕攻激以致神膏走散若初起收放不常者易斂緩則氣定膏散不可復收未起內障止是散大者直收瞳神而光自生散大而有內障起者於收瞳神藥內量加攻內障藥如補腎磁石丸補腎丸千金磁朱丸之類大抵瞳神散大因頭風攻痛者多乃水中伏火之發最難收斂如他證傷寒瘧疾痰火等熱邪蒸壞神膏內障來遲而收亦易斂若風攻則內障即來且難收斂而光亦損耳亦有常人因勞役或觸熱而偶然瞳神覺大者勿誤呼為散大也瞳神緊小瞳神漸漸細小如簪腳或如芥子又有神水外圍相類蟲蝕漸覺眊臊羞澀視尚有光極難調理早治可以挽住經久則難因病目不忌淫欲相火強搏腎水肝腎俱傷元氣衰弱不能升運精汁以滋於膽膽中之精有虧所輸亦乏故瞳神亦日漸耗損甚則陷沒俱無而終身疾矣治當抑陽緩陰先與黃連羊肝丸數服次與六味地黃丸換生地加二冬兼進滋腎丸不應加熊膽亦有頭風熱證攻走蒸乾津液而細小者皆宜乘初早救以免噬臍之悔也瞳神欹側瞳神欹側謂瞳神歪斜或如杏仁桃核三角半月此肝腎灼爍水槁火炎而耗損瞳神宜六味丸加蒺藜當歸及清火藥若輪破損神膏流綻而欹側者瞳神將盡矣急宜補腎若輪外有蟹睛者蟹睛雖平瞳神不得復圓外有脂翳終身不脫目昏經曰肝虛則目䀮䀮無所見又曰腎足少陰之脈是動則病坐而欲起目䀮䀮無所見又曰少陰所謂起則目䀮䀮無所見者陰內奪故目䀮䀮無所見也此目疾而犯房勞所致大率於房勞後尤甚夜光椒紅丸倪仲賢云經曰足厥陰肝主目在志為怒怒甚傷肝傷脾胃則氣不聚傷肝則神水散神水亦氣聚也其證無眵淚痛癢羞明緊澀初但昏如雲霧中行漸覺空中有黑花又漸則睹物成二體久則光不收遂為廢疾蓋其神水漸散散而又散終則盡散也此病勿作痰治但當養肝腎陰血然必積以歲月無飢飽勞役七情五賊庶幾易效若久病光不收者不可治也一證因為暴怒神水隨散光遂不收永不復治又一證為物所擊神水散如暴怒之證亦不復治俗名為青盲者也病者始不經意及成醫亦不識直曰熱致竟以涼藥收之殊不知涼為秋為金又傷肝木往往致廢而後已睛黃視眇證風輪黃亮如金色而視亦微眇為濕熱重而濁氣熏蒸清陽之氣升入輪中故輪亦色變好酒嗜食濕熱燥膩之人每有此疾治其濕痰則愈五苓散加茵陳膽草甚則梔子柏皮湯之類暴盲暴盲者倏然盲而不見也致病有三曰陽寡曰陰孤曰神離乃痞塞關格之病病於陽傷者緣忿怒暴悖恣酒嗜辣久病熱病痰火人得之則煩躁祕渴病於陰傷者多嗜色欲或悲傷哭泣之故患則類中風中寒之起傷於神者因思慮太過用心罔極憂傷至甚驚恐無措者得之患則其人如癡騃病發之狀屢見陰虛水少之人因頭風痰火眩暈發後醒則不見能保養者亦有不治自愈氣大虛者急服大劑人參膏血虛者大劑黃耆當歸煎湯調服人參膏患濕者白朮為君黃耆茯苓陳皮為臣附子為佐三者治目暴盲皆為氣病故用參術即血虛者亦須人參方有陽生陰長之功經謂氣脫者目不明即其證也是忌金石鎮墜之藥以其神氣浮散於上犯之必死青盲青盲有二須詢其為病之源若傷於七情則傷於神獨參湯或保元湯加神砂麝香門冬歸身若傷於精血則損於膽六味丸加棗仁柴胡皆不易治而失神者尤難取效能保其真者屢有不治而愈若年高及病後或心腎不充者雖治不愈世人但見目盲便呼為青盲者謬甚夫青盲者瞳神不大不小無缺無損仔細視之與好眼一般只是自看不見方為此證若瞳神有何氣色即是內障非青盲也雀盲雀盲俗稱也亦曰雞盲本科曰高風內障至晚不見至曉復明也方書以為木生於亥旺於卯而絶於申至酉戌之時木氣衰甚故不能睹至日出於卯之時木氣稍盛故復明蛤粉丸煮肝散決明夜靈散效後常服六味丸加當歸沙參永保終吉按內經云目得血而能視血虛肝失所養則不能視夜屬陰人之血屬陰陰主靜而惡躁擾陰虛則火必盛弱陰不能勝強火故夜轉劇昏暗而不能睹天明以陽用事陽主動火邪暫開故稍明治以補氣養血為主食以牛豬之肝即愈益見其元氣弱而陰不足也真睛膏損真睛膏損乃熱傷其水以致神膏缺損其狀風輪有證或痕或米厭長短大小不一或米厭小如針刺傷者或米厭大如簪腳刺傷者或痕如指甲刻傷者或風輪周匝有痕長甚者凡有此等皆肝膽絡分有鬱滯熱蒸之甚爍壞神膏之故並宜六味丸加當歸石決明白蒺藜及八珍補中之類急須早治勿使深陷為窟為蟹睛突出為翳滿如冰瑕等患必久服峻補之劑方得水清膏復若治間怠則白暈終身難免膏傷珠陷膏傷珠陷謂珠覺低陷而不鮮綻也非若青黃凸出諸漏之比所致不一有恣色而竭腎水者有嗜辛燥而傷津液者有因風痰濕熱久鬱而蒸損睛膏者有不當出血而誤傷經絡及出血太多以致膏液不得滋潤涵養者有哭損液汁而致者大抵皆元氣弱而膏液不足也治當溫養血氣為主慎不可用清涼之劑凡人目無故而自低陷者死期至矣若外有惡證內損睛膏者不治神水將枯神水將枯視珠外神水乾澀不潤如蜒蚰之光乃火氣鬱蒸膏澤內竭之候凡見此證必成內障若失調理久久瞳神緊小內結雲翳漸成瞽疾蓋瞳神小者肝熱腎虛瞳神大者肝虛腎熱此為肝熱腎虛初起珠頭墜痛大眥微紅猶見三光者六味地黃丸加麥冬五味切忌吹點若小兒素有疳證糞如鴨溏而目疾神將枯者死熱結膀胱證神水將枯者蓋下水熱蒸不清故上亦不清澄其源而流自清矣轆轤轉關目病六氣不和或有風邪所擊腦筋如拽神珠不待轉運而自驀然察上驀然察下下之不能上上之不能下或左或右倏易無時輕則氣定脈偏而珠歪如神珠將反之狀甚則翻轉而為瞳神反背矣治用薑汁調香油摩擦目睥及迎香上星風池風府太陽等穴若暴起者宜用里藥兼升補即愈如神效黃耆湯補中益氣湯並加羌活風熱勢盛通肝散神珠將反神珠將反者謂目珠不正雖欲轉而不能轉乃風熱攻腦筋絡牽急吊偏神珠是以不能運轉甚則其中自聞聒聒有聲如響石膏散通肝散選用血分有滯者目赤腫痛酒煎散加五靈脂失治有反背之患瞳神反背瞳神反背者因風熱搏擊其珠而斜翻轉側通肝散加全蠍鉤藤或黃耆建中加羌活歸身蠍梢虛則神效黃耆補中益氣皆可取用或云即是瞳神發白北人聲韻相似也蓋發白即是內障故宜金針撥之若前所言即神珠將反之暴者非真反背也安有目系內系而能反背之理醫者審之青黃凸出青黃凸出者風輪破碎內中膏汁綻出也有自破而脹出不收者有因外障以寒涼逐退內火外失平治而凸起者縱有妙手不復可救但用皂莢丸入硼砂少許免其米厭凸而已珠中氣動氣動者視瞳神深處有氣一道隱隱嫋嫋而動狀若明鏡遠照一縷清煙也患頭風痰火人郁久火勝則搏擊其絡中之氣遊散飄忽宜以頭風例治之動而定後光冥者內證成矣倒睫拳毛倒睫拳毛者由目緊皮縮所致也久則赤爛神水不清以致障結澀礙淚出之苦人有拔去剪去者有醫以竹板夾起上睥七日連皮脫下者得效雖速殊不知內病未除未幾復倒譬之草木枯槁則枝葉萎垂即朝摘黃葉暮去枯枝徒傷其本不若培益水土則黃者翠而垂者聳矣此證內伏火熱而陰氣外行當瀉其熱眼皮緩則毛自出翳膜亦退用手法扳出內瞼向外速以三稜針出血以左手爪甲迎其鋒立愈又目眶赤爛亦當以三稜針刺目眶瀉其濕熱後服防風飲子搐鼻碧雲散亦宜兼用起倒睫法以木鱉一枚為末綿裹塞鼻中左塞右右塞左一夜其毛自直若內邊另出一層短毛撩於珠上者鑷去以蝨血塗則不復生矣睥急緊小睥急緊小謂眼楞緊縮乃倒睫拳毛之漸也若不因治而漸自縮小者乃膏血津液澀耗筋脈緊急之故若因治而急小者多因睥寬倒睫屢次夾去上睥失於內治或不當割導而頻數開導致血液耗而緊小者當乘時滋養神效黃耆湯小角偏緊去陳皮加連翹生地當歸若絡定氣滯雖治不復愈矣樓全善云陽虛則眼楞緊急陰虛則瞳子散大故東垣治眼楞緊急用參耆補氣為君佐以辛味疏散之而忌芍藥五味之類酸收故也治瞳子散大用地黃補血為君佐以酸味收斂之而忌茺蔚子青葙子之類辛散故也睥肉黏輪目內睥之肉與氣輪相黏不開宜服瀉濕熱藥如防風細辛膽草苦參蠍梢牛蒡子之類以風藥能於土中瀉水故也胞肉膠黏證兩睥黏閉夜臥尤甚必得潤而後可開其病重在脾肺濕熱當以清涼滋潤為主雖有障在珠亦是濕熱內滯之故非障之愆久而不治則有瘡爛之變睥翻黏瞼證乃睥翻轉貼在外瞼之上此氣滯血壅於內皮急系吊於外故不能復轉皆由風濕之滯所致故風疾人患此者多宜用鐮剔開導之法風牽出瞼證乃脾胃受風毒之證瞼受風而皮緊睥受風而肉壅淚出水漬於瞼而濕爛此土陷不能堤水也治法先用香油調薑汁粉摩散風邪翻轉瞼皮烙三五度若眼有紅筋貫上黑睛有翳膜者吹以丹藥喎斜者灸頰車耳門開口取之太陽人中承漿喎右灸左喎左灸右近患者易退年久者難愈又大風人面部所牽多受是病難以調治血瘀睥泛謂睥內之肉紫瘀浮泛甚則如細泡無數相連成片蓋睥絡血滯又不忌火毒燥膩致積而不散或碎睥出血冒風所致宜活血為主並用開導睥虛如球謂目睥浮腫如球也以兩手掌擦熱拭之少平頃復如故可見其血不足而虛火壅於氣分也補中益氣湯去升麻加葛根木通澤瀉風沿爛眼風沿眼系上膈有積熱自飲食中挾怒氣而成頑痰痞塞濁氣不降清氣不升由是火益熾而水益降積而久也眼沿因膿積而腫於中生細小蟲絲遂年久不愈而多癢者是也服柴胡飲子點蕤仁膏迎風赤爛證目不論何風見之則赤爛無風則痞蓋赤者木中火證爛者土之濕證此專言見風赤爛之患與後見風淚出諸證不同川芎茶調散眥赤爛證謂目爛惟眥有之目無別病也赤勝爛者多火乃勞心憂鬱忿悖無形之火所傷爛勝赤者濕多乃恣燥嗜酒風熱熏蒸有形之濕所傷病屬心絡甚則火盛水不清而生瘡於眥邊也洗肝散加麻黃蒺藜川連並用赤芍防風五倍子川連煎湯入鹽輕粉少許洗之點用爐甘石散及晚蠶砂香油浸月餘重綿濾過點之目淚不止經云風氣與陽明入胃循脈而上至目內眥其人肥則風氣不得外泄則為熱中而目黃人瘦則外泄而寒則為寒中而泣出其目黃屬熱淚出屬寒也明矣東垣云水乘木勢上為眼澀為眵為冷淚此皆由肺金之虛而肝木寡於畏也凡目見西北二風則澀痛淚出乃肝虛受克之病止淚補肝散並灸睛明二穴見東南二風則澀痛淚出乃肝自病菊花散若不論何風見則流冷淚者乃肝腎經中有伏飲血液不足竅虛風入因邪引邪之患夜光椒紅丸或四物換赤芍生地加防風肉桂羌活木賊又不論何風見則流熱淚乃肝腎經中有伏火虛竅不密因風引出其淚川芎茶調散菊花散選用龐安常云頭風冷淚用菊花決明白朮白芷細辛羌活荊芥煎服並洗若目不赤不痛別無病苦不因見風亦時常流出冷淚甚則視而昏眇乃肝膽氣弱腎水不足八味丸用椒制地黃加芎歸産後悲泣太過者十全大補加川椒細辛若熱淚不時常流乃內火激動其水因肝腎精血耗竭陽火易動而傷其液也六味丸加川椒制熟地倍丹皮哭泣太傷者八珍湯加川椒五味又肺臟久冷不時冷淚積於淚堂此淚通於肺難治久流令人目昏又有睥內如痰白稠膩甚拭之即有者是痰火上壅脾肺濕熱所致故好酒嗜燥悖郁者每患此疾逍遙散去柴胡陳皮加羌防菊花若覺睥腫及有絲脈虯赤者必滯入血分防瘀血灌睛等變目瘡疣實熱生瘡有痛癢輕重不同重則堆積高厚紫血膿爛而腥臭如瘀滯之證膏溷水濁每每流於睥眥成瘡血散而瘡自除別無痛腫證者輕而無妨若火盛瘡生堆重帶腫痛者又當急治恐濁氣沿入而病及於珠也治宜瀉心火解熱毒有瘡處仍用開導洗點椒瘡生於睥內纍纍如椒紅而堅者是也有則砂擦難開多淚而痛今人皆呼為粟瘡誤矣粟瘡亦生在睥但色黃軟而易散此則堅而難散醫者卒以龍鬚出血取效甚則纍纍連片疙瘩不平不得已而導中病即止若退而復來者乃內有瘀滯必須再導更服祛風熱藥以治其內粟瘡生於兩睥細顆黃而軟若目病頭疼者必有變證是濕熱鬱於土分須服退濕熱藥若睥生痰核者乃痰因火滯而結生於上睥者多屢有不治自愈有恣嗜辛辣熱毒酒色斫喪之人久而變為癭漏重疾者有之五疳證木疳證生於風輪者多其色藍緑青碧有虛實之別虛者大而昏花實者小而澀痛非比蟹睛因破而出乃自然生者大小不一隨其變長也實者瀉青丸虛者通肝散火疳證生於睥眥及氣輪在氣輪者火邪剋金為害尤急初起如椒瘡瘤子一顆小而圓如小赤豆次後漸大痛者多不痛者少不可誤認作輪上一顆如赤豆為易消之證此則從內而生也三黃湯導赤散分虛實治之土疳證謂睥上生毒俗呼偷針眼有一目生又一目者有止生一目者有邪微不出膿血而愈者有犯辛熱燥膩風沙煙火為漏為吊者瀉黃散初起以鬃入大眥內邊淚堂竅中捻之淚出即消無不立愈金疳證初起與玉粒相似生於睥內必礙珠澀痛以生障翳生於氣輪者則有珠痛淚流之苦子後午前陽分氣升之時則重午後入陰分則病略寧久而失治違戒反觸者有變漏之患瀉肺湯水疳證忽然一珠生於睥眥氣輪之間者多若在風輪目必破損有虛實大小之殊實者小而痛甚虛者大而痛緩狀如黑豆亦有橫長而圓者頭風人多有此患清空膏神芎丸選用此證與木疳相似但部分稍異色亦不同黑者屬水青緑藍碧者屬木久而失治必變為漏以風鬱久勝精膏走散隨其所傷之絡結滯為疳濕熱相搏而為漏矣漏睛漏睛者眥頭結聚生瘡流出膿汁或如涎水黏睛上下不痛仍無翳膜此因風濕停留瞼中所致久而不治致有烏珠墜落之患大眥漏證大眥之間生一漏時流血水紫暈腫脹而痛病在心火實毒金花丸加羌活蠍尾小眥漏證小眥間生一漏時流血色鮮紅病由心胞絡而來相火橫行之候導亦散加透風清熱藥陰漏證不論何部生漏但從黃昏至天曉則痛脹流水作青黑色或腥臭不可聞日間則稍可乃幽陰中有伏火為患四物加細辛香附連翹之類陽漏證不論何部生漏但日間脹痛流水其色黃赤遇夜則稍可乃陽絡中有濕熱留著所致人參漏蘆散去當歸加羌防生甘草正漏證生於風輪或正中或略偏為肝腎風熱伏陷所致若初發破淺則流出如痰白膏日久而深則流出青黑膏汁瞳神已損急用瀉肝藥如龍膽羌活生地大黃之類下奪之偏漏證生於氣輪痰濕流於肺經而成較正漏為害稍遲其流如稠黏白水重則流膿急用瀉肺藥如貝母桔梗桑皮生甘草黃芩山梔之類涼解之久而失治水泄膏枯目亦損矣外漏證生於兩睥之外或流稠膿或流臭水脹痛則流出不脹則略止先與人參漏蘆散後用千金托裡散加蔥白竅漏證乃目傍竅中流出薄稠水如膿腥臭拭之即有久則目亦模糊也嗜燥耽酒痰火濕熱者每多患此竹葉瀉經湯千金托裡散先後收功久不治亦有暗傷神水耗損神膏之患不能近視東垣云能遠視不能近視者陽氣有餘陰氣不足少年窮役眼神所致也海藏云目能遠視知其有火不能近視責其無水法當補腎加減地芝丸或六味丸加減祕要云陰精不足陽光有餘病於水者故光華髮見散亂而不能收斂近視治之在心腎若貪淫恣欲飢飽失節形體甚勞過於悲泣皆斫喪陰精精虧則陽火盛火性炎而發見陰精不能制伏挽回故越於外而遠照不收治之而反觸激者有內障之患不能遠視東垣云能近視不能遠視者陽氣不足陰氣有餘此老人桑榆之象也海藏云目能近視知其有水不能遠視責其無火治當補心加味定志丸八味丸早暮間服祕要云此證非謂稟受生成近覷之病乃平昔無病素能遠視而忽然不能者也蓋陽不足陰有餘病於火者故光華不能發越於外而偎斂近視耳治之在膽腎若耽酒嗜燥頭風痰火忿怒暴悖者必傷損神氣陰陽偏勝而光華不能發達矣目妄見素問云夫精明者所以視萬物別黑白審長短以長為短以白為黑如是則精衰矣人之目者心之使也心者神之舍也故精神亂而不轉卒然見非常處精神魂魄散不相得故曰惑也如神光自見則每如電閃黑夜精明則晦冥之中倏忽見物視正反邪則物本正而目見為邪視定反動則物本定而目見為動視物顛倒則觀物皆振動倒植視一為二則一物而目視為二視瞻有色則常見螢星雲霧及大片青緑藍碧之色視赤如白則視物卻非本色或視粉牆如紅如碧或看黃紙似緑似藍之類光華暈大則視日與燈燭皆生紅暈而大此陰精虧損陽光飛越之候總補養為主如加減駐景丸益氣聰明湯之類久而不治不無內障之虞報國澄和尚患眼疾二年服祛風清熱藥過多致耳鳴嘈嘈不止大便常苦燥結近來左眼上有微翳見燈火則大如斗視月光則小如螢嘗詢諸方家俱莫能解因以質之石頑石頑曰此水虧而陰火用事也試以格物之理參之如西洋玻璃眼鏡人但知宜於老人不知原為望氣者而設其最精者咸以十二鏡編十二支為一套無論老少其間必有一者能察秋毫則知人眼有十二種偏勝故造眼鏡者亦以十二等鉛料配之取鉛以助陰精料以助陽氣也少年氣血本旺原無藉此若鉛料之輕重與眼之偏勝不相當則得之反加障礙矣老人氣血皆衰但藉此以籠住其光不使散漫不必論其鉛料之孰重孰輕也即如所言視月甚小者月乃至陰之精真水內涸不能泛濫其光所以視之甚小設加之以鉛重者則視月必大矣見燈火甚大者燈本燃膏之焰專擾乎陰不能勝其灼爍所以見之甚大設加之以料重者燈火必愈大矣合脈參證知為平昔勞傷心脾火土二臟過燥並傷腎水真陰也遂疏天王補心丹與之他如中翰徐燕及見日光則昏眯如蒙見燈火則精彩倍常此平昔恆勞心腎上盛下虛所致蓋上盛則五志聚於心包暗侮其君如權黨在位矇蔽九重下虛則相火失職不能司明察之令得燈燭相助其力是以精彩勝於常時此與嬰兒胎寒夜啼見火則止之義不殊未識專事眼科者能悉此義否目閉不開足太陽之筋為目上綱足陽明之筋為目下綱熱則筋縱目不開助陽和血湯然又有濕熱所遏者則目胞微腫升陽除濕防風湯真陽不能上升者則喜暖怕亮補中益氣湯肝虛者則閉目不欲見人金匱腎氣丸各求其本而治之目為物所傷被物撞損者或打跌撞破傷胞瞼也積血紫青撞破白仁傷其硬殼此不為害惟撞破黃仁風輪血灌瞳神與水輪混雜是為利害或雖不破而淚多苦如柏汁者難治急宜酒煎散去防己牛蒡加羌活木賊尉以蔥艾護以清涼膏或專以生地黃搗爛作餅烘熱貼太陽穴及眼胞上一日一換以散其血如無生地黃用芙蓉葉搗爛烘貼乾者用雞子清調之若眼眶青黑搗生萊蔔護貼切宜避風忌口痛甚酒煎散加沒藥漸生翳障者犀角地黃湯換赤芍加大黃當歸柴胡連翹甘草若至血散變生白翳不痛為不治也驚振外障證目被物撞觸而結為外障也與傷在膏上急者不同初撞目時亦有珠疼澀脹之苦為其傷輕而瘀自潛消故痛雖止而不戒禁有所觸發其火致水不清氣滯絡澀而生外障者神消散去蒼朮加石決明兼皂莢丸凡外障結而珠疼致頭疼及腫脹者皆是惡證防變急宜治之驚振內障證因病目再被撞打變成內障日夜疼痛淹淹障生赤膜繞目不能視三光亦如久病內障皂莢丸合生熟地黃丸物損真睛證謂被物觸打在風輪傷有大小色有黃白黃者害速白者稍遲若觸膏及破者必有膏汁或青黑或白如痰者流出為患最急縱然急治瞳神雖在亦難免欹側之患如草木刺金石屑苗葉尖針尖觸在風輪必曉夜疼痛難當急宜取出遲則結成黃白顆如粟瘡銀星之狀緑膏水結滯而障生先去物而治障若傷在氣輪皮內取遲者必有瘀血灌睛取去物而先導之後治餘證若視昏者瞳神有大小欹側之患久而失治目必枯凸大凡此病不論大小黃白但有淚流赤脹等證者急而有變珠疼頭重者尤急素有風熱痰火斫喪之人病已內積因外傷激動其邪乘此為害痛甚便澀者最凶飛絲入目證謂風揚遊絲偶然觸入目中而作痛也若野蠶蜘蛛木蟲之絲患尚遲若遇金蠶老鸛絲其目不出三日迸裂治飛絲入目方用頭垢點入眼中柘樹漿點過線裹箸頭蘸水於眼上繳拭涎毒火麻子一合杵碎井水一碗浸攪卻將舌浸水中涎沫自出神效一方用茄子葉碎杵如麻子法亦妙飛絲入目目脹如眯痛澀不開鼻流清涕用京墨濃磨以新筆塗入目中閉少時以手張開其絲自成一塊看在眼白上用綿輕輕卷下未盡再塗物偶入睛證謂偶然被物落在目中而痛也切不可乘躁便擦須按住性待淚來滿而擦則物潤而易出如物性重及有芒刺而不能出者急令人取出不可揉擦擦則物愈深入而難取至若入深輕翻上睥取之不取則轉運阻礙氣滯血凝而病變芒刺金石稜角之物失取礙久及擦重者則壞損輪膏如痕米厭凝脂等病輕則血瘀水滯為痛為障等病有終不得出而結於睥內者必須翻之尋看因其證而治之眯目飛揚證因出行間風吹沙土入目頻多揩拭以致氣血凝滯而為病初起淚出急澀漸重結為障翳常辨形證施治初起將綿卷簪腳捻撥出塵物久者翻轉睥瞼看有積處鐮洗至平不須吹點物落眼中用新筆蘸繳出治稻麥芒入眼取蠐螬以新布覆目上待蠐螬從布上摩之其芒出著布上又法以鴨倒懸取涎滴入目中其芒自出傷寒愈後之病傷寒病愈後或有目復大病者以其清陽之氣不升餘邪上走空竅也其病癮澀赤脹生翳羞明頭腦骨痛當助清陽上出則愈最忌大黃芒硝苦寒通利犯之不可復治經逆赤腫女人逆經血灌瞳神滿眼赤澀者乃血熱經閉過期不行則血逆行於上如有胬肉切不可鉤割只用四物加行氣破血通經藥經行則血翳自退勢甚必加酒大黃下奪其勢去火所以存陰正為肝虛血少不得不以退火為急務火不下奪則凌爍真陰陽愈亢而陰愈竭矣人但如四物之補血孰知大黃為補血哉若因其虛而用補藥非徒無益真是抱薪救焚矣妊娠目病妊娠目病須分氣分血分氣分則有旋臚泛起瞳神散大等證血分則有瘀血凝脂等病蓋其陰陽澀滯與常人不同內伐恐傷胎泄氣不伐則病又不除然必善施內護外劫之法則百發百中矣産後目病産則百脈皆動邪易以乘肝部發生之氣甚弱而膽失滋養精汁不盛則目中膏液皆失化源所以目病者多皆內不足所致大抵産後病宜早治莫待其久久則氣血定而病深治亦不易其外證易知者人皆知害而早治其內證害緩者人多忽之比其成也悔無及矣痘疹餘毒證痘瘡入眼其痘瘡初生眼閉不開眼上即有痘瘡點在黑暗上者急取益母草煎湯熏洗日三度更以鱔血點之忌口及夜啼乳母亦忌口須痘瘡痊可其眼漸開眼中之痘亦愈矣初起痘瘡入眼決明散密蒙散痘瘡入眼成翳者穀精散神功散選用丹方用望月砂末生雞肝研爛飯上蒸熟每日空心食之效大抵治之早則易退而無變遲則退遲今人但見痘後目疾便謂不治不知但瞳神不損者縱久遠亦有可治之理惟久而血定精凝障翳沉滑澀損者為不治耳倪仲賢云斑疹餘毒所害者與風熱不制之病稍同而異總似羚羊散主之便不硬者減硝黃未滿二十一日而病者當消毒化斑為主斑後風熱翳膜氣暈遮睛瀉青丸瀉之大效痘疹瘡痂落盡肌體肥壯眼中忽然紅色乃餘毒鬱結而發出此證最劇失治多能害目只用車前草擂水頻頻灌之滌卻肝經之熱毒洗以益母草點以鱔魚血胎風赤爛證此證有三一為血露入眼洗不乾淨而赤爛生萊蔔搗汁點之一為在母腹中時其母多食壅毒辛熱生後百日而赤爛犀角地黃湯加黃連母子俱服一為乳母壯盛乳頭脹滿乳汁灑射兒眼中而赤爛黃連湯拭淨一味煅過爐甘石吹點小兒疳眼證皆由過食傷脾腹脹午後發熱至夜方退日久發稀作瀉瀉甚則渴食積發熱既久則肝膽受傷白仁紅色漸生翳膜遮滿黑珠突起如黑豆如香菰之狀決明雞肝散或羊肝蘸夜明砂食或緑礬一兩饅頭去餡裹煨外黑盡內通紅取出用密陀僧煅夜明砂等分為末煮棗肉搗丸黍米大每服二三十丸量兒大小空心米湯下切宜忌口膜用人乳頻點自去若至聲啞口乾腳手俱腫十難救一因風證因風者謂患風人病目也風在五行為木在臟為肝在竅為目本乎一氣故患風人未有目不病者然必因其故而發有日淺而鬱未深為偏喎歪斜者有入脾而睥反濕勝赤爛者有血虛筋弱而振搐者有不禁而反傷精神及恣燥嗜熱蘊鬱而為內障者有風盛血滯結為外障如胬肉等證者各因其證而伐其本內外治法不同大抵風病目者當去風為先風不去目病終無不發之理因毒證因毒者謂人生瘡瘍腫毒纍及目病也若病目在病毒之時治毒愈而目亦愈若毒愈而目不愈者乃邪入至高之深處難以自退當浚其本澄其源因而觸激甚者有瘀滯之變因他證因他證而害及目所致不同如傷寒陽證熱鬱蒸損瞳神內證也熱盛血滯赤痛淚澀者外證也陰證脫陽目盲內證也服薑附溫熱之劑多而火燥赤澀者外證也瘧疾之熱損瞳神內證也火滯於血而赤澀外證也瀉利後昏眇為穀氣乏氣傷不能發生內證也山嵐瘴氣目昏者邪氣矇蔽正氣外證也蠱脹中滿赤痛者陰虛難制陽邪內證也氣證多郁弱證多昏花皆內證也痰證之膩沫火證之赤澀皆外證也當尋其源而治之時復證目病不治忍待自愈或失其宜有犯禁戒傷其脈絡遂至深入又不治之致搏夾不得發散至其年月如期而發當驗其形證絲脈別何部分然後治之七竅門下耳耳鳴耳腫痛耳疹耳中癢耳膿耵聹蟲入耳中經云腎氣通於耳腎和則耳能聞五音矣狥蒙招尤目冥耳聾下虛上實過在足少陽厥陰甚則入肝所謂耳鳴者陽氣萬物盛上而躍故耳鳴也所謂浮為聾者皆在氣也趙以德曰耳者腎之竅足少陰經之所主然心亦寄竅於耳在十二經脈中除足太陽手厥陰外其餘十經脈絡皆入於耳中蓋腎治內之陰心治外之陽合天地之道精氣無不變通故清淨精明之氣上走空竅耳受之而聽斯聰矣靈樞云腎氣通於耳腎和則耳聞五音矣五臟不和則七竅不通故凡一經一絡有虛實之氣入於耳中者皆足以亂主竅之精明而兼至聾聵此言暴病者也若夫久聾者於腎亦有虛實之異左腎為陰主精右腎為陽主氣精不足氣有餘則聾為虛其人瘦而色黑筋骨健壯此精氣俱有餘固藏閉塞是聾為實乃高壽之兆也此皆稟賦使然不須治之又有乍聾者經云不知調陰陽七損八益之道早喪之節也其年五十體重耳目不聰明矣此亦無治也惟暴聾之病與陰陽隔絶之未甚經脈欲行而未通衝擊其中鼓動聽戶隨其氣之微甚而作嘈嘈風雨諸聲者則可隨其邪以為治外此又有耳觸風邪與氣相擊其聲嘈嘈眼如見火謂之虛鳴熱氣乘虛隨脈入耳聚熱不散膿汁出焉謂之膿耳人耳間有津液輕則不能為害若風熱搏之津液結硬成核塞耳亦令暴聾謂之耵耳前是數者腎脈可推風則浮而盛熱則洪而實虛則澀而濡風為之疏散熱為之疏利虛為之調養邪氣並退然後以通脈調氣安腎之劑治之羅謙甫云夫暴聾者由腎虛風邪所乘搏於經絡隨其血脈上入耳正氣與邪氣相搏故卒聾也風虛耳聾排風湯桂辛散腎臟風虛黃耆丸兼氣虛去附子加肉桂人參肝腎虛火姜蠍散風熱耳聾犀角飲子厥聾經云暴厥而聾偏閉塞不通內氣暴薄也復元通氣散去白牽牛加全蠍石菖蒲川芎生薑蔥白吞養正丹凡治耳聾皆當調氣肝氣逆則頭痛耳聾頰腫四物湯加肉桂吞龍薈丸降火及復元通氣散調氣耳聾有濕痰者滾痰丸下之耳聾面頰黑者為精脫腎虛燒腎散耳聾多恐者為肝虛溫膽湯下養正丹外治用通神散萆麻丸一方用地龍三枚鹽少許同入蔥管內化水滴耳中三五日效一法用磁石豆大一塊鯪鯉甲三片燒存性綿裹塞耳中口銜生鐵少許覺耳中如風雨聲即愈耳鳴經云耳者宗脈之所聚也故胃中空則宗脈虛虛則下溜脈有所竭故耳鳴又云液脫者腦髓消筋酸耳數鳴凡此皆耳鳴之屬虛者也經云太陽所謂耳鳴者陽氣萬物盛上而躍故耳鳴也又云厥陰之脈耳鳴頭眩又云少陽所至為耳鳴治以涼寒凡此皆耳鳴之屬實者也王汝明曰耳鳴如蟬或左或右或時閉塞世人多作腎虛治不效殊不知此是痰火上升鬱於耳中而鳴郁甚則閉塞矣若平昔飲酒厚味上焦素有痰火清痰降火為主大抵此證先因痰火在上又感惱怒而得怒則氣上少陽之火客於耳也若腎虛而鳴者其鳴不甚其人多欲當見虛勞等證喻嘉言曰凡治高年腎氣逆上而耳鳴當以磁石為主以其重能達下但性主下吸不能制肝木之上吸更以地黃龜膠群陰之藥輔之五味山萸之酸以收之令陰氣自旺於本宮不上觸於陽竅由是空曠無礙豈更艱於遠聽哉丹溪取通聖散治飲酒過度而耳鳴亦無確見惟滾痰丸一方少壯用之多效以黃芩大黃沉香之苦最能下氣礞石之重墜大約與磁石相仿也薛立齊云若血虛有火用四物加山梔柴胡若中氣虛弱補中益氣加山梔丹皮若因怒便聾而或耳鳴屬肝膽氣實小柴胡加芎歸山梔若午前甚者陽氣實熱也小柴胡加黃連山梔午後甚者陰血虛也四物加白朮茯苓若腎虛火動耳中哄哄然是無陰也加減八味丸腎虛耳中潮聲蟬聲無休止時妨害聽聞者當墜氣補腎正元散下黑錫丹間進安腎丸腎臟虛風耳鳴夜間睡著如擂戰鼓四肢掣痛耳內覺有風吹奇癢黃耆丸四生散選用耳腫痛屬少陽相火犀角飲子加腦麝為丸經云少陽之勝耳痛治以辛寒是也耳內痛生瘡用鼠黏子連翹歸芍芩連甘桔生地桃仁黃耆柴胡草龍膽之類耳濕腫痛用涼膈散加羌防荊芥外用龍骨黃丹等分枯礬減半加麝少許吹入或龍骨黃丹干胭脂為末亦佳或用五倍子燒灰同枯礬吹之耳疹耳疹屬少陽三焦或足厥陰肝經血虛風熱或怒動肝火而致若發熱焮痛屬三焦厥陰風熱用柴胡清肝散梔子清肝散之類慎不可專治其外復傷氣血也有因腎虛風熱作癢挖傷成瘡者六味丸加白蒺藜耳中癢腎家有風四生散每作時服二三劑即瘥耳膿者濕熱聚於耳中也復元通氣散如前加減外以五倍子全蠍枯礬為末入麝少許吹入或橘皮燒灰存性入麝少許先以綿拭耳內膿淨吹之如壯盛之人積熱上攻耳中出膿水不瘥涼膈散瀉之耳中耵聹耳鳴耳聾內有汙血外用萊蔔搗汁研麝少許滴入余法與耳聾相參治之蟲入耳中將生薑擦貓鼻其尿即出取尿滴耳中蟲即出或用炒芝麻枕之蟲亦出耳中有物不可出以弓弦或錢串繩剪令頭散蘸好膠著耳中使其物黏之徐徐引出效薛立齊治一男子每交接耳中癢痛或水出以銀簪探之甚喜陰涼此腎經虛火用加減八味丸而愈又治一婦因怒發每經行兩耳出膿兩太陽作痛以手按之痛稍止怒則胸脅乳房脹痛或寒熱往來小便頻數或小腹脹悶皆屬肝火血虛加味逍遙散十劑諸證悉退以補中益氣加五味而痊鼻鼻齆鼻鼽鼻淵鼻瘜肉鼻瘡鼻疳蝕鼻痛鼻赤鼻紫黑經曰肺開竅於鼻肺氣通於鼻肺和則鼻能知臭香矣五氣入臭藏於心肺心肺有病而臭為之不利也西方白色入通於肺開竅於鼻藏精於肺肺主臭在藏為肺在竅為鼻陽明之脈挾鼻絡目膽移熱於腦則辛頞鼻淵經云其宗氣走於鼻而為臭夫宗氣者胃中生髮之氣也因飢飽勞役損其脾胃則營運之氣不能上升邪塞孔竅故鼻不利而不聞香臭也麗澤通氣湯時值寒月必須發散或加麻黃細辛之類於升麻湯內春夏可用蔥白白芷之屬佐以枯芩蘇葉多加桔梗為舟楫庶或成功已經發散未得全開脈洪有力口乾鼻燥者君以辛涼清之酒芩梔子薄荷之屬仍佐荊防升芷不可驟用寒涼也丹溪云鼻為肺竅肺家有病而鼻為之不利也有寒有熱暴起為寒久郁成熱寒傷皮毛氣不得利而壅塞熱壅清道氣不宣通先以蔥白白芷香豉羌防紫蘇細辛辛荑之屬表散後以酒炒芩連薑汁炒黑山梔生甘草石膏薄荷川椒之屬清火自愈近世以辛荑仁治鼻塞不聞香臭無問新久寒熱一概用之殊不知肺胃陽氣虛衰不能上透於腦致濁陰之氣上干清陽之位而窒塞者固宜辛荑之辛溫香竄以通達之若濕熱上蒸蘊釀為火而窒塞者非山梔仁之輕浮清燥不能開發也至於風寒暴窒重則麗澤通氣輕則蔥白香豉細辛羌活薄荷荊芥之屬隨寒熱輕重而施可不審權度而混治哉王汝言曰鼻塞不聞香臭或遇冬月多塞或略感風寒便塞不時舉發者世俗皆以為肺寒而用解表通利辛溫之藥不效殊不知此是肺經素有火邪火鬱甚故遇寒便塞遇感便發也治當清肺降火為主而佐以通利之劑若如常鼻塞不聞香臭者再審其平素只作肺熱治之清金瀉火消痰或丸藥噙化或末藥輕調緩服久服無不效也若其平素原無鼻塞舊證一時偶感風寒而致窒塞聲重或流清涕者作風寒治薛立齊云前證若因飢飽勞役所傷脾胃生髮之氣不能上升邪害孔竅故不利而不聞香臭宜養脾胃使陽氣上行則鼻通矣補中益氣加辛荑山梔鼻齆肺氣注於鼻上榮頭面若風寒客於頭腦則氣不通久而鬱熱搏於津液濃涕結聚則鼻不聞香臭遂成齆芎藭散外用千金搐鼻法或瓜蒂黃連赤小豆為散入龍腦少許吹鼻中水出鬱火即通不應非火也乃濕也瓜蒂藜蘆皂莢為散入麝腦少許吹鼻中去水以散其濕鼻鼽鼻出清涕也風寒傷皮毛則腠理鬱閉宜疏風清肺香蘇散加川芎蜀椒細辛辣桂訶子不應非風也乃寒也辛夷散去木通防風升麻藁本加桂附蔓荊訶子白朮如血與涕俱出謂之鼽衄宜和營降火當歸內補建中湯加香豉童便最捷後以六味合生脈調之鼻塞腦冷清涕出千金通草辛荑搐鼻法鼽鼻鼻中瘜肉不得息用礬石藜蘆散吹之鼻淵鼻出濁涕即今之腦漏是也經云膽移熱於腦則辛頞鼻淵傳為衄衊瞑目要皆陽明伏火所致宜風藥散之辛荑散加蒼耳薄荷夏月加黃芩石膏不應非火也膈上有濁痰濕熱也雙解散加辛荑鼻淵鼻鼽當寒熱若涕濃而臭者為淵屬熱清涼之藥散之若涕清而不臭者為鼽屬虛寒辛溫之劑調之鼻中時時流臭黃水甚者腦亦時痛俗名控腦砂用絲瓜藤近根三五尺許燒存性為細末酒調服即愈鼻淵腦漏用生附子為末煨蔥涎和如泥夜間塗湧泉穴一方以老少年陰乾有嘴壺內燒煙以壺嘴向鼻熏之左漏熏右右漏熏左一方以石首魚腦煅過和生白礬腦麝搐之一法用白鯗頭一枚炙燥為末放火在有嘴壺內蓋好以嘴向鼻吸烟熏之分七日熏燒完即愈鼻瘜肉上焦積熱鬱久而生有諸中而形諸外必內服清火利膈藥宜涼膈散加減須斷酒厚味韓氏云富貴人鼻中肉贅臭不可近痛不可搖束手待斃者但以白礬末加阿魏腦麝少許吹其上頃之化水而消內服勝濕瀉肺之藥此厚味擁熱蒸於肺門如雨霽之地突生芝菌也瘜肉與鼻痔大同小異痛極而不下垂者為瘜肉此血熱勝也阿魏為血積之嚮導白礬為滌垢之專藥兼腦麝以開結利竅也鼻痔則有物下垂而不痛乃濕熱勝也胃中有食積熱痰流注內服星半蒼朮酒洗芩連神麯辛荑細辛白芷甘草消痰積之藥外用膽礬枯礬辛荑仁細辛杏仁為散入腦麝少許雄黑狗膽或豬脂和研綿裹內鼻中頻換自消鼻中生瘡用雄黃白礬瓜蒂細辛為散搐鼻若鼻中窒塞不通用苦丁香母丁香赤小豆為散吹鼻中皆外治良法也鼻瘡內服甘露飲加犀角胡連柴胡虛加人參外用黃柏苦參檳榔為末豬脂調敷或青黛槐花杏仁輕粉枯礬研敷鼻疳蝕內用椿根蔥白豆豉川椒以清泔水三升和醋一杯煎成入鹽少許服有惡物下即效外用草烏燒灰麝香等分研極細以少許敷瘡上鼻乾無涕宜犀角黃耆木通杏仁麥冬炙甘草升麻葛根桑皮石膏硃砂積熱加牙硝大黃鼻痛風火鬱於上則痛初宜升麻葛根蔥白白芷散之有氣道壅塞而痛宜川芎葛根甘草苦梗山梔薄荷薑棗蔥白痛久服藥不應時痛劇時向安或兼兩顴紫赤此為濕熱瘀滯宜犀角玄參連翹山梔丹皮赤芍生甘草之類肺受風面枯色頰時赤皮膚乾燥鼻塞干痛此為虛風白鮮皮麥冬茯苓杏仁桑皮白芷細辛石膏煎服卒食物從鼻中縮入腦中介介痛不出以牛脂或羊脂如指大納鼻中以鼻吸取脂入須臾脂消則物隨脂俱出也鼻赤俗名酒齄鼻乃血熱入鼻也多飲酒人邪熱熏蒸肺竅伏留不散故見於鼻或肺素有風熱雖不飲酒其鼻亦赤也宜用枇杷葉拭去毛生煎濃湯候冷調消風散食後臨臥服或服瀉青丸或同薑汁炒黑山梔杏仁泥等分蜜丸服之並用白鹽時時擦之外治以生白礬硫黃玄明粉等分為散入麝少許擦之或用硫黃輕粉杏仁為散臨臥時以津唾調塗鼻上或用硫黃入大菜頭內煨碾塗之或用生礬研末每洗面時置掌中滴酒擦患處數日即白或用硫黃一兩輕粉白礬各五分為末用燒酒一碗入酒壺將藥盛絹囊中懸空壺內熱湯浸壺慢火燉一二時取出放冷日用燒酒塗夜用沉底藥末敷鼻紫黑諸陽皆聚於頭則面為陽中之陽鼻居面之中央而陽明起於頞中為至清至精之分多酒之人酒氣熏蒸面鼻得酒血為極熱熱血得冷為陰所搏結滯不行故先紫後黑當用山梔仁薑汁浸炒黑二兩入乾薑炮黑二錢連翹仁一兩為末蜜丸臨臥燈心湯服二錢半以清肺家血中之熱也江應宿治一人鼻塞氣不通利濁涕稠黏屢藥不效已經三年其脈兩寸浮數曰此火鬱也患者曰向作腦寒主治子何懸絶經云諸氣膹郁皆屬於肺越人云肺熱甚則出涕乃熱鬱滯氣壅塞不通也投以升陽散火湯數劑而病如失口口者脾之所主胃與大腸脈之所挾經云脾氣通於口脾和則口能知五味矣此脾之主於口也又云胃足陽明之脈挾口下交承漿又云大腸手陽明之脈挾口交人中此胃與大腸之脈挾於口也脾熱則口甘肝熱則口酸心熱則口苦肺熱則口辛腎熱則口咸胃熱則口淡口甘經云有病口甘者此五臟之溢也名曰脾疸治之以蘭除陳氣也蘭香飲子若脈弦滑兼嘈雜屬痰火滾痰丸此指實火而言平人口甘欲渴或小便亦甜而濁俱屬土中濕熱脾津上乘久之必發癰疽須斷厚味氣惱服三黃湯加蘭葉白芍生地燥渴甚者為腎虛日服加減八味丸可保無虞中消脾液上乘口甘者蘭香飲子老人虛人脾胃虛熱不能收斂津液而口甘者當滋補脾氣補中益氣去升柴加蘭香煨葛根口苦經云有病口苦名曰膽疸夫膽者中精之府五臟取決於膽咽為之使此人數謀慮不決故膽虛氣上溢而口為之苦也龍膽瀉肝湯或小柴胡加麥冬棗仁不應本方加川連膽草口酸肝膽實熱也佐金丸加神麯草龍膽口辛肺氣上溢也生脈散加桑皮地骨皮黃芩口咸腎液上乘也六味地黃丸加五味烏鰂骨口淡為胃熱而有虛實實則甘露飲加廣藿香病後胃虛口淡六君子加黃耆當歸口澀肝邪逆於肺氣虛火旺也黃芩葛根防風薄荷栝蔞茯苓口瘡經云膀胱遺熱於小腸膈腸不便上為口糜蓋小腸者心之府也此舉邪熱之一端耳心屬君火主五臟六腑之火故諸經之熱皆應於心心脈布舌上脾脈布舌下二經之火為病皆當用寒涼施治但有涎者兼取其涎若元藏虛冷上攻頭熱足冷口瘡用附子理中湯連理湯並用當歸附子蜜煎含咽有用生附子末塗腳心者若此之類皆是治龍火之法陰邪上迫心肺之陽不得下降故用溫熱主治或散於上或散於下隨其攸利胃中有熱脈洪大而實者服涼膈散金花丸並用黃柏一味蜜炙含之忌犯酒醋犯之難愈又好飲酒人多有此證易老用五苓散導赤散相和治之服涼藥不愈者此酒色過度勞役不睡舌上光滑而無皮或因憂思損傷中氣虛火泛上無制必用理中湯甚者加附子並用蜜煎附子噙之口瘡以甘草半寸白礬錢許含化咽津口瘡久不愈以五倍子末摻之或煎湯漱或煎湯泡白礬漱蓋酸能收斂也口瘡甚者含焰硝硼砂勿開口並用南星末醋調貼足心湧泉穴以引熱下行又方五倍子一兩蜜炙黃柏滑石各半兩銅緑三錢麝香少許為末摻之舌瘡口破疼痛以巴豆半枚生研和米飲一豆大杵和貼印堂對額間約半刻許覺紅就去不可泡起小兒減半隨即痊愈戴復庵云下虛上盛致口舌生瘡宜用鎮墜之藥以蘇子降氣湯或鹽湯下養正丹口臭年高水弱奉養太過厚味及服食補陽藥口糜臭不可近甘露飲加犀角茵陳及濃煎香薷汁含之徐徐咽下口中如膠而臭知母地骨皮桑皮山梔麥冬甘草食鹽煎湯噙下壯盛之人涼膈散甚佳痰壅氣濁而臭宜鹽湯探吐之子和治一男子二十餘歲病口中氣出臭如登廁夫肺金本主腥金為火所乘火主臭應使如是也久則成腐腐者腎也此亢極反兼水化也病在上宜湧之以瓜蒂散湧而去其七分夜以神祐丸浚川散下五七行比旦而臭斷但藥性獷悍不宜輕用齒齲蛀骨槽風齒統屬足少陰腎經分上下齦上齦屬足陽明胃經下齦屬手陽明大腸經男子八歲腎氣實髮長齒更三八真牙生五八齒槁八八則齒髮去女子以七為數蓋腎主骨齒乃骨之餘髓之所養故隨天癸之盛衰也東垣云齒者腎之標口者脾之竅諸經多有會於口者下齦乃手陽明大腸脈之所過惡熱飲而喜寒上齦乃足陽明胃脈之所貫喜熱飲而惡寒牙者腎之標實則堅牢虛則浮動熱則袒動作痛不已其痛不一有惡熱而作痛者有惡寒而作痛者有惡寒又惡熱而作痛者有牙齒動搖而作痛者有齒袒而作痛者有齒齦為疳所蝕缺少血出而作痛者有齒齦腫起而作痛者有脾胃中有風邪但覺風而作痛者有胃中氣少不奈於寒袒露其齒作而痛者有為蟲蝕色變而作痛者有牙齒疼痛而臭穢之氣不可近者痛既各異豈可一藥而盡之哉薛立齊云濕熱甚而痛者承氣湯下之上下牙痛不可忍牽引入腦或喜寒惡熱脈洪數有力者涼膈散倍酒蒸大黃瀉之大腸熱而齒齦腫痛清胃散火鬱而痛者越鞠丸解之腎經虛而痛者六味丸加骨碎補腎經虛寒而痛者八味丸加細辛其屬風熱者羌獨荊防芎辛薄荷生地之類水煎漱咽不愈茵陳散風毒及熱壅上攻牙齦痛或齦縫有紅肉努出消風散臨臥半漱半服風寒入腦者羌活附子湯牙痛用清涼藥更甚者從治之畢茇川椒薄荷細辛龍腦青鹽為末擦之得熱而痛得涼則止者小承氣湯加甘草川連凡齒痛遇勞即發或午後甚者皆脾胃虛熱補中益氣下六味丸若齒齦腫痛焮赤腮頰此胃經風熱犀角升麻湯若善飲者齒痛腮頰焮腫此胃經濕熱清胃散加葛根因服補胃熱藥致上下牙疼痛不可忍牽引頭腦滿面發熱大痛乃手陽明經中熱甚而作其齒喜冷惡熱清胃散加蘭香寒熱皆痛當歸龍膽散上邊痛倍升麻下邊痛倍白芷胃中實熱太甚口臭不可近牙根疳蝕血出乃恣食肥甘美酒所致清胃散加茵陳香薷少佐白豆蔻先以熟大黃瀉一二次使胃中濕熱去而齒自安矣腎虛牙浮而痛甚則憎寒壯熱如欲脫之狀下安腎丸還少丹間進黑錫丹有房勞惱怒牙即動搖長出服補腎清胃藥俱不效者此腎經火邪盛也宜酒黃柏三錢青鹽升麻各一錢且漱且咽以攝之或生地黃兩許骨碎補三錢同細辛一分秦椒七粒酒水浸搗略煎入青鹽少許如上且漱且咽服之良牙疳腫腐作痛人中白青黛冰片玄明粉為散摻之小兒好食糖霜生疳治之不愈者以石蜜不時嚼之糖因煎煉而助濕熱石蜜不經火熬其性本寒故能化疳專取同氣之相感也齲蛀齲蛀數年不愈當作陽明蓄血治桃核承氣為細末煉蜜丸如桐子大服之好飲者多此屢服有效局方引涎止痛方川椒露蜂房微炙等分為末水煎入鹽少許乘熱頻漱冷即吐出或用蟾酥銀硃摻和為丸如萊蔔子大每用一丸搽患處便不疼至三丸吐濃涎數口即愈又用不蛀皂角一莢去皮子於皂子處安巴豆一粒鹽泥固濟燒灰研細末用剜耳子抄少許填入蛀孔內白芷細辛煎漱或溫米醋漱出蟲自愈或用食鹽之滴滷漱二三次以攝其虛陽其痛即止但可暫用以其能損齒也牙齒動搖還少丹常服或六味丸加骨碎補陰虛內熱者甘露飲外用五倍子散烏金散長春牢牙散齒間肉壅口不能開水漿難入以牙硝煎湯漱之一法用皂白二礬湯漱之一法用五倍子煎湯漱之一法以熱醋漱之骨槽風生於耳前腮頰痛引筋骨寒熱如瘧牙關緊閉不能進食不待腐潰而齒便脫落此風毒竄入骨槽所致初則堅硬難消急宜艾灸其外針刺齒齦以泄其毒用冰硼玄明粉為散吹搽內服降火化痰消腫之劑久則瘡口難合非參耆歸芍補托兼肉桂冬味之類不能破結斂肌其治法外科正宗頗詳瘍醫宜參究之若腐腫不消虛熱不退形焦體削者不治髭發經云腎者封藏之本精之處也其華在發多食甘則骨痛而發落髭鬚黃者多熱多氣白者少血多氣黑色者多血少氣美眉者太陽多血通髯極須者少陰多血美須者陽明多血發黃白七寶美髯丹發白須黃發落不生脈弦皮毛枯槁是營衛氣衰黃耆建中下六味丸發脫落及臍下痛是脾腎氣衰不能生長真陰四君子加熟地染須用烏金散烏金丹赤金散皆不傷髭而極效一法揀上好茄棵留初生第一枚茄子傍蒂上面挖去一塊嵌入水銀三分仍以挖下者掩上拴好余花摘去勿令結子久之茄中悉化為水取貯鉛罐中以水浸罐之半勿令乾須梢一沾全須盡黑唇唇屬足太陰陽明脾胃又屬手少陰太陰心脈挾口統屬衝任二脈上唇挾口屬足陽明下唇挾口屬手陽明唇燥則干熱則裂風則瞤寒則揭若唇腫起白皮皺裂如蠶繭者名曰繭唇有唇腫如繭如瘤者或因七情火動傷血或因心火傳脾或因厚味積熱傷脾大要審本證察兼證清胃氣生脾津或兼滋腎則燥自潤火自降風自息腫自消若患者忽略治者不察妄用消熱清毒之藥或用藥線結去反為翻花敗證矣腎虛唇繭時出血水內熱口乾吐痰體瘦六味丸去萸加麥冬不應用加減八味丸肝經怒火風熱傳脾唇腫裂或患繭唇柴胡清肝散胃火血燥唇裂為繭或牙齦潰爛作痛清胃散風客於脾經唇燥裂無色犀角升麻湯去白附子加枳殼石斛婦人鬱怒肝脾受傷多有此證逍遙歸脾小柴胡選用唇燥口乾生瘡年久不愈外用橄欖燒灰研末豬脂調塗治唇緊裂生瘡青皮燒灰敷之唇者肉之分也唇反者肉先死唇青者為筋死石頑曰唇青有二若唇與爪甲俱青而煩渴引飲者為熱伏厥陰竹葉石膏湯若唇青厥冷而畏寒振振欲劈地者為寒犯少陰真武湯唇淡為脫血宜十全大補輩唇赤中帶黃色為脾熱黃芩芍藥湯唇赤而腫厚漯漯然者雖曰心火亢盛實脾胃中有濕熱當從清胃散加減治之舌張三錫曰心開竅於舌心火盛則舌乾或破脈洪實有力者黃連瀉心湯加減右脈虛大四肢倦怠而舌瘡破不愈屬勞役過度虛火上炎為患補中益氣湯口舌唇疼有瘡皆心火炎盛涼膈散舌瘡風熱口中乾燥舌裂生瘡甘露飲酒客膏粱積熱內盛上焦痰實舌脹腫涼膈散瀉之須脈實有力氣壯乃可舌強硬如豬脬以針刺舌兩邊大脈血出即消勿刺中央令人血不止此病人多不識失治則死凡舌腫舌下必有如蟲形有頭有尾可燒釘烙頭即消上焦痰熱壅遏勢挾相火則病速而危毒氣結於舌下復生一小舌名子舌脹但脹大而強無小舌者名木舌脹大都痰火為患緩者用辛涼利氣化痰藥重者砭去其血即平勞神不睡口舌破者自當安神養心作心虛治心之本脈繫於舌根脾之絡脈繫於舌傍肝脈絡於舌本少陰脈系舌本風寒傷於心脾憎寒壯熱齒浮舌腫痛金沸草散漱口吞一半吐一半經驗方治舌脹大塞口不能飲食用真蒲黃一味頻刷舌上甚則加乾薑末從治之若能服藥即以川連一味煎濃汁呷之以瀉心火甚者加乾薑從治舌上有竅出血不止炒槐花末摻舌重舌宜三黃丸及生蒲黃摻之舌出不收心經熱甚及傷寒熱毒攻心與傷寒後不調攝往往有之宜珍珠末冰片火煅人中白敷之舌暴腫出口用巴豆霜以紙卷納鼻中舌自收此取辛烈開竅散火引毒流散之意與小兒口疳貼囟同法平人舌上稠黑胎垢拭之不淨經久不退且口甜氣穢便是胃脘發癰之候與傷寒暴病府邪內實迥異急宜涼膈散下之面靈樞云十二經脈三百六十五絡其血氣皆上於面而走空竅其精陽氣上走於目而為睛其彆氣走於耳而為聽其宗氣出於鼻而為臭其濁氣出於胃走唇舌而為味其氣之津液皆上熏於面而皮又厚其肉堅故天氣甚寒不能勝之也風邪入皮膚痰飲積腑臟則面䵟黯脾肺二經風濕搏而為熱濕故面生瘡面腫曰風兩頰赤腫其狀如痱酒調消風散食後服之或用羌活防風升麻白芷牛蒡子之屬甚則涼膈散生薑蔥豉汗之外杵杏仁如膏加玄明粉硫黃敷之風熱面腫而痛升麻湯加犀角黃連白芷川芎薄荷荊芥風熱面腫痛或咽喉不利者犀角升麻湯虛風證能食麻瞀牙關急搐目內瞤動胃中有風故面獨腫升麻胃風湯面熱面寒飲食不節則胃病胃病則氣短精神少而生大熱有時火上行而獨燎其面針經云面熱者足陽明病調胃承氣湯加犀角川連脈數實有力精神茂澤升麻湯加川連甚者涼膈散咳逆倚息不得臥面熱如醉此為胃熱上衝熏其面桂苓五味甘草湯加大黃利之左半邊面及耳熱耳鳴覺從少腹左脅衝上者屬肝火實則當歸龍薈丸虛則加減八味丸虛甚地黃飲子面寒為陽虛陰寒鬱遏所致升麻湯加熟附子甚者附子理中湯陽明經虛面熱而赤者補中益氣加熟附子二三分面赤為邪氣怫鬱在經宜表不宜下面戴陽下虛也傷寒用四逆湯雜證用地黃飲子面白善嚏脈緊者寒也羌活防風甘草藁本四味瀉足太陽少加附子以通其脈悲恐者更加桂附面目浮腫或紫黑或風刺癮疹消風散加減面上風癢或如火丹鼠黏子散不應加人參一錢數服即效面部生瘡或鼻臉赤風刺粉刺百藥不效及面上細瘡常出黃水者並宜硫黃膏塗之上焦風熱則面生小瘡通聖散脾胃虛或吐瀉後面目浮腫者脈必緩弱或氣口虛大六君子湯加減面青肝虛面白肺虛面黃脾虛兩頰紅陰虛面如漆柴手足少陰氣俱絶為血先死若面黑而不至於枯者六味丸面塵脫色為肝木失榮人參養榮湯面色忽黑乃因臭氣所沖而成或頭痛或腹痛或嘔吐或腹脹一味香附末淡鹽湯下三錢面上豆痕或斑䵟黶密陀僧細末夜以人乳調敷面上雀斑白丁香鷹屎白密陀僧唾調搽之面上赤斑癬鹿角灰豬脂調塗指爪破面輕粉研細生薑汁調敷無瘢痕肋腫屬風熱乾葛甘桔升麻薄荷濕熱脈洪大者羌活勝濕湯加甘桔黃芩痄腮赤小豆末雞子清調敷井底泥亦得三因方凡伸缺頰車蹉但開不能合以酒飲之令大醉睡中吹皂角末搐鼻嚏透即愈正後以補中益氣加骨碎補調之咽喉哽經云咽喉者水穀之道也喉嚨者氣之所以上下者也會厭者音聲之戶也懸雍者音聲之關也咽與喉會厭與舌此四者同在一門而其用各異喉以納氣故喉氣通於天咽以納食故咽氣通於地會厭管於其上以司開闔掩其厭則食下不掩其喉必錯以舌抵上齶則會厭能閉其喉矣四者交相為用缺一則飲食廢而死矣凡經言喉痹者謂喉中呼吸不通言語不出而天地閉塞也云咽塞云嗌痛者謂咽喉不能納唾與食而地氣閉塞也云喉痹咽嗌痛者謂咽喉俱病天地之氣並閉塞也咽喉二竅同出一脘異途施化喉在前主出咽在後主吞喉系堅空連接肺本為氣息之路主出而不納咽系柔空下接胃本為飲食之路主納而不出當食言語則水穀乘氣送入喉脘遂嗆而咳矣經云足少陰所生病者口渴舌乾咽腫上氣咽乾及痛其證內熱口乾面赤痰涎湧上尺脈必數而無力蓋緣腎水虧損相火無制而然須用六味丸加麥冬五味大劑作湯服之又有色欲過度元陽虧損無根之火遊行無制客於咽喉者須八味腎氣丸大劑煎成冰冷與飲引火歸源庶幾可救乳鵝纏喉二種不同腫於喉兩傍者為雙鵝腫於一邊者為單鵝治法用鵝翎蘸米醋攪喉中去盡痰涎後以鵝翎探吐之令著實一咯咯破喉中紫血即潰或玉樞丹磨服毒甚不散者上以小刀刺出紫血即愈古法有刺少商穴甚好刀針刺血急則用之然但腫不痛者切不宜用蓋有形而無痛者陽之類也當峻補其陰若刺之反傷陰血必死纏喉風證先兩日頭目眩暈胸膈緊塞氣息短促驀然咽喉腫痛手足厥冷氣閉不通飲食不下痰毒壅盛為纏喉風其證最急又有兩塊結於喉傍甚則大如雞卵氣塞不通痰鳴不止者為鎖喉風其證更劇慎勿砭破急用土牛膝選粗者兩許勿經水勿犯鐵折斷搗汁和米醋半盞雞翅毛蘸攪喉中如牙關緊閉者蘸攪兩腮自開開後喉中頻攪以通其氣若喉兩傍有塊者涎出自消後以人中白煅過入冰片少許吹喉中日吹一次不過三四日愈或硼砂丹湧去頑痰或荔枝草搗汁和醋含漱或天名精搗自然汁鵝翎掃入去痰或用馬鞭草搗汁灌漱倘腫塞不得下者灌鼻取吐以奪其勢然不若土牛膝汁最捷若兩塊湊合喉中痰鳴懸壅上縮不見氣塞不通神丹不可救矣用土牛膝醋攪後以拇指捺其脊上七節兩傍如疼痛者易已甚者以膝墊其當背以手抄兩脅下向上扳兩缺盆令胸前凸起則氣伸而得上泄若出涎後涕淚稠黏者風熱也無涕淚者風寒也胸中有結塊者宿食也隨證治之此證雖系時毒邪氣多有因跌撲飲食停滯而起者宜用荊防甘桔連翹牛蒡薄荷黑參山楂內解其毒蓋山楂能消食散血破結塊中火與消風散中厚朴同意又有喉疼忽愈毒攻胸脅痛不可忍氣促身熱不能臥者牛蒡子貝母醋炒升麻黃藥子干浮萍黑參生甘草蜜丸噙化七日以後毒深喘甚手足指甲紫者難治吹藥用紫口蛤蜊七枚橄欖核七枚文火煅過研細入枯礬一錢以大青魚膽一枚置鍾內曬乾再加膽汁三膽為度加冰片吹之然須戒茶百日後無復發之虞一切喉痹腫痛及重舌木舌等證烏龍膏急者惟針刺血最為上策咽喉腫痛作渴飲冷大便祕結六脈俱實涼膈散下之喉痹脈浮惡寒發熱多是暴寒折熱表邪勢盛非但寒涼藥食能凝閉毒邪即硼砂白礬白梅等酸收之品及膽礬點喉俱不可犯惟當輕揚開發其表以泄火毒急砭患處並刺少商出血最為要訣走馬喉風若有頭痛發熱先與一味香豉濃煎加蔥涕探吐後用荊防牛蒡甘桔連翹薄荷犀角之類如口不開者以牙皂末吹鼻取嚏方可下藥鎖喉風證有用牙皂煎湯湧吐頑痰每至皮毛脫落大傷胃氣甚至激動其痰鎖住不能吐出頃刻立斃者其走馬喉痹有用巴豆綿裹塞鼻每至焮發其毒不可不慎乳鵝用硼砂白梅應手獲效然性最辛烈雖假酸收終是以火濟火每令不時舉發人皆未省其故也時氣咽腫普濟消毒飲去芩連苦寒之味熱服以散表為先喉痹傳染是疫癘荊防敗毒散隨證加減陰虛咳嗽久之喉中痛者必有肺花瘡難治桔梗湯送都氣丸切勿用冰片吹點證劇不勝湯藥者日用雞子生調米飲沖服稍緩其疼終亦必亡而已脾肺有熱虛火上壅咽喉生瘡本事利膈湯咽痛服涼藥反甚者宜用薑汁咽中如有炙臠或如梗狀痰火客於上焦也半夏厚朴湯即四七湯懸壅腫痛不可飲食黑參升麻大黃射干甘草煎服咽痛諸藥不效者此非咽痛乃鼻中生紅絲如發懸黑泡如癭珠垂掛咽門致飲食不入杜牛膝根洗淨入好醋三五滴同研汁就鼻孔滴入絲斷珠破即安懸壅痛不下食即會厭垂長而懸壅塞妨礙飲食者燒鹽箸蘸點之乳鵝紅腫不消杜牛膝根研爛用乳點納鼻諸哽在喉當審何物以所勝能制者治之如鸕鷀橄欖治魚哽狗涎治骨哽鵝涎治稻芒哽鴨涎治螺螄哽磁石治鐵哽水銀灰治金銀哽要在變通諸物哽塞苧麻根杵爛丸如彈子大將所哽物煎湯吞下吞釘鐵金銀銅錢等物用煬銀罐中炭為末銀匠油槽內油調服即出並多食肥肉助其潤下錢哽荸薺生嚼多食效或加茨菰汁不應用羊脛骨煅存性荸薺汁調服自化諸哽用薤白煮半熟以綿縛定手執線頭少嚼薤白咽度薤至哽處便牽引哽即隨出又法用絲綿一小團如上法亦妙誤吞魚釣以藠串咽下拽之有線在外者以綿紙剪數百層穿線上徐徐咽下少頃引之上出羅謙甫治徵南元帥七旬至楚上因過飲腹痛腸鳴自利日夜約五十行咽嗌腫痛耳前後腫舌本強涎唾稠黏欲吐不能以手拽之方出言語艱難反側悶亂夜不得臥其脈浮數按之沉細而弦先以砭刺腫上出紫黑血頃時腫勢消減遂用桔梗甘草連翹鼠黏子酒黃芩升麻防風水煎令熱漱冷即吐出勿咽恐傷脾胃也再漱而涎清腫散語聲自出後以辛熱丸劑以治中寒化宿食而燥脾胃取丸之不即施行而不犯其上熱至其病所而後化乃治以緩也不數服利止痛定後胸中閉塞作陳而痛復以異攻散加升麻溫養脾胃升順正氣而愈
